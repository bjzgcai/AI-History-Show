        function formatCategoryLabel(vm) {
            const rawCategory = String((vm && vm.category) || (vm && vm.subtitle) || 'AI 历史').trim();
            const compactCategory = rawCategory.replace(/\s+\(/g, '(');
            if (/\([^)]*\)/.test(compactCategory)) return compactCategory;

            const subtitle = String((vm && vm.subtitle) || '').trim();
            const categoryYears = milestones
                .filter((item) => {
                    const itemCategory = String(item.category || '').trim();
                    const itemSubtitle = String(item.subtitle || '').trim();
                    return itemCategory === rawCategory || itemSubtitle === subtitle || itemSubtitle === rawCategory;
                })
                .map((item) => Number(item.year))
                .filter(Number.isFinite);

            if (categoryYears.length === 0) return compactCategory;
            const minYear = Math.min(...categoryYears);
            const maxYear = Math.max(...categoryYears);
            return `${compactCategory}(${minYear}-${maxYear})`;
        }

        function renderArchive(vm) {

        function ensureMediaIframe() {
            let iframe = refs.videoFrame.querySelector('iframe');
            if (!iframe) {
                iframe = document.createElement('iframe');
                iframe.id = 'mediaVideo';
                iframe.allow = 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture';
                iframe.allowFullscreen = true;
                refs.videoFrame.appendChild(iframe);
                refs.mediaVideo = iframe;
            }
            return iframe;
        }

        function ensureMediaPlayer() {
            let player = refs.videoFrame.querySelector('video');
            if (!player) {
                player = document.createElement('video');
                player.id = 'mediaVideoPlayer';
                player.controls = true;
                player.playsInline = true;
                player.preload = 'metadata';
                refs.videoFrame.appendChild(player);
            }
            return player;
        }

        function isDirectVideoMedia(url) {
            return /\.(mp4|webm|ogg)(?:[?#].*)?$/i.test(String(url || ''));
        }

        function resetInlineMedia() {
            const iframe = ensureMediaIframe();
            const player = ensureMediaPlayer();

            iframe.style.display = 'none';
            iframe.src = 'about:blank';

            player.pause();
            player.removeAttribute('src');
            player.style.display = 'none';
            player.load();
        }

        function playInlineVideo(url) {
            if (!url) return;
            refs.videoFrame.classList.add('is-playing');
            refs.videoFrame.onclick = null;
            if (isDirectVideoMedia(url)) {
                const iframe = ensureMediaIframe();
                const player = ensureMediaPlayer();
                iframe.style.display = 'none';
                iframe.src = 'about:blank';
                player.src = url;
                player.style.display = 'block';
                const playback = player.play();
                if (playback && typeof playback.catch === 'function') {
                    playback.catch(() => {});
                }
                return;
            }

            const iframe = ensureMediaIframe();
            const player = ensureMediaPlayer();
            player.pause();
            player.removeAttribute('src');
            player.style.display = 'none';
            player.load();
            iframe.src = url;
            iframe.style.display = 'block';
        }

        function openPhotoViewer(startIndex) {
            const vm = getVm(currentIndex);
            const photos = sortPhotosForDisplay(vm.photos);
            if (!photos.length) return;

            let currentPhotoIndex = Math.max(0, Math.min(startIndex, photos.length - 1));
            const viewer = document.createElement('div');
            viewer.className = 'photo-viewer';
            viewer.innerHTML = `
                <button class="close-viewer" type="button">✕</button>
                <button class="photo-prev" type="button">◀</button>
                <img src="${photos[currentPhotoIndex]}" class="viewer-photo" alt="历史档案">
                <button class="photo-next" type="button">▶</button>
                <div class="photo-counter">${currentPhotoIndex + 1} / ${photos.length}</div>
            `;
            document.body.appendChild(viewer);

            const closeViewer = () => {
                viewer.remove();
            };

            viewer.querySelector('.close-viewer').onclick = closeViewer;
            viewer.querySelector('.photo-prev').onclick = () => {
                currentPhotoIndex = (currentPhotoIndex - 1 + photos.length) % photos.length;
                viewer.querySelector('.viewer-photo').src = photos[currentPhotoIndex];
                viewer.querySelector('.photo-counter').textContent = `${currentPhotoIndex + 1} / ${photos.length}`;
            };
            viewer.querySelector('.photo-next').onclick = () => {
                currentPhotoIndex = (currentPhotoIndex + 1) % photos.length;
                viewer.querySelector('.viewer-photo').src = photos[currentPhotoIndex];
                viewer.querySelector('.photo-counter').textContent = `${currentPhotoIndex + 1} / ${photos.length}`;
            };

            const handleKey = (event) => {
                if (event.key === 'Escape') closeViewer();
                if (event.key === 'ArrowLeft') viewer.querySelector('.photo-prev').click();
                if (event.key === 'ArrowRight') viewer.querySelector('.photo-next').click();
            };

            document.addEventListener('keydown', handleKey);
            const observer = new MutationObserver(() => {
                if (!document.body.contains(viewer)) {
                    document.removeEventListener('keydown', handleKey);
                    observer.disconnect();
                }
            });
            observer.observe(document.body, { childList: true });
        }

        function renderPage(index) {
            const vm = getVm(index);
            currentArchiveIndex = choosePreferredArchiveIndex(sortPhotosForDisplay(vm.photos));
            renderLeft(vm);

        function jumpTo(index, options = {}) {
            const { resetAutoplay = true } = options;
            if (index < 0 || index >= milestones.length || index === currentIndex) return;

            preloadMilestoneAssets(index);
            currentIndex = index;
            currentArchiveIndex = 0;
            renderPage(currentIndex);
            if (resetAutoplay) {
                resetAutoplayTimer();
            }
        }

        function navigate(direction, options = {}) {
            if (milestones.length <= 1) return;

            const nextIndex = direction === 'next'
                ? (currentIndex + 1) % milestones.length
                : (currentIndex - 1 + milestones.length) % milestones.length;
            jumpTo(nextIndex, options);
        }

        function jumpToTimelineClientX(clientX, track = refs.timelineTrack) {
            if (!track || milestones.length <= 1) return;
            const rect = track.getBoundingClientRect();
            if (!rect.width) return;

            const ratio = Math.min(0.999, Math.max(0, (clientX - rect.left) / rect.width));
            const index = Math.min(milestones.length - 1, Math.max(0, Math.floor(ratio * milestones.length)));
            jumpTo(index);
        }

        function bindTimelineDrag(track) {
            if (!track) return;

            let activePointerId = null;
            let hasDragged = false;

            track.addEventListener('pointerdown', (event) => {
                if (event.button != null && event.button !== 0) return;
                activePointerId = event.pointerId;
                hasDragged = false;
                track.classList.add('is-dragging');
                track.setPointerCapture(event.pointerId);
                jumpToTimelineClientX(event.clientX, track);
                registerUserActivity(event);
                event.preventDefault();
            });

            track.addEventListener('pointermove', (event) => {
                if (activePointerId !== event.pointerId) return;
                hasDragged = true;
                jumpToTimelineClientX(event.clientX, track);
                event.preventDefault();
            });

            const endDrag = (event) => {
                if (activePointerId !== event.pointerId) return;
                track.classList.remove('is-dragging');
                try {
                    track.releasePointerCapture(event.pointerId);
                } catch (error) {}
                activePointerId = null;
                if (hasDragged) {
                    event.preventDefault();
                }
            };

            track.addEventListener('pointerup', endDrag);
            track.addEventListener('pointercancel', endDrag);
        }

        function bindGlobeDrag() {
            if (!refs.globeShell) return;

            let activePointerId = null;
            let startX = 0;
            let startY = 0;
            let startTheta = 0;
            let startPhi = 0;

            refs.globeShell.addEventListener('pointerdown', (event) => {
                if (event.button != null && event.button !== 0) return;
                activePointerId = event.pointerId;
                startX = event.clientX;
                startY = event.clientY;
                startTheta = camTarget.theta;
                startPhi = camTarget.phi;
                globeArrived = true;
                markerFlashDone = true;
                refs.globeShell.classList.add('is-dragging');
                refs.globeShell.setPointerCapture(event.pointerId);
                registerUserActivity(event);
                event.preventDefault();
            });

            refs.globeShell.addEventListener('pointermove', (event) => {
                if (activePointerId !== event.pointerId) return;
                const stageScale = Number.parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--stage-scale')) || 1;
                const dx = (event.clientX - startX) / Math.max(0.1, stageScale);
                const dy = (event.clientY - startY) / Math.max(0.1, stageScale);
                camTarget.theta = wrapAngle(startTheta + dx * 0.006);
                camTarget.phi = clampPhi(startPhi + dy * 0.006);
                camCurrent.theta = camTarget.theta;
                camCurrent.phi = camTarget.phi;
                event.preventDefault();
            });

            const endDrag = (event) => {
                if (activePointerId !== event.pointerId) return;
                refs.globeShell.classList.remove('is-dragging');
                try {
                    refs.globeShell.releasePointerCapture(event.pointerId);
                } catch (error) {}
                activePointerId = null;
            };

            refs.globeShell.addEventListener('pointerup', endDrag);
            refs.globeShell.addEventListener('pointercancel', endDrag);
        }

        function bindArchiveDrag() {
            if (!refs.archiveStage) return;

            let activePointerId = null;
            let startX = 0;
            let startY = 0;
            let didNavigate = false;

            refs.archiveStage.addEventListener('pointerdown', (event) => {
                if (event.button != null && event.button !== 0) return;
                activePointerId = event.pointerId;
                startX = event.clientX;
                startY = event.clientY;
                didNavigate = false;
                refs.archiveStage.classList.add('is-dragging');
                refs.archiveStage.setPointerCapture(event.pointerId);
                registerUserActivity(event);
            });

            refs.archiveStage.addEventListener('pointermove', (event) => {
                if (activePointerId !== event.pointerId || didNavigate) return;
                const dx = event.clientX - startX;
                const dy = event.clientY - startY;
                if (Math.abs(dx) < 80 || Math.abs(dx) < Math.abs(dy) * 1.25) return;

                if (dx < 0) {
                    refs.archiveThumbNext.click();
                } else {
                    refs.archiveThumbPrev.click();
                }
                didNavigate = true;
                event.preventDefault();
            });

            const endDrag = (event) => {
                if (activePointerId !== event.pointerId) return;
                const dx = event.clientX - startX;
                const dy = event.clientY - startY;
                refs.archiveStage.classList.remove('is-dragging');
                try {
                    refs.archiveStage.releasePointerCapture(event.pointerId);
                } catch (error) {}
                activePointerId = null;

                if (!didNavigate && Math.abs(dx) < 12 && Math.abs(dy) < 12) {
                    const hitTarget = document.elementFromPoint(event.clientX, event.clientY);
                    const thumbButton = hitTarget && hitTarget.closest
                        ? hitTarget.closest('#archiveThumbPrev, #archiveThumbNext')
                        : null;
                    if (thumbButton && !thumbButton.disabled) {
                        selectArchivePhoto(getVm(currentIndex), thumbButton.dataset.photoIndex);
                        event.preventDefault();
                    }
                }
            };

            refs.archiveStage.addEventListener('pointerup', endDrag);
            refs.archiveStage.addEventListener('pointercancel', endDrag);
        }

        function bindLeftVerticalNavigation() {
            if (!refs.leftScreen) return;

            let activePointerId = null;
            let startX = 0;
            let startY = 0;

            refs.leftScreen.addEventListener('wheel', (event) => {
                if (Math.abs(event.deltaY) < Math.max(16, Math.abs(event.deltaX) * 1.2)) return;
                toggleLeftDetailView(event.deltaY > 0 ? 'down' : 'up');
            }, { passive: true });

            refs.leftScreen.addEventListener('pointerdown', (event) => {
                const target = event.target && event.target.closest
                    ? event.target.closest('button, .globe-shell, .timeline-track, .archive-strip')
                    : null;
                if (target) return;
                activePointerId = event.pointerId;
                startX = event.clientX;
                startY = event.clientY;
            }, { passive: true });

            refs.leftScreen.addEventListener('pointerup', (event) => {
                if (activePointerId !== event.pointerId) return;
                const dx = event.clientX - startX;
                const dy = event.clientY - startY;
                activePointerId = null;
                if (Math.abs(dy) < 80 || Math.abs(dy) < Math.abs(dx) * 1.2) return;
                toggleLeftDetailView(dy < 0 ? 'down' : 'up');
            }, { passive: true });
        }

        function initSwipeNavigation() {
            if (!window.SwipeNavigation || typeof window.SwipeNavigation.setupSwipeNavigation !== 'function') {
                return;
            }

            window.SwipeNavigation.setupSwipeNavigation({
                surface: refs.stage,
                onNavigate(direction) {
                    navigate(direction);
                }
            });
        }

        refs.leftTimelinePrev.addEventListener('click', () => navigate('prev'));
        refs.leftTimelineNext.addEventListener('click', () => navigate('next'));
        refs.topPrevBtn.addEventListener('click', () => navigate('prev'));
        refs.topNextBtn.addEventListener('click', () => navigate('next'));

        window.addEventListener('resize', debounce(syncStageScale, 120));
        window.addEventListener('beforeunload', () => {
            clearAutoplayTimer();
            clearIdleTimer();
        });

        document.addEventListener('pointerdown', (event) => {
            registerUserActivity(event);
        }, { passive: true });

        document.addEventListener('click', (event) => {
            registerUserActivity(event);
        }, { passive: true });

        document.addEventListener('wheel', (event) => {
            registerUserActivity(event);
        }, { passive: true });

        document.addEventListener('keydown', (event) => {
            registerUserActivity(event);
            if (hasOpenPhotoViewer()) return;
            if (event.key === 'ArrowRight') navigate('next');
            if (event.key === 'ArrowLeft') navigate('prev');
        });

        syncStageScale();
        initGlobe();
        initSwipeNavigation();
        bindTimelineDrag(refs.timelineTrack);
        bindTimelineDrag(refs.rightTimelineTrack);
        bindGlobeDrag();
        bindArchiveDrag();
        renderPage(currentIndex);
        restartIdleCountdown();
    </script>
</body>
</html>

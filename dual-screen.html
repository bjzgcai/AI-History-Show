<!DOCTYPE html>
<html lang="zh-CN" data-layout-mode="dual">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 历史回顾展览 - 双横屏展陈模式</title>
    <script src="shared/layout-router.js"></script>
    <style>
        :root {
            --screen-width: 1920px;
            --screen-height: 1080px;
            --stage-width: calc(var(--screen-width) * 2);
            --stage-scale: 1;
            --bg: #020202;
            --panel: rgba(255, 255, 255, 0.05);
            --line: rgba(255, 255, 255, 0.14);
            --line-strong: rgba(255, 255, 255, 0.28);
            --text: #f4efe5;
            --text-soft: rgba(244, 239, 229, 0.78);
            --text-muted: rgba(244, 239, 229, 0.42);
            --accent: #f68900;
            --accent-strong: #ff7f11;
            --deep-red: #4f0404;
            --deep-red-soft: rgba(95, 9, 9, 0.68);
            --ui-font: "PingFang SC", "Microsoft YaHei", sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background:
                radial-gradient(circle at 12% 18%, rgba(246, 137, 0, 0.1), transparent 24%),
                radial-gradient(circle at 82% 16%, rgba(255, 255, 255, 0.04), transparent 18%),
                linear-gradient(180deg, #0a0a0a 0%, #020202 100%);
            color: var(--text);
            font-family: var(--ui-font);
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.012) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.012) 1px, transparent 1px);
            background-size: 4px 4px;
            opacity: 0.3;
            mix-blend-mode: soft-light;
        }

        .stage-viewport {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        .dual-stage {
            position: absolute;
            left: 50%;
            top: 50%;
            width: var(--stage-width);
            height: var(--screen-height);
            display: grid;
            grid-template-columns: var(--screen-width) var(--screen-width);
            transform: translate(-50%, -50%) scale(var(--stage-scale));
            transform-origin: center center;
            box-shadow: none;
            touch-action: pan-y;
        }

        .dual-stage::after {
            content: "";
            position: absolute;
            left: calc(var(--screen-width) - 1px);
            top: 0;
            width: 2px;
            height: var(--screen-height);
            background: linear-gradient(180deg, transparent, rgba(255, 255, 255, 0.18), transparent);
            pointer-events: none;
        }

        .screen {
            position: relative;
            width: var(--screen-width);
            height: var(--screen-height);
            overflow: hidden;
            background: #000;
            border: none;
        }

        .screen-left::before {
            content: none;
        }

        .screen-left::after {
            content: none;
        }

        .screen-right::before {
            content: "";
            position: absolute;
            inset: 0;
            background: none;
            box-shadow: none;
        }

        .screen-right::after {
            content: "";
            position: absolute;
            inset: 0;
            pointer-events: none;
            background: none;
        }

        .screen-left {
            --left-unit-x: calc(var(--screen-width) / 1920);
            --left-unit-y: calc(var(--screen-height) / 1080);
            --left-scale: calc(var(--screen-width) / 1920);
        }

        .screen-right {
            --left-unit-x: calc(var(--screen-width) / 1920);
            --left-unit-y: calc(var(--screen-height) / 1080);
            --left-scale: calc(var(--screen-width) / 1920);
        }

        .left-topbar {
            position: absolute;
            left: calc(55 * var(--left-unit-x));
            top: calc(30 * var(--left-unit-y));
            width: calc(1810.11 * var(--left-unit-x));
            height: calc(60.63 * var(--left-unit-y));
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr);
            align-items: start;
            gap: calc(14 * var(--left-unit-x));
            padding: 0;
            border-bottom: none;
            z-index: 5;
        }

        .left-topbar::after {
            content: "历史  HISTORY";
            position: absolute;
            right: 0;
            top: calc(-1 * var(--left-unit-y));
            color: #797a7a;
            font-size: calc(25 * var(--left-scale));
            font-weight: 800;
            line-height: 1;
            letter-spacing: 0;
            white-space: nowrap;
        }

        .brand-lockup {
            min-width: 0;
            display: flex;
            align-items: flex-start;
        }

        .brand-lockup img {
            display: block;
            width: auto;
            height: calc(34 * var(--left-unit-y));
            max-width: calc(520 * var(--left-unit-x));
            object-fit: contain;
        }

        .left-kicker {
            justify-self: center;
            align-self: start;
            margin-top: calc(14 * var(--left-unit-y));
            color: var(--accent);
            font-size: calc(18 * var(--left-scale));
            font-weight: 700;
            line-height: 1.1;
            letter-spacing: 0;
            white-space: nowrap;
        }

        .left-body {
            position: absolute;
            left: 0;
            top: 0;
            width: var(--screen-width);
            height: var(--screen-height);
            z-index: 3;
            overflow: hidden;
        }

        .left-body::before {
            content: "";
            position: absolute;
            left: calc(58 * var(--left-unit-x));
            top: calc(105 * var(--left-unit-y));
            width: calc(1809 * var(--left-unit-x));
            height: calc(825 * var(--left-unit-y));
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: calc(10 * var(--left-scale));
            background: #111;
            pointer-events: none;
        }

        .hero-panel,
        .narrative-panel,
        .archive-column,
        .commentary-column {
            min-height: 0;
        }

        .hero-panel,
        .narrative-panel {
            position: absolute;
            inset: 0;
        }

        .hero-panel {
            z-index: 4;
            pointer-events: none;
        }

        .narrative-panel {
            z-index: 5;
            inset: auto;
            left: calc(58 * var(--left-unit-x));
            top: calc(105 * var(--left-unit-y));
            width: calc(1809 * var(--left-unit-x));
            height: calc(825 * var(--left-unit-y));
            overflow: hidden;
            pointer-events: none;
        }

        .hero-years {
            position: absolute;
            left: calc(82 * var(--left-unit-x));
            top: calc(191 * var(--left-unit-y));
            display: flex;
            gap: calc(58 * var(--left-unit-x));
            color: rgba(244, 239, 229, 0.28);
            font-size: calc(24 * var(--left-scale));
            font-weight: 700;
            letter-spacing: 0.05em;
            line-height: 1;
            white-space: nowrap;
        }

        .hero-year {
            position: absolute;
            left: calc(430 * var(--left-unit-x));
            top: calc(120.4 * var(--left-unit-y));
            margin-top: 0;
            font-size: calc(94.6 * var(--left-scale));
            line-height: 1;
            font-weight: 500;
            color: var(--accent);
            letter-spacing: -0.03em;
            text-shadow: 0 0 24px rgba(246, 137, 0, 0.16);
            white-space: nowrap;
        }

        .globe-zone {
            position: absolute;
            inset: 0;
            z-index: 6;
            pointer-events: none;
        }

        .globe-stage {
            position: absolute;
            left: calc(89 * var(--left-unit-x));
            top: calc(319 * var(--left-unit-y));
            width: calc(542 * var(--left-unit-x));
            height: calc(542 * var(--left-unit-y));
            display: flex;
            align-items: center;
            justify-content: center;
            filter: drop-shadow(0 28px 48px rgba(0, 0, 0, 0.24));
            pointer-events: auto;
        }

        .globe-shell {
            position: relative;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            overflow: hidden;
            isolation: isolate;
            transform: translateZ(0);
            background:
                radial-gradient(circle at 31% 28%, rgba(81, 126, 191, 0.16), transparent 22%),
                radial-gradient(circle at 72% 72%, rgba(243, 132, 47, 0.1), transparent 30%),
                radial-gradient(circle at 39% 35%, rgba(23, 46, 92, 0.32), rgba(8, 11, 21, 0.12) 61%, transparent 74%);
            box-shadow:
                0 0 44px rgba(56, 112, 180, 0.16),
                0 0 96px rgba(246, 137, 0, 0.06),
                inset 0 0 26px rgba(8, 18, 36, 0.34);
            cursor: grab;
            touch-action: none;
        }

        .globe-shell.is-dragging {
            cursor: grabbing;
        }

        .globe-shell.globe-shell-figma {
            isolation: auto;
            background: transparent;
            box-shadow: none;
        }

        #dualGlobeContainer {
            position: absolute;
            inset: 0;
            z-index: 1;
            border-radius: inherit;
            overflow: hidden;
            clip-path: circle(50% at 50% 50%);
            transform: translateZ(0);
        }

        .globe-figma-image {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            border-radius: inherit;
            object-fit: cover;
            object-position: center;
            transform: scale(1.015);
            filter: none;
            animation: globeFigmaDrift 24s ease-in-out infinite alternate;
        }

        @keyframes globeFigmaDrift {
            from {
                transform: scale(1.01) translate3d(-1.2%, -0.4%, 0);
            }
            to {
                transform: scale(1.04) translate3d(1%, 0.7%, 0);
            }
        }

        #dualGlobeCanvas {
            width: 100% !important;
            height: 100% !important;
            display: block;
            border-radius: inherit;
            transform: scale(1.005);
            filter: none;
        }

        .globe-shell.globe-shell-figma::before,
        .globe-shell.globe-shell-figma::after {
            display: none;
        }

        .globe-shell::before {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background:
                radial-gradient(circle at 25% 22%, rgba(255, 255, 255, 0.14), transparent 14%),
                radial-gradient(circle at 69% 71%, rgba(255, 176, 92, 0.14), transparent 24%),
                radial-gradient(circle at 37% 35%, rgba(141, 203, 255, 0.06), transparent 22%);
            mix-blend-mode: screen;
            opacity: 0.46;
            pointer-events: none;
            z-index: 2;
        }

        .globe-shell::after {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: 50%;
            box-shadow:
                inset -28px -20px 38px rgba(12, 12, 20, 0.2),
                inset 14px 4px 20px rgba(255, 236, 212, 0.04),
                inset 0 0 0 1px rgba(205, 138, 82, 0.08);
            opacity: 0.44;
            pointer-events: none;
            z-index: 2;
        }

        .globe-atmosphere {
            position: absolute;
            inset: 0.9%;
            border-radius: 50%;
            border: 1px solid rgba(125, 179, 234, 0.24);
            background:
                radial-gradient(circle at 28% 30%, rgba(255, 255, 255, 0.06), transparent 16%),
                radial-gradient(circle at 70% 72%, rgba(246, 137, 0, 0.04), transparent 26%);
            box-shadow:
                0 0 20px rgba(112, 168, 232, 0.1),
                inset 0 0 10px rgba(136, 191, 244, 0.04);
            mix-blend-mode: screen;
            pointer-events: none;
            z-index: 3;
        }

        .globe-shell.globe-shell-figma .globe-atmosphere {
            opacity: 0;
        }

        .orbit-overlay {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 8;
        }

        .left-screen-divider {
            display: none;
        }

        .orbit-overlay svg {
            width: 100%;
            height: 100%;
            overflow: visible;
        }

        .orbit-guide-line {
            fill: none;
            stroke: rgba(255, 255, 255, 0.92);
            stroke-width: 1.8;
            stroke-linecap: round;
        }

        .orbit-guide-ring {
            fill: none;
            stroke: rgba(255, 255, 255, 0.92);
            stroke-width: 1.8;
            opacity: 0.92;
        }

        .orbit-ring {
            fill: none;
            stroke: var(--accent);
            stroke-width: 2.3;
            stroke-linecap: round;
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .orbit-start-dot {
            fill: var(--accent);
            stroke: none;
        }

        .orbit-dot {
            fill: var(--accent);
            stroke: none;
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .left-bottom-year {
            display: none;
        }

        .ghost-years {
            position: absolute;
            left: calc(1212 * var(--left-unit-x));
            top: calc(85 * var(--left-unit-y));
            width: calc(560 * var(--left-unit-x));
            display: flex;
            justify-content: space-between;
            gap: calc(34 * var(--left-unit-x));
            color: rgba(244, 239, 229, 0.24);
            font-size: calc(24 * var(--left-scale));
            font-weight: 700;
            letter-spacing: 0.04em;
            line-height: 1;
            white-space: nowrap;
        }

        .summary-card {
            position: absolute;
            left: calc(657 * var(--left-unit-x));
            top: calc(19 * var(--left-unit-y));
            width: calc(620 * var(--left-unit-x));
            margin-top: 0;
        }

        .summary-kicker {
            display: none;
        }

        .summary-title {
            margin-top: calc(58 * var(--left-unit-y));
            font-size: calc(36 * var(--left-scale));
            line-height: 1.1;
            font-weight: 700;
            color: var(--accent);
            max-width: calc(620 * var(--left-unit-x));
        }

        .summary-location {
            margin-top: calc(20 * var(--left-unit-y));
            color: var(--accent);
            font-size: calc(20 * var(--left-scale));
            line-height: 1.25;
            font-weight: 700;
            letter-spacing: 0;
        }

        .summary-body {
            margin-top: calc(54 * var(--left-unit-y));
            color: rgba(244, 239, 229, 0.9);
            font-size: calc(22 * var(--left-scale));
            line-height: 1.42;
            max-width: calc(560 * var(--left-unit-x));
            max-height: calc(238 * var(--left-unit-y));
            overflow: hidden;
        }

        .summary-body p {
            margin-bottom: 0.7em;
        }

        .summary-body p:last-child {
            margin-bottom: 0;
        }

        .screen-left .summary-card,
        .screen-left .archive-strip,
        .screen-left .hero-year,
        .screen-left .ghost-years {
            transition:
                left 0.45s cubic-bezier(0.2, 0.8, 0.2, 1),
                top 0.45s cubic-bezier(0.2, 0.8, 0.2, 1),
                opacity 0.32s ease,
                transform 0.45s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .screen-left.is-detail-view .hero-year {
            top: calc(138 * var(--left-unit-y));
        }

        .screen-left.is-detail-view .ghost-years {
            opacity: 0.55;
        }

        .screen-left.is-detail-view .summary-card {
            top: calc(701 * var(--left-unit-y));
            transform: translateY(0);
        }

        .screen-left.is-detail-view .summary-body {
            max-width: calc(480 * var(--left-unit-x));
            color: rgba(244, 239, 229, 0.66);
        }

        .screen-left.is-detail-view .archive-strip {
            top: calc(563 * var(--left-unit-y));
            transform: none;
            opacity: 0.86;
        }

        .archive-strip {
            position: absolute;
            left: calc(672 * var(--left-unit-x));
            top: calc(545 * var(--left-unit-y));
            width: calc(920 * var(--left-unit-x));
            height: calc(255 * var(--left-unit-y));
            min-height: 0;
            display: block;
            padding-bottom: 0;
            pointer-events: auto;
        }

        .left-archive-card {
            position: relative;
            border: none;
            background: transparent;
            padding: 0;
            cursor: pointer;
            box-shadow: 0 18px 40px rgba(0, 0, 0, 0.28);
            overflow: hidden;
        }

        .left-archive-card img {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: cover;
            background: #111;
            filter: grayscale(0.1);
        }

        .left-archive-card.paper {
            position: absolute;
            left: calc(0 * var(--left-unit-x));
            top: calc(18 * var(--left-unit-y));
            width: calc(180 * var(--left-unit-x));
            height: calc(188 * var(--left-unit-y));
            background: #f1ede4;
            z-index: 1;
        }

        .left-archive-card.primary {
            position: absolute;
            left: calc(330 * var(--left-unit-x));
            top: calc(0 * var(--left-unit-y));
            width: calc(286 * var(--left-unit-x));
            height: calc(252 * var(--left-unit-y));
            background: #f6f2ea;
            padding:
                calc(42 * var(--left-unit-y))
                calc(9.9 * var(--left-unit-x))
                calc(42 * var(--left-unit-y))
                calc(11.9 * var(--left-unit-x));
            transform: rotate(7.98deg);
            z-index: 2;
        }

        .left-archive-card.secondary {
            position: absolute;
            left: calc(690 * var(--left-unit-x));
            top: calc(30 * var(--left-unit-y));
            width: calc(270 * var(--left-unit-x));
            height: calc(210 * var(--left-unit-y));
            background: #ece7dd;
            border: calc(10 * var(--left-unit-x)) solid #ece7dd;
            transform: rotate(-4.52deg);
            z-index: 1;
        }

        .archive-empty {
            width: calc(824 * var(--left-unit-x));
            min-height: calc(320 * var(--left-unit-y));
            display: grid;
            place-items: center;
            border: 1px dashed rgba(255, 255, 255, 0.18);
            color: rgba(244, 239, 229, 0.45);
            font-size: calc(22 * var(--left-scale));
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .left-timeline,
        .right-timeline {
            position: absolute;
            left: calc(57 * var(--left-unit-x));
            top: calc(958 * var(--left-unit-y));
            width: calc(1811 * var(--left-unit-x));
            height: calc(87 * var(--left-unit-y));
            padding-top: 0;
            border-top: none;
            z-index: 4;
        }

        .left-timeline::before,
        .right-timeline::before {
            content: "Timeline";
            position: absolute;
            left: calc(70.33 * var(--left-unit-x));
            top: calc(-0.58 * var(--left-unit-y));
            color: var(--accent);
            font-size: calc(23 * var(--left-scale));
            font-weight: 700;
        }

        .left-timeline::after,
        .right-timeline::after {
            content: attr(data-title);
            position: absolute;
            left: calc(1502 * var(--left-unit-x));
            right: auto;
            top: calc(3 * var(--left-unit-y));
            color: var(--accent);
            font-size: calc(20 * var(--left-scale));
            font-weight: 700;
            white-space: nowrap;
        }

        .left-timeline-nav,
        .right-timeline-nav {
            position: absolute;
            top: calc(2.86 * var(--left-unit-y));
            width: calc(48.23 * var(--left-unit-x));
            height: calc(79.2 * var(--left-unit-y));
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: calc(8 * var(--left-scale));
            background: #151515;
            color: rgba(244, 239, 229, 0.74);
            font-size: calc(38 * var(--left-scale));
            line-height: 1;
            display: grid;
            place-items: center;
            cursor: pointer;
            z-index: 7;
            transition: color 0.2s ease, opacity 0.2s ease;
        }

        .left-timeline-nav:hover:not(:disabled),
        .right-timeline-nav:hover:not(:disabled) {
            color: #fff;
        }

        .left-timeline-nav:disabled,
        .right-timeline-nav:disabled {
            opacity: 0.38;
            cursor: default;
        }

        .left-timeline-prev,
        .right-timeline-prev {
            left: 0;
        }

        .left-timeline-next,
        .right-timeline-next {
            right: 0;
        }

        .timeline-track {
            position: absolute;
            left: calc(74.74 * var(--left-unit-x));
            top: calc(31.9 * var(--left-unit-y));
            width: calc(1667.62 * var(--left-unit-x));
            height: calc(54.15 * var(--left-unit-y));
            display: grid;
            grid-auto-flow: column;
            grid-auto-columns: minmax(0, 1fr);
            align-items: end;
            gap: 0;
            cursor: grab;
            touch-action: none;
        }

        .timeline-track.is-dragging {
            cursor: grabbing;
        }

        .timeline-track::before {
            content: "";
            position: absolute;
            left: 0;
            right: 0;
            top: calc(24.15 * var(--left-unit-y));
            height: calc(3.5 * var(--left-unit-y));
            background: repeating-linear-gradient(
                90deg,
                rgba(255, 255, 255, 0.42) 0 max(1px, calc(1 * var(--left-unit-x))),
                transparent max(1px, calc(1 * var(--left-unit-x))) calc(11.93 * var(--left-unit-x))
            );
            opacity: 0.56;
            pointer-events: none;
        }

        .timeline-tick {
            position: relative;
            z-index: 1;
            border: none;
            background: transparent;
            color: inherit;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            gap: calc(4.5 * var(--left-unit-y));
            min-width: 0;
            padding: 0;
        }

        .timeline-tick::before {
            content: "";
            width: 1px;
            height: calc(14.15 * var(--left-unit-y));
            background: rgba(255, 255, 255, 0.62);
            transition: height 0.25s ease, background 0.25s ease;
        }

        .timeline-tick span {
            font-size: calc(11.5 * var(--left-scale));
            line-height: 1;
            color: #797a7a;
            transform-origin: center bottom;
            transition: color 0.25s ease, font-size 0.25s ease;
            white-space: nowrap;
        }

        .timeline-tick.active::before,
        .timeline-tick:hover::before {
            height: calc(14.15 * var(--left-unit-y));
            background: var(--accent);
        }

        .timeline-tick.active span,
        .timeline-tick:hover span {
            color: rgba(255, 255, 255, 0.92);
        }

        .timeline-tick.active span {
            color: var(--accent);
            font-size: calc(18 * var(--left-scale));
        }

        .right-topbar {
            position: absolute;
            left: 55px;
            right: 55px;
            top: 30px;
            height: 60.63px;
            z-index: 4;
        }

        .right-topbar::before {
            content: none;
        }

        .right-brand {
            position: absolute;

        function escapeHtml(value) {
            return String(value == null ? '' : value)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function debounce(func, wait) {
            let timeout;
            return function executedFunction(...args) {
                const later = () => {
                    clearTimeout(timeout);
                    func(...args);
                };
                clearTimeout(timeout);
                timeout = setTimeout(later, wait);
            };
        }

        function stripHtml(value) {
            if (window.MilestoneView && typeof window.MilestoneView.stripHtml === 'function') {
                return window.MilestoneView.stripHtml(value);
            }
            return String(value || '')
                .replace(/<br\s*\/?>/gi, '\n')
                .replace(/<[^>]*>/g, ' ')
                .replace(/\s+/g, ' ')
                .trim();
        }

        function buildFallbackVm(milestone, index) {
            const safeMilestone = milestone || {};
            const photos = [];
            (safeMilestone.photos || []).forEach((url) => {
                if (url && !photos.includes(url)) photos.push(url);
            });
            if (safeMilestone.resources && Array.isArray(safeMilestone.resources.images)) {
                safeMilestone.resources.images.forEach((url) => {
                    if (url && !photos.includes(url)) photos.push(url);
                });
            }

            const quote = String(safeMilestone.quote || '').trim();
            const quoteAttribution = String(safeMilestone.quoteAttribution || '').trim();
            const descriptionText = stripHtml(safeMilestone.description || '');
            const commentarySections = [];
            if (quote && quote !== '待补充') {
                const attributionPrefix = quoteAttribution && quoteAttribution.startsWith('《') ? '来源：' : '署名：';
                commentarySections.push({
                    label: '引言摘录',
                    html: quoteAttribution ? `${quote}<br>${attributionPrefix}${quoteAttribution}` : quote
                });
            }
            const customSections = Array.isArray(safeMilestone.commentarySections)
                ? safeMilestone.commentarySections.filter((section) => stripHtml(section && section.html))
                : [];
            if (customSections.length > 0) {
                customSections.forEach((section) => {
                    commentarySections.push({
                        label: section.label || '内容解读',
                        html: section.html
                    });
                });
            } else if (descriptionText) {
                commentarySections.push({ label: '背景解读', html: descriptionText });
            }
            if (commentarySections.length === 0) {
                commentarySections.push({ label: '内容整理中', html: '暂无补充说明' });
            }

            const primaryVideo = safeMilestone.resources && Array.isArray(safeMilestone.resources.videos) && safeMilestone.resources.videos.length > 0
                ? safeMilestone.resources.videos[0]
                : null;
            const category = safeMilestone.category || safeMilestone.subtitle || '';

            return {
                raw: safeMilestone,
                year: safeMilestone.year || '',
                title: safeMilestone.title || '',
                category,
                subtitle: safeMilestone.subtitle || category,
                location: safeMilestone.location || { name: '', country: '', coordinates: [] },
                descriptionHtml: safeMilestone.description || '',
                descriptionText,
                figures: Array.isArray(safeMilestone.figures) ? safeMilestone.figures : [],
                photos,
                primaryPhoto: photos[0] || '',
                archivePhotos: photos.slice(1),
                primaryVideo,
                videoEmbedUrl: primaryVideo ? primaryVideo.embed_url : '',
                quoteHtml: quote,
                quotePage: String(safeMilestone.quotePage || '').trim(),
                commentaryOverrideSections: Array.isArray(safeMilestone.commentarySections) ? safeMilestone.commentarySections : [],
                commentarySections,
                timeline: milestones.map((item, itemIndex) => ({
                    year: item.year,
                    title: item.title,
                    active: itemIndex === index
                }))
            };
        }

        function getVm(index) {
            if (vmCache.has(index)) {
                return vmCache.get(index);
            }

            const vm = window.MilestoneView && typeof window.MilestoneView.normalizeMilestone === 'function'
                ? window.MilestoneView.normalizeMilestone(milestones[index], index, milestones)
                : buildFallbackVm(milestones[index], index);
            vmCache.set(index, vm);
            return vm;
        }

        function preloadImage(url) {
            if (!url) return;
            if (imagePreloadCache.has(url)) return;

            const image = new Image();
            image.decoding = 'async';
            image.loading = 'eager';
            image.src = url;
            imagePreloadCache.set(url, image);
        }

        function preloadMilestoneAssets(index) {
            if (index < 0 || index >= milestones.length) return;
            const vm = getVm(index);
            sortPhotosForDisplay(vm.photos)
                .slice(0, 5)
                .forEach(preloadImage);
        }

        function preloadAdjacentAssets(index) {
            preloadMilestoneAssets(index);
            preloadMilestoneAssets(index - 1);
            preloadMilestoneAssets(index + 1);
        }

        function buildContextYears(year, beforeCount, afterCount) {
            const safeYear = Number(year);
            if (Number.isNaN(safeYear)) return [];
            const years = [];
            for (let offset = beforeCount; offset >= 1; offset -= 1) {
                years.push(safeYear - offset);
            }
            for (let offset = 1; offset <= afterCount; offset += 1) {
                years.push(safeYear + offset);
            }
            return years;
        }

        function buildLocationLine(location) {
            return [location && location.name, location && location.country]
                .filter(Boolean)
                .join('  ');
        }

        function buildLocationHtml(location) {
            const name = escapeHtml(location && location.name ? location.name : '');
            const country = escapeHtml(location && location.country ? location.country : '');
            if (name && country) {
                return `${name}<br>${country}`;
            }
            if (name) return name;
            if (country) return country;
            return '地点待补充';
        }

        function buildSummaryHtml(vm) {
            if (vm.descriptionHtml && String(vm.descriptionHtml).trim()) {
                return vm.descriptionHtml;
            }

            if (vm.descriptionText) {
                return `<p>${escapeHtml(vm.descriptionText)}</p>`;
            }

            return '<p>暂无事件摘要</p>';
        }

        function initials(name) {
            const words = String(name || '').trim().split(/\s+/).filter(Boolean);
            if (words.length === 0) return 'AI';
            if (words.length === 1) return words[0].slice(0, 2).toUpperCase();
            return words.slice(0, 2).map((item) => item[0].toUpperCase()).join('');
        }

        function getFigureAvatarSource(figure, vm, portraitPool, index) {
            if (figure && figure.avatar) {
                return {
                    src: figure.avatar,
                    style: figure.avatarStyle || ''
                };
            }

            if (portraitPool[index]) {
                return {
                    src: portraitPool[index],
                    style: ''
                };
            }

            if (vm && vm.year === 1956) {
                return {
                    src: 'resources/images/1956-dartmouth/historical/1956-dartmouth_historical_04.jpg',
                    style: 'object-position: 36% 30%; transform: scale(1.45);'
                };
            }

            return null;
        }

        function buildFigureAvatar(figure, avatarSource) {
            if (avatarSource && avatarSource.src) {
                const styleAttr = avatarSource.style ? ` style="${avatarSource.style}"` : '';
                return `<img src="${avatarSource.src}" alt="${escapeHtml(figure.name || '关键人物')}"${styleAttr}>`;
            }
            return `<span>${escapeHtml(initials(figure.name))}</span>`;
        }

        function isPortraitLikePhoto(url) {
            return /\/people\/|portrait|headshot|avatar|人物|人像/i.test(String(url || ''));
        }

        function isDocumentLikePhoto(url) {
            return /proposal|paper|document|page|sheet|scan|manuscript|report|doc|论文|提案|文稿|手稿/i.test(String(url || ''));
        }

        function choosePreferredArchiveIndex(photos) {
            const safePhotos = Array.isArray(photos) ? photos.filter(Boolean) : [];
            if (safePhotos.length <= 1) return 0;

            const firstNonDocumentIndex = safePhotos.findIndex((url) => !isDocumentLikePhoto(url));
            if (firstNonDocumentIndex > 0) {
                return firstNonDocumentIndex;
            }

            if (safePhotos.length >= 3 && !safePhotos.some(isPortraitLikePhoto)) {
                return 1;
            }

            return 0;
        }

        function buildArchiveFigureMeta(vm, index, fallbackName) {
            const figures = Array.isArray(vm.figures) ? vm.figures.filter(Boolean) : [];
            if (figures.length > 0) {
                const figure = figures[((index % figures.length) + figures.length) % figures.length] || figures[0];
                return {
                    name: figure.name || fallbackName || '关键人物',
                    role: figure.role || buildLocationLine(vm.location) || '关键参与者'
                };
            }

            return {
                name: fallbackName || vm.title || '历史档案',
                role: buildLocationLine(vm.location) || vm.category || '历史事件'
            };
        }

        function extractWorkTitleFromAttribution(attribution) {
            const match = String(attribution || '').match(/《([^》]+)》/);
            return match ? String(match[1] || '').trim() : '';
        }

        function getConfiguredImageMeta(vm, url) {
            const raw = vm && vm.raw ? vm.raw : {};
            const map = raw && raw.resources && raw.resources.imageMeta ? raw.resources.imageMeta : (raw.imageMeta || null);
            if (!map || typeof map !== 'object') return null;
            const entry = map[url];
            if (!entry || typeof entry !== 'object') return null;

            const caption = String(entry.caption || entry.title || entry.name || '').trim();
            const subcaption = String(entry.subcaption || entry.subtitle || entry.description || entry.role || '').trim();
            if (!caption && !subcaption) return null;
            return { caption, subcaption };
        }

        function buildArchivePhotoMeta(vm, url) {
            const value = String(url || '').trim();
            if (!value) return { name: '', role: '' };

            const configured = getConfiguredImageMeta(vm, value);
            const title = String(vm && vm.title ? vm.title : '').trim();
            const year = vm && vm.year ? String(vm.year) : '';
            const workTitle = extractWorkTitleFromAttribution(vm && vm.quoteAttribution ? vm.quoteAttribution : '');

            if (isPortraitLikePhoto(value)) {
                const autoMeta = {
                    name: '人物肖像',
                    role: '相关研究者照片'
                };
                return {
                    name: (configured && configured.caption) || autoMeta.name,
                    role: (configured && configured.subcaption) || autoMeta.role
                };
            }

            if (/\/architecture\//i.test(value) || /_architecture_/i.test(value)) {
                const autoMeta = {
                    name: '结构示意',
                    role: title ? `${title} 架构图` : '模型架构图'
                };
                return {
                    name: (configured && configured.caption) || autoMeta.name,
                    role: (configured && configured.subcaption) || autoMeta.role
                };
            }

            if (/\/papers\//i.test(value) || /_papers_/i.test(value) || isDocumentLikePhoto(value)) {
                const autoMeta = {
                    name: '论文页面',
                    role: workTitle ? `《${workTitle}》` : (title || '原文截图或摘要')
                };
                return {
                    name: (configured && configured.caption) || autoMeta.name,
                    role: (configured && configured.subcaption) || autoMeta.role
                };
            }

            if (/\/historical\//i.test(value) || /_historical_/i.test(value)) {
                const autoMeta = {
                    name: '历史照片',
                    role: title || (year ? `${year} 年相关档案` : '事件相关档案')
                };
                return {
                    name: (configured && configured.caption) || autoMeta.name,
                    role: (configured && configured.subcaption) || autoMeta.role
                };
            }

            const autoMeta = {
                name: '档案图片',
                role: title || (vm && vm.category) || '事件相关资料'
            };
            return {
                name: (configured && configured.caption) || autoMeta.name,
                role: (configured && configured.subcaption) || autoMeta.role
            };
        }

        function extractVideoQuote(vm) {
            const candidates = [
                vm.quoteHtml,
                Array.isArray(vm.commentarySections) && vm.commentarySections[0] ? vm.commentarySections[0].html : '',
                vm.descriptionText
            ];

            const raw = candidates.map((item) => stripHtml(item || '')).find(Boolean) || '暂无媒体资料';
            return raw.length > 120 ? `${raw.slice(0, 120).trim()}…` : raw;
        }

        function splitTextByPunctuation(text, targetParts) {
            const normalized = stripHtml(text || '').replace(/\s+/g, ' ').trim();
            if (!normalized) return [];

            const parts = [];
            const estimatedLength = Math.max(28, Math.ceil(normalized.length / Math.max(1, targetParts)));
            let cursor = 0;
            while (cursor < normalized.length && parts.length < targetParts) {
                let end = Math.min(normalized.length, cursor + estimatedLength);
                if (end < normalized.length) {
                    const nextBreak = normalized.slice(end).search(/[，。；：,.!?！？]/);
                    if (nextBreak >= 0 && nextBreak < 20) {
                        end += nextBreak + 1;
                    }
                }
                parts.push(normalized.slice(cursor, end).trim());
                cursor = end;
            }
            return parts.filter(Boolean);
        }

        function buildRightCommentarySections(vm) {
            const sourceSections = Array.isArray(vm.commentarySections)
                ? vm.commentarySections.filter((section) => stripHtml(section && section.html))
                : [];
            const sections = sourceSections.slice(0, 3).map((section) => ({
                label: section.label || '署名',
                text: stripHtml(section.html || '')
            }));

            const fallbackText = stripHtml(vm.descriptionHtml || vm.descriptionText || vm.quoteHtml || '');
            const fillerParts = splitTextByPunctuation(fallbackText, 3);

            let fillerIndex = 0;
            while (sections.length < 3) {
                sections.push({
                    label: '署名',
                    text: fillerParts[fillerIndex] || sections[sections.length - 1]?.text || '暂无补充说明'
                });
                fillerIndex += 1;
            }

            return sections.slice(0, 3);
        }

        function scorePhoto(url) {
            const value = String(url || '').toLowerCase();
            if (!value) return -999;
            if (value.includes('/historical/')) return 5;
            if (value.includes('/people/')) return 4;
            if (value.includes('/architecture/')) return 2;
            if (value.includes('/papers/')) return 1;
            return 3;
        }

        function sortPhotosForDisplay(photos) {
            return [...(photos || [])]
                .filter(Boolean)
                .sort((a, b) => scorePhoto(b) - scorePhoto(a));
        }

        function clearAutoplayTimer() {
            if (autoplayTimer) {
                window.clearTimeout(autoplayTimer);
                autoplayTimer = null;
            }
        }

        function clearIdleTimer() {
            if (idleTimer) {
                window.clearTimeout(idleTimer);
                idleTimer = null;
            }
        }

        function scheduleAutoplayTick() {
            clearAutoplayTimer();
            if (!isAutoplaying || milestones.length <= 1) return;

            autoplayTimer = window.setTimeout(() => {
                const nextIndex = currentIndex === milestones.length - 1 ? 0 : currentIndex + 1;
                jumpTo(nextIndex, { resetAutoplay: false });
                scheduleAutoplayTick();
            }, AUTOPLAY_INTERVAL_MS);
        }

        function setAutoplayState(nextState) {
            const shouldAutoplay = Boolean(nextState) && milestones.length > 1;
            if (isAutoplaying === shouldAutoplay) {
                if (!shouldAutoplay) {
                    clearAutoplayTimer();
                }
                return;
            }

            isAutoplaying = shouldAutoplay;
            if (isAutoplaying) {
                clearIdleTimer();
                scheduleAutoplayTick();
            } else {
                clearAutoplayTimer();
            }
        }

        function resetAutoplayTimer() {
            if (isAutoplaying) {
                scheduleAutoplayTick();
            }
        }

        function restartIdleCountdown() {
            clearIdleTimer();
            if (milestones.length <= 1) return;

            idleTimer = window.setTimeout(() => {
                setAutoplayState(true);
            }, AUTOPLAY_IDLE_DELAY_MS);
        }

        function registerUserActivity(event) {
            if (event && event.isTrusted === false) return;
            if (isAutoplaying) {
                setAutoplayState(false);
            }
            restartIdleCountdown();
        }

        function renderStaticGlobeFallback() {
            refs.globeShell.classList.add('globe-shell-figma');
            refs.dualGlobeContainer.innerHTML = `
                <img class="globe-figma-image" src="${FIGMA_GLOBE_ASSET_URL}" alt="" draggable="false">
            `;
        }

        function setStaticGlobeFocus() {
            refs.orbitPath.setAttribute(
                'd',
                `M${LEFT_ORBIT_START.x} ${LEFT_ORBIT_START.y} C465 356, 276 504, ${LEFT_ORBIT_FIGMA_DOT.x} ${LEFT_ORBIT_FIGMA_DOT.y}`
            );
            refs.orbitDot.setAttribute('cx', String(LEFT_ORBIT_FIGMA_DOT.x));
            refs.orbitDot.setAttribute('cy', String(LEFT_ORBIT_FIGMA_DOT.y));
            refs.orbitPath.style.opacity = '1';
            refs.orbitDot.style.opacity = '1';
        }

        function getEffectivePixelRatio() {
            const stageScale = Number.parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--stage-scale')) || 1;
            return Math.min(2, Math.max(1, (window.devicePixelRatio || 1) * stageScale));
        }

        function getGlobeDeltaTime(now) {
            if (!globeLastFrameTime) {
                globeLastFrameTime = now;
                return 1 / 60;
            }

            const delta = (now - globeLastFrameTime) / 1000;
            globeLastFrameTime = now;
            return Math.min(0.05, Math.max(1 / 240, delta));
        }

        function applyTextureDefaults(texture, isColorTexture = false) {
            if (!texture || !globeRenderer || typeof THREE === 'undefined') return;

            if (isColorTexture && 'colorSpace' in texture && THREE.SRGBColorSpace) {
                texture.colorSpace = THREE.SRGBColorSpace;
            }

            if ('anisotropy' in texture && globeRenderer.capabilities && typeof globeRenderer.capabilities.getMaxAnisotropy === 'function') {
                texture.anisotropy = Math.min(8, globeRenderer.capabilities.getMaxAnisotropy());
            }
        }

        function createSolidTexture(r, g, b, isColorTexture = false) {
            if (typeof THREE === 'undefined') return null;
            const data = new Uint8Array([r, g, b, 255]);
            const texture = new THREE.DataTexture(data, 1, 1, THREE.RGBAFormat);
            texture.needsUpdate = true;
            if ('minFilter' in texture && THREE.LinearFilter) {
                texture.minFilter = THREE.LinearFilter;
                texture.magFilter = THREE.LinearFilter;
            }
            if (isColorTexture && 'colorSpace' in texture && THREE.SRGBColorSpace) {
                texture.colorSpace = THREE.SRGBColorSpace;
            }
            return texture;
        }

        function setEarthTextureUniform(material, uniformName, texture, isColorTexture = false) {
            if (!material || !texture || typeof THREE === 'undefined') return;
            applyTextureDefaults(texture, isColorTexture);
            texture.wrapS = THREE.RepeatWrapping;
            texture.wrapT = THREE.ClampToEdgeWrapping;
            material.uniforms[uniformName].value = texture;
            if (uniformName === 'waterMap' && texture.image && texture.image.width && texture.image.height) {
                material.uniforms.waterTexel.value.set(1 / texture.image.width, 1 / texture.image.height);
            }
        }

        function createStylizedEarthMaterial() {
            if (typeof THREE === 'undefined') return null;

            return new THREE.ShaderMaterial({
                uniforms: {
                    waterMap: { value: createSolidTexture(255, 255, 255) },
                    topoMap: { value: createSolidTexture(0, 0, 0) },
                    waterTexel: { value: new THREE.Vector2(1, 1) }
                },
                vertexShader: `
                    varying vec2 vUv;
                    varying vec3 vViewNormal;
                    varying vec3 vWorldNormal;
                    void main() {
                        vUv = uv;
                        vViewNormal = normalize(normalMatrix * normal);
                        vWorldNormal = normalize(mat3(modelMatrix) * normal);
                        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                    }
                `,
                fragmentShader: `
                    uniform sampler2D waterMap;
                    uniform sampler2D topoMap;
                    uniform vec2 waterTexel;
                    varying vec2 vUv;
                    varying vec3 vViewNormal;
                    varying vec3 vWorldNormal;

                    float saturate(float value) {
                        return clamp(value, 0.0, 1.0);
                    }

                    float oceanSample(vec2 uv) {
                        return smoothstep(0.38, 0.58, texture2D(waterMap, fract(uv)).r);
                    }

                    float coastline(vec2 uv) {
                        vec2 dx = vec2(max(waterTexel.x * 1.9, 0.0003), 0.0);
                        vec2 dy = vec2(0.0, max(waterTexel.y * 1.9, 0.0003));
                        float center = oceanSample(uv);
                        float east = oceanSample(uv + dx);
                        float west = oceanSample(uv - dx);
                        float north = oceanSample(uv + dy);
                        float south = oceanSample(uv - dy);
                        return smoothstep(0.05, 0.4, abs(center - east) + abs(center - west) + abs(center - north) + abs(center - south));
                    }

                    void main() {
                        vec3 viewNormal = normalize(vViewNormal);
                        vec3 worldNormal = normalize(vWorldNormal);
                        float oceanMask = oceanSample(vUv);
                        float landMask = 1.0 - oceanMask;
                        float topo = texture2D(topoMap, vUv).r;
                        float elevation = smoothstep(0.06, 0.88, topo);
                        float ridge = smoothstep(0.42, 0.92, topo);
                        float coast = coastline(vUv);
                        vec2 topoStep = vec2(max(waterTexel.x * 1.25, 0.0003), max(waterTexel.y * 1.25, 0.0003));
                        float topoEast = texture2D(topoMap, vUv + vec2(topoStep.x, 0.0)).r;
                        float topoWest = texture2D(topoMap, vUv - vec2(topoStep.x, 0.0)).r;
                        float topoNorth = texture2D(topoMap, vUv + vec2(0.0, topoStep.y)).r;
                        float topoSouth = texture2D(topoMap, vUv - vec2(0.0, topoStep.y)).r;
                        vec2 topoGradient = vec2(topoEast - topoWest, topoNorth - topoSouth);
                        float relief = smoothstep(0.01, 0.18, length(topoGradient));
                        float reliefLight = saturate(0.5 + topoGradient.x * 3.8 - topoGradient.y * 2.4);
                        float latitude = abs(vUv.y * 2.0 - 1.0);
                        vec3 sunDir = normalize(vec3(0.86, 0.18, 0.48));
                        vec3 bounceDir = normalize(vec3(-0.54, -0.24, 0.8));
                        vec3 keyDir = normalize(vec3(-0.44, 0.56, 0.95));
                        vec3 fillDir = normalize(vec3(0.72, -0.1, 0.62));
                        float sunLight = saturate(dot(worldNormal, sunDir) * 0.5 + 0.5);
                        float bounceLight = saturate(dot(worldNormal, bounceDir) * 0.5 + 0.5);
                        float keyLight = saturate(dot(viewNormal, keyDir) * 0.5 + 0.5);
                        float fillLight = saturate(dot(viewNormal, fillDir) * 0.5 + 0.5);
                        float faceLight = saturate(viewNormal.z * 0.5 + 0.5);
                        float horizon = pow(1.0 - faceLight, 1.85);
                        float shadowBand = pow(1.0 - faceLight, 1.65);

                        vec3 oceanDeep = vec3(0.03, 0.11, 0.24);
                        vec3 oceanMid = vec3(0.16, 0.34, 0.56);
                        vec3 oceanHighlight = vec3(0.69, 0.82, 0.91);
                        vec3 landShadow = vec3(0.28, 0.08, 0.01);
                        vec3 landBase = vec3(0.62, 0.2, 0.01);
                        vec3 landMid = vec3(0.965, 0.537, 0.0);
                        vec3 landHighlight = vec3(1.0, 0.76, 0.22);

                        float oceanLight = saturate(0.08 + sunLight * 0.34 + keyLight * 0.34 + fillLight * 0.12 + (1.0 - latitude) * 0.1);
                        vec3 ocean = mix(oceanDeep, oceanMid, oceanLight);
                        float oceanSpec = pow(saturate(keyLight * 0.72 + faceLight * 0.28), 11.0) * (0.2 + (1.0 - latitude) * 0.12);
                        ocean = mix(ocean, oceanHighlight, coast * 0.08 + oceanSpec * 0.22 + relief * 0.05);
                        ocean = mix(ocean, vec3(0.84, 0.95, 1.0), oceanMask * oceanSpec * 0.1);
                        ocean = mix(ocean, vec3(0.86, 0.92, 0.97), smoothstep(0.8, 1.0, latitude) * 0.12 + horizon * 0.04);

                        float baseLandLight = smoothstep(0.08, 0.52, elevation + sunLight * 0.18 + bounceLight * 0.08);
                        float warmMask = saturate(elevation * 0.56 + sunLight * 0.34 + relief * 0.22 + coast * 0.06 - latitude * 0.08);
                        warmMask = smoothstep(0.18, 0.92, warmMask);
                        vec3 land = mix(landShadow, landBase, baseLandLight);
                        land = mix(land, landMid, warmMask * 0.98);
                        land = mix(land, landHighlight, smoothstep(0.4, 1.0, keyLight * 0.58 + reliefLight * relief * 0.56 + ridge * 0.18));
                        land = mix(land, vec3(0.22, 0.06, 0.0), shadowBand * (0.18 + (1.0 - sunLight) * 0.12));
                        land = mix(land, vec3(1.0, 0.8, 0.28), coast * 0.1);
                        land = mix(land, vec3(0.99, 0.7, 0.14), smoothstep(0.8, 1.0, latitude) * 0.03);
                        land = mix(land, vec3(0.5, 0.16, 0.02), smoothstep(0.02, 0.24, topo) * 0.12);
                        land *= mix(0.86, 1.14, reliefLight * relief + keyLight * 0.06);
                        land = mix(land, vec3(1.0, 0.76, 0.22), relief * reliefLight * 0.1);
                        land = mix(land, vec3(1.0, 0.5, 0.07), smoothstep(0.2, 0.9, warmMask) * 0.09);

                        vec3 color = mix(land, ocean, oceanMask);
                        color *= mix(0.68, 1.05, faceLight);
                        color = mix(color, vec3(0.48, 0.64, 0.82), horizon * (oceanMask * 0.18 + landMask * 0.04));
                        color = mix(color, vec3(1.0, 0.5, 0.07), landMask * pow(keyLight, 2.0) * 0.08);
                        color = mix(color, vec3(0.76, 0.88, 0.98), oceanMask * oceanSpec * 0.05);

                        gl_FragColor = vec4(color, 1.0);
                    }
                `
            });
        }

        function createStylizedCloudTexture(texture) {
            if (!texture || typeof THREE === 'undefined' || typeof document === 'undefined' || !texture.image) {
                return texture;
            }

            const width = texture.image.width || 0;
            const height = texture.image.height || 0;
            if (!width || !height) return texture;

            const canvas = document.createElement('canvas');
            canvas.width = width;
            canvas.height = height;
            const context = canvas.getContext('2d', { willReadFrequently: true });
            if (!context) return texture;

            context.drawImage(texture.image, 0, 0, width, height);
            const imageData = context.getImageData(0, 0, width, height);
            const { data } = imageData;
            for (let index = 0; index < data.length; index += 4) {
                const average = (data[index] + data[index + 1] + data[index + 2]) / 3;
                const alpha = data[index + 3] / 255;
                const density = Math.max(alpha, 1 - average / 255);
                data[index] = 255;
                data[index + 1] = 255;
                data[index + 2] = 255;
                data[index + 3] = Math.round(Math.min(1, Math.pow(density, 0.88) * 1.08) * 255);
            }
            context.putImageData(imageData, 0, 0);

            const softenedCanvas = document.createElement('canvas');
            softenedCanvas.width = width;
            softenedCanvas.height = height;
            const softenedContext = softenedCanvas.getContext('2d');
            if (!softenedContext) {
                const directTexture = new THREE.CanvasTexture(canvas);
                directTexture.wrapS = THREE.RepeatWrapping;
                directTexture.wrapT = THREE.ClampToEdgeWrapping;
                applyTextureDefaults(directTexture, false);
                return directTexture;
            }
            softenedContext.clearRect(0, 0, width, height);
            softenedContext.filter = 'blur(1.6px)';
            softenedContext.drawImage(canvas, 0, 0, width, height);
            softenedContext.filter = 'none';
            softenedContext.globalAlpha = 0.72;
            softenedContext.drawImage(canvas, 0, 0, width, height);
            softenedContext.globalAlpha = 1;

            const stylizedTexture = new THREE.CanvasTexture(softenedCanvas);
            stylizedTexture.wrapS = THREE.RepeatWrapping;
            stylizedTexture.wrapT = THREE.ClampToEdgeWrapping;
            applyTextureDefaults(stylizedTexture, false);
            return stylizedTexture;
        }

        function latLngToSpherePosition(lat, lng, radius) {
            const latRad = lat * (Math.PI / 180);
            const lngRad = lng * (Math.PI / 180);
            const cosLat = Math.cos(latRad);
            return {
                x: radius * cosLat * Math.cos(lngRad),
                y: radius * Math.sin(latRad),
                z: -radius * cosLat * Math.sin(lngRad)
            };
        }

        function normalizeLocationCoordinates(rawCoordinates) {
            if (!Array.isArray(rawCoordinates)) return [];

            const coordsList = Array.isArray(rawCoordinates[0]) ? rawCoordinates : [rawCoordinates];
            return coordsList
                .map((pair) => Array.isArray(pair) ? [Number(pair[0]), Number(pair[1])] : [Number.NaN, Number.NaN])
                .filter(([lat, lng]) =>
                    Number.isFinite(lat) &&
                    Number.isFinite(lng) &&
                    lat >= -90 &&
                    lat <= 90 &&
                    lng >= -180 &&
                    lng <= 180 &&
                    !(lat === 0 && lng === 0)
                );
        }

        function useFallbackEarthMaterial() {
            if (!globeMesh || typeof THREE === 'undefined') return;
            globeMesh.material = new THREE.ShaderMaterial({
                vertexShader: `
                    varying vec2 vUv;
                    varying vec3 vNormal;
                    void main() {
                        vUv = uv;
                        vNormal = normalize(normalMatrix * normal);
                        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                    }
                `,
                fragmentShader: `
                    varying vec2 vUv;
                    varying vec3 vNormal;
                    float isLand(vec2 uv) {
                        float lon = uv.x * 360.0 - 180.0;
                        float lat = uv.y * 180.0 - 90.0;
                        if (lon > -140.0 && lon < -55.0 && lat > 15.0 && lat < 70.0) return 0.9;
                        if (lon > -82.0 && lon < -35.0 && lat > -55.0 && lat < 12.0) return 0.9;
                        if (lon > -10.0 && lon < 40.0 && lat > 35.0 && lat < 70.0) return 0.9;
                        if (lon > -18.0 && lon < 52.0 && lat > -35.0 && lat < 37.0) return 0.9;
                        if (lon > 26.0 && lon < 145.0 && lat > 5.0 && lat < 73.0) return 0.9;
                        if (lon > 95.0 && lon < 141.0 && lat > -10.0 && lat < 20.0) return 0.7;
                        if (lon > 114.0 && lon < 154.0 && lat > -39.0 && lat < -11.0) return 0.9;
                        return 0.0;
                    }
                    void main() {
                        float land = isLand(vUv);
                        float lat = vUv.y * 180.0 - 90.0;
                        vec3 oceanDeep = vec3(0.03, 0.12, 0.25);
                        vec3 oceanShallow = vec3(0.19, 0.38, 0.57);
                        vec3 landBase = vec3(0.63, 0.3, 0.08);
                        vec3 landHighlight = vec3(0.98, 0.77, 0.26);
                        vec3 ocean = mix(oceanDeep, oceanShallow, smoothstep(-90.0, 90.0, lat) * 0.48 + 0.26);
                        vec3 landCol = mix(landBase, landHighlight, 0.35 + (1.0 - abs(lat) / 90.0) * 0.45);
                        vec3 color = mix(ocean, landCol, land);
                        float polar = smoothstep(70.0, 85.0, abs(lat));
                        color = mix(color, vec3(0.95, 0.97, 1.0), polar);
                        float rim = pow(1.0 - abs(dot(vNormal, vec3(0.0, 0.0, 1.0))), 3.0);
                        color += vec3(0.32, 0.49, 0.68) * rim * 0.35;
                        gl_FragColor = vec4(color, 1.0);
                    }
                `
            });
        }

        function createGlobeHalo() {
            if (!globeScene || typeof THREE === 'undefined') return;

            if (globeHaloMesh) {
                globeScene.remove(globeHaloMesh);
            }

            const haloGeometry = new THREE.SphereGeometry(GLOBE_HALO_RADIUS, 64, 64);
            const haloMaterial = new THREE.ShaderMaterial({
                transparent: true,
                depthWrite: false,
                blending: THREE.AdditiveBlending,
                side: THREE.BackSide,
                vertexShader: `
                    varying vec3 vWorldPosition;
                    varying vec3 vWorldNormal;
                    void main() {
                        vec4 worldPosition = modelMatrix * vec4(position, 1.0);
                        vWorldPosition = worldPosition.xyz;
                        vWorldNormal = normalize(mat3(modelMatrix) * normal);
                        gl_Position = projectionMatrix * viewMatrix * worldPosition;
                    }
                `,
                fragmentShader: `
                    varying vec3 vWorldPosition;
                    varying vec3 vWorldNormal;
                    void main() {
                        vec3 viewDir = normalize(cameraPosition - vWorldPosition);
                        float fresnel = pow(1.0 - max(dot(viewDir, normalize(vWorldNormal)), 0.0), 3.4);
                        float latitude = clamp(vWorldNormal.y * 0.5 + 0.5, 0.0, 1.0);
                        vec3 coolGlow = vec3(0.28, 0.56, 0.98);
                        vec3 warmGlow = vec3(1.0, 0.66, 0.22);
                        vec3 color = mix(coolGlow, warmGlow, smoothstep(0.0, 0.7, latitude) * 0.35);
                        gl_FragColor = vec4(color, fresnel * 0.11);
                    }
                `
            });

            globeHaloMesh = new THREE.Mesh(haloGeometry, haloMaterial);
            globeScene.add(globeHaloMesh);
        }

        function createCloudLayer(texture) {
            if (!globeScene || !texture || typeof THREE === 'undefined') return;

            if (globeCloudMesh) {
                globeScene.remove(globeCloudMesh);
            }

            const cloudInnerMaterial = new THREE.MeshBasicMaterial({
                map: texture,
                transparent: true,
                opacity: 0.3,
                color: new THREE.Color(0xf4f8ff),
                depthWrite: false,
                side: THREE.DoubleSide
            });
            const cloudOuterMaterial = new THREE.MeshBasicMaterial({
                map: texture,
                transparent: true,
                opacity: 0.18,
                color: new THREE.Color(0xffffff),
                depthWrite: false,
                blending: THREE.AdditiveBlending,
                side: THREE.DoubleSide
            });

            const cloudInnerMesh = new THREE.Mesh(new THREE.SphereGeometry(1.014, 64, 64), cloudInnerMaterial);
            const cloudOuterMesh = new THREE.Mesh(new THREE.SphereGeometry(1.028, 64, 64), cloudOuterMaterial);
            cloudOuterMesh.rotation.y = 0.12;

            globeCloudMesh = new THREE.Group();
            globeCloudMesh.add(cloudInnerMesh);
            globeCloudMesh.add(cloudOuterMesh);
            globeCloudMesh.rotation.z = 0.06;
            globeScene.add(globeCloudMesh);
        }

        function createMarkerMesh() {
            if (typeof THREE === 'undefined') return null;

            const markerGroup = new THREE.Group();
            const core = new THREE.Mesh(
                new THREE.SphereGeometry(0.022, 20, 20),
                new THREE.MeshBasicMaterial({
                    color: 0xff5e3a,
                    transparent: true,
                    opacity: 0
                })
            );
            const aura = new THREE.Mesh(
                new THREE.SphereGeometry(0.042, 20, 20),
                new THREE.MeshBasicMaterial({
                    color: 0xffb160,
                    transparent: true,
                    opacity: 0,
                    blending: THREE.AdditiveBlending,
                    depthWrite: false
                })
            );

            markerGroup.add(aura);
            markerGroup.add(core);
            markerGroup.userData.core = core;
            markerGroup.userData.aura = aura;
            return markerGroup;
        }

        function setMarkerState(marker, scale, opacity) {
            if (!marker) return;

            marker.scale.setScalar(scale);

            if (marker.userData && marker.userData.core) {
                marker.userData.core.material.opacity = opacity;
            }

            if (marker.userData && marker.userData.aura) {
                marker.userData.aura.material.opacity = opacity * 0.42;
                marker.userData.aura.scale.setScalar(1.08 + (scale - 1) * 0.55);
            }
        }

        function initGlobe() {
            if (!refs.dualGlobeContainer) {
                return false;
            }

            if (GLOBE_RENDER_MODE === 'figma') {
                renderStaticGlobeFallback();
                setStaticGlobeFocus();
                return false;
            }

            refs.globeShell.classList.remove('globe-shell-figma');

            if (typeof THREE === 'undefined') {
                renderStaticGlobeFallback();
                setStaticGlobeFocus();
                return false;
            }

            const width = refs.dualGlobeContainer.clientWidth || 320;
            const height = refs.dualGlobeContainer.clientHeight || 320;

            globeScene = new THREE.Scene();
            globeCamera = new THREE.PerspectiveCamera(35, width / height, 0.1, 1000);
            globeCamera.position.set(0, 0, GLOBE_CAM_RADIUS);
            globeCamera.lookAt(0, 0, 0);

            try {
                globeRenderer = new THREE.WebGLRenderer({
                    antialias: true,
                    alpha: true,
                    powerPreference: 'high-performance',
                    precision: 'mediump',
                    stencil: false,
                    depth: true
                });
            } catch (error) {
                console.warn('Globe WebGL init failed, using static fallback.', error);
                renderStaticGlobeFallback();
                setStaticGlobeFocus();
                return false;
            }
            globeRenderer.setPixelRatio(getEffectivePixelRatio());
            globeRenderer.setSize(width, height);
            globeRenderer.setClearColor(0x000000, 0);
            if ('outputColorSpace' in globeRenderer && typeof THREE !== 'undefined' && THREE.SRGBColorSpace) {
                globeRenderer.outputColorSpace = THREE.SRGBColorSpace;
            }
            globeRenderer.domElement.id = 'dualGlobeCanvas';
            refs.dualGlobeContainer.innerHTML = '';
            refs.dualGlobeContainer.appendChild(globeRenderer.domElement);

            const geometry = new THREE.SphereGeometry(1, 64, 64);
            const material = createStylizedEarthMaterial();
            if (!material) {
                renderStaticGlobeFallback();
                setStaticGlobeFocus();
                return false;
            }

            globeMesh = new THREE.Mesh(geometry, material);
            globeScene.add(globeMesh);
            createGlobeHalo();

            const textureLoader = new THREE.TextureLoader();
            textureLoader.load(
                GLOBE_TEXTURE_URLS.topo,
                (texture) => {
                    setEarthTextureUniform(material, 'topoMap', texture, false);
                },
                undefined,
                () => console.warn('Unable to load local topology texture for globe.')
            );
            textureLoader.load(
                GLOBE_TEXTURE_URLS.water,
                (texture) => {
                    setEarthTextureUniform(material, 'waterMap', texture, false);
                },
                undefined,
                () => useFallbackEarthMaterial()
            );
            textureLoader.load(
                GLOBE_TEXTURE_URLS.clouds,
                (texture) => {
                    applyTextureDefaults(texture, false);
                    texture.wrapS = THREE.RepeatWrapping;
                    texture.wrapT = THREE.ClampToEdgeWrapping;
                    createCloudLayer(createStylizedCloudTexture(texture));
                }
            );

            globeLastFrameTime = 0;
            animateGlobe();
            return true;
        }

        function latLngToCamAngles(lat, lng) {
            const phi = (90 - lat) * (Math.PI / 180);
            const theta = (lng - 90) * (Math.PI / 180);
            return { phi, theta };
        }

        function resetOrbitOverlay() {
            refs.orbitPath.setAttribute(
                'd',
                `M${LEFT_ORBIT_START.x} ${LEFT_ORBIT_START.y} C465 356, 276 504, ${LEFT_ORBIT_DEFAULT_DOT.x} ${LEFT_ORBIT_DEFAULT_DOT.y}`
            );
            refs.orbitDot.setAttribute('cx', String(LEFT_ORBIT_DEFAULT_DOT.x));
            refs.orbitDot.setAttribute('cy', String(LEFT_ORBIT_DEFAULT_DOT.y));
            refs.orbitPath.style.opacity = '0';
            refs.orbitDot.style.opacity = '0';
        }

        function clearGlobeMarkerMeshes() {
            if (globeMesh) {
                globeMarkers.forEach((marker) => globeMesh.remove(marker));
            }

            globeMarkers = [];
            globeMarker = null;
            globePrimaryCoordinate = null;
        }

        function clearGlobeMarkers() {
            clearGlobeMarkerMeshes();
            globeArrived = true;
            markerFlashDone = true;
            globeAnimationTime = 0;
            camTarget.phi = camCurrent.phi;
            camTarget.theta = camCurrent.theta;
            if (GLOBE_RENDER_MODE === 'figma') {
                setStaticGlobeFocus();
                return;
            }
            resetOrbitOverlay();
        }

        function setGlobeMarkers(coordsList) {
            if (!globeMesh) {
                globeMarkers = [];
                globeMarker = null;
                globePrimaryCoordinate = null;
                return;
            }

            clearGlobeMarkerMeshes();
            globePrimaryCoordinate = coordsList[0] || null;

            coordsList.forEach(([lat, lng]) => {
                const markerMesh = createMarkerMesh();
                if (!markerMesh) return;
                const position = latLngToSpherePosition(lat, lng, 1.05);
                markerMesh.position.set(position.x, position.y, position.z);
                globeMesh.add(markerMesh);
                globeMarkers.push(markerMesh);
            });

            globeMarker = globeMarkers[0] || null;
        }

        function rotateGlobeToCoordinates(coordinates) {
            if (GLOBE_RENDER_MODE === 'figma' || !globeMesh) {
                setStaticGlobeFocus();
                return;
            }

            const coordsList = normalizeLocationCoordinates(coordinates);
            // The first coordinate anchors the camera; any additional coordinates render as supplementary markers.
            const [lat, lng] = coordsList[0] || [];
            if (!coordsList.length || Number.isNaN(lat) || Number.isNaN(lng)) {
                clearGlobeMarkers();
                return;
            }

            const angles = latLngToCamAngles(lat, lng);
            camTarget.phi = angles.phi;
            camTarget.theta = angles.theta;
            globeArrived = false;
            markerFlashDone = false;
            globeAnimationTime = 0;
            setGlobeMarkers(coordsList);
            refs.orbitPath.style.opacity = '0';
            refs.orbitDot.style.opacity = '0';
        }

        function updateOrbitOverlay(point) {
            const startX = LEFT_ORBIT_START.x;
            const startY = LEFT_ORBIT_START.y;
            const dotX = Math.min(SCREEN_WIDTH, Math.max(0, point.x));
            const dotY = Math.min(SCREEN_HEIGHT, Math.max(0, point.y));
            const controlAX = startX - 76;
            const controlAY = startY + 131;
            const controlBX = Math.max(210, dotX - 138);
            const controlBY = Math.max(390, dotY - 126);
            refs.orbitPath.setAttribute('d', `M${startX} ${startY} C${controlAX} ${controlAY}, ${controlBX} ${controlBY}, ${dotX} ${dotY}`);
            refs.orbitDot.setAttribute('cx', dotX);
            refs.orbitDot.setAttribute('cy', dotY);
        }

        function projectCoordinateToOverlay(coordinate, radius = 0.985) {
            if (!coordinate || !globeCamera || !refs.globeShell || !refs.globeStage || !globeMesh || typeof THREE === 'undefined') return null;

            const [lat, lng] = coordinate;
            if (!Number.isFinite(lat) || !Number.isFinite(lng)) return null;

            const localPoint = latLngToSpherePosition(lat, lng, radius);
            const worldPoint = globeMesh.localToWorld(
                new THREE.Vector3(localPoint.x, localPoint.y, localPoint.z)
            );
            const facing = worldPoint.clone().normalize().dot(globeCamera.position.clone().normalize());
            if (facing <= 0.02) return null;

            const projected = worldPoint.project(globeCamera);
            const shellRect = refs.globeShell.getBoundingClientRect();
            const stageRect = refs.globeStage.getBoundingClientRect();
            if (!shellRect.width || !shellRect.height || !stageRect.width || !stageRect.height) return null;

            const shellX = (projected.x * 0.5 + 0.5) * shellRect.width + (shellRect.left - stageRect.left);
            const shellY = (-projected.y * 0.5 + 0.5) * shellRect.height + (shellRect.top - stageRect.top);
            return {
                x: (shellX / stageRect.width) * SCREEN_WIDTH,
                y: (shellY / stageRect.height) * SCREEN_HEIGHT
            };
        }

        function animateGlobe(now = performance.now()) {
            requestAnimationFrame(animateGlobe);
            if (document.hidden || !globeRenderer || !globeCamera || !globeMesh) return;

            const deltaSeconds = getGlobeDeltaTime(now);
            globeAnimationTime += deltaSeconds;
            const lerpFactor = 1 - Math.pow(0.0025, deltaSeconds * 3.4);
            let dTheta = camTarget.theta - camCurrent.theta;
            while (dTheta > Math.PI) dTheta -= 2 * Math.PI;
            while (dTheta < -Math.PI) dTheta += 2 * Math.PI;
            const dPhi = camTarget.phi - camCurrent.phi;

            const arrived = Math.abs(dTheta) < 0.01 && Math.abs(dPhi) < 0.01;
            if (!globeArrived && arrived) {
                globeArrived = true;
                globeAnimationTime = 0;
                camCurrent.phi = camTarget.phi;
                camCurrent.theta = camTarget.theta;
            }

            if (!globeArrived) {
                camCurrent.phi += dPhi * lerpFactor;
                camCurrent.theta += dTheta * lerpFactor;
            }

            const cx = -GLOBE_CAM_RADIUS * Math.sin(camCurrent.phi) * Math.sin(camCurrent.theta);
            const cy = GLOBE_CAM_RADIUS * Math.cos(camCurrent.phi);
            const cz = -GLOBE_CAM_RADIUS * Math.sin(camCurrent.phi) * Math.cos(camCurrent.theta);
            globeCamera.position.set(cx, cy, cz);
            globeCamera.lookAt(0, 0, 0);

            if (globeHaloMesh) {
                const haloScale = 1 + Math.sin(globeAnimationTime * 0.9) * 0.012;
                globeHaloMesh.scale.setScalar(haloScale);
                globeHaloMesh.rotation.y += deltaSeconds * 0.08;
            }

            if (globeCloudMesh) {
                globeCloudMesh.rotation.y += deltaSeconds * 0.018;
            }

            if (globeMarkers.length > 0) {
                if (globeArrived) {
                    const overlayPoint = projectCoordinateToOverlay(globePrimaryCoordinate);
                    if (overlayPoint) {
                        updateOrbitOverlay(overlayPoint);
                        refs.orbitPath.style.opacity = '1';
                    } else {
                        refs.orbitPath.style.opacity = '0';
                        refs.orbitDot.style.opacity = '0';
                    }
                } else {
                    refs.orbitPath.style.opacity = '0';
                    refs.orbitDot.style.opacity = '0';
                }

                if (globeArrived && !markerFlashDone) {
                    const t = globeAnimationTime * 2.8;
                    const cycle = Math.floor(t);
                    refs.orbitDot.style.opacity = '1';
                    globeMarkers.forEach((marker) => {
                        if (cycle >= 2) {
                            setMarkerState(marker, 1, 1);
                        } else {
                            const phase = (t - cycle) * Math.PI;
                            const scale = 1.0 + 0.95 * Math.sin(phase);
                            const opacity = 1.0 - 0.6 * Math.sin(phase);
                            setMarkerState(marker, scale, opacity);
                        }
                    });
                    if (cycle >= 2) markerFlashDone = true;
                } else if (globeArrived) {
                    globeMarkers.forEach((marker) => setMarkerState(marker, 1, 1));
                }
            }

            globeRenderer.render(globeScene, globeCamera);
        }

        function handleGlobeResize() {
            if (!globeRenderer || !globeCamera || !refs.dualGlobeContainer) return;
            const width = refs.dualGlobeContainer.clientWidth;
            const height = refs.dualGlobeContainer.clientHeight;
            if (!width || !height) return;

            globeCamera.aspect = width / height;
            globeCamera.updateProjectionMatrix();
            globeRenderer.setPixelRatio(getEffectivePixelRatio());
            globeRenderer.setSize(width, height);
        }

        function wrapAngle(angle) {
            let wrapped = angle;
            while (wrapped > Math.PI) wrapped -= Math.PI * 2;
            while (wrapped < -Math.PI) wrapped += Math.PI * 2;
            return wrapped;
        }

        function clampPhi(phi) {
            return Math.min(Math.PI - 0.18, Math.max(0.18, phi));
        }

        function syncStageScale() {
            // All left/right screen coordinates are authored against a 1920x1080 design space.
            const scale = Math.min(window.innerWidth / STAGE_WIDTH, window.innerHeight / STAGE_HEIGHT);
            document.documentElement.style.setProperty('--stage-scale', Math.max(0.1, scale).toFixed(6));
            handleGlobeResize();
        }

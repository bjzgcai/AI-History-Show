services:
    presentation:
        build: .
        ports:
            - '8000:8000'
        environment:
            PORT: 8000
        command: npm run start:static
        read_only: true

    admin:
        build: .
        ports:
            - '3001:3001'
        environment:
            PORT: 3001
            HEALTHCHECK_PATH: /admin
        command: npm run start:admin
        volumes:
            - .:/app
        profiles:
            - admin

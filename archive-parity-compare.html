<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Archive Authority Parity Compare</title>
        <style>
            :root {
                color-scheme: dark;
                --bg: #101114;
                --panel: #181a20;
                --line: #30343d;
                --muted: #a9adba;
                --accent: #f68900;
            }
            * {
                box-sizing: border-box;
            }
            html,
            body {
                margin: 0;
                height: 100%;
                background: var(--bg);
                color: #f2efe7;
                font:
                    14px/1.4 system-ui,
                    sans-serif;
            }
            body {
                display: grid;
                grid-template-rows: auto 1fr;
            }
            header {
                padding: 12px 16px;
                border-bottom: 1px solid var(--line);
                background: var(--panel);
            }
            .controls {
                display: flex;
                flex-wrap: wrap;
                gap: 10px;
                align-items: end;
            }
            label {
                display: grid;
                gap: 4px;
                color: var(--muted);
                font-size: 12px;
            }
            select,
            input,
            button {
                height: 34px;
                border: 1px solid var(--line);
                border-radius: 7px;
                background: #111318;
                color: #fff;
                padding: 0 9px;
            }
            input {
                min-width: 310px;
            }
            button {
                cursor: pointer;
                background: #482d10;
                border-color: #86521b;
            }
            .meta {
                margin-top: 8px;
                color: var(--muted);
            }
            .compare {
                min-height: 0;
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 1px;
                background: var(--line);
            }
            .pane {
                min-width: 0;
                min-height: 0;
                display: grid;
                grid-template-rows: 32px 1fr;
                background: #111318;
            }
            .pane-title {
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: 0 10px;
                color: var(--accent);
                background: #15171c;
            }
            .pane-title a {
                color: #8ab4ff;
                font-size: 12px;
            }
            .viewport {
                overflow: auto;
                display: grid;
                place-items: start center;
                padding: 8px;
            }
            .viewport iframe {
                border: 0;
                background: #fff;
                transform-origin: top center;
            }
            @media (max-width: 900px) {
                .compare {
                    grid-template-columns: 1fr;
                }
                .pane {
                    min-height: 70vh;
                }
                input {
                    min-width: 180px;
                }
            }
        </style>
    </head>
    <body>
        <header>
            <div class="controls">
                <label
                    >Layout<select id="layout">
                        <option value="single">Single</option>
                        <option value="dual">Dual</option>
                    </select></label
                >
                <label
                    >Storyline<select id="storyline">
                        <option value="unified-ai-history">Unified</option>
                        <option value="deep-learning-history">Deep learning</option>
                        <option value="bench-council-ai100">AI100</option>
                        <option value="gaming-ai">Gaming AI</option>
                    </select></label
                >
                <label
                    >Locale<select id="locale">
                        <option value="zh">中文</option>
                        <option value="en">English</option>
                    </select></label
                >
                <label
                    >Viewport<select id="viewport">
                        <option value="1920x1080">1920×1080</option>
                        <option value="390x844">390×844</option>
                        <option value="3840x1080">3840×1080</option>
                    </select></label
                >
                <label>Event ID<input id="event" list="events" placeholder="optional milestone id" /></label>
                <datalist id="events"></datalist>
                <button id="reload" type="button">Reload</button>
            </div>
            <div class="meta" id="meta">Loading parity manifest…</div>
        </header>
        <main class="compare">
            <section class="pane">
                <div class="pane-title"><b>Legacy-compatible</b><a id="legacyLink" target="_blank">Open</a></div>
                <div class="viewport"><iframe id="legacyFrame"></iframe></div>
            </section>
            <section class="pane">
                <div class="pane-title"><b>Archive-native</b><a id="archiveLink" target="_blank">Open</a></div>
                <div class="viewport"><iframe id="archiveFrame"></iframe></div>
            </section>
        </main>
        <script>
            const $ = (id) => document.getElementById(id);
            let manifest = null;
            function frameUrl(authority) {
                const layout = $('layout').value;
                const page = layout === 'dual' ? 'dual-screen.html' : 'index.html';
                const url = new URL(`/${authority}/${page}`, location.href);
                url.searchParams.set('layout', layout);
                url.searchParams.set('storyline', $('storyline').value);
                const eventId = $('event').value.trim();
                if (eventId && layout === 'single') {
                    url.searchParams.set('uiMode', 'detail');
                    url.searchParams.set('event', eventId);
                }
                return url;
            }
            function applyLocale(frame, locale) {
                frame.addEventListener(
                    'load',
                    () => {
                        try {
                            frame.contentWindow.localStorage.setItem('ai-history-locale', locale);
                            if (frame.contentWindow.I18n) frame.contentWindow.I18n.setLocale(locale);
                        } catch (_) {}
                    },
                    { once: true }
                );
            }
            function refresh() {
                const [width, height] = $('viewport').value.split('x').map(Number);
                for (const authority of ['legacy', 'archive']) {
                    const frame = $(`${authority}Frame`);
                    const link = $(`${authority}Link`);
                    const url = frameUrl(authority);
                    frame.style.width = `${width}px`;
                    frame.style.height = `${height}px`;
                    const available = Math.max(320, frame.parentElement.clientWidth - 16);
                    const scale = Math.min(1, available / width);
                    frame.style.transform = `scale(${scale})`;
                    frame.parentElement.style.height = `${height * scale + 16}px`;
                    applyLocale(frame, $('locale').value);
                    frame.src = url;
                    link.href = url;
                }
                const params = new URLSearchParams({
                    layout: $('layout').value,
                    storyline: $('storyline').value,
                    locale: $('locale').value,
                    viewport: $('viewport').value,
                    event: $('event').value
                });
                history.replaceState(null, '', `?${params}`);
            }
            function restore() {
                const p = new URLSearchParams(location.search);
                for (const id of ['layout', 'storyline', 'locale', 'viewport', 'event'])
                    if (p.get(id)) $(id).value = p.get(id);
            }
            restore();
            fetch('/parity-manifest.json')
                .then((r) => r.json())
                .then((data) => {
                    manifest = data;
                    $('meta').textContent =
                        `Legacy ${data.legacy.milestones} · Archive ${data.archive.milestones} · runtime unchanged: ${data.runtimeUnchanged}`;
                    const ids = [...new Set([...data.legacy.ids, ...data.archive.ids])].sort();
                    $('events').innerHTML = ids.map((id) => `<option value="${id}"></option>`).join('');
                })
                .catch((error) => {
                    $('meta').textContent = error.message;
                });
            $('reload').addEventListener('click', refresh);
            for (const id of ['layout', 'storyline', 'locale', 'viewport']) $(id).addEventListener('change', refresh);
            window.addEventListener('resize', refresh);
            refresh();
        </script>
    </body>
</html>

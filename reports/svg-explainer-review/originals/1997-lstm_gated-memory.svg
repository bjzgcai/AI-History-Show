<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" role="img" aria-labelledby="title desc">
  <title id="title">LSTM gated memory cell</title>
  <desc id="desc">Sequence input flowing through gates into a persistent memory state.</desc>
  <rect width="640" height="360" rx="24" fill="#0f172a"/>
  <text x="40" y="54" fill="#f59e0b" font-family="Arial" font-size="28" font-weight="700">LSTM gated memory</text>
  <path d="M70 180H570" stroke="#475569" stroke-width="16" stroke-linecap="round"/>
  <rect x="150" y="112" width="340" height="136" rx="20" fill="#111827" stroke="#93c5fd" stroke-width="4"/>
  <circle cx="214" cy="180" r="38" fill="#2563eb"/><text x="214" y="186" fill="#dbeafe" text-anchor="middle" font-family="Arial" font-size="17">input</text>
  <circle cx="320" cy="180" r="38" fill="#16a34a"/><text x="320" y="186" fill="#dcfce7" text-anchor="middle" font-family="Arial" font-size="17">forget</text>
  <circle cx="426" cy="180" r="38" fill="#dc2626"/><text x="426" y="186" fill="#fee2e2" text-anchor="middle" font-family="Arial" font-size="17">output</text>
  <path d="M170 132C240 78 402 78 472 132" fill="none" stroke="#f8fafc" stroke-width="5"/>
  <text x="320" y="95" fill="#e5e7eb" text-anchor="middle" font-family="Arial" font-size="18">cell state carries long-range memory</text>
</svg>

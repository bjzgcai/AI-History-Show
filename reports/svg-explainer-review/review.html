I 百大成就（BenchCouncil）","en":"AI Top 100 Achievements (BenchCouncil)"},"eventId":"1970-shrdlu","eventTitle":{"zh":"SHRDLU","en":"SHRDLU"},"variant":"bench-council-ai100","variantFile":"archive/events/1970-shrdlu/variants/bench-council-ai100.json","visual":"shrdlu","demoImage":"","description":{"zh":"特里·维诺格拉德在 1968 至 1970 年间开发 SHRDLU，让用户用自然语言与一个虚拟积木世界交互。系统把句法分析、指代消解、过程语义、规划和世界模型紧密结合，能够执行“把红色金字塔放到方块上”之类命令，也能回答关于对象、动作和先前对话的问题。 SHRDLU 的连贯表现展示了语言理解与行动规划整合后的力量，但它依赖一个词汇、物体和规则都受到严格限制的微型世界。系统一旦离开这个封闭环境就难以扩展。它因此既是自然语言 AI 的经典成功，也是对领域边界的提醒：局部流畅不等于开放世界理解。","en":"Terry Winograd developed SHRDLU between 1968 and 1970 so users could interact in natural language with a virtual blocks world. The system tightly integrated parsing, reference resolution, procedural semantics, planning, and a world model. It could execute commands such as placing a red pyramid on a block and answer questions about objects, actions, and earlier parts of the conversation. SHRDLU's coherent behavior demonstrated the power of joining language understanding with action planning, but it depended on a microworld whose vocabulary, objects, and rules were sharply constrained. The approach did not scale easily beyond that closed environment. It therefore remains both a classic success in natural-language AI and a warning about scope: local fluency is not the same as open-world understanding."},"method":{"zh":"积木世界语言理解","en":"Blocks-world language understanding"},"artifact":{"zh":"交互式积木世界对话系统","en":"Interactive blocks-world dialogue system"}}],"svgText":["Parser to planner path","parser","planner","move","sentence -> reference -> action","local redrawn explainer"],"svgBytes":1321,"hasViewBox":true,"hasTitle":false,"hasDesc":false,"hasScript":false,"sourceTraceable":true},{"path":"resources/images/bench-council-ai100/explainers/1971-complexity-theory_reduction-map.svg","exists":true,"assetIds":["asset-1971-complexity-theory-reduction-map"],"roles":["architecture-explainer"],"captions":{"zh":["NP 完全性归约地图"],"en":["NP-completeness reduction map"]},"subcaptions":{"zh":["根据 库克 1971 年论文与 Clay P 与 NP 难题说明制作的原创解释图。"],"en":["Original explainer derived from Cook's 1971 paper and the Clay P versus NP problem description."]},"rightsStatuses":["local-redraw"],"sourceIds":["source-the-complexity-of-theorem-proving-procedures"],"sources":[{"id":"source-the-complexity-of-theorem-proving-procedures","type":"paper","reliability":"primary","title":{"zh":"《定理证明过程的复杂性》","en":"The Complexity of Theorem-Proving Procedures"},"url":"https://dl.acm.org/doi/10.1145/800157.805047"}],"variantSourceIds":["source-clay-mathematics-institute-p-vs-np","source-stephen-a-cook-acm-a-m-turing-award","source-the-complexity-of-theorem-proving-procedures"],"variantSources":[{"id":"source-the-complexity-of-theorem-proving-procedures","type":"paper","reliability":"primary","title":{"zh":"《定理证明过程的复杂性》","en":"The Complexity of Theorem-Proving Procedures"},"url":"https://dl.acm.org/doi/10.1145/800157.805047"},{"id":"source-stephen-a-cook-acm-a-m-turing-award","type":"profile","reliability":"reference-only","title":{"zh":"斯蒂芬·A·库克 ACM A.M. 图灵 Award","en":"Stephen A. Cook ACM A.M. Turing Award"},"url":"https://awards.acm.org/award_winners/cook_N991950"},{"id":"source-clay-mathematics-institute-p-vs-np","type":"official-page","reliability":"reference-only","title":{"zh":"克雷数学研究所 P 与 NP 问题","en":"Clay Mathematics Institute P vs NP"},"url":"https://www.claymath.org/millennium/p-vs-np/"}],"usages":[{"storylineId":"bench-council-ai100","storylineTitle":{"zh":"AI 百大成就（BenchCouncil）","en":"AI Top 100 Achievements (BenchCouncil)"},"eventId":"1971-complexity-theory","eventTitle":{"zh":"NP 完全性","en":"NP-Completeness"},"variant":"bench-council-ai100","variantFile":"archive/events/1971-complexity-theory/variants/bench-council-ai100.json","visual":"transcript","demoImage":"","description":{"zh":"斯蒂芬·库克在 1971 年证明布尔可满足性问题具有一种关键的普遍困难性：NP 中的每个问题都可以在多项式时间内归约到它。列昂尼德·列文也独立提出了相关结果。由此形成的 NP 完全性概念，不再把困难问题看成彼此孤立的案例，而是把它们组织成可以通过归约比较的整体。 这一区分对 AI 尤其重要，因为规划、调度、组合搜索和约束求解常会遇到 NP 完全或相关的高复杂度问题。NP 完全并不等于“绝对无法求解”，也没有证明 P 不等于 NP；它提醒工程师需要利用近似、启发式、特殊结构或指数搜索，而不能期待一种已知的通用高效算法。","en":"In 1971, Stephen Cook proved a crucial form of universal hardness for Boolean satisfiability: every problem in NP could be reduced to it in polynomial time. Leonid Levin independently developed a related result. The resulting idea of NP-completeness organized difficult problems into a common structure connected by reductions, rather than treating each one as an isolated obstacle. The distinction is central to AI because planning, scheduling, combinatorial search, and constraint solving often encounter NP-complete or similarly demanding problems. NP-complete does not mean “impossible,” and it does not prove that P differs from NP. It tells engineers why approximation, heuristics, exploitable structure, and sometimes exponential search are necessary instead of expecting a known universal efficient algorithm."},"method":{"zh":"多项式时间归约","en":"Polynomial-time reductions"},"artifact":{"zh":"NP 完全性框架","en":"NP-completeness framework"}}],"svgText":["NP-COMPLETENESS","Cook-Levin: every decision problem in NP has a polynomial-time reduction to SAT.","SAT","first NP-complete problem","Clique","Hamiltonian cycle","3-coloring","polynomial-time reductions","Efficient SAT solver => efficient solver for every NP problem"],"svgBytes":2213,"hasViewBox":true,"hasTitle":true,"hasDesc":true,"hasScript":false,"sourceTraceable":true},{"path":"resources/images/bench-council-ai100/explainers/1971-vc-theory_generalization.svg","exists":true,"assetIds":["asset-1971-vc-theory-generalization"],"roles":["architecture-explainer"],"captions":{"zh":["VC 理论泛化示意图"],"en":["VC theory generalization diagram"]},"subcaptions":{"zh":["根据 瓦普尼克 与 切尔沃年基斯 的学习理论资料制作的原创解释图。"],"en":["Original explainer derived from Vapnik and Chervonenkis's learning theory sources."]},"rightsStatuses":["local-redraw"],"sourceIds":["source-on-the-uniform-convergence-of-relative-frequencies"],"sources":[{"id":"source-on-the-uniform-convergence-of-relative-frequencies","type":"paper","reliability":"primary","title":{"zh":"《相对频率的一致收敛》","en":"On the Uniform Convergence of Relative Frequencies"},"url":"https://epubs.siam.org/doi/10.1137/1116025"}],"variantSourceIds":["source-an-overview-of-statistical-learning-theory","source-on-the-uniform-convergence-of-relative-frequencies","source-the-nature-of-statistical-learning-theory"],"variantSources":[{"id":"source-on-the-uniform-convergence-of-relative-frequencies","type":"paper","reliability":"primary","title":{"zh":"《相对频率的一致收敛》","en":"On the Uniform Convergence of Relative Frequencies"},"url":"https://epubs.siam.org/doi/10.1137/1116025"},{"id":"source-the-nature-of-statistical-learning-theory","type":"book","reliability":"reference-only","title":{"zh":"《统计学习理论的本质》","en":"The Nature of Statistical Learning Theory"},"url":"https://link.springer.com/book/10.1007/978-1-4757-2440-0"},{"id":"source-an-overview-of-statistical-learning-theory","type":"paper-index","reliability":"reference-only","title":{"zh":"统计学习理论概览","en":"An Overview of Statistical Learning Theory"},"url":"https://pubmed.ncbi.nlm.nih.gov/18252602/"}],"usages":[{"storylineId":"bench-council-ai100","storylineTitle":{"zh":"AI 百大成就（BenchCouncil）","en":"AI Top 100 Achievements (BenchCouncil)"},"eventId":"1971-vc-theory","eventTitle":{"zh":"VC 理论","en":"VC Theory"},"variant":"bench-council-ai100","variantFile":"archive/events/1971-vc-theory/variants/bench-council-ai100.json","visual":"transcript","demoImage":"","description":{"zh":"瓦普尼克与切尔沃年基斯在 1971 年把学习中的泛化问题写成严格数学问题：一个假设类别在有限样本上表现良好时，什么条件能保证它在未见数据上仍然可靠？VC 维通过考察模型能否对一组样本实现所有可能的二元划分，刻画假设类别的表达容量。 这套理论把模型复杂度、样本数量和泛化误差联系起来，为统计学习提供了统一语言。它说明训练误差低并不自动代表学到了可推广规律，也为结构风险最小化和支持向量机奠定基础。经典 VC 界对现代深度网络往往较保守，但容量与泛化之间的核心问题仍未过时。","en":"In 1971, Vladimir Vapnik and Alexey Chervonenkis gave generalization a rigorous mathematical form: when a hypothesis class performs well on a finite sample, what conditions support reliable performance on unseen data? VC dimension characterizes the capacity of a hypothesis class by asking whether it can realize every binary labeling of a set of examples. The theory connected model complexity, sample size, and generalization error, giving statistical learning a common language. It showed why low training error alone does not guarantee a transferable rule and helped support structural risk minimization and support vector machines. Classical VC bounds can be conservative for modern deep networks, but the underlying question of capacity versus generalization remains fundamental."},"method":{"zh":"统计学习","en":"Statistical learning"},"artifact":{"zh":"VC 维","en":"VC dimension"}}],"svgText":["VC THEORY","Generalization depends on data, error, and model capacity.","Training Sample","VC","Dimension","capacity control","Test World","expected risk","Too much capacity can fit the sample but fail to generalize."],"svgBytes":2935,"hasViewBox":true,"hasTitle":true,"hasDesc":true,"hasScript":false,"sourceTraceable":true},{"path":"resources/images/bench-council-ai100/explainers/1973-prolog_query-tree.svg","exists":true,"assetIds":["asset-1973-prolog-query-tree"],"roles":["architecture-explainer"],"captions":{"zh":["查询证明树"],"en":["Query proof tree"]},"subcaptions":{"zh":["PROLOG 的本地重绘图，依据页面列出的来源材料制作。"],"en":["Local redraw for PROLOG, based on the listed source material."]},"rightsStatuses":["documented-in-legacy"],"sourceIds":["source-the-birth-of-prolog"],"sources":[{"id":"source-the-birth-of-prolog","type":"paper-page","reliability":"secondary","title":{"zh":"Prolog 的诞生","en":"The Birth of Prolog"},"url":"https://doi.org/10.1145/155360.155362"}],"variantSourceIds":["source-prolog-heritage","source-swi-prolog-documentation","source-the-birth-of-prolog"],"variantSources":[{"id":"source-the-birth-of-prolog","type":"paper-page","reliability":"secondary","title":{"zh":"Prolog 的诞生","en":"The Birth of Prolog"},"url":"https://doi.org/10.1145/155360.155362"},{"id":"source-prolog-heritage","type":"archive","reliability":"secondary","title":{"zh":"Prolog Heritage","en":"Prolog Heritage"},"url":"https://www.prolog-heritage.org/en/Prolog_50.html"},{"id":"source-swi-prolog-documentation","type":"documentation","reliability":"reference-only","title":{"zh":"SWI-Prolog 文档","en":"SWI-Prolog documentation"},"url":"https://www.swi-prolog.org/pldoc/doc_for?object=manual"}],"usages":[{"storylineId":"bench-council-ai100","storylineTitle":{"zh":"AI 百大成就（BenchCouncil）","en":"AI Top 100 Achievements (BenchCouncil)"},"eventId":"1973-prolog","eventTitle":{"zh":"PROLOG","en":"PROLOG"},"variant":"bench-council-ai100","variantFile":"archive/events/1973-prolog/variants/bench-council-ai100.json","visual":"prolog","demoImage":"","description":{"zh":"阿兰·科尔梅罗尔及其马赛团队在 1970 年代初开发 Prolog，并受到罗伯特·科瓦尔斯基逻辑程序设计思想的影响。程序由事实和规则组成，用户提出查询后，系统通过合一匹配变量，并沿规则建立证明；当路径失败时，它回溯到较早选择继续搜索。 这种声明式方式让程序员主要描述“哪些关系成立”，而把部分执行顺序交给推理引擎。Prolog 很快用于自然语言处理、专家系统、定理证明和知识表示，也暴露了搜索顺序和控制策略对实际性能的重要性。它证明逻辑不只是说明语言，也可以成为可运行的程序设计基础。","en":"Alain Colmerauer and his Marseille group developed Prolog in the early 1970s, influenced by Robert Kowalski's ideas about logic programming. A program consists of facts and rules. When a user poses a query, the system uses unification to match variables and constructs a proof through the rules; if a path fails, it backtracks to an earlier choice and continues searching. This declarative style lets programmers describe primarily which relations hold while leaving part of the execution order to the inference engine. Prolog was soon used for natural-language processing, expert systems, theorem proving, and knowledge representation, while also revealing how strongly search order and control strategy affect performance. It demonstrated that logic could serve not only as a specification language but as an executable programming foundation."},"method":{"zh":"Horn 子句上的合一与回溯","en":"Unification plus backtracking over Horn clauses"},"artifact":{"zh":"逻辑程序设计语言","en":"Logic programming language"}}],"svgText":["PROLOG query tree","ancestor(X,Y)?","parent(X,Y)","parent(X,Z),","ancestor(Z,Y)","backtrack choice point"],"svgBytes":1033,"hasViewBox":true,"hasTitle":false,"hasDesc":false,"hasScript":false,"sourceTraceable":true},{"path":"resources/images/bench-council-ai100/explainers/1973-prolog_unification-trace.svg","exists":true,"assetIds":["asset-1973-prolog-unification-trace"],"roles":["architecture-explainer"],"captions":{"zh":["合一轨迹"],"en":["Unification trace"]},"subcaptions":{"zh":["PROLOG 的本地重绘图，依据页面列出的来源材料制作。"],"en":["Local redraw for PROLOG, based on the listed source material."]},"rightsStatuses":["documented-in-legacy"],"sourceIds":["source-the-birth-of-prolog"],"sources":[{"id":"source-the-birth-of-prolog","type":"paper-page","reliability":"secondary","title":{"zh":"Prolog 的诞生","en":"The Birth of Prolog"},"url":"https://doi.org/10.1145/155360.155362"}],"variantSourceIds":["source-prolog-heritage","source-swi-prolog-documentation","source-the-birth-of-prolog"],"variantSources":[{"id":"source-the-birth-of-prolog","type":"paper-page","reliability":"secondary","title":{"zh":"Prolog 的诞生","en":"The Birth of Prolog"},"url":"https://doi.org/10.1145/155360.155362"},{"id":"source-prolog-heritage","type":"archive","reliability":"secondary","title":{"zh":"Prolog Heritage","en":"Prolog Heritage"},"url":"https://www.prolog-heritage.org/en/Prolog_50.html"},{"id":"source-swi-prolog-documentation","type":"documentation","reliability":"reference-only","title":{"zh":"SWI-Prolog 文档","en":"SWI-Prolog documentation"},"url":"https://www.swi-prolog.org/pldoc/doc_for?object=manual"}],"usages":[{"storylineId":"bench-council-ai100","storylineTitle":{"zh":"AI 百大成就（BenchCouncil）","en":"AI Top 100 Achievements (BenchCouncil)"},"eventId":"1973-prolog","eventTitle":{"zh":"PROLOG","en":"PROLOG"},"variant":"bench-council-ai100","variantFile":"archive/events/1973-prolog/variants/bench-council-ai100.json","visual":"prolog","demoImage":"","description":{"zh":"阿兰·科尔梅罗尔及其马赛团队在 1970 年代初开发 Prolog，并受到罗伯特·科瓦尔斯基逻辑程序设计思想的影响。程序由事实和规则组成，用户提出查询后，系统通过合一匹配变量，并沿规则建立证明；当路径失败时，它回溯到较早选择继续搜索。 这种声明式方式让程序员主要描述“哪些关系成立”，而把部分执行顺序交给推理引擎。Prolog 很快用于自然语言处理、专家系统、定理证明和知识表示，也暴露了搜索顺序和控制策略对实际性能的重要性。它证明逻辑不只是说明语言，也可以成为可运行的程序设计基础。","en":"Alain Colmerauer and his Marseille group developed Prolog in the early 1970s, influenced by Robert Kowalski's ideas about logic programming. A program consists of facts and rules. When a user poses a query, the system uses unification to match variables and constructs a proof through the rules; if a path fails, it backtracks to an earlier choice and continues searching. This declarative style lets programmers describe primarily which relations hold while leaving part of the execution order to the inference engine. Prolog was soon used for natural-language processing, expert systems, theorem proving, and knowledge representation, while also revealing how strongly search order and control strategy affect performance. It demonstrated that logic could serve not only as a specification language but as an executable programming foundation."},"method":{"zh":"Horn 子句上的合一与回溯","en":"Unification plus backtracking over Horn clauses"},"artifact":{"zh":"逻辑程序设计语言","en":"Logic programming language"}}],"svgText":["Facts + rules + query","parent(ada,bob).","parent(bob,cy).","ancestor(X,Y) :-","parent(X,Z),","ancestor(Z,Y).","?- ancestor(ada,cy)","yes"],"svgBytes":1057,"hasViewBox":true,"hasTitle":false,"hasDesc":false,"hasScript":false,"sourceTraceable":true},{"path":"resources/images/bench-council-ai100/explainers/1974-frame_inheritance.svg","exists":true,"assetIds":["asset-1974-frame-inheritance"],"roles":["architecture-explainer"],"captions":{"zh":["框架继承草图"],"en":["Frame inheritance sketch"]},"subcaptions":{"zh":["框架 的本地重绘图，依据页面列出的来源材料制作。"],"en":["Local redraw for Frame, based on the listed source material."]},"rightsStatuses":["documented-in-legacy"],"sourceIds":["source-a-framework-for-representing-knowledge"],"sources":[{"id":"source-a-framework-for-representing-knowledge","type":"paper","reliability":"primary","title":{"zh":"《表示知识的一种框架》","en":"A Framework for Representing Knowledge"},"url":"https://courses.media.mit.edu/2004spring/mas966/Minsky%201974%20Framework%20for%20knowledge.pdf"}],"variantSourceIds":["source-a-framework-for-representing-knowledge","source-frame-mit-ai-memo-bibliographic-record","source-marvin-minsky-obituary-mit-news"],"variantSources":[{"id":"source-a-framework-for-representing-knowledge","type":"paper","reliability":"primary","title":{"zh":"《表示知识的一种框架》","en":"A Framework for Representing Knowledge"},"url":"https://courses.media.mit.edu/2004spring/mas966/Minsky%201974%20Framework%20for%20knowledge.pdf"},{"id":"source-marvin-minsky-obituary-mit-news","type":"news","reliability":"reference-only","title":{"zh":"马文·明斯基讣告，麻省理工学院新闻","en":"Marvin Minsky obituary, MIT News"},"url":"https://news.mit.edu/2016/marvin-minsky-obituary-0125"},{"id":"source-frame-mit-ai-memo-bibliographic-record","type":"paper-index","reliability":"reference-only","title":{"zh":"框架论文：麻省理工学院 AI 备忘录书目记录","en":"Frame, MIT AI memo bibliographic record"},"url":"https://dspace.mit.edu/handle/1721.1/6089"}],"usages":[{"storylineId":"bench-council-ai100","storylineTitle":{"zh":"AI 百大成就（BenchCouncil）","en":"AI Top 100 Achievements (BenchCouncil)"},"eventId":"1974-frame","eventTitle":{"zh":"框架","en":"Frame"},"variant":"bench-council-ai100","variantFile":"archive/events/1974-frame/variants/bench-council-ai100.json","visual":"frame","demoImage":"","description":{"zh":"马文·明斯基在 1974 年提出框架表示，把对典型对象、场景或事件的知识组织成结构化单元。一个框架包含描述属性的槽、常见情况下采用的默认值、槽之间的约束，以及在信息缺失或变化时触发的过程；新情境可以通过实例化和调整既有框架来理解。 这种方法强调知识不是互不相干的事实集合，而是带有预期和上下文的整体。框架影响了语义网络、脚本、专家系统和面向对象知识表示，也暴露出默认推理与例外处理的困难。它的核心遗产是让 AI 明确表示“通常会发生什么”，而不仅是记录确定事实。","en":"Marvin Minsky proposed frame representation in 1974 to organize knowledge about stereotyped objects, scenes, or events into structured units. A frame contains slots for attributes, default values used in ordinary cases, constraints among slots, and procedures triggered when information is missing or changes. A new situation can be interpreted by instantiating and modifying an existing frame. The proposal treated knowledge not as an unrelated collection of facts but as a contextual whole containing expectations. Frames influenced semantic networks, scripts, expert systems, and object-oriented knowledge representation, while exposing difficult questions about defaults and exceptions. Their central legacy is the attempt to represent what normally happens, not only what is known with certainty."},"method":{"zh":"带默认值和继承的槽结构","en":"Structured slots with defaults and inheritance"},"artifact":{"zh":"框架知识表示","en":"Frame representation"}}],"svgText":["Frame inheritance sketch","vehicle","car","truck","defaults flow downward, exceptions override","local redrawn explainer"],"svgBytes":1341,"hasViewBox":true,"hasTitle":false,"hasDesc":false,"hasScript":false,"sourceTraceable":true},{"path":"resources/images/bench-council-ai100/explainers/1974-frame_slot-card.svg","exists":true,"assetIds":["asset-1974-frame-slot-card"],"roles":["architecture-explainer"],"captions":{"zh":["槽与默认值框架卡"],"en":["Slot-default frame card"]},"subcaptions":{"zh":["框架 的本地重绘图，依据页面列出的来源材料制作。"],"en":["Local redraw for Frame, based on the listed source material."]},"rightsStatuses":["documented-in-legacy"],"sourceIds":["source-a-framework-for-representing-knowledge"],"sources":[{"id":"source-a-framework-for-representing-knowledge","type":"paper","reliability":"primary","title":{"zh":"《表示知识的一种框架》","en":"A Framework for Representing Knowledge"},"url":"https://courses.media.mit.edu/2004spring/mas966/Minsky%201974%20Framework%20for%20knowledge.pdf"}],"variantSourceIds":["source-a-framework-for-representing-knowledge","source-frame-mit-ai-memo-bibliographic-record","source-marvin-minsky-obituary-mit-news"],"variantSources":[{"id":"source-a-framework-for-representing-knowledge","type":"paper","reliability":"primary","title":{"zh":"《表示知识的一种框架》","en":"A F ":{"zh":["关于 Neocognitron 层级结构的本地原创解释图。"],"en":["Original local explainer of neocognitron hierarchy."]},"rightsStatuses":["documented-in-legacy"],"sourceIds":["source-neocognitron"],"sources":[{"id":"source-neocognitron","type":"paper","reliability":"primary","title":{"zh":"《Neocognitron》","en":"Neocognitron"},"url":"https://doi.org/10.1007/BF00344251"}],"variantSourceIds":["source-neocognitron","source-open-neocognitron-pdf","source-scholarpedia-neocognitron-article","source-semantic-scholar-paper-record"],"variantSources":[{"id":"source-neocognitron","type":"paper","reliability":"primary","title":{"zh":"《Neocognitron》","en":"Neocognitron"},"url":"https://doi.org/10.1007/BF00344251"},{"id":"source-open-neocognitron-pdf","type":"paper-file","reliability":"secondary","title":{"zh":"Neocognitron 开放 PDF","en":"Open Neocognitron PDF"},"url":"https://www.cs.princeton.edu/courses/archive/spr08/cos598B/Readings/Fukushima1980.pdf"},{"id":"source-scholarpedia-neocognitron-article","type":"encyclopedia-entry","reliability":"reference-only","title":{"zh":"Scholarpedia 的 Neocognitron 文章","en":"Scholarpedia Neocognitron article"},"url":"https://www.scholarpedia.org/article/Neocognitron"},{"id":"source-semantic-scholar-paper-record","type":"paper-index","reliability":"secondary","title":{"zh":"Semantic Scholar 论文记录","en":"Semantic Scholar paper record"},"url":"https://www.semanticscholar.org/paper/Neocognitron%3A-A-self-organizing-neural-network-for-Fukushima/69e68bfaadf2dccff800158749f5a50fe82d173b"}],"usages":[{"storylineId":"bench-council-ai100","storylineTitle":{"zh":"AI 百大成就（BenchCouncil）","en":"AI Top 100 Achievements (BenchCouncil)"},"eventId":"ai100-1980-neocognitron","eventTitle":{"zh":"新认知机","en":"Neocognitron"},"variant":"bench-council-ai100","variantFile":"archive/events/ai100-1980-neocognitron/variants/bench-council-ai100.json","visual":"neocognitron","demoImage":"resources/images/bench-council-ai100/explainers/1980-neocognitron_hierarchy.svg","description":{"zh":"福岛邦彦在 1980 年提出 Neocognitron，构建受视觉皮层启发的层级自组织网络。S 细胞层从局部感受野中检测线段和更复杂特征，C 细胞层在邻近位置汇聚响应，使模式即使发生一定平移或形变也能被识别；多层交替逐步形成更抽象表示。 Neocognitron 尚未采用后来 CNN 中以反向传播端到端训练共享卷积核的标准方式，但它明确展示了局部连接、层级特征和空间容忍性可以组合成视觉识别系统。它连接了早期生物启发模型与 LeNet 等现代卷积网络，是 CNN 架构思想的重要先驱。","en":"Kunihiko Fukushima introduced the neocognitron in 1980 as a hierarchical self-organizing network inspired by visual cortex. S-cell layers detect lines and increasingly complex features within local receptive fields, while C-cell layers pool responses over nearby positions so patterns can still be recognized after limited shifts or deformation. Alternating layers gradually construct more abstract representations. The neocognitron did not use the later CNN standard of end-to-end backpropagation through shared convolutional kernels. It nevertheless showed clearly that local connectivity, feature hierarchies, and spatial tolerance could be combined in a visual-recognition system. It became an important architectural precursor linking early biologically inspired models to LeNet and modern convolutional networks."},"method":{"zh":"层级抗平移视觉网络","en":"Hierarchical shift-tolerant vision network"},"artifact":{"zh":"Neocognitron 架构","en":"Neocognitron architecture"}}],"svgText":["feature layers build shift tolerance","input","S-cells","C-cells","class"],"svgBytes":1805,"hasViewBox":true,"hasTitle":false,"hasDesc":false,"hasScript":false,"sourceTraceable":true},{"path":"resources/images/bench-council-ai100/explainers/1980-xcon-r1_order-flow.svg","exists":true,"assetIds":["asset-1980-xcon-r1-order-flow"],"roles":["architecture-explainer"],"captions":{"zh":["计算机订单流程"],"en":["Computer-order flow"]},"subcaptions":{"zh":["依据 重访 R1：一线四年 制作的本地解释图。"],"en":["Original local explainer based on R1 Revisited: Four Years in the Trenches."]},"rightsStatuses":["documented-in-legacy"],"sourceIds":["source-r1-an-expert-in-the-computer-systems-domain"],"sources":[{"id":"source-r1-an-expert-in-the-computer-systems-domain","type":"paper","reliability":"primary","title":{"zh":"《R1：计算机系统领域的专家》","en":"R1: An Expert in the Computer Systems Domain"},"url":"https://ojs.aaai.org/index.php/AAAI/article/view/8022"}],"variantSourceIds":["source-dec-vax-11-780-photo","source-r1-an-expert-in-the-computer-systems-domain","source-r1-revisited-four-years-in-the-trenches","source-xcon-overview"],"variantSources":[{"id":"source-r1-an-expert-in-the-computer-systems-domain","type":"paper","reliability":"primary","title":{"zh":"《R1：计算机系统领域的专家》","en":"R1: An Expert in the Computer Systems Domain"},"url":"https://ojs.aaai.org/index.php/AAAI/article/view/8022"},{"id":"source-r1-revisited-four-years-in-the-trenches","type":"paper-page","reliability":"primary","title":{"zh":"重访 R1：一线四年","en":"R1 Revisited: Four Years in the Trenches"},"url":"https://ojs.aaai.org/aimagazine/index.php/aimagazine/article/view/445"},{"id":"source-xcon-overview","type":"encyclopedia-entry","reliability":"reference-only","title":{"zh":"XCON 概览","en":"XCON overview"},"url":"https://en.wikipedia.org/wiki/Xcon"},{"id":"source-dec-vax-11-780-photo","type":"image-source","reliability":"reference-only","title":{"zh":"DEC VAX-11/780 照片","en":"DEC VAX-11/780 photo"},"url":"https://commons.wikimedia.org/wiki/File:LCM_-_DEC_VAX_11-780-5_-_01.jpg"}],"usages":[{"storylineId":"bench-council-ai100","storylineTitle":{"zh":"AI 百大成就（BenchCouncil）","en":"AI Top 100 Achievements (BenchCouncil)"},"eventId":"1980-xcon-r1","eventTitle":{"zh":"XCON / R1 专家系统","en":"XCON-R1"},"variant":"bench-council-ai100","variantFile":"archive/events/1980-xcon-r1/variants/bench-council-ai100.json","visual":"xcon","demoImage":"resources/images/bench-council-ai100/explainers/1980-xcon-r1_order-flow.svg","description":{"zh":"约翰·麦克德莫特开发的 R1，后来称为 XCON，于 1980 年前后在数字设备公司用于配置 VAX 计算机订单。系统把组件兼容性、机柜布局、电源、线缆和客户需求写成产生式规则，再通过规则匹配逐步生成可制造的配置。 XCON 把专家系统从实验室演示推进到持续运行的工业流程，减少了人工配置中的遗漏与昂贵返工，也显示知识库必须随着产品变化长期维护。规则数量增长、例外积累和知识获取成本后来暴露出专家系统的工程负担，但它仍是 AI 创造可量化商业价值的早期标志。","en":"John McDermott's R1, later called XCON, was deployed around 1980 at Digital Equipment Corporation to configure orders for VAX computer systems. It represented component compatibility, cabinet layout, power, cabling, and customer requirements as production rules, then applied matching rules step by step to produce a configuration that could be manufactured. XCON moved expert systems from laboratory demonstrations into a continuing industrial workflow, reducing omissions and expensive rework in manual configuration. It also showed that a knowledge base must be maintained as products change. Growing rule sets, accumulating exceptions, and the cost of knowledge acquisition later exposed the engineering burden of expert systems, but XCON remains an early landmark in measurable commercial value from AI."},"method":{"zh":"OPS5 产生式规则配置","en":"OPS5 production-rule configuration"},"artifact":{"zh":"R1/XCON VAX 配置器","en":"R1/XCON VAX configurator"}}],"svgText":["VAX order flow","VAX 订单流程","customer","components","shipment","XCON-R1 · local original explainer"],"svgBytes":1669,"hasViewBox":true,"hasTitle":true,"hasDesc":true,"hasScript":false,"sourceTraceable":true},{"path":"resources/images/bench-council-ai100/explainers/1980-xcon-r1_rule-configurator.svg","exists":true,"assetIds":["asset-1980-xcon-r1-rule-configurator"],"roles":["architecture-explainer"],"captions":{"zh":["规则式配置器"],"en":["Rule-based configurator"]},"subcaptions":{"zh":["依据 R1：计算机系统领域的专家 制作的本地解释图。"],"en":["Original local explainer based on R1: An Expert in the Computer Systems Domain."]},"rightsStatuses":["documented-in-legacy"],"sourceIds":["source-r1-an-expert-in-the-computer-systems-domain"],"sources":[{"id":"source-r1-an-expert-in-the-computer-systems-domain","type":"paper","reliability":"primary","title":{"zh":"《R1：计算机系统领域的专家》","en":"R1: An Expert in the Computer Systems Domain"},"url":"https://ojs.aaai.org/index.php/AAAI/article/view/8022"}],"variantSourceIds":["source-dec-vax-11-780-photo","source-r1-an-expert-in-the-computer-systems-domain","source ce a configuration that could be manufactured. XCON moved expert systems from laboratory demonstrations into a continuing industrial workflow, reducing omissions and expensive rework in manual configuration. It also showed that a knowledge base must be maintained as products change. Growing rule sets, accumulating exceptions, and the cost of knowledge acquisition later exposed the engineering burden of expert systems, but XCON remains an early landmark in measurable commercial value from AI."},"method":{"zh":"OPS5 产生式规则配置","en":"OPS5 production-rule configuration"},"artifact":{"zh":"R1/XCON VAX 配置器","en":"R1/XCON VAX configurator"}}],"svgText":["Rule-based configurator","规则配置器","requirements","rules","configuration","XCON-R1 · local original explainer"],"svgBytes":1689,"hasViewBox":true,"hasTitle":true,"hasDesc":true,"hasScript":false,"sourceTraceable":true},{"path":"resources/images/bench-council-ai100/explainers/1982-hopfield-network_energy-basin.svg","exists":true,"assetIds":["asset-1982-hopfield-network-energy-basin"],"roles":["architecture-explainer"],"captions":{"zh":["能量盆地"],"en":["Energy basin"]},"subcaptions":{"zh":["Hopfield 网络 的本地重绘图，依据页面列出的来源材料制作。"],"en":["Local redraw for Hopfield Network, based on the listed source material."]},"rightsStatuses":["documented-in-legacy"],"sourceIds":["source-neural-networks-and-physical-systems"],"sources":[{"id":"source-neural-networks-and-physical-systems","type":"paper","reliability":"primary","title":{"zh":"《神经网络与物理系统》","en":"Neural Networks and Physical Systems"},"url":"https://doi.org/10.1073/pnas.79.8.2554"}],"variantSourceIds":["source-neural-networks-and-physical-systems","source-nobel-prize-john-j-hopfield-facts","source-princeton-neuroscience-institute-profile"],"variantSources":[{"id":"source-neural-networks-and-physical-systems","type":"paper","reliability":"primary","title":{"zh":"《神经网络与物理系统》","en":"Neural Networks and Physical Systems"},"url":"https://doi.org/10.1073/pnas.79.8.2554"},{"id":"source-nobel-prize-john-j-hopfield-facts","type":"profile","reliability":"reference-only","title":{"zh":"Nobel Prize: 约翰·J·霍普菲尔德 facts","en":"Nobel Prize: John J. Hopfield facts"},"url":"https://www.nobelprize.org/prizes/physics/2024/hopfield/facts/"},{"id":"source-princeton-neuroscience-institute-profile","type":"profile","reliability":"reference-only","title":{"zh":"Princeton Neuroscience Institute profile","en":"Princeton Neuroscience Institute profile"},"url":"https://pni.princeton.edu/people/john-j-hopfield"}],"usages":[{"storylineId":"bench-council-ai100","storylineTitle":{"zh":"AI 百大成就（BenchCouncil）","en":"AI Top 100 Achievements (BenchCouncil)"},"eventId":"1982-hopfield-network","eventTitle":{"zh":"Hopfield 网络","en":"Hopfield Network"},"variant":"bench-council-ai100","variantFile":"archive/events/1982-hopfield-network/variants/bench-council-ai100.json","visual":"hopfield","demoImage":"","description":{"zh":"约翰·霍普菲尔德在 1982 年把相互连接的二值神经元描述为具有整体能量函数的动力系统。在对称连接和异步更新等条件下，每次更新都会降低或保持能量，因此网络最终落入稳定状态。训练过的模式可以成为能量地形中的吸引子。 当输入只包含残缺或带噪版本时，网络可能收敛到最接近的存储模式，从而实现内容寻址的联想记忆。容量有限、伪吸引子和局部极小值会限制表现，但这一框架把神经计算、统计物理、记忆和组合优化连接起来，并成为能量模型的重要历史基础。","en":"John Hopfield described a recurrent network of binary units as a dynamical system with a global energy function in 1982. Under conditions including symmetric connections and asynchronous updates, each update lowers or preserves the energy, so the network eventually settles into a stable state. Learned patterns can therefore become attractors in an energy landscape. Given an incomplete or noisy version of a pattern, the network may converge to the closest stored memory, providing content-addressable associative recall. Limited capacity, spurious attractors, and local minima constrain its performance, but the framework connected neural computation with statistical physics, memory, and combinatorial optimization. It also became an important historical foundation for energy-based models."},"method":{"zh":"吸引子动力学与能量最小化","en":"Attractor dynamics and energy minimization"},"artifact":{"zh":"递归联想记忆网络","en":"Recurrent associative memory network"}}],"svgText":["Energy basin memory","stored pattern","noisy cue","updates descend energy"],"svgBytes":836,"hasViewBox":true,"hasTitle":false,"hasDesc":false,"hasScript":false,"sourceTraceable":true},{"path":"resources/images/bench-council-ai100/explainers/1982-hopfield-network_memory-grid.svg","exists":true,"assetIds":["asset-1982-hopfield-network-memory-grid"],"roles":["architecture-explainer"],"captions":{"zh":["联想记忆网格"],"en":["Associative memory grid"]},"subcaptions":{"zh":["Hopfield 网络 的本地重绘图，依据页面列出的来源材料制作。"],"en":["Local redraw for Hopfield Network, based on the listed source material."]},"rightsStatuses":["documented-in-legacy"],"sourceIds":["source-neural-networks-and-physical-systems"],"sources":[{"id":"source-neural-networks-and-physical-systems","type":"paper","reliability":"primary","title":{"zh":"《神经网络与物理系统》","en":"Neural Networks and Physical Systems"},"url":"https://doi.org/10.1073/pnas.79.8.2554"}],"variantSourceIds":["source-neural-networks-and-physical-systems","source-nobel-prize-john-j-hopfield-facts","source-princeton-neuroscience-institute-profile"],"variantSources":[{"id":"source-neural-networks-and-physical-systems","type":"paper","reliability":"primary","title":{"zh":"《神经网络与物理系统》","en":"Neural Networks and Physical Systems"},"url":"https://doi.org/10.1073/pnas.79.8.2554"},{"id":"source-nobel-prize-john-j-hopfield-facts","type":"profile","reliability":"reference-only","title":{"zh":"Nobel Prize: 约翰·J·霍普菲尔德 facts","en":"Nobel Prize: John J. Hopfield facts"},"url":"https://www.nobelprize.org/prizes/physics/2024/hopfield/facts/"},{"id":"source-princeton-neuroscience-institute-profile","type":"profile","reliability":"reference-only","title":{"zh":"Princeton Neuroscience Institute profile","en":"Princeton Neuroscience Institute profile"},"url":"https://pni.princeton.edu/people/john-j-hopfield"}],"usages":[{"storylineId":"bench-council-ai100","storylineTitle":{"zh":"AI 百大成就（BenchCouncil）","en":"AI Top 100 Achievements (BenchCouncil)"},"eventId":"1982-hopfield-network","eventTitle":{"zh":"Hopfield 网络","en":"Hopfield Network"},"variant":"bench-council-ai100","variantFile":"archive/events/1982-hopfield-network/variants/bench-council-ai100.json","visual":"hopfield","demoImage":"","description":{"zh":"约翰·霍普菲尔德在 1982 年把相互连接的二值神经元描述为具有整体能量函数的动力系统。在对称连接和异步更新等条件下，每次更新都会降低或保持能量，因此网络最终落入稳定状态。训练过的模式可以成为能量地形中的吸引子。 当输入只包含残缺或带噪版本时，网络可能收敛到最接近的存储模式，从而实现内容寻址的联想记忆。容量有限、伪吸引子和局部极小值会限制表现，但这一框架把神经计算、统计物理、记忆和组合优化连接起来，并成为能量模型的重要历史基础。","en":"John Hopfield described a recurrent network of binary units as a dynamical system with a global energy function in 1982. Under conditions including symmetric connections and asynchronous updates, each update lowers or preserves the energy, so the network eventually settles into a stable state. Learned patterns can therefore become attractors in an energy landscape. Given an incomplete or noisy version of a pattern, the network may converge to the closest stored memory, providing content-addressable associative recall. Limited capacity, spurious attractors, and local minima constrain its performance, but the framework connected neural computation with statistical physics, memory, and combinatorial optimization. It also became an important historical foundation for energy-based models."},"method":{"zh":"吸引子动力学与能量最小化","en":"Attractor dynamics and energy minimization"},"artifact":{"zh":"递归联想记忆网络","en":"Recurrent associative memory network"}}],"svgText":["Associative memory grid","stored","recalled from noise"],"svgBytes":6571,"hasViewBox":true,"hasTitle":false,"hasDesc":false,"hasScript":false,"sourceTraceable":true},{"path":"resources/images/bench-council-ai100/explainers/1982-som_topology-map.svg","exists":true,"assetIds":["asset-1982-som-topology-map"],"roles":["architecture-explainer"],"captions":{"zh":["科霍宁映射调整"],"en":["Kohonen map adaptation"]},"subcaptions":{"zh":["关于自组织映射调整的本地原创解释图。"],"en":["Original local explainer of self-organizing map adaptation."]},"rightsStatuses":["documented-in-legacy"],"sourceIds":["source-self-organized-formation-of-topologically-correct-feature-maps"],"sources":[{"id":"source-self-organized-formation-of-topologically-correct-feature-maps","type":"paper","reliability":"primary","title":{"zh":"《拓扑正确特征映射的自组织形成》","en":"Self-organized formation of topologically correct feature maps"},"url":"https://doi.org/10.1007/BF00337288"}],"variantSourceIds":["source-essentials-of-the-self-organizing-map","source-open-som-paper-pdf","source-self-organized-formation-of-topologically-correct-feature-maps","source-self-organizing-map-overview"],"variantSources":[{"id":"source-self-organized-formation-of-topologically-correct-feature-maps","type":"paper","reliability":"primary","title":{"zh":"《拓扑正确特征映射的自组织形成》","en":"Self-organized formation of topologically correct feature maps"},"url":"https://doi.org/10.1007/BF00337288"},{"id":"source-open-som-paper-pdf","type":"paper-file","reliability":"secondary","title":{"zh":"SOM 论文开放 PDF","en":"Open SOM paper PDF"},"url":"https://tcosmo.github.io/assets/soms/doc/kohonen1982.pdf"},{"id":"source-self-organizing-map-overview","type":"encyclopedia-entry","reliability":"reference-only","title":{"zh":"自组织映射概览","en":"Self-organizing map overview"},"url":"https://en.wikipedia.org/wiki/Self-organizing_map"},{"id":"source-essentials-of-the-self-organizing-map","type":"paper-page","reliability":"reference-only","title":{"zh":"自组织映射要点回顾","en":"Essentials of the self-organizing map"},"url":"https://doi.org/10.1016/j.neunet.2012.09.018"}],"usages":[{"storylineId":"bench-council-ai100","storylineTitle":{"zh":"AI 百大成就（BenchCouncil）","en":"AI Top 100 Achievements (BenchCouncil)"},"eventId":"ai100-1982-som","eventTitle":{"zh":"自组织映射","en":"Self-organizing Map"},"variant":"bench-council-ai100","variantFile":"archive/events/ai100-1982-som/variants/bench-council-ai100.json","visual":"som","demoImage":"resources/images/bench-council-ai100/explainers/1982-som_topology-map.svg","description":{"zh":"泰沃·科霍宁在 1982 年提出自组织映射，把一组输出单元排列成通常为二维的网格。每次输入到来时，系统寻找权重向量最接近输入的“获胜单元”，并同时把获胜者及其网格邻居的权重向输入方向移动；邻域范围随训练逐渐缩小。 这种竞争与协同更新使相似输入映射到相近位置，在降低维度的同时大致保持数据拓扑，因而适合聚类、探索和可视化。SOM 的地图形状和距离解释依赖训练参数，也可能扭曲高维结构，但它把无监督表示学习变成可观看的空间组织过程。","en":"Teuvo Kohonen introduced the self-organizing map in 1982 by arranging output units on a usually two-dimensional grid. For each input, the system finds the “winning unit” whose weight vector is closest, then moves both the winner and its grid neighbors toward the input. The neighborhood radius gradually shrinks during training. This combination of competition and cooperation places similar inputs near one another, approximately preserving data topology while reducing dimension, which makes SOMs useful for clustering, exploration, and visualization. The map's shape and distances depend on training choices and may distort high-dimensional structure. Its lasting appeal is that unsupervised representation learning becomes a visible process of spatial self-organization."},"method":{"zh":"无监督竞争学习","en":"Unsupervised competitive learning"},"artifact":{"zh":"科霍宁自组织映射","en":"Kohonen self-organizing map"}}],"svgText":["winning unit pulls its neighborhood","topology-preserving map"],"svgBytes":1317,"hasViewBox":true,"hasTitle":false,"hasDesc":false,"hasScript":false,"sourceTraceable":true},{"path":"resources/images/bench-council-ai100/explainers/1983-actor-critic_two-paths.svg","exists":true,"assetIds":["asset-1983-actor-critic-two-paths"],"roles":["architecture-explainer"],"captions":{"zh":["Actor-Critic 解释图"],"en":["Actor-Critic explainer"]},"subcaptions":{"zh":["关于该成就流程的本地原创解释图。"],"en":["Original local explainer for the achievement flow."]},"rightsStatuses":["documented-in-legacy"],"sourceIds":["source-neuronlike-adaptive-elements-that-can-solve-difficult-learning-control-problems"],"sources":[{"id":"source-neuronlike-adaptive-elements-that-can-solve-difficult-learning-control-problems","type":"paper","reliability":"primary","title":{"zh":"《能够解决困难学习控制问题的类神经自适应元件》","en":"Neuronlike Adaptive Elements That Can Solve Difficult Learning Control Problems"},"url":"https://doi.org/10.1109/TSMC.1983.6313077"}],"variantSourceIds":["source-actor-critic-model-overview","source-neuronlike-adaptive-elements-that-can-solve-difficult-learning-control-problems","source-reinforcement-learning-an-introduction"],"variantSources":[{"id":"source-neuronlike-adaptive-elements-that-can-solve-difficult-learning-control-problems","type":"paper","reliability":"primary","title":{"zh":"《能够解决困难学习控制问题的类神经自适应元件》","en":"Neuronlike Adaptive Elements That Can Solve Difficult Learning Control Problems"},"url":"https://doi.org/10.1109/TSMC.1983.6313077"},{"id":"source-reinforcement-learning-an-introduction","type":"book","reliability":"secondary","title":{"zh":"《强化学习导论》","en":"Reinforcement Learning: An Introduction"},"url":"http://incompleteideas.net/book/the-book-2nd.html"},{"id":"source-actor-critic-model-overview","type":"encyclopedia-entry","reliability":"reference-only","title":{"zh":"Actor-Critic 模型概览","en":"Actor-critic model overview"},"url":"https://en.wikipedia.org/wiki/Actor-critic_model"}],"usages":[{"storylineId":"bench-council-ai100","storylineTitle":{"zh":"AI 百大成就（BenchCouncil）","en":"AI Top 100 Achievements (BenchCouncil)"},"eventId":"ai100-1983-actor-critic","eventTitle":{"zh":"Actor-Critic","en":"Actor-Critic"},"variant":"bench-council-ai100","variantFile":"archive/events/ai100-1983-actor-critic/variants/bench-council-ai100.json","visual":"configuredPaper","demoImage":"resources/images/bench-council-ai100/explainers/1983-actor-critic_two-paths.svg","description":{"zh":"巴托、萨顿和安德森在 1983 年的类神经自适应控制系统中，把学习分成行动者和评价者两个部分。Actor 根据状态选择动作并调整策略；Critic 学习预测未来强化信号，用连续步骤间的预测误差评价刚才的行为，为 Actor 提供比最终成败更及时的学习信号。 这种分工把策略搜索与价值估计结合起来，后来发展为现代策略梯度和优势 Actor-Critic 方法。Critic 可以降低纯策略梯度的方差，但自身偏差会误导 Actor，两个学习过程还可能相互不稳定。其持久影响在于确立“一个组件行动、另一个组件学习评价”的强化学习架构。","en":"Andrew Barto, Richard Sutton, and Charles Anderson divided learning into an actor and a critic in their 1983 neuronlike adaptive control system. The actor selects actions from the current state and adjusts the policy. The critic learns to predict future reinforcement and uses differences between successive predictions to evaluate recent behavior, supplying a more immediate learning signal than waiting for final success or failure. This division joins policy search with value estimation and later developed into modern policy-gradient and advantage actor-critic methods. A critic can reduce the variance of pure policy gradients, but its bias can mislead the actor, and the two learning processes may destabilize each other. The enduring contribution is the architecture of one component acting while another learns how to evaluate those actions."},"method":{"zh":"分离的策略与价值学习","en":"Separate policy and value learning"},"artifact":{"zh":"Actor-Critic 强化学习架构","en":"Actor-critic reinforcement-learning architecture"}}],"svgText":["Actor-Critic","actor","input","critic","mechanism","policy update","result","Original local SVG redraw; source figures are not copied."],"svgBytes":2333,"hasViewBox":true,"hasTitle":true,"hasDesc":true,"hasScript":false,"sourceTraceable":true},{"path":"resources/images/bench-council-ai100/explainers/1983-simulated-annealing_energy-landscape.svg","exists":true,"assetIds":["asset-1983-simulated-annealing-energy-landscape"],"roles":["architecture-explainer"],"captions":{"zh":["能量地形搜索"],"en":["Energy landscape search"]},"subcaptions":{"zh":["高温阶段允许跨越局部能垒，降温后逐渐偏向低代价区域。"],"en":["High temperature permits barrier crossing; cooling gradually favors lower-cost regions."]},"rightsStatuses":["original-local"],"sourceIds":["source-optimization-by-simulated-annealing"],"sources":[{"id":"source-optimization-by-simulated-annealing","type":"paper","reliability":"primary","title":{"zh":"《模拟退火优化》","en":"Optimization by Simulated Annealing"},"url":"https://www.science.org/doi/10.1126/science.220.4598.671"}],"variantSourceIds":["source-geman-geman-stochastic-relaxation","source-metropolis-fast-computing-machines","source-optimization-by-simulated-annealing","source-scipy-dual-annealing","source-scott-kirkpatrick-huji-profile"],"variantSources":[{"id":"source-optimization-by-simulated-annealing","type":"paper","reliability":"primary","title":{"zh":"《模拟退火优化》","en":"Optimization by Simulated Annealing"},"url":"https://www.science.org/doi/10.1126/science.220.4598.671"},{"id":"source-metropolis-fast-computing-machines","type":"paper","reliability":"primary","title":{"zh":"《用快速计算机进行状态方程计算》","en":"Equation of State Calculations by Fast Computing Machines"},"url":"https://doi.org/10.1063/1.1699114"},{"id":"source-geman-geman-stochastic-relaxation","type":"paper","reliability":"primary","title":{"zh":"《随机松弛、Gibbs 分布与图像的贝叶斯恢复》","en":"Stochastic Relaxation, Gibbs Distributions, and the Bayesian Restoration of Images"},"url":"https://doi.org/10.1109/TPAMI.1984.4767596"},{"id":"source-scipy-dual-annealing","type":"documentation","reliability":"reference-only","title":{"zh":"SciPy dual_annealing","en":"SciPy dual_annealing"},"url":"https://docs.scipy.org/doc/scipy/reference/generated/scipy.optimize.dual_annealing.html"},{"id":"source-scott-kirkpatrick-huji-profile","type":"personal-page","reliability":"primary","title":{"zh":"斯科特·柯克帕特里克个人主页","en":"Scott Kirkpatrick personal homepage"},"url":"https://www.cs.huji.ac.il/~kirk/"}],"usages":[{"storylineId":"bench-council-ai100","storylineTitle":{"zh":"AI 百大成就（BenchCouncil）","en":"AI Top 100 Achievements (BenchCouncil)"},"eventId":"1983-simulated-annealing","eventTitle":{"zh":"模拟退火","en":"Simulated Annealing"},"variant":"bench-council-ai100","variantFile":"archive/events/1983-simulated-annealing/variants/bench-council-ai100.json","visual":"annealing","demoImage":"","description":{"zh":"1983 年，斯科特·柯克帕特里克、C·丹尼尔·格拉特 Jr. 和马里奥·P·维基把统计物理中的退火过程系统地转化为组合优化方法。算法始终接受更优解；面对代价增加量为 ΔE 的较差解时，则以约 exp(-ΔE/T) 的概率接受，从而在高温阶段越过局部最优，随后随温度降低逐渐转向精细搜索。 这一方法继承了 1953 年 Metropolis 等人提出的随机采样思想，并用“温度”和“降温计划”控制探索与收敛之间的平衡。理论研究表明，足够缓慢的降温可以带来渐近收敛性质，但实际系统通常采用更快的计划换取可接受的运行时间；这种权衡后来持续影响电路布局、调度、路径规划以及混合元启发式优化。","en":"In 1983, Scott Kirkpatrick, C. Daniel Gelatt Jr., and Mario P. Vecchi systematically turned the annealing process from statistical physics into a method for combinatorial optimization. The algorithm always accepts an improvement; for a worse candidate with cost increase ΔE, it accepts with probability approximately exp(-ΔE/T), allowing high-temperature search to cross local barriers before cooling shifts the process toward refinement. The method adapted the stochastic sampling idea introduced by Metropolis and colleagues in 1953, using temperature and a cooling schedule to balance exploration against convergence. Theory showed that sufficiently slow cooling can provide asymptotic convergence properties, while practical systems usually cool faster to obtain useful answers in reasonable time; that tradeoff has continued to influence circuit placement, scheduling, routing, and hybrid metaheuristics."},"method":{"zh":"结合 Metropolis 接受准则与降温计划的概率搜索","en":"Metropolis acceptance with a cooling schedule"},"artifact":{"zh":"模拟退火算法","en":"Simulated annealing algorithm"}}],"svgText":["SIMULATED ANNEALING","模拟退火：从高温探索到低温收敛","COST / 代价","HIGH T: CROSS A BARRIER","高温：可能接受较差移动","LOW T: FAVOR LOWER COST","低温：逐渐稳定在低代价区域","LOCAL BASIN / 局部低谷","DEEP BASIN / 更深低谷","ACCEPTANCE RULE","接受准则","ΔE ≤ 0","ACCEPT / 直接接受","ΔE 0","p ≈ exp(-ΔE/T)","概率接受较差移动","Higher T → more exploration","Lower T → more refinement","HIGH TEMPERATURE / 高温","COOLING / 降温","LOW TEMPERATURE / 低温","explore","reduce T","refine"],"svgBytes":5680,"hasViewBox":true,"hasTitle":true,"hasDesc":true,"hasScript":false,"sourceTraceable":true},{"path":"resources/images/bench-council-ai100/explainers/1984-cart_pruning-curve.svg","exists":true,"assetIds":["asset-1984-cart-pruning-curve"],"roles":["architecture-explainer"],"captions":{"zh":["代价复杂度剪枝曲线"],"en":["Cost-complexity pruning curve"]},"subcap RT 的划分与剪枝框架成为随机森林、梯度提升树和许多表格数据系统的基本单元，至今仍连接可解释性与预测能力。","en":"Leo Breiman, Jerome Friedman, Richard Olshen, and Charles Stone systematized classification and regression trees in their 1984 book. CART recursively chooses variables and split points that make child nodes more homogeneous for categorical or numeric targets. It grows a comparatively large binary tree, then uses cost-complexity pruning and validation data to select a simpler subtree. The resulting model can be read as a sequence of if-then decisions while representing nonlinear relationships, interactions, and different output types. Individual trees can be unstable under small data changes, but CART's split-and-prune framework became the basic unit behind random forests, gradient-boosted trees, and many tabular-data systems, continuing to connect interpretability with predictive power."},"method":{"zh":"递归划分与剪枝","en":"Recursive partitioning with pruning"},"artifact":{"zh":"分类与回归树","en":"Classification and regression trees"}}],"svgText":["Cost-complexity pruning curve","代价复杂度剪枝曲线","selected subtree","Pruning · local redraw from source material"],"svgBytes":1190,"hasViewBox":true,"hasTitle":true,"hasDesc":true,"hasScript":false,"sourceTraceable":true},{"path":"resources/images/bench-council-ai100/explainers/1984-cart_split-regions.svg","exists":true,"assetIds":["asset-1984-cart-split-regions"],"roles":["architecture-explainer"],"captions":{"zh":["特征空间划分"],"en":["Feature-space splits"]},"subcaptions":{"zh":["CART 决策树 的独立本地重画，依据相关来源材料制作。"],"en":["Distinct local redraw for CART, based on the related source material."]},"rightsStatuses":["documented-in-legacy"],"sourceIds":["source-classification-and-regression-trees"],"sources":[{"id":"source-classification-and-regression-trees","type":"book","reliability":"primary","title":{"zh":"《分类与回归树》","en":"Classification and Regression Trees"},"url":"https://www.routledge.com/Classification-and-RegressionTrees/Breiman-Friedman-Stone-Olshen/p/book/9780412048418"}],"varia resenting nonlinear relationships, interactions, and different output types. Individual trees can be unstable under small data changes, but CART's split-and-prune framework became the basic unit behind random forests, gradient-boosted trees, and many tabular-data systems, continuing to connect interpretability with predictive power."},"method":{"zh":"递归划分与剪枝","en":"Recursive partitioning with pruning"},"artifact":{"zh":"分类与回归树","en":"Classification and regression trees"}}],"svgText":["Feature-space splits","特征空间划分","Splits · local redraw from source material"],"svgBytes":1378,"hasViewBox":true,"hasTitle":true,"hasDesc":true,"hasScript":false,"sourceTraceable":true},{"path":"resources/images/bench-council-ai100/explainers/1984-cyc_common-sense-rule.svg","exists":true,"assetIds":["asset-1984-cyc-common-sense-rule"],"roles":["architecture-explainer"],"captions":{"zh":["常识规则框架"],"en":["Common-sense rule frame"]},"subcaptions":{"zh":["依据 CycL 的演化 制作的本地解释图。"],"en":["Original local explainer based on The Evolution of CycL."]},"rightsStatuses":["documented-in-legacy"],"sourceIds":["source-building-large-knowledge-based-systems"],"sources":[{"id":"source-building-large-knowledge-based-systems","type":"book","reliability":"primary","title":{"zh":"《构建大型知识系统》","en":"Building Large Knowledge-Based Systems"},"url":"https://dl.acm.org/doi/book/10.5555/70571"}],"variantSourceIds":["source-building-large-knowledge-based-systems","source-cyc","source-cyc-projects-logo-image","source-the-evolution-of-cycl"],"variantSources":[{"id":"source-building-large-knowledge-based-systems","type":"book","reliability":"primary","title":{"zh":"《构建大型知识系统》","en":"Building Large Knowledge-Based Systems"},"url":"https://dl.acm.org/doi/book/10.5555/70571"},{"id":"source-the-evolution-of-cycl","type":"paper","reliability":"primary","title":{"zh":"《CycL 的演化》","en":"The Evolution of CycL"},"url":"https://dl.acm.org/doi/10.1145/122296.122308"},{"id":"source-cyc","type":"project-page","reliability":"secondary","title":{"zh":"Cyc","en":"Cyc"},"url":"https://cyc.com/"},{"id":"source-cyc-projects-logo-image","type":"image-source","reliability":"secondary","title":{"zh":"Cyc 项目标识图片","en":"Cyc projects logo image"},"url":"https://commons.wikimedia.org/wiki/File:Cyc_Projects_Logos.png"}],"usages":[{"storylineId":"bench-council-ai100","storylineTitle":{"zh":"AI 百大成就（BenchCouncil）","en":"AI Top 100 Achievements (BenchCouncil)"},"eventId":"1984-cyc","eventTitle":{"zh":"Cyc 常识知识库","en":"Cyc"},"variant":"bench-council-ai100","variantFile":"archive/events/1984-cyc/variants/bench-council-ai100.json","visual":"cyc","demoImage":"resources/images/bench-council-ai100/explainers/1984-cyc_common-sense-rule.svg","description":{"zh":"道格拉斯·莱纳特于 1984 年启动 Cyc，试图把人类日常推理依赖但通常不会写出的常识显式编码进计算机。知识工程师用 CycL 表示概念、关系、规则和例外，并用“微理论”把在不同时间、地点或假设下成立的知识分隔开。 Cyc 的目标不是只解决一个专家领域，而是建立可被多种应用调用的大型知识基础和推理引擎。长期人工编码成本、知识一致性和开放世界覆盖范围始终是挑战，但项目持续证明大规模本体、上下文和规则推理可以工程化，也成为符号 AI 与常识推理讨论的重要参照。","en":"Douglas Lenat launched Cyc in 1984 to encode explicitly the everyday common sense that people rely on but rarely state. Knowledge engineers used CycL to represent concepts, relations, rules, and exceptions, while “microtheories” separated knowledge that holds under different times, places, domains, or assumptions. Rather than solving one expert domain, Cyc aimed to build a large knowledge base and inference engine reusable across applications. The cost of manual encoding, consistency across knowledge, and coverage of an open world remained persistent challenges. Even so, the project demonstrated that large ontologies, context management, and rule-based reasoning could be engineered at unusual scale and became a major reference point for symbolic AI and common-sense reasoning."},"method":{"zh":"大型符号本体与微理论","en":"Large symbolic ontology and microtheories"},"artifact":{"zh":"Cyc 知识库与 CycL","en":"Cyc knowledge base and CycL"}}],"svgText":["Common-sense rule chain","常识规则链","facts","rules","answer","Cyc · local original explainer"] yesian-networks"],"sources":[{"id":"source-bayesian-networks","type":"paper","reliability":"primary","title":{"zh":"《贝叶斯网络》","en":"Bayesian Networks"},"url":"https://ftp.cs.ucla.edu/pub/stat_ser/R246.pdf"}],"variantSourceIds":["source-bayesian-networks","source-judea-pearl-homepage","source-judea-pearl-ucla-samueli"],"variantSources":[{"id":"source-bayesian-networks","type":"paper","reliability":"primary","title":{"zh":"《贝叶斯网络》","en":"Bayesian Networks"},"url":"https://ftp.cs.ucla.edu/pub/stat_ser/R246.pdf"},{"id":"source-judea-pearl-homepage","type":"personal-page","reliability":"primary","title":{"zh":"朱迪亚·珀尔个人主页","en":"Judea Pearl personal homepage"},"url":"https://bayes.cs.ucla.edu/home.htm"},{"id":"source-judea-pearl-ucla-samueli","type":"profile","reliability":"reference-only","title":{"zh":"朱迪亚·珀尔, 加州大学洛杉矶分校 Samueli","en":"Judea Pearl, UCLA Samueli"},"url":"https://samueli.ucla.edu/judea-pearl/"}],"usages":[{"storylineId":"bench-council-ai100","storylineTitle":{"zh":"AI 百大成就（BenchCouncil）","en":"AI Top 100 Achievements (BenchCouncil)"},"eventId":"1985-bayesian-network","eventTitle":{"zh":"贝叶斯网络","en":"Bayesian Network"},"variant":"bench-council-ai100","variantFile":"archive/events/1985-bayesian-network/variants/bench-council-ai100.json","visual":"bayesnet","demoImage":"","description":{"zh":"贝叶斯网络用有向无环图表示随机变量及其条件依赖关系，每个节点只需给出在父节点条件下的概率分布。图结构由此把复杂联合概率分解为较小的局部因子，并通过条件独立关系说明哪些证据会影响哪些变量。 当新证据到来时，推断算法可以更新疾病诊断、故障原因或环境状态的后验概率；网络结构和参数也可由专家知识与数据共同获得。这种表示成为医学诊断、传感器融合和决策支持的重要工具。若要从图中作出因果解释，还必须加入超出普通概率关联的因果假设。","en":"A Bayesian network represents random variables and their conditional dependencies with a directed acyclic graph. Each node specifies a probability distribution conditioned only on its parents, factorizing a complex joint distribution into smaller local pieces. The graph also exposes conditional independencies, showing which evidence can influence which variables. When evidence arrives, inference algorithms can update posterior probabilities for diagnoses, component failures, or environmental states; experts and data can both contribute to learning the structure and parameters. This representation became important in medical diagnosis, sensor fusion, and decision support. Interpreting the arrows causally, however, requires causal assumptions beyond ordinary probabilistic association."},"method":{"zh":"有向无环图加条件概率","en":"Directed acyclic graph plus conditional probabilities"},"artifact":{"zh":"贝叶斯网络表示","en":"Bayesian network representation"}}],"svgText":["Bayesian network DAG","DAG factorizes joint probability","local redrawn explainer"],"svgBytes":908,"hasViewBox":true,"hasTitle":false,"hasDesc":false,"hasScript":false,"sourceTraceable":true},{"path":"resources/images/bench-council-ai100/explainers/1985-bayesian-network_message-pass.svg","exists":true,"assetIds":["asset-1985-bayesian-network-message-pass"],"roles":["architecture-explainer"],"captions":{"zh":["证据消息传递"],"en":["Evidence message passing"]},"subcaptions":{"zh":["贝叶斯网络 的本地重绘图，依据页面列出的来源材料制作。"],"en":["Local redraw for Bayesian Network, based on the listed source material."]},"rightsStatuses":["documented-in-legacy"],"sourceIds":["source-bayesian-networks"],"sources":[{"id":"source-bayesian-networks","type":"paper","reliability":"primary","title":{"zh":"《贝叶斯网络》","en":"Bayesian Networks"},"url":"https://ftp.cs.ucla.edu/pub/stat_ser/R246.pdf"}],"variantSourceIds":["source-bayesian-networks","source-judea-pearl-homepage","source-judea-pearl-ucla-samueli"],"variantSources":[{"id":"source-bayesian-networks","type":"paper","reliability":"primary","title":{"zh":"《贝叶斯网络》","en":"Bayesian Networks"},"url":"https://ftp.cs.ucla.edu/pub/stat_ser/R246.pdf"},{"id":"source-judea-pearl-homepage","type":"personal-page","reliability":"primary","title":{"zh":"朱迪亚·珀尔个人主页","en":"Judea Pearl personal homepage"},"url":"https://bayes.cs.ucla.edu/home.htm"},{"id":"source-judea-pearl-ucla-samueli","type":"profile","reliability":"reference-only","title":{"zh":"朱迪亚·珀尔, 加州大学洛杉矶分校 Samueli","en ate-error-meter"],"roles":["architecture-explainer"],"captions":{"zh":["TD 误差仪表"],"en":["TD error meter"]},"subcaptions":{"zh":["时序差分更新 的本地重绘图，依据页面列出的来源材料制作。"],"en":["Local redraw for Temporal-Difference Update, based on the listed source material."]},"rightsStatuses":["documented-in-legacy"],"sourceIds":["source-learning-to-predict-by-the-methods-of-temporal-differences"],"sources":[{"id":"source-learning-to-predict-by-the-methods-of-temporal-differences","type":"paper","reliability":"primary","title":{"zh":"《利用时序差分方法学习预测》","en":"Learning to Predict by the Methods of Temporal Differences"},"url":"https://doi.org/10.1007/BF00115009"}],"variantSourceIds":["source-acm-2024-turing-award-announcement","source-learning-to-predict-by-the-methods-of-temporal-differences","source-richard-sutton-homepage"],"variantSources":[{"id":"source-learning-to-predict-by-the-methods-of-temporal-differences","type":"paper","reliability":"primary","title":{"zh":"《利用时序差分方法学习预测》","en":"Learning to Predict by the Methods of Temporal Differences"},"url":"https://doi.org/10.1007/BF00115009"},{"id":"source-richard-sutton-homepage","type":"personal-page","reliability":"primary","title":{"zh":"理查德·萨顿个人主页","en":"Richard Sutton personal homepage"},"url":"http://incompleteideas.net/"},{"id":"source-acm-2024-turing-award-announcement","type":"news","reliability":"reference-only","title":{"zh":"ACM 2024 图灵 Award announcement","en":"ACM 2024 Turing Award announcement"},"url":"https://awards.acm.org/about/2024-turing"}],"usages":[{"storylineId":"bench-council-ai100","storylineTitle":{"zh":"AI 百大成就（BenchCouncil）","en":"AI Top 100 Achievements (BenchCouncil)"},"eventId":"1988-td-update","eventTitle":{"zh":"时序差分更新","en":"Temporal-Difference Update"},"variant":"bench-council-ai100","variantFile":"archive/events/1988-td-update/variants/bench-council-ai100.json","visual":"td","demoImage":"","description":{"zh":"理查德·萨顿在 1988 年系统化时序差分学习，让智能体能够在序列尚未结束时更新对未来回报的预测。TD 更新把当前价值估计向“即时奖励 + 下一状态的估计价值”移动，因此同时利用真实经验和已有预测进行自举，而不必像蒙特卡洛方法那样等待最终结果。 这种在线、逐步更新方式适合持续交互，并把动态规划与从样本学习连接起来。TD 误差后来成为 Q-learning、SARSA、actor-critic 和许多深度强化学习算法的核心信号。自举也可能传播估计偏差，与函数逼近和离策略学习结合时还会带来稳定性挑战。","en":"Richard Sutton systematized temporal-difference learning in 1988 so an agent could update predictions of future return before a sequence had ended. A TD update moves the current value estimate toward the immediate reward plus the estimated value of the next state, bootstrapping from both observed experience and an existing prediction rather than waiting for a final outcome as Monte Carlo methods do. This online, step-by-step process suits continuing interaction and connects ideas from dynamic programming with learning from samples. The TD error later became a central signal in Q-learning, SARSA, actor-critic methods, and much of deep reinforcement learning. Bootstrapping can also propagate estimation error and creates important stability challenges when combined with function approximation and off-policy learning."},"method":{"zh":"自举式价值预测","en":"Bootstrapped value prediction"},"artifact":{"zh":"TD 学习更新规则","en":"TD learning update rule"}},{"storylineId":"gaming-ai","storylineTitle":{"zh":"AI 在棋牌与博弈论的演进","en":"AI in Board & Tabletop Games"},"eventId":"1988-td-update","eventTitle":{"zh":"时序差分更新","en":"Temporal-Difference Update"},"variant":"gaming-ai","variantFile":"archive/events/1988-td-update/variants/gaming-ai.json","visual":"td","demoImage":"","description":{"zh":"时序差分学习为强化学习提供了一种从经验中学习预测的紧凑方法。TD 方法不必等到最终结果，而是用下一步奖励和下一步预测来更新价值估计。这种自举思想支撑了 TD-Gammon、Q-learning 和 actor-critic 等后续算法。","en":"Temporal-difference learning gave reinforcement learning a compact way to learn predictions from experience. Instead of waiting for a final outcome, TD methods update value estimates using the next reward and the next prediction. This bootstrapping idea sits behind many later algorithms, including TD-Gammon, Q-learning, and actor-critic methods."},"method":{"zh":"自举式价值预测","en":"Bootstrapped value prediction"},"artifact":{ reinforcement learning a compact way to learn predictions from experience. Instead of waiting for a final outcome, TD methods update value estimates using the next reward and the next prediction. This bootstrapping idea sits behind many later algorithms, including TD-Gammon, Q-learning, and actor-critic methods."},"method":{"zh":"自举式价值预测","en":"Bootstrapped value prediction"},"artifact":{"zh":"TD 学习更新规则","en":"TD learning update rule"}}],"svgText":["Value timeline update","V(s)","r","V(s')","bootstrap target","local redrawn explainer"],"svgBytes":1238,"hasViewBox":true,"hasTitle":false,"hasDesc":false,"hasScript":false,"sourceTraceable":true},{"path":"resources/images/bench-council-ai100/explainers/1989-lenet_zip-code-cnn.svg","exists":true,"assetIds":["asset-1989-lenet-zip-code-cnn"],"roles":["architecture-explainer"],"captions":{"zh":["邮编 CNN 流程"],"en":["ZIP-code CNN pipeline"]},"subcaptions":{"zh":["关于 LeNet 式识别的本地原创解释图。"],"en":["Original local explainer of LeNet-style recognition."]},"rightsStatuses":["documented-in-legacy"],"sourceIds":["source-backpropagation-applied-to-handwritten-zip-code-recognition"],"sources":[{"id":"source-backpropagation-applied-to-handwritten-zip-code-recognition","type":"paper","reliability":"primary","title":{"zh":"《反向传播应用于手写邮编识别》","en":"Backpropagation Applied to Handwritten Zip Code Recognition"},"url":"https://doi.org/10.1162/neco.1989.1.4.541"}],"variantSourceIds":["source-backpropagation-applied-to-handwritten-zip-code-recognition","source-gradient-based-learning-applied-to-document-recognition","source-lenet-5-demos-and-documentation","source-yann-lecun-s-home-page"],"variantSources":[{"id":"source-backpropagation-applied-to-handwritten-zip-code-recognition","type":"paper","reliability":"primary","title":{"zh":"《反向传播应用于手写邮编识别》","en":"Backpropagation Applied to Handwritten Zip Code Recognition"},"url":"https://doi.org/10.1162/neco.1989.1.4.541"},{"id":"source-lenet-5-demos-and-documentation","type":"project-page","reliability":"primary","title":{"zh":"LeNet-5 演示与文档","en":"LeNet-5 demos and documentation"},"url":"https://yann.lecun.com/exdb/lenet/"},{"id":"source-gradient-based-learning-applied-to-document-recognition","type":"paper","reliability":"secondary","title":{"zh":"《基于梯度的文档识别学习》","en":"Gradient-Based Learning Applied to Document Recognition"},"url":"https://vision.stanford.edu/cs598_spring07/papers/Lecun98.pdf"},{"id":"source-yann-lecun-s-home-page","type":"personal-page","reliability":"primary","title":{"zh":"扬·勒昆个人主页","en":"Yann LeCun personal homepage"},"url":"https://yann.lecun.com/"}],"usages":[{"storylineId":"bench-council-ai100","storylineTitle":{"zh":"AI 百大成就（BenchCouncil）","en":"AI Top 100 Achievements (BenchCouncil)"},"eventId":"1989-cnn","eventTitle":{"zh":"卷积神经网络与 LeNet","en":"Convolutional Networks and LeNet"},"variant":"bench-council-ai100","variantFile":"archive/events/1989-cnn/variants/bench-council-ai100.json","visual":"lenet","demoImage":"resources/images/bench-council-ai100/explainers/1989-lenet_zip-code-cnn.svg","description":{"zh":"勒昆及合作者在 1989 年证明，用反向传播训练的卷积神经网络可以识别手写邮政编码。局部感受野只连接图像的小区域，共享权重让同一特征检测器在不同位置重复使用，逐层下采样则降低对微小位移的敏感性；整个系统从像素到类别共同训练。 后来形成的 LeNet-5 把卷积、子采样和分类器整合为文档识别流水线，并实际用于支票和邮政字符处理。这一技术路线以较少参数利用图像的空间结构，取代大量手工特征。它在 2012 年规模化 CNN 浪潮之前，已证明端到端卷积学习具有工程价值。","en":"Yann LeCun and colleagues showed in 1989 that a convolutional neural network trained with backpropagation could recognize handwritten ZIP codes. Local receptive fields connect only to small image regions, shared weights reuse the same feature detector across positions, and progressive subsampling reduces sensitivity to small shifts. The complete system is trained jointly from pixels to classes. The later LeNet-5 architecture integrated convolution, subsampling, and classification into a document-recognition pipeline used for checks and postal characters. This line of work exploited image structure with relatively few parameters and replaced extensive hand-designed features. Long before the scaled CNN wave of 2012, it demonstrated that end-to-end convolutional learning could deliver practical engineering value."},"method":{"zh":"卷积字符识别","en":"Convolutional character recognition"},"artifact":{"zh":"LeNet 手写数字网络","en":"LeNet handwritten digit network"}},{"storylineId":"deep-learning","storylineTitle":{"zh":"深度学习分支","en":"Deep Learning"},"eventId":"1989-cnn","eventTitle":{"zh":"卷积神经网络与 LeNet","en":"Convolutional Networks and LeNet"},"variant":"deep-learning","variantFile":"archive/events/1989-cnn/variants/deep-learning.json","visual":"lenet","demoImage":"resources/images/bench-council-ai100/explainers/1989-lenet_zip-code-cnn.svg","description":{"zh":"1989 年，扬·勒昆及合作者发表手写邮政编码识别研究，证明带有局部连接和共享权重的多层网络可以用反向传播端到端训练。卷积层在图像不同位置重复使用同一组滤波器，既减少参数，也让模型能够识别平移后仍相似的笔画结构。 这条路线后来发展为 LeNet-5，并在银行支票和文档识别中得到实际应用。CNN 把特征提取与分类放进同一个学习系统，取代了大量手工设计视觉特征的步骤，为 AlexNet 之后的大规模图像识别奠定了直接的架构基础。","en":"In 1989, Yann LeCun and collaborators published a system for handwritten ZIP-code recognition, showing that a multilayer network with local connections and shared weights could be trained end to end with backpropagation. Convolutional layers reused the same filters across image locations, reducing the number of parameters while detecting similar strokes after small shifts. This line of work later matured into LeNet-5 and practical systems for reading bank checks and other documents. CNNs placed feature extraction and classification inside one learned pipeline, reducing dependence on hand-engineered visual features. The architecture became the direct foundation for the large-scale image-recognition systems that followed AlexNet."},"method":{"zh":"卷积字符识别","en":"Convolutional character recognition"},"artifact":{"zh":"LeNet 手写数字网络","en":"LeNet handwritten digit network"}}],"svgText":["LeNet handwriting recognition pipeline","5","features","digit","Convolution and pooling turn a ZIP-code crop","into a digit-class prediction."],"svgBytes":1608,"hasViewBox":true,"hasTitle":false,"hasDesc":false,"hasScript":false,"sourceTraceable":true},{"path":"resources/images/bench-council-ai100/explainers/1989-q-learning_bellman-update.svg","exists":true,"assetIds":["asset-1989-q-learning-bellman-update"],"roles":["architecture-explainer"],"captions":{"zh":["Q-Learning 解释图"],"en":["Q-Learning explainer"]},"subcaptions":{"zh":["关于该成就流程的本地原创解释图。"],"en":["Original local explainer for the achievement flow."]},"rightsStatuses":["documented-in-legacy"],"sourceIds":["source-learning-from-delayed-rewards"],"sources":[{"id":"source-learning-from-delayed-rewards","type":"thesis","reliability":"primary","title":{"zh":"《从延迟奖励中学习》","en":"Learning from Delayed Rewards"},"url":"https://www.cs.rhul.ac.uk/~chrisw/new_thesis.pdf"}],"variantSourceIds":["source-learning-from-delayed-rewards","source-q-learning","source-q-learning-overview"],"variantSources":[{"id":"source-learning-from-delayed-rewards","type":"thesis","reliability":"primary","title":{"zh":"《从延迟奖励中学习》","en":"Learning from Delayed Rewards"},"url":"https://www.cs.rhul.ac.uk/~chrisw/new_thesis.pdf"},{"id":"source-q-learning","type":"paper","reliability":"primary","title":{"zh":"《Q-learning》","en":"Q-learning"},"url":"https://link.springer.com/article/10.1007/BF00992698"},{"id":"source-q-learning-overview","type":"encyclopedia-entry","reliability":"reference-only","title":{"zh":"Q-learning 概览","en":"Q-learning overview"},"url":"https://en.wikipedia.org/wiki/Q-learning"}],"usages":[{"storylineId":"bench-council-ai100","storylineTitle":{"zh":"AI 百大成就（BenchCouncil）","en":"AI Top 100 Achievements (BenchCouncil)"},"eventId":"ai100-1989-q-learning","eventTitle":{"zh":"Q-Learning","en":"Q-Learning"},"variant":"bench-council-ai100","variantFile":"archive/events/ai100-1989-q-learning/variants/bench-council-ai100.json","visual":"configuredPaper","demoImage":"resources/images/bench-council-ai100/explainers/1989-q-learning_bellman-update.svg","description":{"zh":"克里斯·沃特金斯在 1989 年博士论文中提出 Q-learning，直接学习状态—动作价值 Q(s,a)。每次转移后，算法把当前估计向“即时奖励 + 下一状态最大 Q 值”更新，不需要已知环境模型；采取探索动作的行为策略可以与最终由 Q 值定义的贪心目标策略不同。 在有限表格环境、充分探索和合适学习率等条件下，Q-learning 可收敛到最优动作价值。它成为离策略强化学习的经典基础，并最终与深度网络结合形成 DQN。函数逼近、自举和离策略数据同时出现时可能不稳定，最大操作还会造成过估计，但其更新规则仍是强化学习的核心范式。","en":"Chris Watkins introduced Q-learning in his 1989 doctoral thesis to learn the state-action value Q(s,a) directly. After each transition, the algorithm moves the current estimate toward the immediate reward plus the maximum Q value in the next state, requiring no known model of the environment. The behavior policy used to explore can differ from the greedy target policy implied by the learned Q values. In finite tabular settings with sufficient exploration and suitable learning rates, Q-learning can converge to optimal action values. It became the classic foundation for off-policy reinforcement learning and later combined with deep networks in DQN. Function approximation, bootstrapping, and off-policy data can create instability together, while the maximum operator can overestimate values. Its update rule nevertheless remains a central reinforcement-learning pattern."},"method":{"zh":"离策略时序差分控制","en":"Off-policy temporal-difference control"},"artifact":{"zh":"Q-learning 更新规则","en":"Q-learning update rule"}}],"svgText":["Q-Learning","state action","input","Bellman target","mechanism","Q update","result","Original local SVG redraw; source figures are not copied."],"svgBytes":2347,"hasViewBox":true,"hasTitle":true,"hasDesc":true,"hasScript":false,"sourceTraceable":true},{"path":"resources/images/bench-council-ai100/explainers/1990-otter_clause-index.svg","exists":true,"assetIds":["asset-1990-otter-clause-index"],"roles":["architecture-explainer"],"captions":{"zh":["子句索引地图"],"en":["Clause indexing map"]},"subcaptions":{"zh":["依据 OTTER 3.3 参考手册 制作的本地解释图。"],"en":["Original local explainer based on OTTER 3.3 Reference Manual."]},"rightsStatuses":["documented-in-legacy"],"sourceIds":["source-otter-3-3-reference-manual"],"sources":[{"id":"source-otter-3-3-reference-manual","type":"documentation","reliability":"primary","title":{"zh":"OTTER 3.3 参考手册","en":"OTTER 3.3 Reference Manual"},"url":"https://arxiv.org/abs/cs/0310056"}],"variantSourceIds":["source-a-spectrum-of-applications-of-automated-reasoning","source-checking-clinical-guidelines-using-automated-reasoning-tools","source-otter-3-3-reference-manual"],"variantSources":[{"id":"source-otter-3-3-reference-manual","type":"documentation","reliability":"primary","title":{"zh":"OTTER 3.3 参考手册","en":"OTTER 3.3 Reference Manual"},"url":"https://arxiv.org/abs/cs/0310056"},{"id":"source-a-spectrum-of-applications-of-automated-reasoning","type":"paper","reliability":"secondary","title":{"zh":"《自动推理应用谱系》","en":"A Spectrum of Applications of Automated Reasoning"},"url":"https://arxiv.org/abs/cs/0205078"},{"id":"source-checking-clinical-guidelines-using-automated-reasoning-tools","type":"paper","reliability":"secondary","title":{"zh":"《使用自动推理工具检查临床指南》","en":"Checking Clinical Guidelines using Automated Reasoning Tools"},"url":"https://arxiv.org/abs/0806.0250"}],"usages":[{"storylineId":"bench-council-ai100","storylineTitle":{"zh":"AI 百大成就（BenchCouncil）","en":"AI Top 100 Achievements (BenchCouncil)"},"eventId":"1990-otter","eventTitle":{"zh":"Otter 自动定理证明器","en":"Otter"},"variant":"bench-council-ai100","variantFile":"archive/events/1990-otter/variants/bench-council-ai100.json","visual":"otter","demoImage":"resources/images/bench-council-ai100/explainers/1990-otter_clause-index.svg","description":{"zh":"威廉·麦丘恩在阿贡国家实验室开发 OTTER，使一阶逻辑和等式推理的高性能自动证明成为研究者可实际使用的工具。系统结合归结、超归结和参数调解，并用项索引快速寻找可匹配公式；given-clause 循环则从待处理集合中逐步选择子句，生成新的推论。 用户可以通过权重、优先级和推理规则控制庞大证明空间中的搜索，使 OTTER 既适合逻辑实验，也能处理代数和组合数学问题。它体现了自动推理从单一算法走向成熟软件系统的阶段，并为 McCune 后续的 Prover9 等证明器积累了工程基础。","en":"William McCune developed OTTER at Argonne National Laboratory as a practical high-performance tool for automated reasoning in first-order logic with equality. It combined resolution, hyperresolution, and paramodulation, while term indexing rapidly found formulas that c ons/"},{"id":"source-jonathan-schaeffer-portrait","type":"image-source","reliability":"reference-only","title":{"zh":"乔纳森·谢弗 人物照片","en":"Jonathan Schaeffer portrait"},"url":"https://commons.wikimedia.org/wiki/File:Jonathan_Schaeffer.jpg"}],"usages":[{"storylineId":"bench-council-ai100","storylineTitle":{"zh":"AI 百大成就（BenchCouncil）","en":"AI Top 100 Achievements (BenchCouncil)"},"eventId":"1994-chinook","eventTitle":{"zh":"Chinook 跳棋程序","en":"Chinook"},"variant":"bench-council-ai100","variantFile":"archive/events/1994-chinook/variants/bench-council-ai100.json","visual":"chinook","demoImage":"resources/images/bench-council-ai100/explainers/1994-chinook_perfect-play.svg","description":{"zh":"乔纳森·谢弗领导的阿尔伯塔大学团队开发 Chinook，把开局数据库、alpha-beta 搜索、人工设计的局面评估和逐步扩大的残局数据库结合起来。系统先达到世界冠军级竞技水平，再把重点转向系统枚举和证明标准跳棋的博弈结果。 2007 年团队报告跳棋被“弱求解”：从标准初始局面开始，在双方完美对弈时结果为和棋。证明依赖计算机生成的大规模搜索与残局知识，而不是单场比赛表现。Chinook 由此把游戏 AI 从击败强手推进到数学求解，也展示了软件、计算资源和长期项目积累如何共同完成超大搜索。","en":"Jonathan Schaeffer's University of Alberta team developed Chinook by combining opening databases, alpha-beta search, hand-designed position evaluation, and increasingly large endgame databases. The system first reached world-championship competitive strength and then shifted toward systematic enumeration and proof of the outcome of standard checkers. In 2007, the team reported that checkers had been weakly solved: from the standard initial position, perfect play by both sides leads to a draw. The proof depended on large computer-generated searches and endgame knowledge, not the result of one match. Chinook therefore moved game AI from defeating strong opponents toward mathematical solution and showed how software, computation, and long-term project accumulation can conquer a vast search space."},"method":{"zh":"alpha-beta 搜索加残局数据库","en":"Alpha-beta search plus endgame databases"},"artifact":{"zh":"Chinook 跳棋系统","en":"Chinook checkers system"}},{"storylineId":"gaming-ai","storylineTitle":{"zh":"AI 在棋牌与博弈论的演进","en":"AI in Board & Tabl 法归入任何簇的稀疏点标记为噪声。 这种定义可以发现弯曲或不规则形状的簇，并在聚类过程中显式处理异常点，特别适合空间数据。DBSCAN 对 ε、MinPts 和距离尺度较敏感，在不同区域密度差异很大或高维距离失去区分力时表现会下降。它仍是“以密度发现结构”的经典方法。","en":"DBSCAN defines clusters through neighborhood density instead of a predetermined number of groups. A point is a core point when at least MinPts neighbors lie within radius ε. The algorithm expands from core points through density-reachable neighbors, joining connected high-density regions into clusters and labeling sparse points that belong to none of them as noise. This definition can discover curved or irregular cluster shapes and handles outliers explicitly during clustering, making it especially useful for spatial data. DBSCAN is sensitive to ε, MinPts, and feature scale, and it struggles when different regions have very different densities or when high-dimensional distances lose discrimination. It remains the classic demonstration that clusters can be defined by density rather than centroids."},"method":{"zh":"基于 epsilon 与 MinPts 的密度可达","en":"Density reachability with epsilon and MinPts"},"artifact":{"zh":"DBSCAN 聚类算法","en":"DBSCAN clustering algorithm"}}],"svgText":["Density reachability","密度可达","core point","reachable chain","cluster","DBSCAN · local original explainer"],"svgBytes":1678,"hasViewBox":true,"hasTitle":true,"hasDesc":true,"hasScript":false,"sourceTraceable":true},{"path":"resources/images/bench-council-ai100/explainers/1996-dbscan_noise-core-border.svg","exists":true,"assetIds":["asset-1996-dbscan-noise-core-border"],"roles":["architecture-explainer"],"captions":{"zh":["核心点、边界点与噪声点"],"en":["Core, border, noise points"]},"subcaptions":{"zh":["依据 再访 DBSCAN，再访 制作的本地解释图。"],"en":["Original local explainer based on DBSCAN Revisited, Revisited."]},"rightsStatuses":["documented-in-legacy"],"sourceIds":["source-a-density-based-algorithm-for-discovering-clusters"],"sources":[{"id":"source-a-density-based-algorithm-for-discovering-clusters","type":"paper","reliability":"primary","title":{"zh":"《一种发现簇的基于密度的算法》","en":"A d

bench-council-ai100.json","visual":"imagenet","demoImage":"","description":{"zh":"ImageNet 项目在 2009 年论文中提出以 WordNet 的概念层级组织大规模图像数据库，并通过网络收集与人工标注为每个概念配备大量实例。它把过去相对有限的数据集扩展到数百万张图像和成千上万个类别，使视觉算法能够在更接近真实世界多样性的范围内训练和比较。 随后建立的 ImageNet 大规模视觉识别挑战提供统一任务、训练集和评测指标，让算法进步能够连续追踪，也让 AlexNet 在 2012 年的突破清晰可见。ImageNet 证明数据规模和公开基准本身可以改变研究方向，同时也促使领域认真面对类别设计、标注偏差、数据许可和社会代表性问题。","en":"The 2009 ImageNet paper proposed a large image database organized through the concept hierarchy of WordNet, using web collection and human annotation to supply many examples for each concept. It expanded computer-vision data from comparatively limited collections to millions of images across thousands of categories, allowing algorithms to train and be compared over much greater visual diversity. The later ImageNet Large Scale Visual Recognition Challenge supplied common tasks, training data, and metrics, making progress continuously measurable and AlexNet's 2012 breakthrough unmistakable. ImageNet demonstrated that dataset scale and a public benchmark could redirect an entire field. It also pushed researchers to confront category design, annotation bias, licensing, and social representation in large datasets."},"method":{"zh":"大规模层级图像标注","en":"Large-scale hierarchical image annotation"},"artifact":{"zh":"ImageNet 数据集与 ILSVRC 基准","en":"ImageNet dataset and ILSVRC benchmark"}}],"svgText":["ILSVRC benchmark signal","2010","2011","2012","2014","2015","shared leaderboard pressure"],"svgBytes":933,"hasViewBox":true,"hasTitle":false,"hasDesc":false,"hasScript":false,"sourceTraceable":true},{"path":"resources/images/bench-council-ai100/explainers/2009-imagenet_hierarchy.svg","exists":true,"assetIds":["asset-2009-imagenet-hierarchy"],"roles":["architecture-explainer"],"captions":{"zh":["WordNet 层级"],"en":["WordNet hierarchy"]},"subcaptions":{"zh":["ImageNet 的本地重绘图，依据页面列出的来源材料制作。"],"en":["Local redraw for ImageNet, based on the listed source material."]},"rightsStatuses":["documented-in-legacy"],"sourceIds":["source atson: Beyond Jeopardy!"},"url":"https://doi.org/10.1016/j.artint.2012.06.009"},{"id":"source-building-watson-an-overview-of-the-deepqa-project","type":"paper-page","reliability":"primary","title":{"zh":"构建沃森：DeepQA 项目概览","en":"Building Watson: An Overview of the DeepQA Project"},"url":"https://ojs.aaai.org/aimagazine/index.php/aimagazine/article/view/2303"},{"id":"source-ibm-watson-system-photo","type":"image-source","reliability":"reference-only","title":{"zh":"IBM Watson 系统照片","en":"IBM Watson system photo"},"url":"https://commons.wikimedia.org/wiki/File:IBMWatson.jpg"},{"id":"source-david-ferrucci-portrait","type":"image-source","reliability":"reference-only","title":{"zh":"戴维·费鲁奇 人物照片","en":"David Ferrucci portrait"},"url":"https://commons.wikimedia.org/wiki/File:David_Ferrucci_speaks_at_TEDx_Binghamton_University.jpg"}],"usages":[{"storylineId":"bench-council-ai100","storylineTitle":{"zh":"AI 百大成就（BenchCouncil）","en":"AI Top 100 Achievements (BenchCouncil)"},"eventId":"2011-ibm-watson","eventTitle":{"zh":"IBM Watson","en":"IBM Watson"},"variant":"bench-council-ai100","variantFile":"archive/events/2011-ibm-watson/variants/bench-council-ai100.json","visual":"watson","demoImage":"resources/images/bench-council-ai100/explainers/2011-ibm-watson_evidence-ranking.svg","description":{"zh":"IBM Watson 为《危险边缘！》问答比赛构建 DeepQA 流水线：系统先分析包含双关、隐喻和类别提示的问题，生成多个候选答案，再从百科、词典、新闻和其他语料中寻找证据。数百种分析器分别评估时间、地理、文本匹配和来源可靠性等线索，机器学习模型据此合并分数并估计置信度。 2011 年 Watson 战胜两位顶尖冠军，证明开放域问答可以通过大规模并行证据排序和精细系统工程达到竞赛水平。它并非依靠单一理解模型，也不意味着具备通用常识；其长期影响在于展示候选生成、证据检索、答案评分与置信决策可以组成可审计的问答架构。","en":"IBM built Watson's DeepQA pipeline for the quiz show Jeopardy! . The system analyzed clues containing wordplay, metaphor, and category hints, generated many candidate answers, and searched encyclopedias, dictionaries, news, and other corpora for evidence. Hundreds of analyzers scored temporal, geographic, textual, and source-reliability signals, which machine-learning models combined into answer scores and confidence estimates. Watson defeated two leading champions in 2011, showing that open-domain question answering could reach competition level through massively parallel evidence ranking and careful systems engineering. It did not depend on one general understanding model and did not possess broad common sense. Its lasting contribution was demonstrating an auditable architecture joining candidate generation, evidence retrieval, answer scoring, confidence, and action timing."},"method":{"zh":"DeepQA 证据排序流水线","en":"DeepQA evidence-ranking pipeline"},"artifact":{"zh":"Watson Jeopardy! 系统","en":"Watson Jeopardy! system"}}],"svgText":["Evidence ranking stack","证据排序栈","documents","scorers","confidence","IBM Watson · local original explainer"],"svgBytes":1686,"hasViewBox":true,"hasTitle":true,"hasDesc":true,"hasScript":false,"sourceTraceable":true},{"path":"resources/images/bench-council-ai100/explainers/2013-dqn_q-control.svg","exists":true,"assetIds":["asset-2013-dqn-q-control"],"roles":["architecture-explainer"],"captions":{"zh":["Q 值控制循环"],"en":["Q-value control loop"]},"subcaptions":{"zh":["深度 Q 网络 的本地重绘图，依据页面列出的来源材料制作。"],"en":["Local redraw for Deep Q Network, based on the listed source material."]},"rightsStatuses":["documented-in-legacy"],"sourceIds":["source-playing-atari-with-deep-reinforcement-learning"],"sources":[{"id":"source-playing-atari-with-deep-reinforcement-learning","type":"paper-page","reliability":"primary","title":{"zh":"用深度强化学习玩 Atari","en":"Playing Atari with Deep Reinforcement Learning"},"url":"https://arxiv.org/abs/1312.5602"}],"variantSourceIds":["source-google-deepmind-deep-reinforcement-learning","source-human-level-control-through-deep-reinforcement-learning","source-playing-atari-with-deep-reinforcement-learning"],"variantSources":[{"id":"source-playing-atari-with-deep-reinforcement-learning","type":"paper-page","reliability":"primary","title":{"zh":"用深度强化学习玩 Atari","en":"Playing Atari with Deep Reinforcement Learning"},"url":"https://arxiv.org/abs/1312.5602"},{"id":"source-human-level-control-through-deep-reinforcement-learning","type":"paper","reliability":"primary","title":{"zh":"《通过深度强化学习实现人类水平控制》","en":"Human-level control through deep reinforcement learning"},"url":"https://www.nature.com/articles/nature14236"},{"id":"source-google-deepmind-deep-reinforcement-learning","type":"article","reliability":"secondary","title":{"zh":"谷歌 DeepMind: Deep Reinforcement Learning","en":"Google DeepMind: Deep Reinforcement Learning"},"url":"https://deepmind.google/discover/blog/deep-reinforcement-learning/"}],"usages":[{"storylineId":"bench-council-ai100","storylineTitle":{"zh":"AI 百大成就（BenchCouncil）","en":"AI Top 100 Achievements (BenchCouncil)"},"eventId":"2013-dqn","eventTitle":{"zh":"深度 Q 网络","en":"Deep Q Network"},"variant":"bench-council-ai100","variantFile":"archive/events/2013-dqn/variants/bench-council-ai100.json","visual":"dqn","demoImage":"","description":{"zh":"DeepMind 的 DQN 把卷积神经网络与 Q-learning 结合起来，让智能体直接从 Atari 屏幕像素估计每个动作的长期价值。经验回放随机抽取过去的转移，减少连续样本之间的相关性；固定一段时间的目标网络为自举更新提供较稳定的学习目标。 同一套基本架构在多款游戏中从视觉输入学习策略，证明深度表示可以与强化学习共同工作，而不必为每个游戏手工设计状态特征。DQN 开启深度强化学习的重要浪潮，但仍存在样本效率低、训练不稳定和对奖励设计敏感等问题，后续研究围绕这些限制发展出大量改进。","en":"DeepMind's DQN combined a convolutional neural network with Q-learning so an agent could estimate the long-term value of actions directly from Atari screen pixels. Experience replay sampled past transitions in randomized order, reducing correlations between consecutive observations. A target network held parameters fixed for intervals, providing a more stable target for bootstrapped updates. The same basic architecture learned policies across many games from visual input without hand-designing a separate state representation for each one. DQN became a major bridge from classical reinforcement learning to deep reinforcement learning. It still required large amounts of experience and could be unstable or sensitive to reward design, limitations that motivated a broad family of later improvements."},"method":{"zh":"结合卷积网络、经验回放与目标网络的 Q 学习","en":"Q-learning with convolutional networks, replay, and target networks"},"artifact":{"zh":"能玩 Atari 的深度 Q 网络","en":"Atari-playing Deep Q Network"}},{"storylineId":"gaming-ai","storylineTitle":{"zh":"AI 在棋牌与博弈论的演进","en":"AI in Board & Tabletop Games"},"eventId":"2013-dqn","eventTitle":{"zh":"深度 Q 网络","en":"Deep Q Network"},"variant":"gaming-ai","variantFile":"archive/events/2013-dqn/variants/gaming-ai.json","visual":"dqn","demoImage":"","description":{"zh":"DQN 把深度神经网络与强化学习结合起来，让 Atari 成为标志性基准。智能体用经验回放和目标网络直接从像素学习价值函数，在多款游戏上取得强表现。它成为经典强化学习走向深度强化学习的关键桥梁。","en":"DQN joined deep neural networks with reinforcement learning and made Atari a landmark benchmark. The agent learned values directly from pixels using experience replay and a target network, reaching strong performance across multiple games. It became a central bridge from classic RL to deep RL."},"method":{"zh":"结合卷积网络、经验回放与目标网络的 Q 学习","en":"Q-learning with convolutional networks, replay, and target networks"},"artifact":{"zh":"能玩 Atari 的深度 Q 网络","en":"Atari-playing Deep Q Network"}}],"svgText":["Q-value control loop","pixels","Q net","values","action","reward updates future value"],"svgBytes":909,"hasViewBox":true,"hasTitle":false,"hasDesc":false,"hasScript":false,"sourceTraceable":true},{"path":"resources/images/bench-council-ai100/explainers/2013-dqn_replay-buffer.svg","exists":true,"assetIds":["asset-2013-dqn-replay-buffer"],"roles":["architecture-explainer"],"captions":{"zh":["经验回放池"],"en":["Replay buffer"]},"subcaptions":{"zh":["深度 Q 网络 的本地重绘图，依据页面列出的来源材料制作。"],"en":["Local redraw for Deep Q Network, based on the listed source material."]},"rightsStatuses":["documented-in-legacy"],"sourceIds":["source-playing-atari-with-deep-reinforcement-learning"],"sources":[{"id":"source-playing-atari-with-deep-reinforcement-learning","type":"paper-page","reliability":"primary","title":{"zh":"用深度强化学习玩 Atari","en":"Playing Atari with Deep Reinforcement Learning"},"url":"https://arxiv.org/abs/1312.5602"}],"variantSourceIds":["source-google-deepmind-deep-reinforcement-learning","source-human-level-control-through-deep-reinforcement-learning","source-playing-atari-with-deep-reinforcement-learning"],"variantSources":[{"id":"source-playing-atari-with-deep-reinforcement-learning","type":"paper-page","reliability":"primary","title":{"zh":"用深度强化学习玩 Atari","en":"Playing Atari with Deep Reinforcement Learning"},"url":"https://arxiv.org/abs/1312.5602"},{"id":"source-human-level-control-through-deep-reinforcement-learning","type":"paper","reliability":"primary","title":{"zh":"《通过深度强化学习实现人类水平控制》","en":"Human-level control through deep reinforcement learning"},"url":"https://www.nature.com/articles/nature14236"},{"id":"source-google-deepmind-deep-reinforcement-learning","type":"article","reliability":"secondary","title":{"zh":"谷歌 DeepMind: Deep Reinforcement Learning","en":"Google DeepMind: Deep Reinforcement Learning"},"url":"https://deepmind.google/discover/blog/deep-reinforcement-learning/"}],"usages":[{"storylineId":"bench-council-ai100","storylineTitle":{"zh":"AI 百大成就（BenchCouncil）","en":"AI Top 100 Achievements (BenchCouncil)"},"eventId":"2013-dqn","eventTitle":{"zh":"深度 Q 网络","en":"Deep Q Network"},"variant":"bench-council-ai100","variantFile":"archive/events/2013-dqn/variants/bench-council-ai100.json","visual":"dqn","demoImage":"","description":{"zh":"DeepMind 的 DQN 把卷积神经网络与 Q-learning 结合起来，让智能体直接从 Atari 屏幕像素估计每个动作的长期价值。经验回放随机抽取过去的转移，减少连续样本之间的相关性；固定一段时间的目标网络为自举更新提供较稳定的学习目标。 同一套基本架构在多款游戏中从视觉输入学习策略，证明深度表示可以与强化学习共同工作，而不必为每个游戏手工设计状态特征。DQN 开启深度强化学习的重要浪潮，但仍存在样本效率低、训练不稳定和对奖励设计敏感等问题，后续研究围绕这些限制发展出大量改进。","en":"DeepMind's DQN combined a convolutional neural network with Q-learning so an agent could estimate the long-term value of actions directly from Atari screen pixels. Experience replay sampled past transitions in randomized order, reducing correlations between consecutive observations. A target network held parameters fixed for intervals, providing a more stable target for bootstrapped updates. The same basic architecture learned policies across many games from visual input without hand-designing a separate state representation for each one. DQN became a major bridge from classical reinforcement learning to deep reinforcement learning. It still required large amounts of experience and could be unstable or sensitive to reward design, limitations that motivated a broad family of later improvements."},"method":{"zh":"结合卷积网络、经验回放与目标网络的 Q 学习","en":"Q-learning with convolutional networks, replay, and target networks"},"artifact":{"zh":"能玩 Atari 的深度 Q 网络","en":"Atari-playing Deep Q Network"}},{"storylineId":"gaming-ai","storylineTitle":{"zh":"AI 在棋牌与博弈论的演进","en":"AI in Board & Tabletop Games"},"eventId":"2013-dqn","eventTitle":{"zh":"深度 Q 网络","en":"Deep Q Network"},"variant":"gaming-ai","variantFile":"archive/events/2013-dqn/variants/gaming-ai.json","visual":"dqn","demoImage":"","description":{"zh":"DQN 把深度神经网络与强化学习结合起来，让 Atari 成为标志性基准。智能体用经验回放和目标网络直接从像素学习价值函数，在多款游戏上取得强表现。它成为经典强化学习走向深度强化学习的关键桥梁。","en":"DQN joined deep neural networks with reinforcement learning and made Atari a landmark benchmark. The agent learned values directly from pixels using experience replay and a target network, reaching strong performance across multiple games. It became a central bridge from classic RL to deep RL."},"method":{"zh":"结合卷积网络、经验回放与目标网络的 Q 学习","en":"Q-learning with convolutional networks, replay, and target networks"},"artifact":{"zh":"能玩 Atari 的深度 Q 网络","en":"Atari-playing Deep Q Network"}}],"svgText":["DQN experience replay","s,a,r,s'","s,a,r,s'","s,a,r,s'","s,a,r,s'","s,a,r,s'","sample minibatch"],"svgBytes":1284,"hasViewBox":true,"hasTitle":false,"hasDesc":false,"hasScript":false,"sourceTraceable":true},{"path":"resources/images/bench-council-ai100/explainers/2013-vae_latent-sampling.svg","exists":true,"assetIds":["asset-2013-vae-latent-sampling"],"roles":["architecture-explainer"],"captions":{"zh":["变分自编码器 解释图"],"en":["Variational Autoencoder explainer"]},"subcaptions":{"zh":["关于该成就流程的本地原创解释图。"],"en":["Original local explainer for the achievement flow."]},"rightsStatuses":["documented-in-legacy"],"sourceIds":["source-auto-encoding-variational-bayes"],"sources":[{"id":"source-auto-encoding-variational-bayes","type":"paper","reliability":"primary","title":{"zh":"《自动编码变分贝叶斯》","en":"Auto-Encoding Variational Bayes"},"url":"https://arxiv.org/abs/1312.6114"}],"variantSourceIds":["source-auto-encoding-variational-bayes","source-iclr-paper-record","source-variational-autoencoder-overview"],"variantSources":[{"id":"source-auto-encoding-variational-bayes","type":"paper","reliability":"primary","title":{"zh":"《自动编码变分贝叶斯》","en":"Auto-Encoding Variational Bayes"},"url":"https://arxiv.org/abs/1312.6114"},{"id":"source-iclr-paper-record","type":"paper-page","reliability":"secondary","title":{"zh":"ICLR 论文记录","en":"ICLR paper record"},"url":"https://openreview.net/forum?id=33X9fd2-9FyZd"},{"id":"source-variational-autoencoder-overview","type":"encyclopedia-entry","reliability":"secondary","title":{"zh":"变分自编码器概览","en":"Variational autoencoder overview"},"url":"https://en.wikipedia.org/wiki/Variational_autoencoder"}],"usages":[{"storylineId":"bench-council-ai100","storylineTitle":{"zh":"AI 百大成就（BenchCouncil）","en":"AI Top 100 Achievements (BenchCouncil)"},"eventId":"ai100-2013-variational-autoencoder","eventTitle":{"zh":"变分自编码器","en":"Variational Autoencoder"},"variant":"bench-council-ai100","variantFile":"archive/events/ai100-2013-variational-autoencoder/variants/bench-council-ai100.json","visual":"configuredPaper","demoImage":"resources/images/bench-council-ai100/explainers/2013-vae_latent-sampling.svg","description":{"zh":"金马和威灵在 2013 年提出变分自编码器，把神经网络与概率潜变量模型连接起来。编码器不为输入输出单一点，而是估计潜变量分布的均值和方差；通过 z=μ+σε 的重参数化，随机采样可以写成可微计算，使梯度能够穿过潜变量训练编码器和解码器。 目标函数同时要求解码器重构数据，并用 KL 散度让潜分布接近简单先验，形成连续、可采样的表示空间。VAE 支撑生成、异常检测和表示学习，训练通常比 GAN 稳定，但像素级重构目标可能产生较平滑或模糊样本。其核心贡献是让大规模近似贝叶斯推断适配端到端神经训练。","en":"Diederik Kingma and Max Welling introduced the variational autoencoder in 2013, joining neural networks with probabilistic latent-variable models. The encoder does not output one point for an input; it estimates the mean and variance of a latent distribution. Through the reparameterization z=μ+σε, stochastic sampling becomes a differentiable computation, allowing gradients to train both encoder and decoder through the latent variable. The objective asks the decoder to reconstruct data while a KL-divergence term keeps the latent distribution near a simple prior, creating a continuous space that can be sampled. VAEs support generation, anomaly detection, and representation learning and are often more stable to train than GANs, though pixel-level reconstruction can produce smooth or blurry samples. Their central contribution was making scalable approximate Bayesian inference compatible with end-to-end neural training."},"method":{"zh":"变分潜变量学习","en":"Variational latent-variable learning"},"artifact":{"zh":"自动编码变分贝叶斯","en":"Auto-Encoding Variational Bayes"}}],"svgText":["Variational Autoencoder","encoder","input","latent sample","mechanism","decoder","result","Original local SVG redraw; source figures are not copied."],"svgBytes":2372,"hasViewBox":true,"hasTitle":true,"hasDesc":true,"hasScript":false,"sourceTraceable":true},{"path":"resources/images/bench-council-ai100/explainers/2013-word2vec_skipgram-window.svg","exists":true,"assetIds":["asset-2013-word2vec-skipgram-window"],"roles":["architecture-explainer"],"captions":{"zh":["Skip-gram 上下文窗口"],"en":["Skip-gram context window"]},"subcaptions":{"zh":["Word2Vec 的本地重绘图，依据页面列出的来源材料制作。"],"en":["Local redraw for Word2Vec, based on the listed source material."]},"rightsStatuses":["documented-in-legacy"],"sourceIds":["source-efficient-estimation-of-word-representations-in-vector-space"],"sources":[{"id":"source-efficient-estimation-of-word-representations-in-vector-space","type":"paper-page","reliability":"primary","title":{"zh":"向量空间中词表示的高效估计","en":"Efficient Estimation of Word Representations in Vector Space"},"url":"https://arxiv.org/abs/1301.3781"}],"variantSourceIds":["source-distributed-representations-of-words-and-phrases-and-their-compositionality","source-efficient-estimation-of-word-representations-in-vector-space","source-google-code-archive-word2vec"],"variantSources":[{"id":"source-efficient-estimation-of-word-representations-in-vector-space","type":"paper-page","reliability":"primary","title":{"zh":"向量空间中词表示的高效估计","en":"Efficient Estimation of Word Representations in Vector Space"},"url":"https://arxiv.org/abs/1301.3781"},{"id":"source-distributed-representations-of-words-and-phrases-and-their-compositionality","type":"paper","reliability":"primary","title":{"zh":"《词与短语的分布式表示及其组合性》","en":"Distributed Representations of Words and Phrases and their Compositionality"},"url":"https://papers.nips.cc/paper/5021-distributed-representations-of-words-and-phrases-and-their-compositionality"},{"id":"source-google-code-archive-word2vec","type":"code","reliability":"secondary","title":{"zh":"谷歌 代码 archive: word2vec","en":"Google Code archive: word2vec"},"url":"https://code.google.com/archive/p/word2vec/"}],"usages":[{"storylineId":"bench-council-ai100","storylineTitle":{"zh":"AI 百大成就（BenchCouncil）","en":"AI Top 100 Achievements (BenchCouncil)"},"eventId":"2013-word2vec","eventTitle":{"zh":"Word2Vec","en":"Word2Vec"},"variant":"bench-council-ai100","variantFile":"archive/events/2013-word2vec/variants/bench-council-ai100.json","visual":"word2vec","demoImage":"","description":{"zh":"米科洛夫等人在 2013 年提出的 Word2Vec 用浅层神经目标高效学习大规模语料中的词表示。CBOW 根据周围词预测中心词，Skip-gram 则根据中心词预测上下文；负采样和高频词下采样进一步降低训练成本，使数亿乃至更多词元上的训练变得实用。 学习到的稠密向量把分布相似的词放到相近位置，一些语义和句法关系还会表现为方向和距离。这推动 NLP 从稀疏计数特征转向可复用的分布式表示。词向量仍会继承语料偏见，也难以表达一词多义和上下文变化，但它为后来的上下文化语言表示铺平道路。","en":"Word2Vec, introduced by Tomas Mikolov and colleagues in 2013, used shallow neural objectives to learn word representations efficiently from very large corpora. CBOW predicts a center word from its surrounding words, while Skip-gram predicts surrounding context from the center. Negative sampling and subsampling of frequent words further reduced the cost, making training on hundreds of millions or more tokens practical. The resulting dense vectors place words with similar distributions near one another, and some semantic or syntactic relationships appear as directions and distances. This helped move NLP from sparse count features toward reusable distributed representations. Static embeddings still inherit corpus biases and struggle with polysemy and changing context, but they prepared the ground for later contextual language representations."},"method":{"zh":"Skip-gram 与 CBOW 神经词嵌入","en":"Skip-gram and CBOW neural word embeddings"},"artifact":{"zh":"Word2Vec 嵌入工具","en":"Word2Vec embedding toolkit"}}],"svgText":["Skip-gram context window","the","cat","sat","on","mat","center word predicts neighbors"],"svgBytes":1300,"hasViewBox":true,"hasTitle":false,"hasDesc":false,"hasScript":false,"sourceTraceable":true},{"path":"resources/images/bench-council-ai100/explainers/2013-word2vec_vector-analogy.svg","exists":true,"assetIds":["asset-2013-word2vec-vector-analogy"],"roles":["architecture-explainer"],"captions":{"zh":["向量类比"],"en":["Vector analogy"]},"subcaptions":{"zh":["Word2Vec 的本地重绘图，依据页面列出的来源材料制作。"],"en":["Local redraw for Word2Vec, based on the listed source material."]},"rightsStatuses":["documented-in-legacy"],"sourceIds":["source-efficient-estimation-of-word-representations-in-vector-space"],"sources":[{"id":"source-efficient-estimation-of-word-representations-in-vector-space","type":"paper-page","reliability":"primary","title":{"zh":"向量空间中词表示的高效估计","en":"Efficient Estimation of Word Representations in Vector Space"},"url":"https://arxiv.org/abs/1301.3781"}],"variantSourceIds":["source-distributed-representations-of-words-and-phrases-and-their-compositionality","source-efficient-estimation-of-word-representations-in-vector-space","source-google-code-archive-wo nother, and some semantic or syntactic relationships appear as directions and distances. This helped move NLP from sparse count features toward reusable distributed representations. Static embeddings still inherit corpus biases and struggle with polysemy and changing context, but they prepared the ground for later contextual language representations."},"method":{"zh":"Skip-gram 与 CBOW 神经词嵌入","en":"Skip-gram and CBOW neural word embeddings"},"artifact":{"zh":"Word2Vec 嵌入工具","en":"Word2Vec embedding toolkit"}}],"svgText":["Vector analogy","king","queen","man","woman"],"svgBytes":1317,"hasViewBox":true,"hasTitle":false,"hasDesc":false,"hasScript":false,"sourceTraceable":true},{"path":"resources/images/bench-council-ai100/explainers/2014-adam_loss-trajectory.svg","exists":true,"assetIds":["asset-2014-adam-loss-trajectory"],"roles":["architecture-explainer"],"captions":{"zh":["损失地形轨迹"],"en":["Loss landscape trajectory"]},"subcaptions":{"zh":["Adam 优化器 的独立本地重画，依据相关来源材料制作。"],"en":["Distinct local redraw for Adam Optimizer, based on the related source material."]},"rightsStatuses":["local-redraw"],"sourceIds":["source-adam-a-method-for-stochastic-optimization"],"sources":[{"id":"source-adam-a-method-for-stochastic-optimization","type":"paper","reliability":"primary","title":{"zh":"《Adam：一种随机优化方法》","en":"Adam: A Method for Stochastic Optimization"},"url":"https://arxiv.org/abs/1412.6980"}],"variantSourceIds":["source-adam-a-method-for-stochastic-optimization","source-pytorch-torch-optim-adam","source-tensorflow-keras-adam-optimizer"],"variantSources":[{"id":"source-adam-a-method-for-stochastic-optimization","type":"paper","reliability":"primary","title":{"zh":"《Adam：一种随机优化方法》","en":"Adam: A Method for Stochastic Optimization"},"url":"https://arxiv.org/abs/1412.6980"},{"id":"source-pytorch-torch-optim-adam","type":"documentation","reliability":"reference-only","title":{"zh":"PyTorch torch.optim.Adam","en":"PyTorch torch.optim.Adam"},"url":"https://docs.pytorch.org/docs/stable/generated/torch.optim.Adam.html"},{"id":"source-tensorflow-keras-adam-optimizer","type":"documentation","reliability":"reference-only","title":{"zh":"TensorFlow Keras Adam 优化器","en":"TensorFlow Keras Adam optimizer"},"url":"https://www.tensorflow.org/api_docs/python/tf/keras/optimizers/Adam"}],"usages":[{"storylineId":"bench-council-ai100","storylineTitle":{"zh":"AI 百大成就（BenchCouncil）","en":"AI Top 100 Achievements (BenchCouncil)"},"eventId":"2014-adam","eventTitle":{"zh":"Adam 优化器","en":"Adam Optimizer"},"variant":"bench-council-ai100","variantFile":"archive/events/2014-adam/variants/bench-council-ai100.json","visual":"adam","demoImage":"","description":{"zh":"金马和巴在 2014 年提出 Adam，目标是在小批量、噪声大或梯度稀疏的训练条件下，提供计算与内存开销都较低的随机优化方法。Adam 为每个参数维护梯度的一阶矩和二阶矩指数移动平均，并在训练早期进行偏差校正，由此同时获得类似动量的方向积累和自适应步长。 这种更新规则易于实现，且通常能让新模型较快进入可用训练状态，因此成为深度学习框架中的常用默认选项。Adam 并非对所有任务都优于随机梯度下降，泛化表现也依赖学习率、正则化和调度策略；AdamW 等后续方法进一步改进了权重衰减的处理。","en":"Diederik Kingma and Jimmy Ba introduced Adam in 2014 as a computationally and memory-efficient stochastic optimizer for minibatch training, noisy objectives, and sparse gradients. Adam maintains exponential moving averages of each parameter's first and second gradient moments and corrects their early bias, combining momentum-like directional memory with adaptive step sizes. The update is straightforward to implement and often brings a new model into a useful training regime quickly, so it became a common default in deep-learning frameworks. Adam is not universally better than stochastic gradient descent, and its generalization depends on learning rates, regularization, and schedules. Descendants such as AdamW refined how weight decay is applied."},"method":{"zh":"一阶与二阶矩自适应更新","en":"Adaptive first- and second-moment updates"},"artifact":{"zh":"Adam 随机优化器","en":"Adam stochastic optimizer"}}],"svgText":["Loss landscape trajectory","损失地形轨迹","Trajectory · local redraw from source material"],"svgBytes":1171,"hasViewBox":true,"hasTitle":true,"hasDesc":true,"hasScript" ription":{"zh":"金马和巴在 2014 年提出 Adam，目标是在小批量、噪声大或梯度稀疏的训练条件下，提供计算与内存开销都较低的随机优化方法。Adam 为每个参数维护梯度的一阶矩和二阶矩指数移动平均，并在训练早期进行偏差校正，由此同时获得类似动量的方向积累和自适应步长。 这种更新规则易于实现，且通常能让新模型较快进入可用训练状态，因此成为深度学习框架中的常用默认选项。Adam 并非对所有任务都优于随机梯度下降，泛化表现也依赖学习率、正则化和调度策略；AdamW 等后续方法进一步改进了权重衰减的处理。","en":"Diederik Kingma and Jimmy Ba introduced Adam in 2014 as a computationally and memory-efficient stochastic optimizer for minibatch training, noisy objectives, and sparse gradients. Adam maintains exponential moving averages of each parameter's first and second gradient moments and corrects their early bias, combining momentum-like directional memory with adaptive step sizes. The update is straightforward to implement and often brings a new model into a useful training regime quickly, so it became a common default in deep-learning frameworks. Adam is not universally better than stochastic gradient descent, and its generalization depends on learning rates, regularization, and schedules. Descendants such as AdamW refined how weight decay is applied."},"method":{"zh":"一阶与二阶矩自适应更新","en":"Adaptive first- and second-moment updates"},"artifact":{"zh":"Adam 随机优化器","en":"Adam stochastic optimizer"}}],"svgText":["Adam moment traces","Adam 一阶/二阶矩曲线","Trace · local redraw from source material"],"svgBytes":1132,"hasViewBox":true,"hasTitle":true,"hasDesc":true,"hasScript":false,"sourceTraceable":true},{"path":"resources/images/bench-council-ai100/explainers/2014-attention_alignment.svg","exists":true,"assetIds":["asset-2014-attention-alignment"],"roles":["architecture-explainer"],"captions":{"zh":["注意力对齐图"],"en":["Attention alignment map"]},"subcaptions":{"zh":["关于源令牌注意力的本地原创解释图。"],"en":["Original local explainer of source-token attention."]},"rightsStatuses":["documented-in-legacy"],"sourceIds":["source-neural-machine-translation-by-jointly-learning-to-align-and-translate"],"sources":[{"id":"source-neural-machine-translation-by-jointly-learning-to-align-and-translate","type":"paper","reliability":"primary","title":{"zh":"《通过联合学习对齐与翻译实现神经机器翻译》","en":"Neural Machine Translation by Jointly Learning to Align and Translate"},"url":"https://arxiv.org/abs/1409.0473"}],"variantSourceIds":["source-attention-mechanism-overview","source-iclr-2015-paper-page","source-neural-machine-translation-by-jointly-learning-to-align-and-translate","source-yoshua-bengio-lab-profile"],"variantSources":[{"id":"source-neural-machine-translation-by-jointly-learning-to-align-and-translate","type":"paper","reliability":"primary","title":{"zh":"《通过联合学习对齐与翻译实现神经机器翻译》","en":"Neural Machine Translation by Jointly Learning to Align and Translate"},"url":"https://arxiv.org/abs/1409.0473"},{"id":"source-iclr-2015-paper-page","type":"paper-page","reliability":"secondary","title":{"zh":"ICLR 2015 论文页面","en":"ICLR 2015 paper page"},"url":"https://iclr.cc/archive/www/doku.php%3Fid=iclr2015:accepted-main.html"},{"id":"source-attention-mechanism-overview","type":"encyclopedia-entry","reliability":"reference-only","title":{"zh":"注意力机制概览","en":"Attention mechanism overview"},"url":"https://en.wikipedia.org/wiki/Attention_(machine_learning)"},{"id":"source-yoshua-bengio-lab-profile","type":"profile","reliability":"reference-only","title":{"zh":"约书亚·本吉奥 Mila 资料","en":"Yoshua Bengio lab profile"},"url":"https://mila.quebec/en/person/yoshua-bengio/"}],"usages":[{"storylineId":"bench-council-ai100","storylineTitle":{"zh":"AI 百大成就（BenchCouncil）","en":"AI Top 100 Achievements (BenchCouncil)"},"eventId":"2014-attention","eventTitle":{"zh":"带注意力机制的神经机器翻译","en":"Neural Machine Translation with Attention"},"variant":"bench-council-ai100","variantFile":"archive/events/2014-attention/variants/bench-council-ai100.json","visual":"attentionSeq","demoImage":"resources/images/bench-council-ai100/explainers/2014-attention_alignment.svg","description":{"zh":"巴赫达瑙、赵京贤和本吉奥在 2014 年改进神经机器翻译，解决编码器必须把整句压缩进单一固定向量的瓶颈。编码器为源句各位置生成表示，解码器每产生一个目标词，就计算与这些位置的匹配分数并归一化为权重，再用加权上下文决定输出。 这种可学习的“软对齐”让模型在翻译长句时动态关注不同词语，同时使对齐关系可以被观察。它最初仍运行在循环编码器—解码器之上，并不是后来的自注意力 Transformer；但它把内容相关的选择变成可微模块，为注意力成为现代序列模型的核心计算原语铺平道路。","en":"Dzmitry Bahdanau, Kyunghyun Cho, and Yoshua Bengio improved neural machine translation in 2014 by removing the bottleneck that forced an encoder to compress an entire sentence into one fixed vector. The encoder produces a representation at each source position. For every target word, the decoder scores its match to those positions, normalizes the scores into weights, and uses the weighted context to produce the output. This learned “soft alignment” lets the model attend dynamically to different words while translating long sentences and makes alignment patterns inspectable. The original method still sat on top of recurrent encoders and decoders and was not the later self-attention Transformer. It nevertheless turned content-dependent selection into a differentiable module and prepared attention to become a central computational primitive of modern sequence models."},"method":{"zh":"可微分对齐注意力","en":"Differentiable alignment attention"},"artifact":{"zh":"加性注意力机制","en":"Additive attention mechanism"}},{"storylineId":"deep-learning","storylineTitle":{"zh":"深度学习分支","en":"Deep Learning"},"eventId":"2014-attention","eventTitle":{"zh":"带注意力机制的神经机器翻译","en":"Neural Machine Translation with Attention"},"variant":"deep-learning","variantFile":"archive/events/2014-attention/variants/deep-learning.json","visual":"attentionSeq","demoImage":"resources/images/bench-council-ai100/explainers/2014-attention_alignment.svg","description":{"zh":"2014 年，兹米特里·巴赫达瑙、赵京贤和约书亚·本吉奥提出用于神经机器翻译的注意力机制。传统编码器需要把整句源文本压缩成一个固定长度向量，而新方法让解码器在生成每个目标词时，为源句各位置计算不同权重并形成当前所需的上下文。 这种“边翻译、边对齐”的方式改善了长句处理，也让模型的关注位置可以被可视化。注意力最初服务于循环编码器—解码器，但它确立了一个更普遍的原则：模型应按当前任务动态选择相关信息。三年后，Transformer 将这一原则扩展为完全基于自注意力的序列架构。","en":"In 2014, Dzmitry Bahdanau, Kyunghyun Cho, and Yoshua Bengio introduced an attention mechanism for neural machine translation. Earlier encoder-decoder systems compressed an entire source sentence into one fixed-length vector. Their method instead allowed the decoder, for every generated target word, to assign different weights to source positions and construct the context needed at that moment. This process learned alignment while translating, improved the handling of longer sentences, and made the model's focus partly visible. Attention first operated inside a recurrent encoder-decoder, but it established a broader principle: a model should dynamically select relevant information for the current computation. Three years later, the Transformer expanded that principle into a sequence architecture based entirely on self-attention."},"method":{"zh":"可微分对齐注意力","en":"Differentiable alignment attention"},"artifact":{"zh":"加性注意力机制","en":"Additive attention mechanism"}}],"svgText":["learned alignment attention","source 1","source 2","source 3","source 4","target word","weighted context vector"],"svgBytes":1586,"hasViewBox":true,"hasTitle":true,"hasDesc":true,"hasScript":false,"sourceTraceable":true},{"path":"resources/images/bench-council-ai100/explainers/2014-conditional-gan_conditioned-generator.svg","exists":true,"assetIds":["asset-2014-conditional-gan-conditioned-generator"],"roles":["architecture-explainer"],"captions":{"zh":["Conditional GAN 解释图"],"en":["Conditional GAN explainer"]},"subcaptions":{"zh":["关于该成就流程的本地原创解释图。"],"en":["Original local explainer for the achievement flow."]},"rightsStatuses":["documented-in-legacy"],"sourceIds":["source-conditional-generative-adversarial-nets"],"sources":[{"id":"source-conditional-generative-adversarial-nets","type":"paper","reliability":"primary","title":{"zh":"《条件生成对抗网络》","en":"Conditional Generative Adversarial Nets"},"url":"https://arxiv.org/abs/1411.1784"}],"variantSourceIds":["source-conditional-generative-adversarial-nets","source-generative-adversarial-nets","source-generative-adversarial-network-overview"],"variantSources":[{"id":"source-conditional-generative-adversarial-nets","type":"paper","reliability":"primary","title":{"zh":"《条件生成对抗网络》","en":"Conditional Generative Adversarial Nets"},"url":"https://arxiv.org/abs/1411.1784"},{"id":"source-generative-adversarial-network-overview","type":"encyclopedia-entry","reliability":"reference-only","title":{"zh":"生成对抗网络概览","en":"Generative adversarial network overview"},"url":"https://en.wikipedia.org/wiki/Generative_adversarial_network"},{"id":"source-generative-adversarial-nets","type":"paper","reliability":"primary","title":{"zh":"《生成对抗网络》","en":"Generative Adversarial Nets"},"url":"https://proceedings.neurips.cc/paper/2014/hash/f033ed80deb0234979a61f95710dbe25-Abstract.html"}],"usages":[{"storylineId":"bench-council-ai100","storylineTitle":{"zh":"AI 百大成就（BenchCouncil）","en":"AI Top 100 Achievements (BenchCouncil)"},"eventId":"ai100-2014-conditional-gan","eventTitle":{"zh":"Conditional GAN","en":"Conditional GAN"},"variant":"bench-council-ai100","variantFile":"archive/events/ai100-2014-conditional-gan/variants/bench-council-ai100.json","visual":"configuredPaper","demoImage":"resources/images/bench-council-ai100/explainers/2014-conditional-gan_conditioned-generator.svg","description":{"zh":"米尔扎和奥辛德罗在 2014 年把辅助信息 y 同时输入 GAN 的生成器和判别器。y 可以是类别标签、属性或其他条件：生成器学习在给定条件下产生样本，判别器则判断样本是否真实且与条件匹配，从而把无方向采样变成可控制生成。 原论文用类别控制数字生成，并探索图像与文本表示的条件关系。这个简单扩展成为后来文本到图像、标签到图像和属性编辑的重要基础。条件本身不能保证生成结果完全服从指令，训练仍会继承 GAN 的不稳定和模式覆盖问题，但它确立了“用外部信息控制生成分布”的通用框架。","en":"Mehdi Mirza and Simon Osindero introduced conditional GANs in 2014 by feeding auxiliary information y to both the generator and discriminator. The condition can be a class label, attribute, or other signal. The generator learns to produce a sample under that condition, while the discriminator judges whether the sample is both real and compatible with it, turning undirected sampling into controllable generation. The original work demonstrated class-controlled digit generation and explored conditional relationships between image and text representations. This simple extension became foundational for text-to-image, label-to-image, and attribute-editing systems. A condition does not guarantee perfect instruction following, and training retains GAN instability and mode-coverage problems, but the work established a general framework for controlling a generated distribution with external information."},"method":{"zh":"条件化对抗训练","en":"Conditioned adversarial training"},"artifact":{"zh":"Conditional GAN 公式化方法","en":"Conditional GAN formulation"}}],"svgText":["Conditional GAN","condition label","input","generator","mechanism","conditioned sample","result","Original local SVG redraw; source figures are not copied."],"svgBytes":2393,"hasViewBox":true,"hasTitle":true,"hasDesc":true,"hasScript":false,"sourceTraceable":true},{"path":"resources/images/bench-council-ai100/explainers/2014-dropout_ensemble-average.svg","exists":true,"assetIds":["asset-2014-dropout-ensemble-average"],"roles":["architecture-explainer"],"captions":{"zh":["近似集成"],"en":["Approximate ensemble"]},"subcaptions":{"zh":["Dropout 的本地重绘图，依据页面列出的来源材料制作。"],"en":["Local redraw for Dropout, based on the listed source material."]},"rightsStatuses":["documented-in-legacy"],"sourceIds":["source-dropout-a-simple-way-to-prevent-neural-networks-from-overfitting"],"sources":[{"id":"source-dropout-a-simple-way-to-prevent-neural-networks-from-overfitting","type":"paper","reliability":"primary","title":{"zh":"《Dropout：防止神经网络过拟合的简单方法》","en":"Dropout: A Simple Way to Prevent Neural Networks from Overfitting"},"url":"https://jmlr.org/papers/v15/srivastava14a.html"}],"variantSourceIds":["source-dropout-a-simple-way-to-prevent-neural-networks-from-overfitting","source-improving-neural-networks-by-preventing-co-adaptation","source-pytorch-torch-nn-dropout"],"variantSources":[{"id":"source-dropout-a-simple-way-to-prevent-neural-networks-from-overfitting","type":"paper","reliability":"primary","title":{"zh":"《Dropout：防止神经网络过拟合的简单方法》","en":"Dropout: A Simple Way to Prevent Neural Networks from Overfitting"},"url":"https://jmlr.org/papers/v15/srivastava14a.html"},{"id":"source-improving-neural-networks-by-preventing-co-adaptation","type":"paper-page","reliability":"reference-only","title":{"zh":"Improving neural networks by preventing co-adaptation","en":"Improving neural networks by preventing co-adaptation"},"url":"https://arxiv.org/abs/1207.0580"},{"id":"source-pytorch-torch-nn-dropout","type":"documentation","reliability":"reference-only","title":{"zh":"PyTorch torch.nn.Dropout","en":"PyTorch torch.nn.Dropout"},"url":"https://docs.pytorch.org/docs/stable/generated/torch.nn.Dropout.html"}],"usages":[{"storylineId":"bench-council-ai100","storylineTitle":{"zh":"AI 百大成就（BenchCouncil）","en":"AI Top 100 Achievements (BenchCouncil)"},"eventId":"2014-dropout","eventTitle":{"zh":"Dropout","en":"Dropout"},"variant":"bench-council-ai100","variantFile":"archive/events/2014-dropout/variants/bench-council-ai100.json","visual":"dropout","demoImage":"","description":{"zh":"Dropout 在训练时以设定概率随机屏蔽一部分神经元及其连接，使网络不能长期依赖固定的特征组合。每次小批量训练都相当于从同一参数集合中抽取一个不同的“变薄网络”；推理时使用完整网络并调整激活尺度，近似汇总许多子网络的预测。 这种简单机制减少特征之间的共同适应，在大型全连接网络中有效缓解过拟合，并成为深度学习的经典正则化方法。Dropout 的收益依赖架构、数据规模和归一化方式，在现代卷积或 Transformer 系统中通常与数据增强、权重衰减等方法配合使用，而不是固定的万能配方。","en":"Dropout randomly masks a chosen fraction of units and their connections during training, preventing a network from depending permanently on fixed combinations of features. Each minibatch effectively trains a different thinned network drawn from shared parameters. At inference time the full network is used with appropriately scaled activations, approximating an average over many subnetworks. The simple mechanism reduced co-adaptation and helped control overfitting in large fully connected networks, becoming a classic deep-learning regularizer. Its benefit depends on architecture, dataset scale, and normalization choices. In modern convolutional and Transformer systems it is usually one element of a broader recipe that can also include augmentation, weight decay, and other regularization methods."},"method":{"zh":"随机变薄网络进行正则化","en":"Randomly thinned networks for regularization"},"artifact":{"zh":"Dropout 训练与推理规则","en":"Dropout training and inference rule"}}],"svgText":["Approximate model averaging","mask 1","mask 2","mask 3","test","many thinned networks, one scaled prediction"],"svgBytes":1079,"hasViewBox":true,"hasTitle":false,"hasDesc":false,"hasScript":false,"sourceTraceable":true},{"path":"resources/images/bench-council-ai100/explainers/2014-dropout_random-mask.svg","exists":true,"assetIds":["asset-2014-dropout-random-mask"],"roles":["architecture-explainer"],"captions":{"zh":["随机单元掩码"],"en":["Random unit mask"]},"subcaptions":{"zh":["Dropout 的本地重绘图，依据页面列出的来源材料制作。"],"en":["Local redraw for Dropout, based on the listed source material."]},"rightsStatuses":["documented-in-legacy"],"sourceIds":["source-dropout-a-simple-way-to-prevent-neural-networks-from-overfitting"],"sources":[{"id":"source-dropout-a-simple-way-to-prevent-neural-networks-from-overfitting","type":"paper","reliability":"primary","title":{"zh":"《Dropout：防止神经网络过拟合的简单方法》","en":"Dropout: A Simple Way to Prevent Neural Networks from Overfitting"},"url":"https://jmlr.org/papers/v15/srivastava14a.html"}],"variantSourceIds":["source-dropout-a-simple-way-to-prevent-neural-networks-from-overfitting","source-improving-neural-networks-by-preventing-co-adaptation","source-pytorch-torch-nn-dropout"],"variantSources":[{"id":"source-dropout-a-simple-way-to-prevent-neural-networks-from-overfitting","type":"paper","reliability":"primary","title":{"zh":"《Dropout：防止神经网络过拟合的简单方法》","en":"Dropout: A Simple Way to Prevent Neural Networks from Overfitting"},"url":"https://jmlr.org/papers/v15/srivastava14a.html"},{"id":"source-improving-neural-networks-by-preventing-co-adaptation","type":"paper-page","reliability":"reference-only","title":{"zh":"Improving neural networks by preventing co-adaptation","en":"Improving neural networks by preventing co-adaptation"},"url":"https://arxiv.org/abs/1207.0580"},{"id":"source-pytorch-torch-nn-dropout","type":"documentation","reliability":"reference-only","title":{"zh":"PyTorch torch.nn.Dropout","en":"PyTorch torch.nn.Dropout"},"url":"https://docs.pytorch.org/docs/stable/generated/torch.nn.Dropout.html"}],"usages":[{"storylineId":"bench-council-ai100","storylineTitle":{"zh":"AI 百大成就（BenchCouncil）","en":"AI Top 100 Achievements (BenchCouncil)"},"eventId":"2014-dropout","eventTitle":{"zh":"Dropout","en":"Dropout"},"variant":"bench-council-ai100","variantFile":"archive/events/2014-dropout/variants/bench-council-ai100.json","visual":"dropout","demoImage":"","description":{"zh":"Dropout 在训练时以设定概率随机屏蔽一部分神经元及其连接，使网络不能长期依赖固定的特征组合。每次小批量训练都相当于从同一参数集合中抽取一个不同的“变薄网络”；推理时使用完整网络并调整激活尺度，近似汇总许多子网络的预测。 这种简单机制减少特征之间的共同适应，在大型全连接网络中有效缓解过拟合，并成为深度学习的经典正则化方法。Dropout 的收益依赖架构、数据规模和归一化方式，在现代卷积或 Transformer 系统中通常与数据增强、权重衰减等方法配合使用，而不是固定的万能配方。","en":"Dropout randomly masks a chosen fraction of units and their connections during training, preventing a network from depending permanently on fixed combinations of features. Each minibatch effectively trains a different thinned network drawn from shared parameters. At inference time the full network is used with appropriately scaled activations, approximating an average over many subnetworks. The simple mechanism reduced co-adaptation and helped control overfitting in large fully connected networks, becoming a classic deep-learning regularizer. Its benefit depends on architecture, dataset scale, and normalization choices. In modern convolutional and Transformer systems it is usually one element of a broader recipe that can also include augmentation, weight decay, and other regularization methods."},"method":{"zh":"随机变薄网络进行正则化","en":"Randomly thinned networks for regularization"},"artifact":{"zh":"Dropout 训练与推理规则","en":"Dropout training and inference rule"}}],"svgText":["Dropout random mask","masked units cannot co-adapt"],"svgBytes":1610,"hasViewBox":true,"hasTitle":false,"hasDesc":false,"hasScript":false,"sourceTraceable":true},{"path":"resources/images/bench-council-ai100/explainers/2014-gan_adversarial-loop.svg","exists":true,"assetIds":["asset-2014-gan-adversarial-loop"],"roles":["architecture-explainer"],"captions":{"zh":["GAN 对抗循环"],"en":["GAN adversarial loop"]},"subcaptions":{"zh":["关于生成器-判别器训练的本地原创解释图。"],"en":["Original local explainer of generator-discriminator training."]},"rightsStatuses":["documented-in-legacy"],"sourceIds":["source-generative-adversarial-nets"],"sources":[{"id":"source-generative-adversarial-nets","type":"paper","reliability":"primary","title":{"zh":"《生成对抗网络》","en":"Generative Adversarial Nets"},"url":"https://arxiv.org/abs/1406.2661"}],"variantSourceIds":["source-generative-adversarial-nets","source-goodfellow-gan-tutorial","source-ian-goodfellow-profile","source-neurips-paper-page"],"variantSources":[{"id":"source-generative-adversarial-nets","type":"paper","reliability":"primary","title":{"zh":"《生成对抗网络》","en":"Generative Adversarial Nets"},"url":"https://arxiv.org/abs/1406.2661"},{"id":"source-neurips-paper-page","type":"paper-page","reliability":"secondary","title":{"zh":"NeurIPS 论文页面","en":"NeurIPS paper page"},"url":"https://papers.nips.cc/paper/5423-generative-adversarial-nets"},{"id":"source-goodfellow-gan-tutorial","type":"paper-page","reliability":"reference-only","title":{"zh":"古德费洛 GAN 教程","en":"Goodfellow GAN tutorial"},"url":"https://arxiv.org/abs/1701.00160"},{"id":"source-ian-goodfellow-profile","type":"personal-page","reliability":"primary","title":{"zh":"伊恩·古德费洛个人主页","en":"Ian Goodfellow personal homepage"},"url":"https://www.iangoodfellow.com/"}],"usages":[{"storylineId":"bench-council-ai100","storylineTitle":{"zh":"AI 百大成就（BenchCouncil）","en":"AI Top 100 Achievements (BenchCouncil)"},"eventId":"2014-gan","eventTitle":{"zh":"生成对抗网络","en":"Generative Adversarial Networks"},"variant":"bench-council-ai100","variantFile":"archive/events/2014-gan/variants/bench-council-ai100.json","visual":"gan","demoImage":"resources/images/bench-council-ai100/explainers/2014-gan_adversarial-loop.svg","description":{"zh":"古德费洛等人在 2014 年提出生成对抗网络，把生成建模写成两个神经网络的博弈。生成器把随机噪声转换为候选样本，判别器学习区分真实数据与生成结果；生成器则根据判别器反馈调整参数，目标是让生成分布逐渐接近真实分布。 GAN 不需要显式写出复杂概率密度，就能生成清晰图像，并迅速推动图像合成、表示学习和条件生成研究。训练可能出现不稳定、模式崩溃和评价困难，两个网络的平衡也很敏感。尽管扩散模型后来在许多生成任务中占据优势，GAN 建立的对抗学习框架仍深刻影响生成式 AI。","en":"Ian Goodfellow and colleagues introduced generative adversarial networks in 2014 by formulating generative modeling as a game between two neural networks. A generator transforms random noise into candidate samples, while a discriminator learns to distinguish real data from generated outputs. Feedback from the discriminator trains the generator to move its distribution closer to the real one. GANs could produce sharp images without explicitly specifying a complicated probability density and rapidly advanced image synthesis, representation learning, and conditional generation. Training can be unstable, collapse to limited modes, and be difficult to evaluate, while the balance between the two networks is sensitive. Diffusion models later became stronger in many generation tasks, but the adversarial-learning framework established by GANs remains deeply influential."},"method":{"zh":"生成器-判别器对抗训练","en":"Adversarial generator-discriminator training"},"artifact":{"zh":"GAN 框架","en":"GAN framework"}},{"storylineId":"deep-learning","storylineTitle":{"zh":"深度学习分支","en":"Deep Learning"},"eventId":"2014-gan","eventTitle":{"zh":"生成对抗网络","en":"Generative Adversarial Networks"},"variant":"deep-learning","variantFile":"archive/events/2014-gan/variants/deep-learning.json","visual":"gan","demoImage":"resources/images/bench-council-ai100/explainers/2014-gan_adversarial-loop.svg","description":{"zh":"2014 年，伊恩·古德费洛及合作者提出生成对抗网络。生成器把随机噪声变成合成样本，判别器则学习区分真实数据与生成结果；两者在同一个极小极大目标中相互改进，使模型能够在不显式写出数据概率分布的情况下学习生成过程。 原论文证明，在理想条件下，这场博弈会在生成分布与真实分布一致时达到平衡。实际训练常面临不稳定、模式坍塌等困难，但 GAN 很快推动了高质量图像生成、图像翻译、超分辨率和表示学习，也把“用另一个网络提供学习信号”的对抗训练思想带入更广泛的机器学习研究。","en":"In 2014, Ian Goodfellow and collaborators introduced generative adversarial networks. A generator transformed random noise into synthetic samples, while a discriminator learned to distinguish generated outputs from real data. The two networks improved against each other through a shared minimax objective, allowing the system to learn a generative process without explicitly specifying the data probability distribution. The paper showed that, under ideal conditions, the game reaches equilibrium when the generated and real distributions match. Practical training can be unstable and vulnerable to mode collapse, but GANs quickly advanced image synthesis, image translation, super-resolution, and representation learning. They also made adversarial training, in which one network supplies a learning signal to another, a major machine-learning paradigm."},"method":{"zh":"生成器-判别器对抗训练","en":"Adversarial generator-discriminator training"},"artifact":{"zh":"GAN 框架","en":"GAN framework"}}],"svgText":["generator vs discriminator","noise","generator","fake sample","discriminator","real or fake?","feedback improves both players"],"svgBytes":1592,"hasViewBox":true,"hasTitle":true,"hasDesc":true,"hasScript":false,"sourceTraceable":true},{"path":"resources/images/bench-council-ai100/explainers/2014-glove_cooccurrence.svg","exists":true,"assetIds":["asset-2014-glove-cooccurrence"],"roles":["architecture-explainer"],"captions":{"zh":["GloVe 解释图"],"en":["GloVe explainer"]},"subcaptions":{"zh":["关于该成就流程的本地原创解释图。"],"en":["Original local explainer for the achievement flow."]},"rightsStatuses":["documented-in-legacy"],"sourceIds":["source-glove-global-vectors-for-word-representation"],"sources":[{"id":"source-glove-global-vectors-for-word-representation","type":"paper","reliability":"primary","title":{"zh":"《GloVe：用于词表示的全局向量》","en":"GloVe: Global Vectors for Word Representation"},"url":"https://aclanthology.org/D14-1162/"}],"variantSourceIds":["source-acl-anthology-pdf","source-glove-global-vectors-for-word-representation","source-stanford-glove-project-page"],"variantSources":[{"id":"source-glove-global-vectors-for-word-representation","type":"paper","reliability":"primary","title":{"zh":"《GloVe：用于词表示的全局向量》","en":"GloVe: Global Vectors for Word Representation"},"url":"https://aclanthology.org/D14-1162/"},{"id":"source-stanford-glove-project-page","type":"project-page","reliability":"secondary","title":{"zh":"斯坦福 GloVe 项目页面","en":"Stanford GloVe project page"},"url":"https://nlp.stanford.edu/projects/glove/"},{"id":"source-acl-anthology-pdf","type":"paper-file","reliability":"secondary","title":{"zh":"ACL Anthology 论文 PDF","en":"ACL Anthology PDF"},"url":"https://aclanthology.org/D14-1162.pdf"}],"usages":[{"storylineId":"bench-council-ai100","storylineTitle":{"zh":"AI 百大成就（BenchCouncil）","en":"AI Top 100 Achievements (BenchCouncil)"},"eventId":"ai100-2014-glove","eventTitle":{"zh":"GloVe","en":"GloVe"},"variant":"bench-council-ai100","variantFile":"archive/events/ai100-2014-glove/variants/bench-council-ai100.json","visual":"configuredPaper","demoImage":"resources/images/bench-council-ai100/explainers/2014-glove_cooccurrence.svg","description":{"zh":"斯坦福团队在 2014 年提出 GloVe，从整个语料库的词共现矩阵学习向量。模型用加权最小二乘目标，使两个词向量的内积逼近其共现次数的对数，并强调共现概率比所携带的语义信息；高频与极低频组合通过权重函数得到平衡。 GloVe 把传统全局计数统计与稠密神经词向量连接起来，训练后可直接用于相似度、分类和其他 NLP 任务。它与 Word2Vec 一样属于静态表示，同一个词在所有上下文中只有一个向量，也会继承语料偏见；但其公开向量长期成为广泛使用的基线。","en":"The Stanford team introduced GloVe in 2014 to learn vectors from a corpus-wide word co-occurrence matrix. A weighted least-squares objective makes the dot product of two word vectors approximate the logarithm of their co-occurrence count, emphasizing semantic information carried by ratios of co-occurrence probabilities. A weighting function balances very frequent and very rare pairs. GloVe connected traditional global count statistics with dense neural-style embeddings, producing vectors that could be reused for similarity, classification, and other NLP tasks. Like Word2Vec, it is a static representation: one word has the same vector in every context, and corpus biases remain embedded. Its openly distributed vectors nevertheless became a widely used and durable baseline."},"method":{"zh":"全局词向量分解","en":"Global word-vector factorization"},"artifact":{"zh":"GloVe 词嵌入","en":"GloVe word embeddings"}}],"svgText":["GloVe","co-occurrence counts","input","weighted least-squares","log-count objective","mechanism","word vectors","result","Original local SVG redraw; source figures are not copied."],"svgBytes":2490,"hasViewBox":true,"hasTitle":true,"hasDesc":true,"hasScript":false,"sourceTraceable":true},{"path":"resources/images/bench-council-ai100/explainers/2014-ms-coco_context-dataset.svg","exists":true,"assetIds":["asset-2014-ms-coco-context-dataset"],"roles":["architecture-explainer"],"captions":{"zh":["MS COCO 解释图"],"en":["MS COCO explainer"]},"subcaptions":{"zh":["关于该成就流程的本地原创解释图。"],"en":["Original local explainer for the achievement flow."]},"rightsStatuses":["documented-in-legacy"],"sourceIds":["source-microsoft-coco-common-objects-in-context"],"sources":[{"id":"source-microsoft-coco-common-objects-in-context","type":"paper","reliability":"primary","title":{"zh":"《Microsoft COCO：上下文中的常见物体》","en":"Microsoft COCO: Common Objects in Context"},"url":"https://arxiv.org/abs/1405.0312"}],"variantSourceIds":["source-coco-dataset-website","source-eccv-springer-record","source-microsoft-coco-common-objects-in-context"],"variantSources":[{"id":"source-microsoft-coco-common-objects-in-context","type":"paper","reliability":"primary","title":{"zh":"《Microsoft COCO：上下文中的常见物体》","en":"Microsoft COCO: Common Objects in Context"},"url":"https://arxiv.org/abs/1405.0312"},{"id":"source-coco-dataset-website","type":"dataset","reliability":"primary","title":{"zh":"COCO 数据集网站","en":"COCO dataset website"},"url":"https://cocodataset.org/"},{"id":"source-eccv-springer-record","type":"paper-page","reliability":"secondary","title":{"zh":"ECCV Springer 记录","en":"ECCV Springer record"},"url":"https://link.springer.com/chapter/10.1007/978-3-319-10602-1_48"}],"usages":[{"storylineId":"bench-council-ai100","storylineTitle":{"zh":"AI 百大成就（BenchCouncil）","en":"AI Top 100 Achievements (BenchCouncil)"},"eventId":"ai100-2014-ms-coco","eventTitle":{"zh":"MS COCO","en":"MS COCO"},"variant":"bench-council-ai100","variantFile":"archive/events/ai100-2014-ms-coco/variants/bench-council-ai100.json","visual":"configuredPaper","demoImage":"resources/images/bench-council-ai100/explainers/2014-ms-coco_context-dataset.svg","description":{"zh":"Microsoft COCO 在 2014 年把视觉基准重点放在自然场景中的常见物体，而不是居中、背景简单的单个目标。数据集为同一图像中的多个实例提供类别、边界框和像素级分割，并加入图像字幕；物体经常较小、被遮挡，并与其他对象共同出现。 统一数据和评测推动目标检测、实例分割、关键点和字幕生成在共享生态中发展，也让模型必须理解“物体处于什么上下文”。COCO 的类别和图像仍不能代表全部视觉世界，标注规范也会影响比较结果；但其多任务、实例级设计成为现代视觉研究的重要基础设施。","en":"Microsoft COCO shifted visual benchmarking in 2014 toward common objects in natural scenes rather than single centered targets against simple backgrounds. The dataset annotates multiple instances in the same image with categories, bounding boxes, and pixel-level masks and also includes image captions. Objects are often small, occluded, and shown in interaction with other objects. Common data and evaluation accelerated object detection, instance segmentation, keypoints, and captioning within one ecosystem and required models to reason about the context in which objects appear. COCO's categories and images still do not represent the entire visual world, and annotation conventions affect comparisons. Its multitask, instance-level design nevertheless became core infrastructure for modern computer vision."},"method":{"zh":"上下文中的目标基准","en":"Objects in context benchmark"},"artifact":{"zh":"Microsoft COCO 数据集","en":"Microsoft COCO dataset"}}],"svgText":["MS COCO","objects","input","context captions","mechanism","benchmark tasks","result","Original local SVG redraw; source figures are not copied."],"svgBytes":2346,"hasViewBox":true,"hasTitle":true,"hasDesc":true,"hasScript":false,"sourceTraceable":true},{"path":"resources/images/bench-council-ai100/explainers/2014-vgg_depth-configurations.svg","exists":true,"assetIds":["asset-2014-vgg-depth-configurations"],"roles":["architecture-explainer"],"captions":{"zh":["VGG 深度配置对比"],"en":["VGG depth comparison"]},"subcaptions":{"zh":["VGG 网络 的独立本地重画，依据相关来源材料制作。"],"en":["Distinct local redraw for VGG Networks, based on the related source material."]},"rightsStatuses":["local-redraw"],"sourceIds":["source-very-deep-convolutional-networks-for-large-scale-image-recognition"],"sources":[{"id":"source-very-deep-convolutional-networks-for-large-scale-image-recognition","type":"paper","reliability":"primary","title":{"zh":"《用于大规模图像识别的超深卷积网络》","en":"Very Deep Convolutional Networks for Large-Scale Image Recognition"},"url":"https://arxiv.org/abs/1409.1556"}],"variantSourceIds":["source-oxford-vgg-very-deep-convnets","source-torchvision-vgg-model-family","source-very-deep-convolutional-networks-for-large-scale-image-recognition"],"variantSources":[{"id":"source-very-deep-convolutional-networks-for-large-scale-image-recognition","type":"paper","reliability":"primary","title":{"zh":"《用于大规模图像识别的超深卷积网络》","en":"Very Deep Convolutional Networks for Large-Scale Image Recognition"},"url":"https://arxiv.org/abs/1409.1556"},{"id":"source-oxford-vgg-very-deep-convnets","type":"project-page","reliability":"secondary","title":{"zh":"Oxford VGG Very Deep ConvNets","en":"Oxford VGG Very Deep ConvNets"},"url":"https://www.robots.ox.ac.uk/~vgg/research/very_deep/"},{"id":"source-torchvision-vgg-model-family","type":"documentation","reliability":"reference-only","title":{"zh":"TorchVision VGG 模型系列","en":"TorchVision VGG model family"},"url":"https://pytorch.org/vision/stable/models/vgg.html"}],"usages":[{"storylineId":"bench-council-ai100","storylineTitle":{"zh":"AI 百大成就（BenchCouncil）","en":"AI Top 100 Achievements (BenchCouncil)"},"eventId":"2014-vgg","eventTitle":{"zh":"VGG 网络","en":"VGG Networks"},"variant":"bench-council-ai100","variantFile":"archive/events/2014-vgg/variants/bench-council-ai100.json","visual":"vgg","demoImage":"","description":{"zh":"西莫尼扬和齐瑟曼在 2014 年研究卷积网络深度对大规模图像识别的影响。VGG 用规则化方式反复堆叠 3×3 小卷积与池化层，构成 16 层和 19 层等配置；多个小卷积在扩大有效感受野的同时，引入更多非线性，又让整体架构保持一致。 VGG 在 ImageNet 评测中证明了系统增加深度的价值，其清晰结构和公开模型也使它成为广泛使用的特征提取器与迁移学习基线。它的参数量和计算成本较高，后来被残差网络等更高效架构取代，但“小卷积、深堆叠、统一模块”的设计思想持续影响视觉网络。","en":"Karen Simonyan and Andrew Zisserman studied the effect of convolutional-network depth on large-scale image recognition in 2014. VGG repeatedly stacked small 3×3 convolutions and pooling layers in a regular pattern, producing configurations such as VGG-16 and VGG-19. Several small convolutions enlarged the effective receptive field while adding nonlinearities and keeping the architecture uniform. VGG's ImageNet results demonstrated the value of systematically increasing depth, while its clear structure and released models made it a widely used feature extractor and transfer-learning baseline. Its parameter count and computational cost are high, and more efficient residual architectures later displaced it at the frontier. The principles of small filters, deep stacks, and reusable modules nevertheless remained influential."},"method":{"zh":"由 3x3 卷积堆叠出的很深网络","en":"Very deep stacks of 3x3 convolutions"},"artifact":{"zh":"VGG-16 与 VGG-19 架构","en":"VGG-16 and VGG-19 architectures"}}],"svgText":["VGG depth configurations","按权重层数量比较 VGG-11 / 13 / 16 / 19","11 weight layers","VGG-11","13 weight layers","VGG-13","16 weight layers","VGG-16","19 weight layers","VGG-19","Counts follow the configurations reported in Simonyan and Zisserman; bar heights are proportional to weight-layer count."],"svgBytes":2586,"hasViewBox":true,"hasTitle":true,"hasDesc":true,"hasScript":false,"sourceTraceable":true},{"path":"resources/images/bench-council-ai100/explainers/2014-vgg_receptive-field.svg","exists":true,"assetIds":["asset-2014-vgg-receptive-field"],"roles":["architecture-explainer"],"captions":{"zh":["3x3 感受野累积"],"en":["3x3 receptive-field build-up"]},"subcaptions":{"zh":["VGG 网络 的独立本地重画，依据相关来源材料制作。"],"en":[

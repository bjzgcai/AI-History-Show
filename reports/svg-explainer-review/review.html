 instead of a predetermined number of groups. A point is a core point when at least MinPts neighbors lie within radius ε. The algorithm expands from core points through density-reachable neighbors, joining connected high-density regions into clusters and labeling sparse points that belong to none of them as noise. This definition can discover curved or irregular cluster shapes and handles outliers explicitly during clustering, making it especially useful for spatial data. DBSCAN is sensitive to ε, MinPts, and feature scale, and it struggles when different regions have very different densities or when high-dimensional distances lose discrimination. It remains the classic demonstration that clusters can be defined by density rather than centroids."},"method":{"zh":"基于 epsilon 与 MinPts 的密度可达","en":"Density reachability with epsilon and MinPts"},"artifact":{"zh":"DBSCAN 聚类算法","en":"DBSCAN clustering algorithm"}}],"svgText":["Core, border, noise","核心、边界与噪声","core","border","noise","DBSCAN · local original explainer"],"svgBytes":1683,"hasViewBox":true,"hasTitle":true,"hasDesc":true,"hasScript":false,"sourceTraceable":true},{"path":"resources/images/bench-council-ai100/explainers/1996-lasso_coefficient-path.svg","exists":true,"assetIds":["asset-1996-lasso-coefficient-path"],"roles":["architecture-explainer"],"captions":{"zh":["系数路径"],"en":["Coefficient path"]},"subcaptions":{"zh":["Lasso 回归 的独立本地重画，依据相关来源材料制作。"],"en":["Distinct local redraw for Lasso, based on the related source material."]},"rightsStatuses":["documented-in-legacy"],"sourceIds":["source-regression-shrinkage-and-selection-via-the-lasso"],"sources":[{"id":"source-regression-shrinkage-and-selection-via-the-lasso","type":"paper","reliability":"primary","title":{"zh":"《通过 Lasso 进行回归收缩与选择》","en":"Regression Shrinkage and Selection via the Lasso"},"url":"https://rss.onlinelibrary.wiley.com/doi/10.1111/j.2517-6161.1996.tb02080.x"}],"variantSourceIds":["source-glmnet-project","source-regression-shrinkage-and-selection-via-the-lasso","source-scikit-learn-lasso"],"variantSources":[{"id":"source-regression-shrinkage-and-selection-via-the-lasso","type":"paper","reliability":"primary","title":{"zh":"《通过 Lasso 进行回归收缩与选择》","en":"Regression Shrinkage and Selection via the Lasso"},"url":"https://rss.onlinelibrary.wiley.com/doi/10.1111/j.2517-6161.1996.tb02080.x"},{"id":"source-scikit-learn-lasso","type":"documentation","reliability":"reference-only","title":{"zh":"scikit-learn Lasso","en":"scikit-learn Lasso"},"url":"https://scikit-learn.org/stable/modules/generated/sklearn.linear_model.Lasso.html"},{"id":"source-glmnet-project","type":"project-page","reliability":"secondary","title":{"zh":"glmnet project","en":"glmnet project"},"url":"https://glmnet.stanford.edu/"}],"usages":[{"storylineId":"bench-council-ai100","storylineTitle":{"zh":"AI 百大成就（BenchCouncil）","en":"AI Top 100 Achievements (BenchCouncil)"},"eventId":"1996-lasso","eventTitle":{"zh":"Lasso 回归","en":"Lasso"},"variant":"bench-council-ai100","variantFile":"archive/events/1996-lasso/variants/bench-council-ai100.json","visual":"lasso","demoImage":"","description":{"zh":"罗伯特·蒂布希拉尼在 1996 年提出 Lasso，把回归误差与系数绝对值之和构成的 L1 惩罚结合起来。惩罚会同时收缩系数，并让其中一部分精确变为零，因此模型在拟合数据的同时完成变量选择；调节参数控制预测拟合与稀疏程度之间的平衡。 Lasso 把正则化、可解释性和高维建模连接成一种简单的凸优化方法，广泛影响基因组学、信号处理和透明预测模型。它在高度相关的变量之间可能选择不稳定，也不保证识别真实因果因素，但“通过惩罚获得稀疏结构”的思想成为现代统计学习的重要原则。","en":"Robert Tibshirani introduced the Lasso in 1996 by combining regression error with an L1 penalty on the absolute values of the coefficients. The penalty both shrinks coefficients and drives some exactly to zero, so the model performs variable selection while fitting the data. A tuning parameter controls the balance between predictive fit and sparsity. The Lasso connected regularization, interpretability, and high-dimensional modeling in a comparatively simple convex optimization problem, influencing genomics, signal processing, and transparent prediction. Its selections can be unstable among strongly correlated variables, and selected features are not automatically causal. Even so, the principle of using a penalty to discover sparse structure became central to modern statistical learning."},"method":{"zh":"L1 正则化回归与选择","en":"L1-regularized regression and selection"},"artifact":{"zh":"最小绝对收缩与选择算子","en":"Least absolute shrinkage and selection operator"}}],"svgText":["Coefficient path","系数路径","Path · local redraw from source material"],"svgBytes":1258,"hasViewBox":true,"hasTitle":true,"hasDesc":true,"hasScript":false,"sourceTraceable":true},{"path":"resources/images/bench-council-ai100/explainers/1996-lasso_l1-constraint.svg","exists":true,"assetIds":["asset-1996-lasso-l1-constraint"],"roles":["architecture-explainer"],"captions":{"zh":["L1 约束几何"],"en":["L1 constraint geometry"]},"subcaptions":{"zh":["Lasso 回归 的独立本地重画，依据相关来源材料制作。"],"en":["Distinct local redraw for Lasso, based on the related source material."]},"rightsStatuses":["documented-in-legacy"],"sourceIds":["source-regression-shrinkage-and-selection-via-the-lasso"],"sources":[{"id":"source-regression-shrinkage-and-selection-via-the-lasso","type":"paper","reliability":"primary","title":{"zh":"《通过 Lasso 进行回归收缩与选择》","en":"Regression Shrinkage and Selection via the Lasso"},"url":"https://rss.onlinelibrary.wiley.com/doi/10.1111/j.2517-6161.1996.tb02080.x"}],"variantSourceIds":["source-glmnet-project","source-regression-shrinkage-and-selection-via-the-lasso","source-scikit-learn-lasso"],"variantSources":[{"id":"source-regression-shrinkage-and-selection-via-the-lasso","type":"paper","reliability":"primary","title":{"zh":"《通过 Lasso 进行回归收缩与选择》","en":"Regression Shrinkage and Selection via the Lasso"},"url":"https://rss.onlinelibrary.wiley.com/doi/10.1111/j.2517-6161.1996.tb02080.x"},{"id":"source-scikit-learn-lasso","type":"documentation","reliability":"reference-only","title":{"zh":"scikit-learn Lasso","en":"scikit-learn Lasso"},"url":"https://scikit-learn.org/stable/modules/generated/sklearn.linear_model.Lasso.html"},{"id":"source-glmne p-board.svg","exists":true,"assetIds":["asset-1997-deep-blue-chip-board"],"roles":["architecture-explainer"],"captions":{"zh":["硬件辅助棋盘评估"],"en":["Hardware-assisted board evaluation"]},"subcaptions":{"zh":["深蓝 的本地重绘图，依据页面列出的来源材料制作。"],"en":["Local redraw for Deep Blue, based on the listed source material."]},"rightsStatuses":["documented-in-legacy"],"sourceIds":["source-murray-campbell-ibm-research"],"sources":[{"id":"source-murray-campbell-ibm-research","type":"profile","reliability":"reference-only","title":{"zh":"默里·坎贝尔, IBM 研究院","en":"Murray Campbell, IBM Research"},"url":"https://research.ibm.com/people/murray-campbell"}],"variantSourceIds":["source-deep-blue-system-paper","source-ibm100-deep-blue","source-mastering-the-game-computer-history-museum","source-murray-campbell-ibm-research"],"variantSources":[{"id":"source-deep-blue-system-paper","type":"paper","reliability":"primary","title":{"zh":"《Deep Blue》","en":"Deep Blue"},"url":"https://doi.org/10.1016/S0004-3702(01)00129-1"},{"id":"source-murray-campbell-ibm-research","type":"profile","reliability":"reference-only","title":{"zh":"默里·坎贝尔, IBM 研究院","en":"Murray Campbell, IBM Research"},"url":"https://research.ibm.com/people/murray-campbell"},{"id":"source-mastering-the-game-computer-history-museum","type":"archive","reliability":"reference-only","title":{"zh":"Mastering the Game, Computer History Museum","en":"Mastering the Game, Computer History Museum"},"url":"https://www.computerhistory.org/chess/"},{"id":"source-ibm100-deep-blue","type":"official-page","reliability":"secondary","title":{"zh":"IBM100: 深蓝","en":"IBM100: Deep Blue"},"url":"https://www.ibm.com/history/deep-blue"}],"usages":[{"storylineId":"bench-council-ai100","storylineTitle":{"zh":"AI 百大成就（BenchCouncil）","en":"AI Top 100 Achievements (BenchCouncil)"},"eventId":"1997-deep-blue","eventTitle":{"zh":"深蓝","en":"Deep Blue"},"variant":"bench-council-ai100","variantFile":"archive/events/1997-deep-blue/variants/bench-council-ai100.json","visual":"deepblue","demoImage":"","description":{"zh":"IBM 的 Deep Blue 在 1997 年六局比赛中以 3.5 比 2.5 击败卫冕世界冠军加里·卡斯帕罗夫，成为首个在标准比赛条件下战胜现任国际象棋世界冠军的计算机系统。它利用并行 alpha-beta 搜索、国际象棋专用评估函数、开局库、残局知识和定制芯片，每秒检查大量候选局面。 Deep Blue 的成功来自搜索规模、硬件和专家知识的系统工程，而不是像现代系统那样从自我对弈中学习通用表征。它并不意味着获得一般智能，却成为公众理解机器能力的重要转折点，并展示了在规则明确的复杂领域中，计算、启发式搜索和领域知识可以共同超过顶尖人类表现。","en":"IBM's Deep Blue defeated reigning world champion Garry Kasparov by 3.5–2.5 in a six-game match in 1997, becoming the first computer system to defeat a sitting chess world champion under standard match conditions. It combined parallel alpha-beta search, chess-specific evaluation functions, opening books, endgame knowledge, and custom chips to examine enormous numbers of candidate positions. Deep Blue's strength came from systems engineering across search scale, hardware, and expert knowledge, not from learning general representations through self-play in the modern sense. It did not constitute general intelligence, but it became a major public turning point and showed how computation, heuristic search, and domain knowledge could jointly exceed elite human performance in a complex, precisely defined field."},"method":{"zh":"专用国际象棋搜索硬件","en":"Specialized chess search hardware"},"artifact":{"zh":"世界冠军对弈系统","en":"World-champion chess match system"}},{"storylineId":"gaming-ai","storylineTitle":{"zh":"AI 在棋牌与博弈论的演进","en":"AI in Board & Tabletop Games"},"eventId":"1997-deep-blue","eventTitle":{"zh":"深蓝","en":"Deep Blue"},"variant":"gaming-ai","variantFile":"archive/events/1997-deep-blue/variants/gaming-ai.json","visual":"deepblue","demoImage":"","description":{"zh":"深蓝 成为第一个在正式比赛中击败卫冕世界冠军的计算机系统。它结合了强力 alpha-beta 搜索、国际象棋专用评估、开局/残局知识和定制 VLSI 硬件。这是一个公众转折点：AI 可以在高度符号化的游戏中击败顶尖人类专家。","en":"Deep Blue became the first computer system to defeat the reigning world chess champion in a regulation match. The achievement mixed brute-force alpha-beta search, chess-specific evaluation, opening/endgame knowledge, and custom VLSI hardware. It marked a public turning point :"《作为核特征值问题的非线性成分分析》","en":"Nonlinear Component Analysis as a Kernel Eigenvalue Problem"},"url":"https://doi.org/10.1162/089976698300017467"},{"id":"source-max-planck-publication-page","type":"paper-page","reliability":"reference-only","title":{"zh":"马克斯·普朗克出版页面","en":"Max Planck publication page"},"url":"https://is.mpg.de/ei/publications/730"},{"id":"source-open-kernel-pca-pdf","type":"paper-file","reliability":"secondary","title":{"zh":"Kernel PCA 开放 PDF","en":"Open Kernel PCA PDF"},"url":"https://www.mlpack.org/papers/kpca.pdf"},{"id":"source-scikit-learn-kernelpca-documentation","type":"documentation","reliability":"reference-only","title":{"zh":"scikit-learn KernelPCA 文档","en":"scikit-learn KernelPCA documentation"},"url":"https://scikit-learn.org/stable/modules/generated/sklearn.decomposition.KernelPCA.html"}],"usages":[{"storylineId":"bench-council-ai100","storylineTitle":{"zh":"AI 百大成就（BenchCouncil）","en":"AI Top 100 Achievements (BenchCouncil)"},"eventId":"ai100-1997-kernel-pca","eventTitle":{"zh":"Kernel PCA","en":"Kernel PCA"},"variant":"bench-council-ai100","variantFile":"archive/events/ai100-1997-kernel-pca/variants/bench-council-ai100.json","visual":"kernelPca","demoImage":"resources/images/bench-council-ai100/explainers/1997-kernel-pca_eigenmap.svg","description":{"zh":"舍尔科普夫、斯莫拉和穆勒把核技巧应用到主成分分析：先用核函数计算样本间相似度，等价于把数据映射到可能非常高维的特征空间，再对中心化核矩阵求特征向量，而无需显式写出该空间坐标。 普通 PCA 只能寻找原始坐标中的线性方向，Kernel PCA 则能把弯曲流形或非线性变化展开为主要成分，用于降维、去噪和特征提取。结果高度依赖核函数及其参数，计算和存储还会随样本数量增长；但它清楚展示了核方法如何把线性算法扩展到非线性结构。","en":"Bernhard Schölkopf, Alexander Smola, and Klaus-Robert Müller applied the kernel trick to principal component analysis. A kernel function first computes similarities among samples, equivalent to mapping the data into a potentially very high-dimensional feature space. Eigenvectors are then obtained from the centered kernel matrix without explicitly constructing coordinates in that space. Ordinary PCA finds only linear directions in the original coordinates, while Kernel PCA can unfold curved manifolds or nonlinear variation into principal components for dimensionality reduction, denoising, and feature extraction. Results depend strongly on the kernel and its parameters, and computation and storage grow with the number of samples. The method clearly demonstrated how kernels could extend a linear algorithm to nonlinear structure."},"method":{"zh":"核化主成分分析","en":"Kernelized principal component analysis"},"artifact":{"zh":"Kernel PCA 嵌入","en":"Kernel PCA embedding"}}],"svgText":["kernel matrix to nonlinear components","kernel similarities","principal directions in feature space"],"svgBytes":1520,"hasViewBox":true,"hasTitle":false,"hasDesc":false,"hasScript":false,"sourceTraceable":true},{"path":"resources/images/bench-council-ai100/explainers/1997-logistello_pattern-eval.svg","exists":true,"assetIds":["asset-1997-logistello-pattern-eval"],"roles":["architecture-explainer"],"captions":{"zh":["Logistello 模式评估"],"en":["Logistello pattern evaluation"]},"subcaptions":{"zh":["学习型黑白棋评估的原创解释图。"],"en":["Original explainer for learned Othello evaluation."]},"rightsStatuses":["documented-in-legacy"],"sourceIds":["source-logistello-homepage"],"sources":[{"id":"source-logistello-homepage","type":"project-page","reliability":"primary","title":{"zh":"Logistello 主页","en":"Logistello homepage"},"url":"https://skatgame.net/mburo/log.html"}],"variantSourceIds":["source-logistello-homepage","source-michael-buro-publications","source-murakami-vs-logistello","source-statistical-feature-combination"],"variantSources":[{"id":"source-logistello-homepage","type":"project-page","reliability":"primary","title":{"zh":"Logistello 主页","en":"Logistello homepage"},"url":"https://skatgame.net/mburo/log.html"},{"id":"source-murakami-vs-logistello","type":"report","reliability":"reference-only","title":{"zh":"村上健对 Logistello","en":"Murakami vs. Logistello"},"url":"https://skatgame.net/mburo/event.html"},{"id":"source-statistical-feature-combination","type":"paper","reliability":"secondary","title":{"zh":"《统计特征组合》","en":"Statistical Feature Combination"},"url":"https://arxiv.org/abs/cs/9512106"},{"id":"source-michael-buro-publications","type":"paper-index","reliability":"reference-only","title":{"zh":"迈克尔·布罗论文列表","en":"Michael Buro publications"},"url":"https://skatgame.net/mburo/publications.html"}],"usages":[{"storylineId":"gaming-ai","storylineTitle":{"zh":"AI 在棋牌与博弈论的演进","en":"AI in Board & Tabletop Games"},"eventId":"1997-logistello","eventTitle":{"zh":"Logistello：黑白棋评估函数学习","en":"Logistello: Learning Evaluation for Othello"},"variant":"gaming-ai","variantFile":"archive/events/1997-logistello/variants/gaming-ai.json","visual":"configuredPaper","demoImage":"resources/images/bench-council-ai100/explainers/1997-logistello_pattern-eval.svg","description":{"zh":"Logistello 在 1997 年黑白棋对局中以 6 比 0 击败世界冠军村上健。Michael Buro 将选择性博弈树搜索、基于棋盘模式的评估、统计特征学习、开局库学习和强残局求解结合起来，说明学习得到的评估函数可以在紧凑棋盘游戏中超过手工启发式规则。","en":"Logistello defeated world champion Takeshi Murakami 6-0 in a 1997 Othello match. Michael Buro combined selective game-tree search, pattern-based evaluation, statistical feature learning, opening-book learning, and strong endgame solving, showing that learned evaluation could outperform hand-crafted heuristics in a compact board game."},"method":{"zh":"模式评估学习与选择性 alpha-beta 搜索","en":"Pattern evaluation learning with selective alpha-beta search"},"artifact":{"zh":"世界冠军级黑白棋程序","en":"World-champion-level Othello program"}}],"svgText":["Logistello: learned Othello evaluation","patterns + regression weights + selective search","board patterns","learned","weights","keep","cut","Multi-ProbCut","Interaction: toggle corner, mobility, parity, and endgame weights."],"svgBytes":3830,"hasViewBox":true,"hasTitle":true,"hasDesc":true,"hasScript":false,"sourceTraceable":true},{"path":"resources/images/bench-council-ai100/explainers/1997-lstm_gated-memory.svg","exists":true,"assetIds":["asset-1997-lstm-gated-memory"],"roles":["architecture-explainer"],"captions":{"zh":["LSTM 门控记忆单元"],"en":["LSTM gated memory cell"]},"subcaptions":{"zh":["关于门控序列记忆的本地原创解释图。"],"en":["Original local explainer of gated sequence memory."]},"rightsStatuses":["documented-in-legacy"],"sourceIds":["source-long-short-term-memory"],"sources":[{"id":"source-long-short-term-memory","type":"paper","reliability":"primary","title":{"zh":"《长短期记忆》","en":"Long Short-Term Memory"},"url":"https://doi.org/10.1162/neco.1997.9.8.1735"}],"variantSourceIds":["source-author-hosted-lstm-paper-pdf","source-long-short-term-memory","source-lstm-overview","source-sepp-hochreiter-profile"],"variantSources":[{"id":"source-long-short-term-memory","type":"paper","reliability":"primary","title":{"zh":"《长短期记忆》","en":"Long Short-Term Memory"},"url":"https://doi.org/10.1162/neco.1997.9.8.1735"},{"id":"source-author-hosted-lstm-paper-pdf","type":"paper-file","reliability":"secondary","title":{"zh":"作者托管的 LSTM 论文 PDF","en":"Author-hosted LSTM paper PDF"},"url":"https://www.bioinf.jku.at/publications/older/2604.pdf"},{"id":"source-lstm-overview","type":"encyclopedia-entry","reliability":"reference-only","title":{"zh":"LSTM 概览","en":"LSTM overview"},"url":"https://en.wikipedia.org/wiki/Long_short-term_memory"},{"id":"source-sepp-hochreiter-profile","type":"profile","reliability":"reference-only","title":{"zh":"塞普·霍赫赖特个人资料","en":"Sepp Hochreiter profile"},"url":"https://www.jku.at/en/institute-for-machine-learning/about-us/team/sepp-hochreiter/"}],"usages":[{"storylineId":"bench-council-ai100","storylineTitle":{"zh":"AI 百大成就（BenchCouncil）","en":"AI Top 100 Achievements (BenchCouncil)"},"eventId":"1997-lstm","eventTitle":{"zh":"LSTM 与门控记忆","en":"LSTM and Gated Memory"},"variant":"bench-council-ai100","variantFile":"archive/events/1997-lstm/variants/bench-council-ai100.json","visual":"lstm","demoImage":"resources/images/bench-council-ai100/explainers/1997-lstm_gated-memory.svg","description":{"zh":"霍赫赖特和施密德胡伯在 1997 年提出 LSTM，缓解循环神经网络在长序列上梯度消失或爆炸的问题。核心记忆单元通过近似恒定的自连接让误差信号沿时间传播，输入门控制何时写入，输出门控制何时读取，从而把短期计算与较长期状态分开。 原始 LSTM 并不包含后来标准架构中的遗忘门；遗忘机制由后续工作加入，使网络可以主动清除旧状态。LSTM 及其变体曾广泛用于语音识别、翻译、手写识别和时间序列，在注意力模型占据主导前，使长距离序列学习成为实用技术，并确立门控信息流的设计范式。","en":"Sepp Hochreiter and Jürgen Schmidhuber introduced LSTM in 1997 to address vanishing or exploding gradients across long recurrent sequences. Its central memory cell uses an approximately constant self-connection so error signals can travel through time. An input gate controls when information is written, and an output gate controls when it is read, separating short-term computation from longer-lived state. The original LSTM did not contain the forget gate found in later standard architectures; subsequent work added forgetting so the network could actively clear obsolete state. LSTM variants became widely used in speech recognition, translation, handwriting recognition, and time-series modeling. Before attention models became dominant, they made long-range sequence learning practical and established gated information flow as a durable design pattern."},"method":{"zh":"门控循环记忆","en":"Gated recurrent memory"},"artifact":{"zh":"LSTM 单元","en":"LSTM cell"}},{"storylineId":"deep-learning","storylineTitle":{"zh":"深度学习分支","en":"Deep Learning"},"eventId":"1997-lstm","eventTitle":{"zh":"LSTM 与门控记忆","en":"LSTM and Gated Memory"},"variant":"deep-learning","variantFile":"archive/events/1997-lstm/variants/deep-learning.json","visual":"lstm","demoImage":"resources/images/bench-council-ai100/explainers/1997-lstm_gated-memory.svg","description":{"zh":"1997 年，塞普·霍赫赖特和于尔根·施密德胡伯提出长短期记忆网络，针对普通循环网络在长序列训练中容易出现的梯度衰减问题。原始 LSTM 通过记忆单元、输入门和输出门控制信息写入与读取，并用近似恒定的误差通路让学习信号跨越更多时间步。 后续版本又加入遗忘门，使模型能够主动清除不再需要的状态。LSTM 因而成为语音识别、手写识别、机器翻译和时间序列建模的核心架构之一，也说明在注意力机制普及之前，门控状态可以有效延长神经网络的记忆范围。","en":"In 1997, Sepp Hochreiter and Juergen Schmidhuber introduced long short-term memory to address the decay of learning signals in ordinary recurrent networks. The original LSTM used memory cells with input and output gates to control writing and reading, together with a nearly constant error path that allowed useful gradients to cross many more time steps. Later variants added a forget gate so the network could actively discard obsolete state. LSTM consequently became a core architecture for speech recognition, handwriting recognition, machine translation, and time-series modeling. Before attention mechanisms became dominant, it showed that gated state could substantially extend the practical memory of a neural network."},"method":{"zh":"门控循环记忆","en":"Gated recurrent memory"},"artifact":{"zh":"LSTM 单元","en":"LSTM cell"}}],"svgText":["Original 1997 LSTM cell","Input gate + constant error carousel + output gate","input","gate","cell","state","output","gate","No forget gate in the 1997 architecture; that gate was introduced in later LSTM variants."],"svgBytes":2118,"hasViewBox":true,"hasTitle":true,"hasDesc":true,"hasScript":false,"sourceTraceable":true},{"path":"resources/images/bench-council-ai100/explainers/1999-nmf_parts-factorization.svg","exists":true,"assetIds":["asset-1999-nmf-parts-factorization"],"roles":["architecture-explainer"],"captions":{"zh":["基于部件的分解"],"en":["Parts-based factorization"]},"subcaptions":{"zh":["关于非负部件分解的本地原创解释图。"],"en":["Original local explainer of nonnegative parts-based factorization."]},"rightsStatuses":["documented-in-legacy"],"sourceIds":["source-learning-the-parts-of-objects-by-non-negative-matrix-factorization"],"sources":[{"id":"source-learning-the-parts-of-objects-by-non-negative-matrix-factorization","type":"paper","reliability":"primary","title":{"zh":"《通过非负矩阵分解学习物体部件》","en":"Learning the parts of objects by non-negative matrix factorization"},"url":"https://doi.org/10.1038/44565"}],"variantSourceIds":["source-learning-the-parts-of-objects-by-non-negative-matrix-factorization","source-nature-article-page","source-pubmed-record-for-the-nature-paper","source-scikit-learn-nmf-documentation"],"variantSources":[{"id":"source-learning-the-parts-of-objects-by-non-negative-matrix-factorization","type":"paper","reliability":"primary","title":{"zh":"《通过非负矩阵分解学习物体部件》","en":"Learning the parts of objects by non-negative matrix factorization"},"url":"https://doi.org/10.1038/44565"},{"id":"source-nature-article-page","type":"paper-page","reliability":"reference-only","title":{"zh":"Nature 文章页面","en":"Nature article page"},"url":"https://www.nature.com/articles/44565"},{"id":"source-pubmed-record-for-the-nature-paper","type":"paper-index","reliability":"secondary","title":{"zh":"Nature 论文 PubMed 记录","en":"PubMed record for the Nature paper"},"url":"https://pubmed.ncbi.nlm.nih.gov/10548103/"},{"id":"source-scikit-learn-nmf-documentation","type":"documentation","reliability":"reference-only","title":{"zh":"scikit-learn NMF 文档","en":"scikit-learn NMF documentation"},"url":"https://scikit-learn.org/stable/modules/decomposition.html#nmf"}],"usages":[{"storylineId":"bench-council-ai100","storylineTitle":{"zh":"AI 百大成就（BenchCouncil）","en":"AI Top 100 Achievements (BenchCouncil)"},"eventId":"ai100-1999-nmf","eventTitle":{"zh":"非负矩阵分解","en":"NMF"},"variant":"bench-council-ai100","variantFile":"archive/events/ai100-1999-nmf/variants/bench-council-ai100.json","visual":"nmf","demoImage":"resources/images/bench-council-ai100/explainers/1999-nmf_parts-factorization.svg","description":{"zh":"李和承在 1999 年展示非负矩阵分解如何把一个非负数据矩阵近似为两个较小非负矩阵的乘积。由于系数不能通过正负抵消来表达样本，重构只能把若干基础成分相加；在人脸实验中，这些成分常对应眼睛、鼻子等局部部件。 NMF 因此提供了与 PCA 整体正负基向量不同的“部件式”表示，并被用于文本主题、音频分离、生物数据和推荐系统。分解通常不唯一，优化可能停在局部解，部件也并非必然具有语义；但非负约束如何促进稀疏、可解释表示成为重要思想。","en":"Daniel Lee and H. Sebastian Seung showed in 1999 how non-negative matrix factorization approximates a non-negative data matrix as the product of two smaller non-negative matrices. Because coefficients cannot represent an example by canceling positive and negative components, reconstruction must add basis elements together. In face experiments, those elements often corresponded to local parts such as eyes or noses. NMF therefore offered a “parts-based” representation unlike the holistic positive-and-negative directions of PCA and was applied to text topics, audio separation, biological data, and recommendation. A factorization is generally not unique, optimization can stop at local solutions, and learned parts are not guaranteed to have human meaning. Even so, the way non-negativity can encourage sparse, interpretable representation became influential."},"method":{"zh":"非负矩阵分解","en":"Nonnegative matrix factorization"},"artifact":{"zh":"基于部件的表示","en":"Parts-based representation"}}],"svgText":["Nonnegative matrix factorization","V ≈ W × H, with every matrix entry constrained to be nonnegative","data V","≈","basis W","×","weights H","Columns of W act as additive parts; H says how strongly each part is used."],"svgBytes":2081,"hasViewBox":true,"hasTitle":true,"hasDesc":true,"hasScript":false,"sourceTraceable":true},{"path":"resources/images/bench-council-ai100/explainers/1999-sift_descriptor.svg","exists":true,"assetIds":["asset-1999-sift-descriptor"],"roles":["architecture-explainer"],"captions":{"zh":["梯度描述子直方图"],"en":["Gradient descriptor histogram"]},"subcaptions":{"zh":["SIFT 的本地重绘图，依据页面列出的来源材料制作。"],"en":["Local redraw for SIFT, based on the listed source material."]},"rightsStatuses":["documented-in-legacy"],"sourceIds":["source-object-recognition-from-local-scale-invariant-features"],"sources":[{"id":"source-object-recognition-from-local-scale-invariant-features","type":"paper","reliability":"primary","title":{"zh":"《基于局部尺度不变特征的物体识别》","en":"Object Recognition from Local Scale-Invariant Features"},"url":"https://www.cs.ubc.ca/labs/lci/papers/docs1999/lowe-iccv99.pdf"}],"variantSourceIds":["source-david-lowe-ubc-computer-science","source-distinctive-image-features-from-scale-invariant-keypoints","source-object-recognition-from-local-scale-invariant-features"],"variantSources":[{"id":"source-object-recognition-from-local-scale-invariant-features","type":"paper","reliability":"primary","title":{"zh":"《基于局部尺度不变特征的物体识别》","en":"Object Recognition from Local Scale-Invariant Features"},"url":"https://www.cs.ubc.ca/labs/lci/papers/docs1999/lowe-iccv99.pdf"},{"id":"source-distinctive-image-features-from-scale-invariant-keypoints","type":"paper-page","reliability":"reference-only","title":{"zh":"来自尺度不变关键点的区分性图像特征","en":"Distinctive Image Features from Scale-Invariant Keypoints"},"url":"https://doi.org/10.1023/B:VISI.0000029664.99615.94"},{"id":"source-david-lowe-ubc-computer-science","type":"profile","reliability":"reference-only","title":{"zh":"戴维·洛, UBC Computer 《科学》","en":"David Lowe, UBC Computer Science"},"url":"https://www.cs.ubc.ca/people/david-lowe"}],"usages":[{"storylineId":"bench-council-ai100","storylineTitle":{"zh":"AI 百大成就（BenchCouncil）","en":"AI Top 100 Achievements (BenchCouncil)"},"eventId":"1999-sift","eventTitle":{"zh":"SIFT","en":"SIFT"},"variant":"bench-council-ai100","variantFile":"archive/events/1999-sift/variants/bench-council-ai100.json","visual":"sift","demoImage":"","description":{"zh":"戴维·洛在 1999 年提出 SIFT，用尺度空间中的高斯差分寻找在不同图像大小下仍稳定的候选关键点，再为关键点分配主方向。算法把邻域内的梯度方向和强度汇总成局部描述子，使同一物体在缩放、旋转以及一定光照和视角变化下仍可匹配。 这些稀疏但有辨识力的特征让目标识别、图像拼接、定位和三维重建获得可靠的对应点，在深度学习主导视觉前成为标准工具。SIFT 并非对所有几何或外观变化都不变，计算成本也不低，但它建立了“检测稳定关键点并描述局部外观”的经典视觉流水线。","en":"David Lowe introduced SIFT in 1999 to find candidate keypoints that remain stable across image scales using differences of Gaussians in scale space, then assign each keypoint a dominant orientation. The method summarizes local gradient directions and magnitudes into a descriptor, allowing corresponding regions to be matched under changes in scale, rotation, and moderate illumination or viewpoint. These sparse but distinctive features supplied reliable correspondences for object recognition, panorama stitching, localization, and 3D reconstruction, becoming a standard tool before deep learning dominated vision. SIFT is not invariant to every geometric or appearance change and can be computationally expensive, but it established the classic pipeline of detecting stable keypoints and describing local appearance."},"method":{"zh":"尺度不变局部特征","en":"Scale-invariant local features"},"artifact":{"zh":"SIFT 关键点描述子","en":"SIFT keypoint descriptor"}}],"svgText":["Gradient descriptor histogram","gradient directions become a descriptor vector","local redrawn explainer"],"svgBytes":1541,"hasViewBox":true,"hasTitle":false,"hasDesc":false,"hasScript":false,"sourceTraceable":true},{"path":"resources/images/bench-council-ai100/explainers/1999-sift_scale-space.svg","exists":true,"assetIds":["asset-1999-sift-scale-space"],"roles":["architecture-explainer"],"captions":{"zh":["尺度空间关键点"],"en":["Scale-space keypoints"]},"subcaptions":{"zh":["SIFT 的本地重绘图，依据页面列出的来源材料制作。"],"en":["Local redraw for SIFT, based on the listed source material."]},"rightsStatuses":["documented-in-legacy"],"sourceIds":["source-object-recognition-from-local-scale-invariant-features"],"sources":[{"id":"source-object-recognition-from-local-scale-invariant-features","type":"paper","reliability":"primary","title":{"zh":"《基于局部尺度不变特征的物体识别》","en":"Object Recognition from Local Scale-Invariant Features"},"url":"https://www.cs.ubc.ca/labs/lci/papers/docs1999/lowe-iccv99.pdf"}],"variantSourceIds":["source-david-lowe-ubc-computer-science","source-distinctive-image-features-from-scale-invariant-keypoints","source-object-recognition-from-local-scale-invariant-features"],"variantSources":[{"id":"source-object-recognition-from-local-scale-invariant-features","type":"paper","reliability":"primary","title":{"zh":"《基于局部尺度不变特征的物体识别》","en":"Object Recognition from Local Scale-Invariant Features"},"url":"https://www.cs.ubc.ca/labs/lci/papers/docs1999/lowe-iccv99.pdf"},{"id":"source-distinctive-image-features-from-scale-invariant-keypoints","type":"paper-page","reliability":"reference-only","title":{"zh":"来自尺度不变关键点的区分性图像特征","en":"Distinctive Image Features from Scale-Invariant Keypoints"},"url":"https://doi.org/10.1023/B:VISI.0000029664.99615.94"},{"id":"source-david-lowe-ubc-computer-science","type":"profile","reliability":"reference-only","title":{"zh":"戴维·洛, UBC Computer 《科学》","en":"David Lowe, UBC Computer Science"},"url":"https://www.cs.ubc.ca/people/david-lowe"}],"usages":[{"storylineId":"bench-council-ai100","storylineTitle":{"zh":"AI 百大成就（BenchCouncil）","en":"AI Top 100 Achievements (BenchCouncil)"},"eventId":"1999-sift","eventTitle":{"zh":"SIFT","en":"SIFT"},"variant":"bench-council-ai100","variantFile":"archive/events/1999-sift/variants/bench-council-ai100.json","visual":"sift","demoImage":"","description":{"zh":"戴维·洛在 1999 年提出 SIFT，用尺度空间中的高斯差分寻找在不同图像大小下仍稳定的候选关键点，再为关键点分配主方向。算法把邻域内的梯度方向和强度汇总成局部描述子，使同一物体在缩放、旋转以及一定光照和视角变化下仍可匹配。 这些稀疏但有辨识力的特征让目标识别、图像拼接、定位和三维重建获得可靠的对应点，在深度学习主导视觉前成为标准工具。SIFT 并非对所有几何或外观变化都不变，计算成本也不低，但它建立了“检测稳定关键点并描述局部外观”的经典视觉流水线。","en":"David Lowe introduced SIFT in 1999 to find candidate keypoints that remain stable across image scales using differences of Gaussians in scale space, then assign each keypoint a dominant orientation. The method summarizes local gradient directions and magnitudes into a descriptor, allowing corresponding regions to be matched under changes in scale, rotation, and moderate illumination or viewpoint. These sparse but distinctive features supplied reliable correspondences for object recognition, panorama stitching, localization, and 3D reconstruction, becoming a standard tool before deep learning dominated vision. SIFT is not invariant to every geometric or appearance change and can be computationally expensive, but it established the classic pipeline of detecting stable keypoints and describing local appearance."},"method":{"zh":"尺度不变局部特征","en":"Scale-invariant local features"},"artifact":{"zh":"SIFT 关键点描述子","en":"SIFT keypoint descriptor"}}],"svgText":["Scale-space keypoints","same feature, different scale","local redrawn explainer"],"svgBytes":1082,"hasViewBox":true,"hasTitle":false,"hasDesc":false,"hasScript":false,"sourceTraceable":true},{"path":"resources/images/bench-council-ai100/explainers/2000-isomap_geodesic-map.svg","exists":true,"assetIds":["asset-2000-isomap-geodesic-map"],"roles":["architecture-explainer"],"captions":{"zh":["测地流形映射"],"en":["Geodesic manifold map"]},"subcaptions":{"zh":["关于 Isomap 测地嵌入的本地原创解释图。"],"en":["Original local explainer of Isomap geodesic embedding."]},"rightsStatuses":["documented-in-legacy"],"sourceIds":["source-a-global-geometric-framework-for-nonlinear-dimensionality-reduction"],"sources":[{"id":"source-a-global-geometric-framework-for-nonlinear-dimensionality-reduction","type":"paper","reliability":"primary","title":{"zh":"《非线性降维的全局几何框架》","en":"A Global Geometric Framework for Nonlinear Dimensionality Reduction"},"url":"https://doi.org/10.1126/science.290.5500.2319"}],"variantSourceIds":["source-a-global-geometric-framework-for-nonlinear-dimensionality-reduction","source-pubmed-record-for-isomap","source-science-article-page","source-scikit-learn-isomap-documentation"],"variantSources":[{"id":"source-a-global-geometric-framework-for-nonlinear-dimensionality-reduction","type":"paper","reliability":"primary","title":{"zh":"《非线性降维的全局几何框架》","en":"A Global Geometric Framework for Nonlinear Dimensionality Reduction"},"url":"https://doi.org/10.1126/science.290.5500.2319"},{"id":"source-science-article-page","type":"paper-page","reliability":"reference-only","title":{"zh":"Science 文章页面","en":"Science article page"},"url":"https://www.science.org/doi/10.1126/science.290.5500.2319"},{"id":"source-pubmed-record-for-isomap","type":"paper-index","reliability":"reference-only","title":{"zh":"Isomap 的 PubMed 记录","en":"PubMed record for Isomap"},"url":"https://pubmed.ncbi.nlm.nih.gov/11125149/"},{"id":"source-scikit-learn-isomap-documentation","type":"documentation","reliability":"reference-only","title":{"zh":"scikit-learn Isomap 文档","en":"scikit-learn Isomap documentation"},"url":"https://scikit-learn.org/stable/modules/manifold.html#isomap"}],"usages":[{"storylineId":"bench-council-ai100","storylineTitle":{"zh":"AI 百大成就（BenchCouncil）","en":"AI Top 100 Achievements (BenchCouncil)"},"eventId":"ai100-2000-isomap","eventTitle":{"zh":"Isomap","en":"Isomap"},"variant":"bench-council-ai100","variantFile":"archive/events/ai100-2000-isomap/variants/bench-council-ai100.json","visual":"isomap","demoImage":"resources/images/bench-council-ai100/explainers/2000-isomap_geodesic-map.svg","description":{"zh":"特南鲍姆、德席尔瓦和兰福德在 2000 年提出 Isomap，用于揭示嵌入高维空间中的低维非线性流形。算法先连接每个样本的近邻，形成图结构，再用图上的最短路径近似沿流形表面的测地距离，最后通过经典多维尺度分析寻找保持这些距离的低维坐标。 与只保持直线距离的线性降维不同，Isomap 能把“瑞士卷”等弯曲结构展开，并努力保存全局几何。若采样过稀、噪声形成错误捷径或流形含有复杂分支，邻居图会失真；但它把图搜索与几何嵌入结合起来，成为流形学习的代表方法。","en":"Joshua Tenenbaum, Vin de Silva, and John Langford introduced Isomap in 2000 to uncover low-dimensional nonlinear manifolds embedded in high-dimensional space. The algorithm first connects neighboring samples into a graph, uses shortest paths through that graph to approximate geodesic distances along the manifold, and then applies classical multidimensional scaling to find low-dimensional coordinates that preserve those distances. Unlike linear reduction based on straight-line distances, Isomap can unfold curved structures such as the “Swiss roll” while attempting to preserve global geometry. Sparse sampling, noise-created shortcuts, or manifolds with complicated branches can distort the neighborhood graph. Even so, its combination of graph search and geometric embedding made it a representative method of manifold learning."},"method":{"zh":"测地流形嵌入","en":"Geodesic manifold embedding"},"artifact":{"zh":"Isomap 嵌入","en":"Isomap embedding"}}],"svgText":["neighbor graph preserves geodesics","shortest path along the surface beats straight-line distance"],"svgBytes":1137,"hasViewBox":true,"hasTitle":false,"hasDesc":false,"hasScript":false,"sourceTraceable":true},{"path":"resources/images/bench-council-ai100/explainers/2000-lle_neighbor-reconstruction.svg","exists":true,"assetIds":["asset-2000-lle-neighbor-reconstruction"],"roles":["architecture-explainer"],"captions":{"zh":["局部线性嵌入"],"en":["Locally linear embedding"]},"subcaptions":{"zh":["关于 LLE 邻域重建的本地原创解释图。"],"en":["Original local explainer of LLE neighborhood reconstruction."]},"rightsStatuses":["documented-in-legacy"],"sourceIds":["source-nonlinear-dimensionality-reduction-by-locally-linear-embedding"],"sources":[{"id":"source-nonlinear-dimensionality-reduction-by-locally-linear-embedding","type":"paper","reliability":"primary","title":{"zh":"《通过局部线性嵌入进行非线性降维》","en":"Nonlinear Dimensionality Reduction by Locally Linear Embedding"},"url":"https://doi.org/10.1126/science.290.5500.2323"}],"variantSourceIds":["source-nonlinear-dimensionality-reduction-by-locally-linear-embedding","source-pubmed-record-for-lle","source-science-article-page","source-scikit-learn-lle-documentation"],"variantSources":[{"id":"source-nonlinear-dimensionality-reduction-by-locally-linear-embedding","type":"paper","reliability":"primary","title":{"zh":"《通过局部线性嵌入进行非线性降维》","en":"Nonlinear Dimensionality Reduction by Locally Linear Embedding"},"url":"https://doi.org/10.1126/science.290.5500.2323"},{"id":"source-science-article-page","type":"paper-page","reliability":"reference-only","title":{"zh":"Science 文章页面","en":"Science article page"},"url":"https://www.science.org/doi/10.1126/science.290.5500.2323"},{"id":"source-pubmed-record-for-lle","type":"paper-index","reliability":"reference-only","title":{"zh":"LLE 的 PubMed 记录","en":"PubMed record for LLE"},"url":"https://pubmed.ncbi.nlm.nih.gov/11125150/"},{"id":"source-scikit-learn-lle-documentation","type":"documentation","reliability":"reference-only","title":{"zh":"scikit-learn LLE 文档","en":"scikit-learn LLE documentation"},"url":"https://scikit-learn.org/stable/modules/manifold.html#locally-linear-embedding"}],"usages":[{"storylineId":"bench-council-ai100","storylineTitle":{"zh":"AI 百大成就（BenchCouncil）","en":"AI Top 100 Achievements (BenchCouncil)"},"eventId":"ai100-2000-lle","eventTitle":{"zh":"局部线性嵌入","en":"Locally Linear Embedding"},"variant":"bench-council-ai100","variantFile":"archive/events/ai100-2000-lle/variants/bench-council-ai100.json","visual":"lle","demoImage":"resources/images/bench-council-ai100/explainers/2000-lle_neighbor-reconstruction.svg","description":{"zh":"罗维斯和索尔在 2000 年提出局部线性嵌入，假设非线性流形在足够小的邻域内可以近似为线性。算法先为每个样本寻找近邻，并计算一组重建权重，使该样本能由邻居线性组合得到；随后在低维空间中寻找坐标，尽量保持同一组重建权重。 LLE 不需要显式估计全局距离，也能把弯曲流形展开，同时保留局部邻域关系。它对邻居数量、噪声和采样密度较敏感，且新样本映射和全局几何解释并不直接。其核心贡献是把“局部可重建性”变成非线性降维原则，与 Isomap 共同推动流形学习。","en":"Sam Roweis and Lawrence Saul introduced locally linear embedding in 2000 with the assumption that a nonlinear manifold is approximately linear in sufficiently small neighborhoods. The algorithm finds neighbors for each sample and computes weights that reconstruct the sample as a linear combination of those neighbors. It then finds low-dimensional coordinates that preserve the same reconstruction weights. LLE does not explicitly estimate global distances and can unfold curved manifolds while retaining local neighborhood relationships. It is sensitive to the number of neighbors, noise, and sampling density, and mapping new samples or interpreting global geometry is not automatic. Its central contribution was turning local reconstructability into a principle for nonlinear dimensionality reduction, helping establish manifold learning alongside Isomap."},"method":{"zh":"保持邻域的嵌入","en":"Neighborhood-preserving embedding"},"artifact":{"zh":"LLE 嵌入","en":"LLE embedding"}}],"svgText":["preserve local reconstruction weights","local weights","same neighborhood relation"],"svgBytes":1593,"hasViewBox":true,"hasTitle":false,"hasDesc":false,"hasScript":false,"sourceTraceable":true},{"path":"resources/images/bench-council-ai100/explainers/2000-neural-language-model_context-prediction.svg","exists":true,"assetIds":["asset-2000-neural-language-model-context-prediction"],"roles":["architecture-explainer"],"captions":{"zh":["上下文预测"],"en":["Context prediction"]},"subcaptions":{"zh":["关于神经语言建模的本地原创解释图。"],"en":["Original local explainer of neural language modeling."]},"rightsStatuses":["documented-in-legacy"],"sourceIds":["source-a-neural-probabilistic-language-model"],"sources":[{"id":"source-a-neural-probabilistic-language-model","type":"paper","reliability":"primary","title":{"zh":"《神经概率语言模型》","en":"A Neural Probabilistic Language Model"},"url":"https://www.jmlr.org/papers/v3/bengio03a.html"}],"variantSourceIds":["source-a-neural-probabilistic-language-model","source-dblp-record","source-jmlr-full-paper-pdf","source-yoshua-bengio-profile-at-mila"],"variantSources":[{"id":"source-a-neural-probabilistic-language-model","type":"paper","reliability":"primary","title":{"zh":"《神经概率语言模型》","en":"A Neural Probabilistic Language Model"},"url":"https://www.jmlr.org/papers/v3/bengio03a.html"},{"id":"source-jmlr-full-paper-pdf","type":"paper-file","reliability":"secondary","title":{"zh":"JMLR 完整论文 PDF","en":"JMLR full paper PDF"},"url":"https://www.jmlr.org/papers/volume3/bengio03a/bengio03a.pdf"},{"id":"source-dblp-record","type":"paper-index","reliability":"reference-only","title":{"zh":"DBLP 论文记录","en":"DBLP record"},"url":"https://dblp.org/rec/journals/jmlr/BengioDVJ03"},{"id":"source-yoshua-bengio-profile-at-mila","type":"profile","reliability":"reference-only","title":{"zh":"Mila 的约书亚·本吉奥资料","en":"Yoshua Bengio profile at Mila"},"url":"https://mila.quebec/en/directory/yoshua-bengio"}],"usages":[{"storylineId":"bench-council-ai100","storylineTitle":{"zh":"AI 百大成就（BenchCouncil）","en":"AI Top 100 Achievements (BenchCouncil)"},"eventId":"ai100-2000-neural-language-model","eventTitle":{"zh":"神经语言模型","en":"Neural Language Model"},"variant":"bench-council-ai100","variantFile":"archive/events/ai100-2000-neural-language-model/variants/bench-council-ai100.json","visual":"neuralLm","demoImage":"resources/images/bench-council-ai100/explainers/2000-neural-language-model_context-prediction.svg","description":{"zh":"本吉奥等人的神经概率语言模型把固定长度上下文中的每个词映射为可学习稠密向量，再由神经网络预测下一个词的概率。词向量与预测器共同训练，使在不同上下文中作用相似的词共享统计强度，而不必为每个 n-gram 组合单独保存计数。 这种分布式表示缓解了传统语言模型的数据稀疏问题，并把语言建模与表示学习直接连接起来。原始模型仍受固定上下文窗口和大词表 softmax 计算成本限制，但它为 Word2Vec、神经机器翻译和后来的 Transformer 语言模型建立了关键思想：词义可以在预测任务中学习为连续向量。","en":"Yoshua Bengio and colleagues' neural probabilistic language model mapped each word in a fixed-length context to a learned dense vector, then used a neural network to predict the probability of the next word. The embeddings and predictor were trained together, allowing words with similar roles across contexts to share statistical strength instead of storing a separate count for every n-gram combination. This distributed representation reduced the data-sparsity problem of traditional language models and directly connected language modeling with representation learning. The original model still had a fixed context window and an expensive softmax over a large vocabulary. It nevertheless established a key idea for Word2Vec, neural machine translation, and later Transformer language models: word meaning can be learned as continuous vectors through a prediction task."},"method":{"zh":"用于语言预测的分布式词嵌入","en":"Distributed word embeddings for language prediction"},"artifact":{"zh":"神经概率语言模型","en":"Neural probabilistic language model"}}],"svgText":["Neural probabilistic language model","the","cat","sat","shared","embeddings","predict","next word","Sparse words become dense vectors","that support next-word prediction."],"svgBytes":1849,"hasViewBox":true,"hasTitle":false,"hasDesc":false,"hasScript":false,"sourceTraceable":true},{"path":"resources/images/bench-council-ai100/explainers/2000-spectral-clustering_eigen-map.svg","exists":true,"assetIds":["asset-2000-spectral-clustering-eigen-map"],"roles":["architecture-explainer"],"captions":{"zh":["特征向量嵌入"],"en":["Eigenvector embedding"]},"subcaptions":{"zh":["依据 论谱聚类：分析与算法 制作的本地解释图。"],"en":["Original local explainer based on On Spectral Clustering: Analysis and an algorithm."]},"rightsStatuses":["documented-in-legacy"],"sourceIds":["source-normalized-cuts-and-image-segmentation"],"sources":[{"id":"source-normalized-cuts-and-image-segmentation","type":"paper","reliability":"primary","title":{"zh":"《归一化切分与图像分割》","en":"Normalized Cuts and Image Segmentation"},"url":"https://doi.org/10.1109/34.868688"}],"variantSourceIds":["source-normalized-cuts-and-image-segmentation","source-on-spectral-clustering-analysis-and-an-algorithm","source-scikit-learn-spectral-clustering-documentation","source-spectral-graph-illustration"],"variantSources":[{"id":"source-normalized-cuts-and-image-segmentation","type":"paper","reliability":"primary","title":{"zh":"《归一化切分与图像分割》","en":"Normalized Cuts and Image Segmentation"},"url":"https://doi.org/10.1109/34.868688"},{"id":"source-on-spectral-clustering-analysis-and-an-algorithm","type":"paper","reliability":"primary","title":{"zh":"《论谱聚类：分析与算法》","en":"On Spectral Clustering: Analysis and an algorithm"},"url":"https://proceedings.neurips.cc/paper/2001/hash/801272ee79cfde7fa5960571fee36b9b-Abstract.html"},{"id":"source-scikit-learn-spectral-clustering-documentation","type":"documentation","reliability":"reference-only","title":{"zh":"scikit-learn 谱聚类文档","en":"scikit-learn spectral clustering documentation"},"url":"https://scikit-learn.org/stable/modules/clustering.html#spectral-clustering"},{"id":"source-spectral-graph-illustration","type":"image-source","reliability":"reference-only","title":{"zh":"谱聚类图示","en":"Spectral graph illustration"},"url":"https://commons.wikimedia.org/wiki/File:6n-graf.svg"}],"usages":[{"storylineId":"bench-council-ai100","storylineTitle":{"zh":"AI 百大成就（BenchCouncil）","en":"AI Top 100 Achievements (BenchCouncil)"},"eventId":"2000-spectral-clustering","eventTitle":{"zh":"谱聚类","en":"Spectral Clustering"},"variant":"bench-council-ai100","variantFile":"archive/events/2000-spectral-clustering/variants/bench-council-ai100.json","visual":"spectral","demoImage":"resources/images/bench-council-ai100/explainers/2000-spectral-clustering_eigen-map.svg","description":{"zh":"谱聚类把样本表示为相似度图：样本是节点，边权表示彼此接近程度。算法构造图拉普拉斯矩阵，并利用其若干特征向量把节点映射到低维空间；在这个空间中，原本缠绕或非凸的群体往往更容易被 k-means 等简单方法分开。 归一化切分等准则使算法同时考虑簇内连接与簇规模，避免只切下很小的孤立区域。谱方法能处理复杂几何结构，但结果依赖相似度图、核宽度和邻居选择，特征分解在大数据上也较昂贵。它建立了聚类、图划分和线性代数之间的重要桥梁。","en":"Spectral clustering represents samples as a similarity graph: samples are nodes and edge weights express proximity. The algorithm constructs a graph Laplacian and uses several of its eigenvectors to embed the nodes in a lower-dimensional space. Groups that are intertwined or nonconvex in the original coordinates can become separable there by a simple method such as k-means. Criteria such as normalized cuts balance within-group connection against cluster size, avoiding solutions that merely detach tiny isolated regions. Spectral methods can capture complex geometry, but results depend on the similarity graph, kernel width, and neighborhood choices, while eigendecomposition can be expensive at large scale. The approach created an important bridge among clustering, graph partitioning, and linear algebra."},"method":{"zh":"图拉普拉斯特征向量嵌入","en":"Graph Laplacian eigenvector embedding"},"artifact":{"zh":"Normalized Cuts 与谱聚类方法","en":"Normalized cuts and spectral clustering methods"}}],"svgText":["Eigenvector embedding","特征向量嵌入","Laplacian","eigenvectors","clusters","Spectral Clustering · local original explainer"],"svgBytes":1702,"hasViewBox":true,"hasTitle":true,"hasDesc":true,"hasScript":false,"sourceTraceable":true},{"path":"resources/images/bench-council-ai100/explainers/2000-spectral-clustering_graph-cut.svg","exists":true,"assetIds":["asset-2000-spectral-clustering-graph-cut"],"roles":["architecture-explainer"],"captions":{"zh":["归一化图切分"],"en":["Normalized graph cut"]},"subcaptions":{"zh":["依据 归一化切分与图像分割 制作的本地解释图。"],"en":["Original local explainer based on Normalized Cuts and Image Segmentation."]},"rightsStatuses":["documented-in-legacy"],"sourceIds":["source-normalized-cuts-and-image-segmentation"],"sources":[{"id":"source-normalized-cuts-and-image-segmentation","type":"paper","reliability":"primary","title":{"zh":"《归一化切分与图像分割》","en":"Normalized Cuts and Image Segmentation"},"url":"https://doi.org/10.1109/34.868688"}],"variantSourceIds":["source-normalized-cuts-and-image-segmentation","source-on-spectral-clustering-analysis-and-an-algorithm","source-scikit-learn-spectral-clustering-documentation","source-spectral-graph-illustration"],"variantSources":[{"id":"source-normalized-cuts-and-image-segmentation","type":"paper","reliability":"primary","title":{"zh":"《归一化切分与图像分割》","en":"Normalized Cuts and Image Segmentation"},"url":"https://doi.org/10.1109/34.868688"},{"id":"source-on-spectral-clustering-analysis-and-an-algorithm","type":"paper","reliability":"primary","title":{"zh":"《论谱聚类：分析与算法》","en":"On Spectral Clustering: Analysis and an algorithm"},"url":"https://proceedings.neurips.cc/paper/2001/hash/801272ee79cfde7fa5960571fee36b9b-Abstract.html"},{"id":"source-scikit-learn-spectral-clustering-documentation","type":"documentation","reliability":"reference-only","title":{"zh":"scikit-learn 谱聚类文档","en":"scikit-learn spectral clustering documentation"},"url":"https://scikit-learn.org/stable/modules/clustering.html#spectral-clustering"},{"id":"source-spectral-graph-illustration","type":"image-source","reliability":"reference-only","title":{"zh":"谱聚类图示","en":"Spectral graph illustration"},"url":"https://commons.wikimedia.org/wiki/File:6n-graf.svg"}],"usages":[{"storylineId":"bench-council-ai100","storylineTitle":{"zh":"AI 百大成就（BenchCouncil）","en":"AI Top 100 Achievements (BenchCouncil)"},"eventId":"2000-spectral-clustering","eventTitle":{"zh":"谱聚类","en":"Spectral Clustering"},"variant":"bench-council-ai100","variantFile":"archive/events/2000-spectral-clustering/variants/bench-council-ai100.json","visual":"spectral","demoImage":"resources/images/bench-council-ai100/explainers/2000-spectral-clustering_eigen-map.svg","description":{"zh":"谱聚类把样本表示为相似度图：样本是节点，边权表示彼此接近程度。算法构造图拉普拉斯矩阵，并利用其若干特征向量把节点映射到低维空间；在这个空间中，原本缠绕或非凸的群体往往更容易被 k-means 等简单方法分开。 归一化切分等准则使算法同时考虑簇内连接与簇规模，避免只切下很小的孤立区域。谱方法能处理复杂几何结构，但结果依赖相似度图、核宽度和邻居选择，特征分解在大数据上也较昂贵。它建立了聚类、图划分和线性代数之间的重要桥梁。","en":"Spectral clustering represents samples as a similarity graph: samples are nodes and edge weights express proximity. The algorithm constructs a graph Laplacian and uses several of its eigenvectors to embed the nodes in a lower-dimensional space. Groups that are intertwined or nonconvex in the original coordinates can become separable there by a simple method such as k-means. Criteria such as normalized cuts balance within-group connection against cluster size, avoiding solutions that merely detach tiny isolated regions. Spectral methods can capture complex geometry, but results depend on the similarity graph, kernel width, and neighborhood choices, while eigendecomposition can be expensive at large scale. The approach created an important bridge among clustering, graph partitioning, and linear algebra."},"method":{"zh":"图拉普拉斯特征向量嵌入","en":"Graph Laplacian eigenvector embedding"},"artifact":{"zh":"Normalized Cuts 与谱聚类方法","en":"Normalized cuts and spectral clustering methods"}}],"svgText":["Normalized graph cut","归一化图切分","affinity graph","low cut","segments","Spectral Clustering · local original explainer"],"svgBytes":1700,"hasViewBox":true,"hasTitle":true,"hasDesc":true,"hasScript":false,"sourceTraceable":true},{"path":"resources/images/bench-council-ai100/explainers/2000s-alphacat_xiangqi-search.svg","exists":true,"assetIds":["asset-2000s-alphacat-xiangqi-search"],"roles":["architecture-explainer"],"captions":{"zh":["中国象棋搜索几何"],"en":["Chinese chess search geometry"]},"subcaptions":{"zh":["中国象棋引擎约束的原创解释图。"],"en":["Original explainer for xiangqi engine constraints."]},"rightsStatuses":["documented-in-legacy"],"sourceIds":["source-icga-chinese-chess-page"],"sources":[{"id":"source-icga-chinese-chess-page","type":"archive","reliability":"reference-only","title":{"zh":"ICGA 中国象棋页面","en":"ICGA Chinese Chess page"},"url":"https://www.game-ai-forum.org/icga-tournaments/game.php?id=13"}],"variantSourceIds":["source-comparison-training-for-computer-chinese-chess","source-icga-chinese-chess-page","source-xiangqi-overview"],"variantSources":[{"id":"source-icga-chinese-chess-page","type":"archive","reliability":"reference-only","title":{"zh":"ICGA 中国象棋页面","en":"ICGA Chinese Chess page"},"url":"https://www.game-ai-forum.org/icga-tournaments/game.php?id=13"},{"id":"source-comparison-training-for-computer-chinese-chess","type":"paper","reliability":"secondary","title":{"zh":"《面向计算机中国象棋的比较训练》","en":"Comparison Training for Computer Chinese Chess"},"url":"https://arxiv.org/abs/1801.07411"},{"id":"source-xiangqi-overview","type":"encyclopedia-entry","reliability":"reference-only","title":{"zh":"中国象棋概览","en":"Xiangqi overview"},"url":"https://en.wikipedia.org/wiki/Xiangqi"}],"usages":[{"storylineId":"gaming-ai","storylineTitle":{"zh":"AI 在棋牌与博弈论的演进","en":"AI in Board & Tabletop Games"},"eventId":"2000s-alphacat","eventTitle":{"zh":"中国象棋引擎与 AlphaCat","en":"Chinese Chess Engines and AlphaCat"},"variant":"gaming-ai","variantFile":"archive/events/2000s-alphacat/variants/gaming-ai.json","visual":"configuredPaper","demoImage":"resources/images/bench-council-ai100/explainers/2000s-alphacat_xiangqi-search.svg","description":{"zh":"中国象棋让游戏 AI 面对非对称兵种、炮、九宫、楚河汉界、长将长捉规则以及高度战术化的攻杀。issue 中要求的 AlphaCat 在这里作为 2000 年代象棋引擎浪潮的一部分呈现：极大极小搜索、位棋盘或紧凑棋盘编码、开局知识和调校评估函数，是通向强棋力的主要实践路线。","en":"Chinese chess made game AI confront asymmetric pieces, cannons, palaces, rivers, repetition rules, and very tactical attacking play. The issue-requested AlphaCat entry is represented here as part of the broader 2000s xiangqi-engine wave, where minimax search, bitboards or compact board encodings, opening knowledge, and tuned evaluation functions became the practical path to strong play."},"method":{"zh":"领域化极大极小搜索与调校评估","en":"Domain-specific minimax search and tuned evaluation"},"artifact":{"zh":"AlphaCat 式中国象棋引擎谱系","en":"AlphaCat-style xiangqi engine lineage"}}],"svgText":["Chinese chess engine loop","legal geometry + tactical search + asymmetric evaluation","楚河 / 汉界","炮","馬","将","cannon screen + palace constraints","move","generator","alpha-beta","search","attack","safety","tempo","Interaction: switch cannon screens, river crossing, and palace rules to reshape legal moves."],"svgBytes":4233,"hasViewBox":true,"hasTitle":true,"hasDesc":true,"hasScript":false,"sourceTraceable":true},{"path":"resources/images/bench-council-ai100/explainers/2003-lda_plate-model.svg","exists":true,"assetIds":["asset-2003-lda-plate-model"],"roles":["architecture-explainer"],"captions":{"zh":["Plate 模型草图"],"en":["Plate model sketch"]},"subcaptions":{"zh":["潜在狄利克雷分配 的本地重绘图，依据页面列出的来源材料制作。"],"en":["Local redraw for Latent Dirichlet Allocation, based on the listed source material."]},"rightsStatuses":["documented-in-legacy"],"sourceIds":["source-latent-dirichlet-allocation"],"sources":[{"id":"source-latent-dirichlet-allocation","type":"paper","reliability":"primary","title":{"zh":"《潜在狄利克雷分配》","en":"Latent Dirichlet Allocation"},"url":"https://jmlr.org/papers/v3/blei03a.html"}],"variantSourceIds":["source-david-m-blei-homepage","source-latent-dirichlet-allocation","source-scikit-learn-latentdirichletallocation"],"variantSources":[{"id":"source-latent-dirichlet-allocation","type":"paper","reliability":"primary","title":{"zh":"《潜在狄利克雷分配》","en":"Latent Dirichlet Allocation"},"url":"https://jmlr.org/papers/v3/blei03a.html"},{"id":"source-david-m-blei-homepage","type":"personal-page","reliability":"primary","title":{"zh":"戴维·M·布莱个人主页","en":"David M. Blei personal homepage"},"url":"https://www.cs.columbia.edu/~blei/"},{"id":"source-scikit-learn-latentdirichletallocation","type":"documentation","reliability":"reference-only","title":{"zh":"scikit-learn LatentDirichletAllocation","en":"scikit-learn LatentDirichletAllocation"},"url":"https://scikit-learn.org/stable/modules/generated/sklearn.decomposition.LatentDirichletAllocation.html"}],"usages":[{"storylineId":"bench-council-ai100","storylineTitle":{"zh":"AI 百大成就（BenchCouncil）","en":"AI Top 100 Achievements (BenchCouncil)"},"eventId":"2003-lda","eventTitle":{"zh":"潜在狄利克雷分配","en":"Latent Dirichlet Allocation"},"variant":"bench-council-ai100","variantFile":"archive/events/2003-lda/variants/bench-council-ai100.json","visual":"lda","demoImage":"","description":{"zh":"潜在狄利克雷分配在 2003 年为主题模型建立了清晰的生成式概率框架。每篇文档被表示为多个主题的不同比例混合，每个主题又是词汇表上的概率分布；狄利克雷先验约束这些混合，而推断算法根据观察到的词反推隐藏主题和每个词的主题归属。 LDA 让研究者能够在没有逐篇主题标签的情况下探索大型文档集合，并成为概率图模型、变分推断和贝叶斯文本分析的经典教学案例。它采用词袋假设，忽略词序，主题也不一定自动对应人类概念，因此结果需要谨慎解释；但其“用隐藏变量解释可见文本”的方法影响深远。","en":"Latent Dirichlet Allocation gave topic modeling a clear generative probabilistic framework in 2003. Each document is represented as a different mixture of topics, and each topic is a probability distribution over the vocabulary. Dirichlet priors shape those mixtures, while inference algorithms work backward from observed words to estimate the hidden topics and each word's topic assignment. LDA allowed researchers to explore large document collections without assigning a topic label to every text and became a standard teaching example for probabilistic graphical models, variational inference, and Bayesian text analysis. Its bag-of-words assumption ignores word order, and inferred topics do not automatically correspond to human concepts, so interpretation requires care. The broader method of explaining visible text through latent variables remained highly influential."},"method":{"zh":"带 Dirichlet 先验的贝叶斯主题模型","en":"Bayesian topic model with Dirichlet priors"},"artifact":{"zh":"LDA 主题模型","en":"LDA topic model"}}],"svgText":["Plate model sketch","θ","z","w","N words","M documents"],"svgBytes":1119,"hasViewBox":true,"hasTitle":false,"hasDesc":false,"hasScript":false,"sourceTraceable":true},{"path":"resources/images/bench-council-ai100/explainers/2003-lda_topic-simplex.svg","exists":true,"assetIds":["asset-2003-lda-topic-simplex"],"roles":["architecture-explainer"],"captions":{"zh":["主题混合单纯形"],"en":["Topic mixture simplex"]}, generative probabilistic framework in 2003. Each document is represented as a different mixture of topics, and each topic is a probability distribution over the vocabulary. Dirichlet priors shape those mixtures, while inference algorithms work backward from observed words to estimate the hidden topics and each word's topic assignment. LDA allowed researchers to explore large document collections without assigning a topic label to every text and became a standard teaching example for probabilistic graphical models, variational inference, and Bayesian text analysis. Its bag-of-words assumption ignores word order, and inferred topics do not automatically correspond to human concepts, so interpretation requires care. The broader method of explaining visible text through latent variables remained highly influential."},"method":{"zh":"带 Dirichlet 先验的贝叶斯主题模型","en":"Bayesian topic model with Dirichlet priors"},"artifact":{"zh":"LDA 主题模型","en":"LDA topic model"}}],"svgText":["LDA topic mixture","science","sports","politics","document"],"svgBytes":822,"hasViewBox":true,"hasTitle":false,"hasDesc":false,"hasScript":false,"sourceTraceable":true},{"path":"resources/images/bench-council-ai100/explainers/2005-gnn_message-passing.svg","exists":true,"assetIds":["asset-2005-gnn-message-passing"],"roles":["architecture-explainer"],"captions":{"zh":["图神经网络 解释图"],"en":["Graph Neural Network explainer"]},"subcaptions":{"zh":["关于该成就流程的本地原创解释图。"],"en":["Original local explainer for the achievement flow."]},"rightsStatuses":["documented-in-legacy"],"sourceIds":["source-the-graph-neural-network-model"],"sources":[{"id":"source-the-graph-neural-network-model","type":"paper","reliability":"primary","title":{"zh":"《图神经网络模型》","en":"The Graph Neural Network Model"},"url":"https://doi.org/10.1109/TNN.2008.2005605"}],"variantSourceIds":["source-a-new-model-for-learning-in-graph-domains","source-franco-scarselli-homepage","source-graph-neural-network-overview","source-the-graph-neural-network-model"],"variantSources":[{"id":"source-the-graph-neural-network-model","type":"paper","reliability":"primary","title":{"zh":"《图神经网络模型》","en":"The Graph Neural Network Model"},"url":"https://doi.org/10.1109/TNN.2008.2005605"},{"id":"source-a-new-model-for-learning-in-graph-domains","type":"paper","reliability":"primary","title":{"zh":"《一种用于图领域学习的新模型》","en":"A new model for learning in graph domains"},"url":"https://ieeexplore.ieee.org/document/4700287"},{"id":"source-graph-neural-network-overview","type":"encyclopedia-entry","reliability":"reference-only","title":{"zh":"图神经网络概览","en":"Graph neural network overview"},"url":"https://en.wikipedia.org/wiki/Graph_neural_network"},{"id":"source-franco-scarselli-homepage","type":"personal-page","reliability":"primary","title":{"zh":"弗兰科·斯卡塞利个人主页","en":"Franco Scarselli personal homepage"},"url":"https://www3.diism.unisi.it/~franco/"}],"usages":[{"storylineId":"bench-council-ai100","storylineTitle":{"zh":"AI 百大成就（BenchCouncil）","en":"AI Top 100 Achievements (BenchCouncil)"},"eventId":"ai100-2005-gnn","eventTitle":{"zh":"图神经网络","en":"Graph Neural Network"},"variant":"bench-council-ai100","variantFile":"archive/events/ai100-2005-gnn/variants/bench-council-ai100.json","visual":"configuredPaper","demoImage":"resources/images/bench-council-ai100/explainers/2005-gnn_message-passing.svg","description":{"zh":"斯卡塞利等人的早期图神经网络模型把神经计算推广到任意图结构。每个节点根据自身特征、边信息和邻居状态反复更新表示，直到整个系统达到稳定点；输出函数再从这些状态预测节点、边或整张图的属性。 这种局部信息交换后来被概括为消息传递：同一组可学习规则能在不同大小和连接方式的图上复用，适用于分子、社交网络、知识图谱和物理系统。多轮传播可能让节点表示过度相似，模型表达能力也受聚合方式限制，但 GNN 建立了关系结构的通用学习框架。","en":"Franco Scarselli and colleagues' early graph neural-network model extended neural computation to arbitrary graph structures. Each node repeatedly updates its representation from its own features, edge information, and neighboring states until the system reaches a stable point. An output function then predicts properties of nodes, edges, or the entire graph from those states. This local exchange was later generalized as message passing: the same learned rules can be reused across graphs of different sizes and connectivity, supporting molecules, social networks, knowledge graphs, and physical systems. Repeated propagation can make node representations overly similar, and expressive power depends on the aggregation rule. GNNs nevertheless established a general learning framework for relational structure."},"method":{"zh":"图上的迭代消息传递","en":"Iterative message passing on graphs"},"artifact":{"zh":"图神经网络模型","en":"Graph neural network model"}}],"svgText":["Graph Neural Network","node features","input","message passing","mechanism","node states","result","Original local SVG redraw; source figures are not copied."],"svgBytes":2387,"hasViewBox":true,"hasTitle":true,"hasDesc":true,"hasScript":false,"sourceTraceable":true},{"path":"resources/images/bench-council-ai100/explainers/2005-hog_descriptor-grid.svg","exists":true,"assetIds":["asset-2005-hog-descriptor-grid"],"roles":["architecture-explainer"],"captions":{"zh":["HOG 描述子网格"],"en":["HOG descriptor grid"]},"subcaptions":{"zh":["关于梯度方向直方图的本地原创解释图。"],"en":["Original local explainer of gradient-orientation histograms."]},"rightsStatuses":["documented-in-legacy"],"sourceIds":["source-histograms-of-oriented-gradients-for-human-detection"],"sources":[{"id":"source-histograms-of-oriented-gradients-for-human-detection","type":"paper-file","reliability":"primary","title":{"zh":"《用于人体检测的方向梯度直方图》","en":"Histograms of Oriented Gradients for Human Detection"},"url":"https://lear.inrialpes.fr/people/triggs/pubs/Dalal-cvpr05.pdf"}],"variantSourceIds":["source-bill-triggs-lear-profile","source-histogram-of-oriented-gradients-overview","source-histograms-of-oriented-gradients-for-human-detection","source-ieee-cvpr-paper-record","source-scikit-image-hog-example"],"variantSources":[{"id":"source-histograms-of-oriented-gradients-for-human-detection","type":"paper-file","reliability":"primary","title":{"zh":"《用于人体检测的方向梯度直方图》","en":"Histograms of Oriented Gradients for Human Detection"},"url":"https://lear.inrialpes.fr/people/triggs/pubs/Dalal-cvpr05.pdf"},{"id":"source-ieee-cvpr-paper-record","type":"paper-page","reliability":"secondary","title":{"zh":"IEEE CVPR 论文记录","en":"IEEE CVPR paper record"},"url":"https://doi.org/10.1109/CVPR.2005.177"},{"id":"source-histogram-of-oriented-gradients-overview","type":"encyclopedia-entry","reliability":"reference-only","title":{"zh":"方向梯度直方图概览","en":"Histogram of oriented gradients overview"},"url":"https://en.wikipedia.org/wiki/Histogram_of_oriented_gradients"},{"id":"source-scikit-image-hog-example","type":"documentation","reliability":"reference-only","title":{"zh":"scikit-image HOG 示例","en":"scikit-image HOG example"},"url":"https://scikit-image.org/docs/stable/auto_examples/features_detection/plot_hog.html"},{"id":"source-bill-triggs-lear-profile","type":"personal-page","reliability":"primary","title":{"zh":"比尔·特里格斯个人主页","en":"Bill Triggs personal homepage"},"url":"https://lear.inrialpes.fr/people/triggs/"}],"usages":[{"storylineId":"bench-council-ai100","storylineTitle":{"zh":"AI 百大成就（BenchCouncil）","en":"AI Top 100 Achievements (BenchCouncil)"},"eventId":"ai100-2005-hog","eventTitle":{"zh":"HOG 方向梯度直方图","en":"HOG"},"variant":"bench-council-ai100","variantFile":"archive/events/ai100-2005-hog/variants/bench-council-ai100.json","visual":"hog","demoImage":"resources/images/bench-council-ai100/explainers/2005-hog_descriptor-grid.svg","description":{"zh":"达拉尔和特里格斯在 2005 年提出用于行人检测的方向梯度直方图。HOG 把图像窗口划分为小单元，统计每个单元内边缘梯度的方向分布，再在较大的块中归一化这些直方图，以降低光照和局部对比度变化的影响。 人体轮廓和局部形状由一组稳定的方向统计表示，配合线性支持向量机和滑动窗口即可完成检测。HOG 在深度卷积特征普及前成为行人检测和形状识别的重要基线。它依赖手工设计特征，对遮挡和大幅姿态变化仍有限，但清楚展示了局部梯度如何编码物体外形。","en":"Navneet Dalal and Bill Triggs introduced Histograms of Oriented Gradients for pedestrian detection in 2005. HOG divides an image window into small cells, counts the directions of local intensity gradients within each cell, and normalizes those histograms over larger blocks to reduce sensitivity to illumination and local contrast. A person's outline and local shape become a stable collection of orientation statistics that can be classified with a linear support vector machine in a sliding-window detector. HOG became an important baseline for pedestrian detection and shape recognition before deep convolutional features. Its hand-designed representation remains limited under occlusion and large pose changes, but it clearly demonstrated how local gradients can encode object form."},"method":{"zh":"梯度方向描述子","en":"Gradient-orientation descriptor"},"artifact":{"zh":"HOG 检测特征","en":"HOG detector feature"}}],"svgText":["gradient cells to histogram","orientation bins"],"svgBytes":1298,"hasViewBox":true,"hasTitle":false,"hasDesc":false,"hasScript":false,"sourceTraceable":true},{"path":"resources/images/bench-council-ai100/explainers/2006-dbn_stacked-rbms.svg","exists":true,"assetIds":["asset-2006-dbn-stacked-rbms"],"roles":["architecture-explainer"],"captions":{"zh":["堆叠 RBM 预训练"],"en":["Stacked RBM pretraining"]},"subcaptions":{"zh":["深度置信网络 的本地重绘图，依据页面列出的来源材料制作。"],"en":["Local redraw for Deep Belief Network, based on the listed source material."]},"rightsStatuses":["documented-in-legacy"],"sourceIds":["source-a-fast-learning-algorithm-for-deep-belief-nets"],"sources":[{"id":"source-a-fast-learning-algorithm-for-deep-belief-nets","type":"paper","reliability":"primary","title":{"zh":"《深度信念网络的快速学习算法》","en":"A Fast Learning Algorithm for Deep Belief Nets"},"url":"https://doi.org/10.1162/neco.2006.18.7.1527"}],"variantSourceIds":["source-a-fast-learning-algorithm-for-deep-belief-nets","source-geoffrey-hinton-photo-page","source-reducing-the-dimensionality-of-data-with-neural-networks"],"variantSources":[{"id":"source-a-fast-learning-algorithm-for-deep-belief-nets","type":"paper","reliability":"primary","title":{"zh":"《深度信念网络的快速学习算法》","en":"A Fast Learning Algorithm for Deep Belief Nets"},"url":"https://doi.org/10.1162/neco.2006.18.7.1527"},{"id":"source-reducing-the-dimensionality-of-data-with-neural-networks","type":"paper-page","reliability":"reference-only","title":{"zh":"Reducing the Dimensionality of Data with Neural Networks","en":"Reducing the Dimensionality of Data with Neural Networks"},"url":"https://doi.org/10.1126/science.1127647"},{"id":"source-geoffrey-hinton-photo-page","type":"personal-page","reliability":"primary","title":{"zh":"杰弗里·辛顿个人主页","en":"Geoffrey Hinton personal homepage"},"url":"https://www.cs.toronto.edu/~hinton/pages/photos.html"}],"usages":[{"storylineId":"bench-council-ai100","storylineTitle":{"zh":"AI 百大成就（BenchCouncil）","en":"AI Top 100 Achievements (BenchCouncil)"},"eventId":"2006-dbn","eventTitle":{"zh":"深度置信网络","en":"Deep Belief Network"},"variant":"bench-council-ai100","variantFile":"archive/events/2006-dbn/variants/bench-council-ai100.json","visual":"dbn","demoImage":"","description":{"zh":"辛顿、奥辛德罗和德在 2006 年提出深度置信网络的快速训练方法，回应当时深层神经网络难以直接优化的问题。训练从底层开始，把每相邻两层视为受限玻尔兹曼机，在无标签数据上逐层学习特征；堆叠完成后，再用生成式或监督目标对整个网络微调。 这种贪心逐层预训练为深层模型提供较好的参数起点，使数字识别和降维等任务取得有竞争力的结果，也让“深度学习”重新成为可实验的研究方向。后来 ReLU、更大数据、GPU 和改进初始化使纯监督训练更普遍，但 DBN 在深度学习复兴中的历史作用仍然关键。","en":"Geoffrey Hinton, Simon Osindero, and Yee-Whye Teh introduced a fast training method for deep belief networks in 2006, addressing the difficulty of directly optimizing deep neural networks at the time. Training starts at the bottom, treating each adjacent pair of layers as a restricted Boltzmann machine and learning features from unlabeled data layer by layer. The completed stack is then fine-tuned with a generative or supervised objective. This greedy pretraining supplied deep models with a useful parameter initialization and produced competitive results in tasks such as digit recognition and dimensionality reduction, making “deep learning” experimentally credible again. ReLU activations, larger datasets, GPUs, and improved initialization later made fully supervised training more common, but DBNs retain a central historical role in the revival of deep architectures."},"method":{"zh":"逐层无监督预训练","en":"Layer-wise unsupervised pretraining"},"artifact":{"zh":"深度置信网络训练方案","en":"Deep belief net training recipe"}}],"svgText":["Stacked RBM pretraining","stack RBMs one layer at a time","local redrawn explainer"],"svgBytes":6254,"hasViewBox":true,"hasTitle":false,"hasDesc":false,"hasScript":false,"sourceTraceable":true},{"path":"resources/images/bench-council-ai100/explainers/2006-dbn_wake-finetune.svg","exists":true,"assetIds":["asset-2006-dbn-wake-finetune"],"roles":["architecture-explainer"],"captions":{"zh":["预训练后微调"],"en":["Pretrain then fine-tune"]},"subcaptions":{"zh":["深度置信网络 的本地重绘图，依据页面列出的来源材料制作。"],"en":["Local redraw for Deep Belief Network, based on the listed source material."]},"rightsStatuses":["documented-in-legacy"],"sourceIds":["source-a-fast-learning-algorithm-for-deep-belief-nets"],"sources":[{"id":"source-a-fast-learning-algorithm-for-deep-belief-nets","type":"paper","reliability":"primary","title":{"zh":"《深度信念网络的快速学习算法》","en":"A Fast Learning Algorithm for Deep Belief Nets"},"url":"https://doi.org/10.1162/neco.2006.18.7.1527"}],"variantSourceIds":["source-a-fast-learning-algorithm-for-deep-belief-nets","source-geoffrey-hinton-photo-page","source-reducing-the-dimensionality-of-data-with-neural-networks"],"variantSources":[{"id":"source-a-fast-learning-algorithm-for-deep-belief-nets","type":"paper","reliability":"primary","title":{"zh":"《深度信念网络的快速学习算法》","en":"A Fast Learning Algorithm for Deep Belief Nets"},"url":"https://doi.org/10.1162/neco.2006.18.7.1527"},{"id":"source-reducing-the-dimensionality-of-data-with-neural-networks","type":"paper-page","reliability":"reference-only","title":{"zh":"Reducing the Dimensionality of Data with Neural Networks","en":"Reducing the Dimensionality of Data with Neural Networks"},"url":"https://doi.org/10.1126/science.1127647"},{"id":"source-geoffrey-hinton-photo-page","type":"personal-page","reliability":"primary","title":{"zh":"杰弗里·辛顿个人主页","en":"Geoffrey Hinton personal homepage"},"url":"https:/ plainers/2006-surf_interest-points.svg","exists":true,"assetIds":["asset-2006-surf-interest-points"],"roles":["architecture-explainer"],"captions":{"zh":["SURF 兴趣点"],"en":["SURF interest points"]},"subcaptions":{"zh":["关于 SURF 式兴趣点检测的本地原创解释图。"],"en":["Original local explainer of SURF-style interest point detection."]},"rightsStatuses":["documented-in-legacy"],"sourceIds":["source-surf-speeded-up-robust-features"],"sources":[{"id":"source-surf-speeded-up-robust-features","type":"paper","reliability":"primary","title":{"zh":"《SURF：加速稳健特征》","en":"SURF: Speeded Up Robust Features"},"url":"https://doi.org/10.1007/11744023_32"}],"variantSourceIds":["source-eth-surf-paper-pdf","source-original-surf-project-page","source-surf-overview","source-surf-speeded-up-robust-features"],"variantSources":[{"id":"source-surf-speeded-up-robust-features","type":"paper","reliability":"primary","title":{"zh":"《SURF：加速稳健特征》","en":"SURF: Speeded Up Robust Features"},"url":"https://doi.org/10.1007/11744023_32"},{"id":"source-eth-surf-paper-pdf","type":"paper-file","reliability":"secondary","title":{"zh":"ETH SURF 论文 PDF","en":"ETH SURF paper PDF"},"url":"https://people.ee.ethz.ch/~surf/eccv06.pdf"},{"id":"source-original-surf-project-page","type":"project-page","reliability":"secondary","title":{"zh":"SURF 原始项目页","en":"Original SURF project page"},"url":"https://people.ee.ethz.ch/~surf/"},{"id":"source-surf-overview","type":"encyclopedia-entry","reliability":"reference-only","title":{"zh":"SURF 概览","en":"SURF overview"},"url":"https://en.wikipedia.org/wiki/Speeded_up_robust_features"}],"usages":[{"storylineId":"bench-council-ai100","storylineTitle":{"zh":"AI 百大成就（BenchCouncil）","en":"AI Top 100 Achievements (BenchCouncil)"},"eventId":"ai100-2006-surf","eventTitle":{"zh":"SURF 加速稳健特征","en":"SURF"},"variant":"bench-council-ai100","variantFile":"archive/events/ai100-2006-surf/variants/bench-council-ai100.json","visual":"surf","demoImage":"resources/images/bench-council-ai100/explainers/2006-surf_interest-points.svg","description":{"zh":"贝、图伊特拉尔斯和范古尔在 2006 年提出 SURF，目标是在保留尺度与旋转稳健性的同时提高局部特征计算速度。检测器用盒式滤波近似 Hessian 矩阵响应，并借助积分图以近似固定成本计算不同尺度的滤波；描述子则汇总关键点邻域中的 Haar 小波响应。 SURF 可以为图像匹配、目标识别和三维重建提供可重复的局部对应点，在许多场景中比 SIFT 更快。速度来自近似和紧凑表示，因此不同数据上的精度权衡并不相同。它代表手工局部特征时代对稳健性与实时性的系统优化。","en":"Herbert Bay, Tinne Tuytelaars, and Luc Van Gool introduced SURF in 2006 to improve the speed of local features while retaining robustness to scale and rotation. Its detector approximates Hessian-matrix responses with box filters and uses integral images to evaluate filters at different scales efficiently. The descriptor summarizes Haar-wavelet responses around each keypoint. SURF supplies repeatable local correspondences for image matching, object recognition, and 3D reconstruction and was faster than SIFT in many settings. Its speed comes from approximations and a compact representation, so the accuracy tradeoff varies across data. The method represents the hand-crafted local-feature era's systematic effort to balance robustness with real-time computation."},"method":{"zh":"快速局部特征描述子","en":"Fast local feature descriptor"},"artifact":{"zh":"SURF 检测器与描述子","en":"SURF detector and descriptor"}}],"svgText":["fast robust interest points","integral image"],"svgBytes":1365,"hasViewBox":true,"hasTitle":false,"hasDesc":false,"hasScript":false,"sourceTraceable":true},{"path":"resources/images/bench-council-ai100/explainers/2008-tsne_cluster-map.svg","exists":true,"assetIds":["asset-2008-tsne-cluster-map"],"roles":["architecture-explainer"],"captions":{"zh":["二维簇图"],"en":["2D cluster map"]},"subcaptions":{"zh":["t-SNE 的本地重绘图，依据页面列出的来源材料制作。"],"en":["Local redraw for t-SNE, based on the listed source material."]},"rightsStatuses":["documented-in-legacy"],"sourceIds":["source-visualizing-data-using-t-sne"],"sources":[{"id":"source-visualizing-data-using-t-sne","type":"paper","reliability":"primary","title":{"zh":"《使用 t-SNE 可视化数据》","en":"Visualizing Data using t-SNE"},"url":"https://jmlr.org/papers/v9/vandermaaten08a.html"}],"variantSourceIds":["source-how-to-use-t-sne-effectively-distill","source-laurens-van-der-maaten-homepage","source-visualizing-data-using-t-sne"],"variantSources":[{"id":"source-visualizing-data-using-t-sne","type":"paper","reliability":"primary","title":{"zh":"《使用 t-SNE 可视化数据》","en":"Visualizing Data using t-SNE"},"url":"https://jmlr.org/papers/v9/vandermaaten08a.html"},{"id":"source-laurens-van-der-maaten-homepage","type":"personal-page","reliability":"primary","title":{"zh":"劳伦斯·范德马滕个人主页","en":"Laurens van der Maaten personal homepage"},"url":"https://lvdmaaten.github.io/"},{"id":"source-how-to-use-t-sne-effectively-distill","type":"documentation","reliability":"reference-only","title":{"zh":"How to Use t-SNE Effectively, Distill","en":"How to Use t-SNE Effectively, Distill"},"url":"https://distill.pub/2016/misread-tsne/"}],"usages":[{"storylineId":"bench-council-ai100","storylineTitle":{"zh":"AI 百大成就（BenchCouncil）","en":"AI Top 100 Achievements (BenchCouncil)"},"eventId":"2008-tsne","eventTitle":{"zh":"t-SNE","en":"t-SNE"},"variant":"bench-council-ai100","variantFile":"archive/events/2008-tsne/variants/bench-council-ai100.json","visual":"tsne","demoImage":"","description":{"zh":"范德马滕和辛顿在 2008 年提出 t-SNE，把高维空间中样本之间的局部邻近关系转换为概率分布，再在二维或三维空间中寻找一组点，使其邻域概率尽量相似。低维空间采用重尾 Student t 分布，缓解早期方法把不同群体挤在一起的“拥挤问题”。 t-SNE 常能把图像、词向量或生物数据中的局部簇结构直观呈现，因此成为最常见的表示可视化工具之一。但图上的簇间距离、簇大小和空白区域不一定忠实反映全局结构，结果还受困惑度、初始化和随机性影响。它适合探索邻域，而不应被当作严格证明。","en":"Laurens van der Maaten and Geoffrey Hinton introduced t-SNE in 2008 by converting local neighborhood relationships among high-dimensional samples into probabilities, then finding a two- or three-dimensional arrangement with similar neighborhood probabilities. A heavy-tailed Student t distribution in the low-dimensional map reduces the “crowding problem” that caused earlier methods to compress distinct groups together. t-SNE often makes local clusters in images, embeddings, or biological measurements visually apparent and became one of the most familiar representation-visualization tools. Distances between clusters, cluster sizes, and empty regions in the map do not necessarily preserve global structure, and results depend on perplexity, initialization, and randomness. It is best used to explore neighborhoods rather than as formal proof of distinct categories."},"method":{"zh":"保持邻域的非线性嵌入","en":"Neighbor-preserving nonlinear embedding"},"artifact":{"zh":"t 分布随机邻域嵌入","en":"t-distributed stochastic neighbor embedding"}}],"svgText":["2D cluster map","2D map emphasizes local clusters","local redrawn explainer"],"svgBytes":1127,"hasViewBox":true,"hasTitle":false,"hasDesc":false,"hasScript":false,"sourceTraceable":true},{"path":"resources/images/bench-council-ai100/explainers/2008-tsne_neighbor-probabilities.svg","exists":true,"assetIds":["asset-2008-tsne-neighbor-probabilities"],"roles":["architecture-explainer"],"captions":{"zh":["邻域概率匹配"],"en":["Neighbor probability matching"]},"subcaptions":{"zh":["t-SNE 的本地重绘图，依据页面列出的来源材料制作。"],"en":["Local redraw for t-SNE, based on the listed source material."]},"rightsStatuses":["documented-in-legacy"],"sourceIds":["source-visualizing-data-using-t-sne"],"sources":[{"id":"source-visualizing-data-using-t-sne","type":"paper","reliability":"primary","title":{"zh":"《使用 t-SNE 可视化数据》","en":"Visualizing Data using t-SNE"},"url":"https://jmlr.org/papers/v9/vandermaaten08a.html"}],"variantSourceIds":["source-how-to-use-t-sne-effectively-distill","source-laurens-van-der-maaten-homepage","source-visualizing-data-using-t-sne"],"variantSources":[{"id":"source-visualizing-data-using-t-sne","type":"paper","reliability":"primary","title":{"zh":"《使用 t-SNE 可视化数据》","en":"Visualizing Data using t-SNE"},"url":"https://jmlr.org/papers/v9/vandermaaten08a.html"},{"id":"source-laurens-van-der-maaten-homepage","type":"personal-page","reliability":"primary","title":{"zh":"劳伦斯·范德马滕个人主页","en":"Laurens van der Maaten personal homepage"},"url":"https://lvdmaaten.github.io/"},{"id":"

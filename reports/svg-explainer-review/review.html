up no-limit Texas hold'em, a game with hidden information and enormous decision spaces. It combined abstract game solving, real-time endgame solving, and self-improvement after each day of play, proving that game AI could move beyond perfect-information boards."},"method":{"zh":"抽象、子局求解与策略修补","en":"Abstraction, subgame solving, and strategy repair"},"artifact":{"zh":"一对一无限注德州扑克智能体","en":"Heads-up no-limit Texas hold'em poker agent"}}],"svgText":["Libratus: hidden information poker","blueprint strategy + real-time subgame solving + nightly repair","A","?","private state","Blueprint","Subgame","Repair","Interaction: hide or reveal cards to compare direct search with equilibrium reasoning."],"svgBytes":2804,"hasViewBox":true,"hasTitle":true,"hasDesc":true,"hasScript":false,"sourceTraceable":true},{"path":"resources/images/bench-council-ai100/explainers/2017-pix2pix_paired-translation.svg","exists":true,"assetIds":["asset-2017-pix2pix-paired-translation"],"roles":["architecture-explainer"],"captions":{"zh":["Pix2Pix 解释图"],"en":["Pix2Pix explainer"]},"subcaptions":{"zh":["关于该成就流程的本地原创解释图。"],"en":["Original local explainer for the achievement flow."]},"rightsStatuses":["documented-in-legacy"],"sourceIds":["source-image-to-image-translation-with-conditional-adversarial-networks"],"sources":[{"id":"source-image-to-image-translation-with-conditional-adversarial-networks","type":"paper","reliability":"primary","title":{"zh":"《使用条件对抗网络进行图像到图像转换》","en":"Image-to-Image Translation with Conditional Adversarial Networks"},"url":"https://arxiv.org/abs/1611.07004"}],"variantSourceIds":["source-cvpr-open-access-paper-page","source-image-to-image-translation-with-conditional-adversarial-networks","source-pix2pix-project-page"],"variantSources":[{"id":"source-image-to-image-translation-with-conditional-adversarial-networks","type":"paper","reliability":"primary","title":{"zh":"《使用条件对抗网络进行图像到图像转换》","en":"Image-to-Image Translation with Conditional Adversarial Networks"},"url":"https://arxiv.org/abs/1611.07004"},{"id":"source-cvpr-open-access-paper-page","type":"paper-page","reliability":"secondary","title":{"zh":"CVPR 开放论文页面","en":"CVPR open-access paper page"},"url":"https://openaccess.thecvf.com/content_cvpr_2017/html/Isola_Image-To-Image_Translation_With_CVPR_2017_paper.html"},{"id":"source-pix2pix-project-page","type":"project-page","reliability":"secondary","title":{"zh":"Pix2Pix 项目页面","en":"Pix2Pix project page"},"url":"https://phillipi.github.io/pix2pix/"}],"usages":[{"storylineId":"bench-council-ai100","storylineTitle":{"zh":"AI 百大成就（BenchCouncil）","en":"AI Top 100 Achievements (BenchCouncil)"},"eventId":"ai100-2017-pix2pix","eventTitle":{"zh":"Pix2Pix","en":"Pix2Pix"},"variant":"bench-council-ai100","variantFile":"archive/events/ai100-2017-pix2pix/variants/bench-council-ai100.json","visual":"configuredPaper","demoImage":"resources/images/bench-council-ai100/explainers/2017-pix2pix_paired-translation.svg","description":{"zh":"Pix2Pix 把边缘到照片、标签图到街景、地图到航拍图等任务统一为“给定输入图像生成对应输出”的条件 GAN。U-Net 生成器通过跳跃连接保留输入的空间结构，PatchGAN 判别器在局部图块上判断真实感；L1 重建损失约束整体内容，对抗损失补充清晰纹理。 这一组合减少了为每个图像转换任务手工设计损失和流水线的需要，并成为配对图像翻译的标准基线。它必须获得严格对齐的输入输出样本，输出也可能平均化或生成不可靠细节；但它清楚展示了监督学习与对抗生成如何共同控制结构和外观。","en":"Pix2Pix unified edges-to-photos, label maps-to-street scenes, maps-to-aerial images, and related tasks as conditional GAN problems that generate an output image from an input image. A U-Net generator preserves spatial structure through skip connections, while a PatchGAN discriminator judges realism over local patches. An L1 reconstruction loss constrains overall content and the adversarial loss supplies sharper texture. The combination reduced the need to design a separate pipeline and objective for every image-translation task and became a standard paired-translation baseline. It requires strictly aligned input-output examples, and outputs may average possibilities or invent unreliable details. It nevertheless showed clearly how supervised reconstruction and adversarial generation can jointly control structure and appearance."},"method":{"zh":"配对条件图像转换","en":"Paired conditional image translation"},"artifact":{"zh":"Pix2Pix 图像到图像转换框架","en":"Pix2Pix image-to-image translation framework"}}],"svgText":["Pix2Pix","input image","input","paired cGAN","mechanism","output image","result","Original local SVG redraw; source figures are not copied."],"svgBytes":2338,"hasViewBox":true,"hasTitle":true,"hasDesc":true,"hasScript":false,"sourceTraceable":true},{"path":"resources/images/bench-council-ai100/explainers/2017-transformer_self-attention.svg","exists":true,"assetIds":["asset-transformer-attention"],"roles":["algorithm-explainer"],"captions":{"zh":["Transformer 自注意力机制"],"en":["Transformer self-attention mechanism"]},"subcaptions":{"zh":["本地重绘的 token 间注意力关系解释图。"],"en":["Locally redrawn explainer of attention relationships between tokens."]},"rightsStatuses":["local-redraw"],"sourceIds":["source-transformer-arxiv"],"sources":[{"id":"source-transformer-arxiv","type":"paper","reliability":"primary","title":{"zh":"《Attention Is All You Need》","en":"Attention Is All You Need"},"url":"https://arxiv.org/abs/1706.03762"}],"variantSourceIds":["source-google-research-publication","source-google-transformer-blog","source-transformer-arxiv","source-transformer-neurips"],"variantSources":[{"id":"source-transformer-arxiv","type":"paper","reliability":"primary","title":{"zh":"《Attention Is All You Need》","en":"Attention Is All You Need"},"url":"https://arxiv.org/abs/1706.03762"},{"id":"source-transformer-neurips","type":"paper-page","reliability":"primary","title":{"zh":"NeurIPS 论文页面","en":"NeurIPS paper page"},"url":"https://papers.nips.cc/paper/7181-attention-is-all-you-need"},{"id":"source-google-research-publication","type":"paper-page","reliability":"primary","title":{"zh":"Google Research 出版页面","en":"Google Research publication page"},"url":"https://research.google/pubs/attention-is-all-you-need/"},{"id":"source-google-transformer-blog","type":"article","reliability":"secondary","title":{"zh":"Google Research Transformer 博客","en":"Google Research Transformer blog post"},"url":"https://research.google/blog/transformer-a-novel-neural-network-architecture-for-language-understanding/"}],"usages":[{"storylineId":"bench-council-ai100","storylineTitle":{"zh":"AI 百大成就（BenchCouncil）","en":"AI Top 100 Achievements (BenchCouncil)"},"eventId":"2017-transformer","eventTitle":{"zh":"Transformer","en":"Transformer"},"variant":"bench-council-ai100","variantFile":"archive/events/2017-transformer/variants/bench-council-ai100.json","visual":"transformer","demoImage":"resources/images/bench-council-ai100/explainers/2017-transformer_self-attention.svg","description":{"zh":"2017 年的 Transformer 用堆叠的多头自注意力和前馈模块替代循环序列处理。每个词元生成 query、key 和 value 表示，使模型能够并行衡量序列中不同位置的关系；位置编码则补充原本由循环结构携带的顺序信息。最初的编码器—解码器系统面向机器翻译，并通过更高的训练并行度取得强劲结果。 这一架构让注意力从附着在 RNN 上的辅助模块变成通用计算单元。可扩展的模块后来支撑 BERT、GPT 式语言模型、视觉 Transformer、多模态系统和许多智能体基础。专家通常把 Transformer 视为现代 AI 的定义性架构，同时也指出标准注意力处理超长序列时会带来较高计算开销。","en":"The 2017 Transformer replaced recurrent sequence processing with stacked multi-head self-attention and feed-forward blocks. Each token forms query, key, and value representations, allowing the model to weigh relationships across a sequence in parallel; positional encodings supply order information that recurrence previously carried. The original encoder-decoder system was designed for machine translation and achieved strong results with substantially more parallel training. This architecture made attention a general computational primitive rather than an auxiliary component attached to an RNN. Its scalable blocks later supported BERT, GPT-style language models, vision transformers, multimodal systems, and many agent foundations. Experts generally regard the Transformer as a defining modern AI architecture, while recognizing that its standard attention mechanism can become expensive on very long sequences."},"method":{"zh":"自注意力序列架构","en":"Self-attention sequence architecture"},"artifact":{"zh":"Transformer 架构","en":"Transformer architecture"}},{"storylineId":"deep-learning","storylineTitle":{"zh":"深度学习分支","en":"Deep Learning"},"eventId":"2017-transformer","eventTitle":{"zh":"Transformer","en":"Transformer"},"variant":"deep-learning","variantFile":"archive/events/2017-transformer/variants/deep-learning.json","visual":"transformer","demoImage":"resources/images/bench-council-ai100/explainers/2017-transformer_self-attention.svg","description":{"zh":"2017 年，阿希什·瓦斯瓦尼等人在《Attention Is All You Need》中提出 Transformer。它用多头自注意力比较序列中不同位置的 query、key 和 value，并配合前馈网络、残差连接和位置编码，构成不依赖循环或卷积的编码器—解码器。 自注意力允许训练时并行处理整段序列，缩短远距离信息之间的计算路径。原论文在机器翻译基准上取得更高质量，同时显著减少训练成本。Transformer 随后成为 BERT、GPT、视觉 Transformer、多模态基础模型和现代生成式 AI 的共同架构基础。","en":"In 2017, Ashish Vaswani and colleagues introduced the Transformer in Attention Is All You Need . Multi-head self-attention compared queries, keys, and values across sequence positions, while feed-forward layers, residual connections, and positional encodings formed an encoder-decoder architecture without recurrence or convolution. Self-attention allowed whole sequences to be processed in parallel during training and shortened the computational path between distant pieces of information. The original paper achieved stronger machine-translation quality with substantially lower training cost. The Transformer subsequently became the shared architectural foundation of BERT, GPT, vision transformers, multimodal foundation models, and modern generative AI."},"method":{"zh":"自注意力序列架构","en":"Self-attention sequence architecture"},"artifact":{"zh":"Transformer 架构","en":"Transformer architecture"}}],"svgText":["Scaled dot-product self-attention","queries Q","keys K","values V","Attention(Q,K,V) = softmax(QKᵀ / √dₖ) V","weighted value mixture"],"svgBytes":1764,"hasViewBox":true,"hasTitle":true,"hasDesc":true,"hasScript":false,"sourceTraceable":true},{"path":"resources/images/bench-council-ai100/explainers/2017-wasserstein-gan_critic-distance.svg","exists":true,"assetIds":["asset-2017-wasserstein-gan-critic-distance"],"roles":["architecture-explainer"],"captions":{"zh":["Wasserstein GAN 解释图"],"en":["Wasserstein GAN explainer"]},"subcaptions":{"zh":["关于该成就流程的本地原创解释图。"],"en":["Original local explainer for the achievement flow."]},"rightsStatuses":["documented-in-legacy"],"sourceIds":["source-wasserstein-generative-adversarial-networks"],"sources":[{"id":"source-wasserstein-generative-adversarial-networks","type":"paper","reliability":"primary","title":{"zh":"《Wasserstein 生成对抗网络》","en":"Wasserstein Generative Adversarial Networks"},"url":"https://proceedings.mlr.press/v70/arjovsky17a.html"}],"variantSourceIds":["source-improved-training-of-wasserstein-gans","source-wasserstein-gan-overview","source-wasserstein-generative-adversarial-networks"],"variantSources":[{"id":"source-wasserstein-generative-adversarial-networks","type":"paper","reliability":"primary","title":{"zh":"《Wasserstein 生成对抗网络》","en":"Wasserstein Generative Adversarial Networks"},"url":"https://proceedings.mlr.press/v70/arjovsky17a.html"},{"id":"source-improved-training-of-wasserstein-gans","type":"paper","reliability":"primary","title":{"zh":"《Wasserstein GAN 的改进训练》","en":"Improved Training of Wasserstein GANs"},"url":"https://proceedings.neurips.cc/paper/2017/hash/892c3b1c6dccd52936e27cbd0ff683d6-Abstract.html"},{"id":"source-wasserstein-gan-overview","type":"encyclopedia-entry","reliability":"reference-only","title":{"zh":"Wasserstein GAN 概览","en":"Wasserstein GAN overview"},"url":"https://en.wikipedia.org/wiki/Wasserstein_GAN"}],"usages":[{"storylineId":"bench-council-ai100","storylineTitle":{"zh":"AI 百大成就（BenchCouncil）","en":"AI Top 100 Achievements (BenchCouncil)"},"eventId":"ai100-2017-wasserstein-gan","eventTitle":{"zh":"Wasserstein GAN","en":"Wasserstein GAN"},"variant":"bench-council-ai100","variantFile":"archive/events/ai100-2017-wasserstein-gan/variants/bench-council-ai100.json","visual":"configuredPaper","demoImage":"resources/images/bench-council-ai100/explainers/2017-wasserstein-gan_critic-distance.svg","description":{"zh":"Wasserstein GAN 用最优传输中的 Earth Mover 距离重新解释生成分布与真实分布之间的差异。判别器被替换为输出实数分数的 critic，并必须满足 Lipschitz 约束；原论文通过权重裁剪近似这一约束，使生成器在分布几乎不重叠时仍能获得更有用的梯度。 critic 损失与样本质量的关系更连续，使训练过程更容易监控，并缓解部分不稳定和模式崩溃。权重裁剪本身可能限制模型能力，后续 WGAN-GP 用梯度惩罚改进约束。WGAN 的长期价值在于把生成训练问题与概率分布几何和最优传输连接起来。","en":"Wasserstein GAN reinterpreted the difference between generated and real distributions through the Earth Mover distance from optimal transport. The discriminator becomes a critic that outputs real-valued scores and must satisfy a Lipschitz constraint. The original paper approximated that constraint through weight clipping, allowing the generator to receive more useful gradients even when the two distributions barely overlap. The critic loss varies more continuously with sample quality, making training easier to monitor and reducing some instability and mode collapse. Weight clipping can itself restrict model capacity, and the later WGAN-GP replaced it with a gradient penalty. WGAN's lasting contribution was connecting generative training with the geometry of probability distributions and optimal transport."},"method":{"zh":"基于推土机距离的对抗学习","en":"Earth-mover distance adversarial learning"},"artifact":{"zh":"Wasserstein GAN 目标函数","en":"Wasserstein GAN objective"}}],"svgText":["Wasserstein GAN","real distribution","input","critic score gap","Wasserstein estimate","mechanism","generated","distribution","result","Original local SVG redraw; source figures are not copied."],"svgBytes":2600,"hasViewBox":true,"hasTitle":true,"hasDesc":true,"hasScript":false,"sourceTraceable":true},{"path":"resources/images/bench-council-ai100/explainers/2018-bert_masked-lm.svg","exists":true,"assetIds":["asset-2018-bert-masked-lm"],"roles":["architecture-explainer"],"captions":{"zh":["BERT 掩码语言建模"],"en":["BERT masked language modeling"]},"subcaptions":{"zh":["关于双向预训练的本地原创解释图。"],"en":["Original local explainer of bidirectional pre-training."]},"rightsStatuses":["documented-in-legacy"],"sourceIds":["source-bert"],"sources":[{"id":"source-bert","type":"paper","reliability":"primary","title":{"zh":"《BERT》","en":"BERT"},"url":"https://arxiv.org/abs/1810.04805"}],"variantSourceIds":["source-acl-anthology-bert-paper","source-bert","source-google-ai-bert-blog-post","source-google-research-bert-repository"],"variantSources":[{"id":"source-bert","type":"paper","reliability":"primary","title":{"zh":"《BERT》","en":"BERT"},"url":"https://arxiv.org/abs/1810.04805"},{"id":"source-acl-anthology-bert-paper","type":"paper-page","reliability":"secondary","title":{"zh":"ACL Anthology BERT 论文","en":"ACL Anthology BERT paper"},"url":"https://aclanthology.org/N19-1423/"},{"id":"source-google-research-bert-repository","type":"code","reliability":"secondary","title":{"zh":"Google Research BERT 代码仓库","en":"Google Research BERT repository"},"url":"https://github.com/google-research/bert"},{"id":"source-google-ai-bert-blog-post","type":"article","reliability":"secondary","title":{"zh":"Google AI BERT 博客","en":"Google AI BERT blog post"},"url":"https://research.google/blog/open-sourcing-bert-state-of-the-art-pre-training-for-natural-language-processing/"}],"usages":[{"storylineId":"bench-council-ai100","storylineTitle":{"zh":"AI 百大成就（BenchCouncil）","en":"AI Top 100 Achievements (BenchCouncil)"},"eventId":"2018-bert","eventTitle":{"zh":"BERT","en":"BERT"},"variant":"bench-council-ai100","variantFile":"archive/events/2018-bert/variants/bench-council-ai100.json","visual":"bert","demoImage":"resources/images/bench-council-ai100/explainers/2018-bert_masked-lm.svg","description":{"zh":"德夫林等人在 2018 年提出 BERT，用 Transformer 编码器从左右两侧上下文共同学习词语表示。预训练时，模型预测被随机遮盖的词元，并在原始版本中同时执行下一句预测；完成后，只需加入较小任务头并用标注数据微调，就能适配问答、文本分类和序列标注。 BERT 把“大规模无标签预训练 + 少量任务微调”变成 NLP 的标准范式，并在多项基准上显著提升表现。它主要学习理解型双向表示，并非像 GPT 那样按从左到右方式生成长文本。后续模型修改了预训练目标和规模，但 BERT 确立的上下文化编码器路线持续影响搜索、信息抽取和语言理解。","en":"Jacob Devlin and colleagues introduced BERT in 2018 as a Transformer encoder that learns each token from both left and right context. During pretraining it predicts randomly masked tokens and, in the original version, also performs next-sentence prediction. A comparatively small task head can then be added and the whole model fine-tuned with labeled data for question answering, classification, or sequence labeling. BERT made “large-scale unlabeled pretraining plus limited task-specific fine-tuning” a standard NLP pattern and produced major gains across benchmarks. It primarily learns bidirectional representations for understanding tasks rather than generating long text from left to right like GPT. Later models changed the objectives and scale, but BERT's contextual encoder route continued to shape search, information extraction, and language understanding."},"method":{"zh":"掩码双向 Transformer 预训练","en":"Masked bidirectional transformer pre-training"},"artifact":{"zh":"BERT 模型族","en":"BERT model family"}},{"storylineId":"deep-learning","storylineTitle":{"zh":"深度学习分支","en":"Deep Learning"},"eventId":"2018-bert","eventTitle":{"zh":"BERT","en":"BERT"},"variant":"deep-learning","variantFile":"archive/events/2018-bert/variants/deep-learning.json","visual":"bert","demoImage":"resources/images/bench-council-ai100/explainers/2018-bert_masked-lm.svg","description":{"zh":"2018 年，Google 的雅各布·德夫林等人提出 BERT，即“双向 Transformer 编码器表示”。它随机遮盖输入中的部分词并要求模型恢复，同时在原始方案中加入下一句预测，使每一层表示都能同时利用左侧和右侧上下文。 预训练完成后，BERT 只需增加很小的任务输出层并微调整个模型，就能用于问答、自然语言推断、文本分类等任务。论文在 11 项 NLP 基准上刷新结果，推动行业从“为每个任务单独设计模型”转向“先在大规模文本上预训练，再面向任务微调”的统一范式。","en":"In 2018, Jacob Devlin and colleagues at Google introduced BERT, or Bidirectional Encoder Representations from Transformers. It randomly masked some input tokens and trained the model to recover them, while the original system also used next-sentence prediction. Every layer could therefore condition on both left and right context. After pre-training, BERT needed only a small task-specific output layer and end-to-end fine-tuning for question answering, natural-language inference, classification, and other tasks. The paper reported new results across eleven NLP benchmarks. It accelerated the shift from designing a separate architecture for each task toward a unified pattern of large-scale language pre-training followed by task adaptation."},"method":{"zh":"掩码双向 Transformer 预训练","en":"Masked bidirectional transformer pre-training"},"artifact":{"zh":"BERT 模型族","en":"BERT model family"}}],"svgText":["bidirectional masked pre-training","the","[MASK]","reads","context","predict masked word","left and right context"],"svgBytes":1465,"hasViewBox":true,"hasTitle":true,"hasDesc":true,"hasScript":false,"sourceTraceable":true},{"path":"resources/images/bench-council-ai100/explainers/2018-gpt_next-token.svg","exists":true,"assetIds":["asset-2018-gpt-next-token"],"roles":["architecture-explainer"],"captions":{"zh":["GPT 下一个令牌预训练"],"en":["GPT next-token pre-training"]},"subcaptions":{"zh":["关于解码器式生成预训练的本地原创解释图。"],"en":["Original local explainer of decoder-only generative pre-training."]},"rightsStatuses":["documented-in-legacy"],"sourceIds":["source-improving-language-understanding-by-generative-pre-training"],"sources":[{"id":"source-improving-language-understanding-by-generative-pre-training","type":"paper-file","reliability":"primary","title":{"zh":"《通过生成式预训练改进语言理解》","en":"Improving Language Understanding by Generative Pre-Training"},"url":"https://cdn.openai.com/research-covers/language-unsupervised/language_understanding_paper.pdf"}],"variantSourceIds":["source-gpt-model-overview","source-improving-language-understanding-by-generative-pre-training","source-openai-language-unsupervised-page"],"variantSources":[{"id":"source-improving-language-understanding-by-generative-pre-training","type":"paper-file","reliability":"primary","title":{"zh":"《通过生成式预训练改进语言理解》","en":"Improving Language Understanding by Generative Pre-Training"},"url":"https://cdn.openai.com/research-covers/language-unsupervised/language_understanding_paper.pdf"},{"id":"source-openai-language-unsupervised-page","type":"article","reliability":"primary","title":{"zh":"OpenAI 无监督语言页面","en":"OpenAI language unsupervised page"},"url":"https://openai.com/index/language-unsupervised/"},{"id":"source-gpt-model-overview","type":"encyclopedia-entry","reliability":"reference-only","title":{"zh":"GPT 模型概览","en":"GPT model overview"},"url":"https://en.wikipedia.org/wiki/Generative_pre-trained_transformer"}],"usages":[{"storylineId":"bench-council-ai100","storylineTitle":{"zh":"AI 百大成就（BenchCouncil）","en":"AI Top 100 Achievements (BenchCouncil)"},"eventId":"2018-gpt","eventTitle":{"zh":"GPT","en":"GPT"},"variant":"bench-council-ai100","variantFile":"archive/events/2018-gpt/variants/bench-council-ai100.json","visual":"gpt","demoImage":"resources/images/bench-council-ai100/explainers/2018-gpt_next-token.svg","description":{"zh":"OpenAI 团队在 2018 年提出第一代 GPT，先用 BooksCorpus 等无标签文本训练只看左侧上下文的 Transformer 解码器预测下一个词，再把通用语言表示用监督微调适配分类、问答和文本蕴含等任务。不同任务被转换成模型能够按统一序列接口处理的输入。 这项工作证明生成式语言建模可以成为通用预训练目标，减少每个 NLP 任务对大量标注数据和专用架构的依赖。首代 GPT 的规模和能力远小于后来的模型，也不是对话产品；但“解码器式预训练、任务适配并持续扩大数据与参数”的路线成为 GPT-2、GPT-3 及现代大语言模型的重要起点。","en":"OpenAI's first GPT, introduced in 2018, pretrained a Transformer decoder on unlabeled text such as BooksCorpus by predicting the next word from left context. The general language representation was then adapted with supervised fine-tuning to classification, question answering, and textual-entailment tasks, with different tasks transformed into a common sequence interface. The work showed that generative language modeling could serve as a general pretraining objective, reducing dependence on large labeled datasets and specialized architectures for every NLP task. The first GPT was far smaller and less capable than later systems and was not a conversational product. Its route of decoder pretraining, task adaptation, and continued scaling of data and parameters nevertheless became the starting line for GPT-2, GPT-3, and modern large language models."},"method":{"zh":"解码器式生成预训练","en":"Decoder-only generative pre-training"},"artifact":{"zh":"生成式预训练 Transformer","en":"Generative Pre-trained Transformer"}},{"storylineId":"deep-learning","storylineTitle":{"zh":"深度学习分支","en":"Deep Learning"},"eventId":"2018-gpt","eventTitle":{"zh":"GPT","en":"GPT"},"variant":"deep-learning","variantFile":"archive/events/2018-gpt/variants/deep-learning.json","visual":"gpt","demoImage":"resources/images/bench-council-ai100/explainers/2018-gpt_next-token.svg","description":{"zh":"2018 年，OpenAI 的亚历克·拉德福德等人提出生成式预训练 Transformer。模型先在大规模无标注文本上按照从左到右预测下一个词的目标训练，再用少量任务标注数据微调，从而把通用语言知识迁移到分类、问答、文本蕴含等不同任务。 论文使用以 Transformer 解码器为基础的统一架构，在 12 项任务中的多数项目上取得当时有竞争力的结果。GPT 证明生成式语言建模可以充当通用预训练目标，并开启了持续扩大模型、数据和计算规模的解码器路线，后来发展出 GPT-2、GPT-3 及现代大语言模型。","en":"In 2018, Alec Radford and colleagues at OpenAI introduced the Generative Pre-trained Transformer. The model first learned from large amounts of unlabeled text by predicting the next word from left to right, then transferred that general language knowledge to classification, question answering, textual entailment, and other tasks through supervised fine-tuning. The paper used one Transformer-decoder-based architecture and reported competitive results on most of twelve evaluated tasks. GPT showed that generative language modeling could serve as a general pre-training objective. It opened the decoder-only scaling path in which models, data, and compute continued to grow, leading to GPT-2, GPT-3, and modern large language models."},"method":{"zh":"解码器式生成预训练","en":"Decoder-only generative pre-training"},"artifact":{"zh":"生成式预训练 Transformer","en":"Generative Pre-trained Transformer"}}],"svgText":["generative pre-training","AI","history","shows","decoder","transformer","next token","only previous tokens are visible"],"svgBytes":1460,"hasViewBox":true,"hasTitle":true,"hasDesc":true,"hasScript":false,"sourceTraceable":true},{"path":"resources/images/bench-council-ai100/explainers/201 haZero-style planning with model learning from experience."},"method":{"zh":"潜在动力学、策略-价值预测与树搜索","en":"Latent dynamics, policy-value prediction, and tree search"},"artifact":{"zh":"面向棋类游戏与 Atari 的规划智能体","en":"Planning agent for board games and Atari"}}],"svgText":["MuZero: planning with a learned model","observation -> latent state -> imagined rewards, values, policies","pixels","or board","latent","state","dynamics","policy","value","reward","Interaction: compare rule-based simulation with the compact latent model used by search."],"svgBytes":2791,"hasViewBox":true,"hasTitle":true,"hasDesc":true,"hasScript":false,"sourceTraceable":true},{"path":"resources/images/bench-council-ai100/explainers/2019-pluribus_blueprint-search.svg","exists":true,"assetIds":["asset-2019-pluribus-blueprint-search"],"roles":["architecture-explainer"],"captions":{"zh":["Pluribus 蓝图搜索"],"en":["Pluribus blueprint search"]},"subcaptions":{"zh":["多人扑克推理的原创解释图。"],"en":["Original explainer for multiplayer poker reasoning."]},"rightsStatuses":["documented-in-legacy"],"sourceIds":["source-science-paper"],"sources":[{"id":"source-science-paper","type":"paper-page","reliability":"primary","title":{"zh":"Science 论文","en":"Science paper"},"url":"https://www.science.org/doi/10.1126/science.aay2400"}],"variantSourceIds":["source-cmu-pluribus-release","source-meta-ai-pluribus-report","source-science-paper"],"variantSources":[{"id":"source-science-paper","type":"paper-page","reliability":"primary","title":{"zh":"Science 论文","en":"Science paper"},"url":"https://www.science.org/doi/10.1126/science.aay2400"},{"id":"source-meta-ai-pluribus-report","type":"news","reliability":"reference-only","title":{"zh":"Meta AI Pluribus 报道","en":"Meta AI Pluribus report"},"url":"https://ai.meta.com/blog/pluribus-first-ai-to-beat-pros-in-6-player-poker/"},{"id":"source-cmu-pluribus-release","type":"news","reliability":"reference-only","title":{"zh":"CMU Pluribus 新闻稿","en":"CMU Pluribus release"},"url":"https://www.cmu.edu/news/stories/archives/2019/july/ai-beats-pros-six-player-poker.html"}],"usages":[{"storylineId":"gaming-ai","storylineTitle":{"zh":"AI 在棋牌与博弈论的演进","en":"AI in Board & Tabletop Games"},"eventId":"2019-pluribus","eventTitle":{"zh":"Pluribus","en":"Pluribus"},"variant":"gaming-ai","variantFile":"archive/events/2019-pluribus/variants/gaming-ai.json","visual":"configuredPaper","demoImage":"resources/images/bench-council-ai100/explainers/2019-pluribus_blueprint-search.svg","description":{"zh":"Pluribus 将扑克 AI 从一对一扩展到六人无限注德州扑克。它使用紧凑蓝图策略与有限前瞻搜索，同时处理多个对手，把游戏 AI 推向无法只靠单一对手模型的多人场景。","en":"Pluribus extended poker AI from heads-up play to six-player no-limit Texas hold'em. It used a compact blueprint strategy plus limited-lookahead search to handle several opponents at once, moving game AI toward multiplayer settings where no single opponent model is enough."},"method":{"zh":"自我对弈蓝图策略与有限前瞻搜索","en":"Self-play blueprint strategy with limited-lookahead search"},"artifact":{"zh":"六人无限注德州扑克智能体","en":"Six-player no-limit Texas hold'em poker agent"}}],"svgText":["Pluribus: multiplayer poker","six seats, one compact blueprint, local refinement","P1","P2","P3","P4","P5","P6","blueprint","policy core","limited lookahead","real-time refine","Interaction: add opponents to see why local refinement replaces full-game solving."],"svgBytes":2848,"hasViewBox":true,"hasTitle":true,"hasDesc":true,"hasScript":false,"sourceTraceable":true},{"path":"resources/images/bench-council-ai100/explainers/2019-stylegan_style-modulation.svg","exists":true,"assetIds":["asset-2019-stylegan-style-modulation"],"roles":["architecture-explainer"],"captions":{"zh":["StyleGAN 解释图"],"en":["StyleGAN explainer"]},"subcaptions":{"zh":["关于该成就流程的本地原创解释图。"],"en":["Original local explainer for the achievement flow."]},"rightsStatuses":["documented-in-legacy"],"sourceIds":["source-a-style-based-generator-architecture-for-gans"],"sources":[{"id":"source-a-style-based-generator-architecture-for-gans","type":"paper","reliability":"primary","title":{"zh":"《面向 GAN 的基于风格的生成器架构》","en":"A Style-Based Generator Architecture for GANs"},"url":"https://arxiv.org/abs/1812.04948"}],"variantSourceIds":["source-a-style-based-generator-architecture-for-gans","source-cvpr-open-access-paper-page","source-nvidia-stylegan-repository"],"variantSources":[{"id":"source-a-style-based-generator-architecture-for-gans","type":"paper","reliability":"primary","title":{"zh":"《面向 GAN 的基于风格的生成器架构》","en":"A Style-Based Generator Architecture for GANs"},"url":"https://arxiv.org/abs/1812.04948"},{"id":"source-cvpr-open-access-paper-page","type":"paper-page","reliability":"secondary","title":{"zh":"CVPR 开放论文页面","en":"CVPR open-access paper page"},"url":"https://openaccess.thecvf.com/content_CVPR_2019/html/Karras_A_Style-Based_Generator_Architecture_for_Generative_Adversarial_Networks_CVPR_2019_paper.html"},{"id":"source-nvidia-stylegan-repository","type":"code","reliability":"secondary","title":{"zh":"NVIDIA StyleGAN 代码仓库","en":"NVIDIA StyleGAN repository"},"url":"https://github.com/NVlabs/stylegan"}],"usages":[{"storylineId":"bench-council-ai100","storylineTitle":{"zh":"AI 百大成就（BenchCouncil）","en":"AI Top 100 Achievements (BenchCouncil)"},"eventId":"ai100-2019-stylegan","eventTitle":{"zh":"StyleGAN","en":"StyleGAN"},"variant":"bench-council-ai100","variantFile":"archive/events/ai100-2019-stylegan/variants/bench-council-ai100.json","visual":"configuredPaper","demoImage":"resources/images/bench-council-ai100/explainers/2019-stylegan_style-modulation.svg","description":{"zh":"NVIDIA 团队在 2019 年提出 StyleGAN，把随机潜变量先通过映射网络转换到中间风格空间，再用每层的风格参数调制图像合成过程。较早层控制姿态、脸型等粗尺度结构，较晚层影响颜色和细节；独立噪声输入则产生雀斑、发丝等随机微观变化。 这种设计减弱了潜变量因素之间的纠缠，使高质量人脸生成和属性编辑更可控，也推动“生成器内部表示可解释性”的研究。首代模型仍会产生水滴状伪影和不自然细节，后续 StyleGAN2/3 修正了多项问题；但分离映射空间与分层风格控制成为重要生成架构思想。","en":"NVIDIA researchers introduced StyleGAN in 2019 by passing a random latent vector through a mapping network into an intermediate style space, then using per-layer styles to modulate image synthesis. Early layers influence coarse structure such as pose and face shape, later layers control color and detail, and independent noise inputs create stochastic fine variations such as freckles or individual hairs. The design reduced entanglement among latent factors, made high-quality face generation and attribute editing more controllable, and advanced research on interpretable generator representations. The first model still produced characteristic blob-like artifacts and unnatural details, which StyleGAN2 and StyleGAN3 later addressed. Separating a mapping space from hierarchical style control nevertheless became an important generative-architecture principle."},"method":{"zh":"风格调制生成器架构","en":"Style-modulated generator architecture"},"artifact":{"zh":"StyleGAN 生成器","en":"StyleGAN generator"}}],"svgText":["StyleGAN","latent style","input","modulated layers","mechanism","synthetic face","result","Original local SVG redraw; source figures are not copied."],"svgBytes":2357,"hasViewBox":true,"hasTitle":true,"hasDesc":true,"hasScript":false,"sourceTraceable":true},{"path":"resources/images/bench-council-ai100/explainers/2019-suphx_mahjong-policy.svg","exists":true,"assetIds":["asset-2019-suphx-mahjong-policy"],"roles":["architecture-explainer"],"captions":{"zh":["Suphx 麻将策略循环"],"en":["Suphx mahjong policy loop"]},"subcaptions":{"zh":["隐藏信息麻将 AI 的原创解释图。"],"en":["Original explainer for hidden-information mahjong AI."]},"rightsStatuses":["documented-in-legacy"],"sourceIds":["source-suphx-arxiv-paper"],"sources":[{"id":"source-suphx-arxiv-paper","type":"paper-page","reliability":"primary","title":{"zh":"Suphx arXiv 论文","en":"Suphx arXiv paper"},"url":"https://arxiv.org/abs/2003.13590"}],"variantSourceIds":["source-arxiv-doi-page","source-building-a-computer-mahjong-player-via-deep-cnns","source-suphx-arxiv-paper"],"variantSources":[{"id":"source-suphx-arxiv-paper","type":"paper-page","reliability":"primary","title":{"zh":"Suphx arXiv 论文","en":"Suphx arXiv paper"},"url":"https://arxiv.org/abs/2003.13590"},{"id":"source-arxiv-doi-page","type":"paper-page","reliability":"reference-only","title":{"zh":"arXiv DOI 页面","en":"arXiv DOI page"},"url":"https://doi.org/10.48550/arXiv.2003.13590"},{"id":"source-building-a-computer-mahjong-player-via-deep-cnns","type":"paper","reliability":"secondary","title":{"zh":"《用深度卷积网络构建麻将程序》","en":"Building a Computer Mahjong Player via Deep CNNs"},"url":"https://arxiv.org/abs/1906.02146"}],"usages":[{"storylineId":"gaming-ai","storylineTitle":{"zh":"AI 在棋牌与博弈论的演进","en":"AI in Board & Tabletop Games"},"eventId":"2019-suphx","eventTitle":{"zh":"Suphx：深度强化学习麻将 AI","en":"Suphx: Mahjong with Deep Reinforcement Learning"},"variant":"gaming-ai","variantFile":"archive/events/2019-suphx/variants/gaming-ai.json","visual":"configuredPaper","demoImage":"resources/images/bench-council-ai100/explainers/2019-suphx_mahjong-policy.svg","description":{"zh":"Suphx 将深度强化学习带入日本麻将，这是一种四人不完全信息游戏，包含隐藏牌、随机摸牌、复杂计分和长期风险权衡。它使用监督预训练、自我对弈强化学习、全局奖励预测、oracle guiding 和运行时策略适配，在天凤平台达到超过绝大多数注册段位玩家的水平。","en":"Suphx brought deep reinforcement learning to Japanese mahjong, a four-player imperfect-information game with hidden tiles, stochastic draws, complex scoring, and long-horizon risk tradeoffs. It used supervised pretraining, self-play reinforcement learning, global reward prediction, oracle guiding, and run-time policy adaptation to reach a level above most ranked Tenhou players."},"method":{"zh":"结合奖励预测与运行时策略适配的深度强化学习","en":"Deep reinforcement learning with reward prediction and run-time policy adaptation"},"artifact":{"zh":"面向天凤式对局的日本麻将 AI","en":"Japanese mahjong AI for Tenhou-style play"}}],"svgText":["Suphx: mahjong under hidden information","public tiles + hidden hands + reward prediction + policy adaptation","visible table","一","九","發","?","中","hidden state","opponent hands + wall","policy","reward","adapt","打","牌","discard","Interaction: switch table risk to watch the discard policy adapt."],"svgBytes":4129,"hasViewBox":true,"hasTitle":true,"hasDesc":true,"hasScript":false,"sourceTraceable":true},{"path":"resources/images/bench-council-ai100/explainers/2020-alphafold2_structure-pipeline.svg","exists":true,"assetIds":["asset-2020-alphafold2-structure-pipeline"],"roles":["architecture-explainer"],"captions":{"zh":["AlphaFold2 结构预测流程"],"en":["AlphaFold2 structure pipeline"]},"subcaptions":{"zh":["关于从序列到结构预测的本地原创解释图。"],"en":["Original local explainer of sequence-to-structure prediction."]},"rightsStatuses":["documented-in-legacy"],"sourceIds":["source-highly-accurate-protein-structure-prediction-with-alphafold"],"sources":[{"id":"source-highly-accurate-protein-structure-prediction-with-alphafold","type":"paper","reliability":"primary","title":{"zh":"《使用 AlphaFold 进行高精度蛋白质结构预测》","en":"Highly accurate protein structure prediction with AlphaFold"},"url":"https://doi.org/10.1038/s41586-021-03819-2"}],"variantSourceIds":["source-alphafold-github-repository","source-alphafold-protein-structure-database","source-deepmind-alphafold-page","source-highly-accurate-protein-structure-prediction-with-alphafold"],"variantSources":[{"id":"source-highly-accurate-protein-structure-prediction-with-alphafold","type":"paper","reliability":"primary","title":{"zh":"《使用 AlphaFold 进行高精度蛋白质结构预测》","en":"Highly accurate protein structure prediction with AlphaFold"},"url":"https://doi.org/10.1038/s41586-021-03819-2"},{"id":"source-deepmind-alphafold-page","type":"project-page","reliability":"primary","title":{"zh":"DeepMind AlphaFold 页面","en":"DeepMind AlphaFold page"},"url":"https://deepmind.google/technologies/alphafold/"},{"id":"source-alphafold-protein-structure-database","type":"dataset","reliability":"primary","title":{"zh":"AlphaFold 蛋白质结构数据库","en":"AlphaFold Protein Structure Database"},"url":"https://alphafold.ebi.ac.uk/"},{"id":"source-alphafold-github-repository","type":"code","reliability":"secondary","title":{"zh":"AlphaFold GitHub 代码仓库","en":"AlphaFold GitHub repository"},"url":"https://github.com/google-deepmind/alphafold"}],"usages":[{"storylineId":"bench-council-ai100","storylineTitle":{"zh":"AI 百大成就（BenchCouncil）","en":"AI Top 100 Achievements (BenchCouncil)"},"eventId":"2020-alphafold","eventTitle":{"zh":"AlphaFold2","en":"AlphaFold2"},"variant":"bench-council-ai100","variantFile":"archive/events/2020-alphafold/variants/bench-council-ai100.json","visual":"alphafold","demoImage":"resources/images/bench-council-ai100/explainers/2020-alphafold2_structure-pipeline.svg","description":{"zh":"DeepMind 的 AlphaFold2 在 2020 年 CASP14 盲测中取得突破性精度，并于 2021 年论文中公开系统方法。模型联合处理多序列比对中的进化信息和氨基酸残基对关系，通过 Evoformer 的注意力更新两类表示，再由结构模块直接预测三维坐标并反复精修。 它使大量蛋白质能够在缺少实验结构时获得高质量预测，AlphaFold 数据库又把结果扩展到大规模开放资源，显著改变结构生物学的日常工作。预测仍不能替代实验验证，也不完整描述动态、配体和所有复合物状态；但它证明深度学习可以解决长期科学瓶颈并直接服务研究。","en":"DeepMind's AlphaFold2 achieved breakthrough accuracy in the blind CASP14 assessment in 2020, with the system described publicly in a 2021 paper. It jointly processes evolutionary information from multiple-sequence alignments and relationships between amino-acid residue pairs. Attention in the Evoformer updates both representations, and a structure module predicts three-dimensional coordinates with iterative refinement. The system supplied high-quality predictions for many proteins lacking experimental structures, and the AlphaFold database expanded those results into a large open resource that changed everyday structural-biology work. Predictions do not replace experimental validation and do not fully represent dynamics, ligands, or every complex state. AlphaFold nevertheless demonstrated that deep learning could overcome a long-standing scientific bottleneck and directly support research."},"method":{"zh":"基于注意力的蛋白质结构预测","en":"Attention-based protein structure prediction"},"artifact":{"zh":"AlphaFold2 系统","en":"AlphaFold2 system"}},{"storylineId":"deep-learning","storylineTitle":{"zh":"深度学习分支","en":"Deep Learning"},"eventId":"2020-alphafold","eventTitle":{"zh":"AlphaFold2","en":"AlphaFold2"},"variant":"deep-learning","variantFile":"archive/events/2020-alphafold/variants/deep-learning.json","visual":"alphafold","demoImage":"resources/images/bench-council-ai100/explainers/2020-alphafold2_structure-pipeline.svg","description":{"zh":"2020 年，DeepMind 的 AlphaFold2 在第十四届蛋白质结构预测关键评估 CASP14 中取得突破。系统从氨基酸序列、多序列比对和模板信息出发，用注意力网络反复交换序列与残基对信息，再直接预测三维坐标及其可信度。 2021 年发表的 Nature 论文报告，AlphaFold2 在多数目标上达到接近实验结构的精度，显著缩小了计算预测与实验测定之间的差距。随后开放的代码和 AlphaFold 蛋白质结构数据库把大规模结构预测带入日常生物学研究，为蛋白功能分析、疾病研究和药物发现提供了新的计算起点，但预测结果仍需结合实验和生物学背景判断。","en":"In 2020, DeepMind's AlphaFold2 achieved a breakthrough at the fourteenth Critical Assessment of Protein Structure Prediction, CASP14. Starting from an amino-acid sequence, multiple-sequence alignments, and available templates, attention-based networks repeatedly exchanged sequence and residue-pair information before directly predicting three-dimensional coordinates and confidence estimates. The 2021 Nature paper reported accuracy close to experimental structures for many targets, sharply narrowing the gap between computational prediction and laboratory determination. The subsequent open-source code and AlphaFold Protein Structure Database brought large-scale prediction into everyday biological research, offering a new starting point for studying protein function, disease, and drug discovery. Predictions still require interpretation alongside experiments and biological context."},"method":{"zh":"基于注意力的蛋白质结构预测","en":"Attention-based protein structure prediction"},"artifact":{"zh":"AlphaFold2 系统","en":"AlphaFold2 system"}}],"svgText":["sequence to structure","amino acids","pair","representation","folded 3D model"],"svgBytes":1482,"hasViewBox":true,"hasTitle":true,"hasDesc":true,"hasScript":false,"sourceTraceable":true},{"path":"resources/images/bench-council-ai100/explainers/2020-vit_patch-tokens.svg","exists":true,"assetIds":["asset-2020-vit-patch-tokens"],"roles":["architecture-explainer"],"captions":{"zh":["图像块令牌到 Transformer"],"en":["Patch tokens to transformer"]},"subcaptions":{"zh":["关于 ViT 图像块令牌化的本地原创解释图。"],"en":["Original local explainer of ViT patch tokenization."]},"rightsStatuses":["documented-in-legacy"],"sourceIds":["source-an-image-is-worth-16x16-words"],"sources":[{"id":"source-an-image-is-worth-16x16-words","type":"paper","reliability":"primary","title":{"zh":"《一张图像价值 16x16 个词》","en":"An Image is Worth 16x16 Words"},"url":"https://arxiv.org/abs/2010.11929"}],"variantSourceIds":["source-an-image-is-worth-16x16-words","source-google-research-publication-page","source-iclr-openreview-page","source-openreview-full-paper-pdf"],"variantSources":[{"id":"source-an-image-is-worth-16x16-words","type":"paper","reliability":"primary","title":{"zh":"《一张图像价值 16x16 个词》","en":"An Image is Worth 16x16 Words"},"url":"https://arxiv.org/abs/2010.11929"},{"id":"source-iclr-openreview-page","type":"paper-page","reliability":"secondary","title":{"zh":"ICLR OpenReview 页面","en":"ICLR OpenReview page"},"url":"https://openreview.net/forum?id=YicbFdNTTy"},{"id":"source-openreview-full-paper-pdf","type":"paper-file","reliability":"secondary","title":{"zh":"OpenReview 完整论文 PDF","en":"OpenReview full paper PDF"},"url":"https://openreview.net/pdf?id=YicbFdNTTy"},{"id":"source-google-research-publication-page","type":"paper-page","reliability":"reference-only","title":{"zh":"Google Research 出版页面","en":"Google Research publication page"},"url":"https://research.google/pubs/an-image-is-worth-16x16-words-transformers-for-image-recognition-at-scale/"}],"usages":[{"storylineId":"bench-council-ai100","storylineTitle":{"zh":"AI 百大成就（BenchCouncil）","en":"AI Top 100 Achievements (BenchCouncil)"},"eventId":"ai100-2020-vit","eventTitle":{"zh":"视觉 Transformer","en":"Vision Transformer"},"variant":"bench-council-ai100","variantFile":"archive/events/ai100-2020-vit/variants/bench-council-ai100.json","visual":"vit","demoImage":"resources/images/bench-council-ai100/explainers/2020-vit_patch-tokens.svg","description":{"zh":"Vision Transformer 把图像切成固定大小的 patch，将每个图像块线性投影为词元式向量，加入位置编码和分类词元后，直接送入标准 Transformer 编码器。与 CNN 不同，ViT 不在架构中强制使用局部卷积，而让自注意力从数据中学习图像块之间的全局关系。 原论文表明，在大规模预训练数据上，纯 Transformer 可以达到或超过强卷积网络，再迁移到常见视觉任务。ViT 对数据规模和训练配方较敏感，标准注意力成本也会随图像块数量平方增长；但它推动注意力架构进入主流视觉，并统一了语言、图像和多模态模型的设计语言。","en":"Vision Transformer divides an image into fixed-size patches, linearly projects each patch into a token-like vector, adds positional information and a classification token, and feeds the sequence into a standard Transformer encoder. Unlike a CNN, ViT does not enforce local convolution in its architecture; self-attention learns relationships among image patches from data, including long-range interactions. The original work showed that with large-scale pretraining, a pure Transformer could match or exceed strong convolutional networks and then transfer to common vision tasks. ViT is sensitive to data scale and training recipes, and standard attention grows quadratically with the number of patches. It nevertheless moved attention into mainstream vision and helped unify the design language of text, image, and multimodal models."},"method":{"zh":"面向图像的块令牌 Transformer","en":"Patch-token transformer for images"},"artifact":{"zh":"视觉 Transformer 分类器","en":"Vision Transformer classifier"}}],"svgText":["Vision Transformer patch tokens","Transformer","encoder","Image patches become a token sequence;","attention then mixes information across regions."],"svgBytes":1662,"hasViewBox":true,"hasTitle":false,"hasDesc":false,"hasScript":false,"sourceTraceable":true},{"path":"resources/images/bench-council-ai100/explainers/2021-clip_contrastive-pairs.svg","exists":true,"assetIds":["asset-2021-clip-contrastive-pairs"],"roles":["architecture-explainer"],"captions":{"zh":["CLIP 对比图文对"],"en":["CLIP contrastive pairs"]},"subcaptions":{"zh":["关于图文对比学习的本地原创解释图。"],"en":["Original local explainer of image-text contrastive learning."]},"rightsStatuses":["documented-in-legacy"],"sourceIds":["source-learning-transferable-visual-models-from-natural-language-supervision"],"sources":[{"id":"source-learning-transferable-visual-models-from-natural-language-supervision","type":"paper","reliability":"primary","title":{"zh":"《从自然语言监督中学习可迁移视觉模型》","en":"Learning Transferable Visual Models From Natural Language Supervision"},"url":"https://arxiv.org/abs/2103.00020"}],"variantSourceIds":["source-icml-clip-paper-page","source-learning-transferable-visual-models-from-natural-language-supervision","source-openai-clip-blog-post","source-openai-clip-github-repository"],"variantSources":[{"id":"source-learning-transferable-visual-models-from-natural-language-supervision","type":"paper","reliability":"primary","title":{"zh":"《从自然语言监督中学习可迁移视觉模型》","en":"Learning Transferable Visual Models From Natural Language Supervision"},"url":"https://arxiv.org/abs/2103.00020"},{"id":"source-icml-clip-paper-page","type":"paper-page","reliability":"secondary","title":{"zh":"ICML CLIP 论文页面","en":"ICML CLIP paper page"},"url":"https://proceedings.mlr.press/v139/radford21a.html"},{"id":"source-openai-clip-blog-post","type":"article","reliability":"primary","title":{"zh":"OpenAI CLIP 博客","en":"OpenAI CLIP blog post"},"url":"https://openai.com/index/clip/"},{"id":"source-openai-clip-github-repository","type":"code","reliability":"secondary","title":{"zh":"OpenAI CLIP 代码仓库","en":"OpenAI CLIP GitHub repository"},"url":"https://github.com/openai/CLIP"}],"usages":[{"storylineId":"bench-council-ai100","storylineTitle":{"zh":"AI 百大成就（BenchCouncil）","en":"AI Top 100 Achievements (BenchCouncil)"},"eventId":"ai100-2021-clip","eventTitle":{"zh":"CLIP","en":"CLIP"},"variant":"bench-council-ai100","variantFile":"archive/events/ai100-2021-clip/variants/bench-council-ai100.json","visual":"clip","demoImage":"resources/images/bench-council-ai100/explainers/2021-clip_contrastive-pairs.svg","description":{"zh":"OpenAI 在 2021 年提出 CLIP，用图像编码器和文本编码器分别处理网页规模的图文对。在一个训练批次中，模型提高正确图文配对的相似度，同时降低错误组合的相似度，从而把视觉概念和自然语言描述对齐到共享向量空间。 推理时，用户可以把类别名称写成文本提示，与图像向量比较，实现无需该数据集专门训练的零样本分类。CLIP 让自然语言成为可扩展视觉监督接口，也支撑后来的图像检索和生成模型。它会继承网络数据的偏见，对提示措辞和分布变化也可能敏感。","en":"OpenAI introduced CLIP in 2021 with separate image and text encoders trained on web-scale image-text pairs. Within each training batch, the model increases similarity for correct pairs and decreases it for mismatched combinations, aligning visual concepts and natural-language descriptions in a shared embedding space. At inference time, class names can be written as text prompts and compared with an image vector, enabling zero-shot classification without training specifically on that labeled dataset. CLIP made natural language a scalable interface for visual supervision and later supported retrieval and generative models. It also inherits biases from web data and can be sensitive to prompt wording and distribution shifts."},"method":{"zh":"图文对比预训练","en":"Image-text contrastive pre-training"},"artifact":{"zh":"CLIP 模型","en":"CLIP model"}}],"svgText":["image-text contrastive learning","a mountain","a purple ball"],"svgBytes":1481,"hasViewBox":true,"hasTitle":true,"hasDesc":true,"hasScript":false,"sourceTraceable":true},{"path":"resources/images/bench-council-ai100/explainers/2021-dalle_text-to-image.svg","exists":true,"assetIds":["asset-2021-dalle-text-to-image"],"roles":["architecture-explainer"],"captions":{"zh":["DALL-E 文生图流程"],"en":["DALL-E text-to-image flow"]},"subcaptions":{"zh":["关于提示词条件图像生成的本地原创解释图。"],"en":["Original local explainer of prompt-conditioned image generation."]},"rightsStatuses":["documented-in-legacy"],"sourceIds":["source-zero-shot-text-to-image-generation"],"sources":[{"id":"source-zero-shot-text-to-image-generation","type":"paper","reliability":"primary","title":{"zh":"《零样本文本到图像生成》","en":"Zero-Shot Text-to-Image Generation"},"url":"https://arxiv.org/abs/2102.12092"}],"variantSourceIds":["source-dall-e-overview","source-icml-dall-e-paper-page","source-openai-dall-e-blog-post","source-zero-shot-text-to-image-generation"],"variantSources":[{"id":"source-zero-shot-text-to-image-generation","type":"paper","reliability":"primary","title":{"zh":"《零样本文本到图像生成》","en":"Zero-Shot Text-to-Image Generation"},"url":"https://arxiv.org/abs/2102.12092"},{"id":"source-icml-dall-e-paper-page","type":"paper-page","reliability":"secondary","title":{"zh":"ICML DALL-E 论文页面","en":"ICML DALL-E paper page"},"url":"https://proceedings.mlr.press/v139/ramesh21a.html"},{"id":"source-openai-dall-e-blog-post","type":"article","reliability":"primary","title":{"zh":"OpenAI DALL-E 博客","en":"OpenAI DALL-E blog post"},"url":"https://openai.com/index/dall-e/"},{"id":"source-dall-e-overview","type":"encyclopedia-entry","reliability":"reference-only","title":{"zh":"DALL-E 概览","en":"DALL-E overview"},"url":"https://en.wikipedia.org/wiki/DALL-E"}],"usages":[{"storylineId":"bench-council-ai100","storylineTitle":{"zh":"AI 百大成就（BenchCouncil）","en":"AI Top 100 Achievements (BenchCouncil)"},"eventId":"ai100-2021-dalle","eventTitle":{"zh":"DALL-E","en":"DALL-E"},"variant":"bench-council-ai100","variantFile":"archive/events/ai100-2021-dalle/variants/bench-council-ai100.json","visual":"dalle","demoImage":"resources/images/bench-council-ai100/explainers/2021-dalle_text-to-image.svg","description":{"zh":"OpenAI 在 2021 年提出首代 DALL·E，先用离散变分自编码器把图像压缩为一串视觉词元，再让自回归 Transformer 联合建模文本词元和图像词元。给定描述后，模型逐步预测视觉序列，并由解码器还原为图像。 它展示了单一生成模型可以组合物体、属性、风格和空间关系，并在没有为每个概念单独训练的情况下响应新文本提示。首代 DALL·E 与后来采用扩散技术的版本架构不同，输出分辨率和一致性也有限；但它把开放式文生图带入公众视野，并推动语言控制视觉生成的研究。","en":"OpenAI introduced the first DALL·E in 2021. A discrete variational autoencoder first compressed images into sequences of visual tokens, and an autoregressive Transformer jointly modeled those image tokens with text tokens. Given a description, the model predicted the visual sequence step by step and decoded it back into an image. The system showed that one generative model could combine objects, attributes, styles, and spatial relations while responding to text concepts not trained as separate tasks. The first DALL·E used a different architecture from later diffusion-based versions and had limited resolution and consistency. It nevertheless brought open-ended text-to-image generation into public view and accelerated research on language-controlled visual synthesis."},"method":{"zh":"自回归文本到图像生成","en":"Autoregressive text-to-image generation"},"artifact":{"zh":"DALL-E 文生图系统","en":"DALL-E text-to-image system"}}],"svgText":["prompt conditioned image tokens","\"red chair","on the moon\"","image","tokens","generated image"],"svgBytes":1491,"hasViewBox":true,"hasTitle":true,"hasDesc":true,"hasScript":false,"sourceTraceable":true},{"path":"resources/images/bench-council-ai100/explainers/2021-swin-transformer_shifted-windows.svg","exists":true,"assetIds":["asset-2021-swin-transformer-shifted-windows"],"roles":["architecture-explainer"],"captions":{"zh":["Swin Transformer 解释图"],"en":["Swin Transformer explainer"]},"subcaptions":{"zh":["关于该成就流程的本地原创解释图。"],"en":["Original local explainer for the achievement flow."]},"rightsStatuses":["documented-in-legacy"],"sourceIds":["source-swin-transformer-hierarchical-vision-transformer-using-shifted-windows"],"sources":[{"id":"source-swin-transformer-hierarchical-vision-transformer-using-shifted-windows","type":"paper","reliability":"primary","title":{"zh":"《Swin Transformer：使用移位窗口的层级视觉 Transformer》","en":"Swin Transformer: Hierarchical Vision Transformer using Shifted Windows"},"url":"https://arxiv.org/abs/2103.14030"}],"variantSourceIds":["source-iccv-open-access-paper-page","source-microsoft-swin-transformer-repository","source-swin-transformer-hierarchical-vision-transformer-using-shifted-windows"],"variantSources":[{"id":"source-swin-transformer-hierarchical-vision-transformer-using-shifted-windows","type":"paper","reliability":"primary","title":{"zh":"《Swin Transformer：使用移位窗口的层级视觉 Transformer》","en":"Swin Transformer: Hierarchical Vision Transformer using Shifted Windows"},"url":"https://arxiv.org/abs/2103.14030"},{"id":"source-iccv-open-access-paper-page","type":"paper-page","reliability":"secondary","title":{"zh":"ICCV 开放论文页面","en":"ICCV open-access paper page"},"url":"https://openaccess.thecvf.com/content/ICCV2021/html/Liu_Swin_Transformer_Hierarchical_Vision_Transformer_Using_Shifted_Windows_ICCV_2021_paper.html"},{"id":"source-microsoft-swin-transformer-repository","type":"code","reliability":"secondary","title":{"zh":"Microsoft Swin Transformer 代码仓库","en":"Microsoft Swin Transformer repository"},"url":"https://github.com/microsoft/Swin-Transformer"}],"usages":[{"storylineId":"bench-council-ai100","storylineTitle":{"zh":"AI 百大成就（BenchCouncil）","en":"AI Top 100 Achievements (BenchCouncil)"},"eventId":"ai100-2021-swin-transformer","eventTitle":{"zh":"Swin Transformer","en":"Swin Transformer"},"variant":"bench-council-ai100","variantFile":"archive/events/ai100-2021-swin-transformer/variants/bench-council-ai100.json","visual":"configuredPaper","demoImage":"resources/images/bench-council-ai100/explainers/2021-swin-transformer_shifted-windows.svg","description":{"zh":"Swin Transformer 把自注意力限制在局部窗口内，使计算量随图像大小近似线性增长；相邻层再把窗口位置平移，让原本分隔的区域能够交换信息。随着网络加深，patch 合并逐步降低分辨率、增加通道，形成类似 CNN 的层级多尺度特征图。 这种设计保留 Transformer 的注意力建模能力，又满足检测和分割对不同空间尺度的需求，使同一骨干能服务图像分类、目标检测和语义分割。局部窗口仍是一种架构先验，但它解决了全局注意力在高分辨率图像上的成本问题，推动 Transformer 成为通用视觉骨干。","en":"Swin Transformer restricts self-attention to local windows so computation grows approximately linearly with image size. Successive layers shift the window arrangement, allowing regions separated in one layer to exchange information in the next. As depth increases, patch merging reduces spatial resolution and increases channels, creating a hierarchy of multiscale feature maps similar to a CNN. The design retains attention-based modeling while meeting the needs of detection and segmentation at different spatial scales, allowing one backbone to support classification, object detection, and semantic segmentation. Local windows remain an architectural prior, but they solve much of the cost of global attention on high-resolution images and helped make Transformers practical as general-purpose visual backbones."},"method":{"zh":"移位窗口层级注意力","en":"Shifted-window hierarchical attention"},"artifact":{"zh":"Swin Transformer 视觉骨干网络","en":"Swin Transformer vision backbone"}}],"svgText":["Swin Transformer","patches","input","shifted windows","mechanism","hierarchy","result","Original local SVG redraw; source figures are not copied."],"svgBytes":2359,"hasViewBox":true,"hasTitle":true,"hasDesc":true,"hasScript":false,"sourceTraceable":true},{"path":"resources/images/bench-council-ai100/explainers/2022-stable-diffusion_latent-denoise.svg","exists":true,"assetIds":["asset-2022-stable-diffusion-latent-denoise"],"roles":["architecture-explainer"],"captions":{"zh":["潜扩散去噪"],"en":["Latent diffusion denoising"]},"subcaptions":{"zh":["关于文本引导潜空间去噪的本地原创解释图。"],"en":["Original local explainer of text-guided latent denoising."]},"rightsStatuses":["documented-in-legacy"],"sourceIds":["source-high-resolution-image-synthesis-with-latent-diffusion-models"],"sources":[{"id":"source-high-resolution-image-synthesis-with-latent-diffusion-models","type":"paper","reliability":"primary","title":{"zh":"《使用潜扩散模型进行高分辨率图像合成》","en":"High-Resolution Image Synthesis with Latent Diffusion Models"},"url":"https://arxiv.org/abs/2112.10752"}],"variantSourceIds":["source-compvis-latent-diffusion-repository","source-cvpr-paper-page","source-high-resolution-image-synthesis-with-latent-diffusion-models","source-stability-ai-stable-diffusion-page"],"variantSources":[{"id":"source-high-resolution-image-synthesis-with-latent-diffusion-models","type":"paper","reliability":"primary","title":{"zh":"《使用潜扩散模型进行高分辨率图像合成》","en":"High-Resolution Image Synthesis with Latent Diffusion Models"},"url":"https://arxiv.org/abs/2112.10752"},{"id":"source-cvpr-paper-page","type":"paper-page","reliability":"secondary","title":{"zh":"CVPR 论文页面","en":"CVPR paper page"},"url":"https://openaccess.thecvf.com/content/CVPR2022/html/Rombach_High-Resolution_Image_Synthesis_With_Latent_Diffusion_Models_CVPR_2022_paper.html"},{"id":"source-compvis-latent-diffusion-repository","type":"code","reliability":"secondary","title":{"zh":"CompVis 潜扩散代码仓库","en":"CompVis latent diffusion repository"},"url":"https://github.com/CompVis/latent-diffusion"},{"id":"source-stability-ai-stable-diffusion-page","type":"project-page","reliability":"secondary","title":{"zh":"Stability AI Stable Diffusion 页面","en":"Stability AI Stable Diffusion page"},"url":"https://stability.ai/stable-image"}],"usages":[{"storylineId":"bench-council-ai100","storylineTitle":{"zh":"AI 百大成就（BenchCouncil）","en":"AI Top 100 Achievements (BenchCouncil)"},"eventId":"ai100-2022-stable-diffusion","eventTitle":{"zh":"Stable Diffusion","en":"Stable Diffusion"},"variant":"bench-council-ai100","variantFile":"archive/events/ai100-2022-stable-diffusion/variants/bench-council-ai100.json","visual":"diffusion","demoImage":"resources/images/bench-council-ai100/explainers/2022-stable-diffusion_latent-denoise.svg","description":{"zh":"潜扩散模型先用自编码器把高分辨率图像压缩到较小潜空间，再训练 U-Net 逐步去除加入潜变量的噪声。文本编码通过交叉注意力调节去噪过程，使模型能够按提示生成图像；最终潜表示由解码器还原到像素空间，大幅降低直接在原图上扩散的计算成本。 2022 年 Stable Diffusion 的开放权重发布让这一方法进入广泛创作、研究和本地部署，促进微调、控制工具和生态扩展。它也放大了训练数据许可、艺术家权益、偏见和合成内容滥用等争议。其历史意义既在潜空间效率，也在开放发布如何改变生成模型的传播速度。","en":"Latent diffusion first compresses high-resolution images into a smaller latent space with an autoencoder, then trains a U-Net to remove noise from latent variables step by step. Text embeddings condition the denoising process through cross-attention, allowing prompts to guide image creation. A decoder finally returns the latent representation to pixels, greatly reducing the cost of diffusion directly over full-resolution images. The 2022 release of Stable Diffusion weights brought this method into widespread creation, research, and local deployment, accelerating fine-tuning, control tools, and a broad ecosystem. It also intensified disputes over training-data licensing, artist rights, bias, and misuse of synthetic content. Its historical importance lies both in latent-space efficiency and in how an open release changed the speed at which generative models spread."},"method":{"zh":"文本条件潜扩散","en":"Text-conditioned latent diffusion"},"artifact":{"zh":"Stable Diffusion 模型发布","en":"Stable Diffusion model release"}}],"svgText":["text-guided latent denoising","prompt guidance"],"svgBytes":1440,"hasViewBox":true,"hasTitle":true,"hasDesc":true,"hasScript":false,"sourceTraceable":true},{"path":"resources/images/bench-council-ai100/explainers/2023-segment-anything_prompt-mask.svg","exists":true,"assetIds":["asset-2023-segment-anything-prompt-mask"],"roles":["architecture-explainer"],"captions":{"zh":["可提示分割流程"],"en":["Promptable segmentation flow"]},"subcaptions":{"zh":["关于从提示到掩码分割的本地原创解释图。"],"en":["Original local explainer of prompt-to-mask segmentation."]},"rightsStatuses":["documented-in-legacy"],"sourceIds":["source-segment-anything"],"sources":[{"id":"source-segment-anything","type":"paper","reliability":"primary","title":{"zh":"《Segment Anything》","en":"Segment Anything"},"url":"https://arxiv.org/abs/2304.02643"}],"variantSourceIds":["source-iccv-paper-page","source-segment-anything","source-segment-anything-github-repository","source-segment-anything-project-page"],"variantSources":[{"id":"source-segment-anything","type":"paper","reliability":"primary","title":{"zh":"《Segment Anything》","en":"Segment Anything"},"url":"https://arxiv.org/abs/2304.02643"},{"id":"source-iccv-paper-page","type":"paper-page","reliability":"secondary","title":{"zh":"ICCV 论文页面","en":"ICCV paper page"},"url":"https://openaccess.thecvf.com/content/ICCV2023/html/Kirillov_Segment_Anything_ICCV_2023_paper.html"},{"id":"source-segment-anything-project-page","type":"project-page","reliability":"secondary","title":{"zh":"Segment Anything 项目页面","en":"Segment Anything project page"},"url":"https://segment-anything.com/"},{"id":"source-segment-anything-github-repository","type":"code","reliability":"secondary","title":{"zh":"Segment Anything GitHub 代码仓库","en":"Segment Anything GitHub repository"},"url":"https://github.com/facebookresearch/segment-anything"}],"usages":[{"storylineId":"bench-council-ai100","storylineTitle":{"zh":"AI 百大成就（BenchCouncil）","en":"AI Top 100 Achievements (BenchCouncil)"},"eventId":"ai100-2023-segment-anything","eventTitle":{"zh":"Segment Anything","en":"Segment Anything"},"variant":"bench-council-ai100","variantFile":"archive/events/ai100-2023-segment-anything/variants/bench-council-ai100.json","visual":"sam","demoImage":"resources/images/bench-council-ai100/explainers/2023-segment-anything_prompt-mask.svg","description":{"zh":"Meta AI 在 2023 年提出 Segment Anything Model，把图像分割设计成可提示的基础任务。大型图像编码器预先计算视觉表示，提示编码器接收点、框或已有掩码，轻量掩码解码器据此快速输出一个或多个候选区域，并处理提示可能对应多种合理分割的歧义。 团队还通过数据引擎构建 SA-1B 大规模掩码数据集，使模型能够在许多未专门训练的图像和任务上零样本迁移。SAM 不会自动理解每个区域的语义名称，专业领域也可能需要适配；但它把分割从固定类别预测转为交互式通用接口，改变了标注和视觉工具链。","en":"Meta AI introduced the Segment Anything Model in 2023 by treating image segmentation as a promptable foundation task. A large image encoder computes a reusable visual representation, a prompt encoder accepts points, boxes, or existing masks, and a lightweight mask decoder quickly returns one or more candidate regions, accounting for prompts that may have several reasonable interpretations. The team also created the large SA-1B mask dataset through a data engine, enabling zero-shot transfer across many images and tasks not specifically used for training. SAM does not automatically provide semantic names for every region, and specialized domains may require adaptation. It nevertheless changed segmentation from fixed-category prediction into a general interactive interface for annotation and visual tools."},"method":{"zh":"用于分割的可提示基础模型","en":"Promptable foundation model for segmentation"},"artifact":{"zh":"Segment Anything Model","en":"Segment Anything Model"}}],"svgText":["promptable segmentation","mask","decoder","object mask"],"svgBytes":1551,"hasViewBox":true,"hasTitle":true,"hasDesc":tru ion building\u003c/text>\n  \u003ccircle cx=\"286\" cy=\"298\" r=\"78\" fill=\"#fee2e2\" stroke=\"#111827\" stroke-width=\"6\"/>\n  \u003ctext x=\"286\" y=\"292\" fill=\"#111827\" font-family=\"Inter, Arial, sans-serif\" font-size=\"21\" font-weight=\"900\" text-anchor=\"middle\">AI risk\u003c/text>\n  \u003ctext x=\"286\" y=\"322\" fill=\"#7f1d1d\" font-family=\"Inter, Arial, sans-serif\" font-size=\"17\" font-weight=\"900\" text-anchor=\"middle\">concern\u003c/text>\n  \u003cpath d=\"M372 298h112\" stroke=\"#73b5d6\" stroke-width=\"12\" stroke-linecap=\"round\"/>\n  \u003cpath d=\"M464 266l50 32-50 32\" fill=\"none\" stroke=\"#73b5d6\" stroke-width=\"12\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/>\n  \u003crect x=\"530\" y=\"222\" width=\"222\" height=\"152\" rx=\"24\" fill=\"#dbeafe\" stroke=\"#111827\" stroke-width=\"6\"/>\n  \u003ctext x=\"641\" y=\"282\" fill=\"#111827\" font-family=\"Inter, Arial, sans-serif\" font-size=\"24\" font-weight=\"900\" text-anchor=\"middle\">research lab\u003c/text>\n  \u003ctext x=\"641\" y=\"318\" fill=\"#0369a1\" font-family=\"Inter, Arial, sans-serif\" font-size=\"20\" font-weight=\"900\" text-anchor=\"middle\">broad benefit\u003c/text>\n  \u003ctext x=\"480\" y=\"424\" fill=\"#0369a1\" font-family=\"Inter, Arial, sans-serif\" font-size=\"22\" font-weight=\"900\" text-anchor=\"middle\">dread turns into mission language\u003c/text>\n\u003c/svg>\n","\u003csvg xmlns=\"http://www.w3.org/2000/svg\" width=\"960\" height=\"420\" viewBox=\"0 80 960 420\" preserveAspectRatio=\"xMidYMid meet\" role=\"img\" aria-labelledby=\"title desc\">\n  \u003ctitle id=\"title\">Global AI risk priority explainer\u003c/title>\n  \u003cdesc id=\"desc\">A short AI-risk statement connects frontier models, global priority and governance response.\u003c/desc>\n  \u003crect width=\"960\" height=\"600\" fill=\"#170716\"/>\n  \u003crect x=\"82\" y=\"86\" width=\"796\" height=\"400\" rx=\"26\" fill=\"#fdf2f8\"/>\n  \u003ctext x=\"132\" y=\"146\" fill=\"#111827\" font-family=\"Inter, Arial, sans-serif\" font-size=\"40\" font-weight=\"900\">2023\u003c/text>\n  \u003ctext x=\"132\" y=\"182\" fill=\"#9d174d\" font-family=\"Inter, Arial, sans-serif\" font-size=\"21\" font-weight=\"800\">AI risk becomes a global-priority statement\u003c/text>\n  \u003crect x=\"166\" y=\"232\" width=\"226\" height=\"138\" rx=\"20\" fill=\"#ffffff\" stroke=\"#111827\" stroke-width=\"6\"/>\n  \u003ctext x=\"279\" y=\"286\" fill=\"#111827\" font-family=\"Inter, Arial, sans-serif\" font-size=\"23\" font-weight=\"900\" text-anchor=\"middle\">frontier AI\u003c/text>\n  \u003cpath d=\"M206 324h146\" stroke=\"#64748b\" stroke-width=\"9\" stroke-linecap=\"round\"/>\n  \u003cpath d=\"M426 301h112\" stroke=\"#c56f92\" stroke-width=\"12\" stroke-linecap=\"round\"/>\n  \u003cpath d=\"M518 269l50 32-50 32\" fill=\"none\" stroke=\"#c56f92\" stroke-width=\"12\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/>\n  \u003ccircle cx=\"682\" cy=\"301\" r=\"80\" fill=\"#fee2e2\" stroke=\"#111827\" stroke-width=\"6\"/>\n  \u003ctext x=\"682\" y=\"292\" fill=\"#111827\" font-family=\"Inter, Arial, sans-serif\" font-size=\"23\" font-weight=\"900\" text-anchor=\"middle\">global\u003c/text>\n  \u003ctext x=\"682\" y=\"322\" fill=\"#9d174d\" font-family=\"Inter, Arial, sans-serif\" font-size=\"20\" font-weight=\"900\" text-anchor=\"middle\">priority\u003c/text>\n  \u003ctext x=\"480\" y=\"424\" fill=\"#9d174d\" font-family=\"Inter, Arial, sans-serif\" font-size=\"22\" font-weight=\"900\" text-anchor=\"middle\">one sentence compresses many anxieties\u003c/text>\n\u003c/svg>\n"];
    const results = [];
    const grid = document.querySelector('#grid');
    document.querySelector('#summary').textContent = entries.length + ' 张已被启用事件使用的 SVG 解释图';

    function overlap(a, b) {
      const left = Math.max(a.x, b.x);
      const top = Math.max(a.y, b.y);
      const right = Math.min(a.x + a.width, b.x + b.width);
      const bottom = Math.min(a.y + a.height, b.y + b.height);
      return { width: Math.max(0, right - left), height: Math.max(0, bottom - top) };
    }

    function boxInRoot(node, svg) {
      const box = node.getBBox();
      const nodeMatrix = node.getCTM();
      const rootMatrix = svg.getCTM();
      if (!nodeMatrix || !rootMatrix) return box;
      const matrix = rootMatrix.inverse().multiply(nodeMatrix);
      const points = [
        new DOMPoint(box.x, box.y),
        new DOMPoint(box.x + box.width, box.y),
        new DOMPoint(box.x, box.y + box.height),
        new DOMPoint(box.x + box.width, box.y + box.height)
      ].map((point) => point.matrixTransform(matrix));
      const xs = points.map((point) => point.x);
      const ys = points.map((point) => point.y);
      return {
        x: Math.min(...xs),
        y: Math.min(...ys),
        width: Math.max(...xs) - Math.min(...xs),
        height: Math.max(...ys) - Math.min(...ys)
      };
    }

    function inspectSvg(svg) {
      if (!svg || svg.localName !== 'svg') return [{ type: 'load', detail: 'SVG document unavailable' }];
      const issues = [];
      const viewBox = svg.viewBox && svg.viewBox.baseVal;
      const texts = Array.from(svg.querySelectorAll('text')).map((node, index) => {
        try { return { node, index, box: boxInRoot(node, svg), text: (node.textContent || '').trim() }; }
        catch { return null; }
      }).filter(Boolean);

      for (const item of texts) {
        const box = item.box;
        if (viewBox && (box.x < viewBox.x - 0.5 || box.y < viewBox.y - 0.5 || box.x + box.width > viewBox.x + viewBox.width + 0.5 || box.y + box.height > viewBox.y + viewBox.height + 0.5)) {
          issues.push({ type: 'text-outside-viewbox', text: item.text, box });
        }
      }

      for (let first = 0; first < texts.length; first += 1) {
        for (let second = first + 1; second < texts.length; second += 1) {
          const hit = overlap(texts[first].box, texts[second].box);
          if (hit.width > 1 && hit.height > 1) {
            issues.push({ type: 'text-text-overlap', first: texts[first].text, second: texts[second].text, overlap: hit });
          }
        }
      }

      const shapes = Array.from(svg.querySelectorAll('rect, circle, ellipse, polygon, image')).map((node, index) => {
        try { return { node, index, box: boxInRoot(node, svg) }; }
        catch { return null; }
      }).filter(Boolean);
      for (const text of texts) {
        const textArea = Math.max(1, text.box.width * text.box.height);
        for (const shape of shapes) {
          const shapeArea = Math.max(1, shape.box.width * shape.box.height);
          const hit = overlap(text.box, shape.box);
          const hitArea = hit.width * hit.height;
          if (hitArea < textArea * 0.12) continue;
          const containsText = shape.box.x <= text.box.x && shape.box.y <= text.box.y && shape.box.x + shape.box.width >= text.box.x + text.box.width && shape.box.y + shape.box.height >= text.box.y + text.box.height;
          const likelyBackground = shapeArea > (viewBox ? viewBox.width * viewBox.height * 0.35 : textArea * 30);
          if (!containsText && !likelyBackground) {
            issues.push({ type: 'partial-text-shape-overlap', text: text.text, shape: shape.node.localName, textBox: text.box, shapeBox: shape.box, overlap: hit });
          }
        }
      }
      return issues;
    }

    for (const [index, entry] of entries.entries()) {
      const article = document.createElement('article');
      const eventNames = [...new Set(entry.usages.map((usage) => usage.eventId))].join(', ');
      article.innerHTML = '<div class="media"><object type="image/svg+xml" data="../../' + entry.path + '"></object></div>' +
        '<div class="meta"><h2>' + (index + 1) + '. ' + entry.path.split('/').pop() + '</h2>' +
        '<p>' + eventNames + '</p><p class="muted">' + entry.sourceIds.join(', ') + '</p><p class="issues">等待检测</p></div>';
      grid.appendChild(article);
    }

    function runAudit() {
      const measurement = document.querySelector('#measurement');
      for (const [index, entry] of entries.entries()) {
        const article = grid.children[index];
        let issues;
        try {
          const parsed = new DOMParser().parseFromString(svgSources[index], 'image/svg+xml');
          const svg = document.importNode(parsed.documentElement, true);
          measurement.appendChild(svg);
          issues = inspectSvg(svg);
          svg.remove();
        } catch (error) {
          issues = [{ type: 'load', detail: error.message }];
        }
        results[index] = { path: entry.path, issues };
        const issueNode = article.querySelector('.issues');
        issueNode.className = issues.length ? 'issues' : 'ok';
        issueNode.textContent = issues.length ? issues.map((issue) => issue.type + ': ' + (issue.text || issue.first || issue.detail || '')).join('\n') : '未发现几何异常';
      }
      const payload = document.createElement('script');
      payload.id = 'svg-audit-results';
      payload.type = 'application/json';
      payload.textContent = JSON.stringify(results);
      document.body.appendChild(payload);
      document.documentElement.dataset.auditComplete = 'true';
      document.querySelector('#summary').textContent = entries.length + ' 张 SVG；自动检测到 ' + results.filter((result) => result.issues.length).length + ' 张存在候选几何问题';
    }
    runAudit();
  </script>

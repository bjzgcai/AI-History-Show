取代，但“小卷积、深堆叠、统一模块”的设计思想持续影响视觉网络。","en":"Karen Simonyan and Andrew Zisserman studied the effect of convolutional-network depth on large-scale image recognition in 2014. VGG repeatedly stacked small 3×3 convolutions and pooling layers in a regular pattern, producing configurations such as VGG-16 and VGG-19. Several small convolutions enlarged the effective receptive field while adding nonlinearities and keeping the architecture uniform. VGG's ImageNet results demonstrated the value of systematically increasing depth, while its clear structure and released models made it a widely used feature extractor and transfer-learning baseline. Its parameter count and computational cost are high, and more efficient residual architectures later displaced it at the frontier. The principles of small filters, deep stacks, and reusable modules nevertheless remained influential."},"method":{"zh":"由 3x3 卷积堆叠出的很深网络","en":"Very deep stacks of 3x3 convolutions"},"artifact":{"zh":"VGG-16 与 VGG-19 架构","en":"VGG-16 and VGG-19 architectures"}}],"svgText":["3x3 receptive-field build-up","3x3 感受野累积","3x3","5x5","7x7","Filters · local redraw from source material"],"svgBytes":1485,"hasViewBox":true,"hasTitle":true,"hasDesc":true,"hasScript":false,"sourceTraceable":true},{"path":"resources/images/bench-council-ai100/explainers/2015-batch-normalization_activation-scale.svg","exists":true,"assetIds":["asset-2015-batch-normalization-activation-scale"],"roles":["architecture-explainer"],"captions":{"zh":["激活归一化"],"en":["Activation normalization"]},"subcaptions":{"zh":["关于批统计量与可学习缩放的本地原创解释图。"],"en":["Original local explainer of batch statistics and learned scale."]},"rightsStatuses":["documented-in-legacy"],"sourceIds":["source-batch-normalization"],"sources":[{"id":"source-batch-normalization","type":"paper","reliability":"primary","title":{"zh":"《批归一化》","en":"Batch Normalization"},"url":"https://proceedings.mlr.press/v37/ioffe15.html"}],"variantSourceIds":["source-batch-normalization","source-batch-normalization-on-arxiv","source-google-research-archived-pdf","source-google-research-publication-page"],"variantSources":[{"id":"source-batch-normalization","type":"paper","reliability":"primary","title":{"zh":"《批归一化》","en":"Batch Normalization"},"url":"https://proceedings.mlr.press/v37/ioffe15.html"},{"id":"source-batch-normalization-on-arxiv","type":"paper-page","reliability":"secondary","title":{"zh":"arXiv 上的批归一化论文","en":"Batch Normalization on arXiv"},"url":"https://arxiv.org/abs/1502.03167"},{"id":"source-google-research-publication-page","type":"paper-page","reliability":"reference-only","title":{"zh":"Google Research 出版页面","en":"Google Research publication page"},"url":"https://research.google/pubs/batch-normalization-accelerating-deep-network-training-by-reducing-internal-covariate-shift/"},{"id":"source-google-research-archived-pdf","type":"paper-file","reliability":"secondary","title":{"zh":"Google Research 归档 PDF","en":"Google Research archived PDF"},"url":"https://research.google.com/pubs/archive/43442.pdf"}],"usages":[{"storylineId":"bench-council-ai100","storylineTitle":{"zh":"AI 百大成就（BenchCouncil）","en":"AI Top 100 Achievements (BenchCouncil)"},"eventId":"ai100-2015-batch-normalization","eventTitle":{"zh":"批归一化","en":"Batch Normalization"},"variant":"bench-council-ai100","variantFile":"archive/events/ai100-2015-batch-normalization/variants/bench-council-ai100.json","visual":"batchnorm","demoImage":"resources/images/bench-council-ai100/explainers/2015-batch-normalization_activation-scale.svg","description":{"zh":"约菲和泽格迪在 2015 年提出批归一化，在训练时用小批量统计量对中间激活进行标准化，再通过可学习的缩放和偏移恢复网络需要的表示范围。推理阶段则使用训练期间积累的总体统计量，使输出不再依赖当前批次。 BatchNorm 让更高学习率和更深网络更容易优化，降低了对初始化的敏感性，并常带来一定正则化效果。原论文以减少“内部协变量偏移”解释作用机制，后续研究对这一解释提出修正；但它改变优化几何、稳定激活和加速训练的实际价值已被广泛验证。","en":"Sergey Ioffe and Christian Szegedy introduced batch normalization in 2015. During training it standardizes intermediate activations with mini-batch statistics, then restores the representational range needed by the network through learned scale and offset parameters. At inference time, accumulated population statistics replace dependence on the current batch. BatchNorm made higher learning rates and deeper networks easier to optimize, reduced sensitivity to initialization, and often supplied a regularizing effect. The original paper explained it through reduced “internal covariate shift,” an interpretation that later research refined or challenged. Its practical value in changing optimization geometry, stabilizing activations, and accelerating training nevertheless became firmly established."},"method":{"zh":"小批量激活归一化","en":"Mini-batch activation normalization"},"artifact":{"zh":"批归一化层","en":"Batch normalization layer"}}],"svgText":["Batch Normalization layer","mini-batch","mean","variance","normalize","gamma","beta","scale + shift"],"svgBytes":1638,"hasViewBox":true,"hasTitle":false,"hasDesc":false,"hasScript":false,"sourceTraceable":true},{"path":"resources/images/bench-council-ai100/explainers/2015-dcgan_conv-generator.svg","exists":true,"assetIds":["asset-2015-dcgan-conv-generator"],"roles":["architecture-explainer"],"captions":{"zh":["DCGAN 解释图"],"en":["DCGAN explainer"]},"subcaptions":{"zh":["关于该成就流程的本地原创解释图。"],"en":["Original local explainer for the achievement flow."]},"rightsStatuses":["documented-in-legacy"],"sourceIds":["source-unsupervised-representation-learning-with-deep-convolutional-gans"],"sources":[{"id":"source-unsupervised-representation-learning-with-deep-convolutional-gans","type":"paper","reliability":"primary","title":{"zh":"《使用深度卷积 GAN 进行无监督表示学习》","en":"Unsupervised Representation Learning with Deep Convolutional GANs"},"url":"https://arxiv.org/abs/1511.06434"}],"variantSourceIds":["source-dcgan-overview","source-pytorch-dcgan-tutorial","source-unsupervised-representation-learning-with-deep-convolutional-gans"],"variantSources":[{"id":"source-unsupervised-representation-learning-with-deep-convolutional-gans","type":"paper","reliability":"primary","title":{"zh":"《使用深度卷积 GAN 进行无监督表示学习》","en":"Unsupervised Representation Learning with Deep Convolutional GANs"},"url":"https://arxiv.org/abs/1511.06434"},{"id":"source-pytorch-dcgan-tutorial","type":"documentation","reliability":"secondary","title":{"zh":"PyTorch DCGAN 教程","en":"PyTorch DCGAN tutorial"},"url":"https://pytorch.org/tutorials/beginner/dcgan_faces_tutorial.html"},{"id":"source-dcgan-overview","type":"encyclopedia-entry","reliability":"reference-only","title":{"zh":"DCGAN 概览","en":"DCGAN overview"},"url":"https://en.wikipedia.org/wiki/Deep_convolutional_generative_adversarial_network"}],"usages":[{"storylineId":"bench-council-ai100","storylineTitle":{"zh":"AI 百大成就（BenchCouncil）","en":"AI Top 100 Achievements (BenchCouncil)"},"eventId":"ai100-2015-dcgan","eventTitle":{"zh":"DCGAN","en":"DCGAN"},"variant":"bench-council-ai100","variantFile":"archive/events/ai100-2015-dcgan/variants/bench-council-ai100.json","visual":"configuredPaper","demoImage":"resources/images/bench-council-ai100/explainers/2015-dcgan_conv-generator.svg","description":{"zh":"拉德福德、梅茨和钦塔拉在 2015 年提出 DCGAN，为图像生成总结一组实用卷积架构规则：用步幅卷积和转置卷积替代手工池化，在多数层使用批归一化，减少全连接层，并分别采用 ReLU 与 Leaky ReLU 激活。这些选择显著提高了 GAN 训练的可重复性。 生成器学会从潜变量逐步构造空间图像，判别器则形成可迁移到分类任务的无监督视觉特征；潜空间还表现出一定可解释方向。DCGAN 仍会模式崩溃且只适合当时较低分辨率，但它把 GAN 从概念证明推进为可复用的深度卷积图像生成配方。","en":"Alec Radford, Luke Metz, and Soumith Chintala introduced DCGAN in 2015 with a practical set of convolutional architecture rules for image generation. Strided convolutions and transposed convolutions replace hand-designed pooling, batch normalization is used through much of the network, fully connected layers are reduced, and ReLU and Leaky ReLU activations are assigned to the generator and discriminator. These choices made GAN training substantially more reproducible. The generator learned to construct spatial images progressively from latent variables, while the discriminator developed unsupervised visual features transferable to classification; the latent space also showed partly interpretable directions. DCGAN still suffered mode collapse and was limited to the resolutions of its time, but it moved GANs from a conceptual demonstration toward a reusable deep-convolutional recipe for image synthesis."},"method":{"zh":"卷积式对抗架构","en":"Convolutional adversarial architecture"},"artifact":{"zh":"深度卷积 GAN 设计","en":"Deep convolutional GAN design"}}],"svgText":["DCGAN","latent vector","input","fractionally-strided","convolution stack","mechanism","image sample","result","Original local SVG redraw; source figures are not copied."],"svgBytes":2459,"hasViewBox":true,"hasTitle":true,"hasDesc":true,"hasScript":false,"sourceTraceable":true},{"path":"resources/images/bench-council-ai100/explainers/2015-ddpg_actor-critic.svg","exists":true,"assetIds":["asset-2015-ddpg-actor-critic"],"roles":["architecture-explainer"],"captions":{"zh":["DDPG Actor-Critic 训练闭环"],"en":["DDPG actor-critic training loop"]},"subcaptions":{"zh":["Actor 输出连续动作，critic 评估动作价值，经验回放与目标网络用于稳定更新。"],"en":["The actor outputs continuous actions, the critic evaluates them, and replay with target networks stabilizes updates."]},"rightsStatuses":["documented-in-legacy"],"sourceIds":["source-continuous-control-with-deep-reinforcement-learning"],"sources":[{"id":"source-continuous-control-with-deep-reinforcement-learning","type":"paper","reliability":"primary","title":{"zh":"《使用深度强化学习进行连续控制》","en":"Continuous Control with Deep Reinforcement Learning"},"url":"https://arxiv.org/abs/1509.02971"}],"variantSourceIds":["source-continuous-control-with-deep-reinforcement-learning","source-deterministic-policy-gradient-algorithms","source-iclr-openreview-record","source-td3-function-approximation-error","source-timothy-lillicrap-stanford-portrait"],"variantSources":[{"id":"source-continuous-control-with-deep-reinforcement-learning","type":"paper","reliability":"primary","title":{"zh":"《使用深度强化学习进行连续控制》","en":"Continuous Control with Deep Reinforcement Learning"},"url":"https://arxiv.org/abs/1509.02971"},{"id":"source-iclr-openreview-record","type":"paper-page","reliability":"secondary","title":{"zh":"ICLR OpenReview 记录","en":"ICLR OpenReview record"},"url":"https://openreview.net/forum?id=Rx4nmj8j6G"},{"id":"source-deterministic-policy-gradient-algorithms","type":"paper","reliability":"primary","title":{"zh":"《确定性策略梯度算法》","en":"Deterministic Policy Gradient Algorithms"},"url":"https://proceedings.mlr.press/v32/silver14.html"},{"id":"source-td3-function-approximation-error","type":"paper","reliability":"primary","title":{"zh":"《解决 Actor-Critic 方法中的函数逼近误差》","en":"Addressing Function Approximation Error in Actor-Critic Methods"},"url":"https://proceedings.mlr.press/v80/fujimoto18a.html"},{"id":"source-timothy-lillicrap-stanford-portrait","type":"image-source","reliability":"primary","title":{"zh":"斯坦福神经科学中心的蒂莫西·利利克拉普肖像","en":"Timothy Lillicrap portrait from Stanford Neurosciences"},"url":"https://neuroscience.stanford.edu/sites/default/files/timothy_lillicrap_1.png"}],"usages":[{"storylineId":"bench-council-ai100","storylineTitle":{"zh":"AI 百大成就（BenchCouncil）","en":"AI Top 100 Achievements (BenchCouncil)"},"eventId":"ai100-2015-ddpg","eventTitle":{"zh":"DDPG","en":"DDPG"},"variant":"bench-council-ai100","variantFile":"archive/events/ai100-2015-ddpg/variants/bench-council-ai100.json","visual":"configuredPaper","demoImage":"resources/images/bench-council-ai100/explainers/2015-ddpg_actor-critic.svg","description":{"zh":"2015 年，蒂莫西·利利克拉普等人在 DeepMind 提出 DDPG（深度确定性策略梯度），把确定性策略梯度与深度 actor-critic 网络结合，用于转向角、速度和力矩等连续动作。Actor 直接输出动作，critic 估计 Q(s,a)，并把动作方向上的价值梯度反向传给 actor，从而避免像 DQN 那样枚举有限的离散动作。 DDPG 是离策略算法，借用了 DQN 的经验回放和目标网络，并在探索阶段向 actor 动作加入噪声；论文还使用批归一化处理不同量纲的状态输入。它在多项模拟物理控制任务中展示了从低维状态甚至像素输入学习连续控制策略的能力，推动深度强化学习进入机器人式控制场景。DDPG 对超参数、价值过估计和探索策略较敏感，后续 TD3、SAC 等方法沿用 actor-critic 路线并提高了训练稳定性。","en":"In 2015, Timothy Lillicrap and colleagues at DeepMind introduced Deep Deterministic Policy Gradient (DDPG), combining deterministic policy gradients with deep actor-critic networks for continuous actions such as steering angles, velocities, and torques. The actor outputs an action directly, the critic estimates Q(s,a), and the action-value gradient is backpropagated into the actor, avoiding the need to enumerate a finite set of actions as DQN does. DDPG is an off-policy algorithm that adopted experience replay and target networks from DQN, while adding noise to actor actions during exploration; the paper also used batch normalization for state variables with different scales. Across simulated physics tasks, it showed that continuous-control policies could be learned from low-dimensional states and even pixel inputs, helping extend deep reinforcement learning toward robotic-style control. DDPG is sensitive to hyperparameters, value overestimation, and exploration, so later methods such as TD3 and SAC retained the actor-critic direction while improving stability."},"method":{"zh":"用于连续控制的确定性 actor-critic","en":"Deterministic actor-critic for continuous control"},"artifact":{"zh":"深度确定性策略梯度","en":"Deep Deterministic Policy Gradient"}}],"svgText":["DDPG continuous-control loop","off-policy learning with replay, target networks, and deterministic policy gradients","state st","observation","actor μ(s)","deterministic policy","action at","continuous","environment","rt, st+1","replay buffer","off-policy batches","critic Q(s,a)","value + action gradient","target networks","slow updates","policy gradient","experience tuple (s, a, r, s')"],"svgBytes":4403,"hasViewBox":true,"hasTitle":true,"hasDesc":true,"hasScript":false,"sourceTraceable":true},{"path":"resources/images/bench-council-ai100/explainers/2015-deep-compression_prune-quantize-code.svg","exists":true,"assetIds":["asset-2015-deep-compression-prune-quantize-code"],"roles":["architecture-explainer"],"captions":{"zh":["深度压缩 解释图"],"en":["Deep Compression explainer"]},"subcaptions":{"zh":["关于该成就流程的本地原创解释图。"],"en":["Original local explainer for the achievement flow."]},"rightsStatuses":["documented-in-legacy"],"sourceIds":["source-deep-compression"],"sources":[{"id":"source-deep-compression","type":"paper","reliability":"primary","title":{"zh":"《深度压缩》","en":"Deep Compression"},"url":"https://arxiv.org/abs/1510.00149"}],"variantSourceIds":["source-deep-compression","source-iclr-openreview-record","source-song-han-efficient-ai-research-page"],"variantSources":[{"id":"source-deep-compression","type":"paper","reliability":"primary","title":{"zh":"《深度压缩》","en":"Deep Compression"},"url":"https://arxiv.org/abs/1510.00149"},{"id":"source-iclr-openreview-record","type":"paper-page","reliability":"secondary","title":{"zh":"ICLR OpenReview 记录","en":"ICLR OpenReview record"},"url":"https://openreview.net/forum?id=n4Bp24yb5L"},{"id":"source-song-han-efficient-ai-research-page","type":"project-page","reliability":"secondary","title":{"zh":"韩松实验室深度压缩项目页面","en":"Song Han efficient AI research page"},"url":"https://hanlab.mit.edu/projects/deep-compression"}],"usages":[{"storylineId":"bench-council-ai100","storylineTitle":{"zh":"AI 百大成就（BenchCouncil）","en":"AI Top 100 Achievements (BenchCouncil)"},"eventId":"ai100-2015-deep-compression","eventTitle":{"zh":"深度压缩","en":"Deep Compression"},"variant":"bench-council-ai100","variantFile":"archive/events/ai100-2015-deep-compression/variants/bench-council-ai100.json","visual":"configuredPaper","demoImage":"resources/images/bench-council-ai100/explainers/2015-deep-compression_prune-quantize-code.svg","description":{"zh":"韩松、毛巍和戴利提出 Deep Compression，用三阶段流水线缩小训练后的神经网络。首先剪除接近零或贡献较小的连接并重新训练；随后通过训练式量化让许多权重共享少量码本值；最后用 Huffman 编码压缩索引和量化参数。 论文表明 AlexNet、VGG 等大型模型可以显著减少存储和内存访问，同时基本保持准确率。真正加速仍取决于硬件和软件能否高效利用稀疏结构，但这项工作把模型大小、能耗和部署成本变成一等研究目标，并奠定剪枝与量化结合的边缘 AI 路线。","en":"Song Han, Huizi Mao, and William Dally introduced Deep Compression as a three-stage pipeline for reducing trained neural networks. It first prunes connections that are near zero or contribute little and retrains the network. Trained quantization then makes many weights share a small codebook of values, and Huffman coding compresses the resulting indices and parameters. The paper showed that large models such as AlexNet and VGG could require far less storage and memory access while largely preserving accuracy. Actual speedups still depend on hardware and software that can exploit sparsity efficiently. The work nevertheless made model size, energy, and deployment cost first-class research objectives and established the influential combination of pruning and quantization for edge AI."},"method":{"zh":"剪枝、量化与霍夫曼编码","en":"Pruning, quantization, and Huffman coding"},"artifact":{"zh":"深度压缩流程","en":"Deep Compression pipeline"}}],"svgText":["Deep Compression","prune weights","input","quantize","mechanism","huffman code","result","Original local SVG redraw; source figures are not copied."],"svgBytes":2363,"hasViewBox":true,"hasTitle":true,"hasDesc":true,"hasScript":false,"sourceTraceable":true},{"path":"resources/images/bench-council-ai100/explainers/2015-diffusion_forward-reverse.svg","exists":true,"assetIds":["asset-2015-diffusion-forward-reverse"],"roles":["architecture-explainer"],"captions":{"zh":["扩散模型 解释图"],"en":["Diffusion Model explainer"]},"subcaptions":{"zh":["关于该成就流程的本地原创解释图。"],"en":["Original local explainer for the achievement flow."]},"rightsStatuses":["documented-in-legacy"],"sourceIds":["source-deep-unsupervised-learning-using-nonequilibrium-thermodynamics"],"sources":[{"id":"source-deep-unsupervised-learning-using-nonequilibrium-thermodynamics","type":"paper","reliability":"primary","title":{"zh":"《使用非平衡热力学进行深度无监督学习》","en":"Deep Unsupervised Learning using Nonequilibrium Thermodynamics"},"url":"https://proceedings.mlr.press/v37/sohl-dickstein15.html"}],"variantSourceIds":["source-deep-unsupervised-learning-using-nonequilibrium-thermodynamics","source-denoising-diffusion-probabilistic-models","source-diffusion-model-overview"],"variantSources":[{"id":"source-deep-unsupervised-learning-using-nonequilibrium-thermodynamics","type":"paper","reliability":"primary","title":{"zh":"《使用非平衡热力学进行深度无监督学习》","en":"Deep Unsupervised Learning using Nonequilibrium Thermodynamics"},"url":"https://proceedings.mlr.press/v37/sohl-dickstein15.html"},{"id":"source-denoising-diffusion-probabilistic-models","type":"paper","reliability":"primary","title":{"zh":"《去噪扩散概率模型》","en":"Denoising Diffusion Probabilistic Models"},"url":"https://arxiv.org/abs/2006.11239"},{"id":"source-diffusion-model-overview","type":"encyclopedia-entry","reliability":"reference-only","title":{"zh":"扩散模型概览","en":"Diffusion model overview"},"url":"https://en.wikipedia.org/wiki/Diffusion_model"}],"usages":[{"storylineId":"bench-council-ai100","storylineTitle":{"zh":"AI 百大成就（BenchCouncil）","en":"AI Top 100 Achievements (BenchCouncil)"},"eventId":"ai100-2015-diffusion-model","eventTitle":{"zh":"扩散模型","en":"Diffusion Model"},"variant":"bench-council-ai100","variantFile":"archive/events/ai100-2015-diffusion-model/variants/bench-council-ai100.json","visual":"configuredPaper","demoImage":"resources/images/bench-council-ai100/explainers/2015-diffusion_forward-reverse.svg","description":{"zh":"索尔-迪克斯坦等人在 2015 年把生成建模写成非平衡热力学过程：前向马尔可夫链逐步向数据加入微小噪声，直到接近简单分布；模型学习每一步的逆向转移，从噪声出发逐渐恢复样本。这个过程提供可计算的训练目标和概率解释。 2020 年的去噪扩散概率模型进一步简化训练，让神经网络直接预测噪声，并成为现代图像生成的重要基础。扩散模型通常覆盖数据模式较好、训练稳定，但采样需要许多连续去噪步骤，速度较慢。它的核心思想是把困难生成问题拆成一系列小型可学习逆过程。","en":"Jascha Sohl-Dickstein and colleagues formulated generative modeling as a nonequilibrium thermodynamic process in 2015. A forward Markov chain adds small amounts of noise to data until it approaches a simple distribution. A model learns each reverse transition so a sample can be reconstructed gradually from noise, providing a tractable training objective and probabilistic interpretation. Denoising diffusion probabilistic models simplified the approach in 2020 by training a neural network to predict noise, becoming a major foundation for modern image generation. Diffusion models often cover data modes well and train stably, but sampling can be slow because it requires many sequential denoising steps. Their central idea is to decompose a difficult generation problem into a sequence of small learnable reverse processes."},"method":{"zh":"正向加噪与学习型反向去噪","en":"Forward noising and learned reverse denoising"},"artifact":{"zh":"非平衡热力学扩散模型","en":"Nonequilibrium thermodynamics diffusion model"}}],"svgText":["Diffusion Model","add noise","input","learn denoise","mechanism","sample","result","Original local SVG redraw; source figures are not copied."],"svgBytes":2350,"hasViewBox":true,"hasTitle":true,"hasDesc":true,"hasScript":false,"sourceTraceable":true},{"path":"resources/images/bench-council-ai100/explainers/2015-faster-r-cnn_detection-output.svg","exists":true,"assetIds":["asset-2015-faster-r-cnn-detection-output"],"roles":["architecture-explainer"],"captions":{"zh":["检测输出框"],"en":["Detection output boxes"]},"subcaptions":{"zh":["Faster R-CNN 的独立本地重画，依据相关来源材料制作。"],"en":["Distinct local redraw for Faster R-CNN, based on the related source material."]},"rightsStatuses":["documented-in-legacy"],"sourceIds":["source-faster-r-cnn-towards-real-time-object-detection-with-region-proposal-networks"],"sources":[{"id":"source-faster-r-cnn-towards-real-time-object-detection-with-region-proposal-networks","type":"paper","reliability":"primary","title":{"zh":"《Faster R-CNN：通过区域建议网络迈向实时目标检测》","en":"Faster R-CNN: Towards Real-Time Object Detection with Region Proposal Networks"},"url":"https://arxiv.org/abs/1506.01497"}],"variantSourceIds":["source-faster-r-cnn-towards-real-time-object-detection-with-region-proposal-networks","source-shaoqingren-faster-rcnn","source-torchvision-faster-r-cnn-model"],"variantSources":[{"id":"source-faster-r-cnn-towards-real-time-object-detection-with-region-proposal-networks","type":"paper","reliability":"primary","title":{"zh":"《Faster R-CNN：通过区域建议网络迈向实时目标检测》","en":"Faster R-CNN: Towards Real-Time Object Detection with Region Proposal Networks"},"url":"https://arxiv.org/abs/1506.01497"},{"id":"source-shaoqingren-faster-rcnn","type":"code","reliability":"secondary","title":{"zh":"任少卿/faster_rcnn","en":"ShaoqingRen/faster_rcnn"},"url":"https://github.com/ShaoqingRen/faster_rcnn"},{"id":"source-torchvision-faster-r-cnn-model","type":"documentation","reliability":"reference-only","title":{"zh":"TorchVision Faster R-CNN 模型","en":"TorchVision Faster R-CNN model"},"url":"https://pytorch.org/vision/stable/models/generated/torchvision.models.detection.fasterrcnn_resnet50_fpn.html"}],"usages":[{"storylineId":"bench-council-ai100","storylineTitle":{"zh":"AI 百大成就（BenchCouncil）","en":"AI Top 100 Achievements (BenchCouncil)"},"eventId":"2015-faster-r-cnn","eventTitle":{"zh":"Faster R-CNN","en":"Faster R-CNN"},"variant":"bench-council-ai100","variantFile":"archive/events/2015-faster-r-cnn/variants/bench-council-ai100.json","visual":"detector","demoImage":"","description":{"zh":"早期 R-CNN 系统先用外部算法生成候选区域，再让卷积网络逐个判断，候选框阶段成为速度和系统整合的瓶颈。Faster R-CNN 引入区域建议网络，在共享卷积特征图上滑动，用预设锚框预测哪些位置可能包含物体及其边界偏移，再把建议区域交给检测头分类和精修。 区域建议网络与检测器共享大部分计算，并可联合训练，使候选框生成也成为可学习过程。这个“建议区域 + 分类定位”的统一两阶段框架在精度上长期具有竞争力，也成为目标检测研究的重要参照；它清楚展示了速度、定位质量和端到端学习之间的工程权衡。","en":"Earlier R-CNN systems used an external algorithm to generate candidate regions before a convolutional network classified them, making proposal generation a speed and integration bottleneck. Faster R-CNN introduced a Region Proposal Network that slides over shared feature maps and uses anchor boxes to predict likely objects and boundary offsets. Proposed regions then pass to a detection head for classification and refinement. The proposal network shares most computation with the detector and can be trained jointly, turning candidate generation into a learned component. This unified two-stage proposal-and-recognition framework remained highly competitive for accurate detection and became a standard research reference. It also made the tradeoff among speed, localization quality, and end-to-end learning easier to study."},"method":{"zh":"共享特征的区域建议网络","en":"Region Proposal Network with shared features"},"artifact":{"zh":"带学习型候选区域的两阶段检测器","en":"Two-stage detector with learned proposals"}}],"svgText":["Detection output boxes","检测输出框","person .97","bike .91","Output · local redraw from source material"],"svgBytes":1265,"hasViewBox":true,"hasTitle":true,"hasDesc":true,"hasScript":false,"sourceTraceable":true},{"path":"resources/images/bench-council-ai100/explainers/2015-faster-r-cnn_rpn-pipeline.svg","exists":true,"assetIds":["asset-2015-faster-r-cnn-rpn-pipeline"],"roles":["architecture-explainer"],"captions":{"zh":["区域建议网络"],"en":["Region proposal network"]},"subcaptions":{"zh":["Faster R-CNN 的独立本地重画，依据相关来源材料制作。"],"en":["Distinct local redraw for Faster R-CNN, based on the related source material."]},"rightsStatuses":["documented-in-legacy"],"sourceIds":["source-faster-r-cnn-towards-real-time-object-detection-with-region-proposal-networks"],"sources":[{"id":"source-faster-r-cnn-towards-real-time-object-detection-with-region-proposal-networks","type":"paper","reliability":"primary","title":{"zh":"《Faster R-CNN：通过区域建议网络迈向实时目标检测》","en":"Faster R-CNN: Towards Real-Time Object Detection with Region Proposal Networks"},"url":"https://arxiv.org/abs/1506.01497"}],"variantSourceIds":["source-faster-r-cnn-towards-real-time-object-detection-with-region-proposal-networks","source-shaoqingren-faster-rcnn","source-torchvision-faster-r-cnn-model"],"variantSources":[{"id":"source-faster-r-cnn-towards-real-time-object-detection-with-region-proposal-networks","type":"paper","reliability":"primary","title":{"zh":"《Faster R-CNN：通过区域建议网络迈向实时目标检测》","en":"Faster R-CNN: Towards Real-Time Object Detection with Region Proposal Networks"},"url":"https://arxiv.org/abs/1506.01497"},{"id":"source-shaoqingren-faster-rcnn","type":"code","reliability":"secondary","title":{"zh":"任少卿/faster_rcnn","en":"ShaoqingRen/faster_rcnn"},"url":"https://github.com/ShaoqingRen/faster_rcnn"},{"id":"source-torchvision-faster-r-cnn-model","type":"documentation","reliability tle":true,"hasDesc":true,"hasScript":false,"sourceTraceable":true},{"path":"resources/images/bench-council-ai100/explainers/2015-googlenet-inception_bottleneck.svg","exists":true,"assetIds":["asset-2015-googlenet-inception-bottleneck"],"roles":["architecture-explainer"],"captions":{"zh":["1x1 瓶颈降维"],"en":["1x1 bottleneck reduction"]},"subcaptions":{"zh":["GoogLeNet / Inception 的独立本地重画，依据相关来源材料制作。"],"en":["Distinct local redraw for GoogLeNet / Inception, based on the related source material."]},"rightsStatuses":["documented-in-legacy"],"sourceIds":["source-going-deeper-with-convolutions"],"sources":[{"id":"source-going-deeper-with-convolutions","type":"paper","reliability":"primary","title":{"zh":"《用卷积走得更深》","en":"Going Deeper with Convolutions"},"url":"https://www.cv-foundation.org/openaccess/content_cvpr_2015/html/Szegedy_Going_Deeper_With_2015_CVPR_paper.html"}],"variantSourceIds":["source-going-deeper-with-convolutions","source-tensorflow-keras-inceptionv3","source-torchvision-googlenet"],"variantSources":[{"id":"source-going-deeper-with-convolutions","type":"paper","reliability":"primary","title":{"zh":"《用卷积走得更深》","en":"Going Deeper with Convolutions"},"url":"https://www.cv-foundation.org/openaccess/content_cvpr_2015/html/Szegedy_Going_Deeper_With_2015_CVPR_paper.html"},{"id":"source-torchvision-googlenet","type":"documentation","reliability":"reference-only","title":{"zh":"TorchVision GoogLeNet","en":"TorchVision GoogLeNet"},"url":"https://pytorch.org/vision/stable/models/googlenet.html"},{"id":"source-tensorflow-keras-inceptionv3","type":"documentation","reliability":"reference-only","title":{"zh":"TensorFlow Keras InceptionV3","en":"TensorFlow Keras InceptionV3"},"url":"https://www.tensorflow.org/api_docs/python/tf/keras/applications/InceptionV3"}],"usages":[{"storylineId":"bench-council-ai100","storylineTitle":{"zh":"AI 百大成就（BenchCouncil）","en":"AI Top 100 Achievements (BenchCouncil)"},"eventId":"2015-googlenet-inception","eventTitle":{"zh":"GoogLeNet / Inception","en":"GoogLeNet / Inception"},"variant":"bench-council-ai100","variantFile":"archive/events/2015-googlenet-inception/variants/bench-council-ai100.json","visual":"inception","demoImage":"","description":{"zh":"GoogLeNet 的 Inception 架构表明，加深网络不必只沿单一路径堆叠层。每个 Inception 模块并行使用不同尺寸的卷积和池化，让网络同时观察多种感受野，再拼接各分支输出；1×1 卷积先压缩通道，使这种多分支计算保持可承受。 该系统赢得 2014 年 ImageNet 挑战赛，并用全局平均池化等设计减少参数规模。Inception 把表示能力与计算预算作为同一个架构问题处理，影响了后续瓶颈层、多分支模块和高效网络设计。它也说明 CNN 的进步不仅来自“更深”，还来自如何组织每层内部的计算路径。","en":"GoogLeNet's Inception architecture showed that increasing depth did not require stacking layers along only one path. Each Inception module applies different convolution sizes and pooling in parallel, allowing the network to examine several receptive-field scales before concatenating the branch outputs. 1×1 convolutions reduce channel dimensions so this multi-branch computation remains affordable. The system won the 2014 ImageNet challenge and used choices such as global average pooling to limit parameter growth. Inception treated representational power and computational budget as one architectural problem, influencing later bottleneck layers, multi-branch modules, and efficient network design. It demonstrated that CNN progress depended not only on becoming deeper, but also on organizing computation inside each block."},"method":{"zh":"多尺度 Inception 模块","en":"Multi-scale Inception modules"},"artifact":{"zh":"GoogLeNet 架构","en":"GoogLeNet architecture"}}],"svgText":["1x1 bottleneck reduction","1x1 瓶颈降维","1x1","Bottleneck · local redraw from source material"],"svgBytes":1234,"hasViewBox":true,"hasTitle":true,"hasDesc":true,"hasScript":false,"sourceTraceable":true},{"path":"resources/images/bench-council-ai100/explainers/2015-googlenet-inception_parallel-branches.svg","exists":true,"assetIds":["asset-2015-googlenet-inception-parallel-branches"],"roles":["architecture-explainer"],"captions":{"zh":["多分支 Inception 模块"],"en":["Multi-branch Inception module"]},"subcaptions":{"zh":["GoogLeNet / Inceptio 数规模。Inception 把表示能力与计算预算作为同一个架构问题处理，影响了后续瓶颈层、多分支模块和高效网络设计。它也说明 CNN 的进步不仅来自“更深”，还来自如何组织每层内部的计算路径。","en":"GoogLeNet's Inception architecture showed that increasing depth did not require stacking layers along only one path. Each Inception module applies different convolution sizes and pooling in parallel, allowing the network to examine several receptive-field scales before concatenating the branch outputs. 1×1 convolutions reduce channel dimensions so this multi-branch computation remains affordable. The system won the 2014 ImageNet challenge and used choices such as global average pooling to limit parameter growth. Inception treated representational power and computational budget as one architectural problem, influencing later bottleneck layers, multi-branch modules, and efficient network design. It demonstrated that CNN progress depended not only on becoming deeper, but also on organizing computation inside each block."},"method":{"zh":"多尺度 Inception 模块","en":"Multi-scale Inception modules"},"artifact":{"zh":"GoogLeNet 架构","en":"GoogLeNet architecture"}}],"svgText":["Multi-branch Inception module","多分支 Inception 模块","Branches · local redraw from source material"],"svgBytes":1480,"hasViewBox":true,"hasTitle":true,"hasDesc":true,"hasScript":false,"sourceTraceable":true},{"path":"resources/images/bench-council-ai100/explainers/2015-knowledge-distillation_teacher-student.svg","exists":true,"assetIds":["asset-2015-knowledge-distillation-teacher-student"],"roles":["architecture-explainer"],"captions":{"zh":["知识蒸馏 解释图"],"en":["Knowledge Distillation explainer"]},"subcaptions":{"zh":["关于该成就流程的本地原创解释图。"],"en":["Original local explainer for the achievement flow."]},"rightsStatuses":["documented-in-legacy"],"sourceIds":["source-distilling-the-knowledge-in-a-neural-network"],"sources":[{"id":"source-distilling-the-knowledge-in-a-neural-network","type":"paper","reliability":"primary","title":{"zh":"《蒸馏神经网络中的知识》","en":"Distilling the Knowledge in a Neural Network"},"url":"https://arxiv.org/abs/1503.02531"}],"variantSourceIds":["source-distilling-the-knowledge-in-a-neural-network","source-geoffrey-hinton-profile","source-knowledge-distillation-overview"],"variantSources":[{"id":"source-distilling-the-knowledge-in-a-neural-network","type":"paper","reliability":"primary","title":{"zh":"《蒸馏神经网络中的知识》","en":"Distilling the Knowledge in a Neural Network"},"url":"https://arxiv.org/abs/1503.02531"},{"id":"source-knowledge-distillation-overview","type":"encyclopedia-entry","reliability":"reference-only","title":{"zh":"知识蒸馏概览","en":"Knowledge distillation overview"},"url":"https://en.wikipedia.org/wiki/Knowledge_distillation"},{"id":"source-geoffrey-hinton-profile","type":"personal-page","reliability":"primary","title":{"zh":"杰弗里·辛顿个人主页","en":"Geoffrey Hinton personal homepage"},"url":"https://www.cs.toronto.edu/~hinton/"}],"usages":[{"storylineId":"bench-council-ai100","storylineTitle":{"zh":"AI 百大成就（BenchCouncil）","en":"AI Top 100 Achievements (BenchCouncil)"},"eventId":"ai100-2015-knowledge-distillation","eventTitle":{"zh":"知识蒸馏","en":"Knowledge Distillation"},"variant":"bench-council-ai100","variantFile":"archive/events/ai100-2015-knowledge-distillation/variants/bench-council-ai100.json","visual":"configuredPaper","demoImage":"resources/images/bench-council-ai100/explainers/2015-knowledge-distillation_teacher-student.svg","description":{"zh":"辛顿、维尼亚尔斯和迪恩在 2015 年系统化知识蒸馏，让较小学生模型学习大型教师或模型集成的行为。教师 logits 经较高温度 softmax 变成更平滑的概率分布，除了正确类别，还显示其他类别之间的相似性；学生同时匹配这些软目标和真实硬标签。 蒸馏可以在减少参数、延迟和部署成本的同时保留较多教师能力，并扩展到特征层、注意力和自蒸馏。学生上限受教师质量、数据覆盖和容量限制，也可能继承教师偏见与错误；但“把模型行为当作训练信号传给另一模型”成为高效 AI 的基础方法。","en":"Geoffrey Hinton, Oriol Vinyals, and Jeff Dean systematized knowledge distillation in 2015 so a smaller student model could learn the behavior of a large teacher or ensemble. A higher-temperature softmax turns teacher logits into a smoother probability distribution that reveals similarities among incorrect classes as well as the correct answer. The student learns from these soft targets together with hard labels. Distillation can preserve much of a teacher's capability while reducing parameters, latency, and deployment cost and has expanded to intermediate features, attention, and self-distillation. The student's ceiling depends on teacher quality, data coverage, and capacity, and it can inherit teacher biases and errors. The broader idea of transferring model behavior as a training signal became foundational to efficient AI."},"method":{"zh":"教师-学生软目标训练","en":"Teacher-student soft-target training"},"artifact":{"zh":"蒸馏训练配方","en":"Distillation training recipe"}}],"svgText":["Knowledge Distillation","teacher logits","input","soft targets","mechanism","student model","result","Original local SVG redraw; source figures are not copied."],"svgBytes":2393,"hasViewBox":true,"hasTitle":true,"hasDesc":true,"hasScript":false,"sourceTraceable":true},{"path":"resources/images/bench-council-ai100/explainers/2015-u-net_segmentation-mask.svg","exists":true,"assetIds":["asset-2015-u-net-segmentation-mask"],"roles":["architecture-explainer"],"captions":{"zh":["生物医学分割掩码"],"en":["Biomedical mask output"]},"subcaptions":{"zh":["U-Net 的独立本地重画，依据相关来源材料制作。"],"en":["Distinct local redraw for U-Net, based on the related source material."]},"rightsStatuses":["documented-in-legacy"],"sourceIds":["source-u-net-convolutional-networks-for-biomedical-image-segmentation"],"sources":[{"id":"source-u-net-convolutional-networks-for-biomedical-image-segmentation","type":"paper","reliability":"primary","title":{"zh":"《U-Net：用于生物医学图像分割的卷积网络》","en":"U-Net: Convolutional Networks for Biomedical Image Segmentation"},"url":"https://arxiv.org/abs/1505.04597"}],"variantSourceIds":["source-freiburg-u-net-release-page","source-nnu-net-implementation-project","source-u-net-convolutional-networks-for-biomedical-image-segmentation"],"variantSources":[{"id":"source-u-net-convolutional-networks-for-biomedical-image-segmentation","type":"paper","reliability":"primary","title":{"zh": thod":{"zh":"带跳跃连接的编码器-解码器分割","en":"Encoder-decoder segmentation with skip connections"},"artifact":{"zh":"U 形生物医学分割网络","en":"U-shaped biomedical segmentation network"}}],"svgText":["Biomedical mask output","生物医学分割掩码","Mask · local redraw from source material"],"svgBytes":1248,"hasViewBox":true,"hasTitle":true,"hasDesc":true,"hasScript":false,"sourceTraceable":true},{"path":"resources/images/bench-council-ai100/explainers/2015-u-net_u-shape-architecture.svg","exists":true,"assetIds":["asset-2015-u-net-u-shape-architecture"],"roles":["architecture-explainer"],"captions":{"zh":["U 形编码器-解码器"],"en":["U-shaped encoder-decoder"]},"subcaptions":{"zh":["U-Net 的独立本地重画，依据相关来源材料制作。"],"en":["Distinct local redraw for U-Net, based on the related source material."]},"rightsStatuses":["documented-in-legacy"],"sourceIds":["source-u-net-convolutional-networks-for-biomedical-image-segmentation"],"sources":[{"id":"source-u-net-convolutional-networks-for-biomedical-image-segmentation","type":"paper","reliability":"primary","title":{"zh":"《U-Net：用于生物医学图像分割的卷积网络》","en":"U-Net: Convolutional Networks for Biomedical Image Segmentation"},"url":"https://arxiv.org/abs/1505.04597"}],"variantSourceIds":["source-freiburg-u-net-release-page","source-nnu-net-implementation-project","source-u-net-convolutional-networks-for-biomedical-image-segmentation"],"variantSources":[{"id":"source-u-net-convolutional-networks-for-biomedical-image-segmentation","type":"paper","reliability":"primary","title":{"zh":"《U-Net：用于生物医学图像分割的卷积网络》","en":"U-Net: Convolutional Networks for Biomedical Image Segmentation"},"url":"https://arxiv.org/abs/1505.04597"},{"id":"source-freiburg-u-net-release-page","type":"project-page","reliability":"secondary","title":{"zh":"弗赖堡 U-Net 项目发布页","en":"Freiburg U-Net release page"},"url":"https://lmb.informatik.uni-freiburg.de/people/ronneber/u-net/"},{"id":"source-nnu-net-implementation-project","type":"project-page","reliability":"secondary","title":{"zh":"nnU-Net 实现项目","en":"nnU-Net 究。","en":"AlphaGo combined policy networks, a value network, Monte Carlo tree search, and reinforcement learning. Supervised learning from expert games first gave the policy network a strong starting point; self-play then improved move selection, while tree search joined learned intuition with explicit look-ahead. The 2016 Nature paper reported its victory over European champion Fan Hui, and its later 4–1 match win against Lee Sedol brought the achievement to a global audience. Go had long resisted brute-force approaches because its branching factor and strategic horizon are enormous. AlphaGo showed that learned representations could narrow search and evaluate positions that were difficult to encode by hand. Its deeper legacy is the combination of neural evaluation, planning, and self-play, a pattern that influenced later game systems and research on decision-making beyond board games."},"method":{"zh":"自我对弈搜索","en":"Self-play search"},"artifact":{"zh":"策略 / 价值网络 + MCTS","en":"Policy/value networks + MCTS"}},{"storylineId":"gaming-ai","storylineTitle":{"zh":"AI 在棋牌与博弈论的演进","en":"AI in Board & Tabletop Games"},"eventId":"2016-alphago","eventTitle":{"zh":"AlphaGo","en":"AlphaGo"},"variant":"gaming-ai","variantFile":"archive/events/2016-alphago/variants/gaming-ai.json","visual":"go","demoImage":"","description":{"zh":"AlphaGo 结合深度神经网络、蒙特卡洛树搜索和自我对弈强化学习。2016 年与李世石的对局让 AI 的战略能力被全球观众看见。它证明 AI 可以在一个长期被认为难以靠蛮力搜索解决的领域中学习直觉与规划。","en":"AlphaGo combined deep neural networks, Monte Carlo tree search and reinforcement learning through self-play. Its 2016 match against Lee Sedol made AI's strategic progress visible to a global audience. The system showed that AI could learn both intuition and planning in a domain long considered too complex for brute-force search."},"method":{"zh":"自我对弈搜索","en":"Self-play search"},"artifact":{"zh":"策略 / 价值网络 + MCTS","en":"Policy/value networks + MCTS"}}],"svgText":["AlphaGo: learned intuition plus search","A schematic 19×19 position; no historical ":{"zh":"AI 百大成就（BenchCouncil）","en":"AI Top 100 Achievements (BenchCouncil)"},"eventId":"ai100-2016-gcn","eventTitle":{"zh":"GCN","en":"GCN"},"variant":"bench-council-ai100","variantFile":"archive/events/ai100-2016-gcn/variants/bench-council-ai100.json","visual":"configuredPaper","demoImage":"resources/images/bench-council-ai100/explainers/2016-gcn_spectral-convolution.svg","description":{"zh":"基普夫和威灵在 2016 年提出简化图卷积网络，从谱图卷积的一阶近似得到实用更新规则。每一层把节点自身及其邻居的特征按归一化连接权重聚合，再通过共享线性变换和非线性激活，使标签信息和结构线索沿图传播。 GCN 能在只有少量节点带标签时联合利用全部图结构进行半监督分类，因简洁高效而成为图表示学习的标准基线。层数增加会导致过度平滑，远距离信息和异质关系也难以处理；但“归一化邻居聚合 + 可学习变换”的配方奠定了大量后续图模型。","en":"Thomas Kipf and Max Welling introduced the graph convolutional network in 2016 with a practical update derived from a first-order approximation to spectral graph convolution. Each layer aggregates a node's own features and those of its neighbors using normalized connection weights, then applies a shared linear transformation and nonlinearity so labels and structural information propagate across the graph. GCN can use the full graph for semi-supervised classification even when only a small fraction of nodes are labeled, and its simplicity made it a standard graph-learning baseline. Greater depth can cause oversmoothing, while long-range information and heterogeneous relations remain difficult. Its recipe of normalized neighborhood aggregation followed by a learned transformation nevertheless founded a large family of later graph models."},"method":{"zh":"图卷积传播规则","en":"Graph convolutional propagation rule"},"artifact":{"zh":"用于半监督分类的图卷积网络","en":"Graph convolutional network for semi-supervised classification"}}],"svgText":["GCN","graph + features","input","normalized neighbors","mechanism","class logits","result","Original local SVG redraw; source figures are not copied."],"svgBytes":2369,"hasViewBox":true,"hasTitle":true,"hasDesc":true,"hasScript":false,"sourceTraceable":true},{"path":"resources/images/bench-council-ai100/explainers/2016-nas_controller-search.svg","exists":true,"assetIds":["asset-2016-nas-controller-search"],"roles":["architecture-explainer"],"captions":{"zh":["神经架构搜索 解释图"],"en":["Neural Architecture Search explainer"]},"subcaptions":{"zh":["关于该成就流程的本地原创解释图。"],"en":["Original local explainer for the achievement flow."]},"rightsStatuses":["documented-in-legacy"],"sourceIds":["source-neural-architecture-search-with-reinforcement-learning"],"sources":[{"id":"source-neural-architecture-search-with-reinforcement-learning","type":"paper","reliability":"primary","title":{"zh":"《基于强化学习的神经架构搜索》","en":"Neural Architecture Search with Reinforcement Learning"},"url":"https://arxiv.org/abs/1611.01578"}],"variantSourceIds":["source-google-ai-automl-overview","source-iclr-openreview-record","source-neural-architecture-search-with-reinforcement-learning"],"variantSources":[{"id":"source-neural-architecture-search-with-reinforcement-learning","type":"paper","reliability":"primary","title":{"zh":"《基于强化学习的神经架构搜索》","en":"Neural Architecture Search with Reinforcement Learning"},"url":"https://arxiv.org/abs/1611.01578"},{"id":"source-iclr-openreview-record","type":"paper-page","reliability":"secondary","title":{"zh":"ICLR OpenReview 记录","en":"ICLR OpenReview record"},"url":"https://openreview.net/forum?id=r1Ue8Hcxg"},{"id":"source-google-ai-automl-overview","type":"article","reliability":"secondary","title":{"zh":"Google AI AutoML 概览","en":"Google AI AutoML overview"},"url":"https://ai.googleblog.com/2017/05/using-machine-learning-to-explore.html"}],"usages":[{"storylineId":"bench-council-ai100","storylineTitle":{"zh":"AI 百大成就（BenchCouncil）","en":"AI Top 100 Achievements (BenchCouncil)"},"eventId":"ai100-2016-nas","eventTitle":{"zh":"神经架构搜索","en":"Neural Architecture Search"},"variant":"bench-council-ai100","variantFile":"archive/events/ai100-2016-nas/variants/bench-council-ai100.json","visual":"configuredPaper","demoImage":"resources/images/bench-council-ai100/explainers/2016-nas_controller-search.svg","description":{"zh":"佐普和勒在 2016 年把神经网络架构设计本身表述为强化学习问题。循环控制器依次生成层类型、连接和超参数，候选子网络经过训练后用验证集准确率形成奖励，再通过策略梯度更新控制器，使后续提案更可能包含有效结构。 早期 NAS 在图像和语言任务上发现有竞争力的架构，证明机器可以搜索部分原本依赖专家经验的设计空间，但每个候选都要训练，计算成本极高。后续研究发展权重共享、可微搜索和多目标优化。NAS 的长期影响在于把准确率、延迟、能耗等设计目标纳入自动优化。","en":"Barret Zoph and Quoc Le formulated neural-network architecture design itself as a reinforcement-learning problem in 2016. A recurrent controller generated layer types, connections, and hyperparameters sequentially. Candidate child networks were trained and scored by validation accuracy, which became a reward for policy-gradient updates that made promising structural choices more likely. Early NAS discovered competitive architectures for vision and language tasks, showing that machines could search parts of a design space previously guided mainly by expert intuition. Training every candidate made the approach extraordinarily expensive. Later work developed weight sharing, differentiable search, and multi-objective optimization. NAS's lasting impact is treating accuracy, latency, energy, and related design goals as variables in an automated optimization process."},"method":{"zh":"基于控制器的架构搜索","en":"Controller-based architecture search"},"artifact":{"zh":"基于强化学习的神经架构搜索","en":"Neural architecture search with reinforcement learning"}}],"svgText":["NAS","controller","input","sample architecture","mechanism","validation reward","result","Original local SVG redraw; source figures are not copied."],"svgBytes":2365,"hasViewBox":true,"hasTitle":true,"hasDesc":true,"hasScript":false,"sourceTraceable":true},{"path":"resources/images/bench-council-ai100/explainers/2016-yolo_grid-detector.svg","exists":true,"assetIds":["asset-2016-yolo-grid-detector"],"roles":["architecture-explainer"],"captions":{"zh":["网格检测器"],"en":["Grid detector"]},"subcaptions":{"zh":["YOLO 的本地重绘图，依据页面列出的来源材料制作。"],"en":["Local redraw for YOLO, based on the listed source material."]},"rightsStatuses":["documented-in-legacy"],"sourceIds":["source-you-only-look-once-unified-real-time-object-detection"],"sources":[{"id":"source-you-only-look-once-unified-real-time-object-detection","type":"paper","reliability":"primary","title":{"zh":"《你只看一次：统一的实时目标检测》","en":"You Only Look Once: Unified, Real-Time Object Detection"},"url":"https://arxiv.org/abs/1506.02640"}],"variantSourceIds":["source-cvpr-open-access-paper-page","source-darknet-yolo-project-page","source-you-only-look-once-unified-real-time-object-detection"],"variantSources":[{"id":"source-you-only-look-once-unified-real-time-object-detection","type":"paper","reliability":"primary","title":{"zh":"《你只看一次：统一的实时目标检测》","en":"You Only Look Once: Unified, Real-Time Object Detection"},"url":"https://arxiv.org/abs/1506.02640"},{"id":"source-cvpr-open-access-paper-page","type":"paper-page","reliability":"secondary","title":{"zh":"CVPR 开放论文页面","en":"CVPR open-access paper page"},"url":"https://openaccess.thecvf.com/content_cvpr_2016/html/Redmon_You_Only_Look_CVPR_2016_paper.html"},{"id":"source-darknet-yolo-project-page","type":"project-page","reliability":"secondary","title":{"zh":"Darknet YOLO project page","en":"Darknet YOLO project page"},"url":"https://pjreddie.com/darknet/yolo/"}],"usages":[{"storylineId":"bench-council-ai100","storylineTitle":{"zh":"AI 百大成就（BenchCouncil）","en":"AI Top 100 Achievements (BenchCouncil)"},"eventId":"2016-yolo","eventTitle":{"zh":"YOLO","en":"YOLO"},"variant":"bench-council-ai100","variantFile":"archive/events/2016-yolo/variants/bench-council-ai100.json","visual":"yolo","demoImage":"","description":{"zh":"YOLO 将目标检测重新表述为从图像像素直接回归边界框和类别概率的单一网络任务。原始系统把图像划分为网格，每个单元在一次前向传播中预测候选框、置信度和类别，而不再先运行独立的区域建议算法再逐个分类。 统一流水线能够利用整张图的上下文，并显著提高检测速度，使实时目标检测成为主流工程目标。第一代 YOLO 在小物体和精确定位上存在局限，后续版本不断修改框表示、特征层和训练方法；但“单阶段、单次前向预测”的核心表述深刻影响了检测器设计和部署预期。","en":"YOLO reframed object detection as one neural-network task that regresses bounding boxes and class probabilities directly from image pixels. The original system divided an image into a grid, with each cell predicting candidate boxes, confidence, and classes in a single forward pass instead of running a separate region-proposal algorithm and classifying proposals one by one. The unified pipeline could use context from the whole image and greatly increased detection speed, making real-time object detection a mainstream engineering goal. The first YOLO had limitations in precise localization and small-object detection, and later versions changed box representations, feature layers, and training recipes. Its central idea of single-stage, single-pass prediction nevertheless reshaped detector design and deployment expectations."},"method":{"zh":"基于网格的单阶段目标检测","en":"Single-shot grid-based object detection"},"artifact":{"zh":"实时 YOLO 检测器","en":"Real-time YOLO detector"}}],"svgText":["YOLO grid detector","boxes","classes"],"svgBytes":1191,"hasViewBox":true,"hasTitle":false,"hasDesc":false,"hasScript":false,"sourceTraceable":true},{"path":"resources/images/bench-council-ai100/explainers/2016-yolo_single-pass.svg","exists":true,"assetIds":["asset-2016-yolo-single-pass"],"roles":["architecture-explainer"],"captions":{"zh":["单次前向管线"],"en":["Single-pass pipeline"]},"subcaptions":{"zh":["YOLO 的本地重绘图，依据页面列出的来源材料制作。"],"en":["Local redraw for YOLO, based on the listed source material."]},"rightsStatuses":["documented-in-legacy"],"sourceIds":["source-you-only-look-once-unified-real-time-object-detection"],"sources":[{"id":"source-you-only-look-once-unified-real-time-object-detection","type":"paper","reliability":"primary","title":{"zh":"《你只看一次：统一的实时目标检测》","en":"You Only Look Once: Unified, Real-Time Object Detection"},"url":"https://arxiv.org/abs/1506.02640"}],"variantSourceIds":["source-cvpr-open-access-paper-page","source-darknet-yolo-project-page","source-you-only-look-once-unified-real-time-object-detection"],"variantSources":[{"id":"source-you-only-look-once-unified-real-time-object-detection","type":"paper","reliability":"primary","title":{"zh":"《你只看一次：统一的实时目标检测》","en":"You Only Look Once: Unified, Real-Time Object Detection"},"url":"https://arxiv.org/abs/1506.02640"},{"id":"source-cvpr-open-access-paper-page","type":"paper-page","reliability":"secondary","title":{"zh":"CVPR 开放论文页面","en":"CVPR open-access paper page"},"url":"https://openaccess.thecvf.com/content_cvpr_2016/html/Redmon_You_Only_Look_CVPR_2016_paper.html"},{"id":"source-darknet-yolo-project-page","type":"project-page","reliability":"secondary","title":{"zh":"Darknet YOLO project page","en":"Darknet YOLO project page"},"url":"https://pjreddie.com/darknet/yolo/"}],"usages":[{"storylineId":"bench-council-ai100","storylineTitle":{"zh":"AI 百大成就（BenchCouncil）","en":"AI Top 100 Achievements (BenchCouncil)"},"eventId":"2016-yolo","eventTitle":{"zh":"YOLO","en":"YOLO"},"variant":"bench-council-ai100","variantFile":"archive/events/2016-yolo/variants/bench-council-ai100.json","visual":"yolo","demoImage":"","description":{"zh":"YOLO 将目标检测重新表述为从图像像素直接回归边界框和类别概率的单一网络任务。原始系统把图像划分为网格，每个单元在一次前向传播中预测候选框、置信度和类别，而不再先运行独立的区域建议算法再逐个分类。 统一流水线能够利用整张图的上下文，并显著提高检测速度，使实时目标检测成为主流工程目标。第一代 YOLO 在小物体和精确定位上存在局限，后续版本不断修改框表示、特征层和训练方法；但“单阶段、单次前向预测”的核心表述深刻影响了检测器设计和部署预期。","en":"YOLO reframed object detection as one neural-network task that regresses bounding boxes and class probabilities directly from image pixels. The original system divided an image into a grid, with each cell predicting candidate boxes, confidence, and classes in a single forward pass instead of running a separate region-proposal algorithm and classifying proposals one by one. The unified pipeline could use context from the whole image and greatly increased detection speed, making real-time object detection a mainstream engineering goal. The first YOLO had limitations in precise localization and small-object detection, and later versions changed box representations, feature layers, and training recipes. Its central idea of single-stage, single-pass prediction nevertheless reshaped detector design and deployment expectations."},"method":{"zh":"基于网格的单阶段目标检测","en":"Single-shot grid-based object detection"},"artifact":{"zh":"实时 YOLO 检测器","en":"Real-time YOLO detector"}}],"svgText":["Single pass detection","image","CNN","once","boxes","scores","no proposal loop"],"svgBytes":884,"hasViewBox":true,"hasTitle":false,"hasDesc":false,"hasScript":false,"sourceTraceable":true},{"path":"resources/images/bench-council-ai100/explainers/2017-alphazero_self-play-loop.svg","exists":true,"assetIds":["asset-2017-alphazero-self-play-loop"],"roles":["architecture-explainer"],"captions":{"zh":["AlphaZero 自我博弈循环"],"en":["AlphaZero self-play loop"]},"subcaptions":{"zh":["策略-价值自我博弈的原创解释图。"],"en":["Original explainer for policy-value self-play."]},"rightsStatuses":["documented-in-legacy"],"sourceIds":["source-science-paper"],"sources":[{"id":"source-science-paper","type":"paper-page","reliability":"primary","title":{"zh":"Science 论文","en":"Science paper"},"url":"https://www.science.org/doi/10.1126/science.aar6404"}],"variantSourceIds":["source-arxiv-preprint","source-deepmind-alphazero-blog","source-science-paper"],"variantSources":[{"id":"source-science-paper","type":"paper-page","reliability":"primary","title":{"zh":"Science 论文","en":"Science paper"},"url":"https://www.science.org/doi/10.1126/science.aar6404"},{"id":"source-arxiv-preprint","type":"paper-page","reliability":"reference-only","title":{"zh":"arXiv 预印本","en":"arXiv preprint"},"url":"https://arxiv.org/abs/1712.01815"},{"id":"source-deepmind-alphazero-blog","type":"article","reliability":"secondary","title":{"zh":"DeepMind AlphaZero 博客","en":"DeepMind AlphaZero blog"},"url":"https://deepmind.google/discover/blog/alphazero-shedding-new-light-on-chess-shogi-and-go/"}],"usages":[{"storylineId":"gaming-ai","storylineTitle":{"zh":"AI 在棋牌与博弈论的演进","en":"AI in Board & Tabletop Games"},"eventId":"2017-alphazero","eventTitle":{"zh":"AlphaZero","en":"AlphaZero"},"variant":"gaming-ai","variantFile":"archive/events/2017-alphazero/variants/gaming-ai.json","visual":"configuredPaper","demoImage":"resources/images/bench-council-ai100/explainers/2017-alphazero_self-play-loop.svg","description":{"zh":"AlphaZero 展示了同一套自我博弈强化学习系统可以仅凭游戏规则掌握围棋、国际象棋和将棋。它用神经网络的策略-价值学习和蒙特卡洛树搜索取代人工评估函数与开局库，让棋牌游戏 AI 从单一游戏程序走向通用方法。","en":"AlphaZero showed that one self-play reinforcement learning system could master Go, chess, and shogi from game rules alone. It replaced handcrafted evaluation and opening books with neural policy-value learning plus Monte Carlo tree search, turning board-game AI into a general recipe rather than a single-game program."},"method":{"zh":"自我博弈策略-价值学习与蒙特卡洛树搜索","en":"Self-play policy-value learning with Monte Carlo tree search"},"artifact":{"zh":"面向围棋、国际象棋和将棋的一套算法","en":"One algorithm for Go, chess, and shogi"}}],"svgText":["AlphaZero self-play recipe","rules only -> games -> search targets -> policy-value network","Rules","Go / chess / shogi","Self-play","new games","MCTS","improved moves","Network","policy + value","Interaction: step through one loop to see how search becomes training data."],"svgBytes":2307,"hasViewBox":true,"hasTitle":true,"hasDesc":true,"hasScript":false,"sourceTraceable":true},{"path":"resources/images/bench-council-ai100/explainers/2017-cyclegan_cycle-consistency.svg","exists":true,"assetIds":["asset-2017-cyclegan-cycle-consistency"],"roles":["architecture-explainer"],"captions":{"zh":["CycleGAN 解释图"],"en":["CycleGAN explainer"]},"subcaptions":{"zh":["关于该成就流程的本地原创解释图。"],"en":["Original local explainer for the achievement flow."]},"rightsStatuses":["documented-in-legacy"],"sourceIds":["source-unpaired-image-to-image-translation-using-cycle-consistent-adversarial-networks"],"sources":[{"id":"source-unpaired-image-to-image-translation-using-cycle-consistent-adversarial-networks","type":"paper","reliability":"primary","title":{"zh":"《使用循环一致对抗网络进行非配对图像到图像转换》","en":"Unpaired Image-to-Image Translation using Cycle-Consistent Adversarial Networks"},"url":"https://arxiv.org/abs/1703.10593"}],"variantSourceIds":["source-cyclegan-project-page","source-iccv-open-access-paper-page","source-unpaired-image-to-image-translation-using-cycle-consistent-adversarial-networks"],"variantSources":[{"id":"source-unpaired-image-to-image-translation-using-cycle-consistent-adversarial-networks","type":"paper","reliability":"primary","title":{"zh":"《使用循环一致对抗网络进行非配对图像到图像转换》","en":"Unpaired Image-to-Image Translation using Cycle-Consistent Adversarial Networks"},"url":"https://arxiv.org/abs/1703.10593"},{"id":"source-iccv-open-access-paper-page","type":"paper-page","reliability":"secondary","title":{"zh":"ICCV 开放论文页面","en":"ICCV open-access paper page"},"url":"https://openaccess.thecvf.com/content_ICCV_2017/html/Zhu_Unpaired_Image-To-Image_Translation_ICCV_2017_paper.html"},{"id":"source-cyclegan-project-page","type":"project-page","reliability":"secondary","title":{"zh":"CycleGAN 项目页面","en":"CycleGAN project page"},"url":"https://junyanz.github.io/CycleGAN/"}],"usages":[{"storylineId":"bench-council-ai100","storylineTitle":{"zh":"AI 百大成就（BenchCouncil）","en":"AI Top 100 Achievements (BenchCouncil)"},"eventId":"ai100-2017-cyclegan","eventTitle":{"zh":"CycleGAN","en":"CycleGAN"},"variant":"bench-council-ai100","variantFile":"archive/events/ai100-2017-cyclegan/variants/bench-council-ai100.json","visual":"configuredPaper","demoImage":"resources/images/bench-council-ai100/explainers/2017-cyclegan_cycle-consistency.svg","description":{"zh":"CycleGAN 面向没有一一配对样本的图像域转换，例如只有一组马和另一组斑马照片。两个生成器分别学习 A→B 和 B→A，两个判别器要求转换结果看起来属于目标域；循环一致性损失则要求图像转换过去再返回后能够重建原始内容。 这使风格、季节和外观转换不再依赖昂贵的配对数据，并成为非配对图像翻译的代表框架。循环约束不能唯一确定正确映射，模型可能改变不应变化的语义或隐藏信息；因此它适合具有大致内容对应关系的域，而不是保证真实因果转换。","en":"CycleGAN addressed image-domain translation without one-to-one paired examples, such as separate collections of horse and zebra photographs. Two generators learn A→B and B→A mappings, while two discriminators require translated images to resemble the target domains. A cycle-consistency loss then requires an image translated to the other domain and back again to reconstruct its original content. This made style, season, and appearance transfer possible without expensive paired data and became a representative framework for unpaired image translation. Cycle consistency does not uniquely determine the correct mapping, and a model may alter semantics that should remain fixed or hide information in its outputs. It is therefore useful when domains share approximate content, not a guarantee of truthful causal transformation."},"method":{"zh":"循环一致图像转换","en":"Cycle-consistent image translation"},"artifact":{"zh":"非配对图像到图像转换系统","en":"Unpaired image-to-image translation system"}}],"svgText":["CycleGAN","domain A","input","A to B to A","mechanism","cycle loss","result","Original local SVG redraw; source figures are not copied."],"svgBytes":2331,"hasViewBox":true,"hasTitle":true,"hasDesc":true,"hasScript":false,"sourceTraceable":true},{"path":"resources/images/bench-council-ai100/explainers/2017-gat_attention-neighbors.svg","exists":true,"assetIds":["asset-2017-gat-attention-neighbors"],"roles":["architecture-explainer"],"captions":{"zh":["GAT 解释图"],"en":["GAT explainer"]},"subcaptions":{"zh":["关于该成就流程的本地原创解释图。"],"en":["Original local explainer for the achievement flow."]},"rightsStatuses":["documented-in-legacy"],"sourceIds":["source-graph-attention-networks"],"sources":[{"id":"source-graph-attention-networks","type":"paper","reliability":"primary","title":{"zh":"《图注意力网络》","en":"Graph Attention Networks"},"url":"https://arxiv.org/abs/1710.10903"}],"variantSourceIds":["source-graph-attention-networks","source-iclr-openreview-record","source-original-gat-repository"],"variantSources":[{"id":"source-graph-attention-networks","type":"paper","reliability":"primary","title":{"zh":"《图注意力网络》","en":"Graph Attention Networks"},"url":"https://arxiv.org/abs/1710.10903"},{"id":"source-iclr-openreview-record","type":"paper-page","reliability":"secondary","title":{"zh":"ICLR OpenReview 记录","en":"ICLR OpenReview record"},"url":"https://openreview.net/forum?id=rJXMpikCZ"},{"id":"source-original-gat-repository","type":"code","reliability":"secondary","title":{"zh":"原始 GAT 代码仓库","en":"Original GAT repository"},"url":"https://github.com/PetarV-/GAT"}],"usages":[{"storylineId":"bench-council-ai100","storylineTitle":{"zh":"AI 百大成就（BenchCouncil）","en":"AI Top 100 Achievements (BenchCouncil)"},"eventId":"ai100-2017-gat","eventTitle":{"zh":"GAT","en":"GAT"},"variant":"bench-council-ai100","variantFile":"archive/events/ai100-2017-gat/variants/bench-council-ai100.json","visual":"configuredPaper","demoImage":"resources/images/bench-council-ai100/explainers/2017-gat_attention-neighbors.svg","description":{"zh":"图注意力网络在 2017 年用学习得到的注意力权重替代固定邻居聚合。对每个节点，模型比较其变换后表示与各邻居表示，计算归一化系数，再按不同权重汇总邻居信息；多头注意力可以并行学习多种关系模式并稳定训练。 GAT 不需要预先求图拉普拉斯特征分解，也能让不同邻居对当前节点产生不同影响，适合半监督节点分类和可变图结构。注意力权重不自动等于因果解释，密集邻域还会增加计算成本；但它把 Transformer 式的选择性聚合带入图神经网络。","en":"Graph Attention Networks replaced fixed neighborhood aggregation with learned attention weights in 2017. For each node, the model compares its transformed representation with those of its neighbors, computes normalized coefficients, and combines neighbor information with different weights. Multi-head attention learns several relation patterns in parallel and can stabilize training. GAT requires no precomputed graph-Laplacian eigendecomposition and lets different neighbors influence a node unequally, making it useful for semi-supervised node classification and varying graph structures. Attention weights are not automatically causal explanations, and dense neighborhoods increase computation. The method nevertheless brought Transformer-like selective aggregation into graph neural networks."},"method":{"zh":"注意力加权图聚合","en":"Attention-weighted graph aggregation"},"artifact":{"zh":"图注意力网络","en":"Graph Attention Network"}}],"svgText":["GAT","neighbors","input","attention weights","mechanism","updated node","result","Original local SVG redraw; source figures are not copied."],"svgBytes":2334,"hasViewBox":true,"hasTitle":true,"hasDesc":true,"

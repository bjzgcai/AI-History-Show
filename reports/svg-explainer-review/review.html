iki/File:1954_Walter_Pitts_and_a_blackboard.jpg"}],"usages":[{"storylineId":"bench-council-ai100","storylineTitle":{"zh":"AI 百大成就（BenchCouncil）","en":"AI Top 100 Achievements (BenchCouncil)"},"eventId":"ai100-1943-mcculloch-pitts-neuron","eventTitle":{"zh":"麦卡洛克-皮茨神经元","en":"McCulloch-Pitts Neuron"},"variant":"bench-council-ai100","variantFile":"archive/events/ai100-1943-mcculloch-pitts-neuron/variants/bench-council-ai100.json","visual":"perceptron","demoImage":"resources/images/bench-council-ai100/explainers/1943-mcculloch-pitts-neuron_threshold-logic.svg","description":{"zh":"麦卡洛克和皮茨在 1943 年把神经元理想化为二值阈值单元：它接收兴奋或抑制输入，当满足规定条件时在下一时刻激活。通过连接多个单元，网络可以实现 AND、OR、NOT 等逻辑运算，并用反馈回路表示随时间持续的状态。 这个模型不是对真实神经元的完整生物描述，也没有学习权重的机制，但它首次以严格形式把神经活动、命题逻辑和可计算过程联系起来。其影响在于证明由简单单元构成的网络能够执行复杂逻辑，为自动机理论、认知模型和后来的人工神经网络提供共同概念起点。","en":"Warren McCulloch and Walter Pitts idealized a neuron in 1943 as a binary threshold unit. It receives excitatory or inhibitory inputs and becomes active at the next time step when specified conditions are met. By connecting multiple units, a network can implement logical operations such as AND, OR, and NOT, while feedback loops represent states that persist through time. The model was neither a complete biological account of real neurons nor a learning system with adjustable weights. Its importance was formally connecting neural activity, propositional logic, and computable processes for the first time. It showed how networks of simple units could carry out complex logical operations and provided a shared conceptual starting point for automata theory, cognitive models, and later artificial neural networks."},"method":{"zh":"二值阈值逻辑","en":"Binary threshold logic"},"artifact":{"zh":"形式化神经元模型","en":"Formal neuron model"}}],"svgText":["McCulloch-Pitts threshold logic","x1","x2","x3","sum","threshold?","0 / 1","Binary inputs become a logical proposition","implemented by a neuron-like threshold unit."],"svgBytes":1703,"hasViewBox":true,"hasTitle":false,"hasDesc":false,"hasScript":false,"sourceTraceable":true},{"path":"resources/images/bench-council-ai100/explainers/1951-snarc_maze-reinforcement.svg","exists":true,"assetIds":["asset-1951-snarc-maze-reinforcement"],"roles":["architecture-explainer"],"captions":{"zh":["迷宫强化循环"],"en":["Maze reinforcement loop"]},"subcaptions":{"zh":["关于 SNARC 式奖励学习的本地原创解释图。"],"en":["Original local explainer of SNARC-style reward learning."]},"rightsStatuses":["documented-in-legacy"],"sourceIds":["source-snarc-history-overview"],"sources":[{"id":"source-snarc-history-overview","type":"article","reliability":"reference-only","title":{"zh":"SNARC 历史概览","en":"SNARC history overview"},"url":"https://history-computer.com/snarc/"}],"variantSourceIds":["source-history-of-ai-snarc-article","source-history-of-information-snarc-entry","source-mit-minsky-history","source-snarc-history-overview","source-stochastic-neural-analog-reinforcement-calculator-overview"],"variantSources":[{"id":"source-mit-minsky-history","type":"article","reliability":"secondary","title":{"zh":"麻省理工学院：马文·明斯基与早期神经网络研究","en":"MIT: Marvin Minsky and Early Neural-Network Research"},"url":"https://news.mit.edu/2016/marvin-minsky-obituary-0125"},{"id":"source-snarc-history-overview","type":"article","reliability":"reference-only","title":{"zh":"SNARC 历史概览","en":"SNARC history overview"},"url":"https://history-computer.com/snarc/"},{"id":"source-history-of-ai-snarc-article","type":"article","reliability":"reference-only","title":{"zh":"History of AI 的 SNARC 文章","en":"History of AI SNARC article"},"url":"https://historyof.ai/snarc/"},{"id":"source-stochastic-neural-analog-reinforcement-calculator-overview","type":"encyclopedia-entry","reliability":"reference-only","title":{"zh":"随机神经模拟强化计算机概览","en":"Stochastic Neural Analog Reinforcement Calculator overview"},"url":"https://en.wikipedia.org/wiki/Stochastic_Neural_Analog_Reinforcement_Calculator"},{"id":"source-history-of-information-snarc-entry","type":"article","reliability":"reference-only","title":{"zh":"History of Information 的 SNARC 条目","en":"History of Information SNARC entry"},"url":"https://www.historyofinformation.com/detail.php?id=3884"}],"usages":[{"storylineId":"bench-council-ai100","storylineTitle":{"zh":"AI 百大成就（BenchCouncil）","en":"AI Top 100 Achievements (BenchCouncil)"},"eventId":"ai100-1951-snarc","eventTitle":{"zh":"SNARC","en":"SNARC"},"variant":"bench-council-ai100","variantFile":"archive/events/ai100-1951-snarc/variants/bench-council-ai100.json","visual":"snarc","demoImage":"resources/images/bench-council-ai100/explainers/1951-snarc_maze-reinforcement.svg","description":{"zh":"马文·明斯基和迪恩·埃德蒙兹在 1951 年建造 SNARC，即随机神经模拟强化计算机。机器用真空管、电机和模拟连接构成多个神经元式单元，模拟一只虚拟老鼠在迷宫中选择路径；当某条路径获得“奖励”时，相关连接的通过概率会被增强。 SNARC 规模很小，也不是现代数字神经网络，但它把随机决策、可变连接和强化信号组合成可运行硬件，展示行为能够通过经验逐渐改变。它是早期神经模拟与强化学习史上的重要实物案例，也反映了 AI 尚未定型时模拟电路、心理学和学习理论之间的紧密联系。","en":"Marvin Minsky and Dean Edmonds built SNARC, the Stochastic Neural Analog Reinforcement Calculator, in 1951. Using vacuum tubes, motors, and analog connections, the machine assembled neuron-like units that simulated a virtual rat choosing paths through a maze. When a path received a “reward,” the probability of transmission through associated connections increased. SNARC was small and unlike a modern digital neural network, but it combined stochastic choice, modifiable connections, and reinforcement signals in working hardware, demonstrating that behavior could change through experience. It remains an important physical example in the early history of neural simulation and reinforcement learning and reflects the close interaction among analog electronics, psychology, and learning theory before AI had settled into distinct schools."},"method":{"zh":"模拟强化学习机器","en":"Analog reinforcement machine"},"artifact":{"zh":"早期神经学习硬件","en":"Early neural learning hardware"}}],"svgText":["SNARC reward-driven maze learning","trial path","reward pulse","Repeated reward changes the path preference through the maze."],"svgBytes":1692,"hasViewBox":true,"hasTitle":false,"hasDesc":false,"hasScript":false,"sourceTraceable":true},{"path":"resources/images/bench-council-ai100/explainers/1951-strachey-draughts_board-search.svg","exists":true,"assetIds":["asset-1951-strachey-draughts-board-search"],"roles":["architecture-explainer"],"captions":{"zh":["跳棋棋盘搜索"],"en":["Draughts board search"]},"subcaptions":{"zh":["依据 逻辑或非数学程序 制作的本地解释图。"],"en":["Original local explainer based on Logical or non-mathematical programmes."]},"rightsStatuses":["documented-in-legacy"],"sourceIds":["source-logical-or-non-mathematical-programmes"],"sources":[{"id":"source-logical-or-non-mathematical-programmes","type":"paper","reliability":"primary","title":{"zh":"《逻辑或非数学程序》","en":"Logical or non-mathematical programmes"},"url":"https://dl.acm.org/doi/10.1145/1455270.1455277"}],"variantSourceIds":["source-checkers-board-photo","source-computer-pioneers-christopher-strachey","source-logical-or-non-mathematical-programmes","source-strachey-draughts-program-screenshot"],"variantSources":[{"id":"source-logical-or-non-mathematical-programmes","type":"paper","reliability":"primary","title":{"zh":"《逻辑或非数学程序》","en":"Logical or non-mathematical programmes"},"url":"https://dl.acm.org/doi/10.1145/1455270.1455277"},{"id":"source-computer-pioneers-christopher-strachey","type":"profile","reliability":"reference-only","title":{"zh":"Computer Pioneers - 克里斯托弗·斯特雷奇","en":"Computer Pioneers - Christopher Strachey"},"url":"https://history.computer.org/pioneers/strachey.html"},{"id":"source-strachey-draughts-program-screenshot","type":"image-source","reliability":"reference-only","title":{"zh":"斯特雷奇 跳棋程序截图","en":"Strachey draughts program screenshot"},"url":"https://commons.wikimedia.org/wiki/File:Christopher_Strachey%27s_Draughts_Program.png"},{"id":"source-checkers-board-photo","type":"image-source","reliability":"reference-only","title":{"zh":"跳棋棋盘照片","en":"Checkers board photo"},"url":"https://commons.wikimedia.org/wiki/File:CheckersStandard.jpg"}],"usages":[{"storylineId":"bench-council-ai100","storylineTitle":{"zh":"AI 百大成就（BenchCouncil）","en":"AI Top 100 Achievements (BenchCouncil)"},"eventId":"1951-strachey-draughts","eventTitle":{"zh":"克里斯托弗·斯特雷奇 的跳棋程序","en":"Christopher Strachey's Draughts"},"variant":"bench-council-ai100","variantFile":"archive/events/1951-strachey-draughts/variants/bench-council-ai100.json","visual":"draughts","demoImage":"resources/images/bench-council-ai100/explainers/1951-strachey-draughts_program-flow.svg","description":{"zh":"克里斯托弗·斯特雷奇在 1951 年开始为 Pilot ACE 编写跳棋程序，随后把完整版本移植到曼彻斯特 Ferranti Mark I，并在 1952 年运行。程序需要编码棋盘、合法走法和吃子规则，搜索若干步后的局面，再用手工评估函数比较候选路线。 在计算机仍主要被理解为数值计算设备的时期，这项工作展示了存储程序机器也能处理符号状态、选择和策略。受限内存与速度使搜索深度很浅，程序也远非顶尖棋手，但它把博弈确立为早期 AI 的实验场，并推动剪枝、评估函数和人机交互程序的发展。","en":"Christopher Strachey began writing a draughts program for the Pilot ACE in 1951, then transferred a complete version to the Manchester Ferranti Mark I, where it ran in 1952. The program encoded the board, legal moves, and captures, searched several plies of future positions, and compared candidate lines with a hand-designed evaluation function. At a time when computers were understood mainly as numerical calculators, the work showed that a stored-program machine could manipulate symbolic states, choices, and strategy. Severe memory and speed limits kept the search shallow, and the program was far from elite play, but it established games as an early AI testbed and advanced ideas about pruning, evaluation functions, and interactive programs."},"method":{"zh":"棋盘状态搜索与评估","en":"Board-state search and evaluation"},"artifact":{"zh":"Pilot ACE / Ferranti Mark 1 跳棋程序","en":"Pilot ACE / Ferranti Mark 1 draughts program"}},{"storylineId":"gaming-ai","storylineTitle":{"zh":"AI 在棋牌与博弈论的演进","en":"AI in Board & Tabletop Games"},"eventId":"1951-strachey-draughts","eventTitle":{"zh":"克里斯托弗·斯特雷奇 的跳棋程序","en":"Christopher Strachey's Draughts"},"variant":"gaming-ai","variantFile":"archive/events/1951-strachey-draughts/variants/gaming-ai.json","visual":"draughts","demoImage":"resources/images/bench-council-ai100/explainers/1951-strachey-draughts_program-flow.svg","description":{"zh":"克里斯托弗·斯特雷奇 的跳棋程序证明存储程序计算机不只会做数值计算。它表示棋盘局面、生成走法、评估备选方案，并在早期英国计算机上尝试策略性对弈，使游戏成为 AI 最早的公开试验场之一。","en":"Christopher Strachey's draughts program showed that stored-program computers could do more than numerical calculation. It represented board positions, generated moves, evaluated alternatives, and attempted strategic play on early British computers, making game playing one of AI's first public testbeds."},"method":{"zh":"棋盘状态搜索与评估","en":"Board-state search and evaluation"},"artifact":{"zh":"Pilot ACE / Ferranti Mark 1 跳棋程序","en":"Pilot ACE / Ferranti Mark 1 draughts program"}}],"svgText":["Draughts board search","跳棋棋盘搜索","board","legal moves","score","Christopher Strachey's Draughts · local original explainer"],"svgBytes":1706,"hasViewBox":true,"hasTitle":true,"hasDesc":true,"hasScript":false,"sourceTraceable":true},{"path":"resources/images/bench-council-ai100/explainers/1951-strachey-draughts_program-flow.svg","exists":true,"assetIds":["asset-1951-strachey-draughts-program-flow"],"roles":["architecture-explainer"],"captions":{"zh":["早期游戏程序流程"],"en":["Early game-program flow"]},"subcaptions":{"zh":["依据 逻辑或非数学程序 制作的本地解释图。"],"en":["Original local explainer based on Logical or non-mathematical programmes."]},"rightsStatuses":["documented-in-legacy"],"sourceIds":["source-logical-or-non-mathematical-programmes"],"sources":[{"id":"source-logical-or-non-mathematical-programmes","type":"paper","reliability":"primary","title":{"zh":"《逻辑或非数学程序》","en":"Logical or non-mathematical programmes"},"url":"https://dl.acm.org/doi/10.1145/1455270.1455277"}],"variantSourceIds":["source-checkers-board-photo","source-computer-pioneers-christopher-strachey","source-logical-or-non-mathematical-programmes","source-strachey-draughts-program-screenshot"],"variantSources":[{"id":"source-logical-or-non-mathematical-programmes","type":"paper","reliability eorist，让计算机尝试证明《数学原理》中的命题。系统把公理、定理和变换规则表示为符号结构，再从目标出发搜索可能的证明路径，而不是只进行数值计算。 它的关键突破是使用启发式规则控制组合爆炸：优先探索更可能成功的变换，并放弃缺乏希望的分支。Logic Theorist 因而成为符号 AI、自动定理证明和认知建模的早期范例，展示了“推理”可以被组织成符号表示、搜索和选择组成的可执行过程。","en":"Between 1955 and 1956, Allen Newell, Herbert Simon, and J. C. Shaw developed Logic Theorist to prove propositions from Principia Mathematica . The system represented axioms, theorems, and transformation rules as symbolic structures, then searched backward from a goal for possible proof paths instead of performing only numerical calculation. Its crucial step was using heuristics to manage combinatorial growth: explore transformations that appeared more promising and abandon unproductive branches. Logic Theorist became an early model for symbolic AI, automated theorem proving, and cognitive simulation, showing that “reasoning” could be implemented as an executable process combining representation, search, and selective choice."},"method":{"zh":"启发式证明搜索","en":"Heuristic proof search"},"artifact":{"zh":"逻辑理论机器","en":"Logic Theory Machine"}}],"svgText":["LOGIC THEORIST","A theorem prover that searched for symbolic proof chains.","Goal theorem","Principia statement","Heuristic","search","try promising moves first","Proof chain","axioms → theorem","Substitution","Detachment","Matching","The system made reasoning visible as search through symbolic transformations."],"svgBytes":3167,"hasViewBox":true,"hasTitle":true,"hasDesc":true,"hasScript":false,"sourceTraceable":true},{"path":"resources/images/bench-council-ai100/explainers/1957-kmeans_centroid-loop.svg","exists":true,"assetIds":["asset-1957-kmeans-centroid-loop"],"roles":["architecture-explainer"],"captions":{"zh":["质心分配循环"],"en":["Centroid assignment loop"]},"subcaptions":{"zh":["依据 PCM 中的最小二乘量化 制作的本地解释图。"],"en":["Original local explainer based on Least squares quantization in PCM."]},"rightsStatuses":["documented-in-legacy"],"sourceIds":["source-least-squares-quantization-in-pcm"],"sources":[{"id":"source-least-squares-quantization-in-pcm","type":"paper","reliability":"primary","title":{"zh":"《PCM 中的最小二乘量化》","en":"Least squares quantization in PCM"},"url":"https://doi.org/10.1109/TIT.1982.1056489"}],"variantSourceIds":["source-bell-labs-k-means-history-note","source-iris-flowers-k-means-clustering-graphic","source-least-squares-quantization-in-pcm","source-scikit-learn-kmeans-documentation"],"variantSources":[{"id":"source-least-squares-quantization-in-pcm","type":"paper","reliability":"primary","title":{"zh":"《PCM 中的最小二乘量化》","en":"Least squares quantization in PCM"},"url":"https://doi.org/10.1109/TIT.1982.1056489"},{"id":"source-bell-labs-k-means-history-note","type":"article","reliability":"secondary","title":{"zh":"贝尔实验室 k-means 历史资料","en":"Bell Labs k-means history note"},"url":"https://www.nokia.com/bell-labs/about/dennis-m-ritchie/k-means-clustering/"},{"id":"source-scikit-learn-kmeans-documentation","type":"documentation","reliability":"reference-only","title":{"zh":"scikit-learn KMeans 文档","en":"scikit-learn KMeans documentation"},"url":"https://scikit-learn.org/stable/modules/clustering.html#k-means"},{"id":"source-iris-flowers-k-means-clustering-graphic","type":"image-source","reliability":"reference-only","title":{"zh":"鸢尾花 k-means 聚类图","en":"Iris Flowers k-means clustering graphic"},"url":"https://commons.wikimedia.org/wiki/File:Iris_Flowers_Clustering_kMeans.svg"}],"usages":[{"storylineId":"bench-council-ai100","storylineTitle":{"zh":"AI 百大成就（BenchCouncil）","en":"AI Top 100 Achievements (BenchCouncil)"},"eventId":"1957-kmeans","eventTitle":{"zh":"K-means 聚类","en":"K-means"},"variant":"bench-council-ai100","variantFile":"archive/events/1957-kmeans/variants/bench-council-ai100.json","visual":"kmeans","demoImage":"resources/images/bench-council-ai100/explainers/1957-kmeans_cluster-update.svg","description":{"zh":"斯图尔特·劳埃德于 1957 年在贝尔实验室形成这套最小二乘量化方法，相关论文直到 1982 年才正式发表。给定簇数 k，算法在两个步骤间交替：把每个样本分配给最近中心，再把中心移动到所属样本的均值，持续降低簇内平方距离。 K-means 计算简单、结果直观，成为无监督学习、数据压缩和初始化中的默认工具之一。但它只能保证收敛到局部最优，结果依赖初始中心，也更适合尺度相近、近似球形的簇；异常值、特征缩放和预设 k 值都会影响解释。它的价值在于提供一个清晰可见的聚类优化循环。","en":"Stuart Lloyd developed this least-squares quantization method at Bell Labs in 1957, although the associated paper was not formally published until 1982. Given a number of clusters k, the algorithm alternates between assigning each sample to its nearest center and moving each center to the mean of its assigned samples, repeatedly reducing within-cluster squared distance. K-means is computationally simple and easy to interpret, making it a default tool for unsupervised learning, data compression, and initialization. It guarantees only convergence to a local optimum, depends on the starting centers, and works best for clusters that are similarly scaled and roughly spherical. Outliers, feature scaling, and the predetermined value of k all affect the result. Its lasting strength is a transparent, visible optimization loop for clustering."},"method":{"zh":"交替质心优化","en":"Alternating centroid optimization"},"artifact":{"zh":"劳埃德 / k-means 聚类循环","en":"Lloyd / k-means clustering loop"}}],"svgText":["Centroid update loop","质心更新循环","points","nearest center","new mean","K-means · local original explainer"],"svgBytes":1687,"hasViewBox":true,"hasTitle":true,"hasDesc":true,"hasScript":false,"sourceTraceable":true},{"path":"resources/images/bench-council-ai100/explainers/1957-kmeans_cluster-update.svg","exists":true,"assetIds":["asset-1957-kmeans-cluster-update"],"roles":["architecture-explainer"],"captions":{"zh":["簇更新步骤"],"en":["Cluster update step"]},"subcaptions":{"zh":["依据 scikit-learn KMeans documentation 制作的本地解释图。"],"en":["Original local explainer based on scikit-learn KMeans documentation."]},"rightsStatuses":["documented-in-legacy"],"sourceIds":["source-least-squares-quantization-in-pcm"],"sources":[{"id":"source-least-squares-quantization-in-pcm","type":"paper","reliability":"primary","title":{"zh":"《PCM 中的最小二乘量化》","en":"Least squares quantization in PCM"},"url":"https://doi.org/10.1109/T 957, although the associated paper was not formally published until 1982. Given a number of clusters k, the algorithm alternates between assigning each sample to its nearest center and moving each center to the mean of its assigned samples, repeatedly reducing within-cluster squared distance. K-means is computationally simple and easy to interpret, making it a default tool for unsupervised learning, data compression, and initialization. It guarantees only convergence to a local optimum, depends on the starting centers, and works best for clusters that are similarly scaled and roughly spherical. Outliers, feature scaling, and the predetermined value of k all affect the result. Its lasting strength is a transparent, visible optimization loop for clustering."},"method":{"zh":"交替质心优化","en":"Alternating centroid optimization"},"artifact":{"zh":"劳埃德 / k-means 聚类循环","en":"Lloyd / k-means clustering loop"}}],"svgText":["Cluster reassignment","簇重新分配","old centers","assign","stable clusters","K-means · local original explainer"],"svgBytes":1685,"hasViewBox":true,"hasTitle":true,"hasDesc":true,"hasScript":false,"sourceTraceable":true},{"path":"resources/images/bench-council-ai100/explainers/1958-lisp_eval-flow.svg","exists":true,"assetIds":["asset-1958-lisp-eval-flow"],"roles":["architecture-explainer"],"captions":{"zh":["S 表达式求值流程"],"en":["S-expression evaluator"]},"subcaptions":{"zh":["根据 麦卡锡 的 LISP 论文与 LISP I 手册中的基础原语制作的解释图。"],"en":["Original explainer derived from McCarthy's LISP paper and LISP I manual primitives."]},"rightsStatuses":["local-redraw"],"sourceIds":["source-recursive-functions-of-symbolic-expressions"],"sources":[{"id":"source-recursive-functions-of-symbolic-expressions","type":"paper","reliability":"primary","title":{"zh":"《符号表达式的递归函数》","en":"Recursive Functions of Symbolic Expressions"},"url":"https://www-formal.stanford.edu/jmc/recursive.html"}],"variantSourceIds":["source-history-of-lisp","source-lisp-i-programmer-s-manual","source-recursive-functions-of-symbolic-expressions"],"variantSources":[{"id":"source-recursive-functions-of-symbolic-expressions","type":"paper","reliability":"primary","title":{"zh":"《符号表达式的递归函数》","en":"Recursive Functions of Symbolic Expressions"},"url":"https://www-formal.stanford.edu/jmc/recursive.html"},{"id":"source-lisp-i-programmer-s-manual","type":"documentation","reliability":"reference-only","title":{"zh":"LISP I 程序员手册","en":"LISP I Programmer's Manual"},"url":"https://www.softwarepreservation.org/projects/LISP/book/LISP%20I%20Programmers%20Manual.pdf/view"},{"id":"source-history-of-lisp","type":"article","reliability":"reference-only","title":{"zh":"Lisp 史","en":"History of Lisp"},"url":"https://www-formal.stanford.edu/jmc/history/lisp/lisp.html"}],"usages":[{"storylineId":"bench-council-ai100","storylineTitle":{"zh":"AI 百大成就（BenchCouncil）","en":"AI Top 100 Achievements (BenchCouncil)"},"eventId":"1958-lisp","eventTitle":{"zh":"LISP","en":"LISP"},"variant":"bench-council-ai100","variantFile":"archive/events/1958-lisp/variants/bench-council-ai100.json","visual":"eval","demoImage":"","description":{"zh":"约翰·麦卡锡在 1958 年开始设计 LISP，并在 1960 年论文中用 S 表达式和递归函数系统说明这种语言。列表既能表示程序操作的数据，也能表示程序本身；CONS、CAR、CDR、QUOTE、COND 与 EVAL 等少量原语，就能组合出复杂的符号处理过程。 这种“代码与数据采用同一种结构”的设计，使研究者可以灵活构造定理证明、规划、自然语言和知识表示程序，也推动了交互式开发、垃圾回收等编程实践。LISP 后来形成众多方言；即使 AI 工程转向其他语言，它仍深刻影响函数式编程和可编程符号系统。","en":"John McCarthy began designing LISP in 1958 and presented its system of S-expressions and recursive functions in a 1960 paper. Lists could represent both the data manipulated by a program and the program itself. A small set of primitives, including CONS, CAR, CDR, QUOTE, COND, and EVAL, could be composed into complex symbolic procedures. This shared structure for code and data made it unusually flexible for theorem proving, planning, natural language, and knowledge-representation experiments. LISP also helped establish practices such as interactive development and automatic memory management. Although AI engineering later diversified into many languages, LISP's influence persists in functional programming and programmable symbolic systems."},"method":{"zh":"符号递归","en":"Symbolic recursion"},"artifact":{"zh":"S 表达式求值器","en":"S-expression evaluator"}}],"svgText":["LISP: code and data share one shape","S-expressions become the interface for symbolic recursion.","INPUT","(car '(AI LISP))","a list expression","EVAL","recursive dispatcher","OUTPUT","AI","symbol selected","QUOTE","CAR","CDR","CONS","COND","Core idea","The evaluator treats programs as list data, so symbolic expressions","can transform other symbolic expressions."],"svgBytes":3678,"hasViewBox":true,"hasTitle":true,"hasDesc":true,"hasScript":false,"sourceTraceable":true},{"path":"resources/images/bench-council-ai100/explainers/1958-rosenblatt-perceptron_sensor-grid.svg","exists":true,"assetIds":["asset-1958-rosenblatt-perceptron-sensor-grid"],"roles":["architecture-explainer"],"captions":{"zh":["传感器网格到神经元"],"en":["Sensor grid to neuron"]},"subcaptions":{"zh":["罗森布拉特 感知机 的本地重绘图，依据页面列出的来源材料制作。"],"en":["Local redraw for Rosenblatt Perceptron, based on the listed source material."]},"rightsStatuses":["documented-in-legacy"],"sourceIds":["source-the-perceptron-a-probabilistic-model-for-information-storage-and-organization-in"],"sources":[{"id":"source-the-perceptron-a-probabilistic-model-for-information-storage-and-organization-in","type":"paper","reliability":"primary","title":{"zh":"《感知机：大脑中信息存储与组织的概率模型》","en":"The Perceptron: A Probabilistic Model for Information Storage and Organization in the Brain"},"url":"https://doi.org/10.1037/h0042519"}],"variantSourceIds":["source-cornell-chronicle-perceptron-retrospective","source-smithsonian-mark-i-perceptron-object-record","source-the-perceptron-a-probabilistic-model-for-information-storage-and-organization-in"],"variantSources":[{"id":"source-the-perceptron-a-probabilistic-model-for-information-storage-and-organization-in","type":"paper","reliability":"primary","title":{"zh":"《感知机：大脑中信息存储与组织的概率模型》","en":"The Perceptron: A Probabilistic Model for Information Storage and Organization in the Brain"},"url":"https://doi.org/10.1037/h0042519"},{"id":"source-cornell-chronicle-perceptron-retrospective","type":"news","reliability":"reference-only","title":{"zh":"康奈尔大学 Chronicle perceptron retrospective","en":"Cornell Chronicle perceptron retrospective"},"url":"https://news.cornell.edu/stories/2019/09/professors-perceptron-paved-way-ai-60-years-too-soon"},{"id":"source-smithsonian-mark-i-perceptron-object-record","type":"archive","reliability":"reference-only","title":{"zh":"Smithsonian Mark I Perceptron object record","en":"Smithsonian Mark I Perceptron object record"},"url":"https://www.si.edu/object/electronic-neural-network-mark-i-perceptron%3Anmah_334414"}],"usages":[{"storylineId":"bench-council-ai100","storylineTitle":{"zh":"AI 百大成就（BenchCouncil）","en":"AI Top 100 Achievements (BenchCouncil)"},"eventId":"1957-perceptron","eventTitle":{"zh":"感知机与连接主义","en":"The Perceptron and Connectionism"},"variant":"bench-council-ai100","variantFile":"archive/events/1957-perceptron/variants/bench-council-ai100.json","visual":"perceptron","demoImage":"","description":{"zh":"弗兰克·罗森布拉特在 1957 年技术报告和 1958 年论文中提出感知机，把一组输入通过可调权重连接到决策单元。训练时，模型根据分类错误增减权重，使决策边界逐步移动；康奈尔航空实验室随后制造 Mark I Perceptron，把部分连接实现为硬件并用于视觉模式实验。 感知机的重要性在于展示机器可以从标注样本中调整内部参数，而不必由程序员写出全部识别规则。单层感知机只能学习线性可分边界，无法解决 XOR 等问题，这些限制后来引发重要争论；但“加权求和、误差驱动更新和分布式单元”的基本模式成为神经网络历史的关键起点。","en":"Frank Rosenblatt introduced the perceptron in a 1957 technical report and a 1958 paper, connecting a set of inputs through adjustable weights to a decision unit. During training, the model increases or decreases weights in response to classification errors so the decision boundary moves toward a solution. Cornell Aeronautical Laboratory later built the Mark I Perceptron, implementing parts of the connections in hardware for visual-pattern experiments. The perceptron demonstrated that a machine could adjust internal parameters from labeled examples instead of requiring a programmer to write every recognition rule. A single-layer perceptron can learn only linearly separable boundaries and cannot solve problems such as XOR, limitations that later shaped major debates. Its pattern of weighted sums, error-driven updates, and distributed units nevertheless became a crucial starting point for neural-network research."},"method":{"zh":"线性阈值学习机","en":"Linear threshold learning machine"},"artifact":{"zh":"Mark I 感知机谱系","en":"Mark I Perceptron lineage"}},{"storylineId":"deep-learning","storylineTitle":{"zh":"深度学习分支","en":"Deep Learning"},"eventId":"1957-perceptron","eventTitle":{"zh":"感知机与连接主义","en":"The Perceptron and Connectionism"},"variant":"deep-learning","variantFile":"archive/events/1957-perceptron/variants/deep-learning.json","visual":"perceptron","demoImage":"","description":{"zh":"1957 年，弗兰克·罗森布拉特在康奈尔航空实验室开展感知机研究，并在随后发表的论文中把它描述为一种受神经系统启发的信息存储与组织模型。感知机根据训练样本调整连接权重，使机器不必依赖人工编写的完整规则，也能学习把输入模式分到不同类别。 Mark I 感知机随后把这一思想做成带有感光输入和可调连接的实验装置。它的能力仍受单层线性分类边界限制，却首次以醒目的理论和硬件演示表明“机器可以从样本中学习”，由此成为连接主义、模式识别和后来神经网络研究的重要起点。","en":"Beginning in 1957, Frank Rosenblatt developed the perceptron at the Cornell Aeronautical Laboratory and later described it as a brain-inspired model for information storage and organization. By adjusting connection weights from training examples, a perceptron could learn to assign input patterns to categories without requiring a complete set of hand-written decision rules. The Mark I Perceptron soon turned the idea into an experimental machine with a light-sensing input and adjustable connections. Its single-layer decision boundary was limited to linearly separable problems, but the project gave a striking theoretical and hardware demonstration that a machine could learn from examples. It became a foundational reference for connectionism, pattern recognition, and later neural-network research."},"method":{"zh":"线性阈值学习机","en":"Linear threshold learning machine"},"artifact":{"zh":"Mark I 感知机谱系","en":"Mark I Perceptron lineage"}}],"svgText":["Sensor grid to neuron","threshold","local redrawn explainer"],"svgBytes":2566,"hasViewBox":true,"hasTitle":false,"hasDesc":false,"hasScript":false,"sourceTraceable":true},{"path":"resources/images/bench-council-ai100/explainers/1958-rosenblatt-perceptron_threshold.svg","exists":true,"assetIds":["asset-1958-rosenblatt-perceptron-threshold"],"roles":["architecture-explainer"],"captions":{"zh":["阈值学习边界"],"en":["Threshold learning line"]},"subcaptions":{"zh":["罗森布拉特 感知机 的本地重绘图，依据页面列出的来源材料制作。"],"en":["Local redraw for Rosenblatt Perceptron, based on the listed source material."]},"rightsStatuses":["documented-in-legacy"],"sourceIds":["source-the-perceptron-a-probabilistic-model-for-information-storage-and-organization-in"],"sources":[{"id":"source-the-perceptron-a-probabilistic-model-for-information-storage-and-organization-in","type":"paper","reliability":"primary","title":{"zh":"《感知机：大脑中信息存储与组织的概率模型》","en":"The Perceptron: A Probabilistic Model for Information Storage and Organization in the Brain"},"url":"https://doi.org/10.1037/h0042519"}],"variantSourceIds":["source-cornell-chronicle-perceptron-retrospective","source-smithsonian-mark-i-perceptron-object-record","source-the-perceptron-a-probabilistic-model-for-information-storage-and-organization-in"],"variantSources":[{"id":"source-the-perceptron-a-probabilistic-model-for-information-storage-and-organization-in","type":"paper","reliability":"primary","title":{"zh":"《感知机：大脑中信息存储与组织的概率模型》","en":"The Perceptron: A Probabilistic Model for Information Storage and Organization in the Brain"},"url":"https://doi.org/10.1037/h0042519"},{"id":"source-cornell-chronicle-perceptron-retrospective","type":"news","reliability":"reference-only","title":{"zh":"康奈尔大学 Chronicle perceptron retrospective","en":"Cornell Chronicle perceptron retrospective"},"url":"https://news.cornell.edu/stories/2019/09/professors-perceptron-paved-way-ai-60-years-too-soon"},{"id":"source-smithsonian-mark-i- attern proof"]},"subcaptions":{"zh":["原创解释图，展示公式规范化、规则匹配、证明归约与分支闭合。"],"en":["Original explainer showing formula normalization, rule matching, proof reduction, and branch closure."]},"rightsStatuses":["local-redraw"],"sourceIds":["source-proving-theorems-by-pattern-recognition-i"],"sources":[{"id":"source-proving-theorems-by-pattern-recognition-i","type":"paper","reliability":"primary","title":{"zh":"《通过模式识别证明定理 I》","en":"Proving theorems by pattern recognition I"},"url":"https://cacm.acm.org/research/proving-theorems-by-pattern-recognition-i/"}],"variantSourceIds":["source-proving-theorems-by-pattern-recognition-i","source-proving-theorems-by-pattern-recognition-ii","source-rockefeller-university-digital-commons-wang-hao"],"variantSources":[{"id":"source-proving-theorems-by-pattern-recognition-i","type":"paper","reliability":"primary","title":{"zh":"《通过模式识别证明定理 I》","en":"Proving theorems by pattern recognition I"},"url":"https://cacm.acm.org/research/proving-theorems-by-pattern-recognition-i/"},{"id":"source-proving-theorems-by-pattern-recognition-ii","type":"paper-page","reliability":"reference-only","title":{"zh":"通过模式识别证明定理（二）","en":"Proving Theorems by Pattern Recognition - II"},"url":"https://www.nokia.com/bell-labs/publications-and-media/publications/proving-theorems-by-pattern-recognition-ii/"},{"id":"source-rockefeller-university-digital-commons-wang-hao","type":"image-source","reliability":"reference-only","title":{"zh":"Rockefeller University Digital Commons: 王浩, Hao","en":"Rockefeller University Digital Commons: Wang, Hao"},"url":"https://digitalcommons.rockefeller.edu/faculty-members/109/"}],"usages":[{"storylineId":"bench-council-ai100","storylineTitle":{"zh":"AI 百大成就（BenchCouncil）","en":"AI Top 100 Achievements (BenchCouncil)"},"eventId":"1958-wangs-algorithm","eventTitle":{"zh":"王氏算法","en":"Wang's Algorithm"},"variant":"bench-council-ai100","variantFile":"archive/events/1958-wangs-algorithm/variants/bench-council-ai100.json","visual":"transcript","demoImage":"","description":{"zh":"王浩在 1950 年代末研究如何让机器按照公式的逻辑形状自动构造证明，并在 1960、1961 年发表“通过模式识别证明定理”系列论文。算法把命题或谓词演算公式转换为规则可以识别的结构，再反复拆分、简化和检查分支是否满足闭合条件。 与任意枚举证明步骤相比，这种模式驱动的归约让大量操作成为确定性的结构变换，只在必要处保留搜索。王氏算法证明了形式逻辑可以高效转译为机器程序，是自动定理证明的重要早期成果，也为后来的证明过程、逻辑编程和 SAT 式推理提供了方法线索。","en":"In the late 1950s, Hao Wang investigated how a machine could construct proofs by following the logical form of formulas, publishing the two Proving Theorems by Pattern Recognition papers in 1960 and 1961. The procedures transformed propositional or predicate-calculus formulas into recognizable structures, then repeatedly split, simplified, and tested branches for closure. Compared with arbitrary enumeration of proof steps, this pattern-guided reduction made many operations deterministic structural transformations and reserved search for the remaining choices. Wang's work demonstrated that formal logic could be translated into effective machine procedures, becoming an early milestone in automated theorem proving and a methodological precursor to later proof systems, logic programming, and SAT-style reasoning."},"method":{"zh":"模式引导证明过程","en":"Pattern-guided proof procedure"},"artifact":{"zh":"王氏定理证明过程","en":"Wang theorem-proving procedure"}}],"svgText":["WANG'S ALGORITHM","Mechanical theorem proving by recognizing logical patterns.","Formula","A1, A2 |- B","Pattern rules","split connectives","move quantifiers","Closed branch","proof found","Normalize","Match","Reduce","Certify","The display turns proof search into repeated recognition of useful logical shapes."],"svgBytes":3268,"hasViewBox":true,"hasTitle":true,"hasDesc":true,"hasScript":false,"sourceTraceable":true},{"path":"resources/images/bench-council-ai100/explainers/1959-pandemonium_feature-votes.svg","exists":true,"assetIds":["asset-1959-pandemonium-feature-votes"],"roles":["architecture-explainer"],"captions":{"zh":["特征投票级联"],"en":["Feature-vote cascade"]},"subcaptions":{"zh":["依据 群魔殿：一种学习范式 制作的本地解释图。"],"en":["Original local explainer based on.svg","description":{"zh":"奥利弗·塞尔弗里奇在 1959 年用“群魔殿”描述一种分层模式识别系统。最底层的“图像魔鬼”接收输入，特征魔鬼寻找线条、角度等局部线索，认知魔鬼把这些线索组合成候选模式；最上层的决策者根据谁“喊得最响”选择识别结果。 这个拟人化隐喻强调复杂感知可以由许多简单、并行且相互竞争的单元产生，而不必依赖单一中央规则。原始系统仍较粗糙，但分层特征、分布式证据和竞争性决策的思想影响了后来的模式识别、黑板系统和集成方法，也预示了神经网络中的层级表示。","en":"Oliver Selfridge described Pandemonium in 1959 as a layered pattern-recognition system. “Image demons” receive the input, feature demons detect local evidence such as lines and angles, cognitive demons combine those features into candidate patterns, and a decision demon chooses the interpretation whose advocates “shout” most strongly. The anthropomorphic metaphor emphasized that complex perception could emerge from many simple, parallel, competing units rather than one central rule. The original implementation was limited, but its hierarchy of features, distributed evidence, and competitive decision-making influenced later pattern recognition, blackboard systems, and ensemble methods. It also anticipated the broader idea of layered representations in neural computation."},"method":{"zh":"分层特征检测与投票","en":"Layered feature detection and voting"},"artifact":{"zh":"Pandemonium 架构","en":"Pandemonium architecture"}}],"svgText":["Feature-vote ladder","特征投票阶梯","edges","strokes","pattern","Pandemonium · local original explainer"],"svgBytes":1680,"hasViewBox":true,"hasTitle":true,"hasDesc":true,"hasScript":false,"sourceTraceable":true},{"path":"resources/images/bench-council-ai100/explainers/1959-pandemonium_layered-recognition.svg","exists":true,"assetIds":["asset-1959-pandemonium-layered-recognition"],"roles":["architecture-explainer"],"captions":{"zh":["分层识别小程序"],"en":["Layered recognition demons"]},"subcaptions":{"zh":["依据 群魔殿：一种学习范式 制作的本地解释图。"],"en":["Original local explainer based on Pandemonium: A Paradigm for Learning."]},"rightsStatuses":["documented-in-legacy"],"sourceIds":["source-pandemonium-a-paradigm-for-learning"],"sources":[{"id":"source-pandemonium-a-paradigm-for-learning","type":"paper","reliability":"prima 中的层级表示。","en":"Oliver Selfridge described Pandemonium in 1959 as a layered pattern-recognition system. “Image demons” receive the input, feature demons detect local evidence such as lines and angles, cognitive demons combine those features into candidate patterns, and a decision demon chooses the interpretation whose advocates “shout” most strongly. The anthropomorphic metaphor emphasized that complex perception could emerge from many simple, parallel, competing units rather than one central rule. The original implementation was limited, but its hierarchy of features, distributed evidence, and competitive decision-making influenced later pattern recognition, blackboard systems, and ensemble methods. It also anticipated the broader idea of layered representations in neural computation."},"method":{"zh":"分层特征检测与投票","en":"Layered feature detection and voting"},"artifact":{"zh":"Pandemonium 架构","en":"Pandemonium architecture"}}],"svgText":["Layered recognition stack","分层识别栈","signal","detectors","winner","Pandemonium · local original explainer"],"svgBytes":1688,"hasViewBox":true,"hasTitle":true,"hasDesc":true,"hasScript":false,"sourceTraceable":true},{"path":"resources/images/bench-council-ai100/explainers/1960-davis-putnam-dpll_sat-search.svg","exists":true,"assetIds":["asset-1960-davis-putnam-dpll-sat-search"],"roles":["architecture-explainer"],"captions":{"zh":["Davis-Putnam 与 DPLL SAT 搜索"],"en":["Davis-Putnam and DPLL SAT search"]},"subcaptions":{"zh":["原创解释图，展示 CNF 子句、传播、分支、冲突剪枝与模型接受。"],"en":["Original explainer showing CNF clauses, propagation, branching, conflict pruning, and model acceptance."]},"rightsStatuses":["local-redraw"],"sourceIds":["source-a-computing-procedure-for-quantification-theory"],"sources":[{"id":"source-a-computing-procedure-for-quantification-theory","type":"paper","reliability":"primary","title":{"zh":"《量词理论的计算过程》","en":"A Computing Procedure for Quantification Theory"},"url":"https://dl.acm.org/doi/10.1145/321033.321034"}],"variantSourceIds":["source-a-computing-procedure-for-quantification-theory","source-a-machine-program-for-theorem-proving","source-wikimedia-commons-hilary-putnam"],"variantSources":[{"id":"source-a-computing-procedure-for-quantification-theory","type":"paper","reliability":"primary","title":{"zh":"《量词理论的计算过程》","en":"A Computing Procedure for Quantification Theory"},"url":"https://dl.acm.org/doi/10.1145/321033.321034"},{"id":"source-a-machine-program-for-theorem-proving","type":"paper-page","reliability":"reference-only","title":{"zh":"用于定理证明的机器程序","en":"A machine program for theorem-proving"},"url":"https://cacm.acm.org/research/a-machine-program-for-theorem-proving/"},{"id":"source-wikimedia-commons-hilary-putnam","type":"image-source","reliability":"reference-only","title":{"zh":"维基共享资源: 希拉里·普特南","en":"Wikimedia Commons: Hilary Putnam"},"url":"https://commons.wikimedia.org/wiki/File:Hilary_Putnam.jpg"}],"usages":[{"storylineId":"bench-council-ai100","storylineTitle":{"zh":"AI 百大成就（BenchCouncil）","en":"AI Top 100 Achievements (BenchCouncil)"},"eventId":"1960-davis-putnam-dpll","eventTitle":{"zh":"DP/DPLL 算法","en":"Davis-Putnam & DPLL"},"variant":"bench-council-ai100","variantFile":"archive/events/1960-davis-putnam-dpll/variants/bench-council-ai100.json","visual":"transcript","demoImage":"","description":{"zh":"戴维斯与普特南在 1960 年提出面向量词理论和布尔可满足性问题的计算过程；1962 年，戴维斯、洛格曼和洛夫兰将其发展为后来称作 DPLL 的机器程序。前者通过消去变量变换子句集合，后者以分支搜索配合单元传播等简化规则判断公式是否可满足。 DPLL 把逻辑推理组织成一棵可剪枝的搜索树：选择变量赋值，传播由此被迫确定的结果，在出现矛盾时回溯。现代 SAT 求解器又加入子句学习、重启和更强启发式，但搜索与传播的基本框架仍源于这条路线，并广泛服务于验证、规划、配置和约束求解。","en":"Martin Davis and Hilary Putnam introduced a computational procedure for quantification theory and Boolean satisfiability in 1960. In 1962, Davis, George Logemann, and Donald Loveland developed the machine program later known as DPLL. The earlier method transformed clause sets through variable elimination, while DPLL combined branching search with simplifications such as unit propagation. DPLL organized logical reasoning as a prunable search tree: choose a variable assignment, propagate consequences forced by it, and backtrack when a contradiction appears. Modern SAT solvers add clause learning, restarts, watched literals, and stronger heuristics, but their basic search-and-propagate structure descends from this work and remains important in verification, planning, configuration, and constraint solving."},"method":{"zh":"带传播的 SAT 搜索","en":"SAT search with propagation"},"artifact":{"zh":"Davis-Putnam / DPLL 过程","en":"Davis-Putnam / DPLL procedure"}}],"svgText":["DAVIS-PUTNAM + DPLL","SAT solving as disciplined search through logical assignments.","CNF formula","(A or B) and","(not A or C)","DPLL loop","unit propagation","pure literal rule","backtracking branch","Conflict: prune","Model: accept","Eliminate","Propagate","Branch","Backtrack","Modern SAT solvers still inherit this idea: search, simplify, and cut away impossible branches."],"svgBytes":3710,"hasViewBox":true,"hasTitle":true,"hasDesc":true,"hasScript":false,"sourceTraceable":true},{"path":"resources/images/bench-council-ai100/explainers/1965-dendral_mass-spectrum.svg","exists":true,"assetIds":["asset-1965-dendral-mass-spectrum"],"roles":["architecture-explainer"],"captions":{"zh":["质谱到片段"],"en":["Mass spectrum to fragments"]},"subcaptions":{"zh":["DENDRAL 的本地重绘图，依据页面列出的来源材料制作。"],"en":["Local redraw for DENDRAL, based on the listed source material."]},"rightsStatuses":["documented-in-legacy"],"sourceIds":["source-applications-of-artificial-intelligence-for-chemical-inference"],"sources":[{"id":"source-applications-of-artificial-intelligence-for-chemical-inference","type":"paper","reliability":"primary","title":{"zh":"《人工智能在化学推断中的应用》","en":"Applications of Artificial Intelligence for Chemical Inference"},"url":"https://doi.org/10.1021/ci60034a002"}],"variantSourceIds":["source-acm-turing-award-profile-for-edward-feigenbaum","source-applications-of-artificial-intelligence-for-chemical-inference","source-stanford-knowledge-systems-laboratory-history"],"variantSources":[{"id":"source-applications-of-artificial-intelligence-for-chemical-inference","type":"paper","reliability":"primary","title":{"zh":"《人工智能在化学推断中的应用》","en":"Applications of Artificial Intelligence for Chemical Inference"},"url":"https://doi.org/10.1021/ci60034a002"},{"id":"source-acm-turing-award-profile-for-edward-feigenbaum","type":"profile","reliability":"reference-only","title":{"zh":"ACM 图灵 Award profile for 爱德华·费根鲍姆","en":"ACM Turing Award profile for Edward Feigenbaum"},"url":"https://awards.acm.org/award-recipients/feigenbaum_4167235"},{"id":"source-stanford-knowledge-systems-laboratory-history","type":"official-page","reliability":"reference-only","title":{"zh":"斯坦福大学 Knowledge Systems Laboratory history","en":"Stanford Knowledge Systems Laboratory history"},"url":"http://ksl-web.stanford.edu/"}],"usages":[{"storylineId":"bench-council-ai100","storylineTitle":{"zh":"AI 百大成就（BenchCouncil）","en":"AI Top 100 Achievements (BenchCouncil)"},"eventId":"1965-dendral","eventTitle":{"zh":"DENDRAL","en":"DENDRAL"},"variant":"bench-council-ai100","variantFile":"archive/events/1965-dendral/variants/bench-council-ai100.json","visual":"dendral","demoImage":"","description":{"zh":"DENDRAL 于 1960 年代在斯坦福启动，目标是根据质谱等实验数据推断有机分子的可能结构。系统先依据化学约束生成候选结构，再用关于键断裂和谱峰的专家规则预测证据、排除不符合数据的候选，把庞大的组合搜索空间缩小到化学上合理的范围。 它没有依靠一套完全通用的推理规则，而是把化学家的专门知识编码进程序，展示了知识质量可以比通用搜索技巧更决定系统表现。DENDRAL 因此成为专家系统和知识工程的奠基项目，也推动 AI 从抽象演示走向可由领域专家检验的科学应用。","en":"DENDRAL began at Stanford in the 1960s to infer plausible organic molecular structures from experimental evidence such as mass spectra. The system generated candidate structures under chemical constraints, then used expert rules about bond fragmentation and spectral peaks to predict evidence and reject candidates inconsistent with the observations, reducing a huge combinatorial space to chemically meaningful possibilities. Rather than relying on a completely general reasoning method, DENDRAL encoded specialized knowledge from chemists, demonstrating that the quality of domain knowledge could matter more than generic search technique. It became a founding project for expert systems and knowledge engineering and helped move AI from abstract demonstrations toward scientific applications whose outputs could be evaluated by domain experts."},"method":{"zh":"规则引导的化学结构推断","en":"Rule-guided chemical structure inference"},"artifact":{"zh":"DENDRAL 专家系统","en":"DENDRAL expert system"}}],"svgText":["Mass spectrum to fragments","mass spectrum peaks","local redrawn explainer"],"svgBytes":1055,"hasViewBox":true,"hasTitle":false,"hasDesc":false,"hasScript":false,"sourceTraceable":true},{"path":"resources/images/bench-council-ai100/explainers/1965-dendral_rule-filter.svg","exists":true,"assetIds":["asset-1965-dendral-rule-filter"],"roles":["architecture-explainer"],"captions":{"zh":["规则筛选分子搜索"],"en":["Rule-filtered molecule search"]},"subcaptions":{"zh":["DENDRAL 的本地重绘图，依据页面列出的来源材料制作。"],"en":["Local redraw for DENDRAL, based on the listed source material."]},"rightsStatuses":["documented-in-legacy"],"sourceIds":["source-applications-of-artificial-intelligence-for-chemical-inference"],"sources":[{"id":"source-applications-of-artificial-intelligence-for-chemical-inference","type":"paper","reliability":"primary","title":{"zh":"《人工智能在化学推断中的应用》","en":"Applications of Artificial Intelligence for Chemical Inference"},"url":"https://doi.org/10.1021/ci60034a002"}],"variantSourceIds":["source-acm-turing-award-profile-for-edward-feigenbaum","source-applications-of-artificial-intelligence-for-chemical-inference","source-stanford-knowledge-systems-laboratory-history"],"variantSources":[{"id":"source-applications-of-artificial-intelligence-for-chemical-inference","type":"paper","reliability":"primary","title":{"zh":"《人工智能在化学推断中的应用》","en":"Applications of Artificial Intelligence for Chemical Inference"},"url":"https://doi.org/10.1021/ci60034a002"},{"id":"source-acm-turing-award-profile-for-edward-feigenbaum","type":"profile","reliability":"reference-only","title":{"zh":"ACM 图灵 Award profile for 爱德华·费根鲍姆","en":"ACM Turing Award profile for Edward Feigenbaum"},"url":"https://awards.acm.org/award-recipients/feigenbaum_4167235"},{"id":"source-stanford-knowledge-systems-laboratory-history","type":"official-page","reliability":"reference-only","title":{"zh":"斯坦福大学 Knowledge Systems Laboratory history","en":"Stanford Knowledge Systems Laboratory history"},"url":"http://ksl-web.stanford.edu/"}],"usages":[{"storylineId":"bench-council-ai100","storylineTitle":{"zh":"AI 百大成就（BenchCouncil）","en":"AI Top 100 Achievements (BenchCouncil)"},"eventId":"1965-dendral","eventTitle":{"zh":"DENDRAL","en":"DENDRAL"},"variant":"bench-council-ai100","variantFile":"archive/events/1965-dendral/variants/bench-council-ai100.json","visual":"dendral","demoImage":"","description":{"zh":"DENDRAL 于 1960 年代在斯坦福启动，目标是根据质谱等实验数据推断有机分子的可能结构。系统先依据化学约束生成候选结构，再用关于键断裂和谱峰的专家规则预测证据、排除不符合数据的候选，把庞大的组合搜索空间缩小到化学上合理的范围。 它没有依靠一套完全通用的推理规则，而是把化学家的专门知识编码进程序，展示了知识质量可以比通用搜索技巧更决定系统表现。DENDRAL 因此成为专家系统和知识工程的奠基项目，也推动 AI 从抽象演示走向可由领域专家检验的科学应用。","en":"DENDRAL began at Stanford in the 1960s to infer plausible organic molecular structures from experimental evidence such as mass spectra. The system generated candidate structures under chemical constraints, then used expert rules about bond fragmentation and spectral peaks to predict evidence and reject candidates inconsistent with the observations, reducing a huge combinatorial space to chemically meaningful possibilities. Rather than relying on a completely general reasoning method, DENDRAL encoded specialized knowledge from chemists, demonstrating that the quality of domain knowledge could matter more than generic search technique. It became a founding project for expert systems and knowledge engineering and helped move AI from abstract demonstrations toward scientific applications whose outputs could be evaluated by domain experts."},"method":{"zh":"规则引导的化学结构推断","en":"Rule-guided chemical structure inference"},"artifact":{"zh":"DENDRAL 专家系统","en":"DENDRAL expert system"}}],"svgText":["Rule-filtered molecule search","candidates","expert rules","survivors","local redrawn explainer"],"svgBytes":1540,"hasViewBox":true,"hasTitle":false,"hasDesc":false,"hasScript":false,"sourceTraceable":true},{"path":"resources/images/bench-council-ai100/explainers/1965-resolution-method_clause-refutation.svg","exists":true,"assetIds":["asset-1965-resolution-method-clause-refutation"],"roles":["architecture-explainer"],"captions":{"zh":["子句反驳阶梯"],"en":["Clause refutation ladder"]},"subcaptions":{"zh":["归结方法 的本地重绘图，依据页面列出的来源材料制作。"],"en":["Local redraw for Resolution Method, based on the listed source material."]},"rightsStatuses":["documented-in-legacy"],"sourceIds":["source-a-machine-oriented-logic-based-on-the-resolution-principle"],"sources":[{"id":"source-a-machine-oriented-logic-based-on-the-resolution-principle","type":"paper","reliability":"primary","title":{"zh":"《基于归结原理的机器导向逻辑》","en":"A Machine-Oriented Logic Based on the Resolution Principle"},"url":"https://doi.org/10.1145/321250.321253"}],"variantSourceIds":["source-a-machine-oriented-logic-based-on-the-resolution-principle","source-journal-of-symbolic-logic-review-record","source-stanford-encyclopedia-automated-reasoning"],"variantSources":[{"id":"source-a-machine-oriented-logic-based-on-the-resolution-principle","type":"paper","reliability":"primary","title":{"zh":"《基于归结原理的机器导向逻辑》","en":"A Machine-Oriented Logic Based on the Resolution Principle"},"url":"https://doi.org/10.1145/321250.321253"},{"id":"source-journal-of-symbolic-logic-review-record","type":"paper-page","reliability":"reference-only","title":{"zh":"Journal of Symbolic Logic review record","en":"Journal of Symbolic Logic review record"},"url":"https://www.cambridge.org/core/journals/journal-of-symbolic-logic/article/j-a-robinson-a-machineoriented-logic-based-on-the-resolution-principle-journal-of-the-association-for-computing-machinery-vol-12-1965-pp-2341/65679C30B9D7D7763FFB700CA77B18B1"},{"id":"source-stanford-encyclopedia-automated-reasoning","type":"encyclopedia-entry","reliability":"reference-only","title":{"zh":"斯坦福大学 Encyclopedia: Automated Reasoning","en":"Stanford Encyclopedia: Automated Reasoning"},"url":"https://plato.stanford.edu/entries/reasoning-automated/"}],"usages":[{"storylineId":"bench-council-ai100","storylineTitle":{"zh":"AI 百大成就（BenchCouncil）","en":"AI Top 100 Achievements (BenchCouncil)"},"eventId":"1965-resolution-method","eventTitle":{"zh":"归结方法","en":"Resolution Method"},"variant":"bench-council-ai100","variantFile":"archive/events/1965-resolution-method/variants/bench-council-ai100.json","visual":"resolution","demoImage":"","description":{"zh":"J·艾伦·罗宾逊在 1965 年提出面向机器的一阶逻辑归结方法。证明时先把前提和被否定的结论转换为子句，再寻找含有互补文字的子句；合一算法计算使相关项匹配的变量替换，归结规则据此生成新子句，直到推出代表矛盾的空子句。 这种反驳式方法用一套统一规则取代许多专门推理步骤，并具备适合自动化的重要完备性性质。实际系统仍需要索引、搜索策略和启发式方法控制组合增长，但归结与合一成为自动定理证明、逻辑程序设计及后续 SAT/SMT 推理谱系的基础概念。","en":"J. Alan Robinson introduced a machine-oriented resolution method for first-order logic in 1965. A proof converts the premises and negated conclusion into clauses, then finds clauses containing complementary literals. Unification computes substitutions that make relevant terms match, allowing the resolution rule to derive a new clause until the empty clause represents a contradiction. This refutation method replaced many specialized inference steps with a uniform rule and provided an important completeness property for automation. Practical systems still require indexing, search strategies, and heuristics to manage combinatorial growth, but resolution and unification became foundational concepts in automated theorem proving, logic programming, and later SAT/SMT reasoning lineages."},"method":{"zh":"带合一的子句反驳","en":"Clause refutation with unification"},"artifact":{"zh":"归结证明过程","en":"Resolution proof procedure"}}],"svgText":["Resolution: explicit refutation chain","A or B","not B","A","not A","empty clause","Resolve complementary literals at each step.","Contradiction is reached only after both A and not A are available."],"svgBytes":1811,"hasViewBox":true,"hasTitle":true,"hasDesc":true,"hasScript":false,"sourceTraceable":true},{"path":"resources/images/bench-council-ai100/explainers/1965-resolution-method_unification-map.svg","exists":true,"assetIds":["asset-1965-resolution-method-unification-map"],"roles":["architecture-explainer"],"captions":{"zh":["合一映射图"],"en":["Unification map"]},"subcaptions":{"zh":["归结方法 的本地重绘图，依据页面列出的来源材料制作。"],"en":["Local redraw for Resolution Method, based on the listed source material."]},"rightsStatuses":["documented-in-legacy"],"sourceIds":["source-a-machine-oriented-logic-based-on-the-resolution-principle"],"sources":[{"id":"source-a-machine-oriented-logic-based-on-the-resolution-principle","type":"paper","reliability":"primary","title":{"zh":"《基于归结原理的机器导向逻辑》","en":"A Machine-Oriented Logic Based on the Resolution Principle"},"url":"https://doi.org/10.1145/321250.321253"}],"variantSourceIds":["source-a-machine-oriented-logic-based-on-the-resolution-principle","source-journal-of-symbolic-logic-review-record","source-stanford-encyclopedia-automated-reasoning"],"variantSources":[{"id":"source-a-machine-oriented-logic-based-on-the-resolution-principle","type":"paper","reliability":"primary","title":{"zh":"《基于归结原理的机器导向逻辑》","en":"A Machine-Oriented Logic Based on the Resolution Principle"},"url":"https://doi.org/10.1145/321250.321253"},{"id":"source-journal-of-symbolic-logic-review-record","type":"paper-page","reliability":"reference-only","title":{"zh":"Journal of Symbolic Logic review record","en":"Journal of Symbolic Logic review record"},"url":"https://www.cambridge.org/core/journals/journal-of-symbolic-logic/article/j-a-robinson-a-machineoriented-logic-based-on-the-resolution-principle-journal-of-the-association-for-computing-machinery-vol-12-1965-pp-2341/65679C30B9D7D7763FFB700CA77B18B1"},{"id":"source-stanford-encyclopedia-automated-reasoning","type":"enc ，但部分用户仍把理解和同理心投射到系统上。魏岑鲍姆把这种反应视为重要警示。ELIZA 因而既是聊天机器人先驱，也是研究“ELIZA 效应”的经典案例：流畅互动可能让人高估系统内部的理解程度。","en":"Joseph Weizenbaum developed ELIZA in the mid-1960s to simulate text conversation through scripts, keywords, and pattern matching. Its famous DOCTOR script imitated a nondirective psychotherapist: it recognized forms in a user's input, substituted pronouns or keywords, and transformed the material into reflective questions that encouraged the user to continue. ELIZA built no deep semantic model and did not understand therapy, yet some users projected understanding and empathy onto it. Weizenbaum treated that response as an important warning. The program therefore became both a chatbot landmark and the classic example of the “ELIZA effect”: persuasive interaction can lead people to overestimate how much understanding exists inside a system."},"method":{"zh":"模式匹配与脚本反射","en":"Pattern matching and scripted reflection"},"artifact":{"zh":"早期对话机器人","en":"Early conversational chatbot"}}],"svgText":["ELIZA DOCTOR script","I feel unhappy","keyword: feel","Why do you feel unhappy?"],"svgBytes":872,"hasViewBox":true,"hasTitle":false,"hasDesc":false,"hasScript":false,"sourceTraceable":true},{"path":"resources/images/bench-council-ai100/explainers/1966-eliza_terminal-dialog.svg","exists":true,"assetIds":["asset-1966-eliza-terminal-dialog"],"roles":["architecture-explainer"],"captions":{"zh":["终端对话"],"en":["Terminal dialog"]},"subcaptions":{"zh":["ELIZA 的本地重绘图，依据页面列出的来源材料制作。"],"en":["Local redraw for ELIZA, based on the listed source material."]},"rightsStatuses":["documented-in-legacy"],"sourceIds":["source-eliza-cacm-paper"],"sources":[{"id":"source-eliza-cacm-paper","type":"paper-page","reliability":"primary","title":{"zh":"ELIZA CACM 论文页面","en":"ELIZA CACM paper page"},"url":"https://doi.org/10.1145/365153.365168"}],"variantSourceIds":["source-eliza-cacm-paper","source-eliza-source-reconstruction-project","source-mit-news-obituary-for-joseph-weizenbaum"],"variantSources":[{"i w much understanding exists inside a system."},"method":{"zh":"模式匹配与脚本反射","en":"Pattern matching and scripted reflection"},"artifact":{"zh":"早期对话机器人","en":"Early conversational chatbot"}}],"svgText":["USER I need help with my work.","ELIZA Why do you say you need help?","USER Because I am worried.","ELIZA How long have you been worried?","pattern matching can feel like attention"],"svgBytes":834,"hasViewBox":true,"hasTitle":false,"hasDesc":false,"hasScript":false,"sourceTraceable":true},{"path":"resources/images/bench-council-ai100/explainers/1967-back-propagation_error-flow.svg","exists":true,"assetIds":["asset-1967-back-propagation-error-flow"],"roles":["architecture-explainer"],"captions":{"zh":["误差信号流"],"en":["Error signal flow"]},"subcaptions":{"zh":["关于反向传播误差流的本地原创解释图。"],"en":["Original local explainer of back-propagation error flow."]},"rightsStatuses":["documented-in-legacy"],"sourceIds":["source-learning-representations-by-back-propagating-errors"],"sources":[{"id":"source-learning-representations-by-back-propagating-errors","type":"paper","reliability":"primary","title":{"zh":"《通过反向传播误差学习表示》","en":"Learning representations by back-propagating errors"},"url":"https://doi.org/10.1038/323533a0"}],"variantSourceIds":["source-a-theory-of-adaptive-pattern-classifiers","source-backpropagation-overview","source-hinton-hosted-nature-back-propagation-pdf","source-learning-representations-by-back-propagating-errors"],"variantSources":[{"id":"source-learning-representations-by-back-propagating-errors","type":"paper","reliability":"primary","title":{"zh":"《通过反向传播误差学习表示》","en":"Learning representations by back-propagating errors"},"url":"https://doi.org/10.1038/323533a0"},{"id":"source-a-theory-of-adaptive-pattern-classifiers","type":"paper","reliability":"primary","title":{"zh":"《自适应模式分类器理论》","en":"A Theory of Adaptive Pattern Classifiers"},"url":"https://doi.org/10.1109/PGEC.1967.264666"},{"id":"source-hinton-hosted-nature-back-propagation-pdf","type":"paper-file","reliability":"secondary","title":{"zh":"辛顿托管 Nature 论文 PDF","en":"Hinton-hosted Nature back-propagation PDF"},"url":"https://www.cs.toronto.edu/~hinton/absps/naturebp.pdf"},{"id":"source-backpropagation-overview","type":"encyclopedia-entry","reliability":"reference-only","title":{"zh":"反向传播概览","en":"Backpropagation overview"},"url":"https://en.wikipedia.org/wiki/Backpropagation"}],"usages":[{"storylineId":"bench-council-ai100","storylineTitle":{"zh":"AI 百大成就（BenchCouncil）","en":"AI Top 100 Achievements (BenchCouncil)"},"eventId":"ai100-1967-back-propagation","eventTitle":{"zh":"反向传播","en":"Back-propagation"},"variant":"bench-council-ai100","variantFile":"archive/events/ai100-1967-back-propagation/variants/bench-council-ai100.json","visual":"backprop","demoImage":"resources/images/bench-council-ai100/explainers/1967-back-propagation_error-flow.svg","description":{"zh":"多层网络的误差梯度并非在单一年份突然出现。甘利俊一 1967 年的自适应模式分类研究已经讨论多层系统中的误差修正；到 1986 年，鲁梅尔哈特、辛顿和威廉姆斯清晰展示了如何用链式法则把输出误差逐层向后传播，并据此更新各层权重、学习内部表示。 反向传播本质上是高效计算复合函数梯度的方法，使大量参数能够共同接受端到端训练。它并不保证优化容易，深层网络仍会遇到梯度消失、局部几何和数据需求等问题；但与可微模型和梯度下降结合后，它成为现代神经网络训练的核心计算机制。","en":"The gradient method behind multilayer learning did not appear in a single year. Shunichi Amari's 1967 work on adaptive pattern classifiers already examined error correction in multilayer systems. In 1986, David Rumelhart, Geoffrey Hinton, and Ronald Williams clearly demonstrated how the chain rule could propagate output errors backward through layers, updating every set of weights and learning internal representations. Backpropagation is fundamentally an efficient way to compute gradients through a composition of functions, allowing many parameters to be trained together end to end. It does not make optimization automatically easy: deep networks can still face vanishing gradients, difficult geometry, and large data requirements. Combined with differentiable models and gradient descent, however, it became the central computational mechanism of modern neural-network training."},"method":{"zh":"跨层梯度传播","en":"Gradient propagation through layers"},"artifact":{"zh":"反向传播学习规则","en":"Back-propagation learning rule"}}],"svgText":["error flows backward through layers","loss"],"svgBytes":1345,"hasViewBox":true,"hasTitle":false,"hasDesc":false,"hasScript":false,"sourceTraceable":true},{"path":"resources/images/bench-council-ai100/explainers/1967-knn_neighbor-vote.svg","exists":true,"assetIds":["asset-1967-knn-neighbor-vote"],"roles":["architecture-explainer"],"captions":{"zh":["最近邻投票"],"en":["Nearest-neighbor vote"]},"subcaptions":{"zh":["关于最近邻投票的本地原创解释图。"],"en":["Original local explainer of nearest-neighbor voting."]},"rightsStatuses":["documented-in-legacy"],"sourceIds":["source-nearest-neighbor-pattern-classification"],"sources":[{"id":"source-nearest-neighbor-pattern-classification","type":"paper","reliability":"primary","title":{"zh":"《最近邻模式分类》","en":"Nearest Neighbor Pattern Classification"},"url":"https://doi.org/10.1109/TIT.1967.1053964"}],"variantSourceIds":["source-k-nearest-neighbors-algorithm-overview","source-nearest-neighbor-pattern-classification","source-scikit-learn-nearest-neighbors-documentation","source-stanford-hosted-paper-pdf","source-thomas-cover-stanford-profile"],"variantSources":[{"id":"source-nearest-neighbor-pattern-classification","type":"paper","reliability":"primary","title":{"zh":"《最近邻模式分类》","en":"Nearest Neighbor Pattern Classification"},"url":"https://doi.org/10.1109/TIT.1967.1053964"},{"id":"source-stanford-hosted-paper-pdf","type":"paper-file","reliability":"secondary","title":{"zh":"斯坦福托管论文 PDF","en":"Stanford-hosted paper PDF"},"url":"https://isl.stanford.edu/~cover/papers/transIT/0021cove.pdf"},{"id":"source-k-nearest-neighbors-algorithm-overview","type":"encyclopedia-entry","reliability":"reference-only","title":{"zh":"k 近邻算法概览","en":"k-nearest neighbors algorithm overview"},"url":"https://en.wikipedia.org/wiki/K-nearest_neighbors_algorithm"},{"id":"source-scikit-learn-nearest-neighbors-documentation","type":"documentation","reliability":"reference-only","title":{"zh":"scikit-learn 最近邻文档","en":"scikit-learn nearest neighbors documentation"},"url":"https://scikit-learn.org/stable/modules/neighbors.html"},{"id":"source-thomas-cover-stanford-profile","type":"personal-page","reliability":"primary","title":{"zh":"托马斯·科弗个人主页","en":"Thomas Cover personal homepage"},"url":"https://isl.stanford.edu/~cover/"}],"usages":[{"storylineId":"bench-council-ai100","storylineTitle":{"zh":"AI 百大成就（BenchCouncil）","en":"AI Top 100 Achievements (BenchCouncil)"},"eventId":"ai100-1967-knn","eventTitle":{"zh":"KNN 最近邻","en":"KNN"},"variant":"bench-council-ai100","variantFile":"archive/events/ai100-1967-knn/variants/bench-council-ai100.json","visual":"knn","demoImage":"resources/images/bench-council-ai100/explainers/1967-knn_neighbor-vote.svg","description":{"zh":"科弗和哈特在 1967 年系统分析最近邻分类：面对新样本，算法不先拟合参数模型，而是在保存的训练集中寻找距离最近的已标注样本，并用其类别作出预测。k 近邻扩展则让多个邻居投票或按距离加权，从而降低单个样本噪声的影响。 这种“记住实例、查询时比较”的方法几乎没有训练成本，并能形成复杂的非线性决策边界，因此成为模式识别的持久基线。预测成本会随数据量增加，高维空间中的距离也可能失去意义；特征缩放、距离度量和 k 值选择都至关重要。它清楚体现了局部相似性学习的力量与限制。","en":"Thomas Cover and Peter Hart systematically analyzed nearest-neighbor classification in 1967. For a new sample, the method fits no parametric model in advance; it searches the stored training set for the closest labeled example and predicts its class. The k-nearest-neighbors extension lets several nearby examples vote or contribute with distance-based weights, reducing sensitivity to one noisy sample. This “remember examples and compare at query time” strategy has almost no training cost and can form complex nonlinear decision boundaries, making it a durable pattern-recognition baseline. Prediction becomes more expensive as data grows, and distance can lose meaning in high dimensions. Feature scaling, the distance metric, and the choice of k are therefore crucial. The method clearly exposes both the power and limits of local similarity learning."},"method":{"zh":"基于实例的局部投票","en":"Instance-based local voting"},"artifact":{"zh":"最近邻分类器","en":"Nearest-neighbor classifier"}}],"svgText":["nearest-neighbor vote","query","k = 4","majority label wins"],"svgBytes":1706,"hasViewBox":true,"hasTitle":false,"hasDesc":false,"hasScript":false,"sourceTraceable":true},{"path":"resources/images/bench-council-ai100/explainers/1969-relu_activation.svg","exists":true,"assetIds":["asset-1969-relu-activation"],"roles":["architecture-explainer"],"captions":{"zh":["整流激活"],"en":["Rectified activation"]},"subcaptions":{"zh":["关于 max(0, x) 激活函数的本地原创解释图。"],"en":["Original local explainer of the max(0, x) activation."]},"rightsStatuses":["documented-in-legacy"],"sourceIds":["source-deep-sparse-rectifier-neural-networks"],"sources":[{"id":"source-deep-sparse-rectifier-neural-networks","type":"paper","reliability":"primary","title":{"zh":"《深度稀疏整流神经网络》","en":"Deep Sparse Rectifier Neural Networks"},"url":"https://proceedings.mlr.press/v15/glorot11a.html"}],"variantSourceIds":["source-candc-2021-kunihiko-fukushima","source-deep-sparse-rectifier-neural-networks","source-fukushima-analog-threshold-elements","source-rectified-linear-units-improve-restricted-boltzmann-machines","source-yoshua-bengio-profile-at-mila"],"variantSources":[{"id":"source-fukushima-analog-threshold-elements","type":"paper","reliability":"primary","title":{"zh":"《基于多层模拟阈值元件网络的视觉特征提取》","en":"Visual Feature Extraction by a Multilayered Network of Analog Threshold Elements"},"url":"https://doi.org/10.1109/TSSC.1969.300225"},{"id":"source-candc-2021-kunihiko-fukushima","type":"profile","reliability":"primary","title":{"zh":"2021 年 C&C 奖：福岛邦彦博士","en":"2021 C&C Prize: Dr. Kunihiko Fukushima"},"url":"https://www.candc.or.jp/kensyo/2021/group_a.html"},{"id":"source-deep-sparse-rectifier-neural-networks","type":"paper","reliability":"primary","title":{"zh":"《深度稀疏整流神经网络》","en":"Deep Sparse Rectifier Neural Networks"},"url":"https://proceedings.mlr.press/v15/glorot11a.html"},{"id":"source-rectified-linear-units-improve-restricted-boltzmann-machines","type":"paper","reliability":"secondary","title":{"zh":"《整流线性单元改进受限玻尔兹曼机》","en":"Rectified Linear Units Improve Restricted Boltzmann Machines"},"url":"https://www.cs.toronto.edu/~fritz/absps/reluICML.pdf"},{"id":"source-yoshua-bengio-profile-at-mila","type":"profile","reliability":"reference-only","title":{"zh":"Mila 的约书亚·本吉奥资料","en":"Yoshua Bengio profile at Mila"},"url":"https://mila.quebec/en/directory/yoshua-bengio"}],"usages":[{"storylineId":"bench-council-ai100","storylineTitle":{"zh":"AI 百大成就（BenchCouncil）","en":"AI Top 100 Achievements (BenchCouncil)"},"eventId":"ai100-1969-relu","eventTitle":{"zh":"ReLU","en":"ReLU"},"variant":"bench-council-ai100","variantFile":"archive/events/ai100-1969-relu/variants/bench-council-ai100.json","visual":"relu","demoImage":"resources/images/bench-council-ai100/explainers/1969-relu_activation.svg","description":{"zh":"1969 年，福岛邦彦在日本 NHK 广播科学研究实验室的多层神经网络研究中使用了后来被称为 ReLU 的整流响应，当时将相关单元称为“模拟阈值元件”。这一思路在当时没有成为主流训练方法，长期未被广泛采用。 到 2010—2011 年，维诺德·奈尔与杰弗里·辛顿，以及泽维尔·格洛罗、安托万·博尔德和约书亚·本吉奥等研究者通过系统实验重新验证了整流单元的价值。ReLU 的正半轴不饱和，有助于缓解深层网络中的梯度衰减；大量零输出可形成稀疏激活，max 运算也十分高效。此后它成为 CNN 等深度网络的标准选择，并被原始 Transformer 的前馈网络采用；今天部分模型也会改用 GELU 或门控激活函数。","en":"In 1969, Kunihiko Fukushima at Japan's NHK Broadcasting Science Research Laboratories used a rectifying response in a multilayer neural network, describing the related units as \"analog threshold elements.\" This is now recognized as an early use of what became known as ReLU, but the idea did not become a mainstream training method at the time and was not widely adopted for decades. In 2010–2011, Vinod Nair and Geoffrey Hinton, followed by Xavier Glorot, Antoine Bordes, and Yoshua Bengio, systematically demonstrated the value of rectified units. ReLU's non-saturating positive branch supports gradient flow, exact-zero outputs encourage sparse activations, and its max operation is computationally inexpensive. It subsequently became a standard choice in CNNs and other deep networks and was used in the feed-forward layers of the original Transformer; many newer models also use alternatives such as GELU or gated activations."},"method":{"zh":"分段线性激活","en":"Piecewise-linear activation"},"artifact":{"zh":"整流激活函数","en":"Rectified activation function"}}],"svgText":["Rectified linear activation","x","f(x)","max(0, x)","clipped"],"svgBytes":1101,"hasViewBox":true,"hasTitle":false,"hasDesc":false,"hasScript":false,"sourceTraceable":true},{"path":"resources/images/bench-council-ai100/explainers/1970-ridge_shrinkage.svg","exists":true,"assetIds":["asset-1970-ridge-shrinkage"],"roles":["architecture-explainer"],"captions":{"zh":["岭回归收缩路径"],"en":["Ridge shrinkage path"]},"subcaptions":{"zh":["关于 L2 系数收缩的本地原创解释图。"],"en":["Original local explainer of L2 coefficient shrinkage."]},"rightsStatuses":["documented-in-legacy"],"sourceIds":["source-ridge-regression-biased-estimation-for-nonorthogonal-problems"],"sources":[{"id":"source-ridge-regression-biased-estimation-for-nonorthogonal-problems","type":"paper","reliability":"primary","title":{"zh":"《岭回归：非正交问题中的有偏估计》","en":"Ridge Regression: Biased Estimation for Nonorthogonal Problems"},"url":"https://doi.org/10.1080/00401706.1970.10488634"}],"variantSourceIds":["source-open-pdf-copy-of-the-technometrics-paper","source-ridge-regression-biased-estimation-for-nonorthogonal-problems","source-ridge-regression-overview","source-scikit-learn-ridge-documentation"],"variantSources":[{"id":"source-ridge-regression-biased-estimation-for-nonorthogonal-problems","type":"paper","reliability":"primary","title":{"zh":"《岭回归：非正交问题中的有偏估计》","en":"Ridge Regression: Biased Estimation for Nonorthogonal Problems"},"url":"https://doi.org/10.1080/00401706.1970.10488634"},{"id":"source-open-pdf-copy-of-the-technometrics-paper","type":"paper-file","reliability":"secondary","title":{"zh":"Technometrics 论文开放 PDF","en":"Open PDF copy of the Technometrics paper"},"url":"https://homepages.math.uic.edu/~lreyzin/papers/ridge.pdf"},{"id":"source-ridge-regression-overview","type":"encyclopedia-entry","reliability":"reference-only","title":{"zh":"岭回归概览","en":"Ridge regression overview"},"url":"https://en.wikipedia.org/wiki/Ridge_regression"},{"id":"source-scikit-learn-ridge-documentation","type":"documentation","reliability":"reference-only","title":{"zh":"scikit-learn 岭回归文档","en":"scikit-learn Ridge documentation"},"url":"https://scikit-learn.org/stable/modules/linear_model.html#ridge-regression-and-classification"}],"usages":[{"storylineId":"bench-council-ai100","storylineTitle":{"zh":"AI 百大成就（BenchCouncil）","en":"AI Top 100 Achievements (BenchCouncil)"},"eventId":"ai100-1970-ridge","eventTitle":{"zh":"岭回归","en":"Ridge"},"variant":"bench-council-ai100","variantFile":"archive/events/ai100-1970-ridge/variants/bench-council-ai100.json","visual":"ridge","demoImage":"resources/images/bench-council-ai100/explainers/1970-ridge_shrinkage.svg","description":{"zh":"霍尔和肯纳德在 1970 年提出岭回归，处理预测变量高度相关时普通最小二乘系数剧烈波动的问题。它在平方误差之外加入系数平方和构成的 L2 惩罚，等价于向正规方程对角线加入正数；解因此带有偏差，却能显著降低方差并改善预测稳定性。 正则化强度控制“贴合训练数据”和“保持较小系数”之间的权衡。岭回归通常保留全部变量，不像 Lasso 那样产生大量精确零系数，但在多重共线性和许多弱信号共同作用时很有效。它把有意引入偏差以换取泛化能力的思想带入现代统计学习。","en":"Arthur Hoerl and Robert Kennard introduced ridge regression in 1970 to address the instability of ordinary least-squares coefficients when predictors are strongly correlated. It adds an L2 penalty on the squared coefficients to the fitting error, equivalently adding a positive value to the diagonal of the normal equations. The estimate becomes biased but can have much lower variance and more stable predictions. A regularization parameter controls the tradeoff between fitting the training data and keeping coefficients small. Ridge regression generally retains all variables rather than creating many exact zeros as the Lasso does, but it is effective under multicollinearity and when many weak signals contribute together. It established the modern learning principle of accepting deliberate bias to improve generalization."},"method":{"zh":"L2 正则化线性回归","en":"L2-regularized linear regression"},"artifact":{"zh":"岭估计器","en":"Ridge estimator"}}],"svgText":["L2 shrinkage path","larger lambda","smaller weights","coefficient value"],"svgBytes":1255,"hasViewBox":true,"hasTitle":false,"hasDesc":false,"hasScript":false,"sourceTraceable":true},{"path":"resources/images/bench-council-ai100/explainers/1970-shrdlu_blocks-world.svg","exists":true,"assetIds":["asset-1970-shrdlu-blocks-world"],"roles":["architecture-explainer"],"captions":{"zh":["积木世界命令落地"],"en":["Blocks-world command grounding"]},"subcaptions":{"zh":["SHRDLU 的本地重绘图，依据页面列出的来源材料制作。"],"en":["Local redraw for SHRDLU, based on the listed source material."]},"rightsStatuses":["documented-in-legacy"],"sourceIds":["source-procedures-as-a-representation-for-data-in-a-computer-program-for-understanding-"],"sources":[{"id":"source-procedures-as-a-representation-for-data-in-a-computer-program-for-understanding-","type":"thesis","reliability":"primary","title":{"zh":"在理解自然语言的计算机程序中把过程作为数据表示","en":"Procedures as a Representation for Data in a Computer Program for Understanding Natural Language"},"url":"https://dspace.mit.edu/handle/1721.1/7095"}],"variantSourceIds":["source-procedures-as-a-representation-for-data-in-a-computer-program-for-understanding-","source-terry-winograd-oral-history-cbi","source-terry-winograd-stanford-computer-science"],"variantSources":[{"id":"source-procedures-as-a-representation-for-data-in-a-computer-program-for-understanding-","type":"thesis","reliability":"primary","title":{"zh":"在理解自然语言的计算机程序中把过程作为数据表示","en":"Procedures as a Representation for Data in a Computer Program for Understanding Natural Language"},"url":"https://dspace.mit.edu/handle/1721.1/7095"},{"id":"source-terry-winograd-stanford-computer-science","type":"profile","reliability":"reference-only","title":{"zh":"特里·维诺格拉德, 斯坦福大学 Computer 《科学》","en":"Terry Winograd, Stanford Computer Science"},"url":"https://www.cs.stanford.edu/people/terry-winograd"},{"id":"source-terry-winograd-oral-history-cbi","type":"archive","reliability":"reference-only","title":{"zh":"特里·维诺格拉德 oral history, CBI","en":"Terry Winograd oral history, CBI"},"url":"https://hdl.handle.net/11299/107717"}],"usages":[{"storylineId":"bench-council-ai100","storylineTitle":{"zh":"AI 百大成就（BenchCouncil）","en":"AI Top 100 Achievements (BenchCouncil)"},"eventId":"1970-shrdlu","eventTitle":{"zh":"SHRDLU","en":"SHRDLU"},"variant":"bench-council-ai100","variantFile":"archive/events/1970-shrdlu/variants/bench-council-ai100.json","visual":"shrdlu","demoImage":"","description":{"zh":"特里·维诺格拉德在 1968 至 1970 年间开发 SHRDLU，让用户用自然语言与一个虚拟积木世界交互。系统把句法分析、指代消解、过程语义、规划和世界模型紧密结合，能够执行“把红色金字塔放到方块上”之类命令，也能回答关于对象、动作和先前对话的问题。 SHRDLU 的连贯表现展示了语言理解与行动规划整合后的力量，但它依赖一个词汇、物体和规则都受到严格限制的微型世界。系统一旦离开这个封闭环境就难以扩展。它因此既是自然语言 AI 的经典成功，也是对领域边界的提醒：局部流畅不等于开放世界理解。","en":"Terry Winograd developed SHRDLU between 1968 and 1970 so users could interact in natural language with a virtual blocks world. The system tightly integrated parsing, reference resolution, procedural semantics, planning, and a world model. It could execute commands such as placing a red pyramid on a block and answer questions about objects, actions, and earlier parts of the conversation. SHRDLU's coherent behavior demonstrated the power of joining language understanding with action planning, but it depended on a microworld whose vocabulary, objects, and rules were sharply constrained. The approach did not scale easily beyond that closed environment. It therefore remains both a classic success in natural-language AI and a warning about scope: local fluency is not the same as open-world understanding."},"method":{"zh":"积木世界语言理解","en":"Blocks-world language understanding"},"artifact":{"zh":"交互式积木世界对话系统","en":"Interactive blocks-world dialogue system"}}],"svgText":["Blocks-world command grounding","PUT THE GREEN BLOCK ON ORANGE","ground words in objects","local redrawn explainer"],"svgBytes":1090,"hasViewBox":true,"hasTitle":false,"hasDesc":false,"hasScrip

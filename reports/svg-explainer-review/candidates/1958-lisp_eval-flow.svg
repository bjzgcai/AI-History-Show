<svg width="720" height="504" viewBox="0 0 720 504" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">LISP S-expression evaluator flow</title>
  <desc id="desc">An original explainer showing an S-expression entering EVAL, passing through LISP primitives, and returning a symbolic result.</desc>
  <rect width="720" height="504" fill="#f7f5ef"/>
  <rect x="28" y="28" width="664" height="448" rx="18" fill="#fffdf8" stroke="#d4c8b4" stroke-width="2"/>
  <text x="48" y="70" fill="#1f1b16" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="800">LISP: code and data share one shape</text>
  <text x="48" y="98" fill="#6b6258" font-family="Arial, Helvetica, sans-serif" font-size="16">S-expressions become the interface for symbolic recursion.</text>

  <rect x="52" y="138" width="196" height="116" rx="14" fill="#111111"/>
  <text x="72" y="170" fill="#f68900" font-family="Consolas, monospace" font-size="18" font-weight="800">INPUT</text>
  <text x="72" y="204" fill="#ffffff" font-family="Consolas, monospace" font-size="16">(car '(AI LISP))</text>
  <text x="72" y="232" fill="#bdb7ad" font-family="Arial, Helvetica, sans-serif" font-size="13">a list expression</text>

  <path d="M258 196 H328" stroke="#f68900" stroke-width="4" stroke-linecap="round"/>
  <path d="M328 196 l-14 -9 v18 z" fill="#f68900"/>

  <circle cx="405" cy="196" r="78" fill="#fff8ec" stroke="#f68900" stroke-width="4"/>
  <text x="369" y="184" fill="#1f1b16" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="900">EVAL</text>
  <text x="346" y="214" fill="#6b6258" font-family="Arial, Helvetica, sans-serif" font-size="14">recursive dispatcher</text>

  <path d="M484 196 H548" stroke="#f68900" stroke-width="4" stroke-linecap="round"/>
  <path d="M548 196 l-14 -9 v18 z" fill="#f68900"/>

  <rect x="558" y="138" width="132" height="116" rx="14" fill="#111111"/>
  <text x="578" y="170" fill="#f68900" font-family="Consolas, monospace" font-size="18" font-weight="800">OUTPUT</text>
  <text x="578" y="206" fill="#ffffff" font-family="Consolas, monospace" font-size="28">AI</text>
  <text x="578" y="232" fill="#bdb7ad" font-family="Arial, Helvetica, sans-serif" font-size="13">symbol selected</text>

  <g font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="800">
    <rect x="86" y="316" width="92" height="48" rx="12" fill="#f1e7d7" stroke="#d4c8b4"/>
    <text x="111" y="346" fill="#1f1b16">QUOTE</text>
    <rect x="198" y="316" width="92" height="48" rx="12" fill="#f1e7d7" stroke="#d4c8b4"/>
    <text x="231" y="346" fill="#1f1b16">CAR</text>
    <rect x="310" y="316" width="92" height="48" rx="12" fill="#f1e7d7" stroke="#d4c8b4"/>
    <text x="343" y="346" fill="#1f1b16">CDR</text>
    <rect x="422" y="316" width="92" height="48" rx="12" fill="#f1e7d7" stroke="#d4c8b4"/>
    <text x="454" y="346" fill="#1f1b16">CONS</text>
    <rect x="534" y="316" width="92" height="48" rx="12" fill="#f1e7d7" stroke="#d4c8b4"/>
    <text x="568" y="346" fill="#1f1b16">COND</text>
  </g>

  <path d="M132 316 C170 278, 344 278, 405 272 C462 278, 545 286, 580 316" fill="none" stroke="#b7a88e" stroke-width="3" stroke-dasharray="7 8"/>
  <text x="100" y="420" fill="#1f1b16" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="800">Core idea</text>
  <text x="100" y="444" fill="#6b6258" font-family="Arial, Helvetica, sans-serif" font-size="14">The evaluator treats programs as list data, so symbolic expressions</text>
  <text x="100" y="464" fill="#6b6258" font-family="Arial, Helvetica, sans-serif" font-size="14">can transform other symbolic expressions.</text>
</svg>

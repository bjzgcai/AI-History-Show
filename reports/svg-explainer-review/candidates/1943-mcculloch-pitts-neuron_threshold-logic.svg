  <text x="360" y="368" fill="#94a3b8" text-anchor="middle" font-family="Arial" font-size="18">Binary inputs become a logical proposition</text>
  <text x="360" y="394" fill="#94a3b8" text-anchor="middle" font-family="Arial" font-size="18">implemented by a neuron-like threshold unit.</text>
</svg>

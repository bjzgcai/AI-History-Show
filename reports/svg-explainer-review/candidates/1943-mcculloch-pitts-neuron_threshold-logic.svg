<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" role="img" aria-label="Threshold logic neuron">
  <rect width="720" height="420" fill="#0f172a"/>
  <text x="42" y="58" fill="#f59e0b" font-family="Arial" font-size="30" font-weight="700">McCulloch-Pitts threshold logic</text>
  <g fill="#1d4ed8" stroke="#93c5fd" stroke-width="3">
    <circle cx="110" cy="132" r="32"/><circle cx="110" cy="214" r="32"/><circle cx="110" cy="296" r="32"/>
  </g>
  <g fill="#dbeafe" font-family="Arial" font-size="24" text-anchor="middle">
    <text x="110" y="140">x1</text><text x="110" y="222">x2</text><text x="110" y="304">x3</text>
  </g>
  <circle cx="360" cy="214" r="78" fill="#402c1b" stroke="#f59e0b" stroke-width="4"/>
  <text x="360" y="204" fill="#fde68a" font-family="Arial" font-size="25" text-anchor="middle" font-weight="700">sum</text>
  <text x="360" y="236" fill="#fde68a" font-family="Arial" font-size="22" text-anchor="middle">&gt; threshold?</text>

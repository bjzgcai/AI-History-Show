<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">VGG configuration depth comparison</title>
  <desc id="desc">VGG-11, VGG-13, VGG-16 and VGG-19 compared by weight-layer count.</desc>
  <rect width="1200" height="720" fill="#101827"/>
  <rect x="54" y="54" width="1092" height="612" rx="28" fill="#0f172a" stroke="#334155" stroke-width="4"/>
  <text x="90" y="112" fill="#f59e0b" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="800">VGG depth configurations</text>
  <text x="90" y="150" fill="#cbd5e1" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="700">按权重层数量比较 VGG-11 / 13 / 16 / 19</text>
  <path d="M100 552 H1098" stroke="#475569" stroke-width="3"/>
  <rect x="126" y="343" width="138" height="209" rx="16" fill="#0f766e"/>
  <text x="195" y="327" text-anchor="middle" fill="#f8fafc" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="800">11 weight layers</text>
  <text x="195" y="592" text-anchor="middle" fill="#cbd5e1" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">VGG-11</text>
  <rect x="344" y="305" width="138" height="247" rx="16" fill="#2563eb"/>
  <text x="413" y="289" text-anchor="middle" fill="#f8fafc" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="800">13 weight layers</text>
  <text x="413" y="592" text-anchor="middle" fill="#cbd5e1" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">VGG-13</text>
  <rect x="562" y="248" width="138" height="304" rx="16" fill="#0f766e"/>
  <text x="631" y="232" text-anchor="middle" fill="#f8fafc" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="800">16 weight layers</text>
  <text x="631" y="592" text-anchor="middle" fill="#cbd5e1" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">VGG-16</text>
  <rect x="780" y="191" width="138" height="361" rx="16" fill="#2563eb"/>
  <text x="849" y="175" text-anchor="middle" fill="#f8fafc" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="800">19 weight layers</text>
  <text x="849" y="592" text-anchor="middle" fill="#cbd5e1" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">VGG-19</text>
  <text x="90" y="638" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="18">Counts follow the configurations reported in Simonyan and Zisserman; bar heights are proportional to weight-layer count.</text>
</svg>

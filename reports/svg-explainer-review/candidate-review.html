:false,"sourceTraceable":true},{"path":"reports/svg-explainer-review/candidates/1958-lisp_eval-flow.svg","exists":true,"assetIds":["asset-1958-lisp-eval-flow"],"roles":["architecture-explainer"],"captions":{"zh":["S 表达式求值流程"],"en":["S-expression evaluator"]},"subcaptions":{"zh":["根据 麦卡锡 的 LISP 论文与 LISP I 手册中的基础原语制作的解释图。"],"en":["Original explainer derived from McCarthy's LISP paper and LISP I manual primitives."]},"rightsStatuses":["local-redraw"],"sourceIds":["source-recursive-functions-of-symbolic-expressions"],"sources":[{"id":"source-recursive-functions-of-symbolic-expressions","type":"paper","reliability":"primary","title":{"zh":"《符号表达式的递归函数》","en":"Recursive Functions of Symbolic Expressions"},"url":"https://www-formal.stanford.edu/jmc/recursive.html"}],"variantSourceIds":["source-history-of-lisp","source-lisp-i-programmer-s-manual","source-recursive-functions-of-symbolic-expressions"],"variantSources":[{"id":"source-recursive-functions-of-symbolic-expressions","type":"paper","reliability":"primary","title":{"zh":"《符号表达式的递归函数》","en":"Recursive Functions of Symbolic Expressions"},"url":"https://www-formal.stanford.edu/jmc/recursive.html"},{"id":"source-lisp-i-programmer-s-manual","type":"documentation","reliability":"reference-only","title":{"zh":"LISP I 程序员手册","en":"LISP I Programmer's Manual"},"url":"https://www.softwarepreservation.org/projects/LISP/book/LISP%20I%20Programmers%20Manual.pdf/view"},{"id":"source-history-of-lisp","type":"article","reliability":"reference-only","title":{"zh":"Lisp 史","en":"History of Lisp"},"url":"https://www-formal.stanford.edu/jmc/history/lisp/lisp.html"}],"usages":[{"storylineId":"bench-council-ai100","storylineTitle":{"zh":"AI 百大成就（BenchCouncil）","en":"AI Top 100 Achievements (BenchCouncil)"},"eventId":"1958-lisp","eventTitle":{"zh":"LISP","en":"LISP"},"variant":"bench-council-ai100","variantFile":"archive/events/1958-lisp/variants/bench-council-ai100.json","visual":"eval","demoImage":"","description":{"zh":"约翰·麦卡锡在 1958 年开始设计 LISP，并在 1960 年论文中用 S 表达式和递归函数系统说明这种语言。列表既能表示程序操作的数据，也能表示程序本身；CONS、CAR、CDR、QUOTE、COND 与 EVAL 等少量原语，就能组合出复杂的符号处理过程。 这种“代码与数据采用同一种结构”的设计，使研究者可以灵活构造定理证明、规划、自然语言和知识表示程序，也推动了交互式开发、垃圾回收等编程实践。LISP 后来形成众多方言；即使 AI 工程转向其他语言，它仍深刻影响函数式编程和可编程符号系统。","en":"John McCarthy began designing LISP in 1958 and presented its system of S-expressions and recursive functions in a 1960 paper. Lists could represent both the data manipulated by a program and the program itself. A small set of primitives, including CONS, CAR, CDR, QUOTE, COND, and EVAL, could be composed into complex symbolic procedures. This shared structure for code and data made it unusually flexible for theorem proving, planning, natural language, and knowledge-representation experiments. LISP also helped establish practices such as interactive development and automatic memory management. Although AI engineering later diversified into many languages, LISP's influence persists in functional programming and programmable symbolic systems."},"method":{"zh":"符号递归","en":"Symbolic recursion"},"artifact":{"zh":"S 表达式求值器","en":"S-expression evaluator"}}],"svgText":["LISP: code and data share one shape","S-expressions become the interface for symbolic recursion.","INPUT","(car '(AI LISP))","a list expression","EVAL","recursive dispatcher","OUTPUT","AI","symbol selected","QUOTE","CAR","CDR","CONS","COND","Core idea","The evaluator treats programs as list data, so symbolic expressions","can transform other symbolic expressions."],"svgBytes":3678,"hasViewBox":true,"hasTitle":true,"hasDesc":true,"hasScript":false,"sourceTraceable":true},{"path":"reports/svg-explainer-review/candidates/1960-davis-putnam-dpll_sat-search.svg","exists":true,"assetIds":["asset-1960-davis-putnam-dpll-sat-search"],"roles":["architecture-explainer"],"captions":{"zh":["Davis-Putnam 与 DPLL SAT 搜索"],"en":["Davis-Putnam and DPLL SAT search"]},"subcaptions":{"zh":["原创解释图，展示 CNF 子句、传播、分支、冲突剪枝与模型接受。"],"en":["Original explainer showing CNF clauses, propagation, branching, conflict pruning, and model acceptance."]},"rightsStatuses":["local-redraw"],"sourceIds":["source-a-computing-procedure-for-quantification-theory"],"sources":[{"id":"source-a-computing-procedure-for-quantification-theory","type":"paper","reliability":"primary","title":{"zh":"《量词理论的计算过程》","en":"A Computing Procedure for Quantification Theory"},"url":"https://dl.acm.org/doi/10.1145/321033.321034"}],"variantSourceIds":["source-a-computing-procedure-for-quantification-theory","source-a-machine-program-for-theorem-proving","source-wikimedia-commons-hilary-putnam"],"variantSources":[{"id":"source-a-computing-procedure-for-quantification-theory","type":"paper","reliability":"primary","title":{"zh":"《量词理论的计算过程》","en":"A Computing Procedure for Quantification Theory"},"url":"https://dl.acm.org/doi/10.1145/321033.321034"},{"id":"source-a-machine-program-for-theorem-proving","type":"paper-page","reliability":"reference-only","title":{"zh":"用于定理证明的机器程序","en":"A machine program for theorem-proving"},"url":"https://cacm.acm.org/research/a-machine-program-for-theorem-proving/"},{"id":"source-wikimedia-commons-hilary-putnam","type":"image-source","reliability":"reference-only","title":{"zh":"维基共享资源: 希拉里·普特南","en":"Wikimedia Commons: Hilary Putnam"},"url":"https://commons.wikimedia.org/wiki/File:Hilary_Putnam.jpg"}],"usages":[{"storylineId":"bench-council-ai100","storylineTitle":{"zh":"AI 百大成就（BenchCouncil）","en":"AI Top 100 Achievements (BenchCouncil)"},"eventId":"1960-davis-putnam-dpll","eventTitle":{"zh":"DP/DPLL 算法","en":"Davis-Putnam & DPLL"},"variant":"bench-council-ai100","variantFile":"archive/events/1960-davis-putnam-dpll/variants/bench-council-ai100.json","visual":"transcript","demoImage":"","description":{"zh":"戴维斯与普特南在 1960 年提出面向量词理论和布尔可满足性问题的计算过程；1962 年，戴维斯、洛格曼和洛夫兰将其发展为后来称作 DPLL 的机器程序。前者通过消去变量变换子句集合，后者以分支搜索配合单元传播等简化规则判断公式是否可满足。 DPLL 把逻辑推理组织成一棵可剪枝的搜索树：选择变量赋值，传播由此被迫确定的结果，在出现矛盾时回溯。现代 SAT 求解器又加入子句学习、重启和更强启发式，但搜索与传播的基本框架仍源于这条路线，并广泛服务于验证、规划、配置和约束求解。","en":"Martin Davis and Hilary Putnam introduced a computational procedure for quantification theory and Boolean satisfiability in 1960. In 1962, Davis, George Logemann, and Donald Loveland developed the machine program later known as DPLL. The earlier method transformed clause sets through variable elimination, while DPLL combined branching search with simplifications such as unit propagation. DPLL organized logical reasoning as a prunable search tree: choose a variable assignment, propagate consequences forced by it, and backtrack when a contradiction appears. Modern SAT solvers add clause learning, restarts, watched literals, and stronger heuristics, but their basic search-and-propagate structure descends from this work and remains important in verification, planning, configuration, and constraint solving."},"method":{"zh":"带传播的 SAT 搜索","en":"SAT search with propagation"},"artifact":{"zh":"Davis-Putnam / DPLL 过程","en":"Davis-Putnam / DPLL procedure"}}],"svgText":["DAVIS-PUTNAM + DPLL","SAT solving as disciplined search through logical assignments.","CNF formula","(A or B) and","(not A or C)","DPLL loop","unit propagation","pure literal rule","backtracking branch","Conflict: prune","Model: accept","Eliminate","Propagate","Branch","Backtrack","Modern SAT solvers still inherit this idea: search, simplify, and cut away impossible branches."],"svgBytes":3710,"hasViewBox":true,"hasTitle":true,"hasDesc":true,"hasScript":false,"sourceTraceable":true},{"path":"reports/svg-explainer-review/candidates/1965-resolution-method_clause-refutation.svg","exists":true,"assetIds":["asset-1965-resolution-method-clause-refutation"],"roles":["architecture-explainer"],"captions":{"zh":["子句反驳阶梯"],"en":["Clause refutation ladder"]},"subcaptions":{"zh":["归结方法 的本地重绘图，依据页面列出的来源材料制作。"],"en":["Local redraw for Resolution Method, based on the listed source material."]},"rightsStatuses":["documented-in-legacy"],"sourceIds":["source-a-machine-oriented-logic-based-on-the-resolution-principle"],"sources":[{"id":"source-a-machine-oriented-logic-based-on-the-resolution-principle","type":"paper","reliability":"primary","title":{"zh":"《基于归结原理的机器导向逻辑》","en":"A Machine-Oriented Logic Based on the Resolution Principle"},"url":"https://doi.org/10.1145/321250.321253"}],"variantSourceIds":["source-a-machine-oriented-logic-based-on-the-resolution-principle","source-journal-of-symbolic-logic-review-record","source-stanford-encyclopedia-automated-reasoning"],"variantSources":[{"id":"source-a-machine-oriented-logic-based-on-the-resolution-principle","type":"paper","reliability":"primary","title":{"zh":"《基于归结原理的机器导向逻辑》","en":"A Machine-Oriented Logic Based on the Resolution Principle"},"url":"https://doi.org/10.1145/321250.321253"},{"id":"source-journal-of-symbolic-logic-review-record","type":"paper-page","reliability":"reference-only","title":{"zh":"Journal of Symbolic Logic review record","en":"Journal of Symbolic Logic review record"},"url":"https://www.cambridge.org/core/journals/journal-of-symbolic-logic/article/j-a-robinson-a-machineoriented-logic-based-on-the-resolution-principle-journal-of-the-association-for-computing-machinery-vol-12-1965-pp-2341/65679C30B9D7D7763FFB700CA77B18B1"},{"id":"source-stanford-encyclopedia-automated-reasoning","type":"encyclopedia-entry","reliability":"reference-only","title":{"zh":"斯坦福大学 Encyclopedia: Automated Reasoning","en":"Stanford Encyclopedia: Automated Reasoning"},"url":"https://plato.stanford.edu/entries/reasoning-automated/"}],"usages":[{"storylineId":"bench-council-ai100","storylineTitle":{"zh":"AI 百大成就（BenchCouncil）","en":"AI Top 100 Achievements (BenchCouncil)"},"eventId":"1965-resolution-method","eventTitle":{"zh":"归结方法","en":"Resolution Method"},"variant":"bench-council-ai100","variantFile":"archive/events/1965-resolution-method/variants/bench-council-ai100.json","visual":"resolution","demoImage":"","description":{"zh":"J·艾伦·罗宾逊在 1965 年提出面向机器的一阶逻辑归结方法。证明时先把前提和被否定的结论转换为子句，再寻找含有互补文字的子句；合一算法计算使相关项匹配的变量替换，归结规则据此生成新子句，直到推出代表矛盾的空子句。 这种反驳式方法用一套统一规则取代许多专门推理步骤，并具备适合自动化的重要完备性性质。实际系统仍需要索引、搜索策略和启发式方法控制组合增长，但归结与合一成为自动定理证明、逻辑程序设计及后续 SAT/SMT 推理谱系的基础概念。","en":"J. Alan Robinson introduced a machine-oriented resolution method for first-order logic in 1965. A proof converts the premises and negated conclusion into clauses, then finds clauses containing complementary literals. Unification computes substitutions that make relevant terms match, allowing the resolution rule to derive a new clause until the empty clause represents a contradiction. This refutation method replaced many specialized inference steps with a uniform rule and provided an important completeness property for automation. Practical systems still require indexing, search strategies, and heuristics to manage combinatorial growth, but resolution and unification became foundational concepts in automated theorem proving, logic programming, and later SAT/SMT reasoning lineages."},"method":{"zh":"带合一的子句反驳","en":"Clause refutation with unification"},"artifact":{"zh":"归结证明过程","en":"Resolution proof procedure"}}],"svgText":["Resolution: explicit refutation chain","A or B","not B","A","not A","empty clause","Resolve complementary literals at each step.","Contradiction is reached only after both A and not A are available."],"svgBytes":1811,"hasViewBox":true,"hasTitle":true,"hasDesc":true,"hasScript":false,"sourceTraceable":true},{"path":"reports/svg-explainer-review/candidates/1971-complexity-theory_reduction-map.svg","exists":true,"assetIds":["asset-1971-complexity-theory-reduction-map"],"roles":["architecture-explainer"],"captions":{"zh":["NP 完全性归约地图"],"en":["NP-completeness reduction map"]},"subcaptions":{"zh":["根据 库克 1971 年论文与 Clay P 与 NP 难题说明制作的原创解释图。"],"en":["Original explainer derived from Cook's 1971 paper and the Clay P versus NP problem description."]},"rightsStatuses":["local-redraw"],"sourceIds":["source-the-complexity-of-theorem-proving-procedures"],"sources":[{"id":"source-the-complexity-of-theorem-proving-procedures","type":"paper","reliability":"primary","title":{"zh":"《定理证明过程的复杂性》","en":"The Complexity of Theorem-Proving Procedures"},"url":"https://dl.acm.org/doi/10.1145/800157.805047"}],"variantSourceIds":["source-clay-mathematics-institute-p-vs-np","source-stephen-a-cook-acm-a-m-turing-award","source-the-complexity-of-theorem-proving-procedures"],"variantSources":[{"id":"source-the-complexity-of-theorem-proving-procedures","type":"paper","reliability":"primary","title":{"zh":"《定理证明过程的复杂性》","en":"The Complexity of Theorem-Proving Procedures"},"url":"https://dl.acm.org/doi/10.1145/800157.805047"},{"id":"source-stephen-a-cook-acm-a-m-turing-award","type":"profile","reliability":"reference-only","title":{"zh":"斯蒂芬·A·库克 ACM A.M. 图灵 Award","en":"Stephen A. Cook ACM A.M. Turing Award"},"url":"https://awards.acm.org/award_winners/cook_N991950"},{"id":"source-clay-mathematics-institute-p-vs-np","type":"official-page","reliability":"reference-only","title":{"zh":"克雷数学研究所 P 与 NP 问题","en":"Clay Mathematics Institute P vs NP"},"url":"https://www.claymath.org/millennium/p-vs-np/"}],"usages":[{"storylineId":"bench-council-ai100","storylineTitle":{"zh":"AI 百大成就（BenchCouncil）","en":"AI Top 100 Achievements (BenchCouncil)"},"eventId":"1971-complexity-theory","eventTitle":{"zh":"NP 完全性","en":"NP-Completeness"},"variant":"bench-council-ai100","variantFile":"archive/events/1971-complexity-theory/variants/bench-council-ai100.json","visual":"transcript","demoImage":"","description":{"zh":"斯蒂芬·库克在 1971 年证明布尔可满足性问题具有一种关键的普遍困难性：NP 中的每个问题都可以在多项式时间内归约到它。列昂尼德·列文也独立提出了相关结果。由此形成的 NP 完全性概念，不再把困难问题看成彼此孤立的案例，而是把它们组织成可以通过归约比较的整体。 这一区分对 AI 尤其重要，因为规划、调度、组合搜索和约束求解常会遇到 NP 完全或相关的高复杂度问题。NP 完全并不等于“绝对无法求解”，也没有证明 P 不等于 NP；它提醒工程师需要利用近似、启发式、特殊结构或指数搜索，而不能期待一种已知的通用高效算法。","en":"In 1971, Stephen Cook proved a crucial form of universal hardness for Boolean satisfiability: every problem in NP could be reduced to it in polynomial time. Leonid Levin independently developed a related result. The resulting idea of NP-completeness organized difficult problems into a common structure connected by reductions, rather than treating each one as an isolated obstacle. The distinction is central to AI because planning, scheduling, combinatorial search, and constraint solving often encounter NP-complete or similarly demanding problems. NP-complete does not mean “impossible,” and it does not prove that P differs from NP. It tells engineers why approximation, heuristics, exploitable structure, and sometimes exponential search are necessary instead of expecting a known universal efficient algorithm."},"method":{"zh":"多项式时间归约","en":"Polynomial-time reductions"},"artifact":{"zh":"NP 完全性框架","en":"NP-completeness framework"}}],"svgText":["NP-COMPLETENESS","Cook-Levin: every decision problem in NP has a polynomial-time reduction to SAT.","SAT","first NP-complete problem","Clique","Hamiltonian cycle","3-coloring","polynomial-time reductions","Efficient SAT solver => efficient solver for every NP problem"],"svgBytes":2213,"hasViewBox":true,"hasTitle":true,"hasDesc":true,"hasScript":false,"sourceTraceable":true},{"path":"reports/svg-explainer-review/candidates/1973-prolog_query-tree.svg","exists":true,"assetIds":["asset-1973-prolog-query-tree"],"roles":["architecture-explainer"],"captions":{"zh":["查询证明树"],"en":["Query proof tree"]},"subcaptions":{"zh":["PROLOG 的本地重绘图，依据页面列出的来源材料制作。"],"en":["Local redraw for PROLOG, based on the listed source material."]},"rightsStatuses":["documented-in-legacy"],"sourceIds":["source-the-birth-of-prolog"],"sources":[{"id":"source-the-birth-of-prolog","type":"paper-page","reliability":"secondary","title":{"zh":"Prolog 的诞生","en":"The Birth of Prolog"},"url":"https://doi.org/10.1145/155360.155362"}],"variantSourceIds":["source-prolog-heritage","source-swi-prolog-documentation","source-the-birth-of-prolog"],"variantSources":[{"id":"source-the-birth-of-prolog","type":"paper-page","reliability":"secondary","title":{"zh":"Prolog 的诞生","en":"The Birth of Prolog"},"url":"https://doi.org/10.1145/155360.155362"},{"id":"source-prolog-heritage","type":"archive","reliability":"secondary","title":{"zh":"Prolog Heritage","en":"Prolog Heritage"},"url":"https://www.prolog-heritage.org/en/Prolog_50.html"},{"id":"source-swi-prolog-documentation","type":"documentation","reliability":"reference-only","title":{"zh":"SWI-Prolog 文档","en":"SWI-Prolog documentation"},"url":"https://www.swi-prolog.org/pldoc/doc_for?object=manual"}],"usages":[{"storylineId":"bench-council-ai100","storylineTitle":{"zh":"AI 百大成就（BenchCouncil）","en":"AI Top 100 Achievements (BenchCouncil)"},"eventId":"1973-prolog","eventTitle":{"zh":"PROLOG","en":"PROLOG"},"variant":"bench-council-ai100","variantFile":"archive/events/1973-prolog/variants/bench-council-ai100.json","visual":"prolog","demoImage":"","description":{"zh":"阿兰·科尔梅罗尔及其马赛团队在 1970 年代初开发 Prolog，并受到罗伯特·科瓦尔斯基逻辑程序设计思想的影响。程序由事实和规则组成，用户提出查询后，系统通过合一匹配变量，并沿规则建立证明；当路径失败时，它回溯到较早选择继续搜索。 这种声明式方式让程序员主要描述“哪些关系成立”，而把部分执行顺序交给推理引擎。Prolog 很快用于自然语言处理、专家系统、定理证明和知识表示，也暴露了搜索顺序和控制策略对实际性能的重要性。它证明逻辑不只是说明语言，也可以成为可运行的程序设计基础。","en":"Alain Colmerauer and his Marseille group developed Prolog in the early 1970s, influenced by Robert Kowalski's ideas about logic programming. A program consists of facts and rules. When a user poses a query, the system uses unification to match variables and constructs a proof through the rules; if a path fails, it backtracks to an earlier choice and continues searching. This declarative style lets programmers describe primarily which relations hold while leaving part of the execution order to the inference engine. Prolog was soon used for natural-language processing, expert systems, theorem proving, and knowledge representation, while also revealing how strongly search order and control strategy affect performance. It demonstrated that logic could serve not only as a specification language but as an executable programming foundation."},"method":{"zh":"Horn 子句上的合一与回溯","en":"Unification plus backtracking over Horn clauses"},"artifact":{"zh":"逻辑程序设计语言","en":"Logic programming language"}}],"svgText":["PROLOG query tree","ancestor(X,Y)?","parent(X,Y)","parent(X,Z),","ancestor(Z,Y)","backtrack choice point"],"svgBytes":1033,"hasViewBox":true,"hasTitle":false,"hasDesc":false,"hasScript":false,"sourceTraceable":true},{"path":"reports/svg-explainer-review/candidates/1974-frame_slot-card.svg","exists":true,"assetIds":["asset-1974-frame-slot-card"],"roles":["architecture-explainer"],"captions":{"zh":["槽与默认值框架卡"],"en":["Slot-default frame card"]},"subcaptions":{"zh":["框架 的本地重绘图，依据页面列出的来源材料制作。"],"en":["Local redraw for Frame, based on the listed source material."]},"rightsStatuses":["documented-in-legacy"],"sourceIds":["source-a-framework-for-representing-knowledge"],"sources":[{"id":"source-a-framework-for-representing-knowledge","type":"paper","reliability":"primary","title":{"zh":"《表示知识的一种框架》","en":"A Framework for Representing Knowledge"},"url":"https://courses.media.mit.edu/2004spring/mas966/Minsky%201974%20Framework%20for%20knowledge.pdf"}],"variantSourceIds":["source-a-framework-for-representing-knowledge","source-frame-mit-ai-memo-bibliographic-record","source-marvin-minsky-obituary-mit-news"],"variantSources":[{"id":"source-a-framework-for-representing-knowledge","type":"paper","reliability":"primary","title":{"zh":"《表示知识的一种框架》","en":"A Framework for Representing Knowledge"},"url":"https://courses.media.mit.edu/2004spring/mas966/Minsky%201974%20Framework%20for%20knowledge.pdf"},{"id":"source-marvin-minsky-obituary-mit-news","type":"news","reliability":"reference-only","title":{"zh":"马文·明斯基讣告，麻省理工学院新闻","en":"Marvin Minsky obituary, MIT News"},"url":"https://news.mit.edu/2016/marvin-minsky-obituary-0125"},{"id":"source-frame-mit-ai-memo-bibliographic-record","type":"paper-index","reliability":"reference-only","title":{"zh":"框架论文：麻省理工学院 AI 备忘录书目记录","en":"Frame, MIT AI memo bibliographic record"},"url":"https://dspace.mit.edu/handle/1721.1/6089"}],"usages":[{"storylineId":"bench-council-ai100","storylineTitle":{"zh":"AI 百大成就（BenchCouncil）","en":"AI Top 100 Achievements (BenchCouncil)"},"eventId":"1974-frame","eventTitle":{"zh":"框架","en":"Frame"},"variant":"bench-council-ai100","variantFile":"archive/events/1974-frame/variants/bench-council-ai100.json","visual":"frame","demoImage":"","description":{"zh":"马文·明斯基在 1974 年提出框架表示，把对典型对象、场景或事件的知识组织成结构化单元。一个框架包含描述属性的槽、常见情况下采用的默认值、槽之间的约束，以及在信息缺失或变化时触发的过程；新情境可以通过实例化和调整既有框架来理解。 这种方法强调知识不是互不相干的事实集合，而是带有预期和上下文的整体。框架影响了语义网络、脚本、专家系统和面向对象知识表示，也暴露出默认推理与例外处理的困难。它的核心遗产是让 AI 明确表示“通常会发生什么”，而不仅是记录确定事实。","en":"Marvin Minsky proposed frame representation in 1974 to organize knowledge about stereotyped objects, scenes, or events into structured units. A frame contains slots for attributes, default values used in ordinary cases, constraints among slots, and procedures triggered when information is missing or changes. A new situation can be interpreted by instantiating and modifying an existing frame. The proposal treated knowledge not as an unrelated collection of facts but as a contextual whole containing expectations. Frames influenced semantic networks, scripts, expert systems, and object-oriented knowledge representation, while exposing difficult questions about defaults and exceptions. Their central legacy is the attempt to represent what normally happens, not only what is known with certainty."},"method":{"zh":"带默认值和继承的槽结构","en":"Structured slots with defaults and inheritance"},"artifact":{"zh":"框架知识表示","en":"Frame representation"}}],"svgText":["Frame slots, defaults and exceptions","BIRD FRAME","parts: wings, beak","covering: feathers","can-fly: default yes","legs: default 2","PENGUIN FRAME","inherits: BIRD","can-fly: no (override)","swims: yes","Conceptual redraw of frame inheritance: defaults flow to subframes unless an explicit value overrides them."],"svgBytes":1718,"hasViewBox":true,"hasTitle":true,"hasDesc":true,"hasScript":false,"sourceTraceable":true},{"path":"reports/svg-explainer-review/candidates/1988-td-update_error-meter.svg","exists":true,"assetIds":["asset-1988-td-update-error-meter"],"roles":["architecture-explainer"],"captions":{"zh":["TD 误差仪表"],"en":["TD error meter"]},"subcaptions":{"zh":["时序差分更新 的本地重绘图，依据页面列出的来源材料制作。"],"en":["Local redraw for Temporal-Difference Update, based on the listed source material."]},"rightsStatuses":["documented-in-legacy"],"sourceIds":["source-learning-to-predict-by-the-methods-of-temporal-differences"],"sources":[{"id":"source-learning-to-predict-by-the-methods-of-temporal-differences","type":"paper","reliability":"primary","title":{"zh":"《利用时序差分方法学习预测》","en":"Learning to Predict by the Methods of Temporal Differences"},"url":"https://doi.org/10.1007/BF00115009"}],"variantSourceIds":["source-acm-2024-turing-award-announcement","source-learning-to-predict-by-the-methods-of-temporal-differences","source-richard-sutton-homepage"],"variantSources":[{"id":"source-learning-to-predict-by-the-methods-of-temporal-differences","type":"paper","reliability":"primary","title":{"zh":"《利用时序差分方法学习预测》","en":"Learning to Predict by the Methods of Temporal Differences"},"url":"https://doi.org/10.1007/BF00115009"},{"id":"source-richard-sutton-homepage","type":"personal-page","reliability":"primary","title":{"zh":"理查德·萨顿个人主页","en":"Richard Sutton personal homepage"},"url":"http://incompleteideas.net/"},{"id":"source-acm-2024-turing-award-announcement","type":"news","reliability":"reference-only","title":{"zh":"ACM 2024 图灵 Award announcement","en":"ACM 2024 Turing Award announcement"},"url":"https://awards.acm.org/about/2024-turing"}],"usages":[{"storylineId":"bench-council-ai100","storylineTitle":{"zh":"AI 百大成就（BenchCouncil）","en":"AI Top 100 Achievements (BenchCouncil)"},"eventId":"1988-td-update","eventTitle":{"zh":"时序差分更新","en":"Temporal-Difference Update"},"variant":"bench-council-ai100","variantFile":"archive/events/1988-td-update/variants/bench-council-ai100.json","visual":"td","demoImage":"","description":{"zh":"理查德·萨顿在 1988 年系统化时序差分学习，让智能体能够在序列尚未结束时更新对未来回报的预测。TD 更新把当前价值估计向“即时奖励 + 下一状态的估计价值”移动，因此同时利用真实经验和已有预测进行自举，而不必像蒙特卡洛方法那样等待最终结果。 这种在线、逐步更新方式适合持续交互，并把动态规划与从样本学习连接起来。TD 误差后来成为 Q-learning、SARSA、actor-critic 和许多深度强化学习算法的核心信号。自举也可能传播估计偏差，与函数逼近和离策略学习结合时还会带来稳定性挑战。","en":"Richard Sutton systematized temporal-difference learning in 1988 so an agent could update predictions of future return before a sequence had ended. A TD update moves the current value estimate toward the immediate reward plus the estimated value of the next state, bootstrapping from both observed experience and an existing prediction rather than waiting for a final outcome as Monte Carlo methods do. This online, step-by-step process suits continuing interaction and connects ideas from dynamic programming with learning from samples. The TD error later became a central signal in Q-learning, SARSA, actor-critic methods, and much of deep reinforcement learning. Bootstrapping can also propagate estimation error and creates important stability challenges when combined with function approximation and off-policy learning."},"method":{"zh":"自举式价值预测","en":"Bootstrapped value prediction"},"artifact":{"zh":"TD 学习更新规则","en":"TD learning update rule"}},{"storylineId":"gaming-ai","storylineTitle":{"zh":"AI 在棋牌与博弈论的演进","en":"AI in Board & Tabletop Games"},"eventId":"1988-td-update","eventTitle":{"zh":"时序差分更新","en":"Temporal-Difference Update"},"variant":"gaming-ai","variantFile":"archive/events/1988-td-update/variants/gaming-ai.json","visual":"td","demoImage":"","description":{"zh":"时序差分学习为强化学习提供了一种从经验中学习预测的紧凑方法。TD 方法不必等到最终结果，而是用下一步奖励和下一步预测来更新价值估计。这种自举思想支撑了 TD-Gammon、Q-learning 和 actor-critic 等后续算法。","en":"Temporal-difference learning gave reinforcement learning a compact way to learn predictions from experience. Instead of waiting for a final outcome, TD methods update value estimates using the next reward and the next prediction. This bootstrapping idea sits behind many later algorithms, including TD-Gammon, Q-learning, and actor-critic methods."},"method":{"zh":"自举式价值预测","en":"Bootstrapped value prediction"},"artifact":{"zh":"TD 学习更新规则","en":"TD learning update rule"}}],"svgText":["TD error meter","TD error","prediction shift","local redrawn explainer"],"svgBytes":1052,"hasViewBox":true,"hasTitle":false,"hasDesc":false,"hasScript":false,"sourceTraceable":true},{"path":"reports/svg-explainer-review/candidates/1989-lenet_zip-code-cnn.svg","exists":true,"assetIds":["asset-1989-lenet-zip-code-cnn"],"roles":["architecture-explainer"],"captions":{"zh":["邮编 CNN 流程"],"en":["ZIP-code CNN pipeline"]},"subcaptions":{"zh":["关于 LeNet 式识别的本地原创解释图。"],"en":["Original local explainer of LeNet-style recognition."]},"rightsStatuses":["documented-in-legacy"],"sourceIds":["source-backpropagation-applied-to-handwritten-zip-code-recognition"],"sources":[{"id":"source-backpropagation-applied-to-handwritten-zip-code-recognition","type":"paper","reliability":"primary","title":{"zh":"《反向传播应用于手写邮编识别》","en":"Backpropagation Applied to Handwritten Zip Code Recognition"},"url":"https://doi.org/10.1162/neco.1989.1.4.541"}],"variantSourceIds":["source-backpropagation-applied-to-handwritten-zip-code-recognition","source-gradient-based-learning-applied-to-document-recognition","source-lenet-5-demos-and-documentation","source-yann-lecun-s-home-page"],"variantSources":[{"id":"source-backpropagation-applied-to-handwritten-zip-code-recognition","type":"paper","reliability":"primary","title":{"zh":"《反向传播应用于手写邮编识别》","en":"Backpropagation Applied to Handwritten Zip Code Recognition"},"url":"https://doi.org/10.1162/neco.1989.1.4.541"},{"id":"source-lenet-5-demos-and-documentation","type":"project-page","reliability":"primary","title":{"zh":"LeNet-5 演示与文档","en":"LeNet-5 demos and documentation"},"url":"https://yann.lecun.com/exdb/lenet/"},{"id":"source-gradient-based-learning-applied-to-document-recognition","type":"paper","reliability":"secondary","title":{"zh":"《基于梯度的文档识别学习》","en":"Gradient-Based Learning Applied to Document Recognition"},"url":"https://vision.stanford.edu/cs598_spring07/papers/Lecun98.pdf"},{"id":"source-yann-lecun-s-home-page","type":"personal-page","reliability":"primary","title":{"zh":"扬·勒昆个人主页","en":"Yann LeCun personal homepage"},"url":"https://yann.lecun.com/"}],"usages":[{"storylineId":"bench-council-ai100","storylineTitle":{"zh":"AI 百大成就（BenchCouncil）","en":"AI Top 100 Achievements (BenchCouncil)"},"eventId":"1989-cnn","eventTitle":{"zh":"卷积神经网络与 LeNet","en":"Convolutional Networks and LeNet"},"variant":"bench-council-ai100","variantFile":"archive/events/1989-cnn/variants/bench-council-ai100.json","visual":"lenet","demoImage":"resources/images/bench-council-ai100/explainers/1989-lenet_zip-code-cnn.svg","description":{"zh":"勒昆及合作者在 1989 年证明，用反向传播训练的卷积神经网络可以识别手写邮政编码。局部感受野只连接图像的小区域，共享权重让同一特征检测器在不同位置重复使用，逐层下采样则降低对微小位移的敏感性；整个系统从像素到类别共同训练。 后来形成的 LeNet-5 把卷积、子采样和分类器整合为文档识别流水线，并实际用于支票和邮政字符处理。这一技术路线以较少参数利用图像的空间结构，取代大量手工特征。它在 2012 年规模化 CNN 浪潮之前，已证明端到端卷积学习具有工程价值。","en":"Yann LeCun and colleagues showed in 1989 that a convolutional neural network trained with backpropagation could recognize handwritten ZIP codes. Local receptive fields connect only to small image regions, shared weights reuse the same feature detector across positions, and progressive subsampling reduces sensitivity to small shifts. The complete system is trained jointly from pixels to classes. The later LeNet-5 architecture integrated convolution, subsampling, and classification into a document-recognition pipeline used for checks and postal characters. This line of work exploited image structure with relatively few parameters and replaced extensive hand-designed features. Long before the scaled CNN wave of 2012, it demonstrated that end-to-end convolutional learning could deliver practical engineering value."},"method":{"zh":"卷积字符识别","en":"Convolutional character recognition"},"artifact":{"zh":"LeNet 手写数字网络","en":"LeNet handwritten digit network"}},{"storylineId":"deep-learning","storylineTitle":{"zh":"深度学习分支","en":"Deep Learning"},"eventId":"1989-cnn","eventTitle":{"zh":"卷积神经网络与 LeNet","en":"Convolutional Networks and LeNet"},"variant":"deep-learning","variantFile":"archive/events/1989-cnn/variants/deep-learning.json","visual":"lenet","demoImage":"resources/images/bench-council-ai100/explainers/1989-lenet_zip-code-cnn.svg","description":{"zh":"1989 年，扬·勒昆及合作者发表手写邮政编码识别研究，证明带有局部连接和共享权重的多层网络可以用反向传播端到端训练。卷积层在图像不同位置重复使用同一组滤波器，既减少参数，也让模型能够识别平移后仍相似的笔画结构。 这条路线后来发展为 LeNet-5，并在银行支票和文档识别中得到实际应用。CNN 把特征提取与分类放进同一个学习系统，取代了大量手工设计视觉特征的步骤，为 AlexNet 之后的大规模图像识别奠定了直接的架构基础。","en":"In 1989, Yann LeCun and collaborators published a system for handwritten ZIP-code recognition, showing that a multilayer network with local connections and shared weights could be trained end to end with backpropagation. Convolutional layers reused the same filters across image locations, reducing the number of parameters while detecting similar strokes after small shifts. This line of work later matured into LeNet-5 and practical systems for reading bank checks and other documents. CNNs placed feature extraction and classification inside one learned pipeline, reducing dependence on hand-engineered visual features. The architecture became the direct foundation for the large-scale image-recognition systems that followed AlexNet."},"method":{"zh":"卷积字符识别","en":"Convolutional character recognition"},"artifact":{"zh":"LeNet 手写数字网络","en":"LeNet handwritten digit network"}}],"svgText":["LeNet handwriting recognition pipeline","5","features","digit","Convolution and pooling turn a ZIP-code crop","into a digit-class prediction."],"svgBytes":1608,"hasViewBox":true,"hasTitle":false,"hasDesc":false,"hasScript":false,"sourceTraceable":true},{"path":"reports/svg-explainer-review/candidates/1990-otter_given-clause.svg","exists":true,"assetIds":["asset-1990-otter-given-clause"],"roles":["architecture-explainer"],"captions":{"zh":["given-clause 证明循环"],"en":["Given-clause proof loop"]},"subcaptions":{"zh":["依据 OTTER 3.3 参考手册 制作的本地解释图。"],"en":["Original local explainer based on OTTER 3.3 Reference Manual."]},"rightsStatuses":["documented-in-legacy"],"sourceIds":["source-otter-3-3-reference-manual"],"sources":[{"id":"source-otter-3-3-reference-manual","type":"documentation","reliability":"primary","title":{"zh":"OTTER 3.3 参考手册","en":"OTTER 3.3 Reference Manual"},"url":"https://arxiv.org/abs/cs/0310056"}],"variantSourceIds":["source-a-spectrum-of-applications-of-automated-reasoning","source-checking-clinical-guidelines-using-automated-reasoning-tools","source-otter-3-3-reference-manual"],"variantSources":[{"id":"source-otter-3-3-reference-manual","type":"documentation","reliability":"primary","title":{"zh":"OTTER 3.3 参考手册","en":"OTTER 3.3 Reference Manual"},"url":"https://arxiv.org/abs/cs/0310056"},{"id":"source-a-spectrum-of-applications-of-automated-reasoning","type":"paper","reliability":"secondary","title":{"zh":"《自动推理应用谱系》","en":"A Spectrum of Applications of Automated Reasoning"},"url":"https://arxiv.org/abs/cs/0205078"},{"id":"source-checking-clinical-guidelines-using-automated-reasoning-tools","type":"paper","reliability":"secondary","title":{"zh":"《使用自动推理工具检查临床指南》","en":"Checking Clinical Guidelines using Automated Reasoning Tools"},"url":"https://arxiv.org/abs/0806.0250"}],"usages":[{"storylineId":"bench-council-ai100","storylineTitle":{"zh":"AI 百大成就（BenchCouncil）","en":"AI Top 100 Achievements (BenchCouncil)"},"eventId":"1990-otter","eventTitle":{"zh":"Otter 自动定理证明器","en":"Otter"},"variant":"bench-council-ai100","variantFile":"archive/events/1990-otter/variants/bench-council-ai100.json","visual":"otter","demoImage":"resources/images/bench-council-ai100/explainers/1990-otter_clause-index.svg","description":{"zh":"威廉·麦丘恩在阿贡国家实验室开发 OTTER，使一阶逻辑和等式推理的高性能自动证明成为研究者可实际使用的工具。系统结合归结、超归结和参数调解，并用项索引快速寻找可匹配公式；given-clause 循环则从待处理集合中逐步选择子句，生成新的推论。 用户可以通过权重、优先级和推理规则控制庞大证明空间中的搜索，使 OTTER 既适合逻辑实验，也能处理代数和组合数学问题。它体现了自动推理从单一算法走向成熟软件系统的阶段，并为 McCune 后续的 Prover9 等证明器积累了工程基础。","en":"William McCune developed OTTER at Argonne National Laboratory as a practical high-performance tool for automated reasoning in first-order logic with equality. It combined resolution, hyperresolution, and paramodulation, while term indexing rapidly found formulas that could match. A given-clause loop repeatedly selected a clause from the pending set and generated new consequences. Users could guide the enormous proof space through weights, priorities, and inference settings, making OTTER useful both for logic experiments and for problems in algebra and combinatorial mathematics. It marked a stage when automated reasoning became a mature software-engineering discipline rather than a single proof rule and provided an engineering foundation for McCune's later systems such as Prover9."},"method":{"zh":"given-clause 归结与参数调解","en":"Given-clause resolution and paramodulation"},"artifact":{"zh":"Otter 定理证明器","en":"Otter theorem prover"}}],"svgText":["Given-clause proof loop","given-clause 证明循环","usable clauses","selected clause","new consequences","Otter · local original explainer"],"svgBytes":1722,"hasViewBox":true,"hasTitle":true,"hasDesc":true,"hasScript":false,"sourceTraceable":true},{"path":"reports/svg-explainer-review/candidates/1996-lasso_l1-constraint.svg","exists":true,"assetIds":["asset-1996-lasso-l1-constraint"],"roles":["architecture-explainer"],"captions":{"zh":["L1 约束几何"],"en":["L1 constraint geometry"]},"subcaptions":{"zh":["Lasso 回归 的独立本地重画，依据相关来源材料制作。"],"en":["Distinct local redraw for Lasso, based on the related source material."]},"rightsStatuses":["documented-in-legacy"],"sourceIds":["source-regression-shrinkage-and-selection-via-the-lasso"],"sources":[{"id":"source-regression-shrinkage-and-selection-via-the-lasso","type":"paper","reliability":"primary","title":{"zh":"《通过 Lasso 进行回归收缩与选择》","en":"Regression Shrinkage and Selection via the Lasso"},"url":"https://rss.onlinelibrary.wiley.com/doi/10.1111/j.2517-6161.1996.tb02080.x"}],"variantSourceIds":["source-glmnet-project","source-regression-shrinkage-and-selection-via-the-lasso","source-scikit-learn-lasso"],"variantSources":[{"id":"source-regression-shrinkage-and-selection-via-the-lasso","type":"paper","reliability":"primary","title":{"zh":"《通过 Lasso 进行回归收缩与选择》","en":"Regression Shrinkage and Selection via the Lasso"},"url":"https://rss.onlinelibrary.wiley.com/doi/10.1111/j.2517-6161.1996.tb02080.x"},{"id":"source-scikit-learn-lasso","type":"documentation","reliability":"reference-only","title":{"zh":"scikit-learn Lasso","en":"scikit-learn Lasso"},"url":"https://scikit-learn.org/stable/modules/generated/sklearn.linear_model.Lasso.html"},{"id":"source-glmnet-project","type":"project-page","reliability":"secondary","title":{"zh":"glmnet project","en":"glmnet project"},"url":"https://glmnet.stanford.edu/"}],"usages":[{"storylineId":"bench-council-ai100","storylineTitle":{"zh":"AI 百大成就（BenchCouncil）","en":"AI Top 100 Achievements (BenchCouncil)"},"eventId":"1996-lasso","eventTitle":{"zh":"Lasso 回归","en":"Lasso"},"variant":"bench-council-ai100","variantFile":"archive/events/1996-lasso/variants/bench-council-ai100.json","visual":"lasso","demoImage":"","description":{"zh":"罗伯特·蒂布希拉尼在 1996 年提出 Lasso，把回归误差与系数绝对值之和构成的 L1 惩罚结合起来。惩罚会同时收缩系数，并让其中一部分精确变为零，因此模型在拟合数据的同时完成变量选择；调节参数控制预测拟合与稀疏程度之间的平衡。 Lasso 把正则化、可解释性和高维建模连接成一种简单的凸优化方法，广泛影响基因组学、信号处理和透明预测模型。它在高度相关的变量之间可能选择不稳定，也不保证识别真实因果因素，但“通过惩罚获得稀疏结构”的思想成为现代统计学习的重要原则。","en":"Robert Tibshirani introduced the Lasso in 1996 by combining regression error with an L1 penalty on the absolute values of the coefficients. The penalty both shrinks coefficients and drives some exactly to zero, so the model performs variable selection while fitting the data. A tuning parameter controls the balance between predictive fit and sparsity. The Lasso connected regularization, interpretability, and high-dimensional modeling in a comparatively simple convex optimization problem, influencing genomics, signal processing, and transparent prediction. Its selections can be unstable among strongly correlated variables, and selected features are not automatically causal. Even so, the principle of using a penalty to discover sparse structure became central to modern statistical learning."},"method":{"zh":"L1 正则化回归与选择","en":"L1-regularized regression and selection"},"artifact":{"zh":"最小绝对收缩与选择算子","en":"Least absolute shrinkage and selection operator"}}],"svgText":["L1 constraint geometry","L1 约束几何","L1 · local redraw from source material"],"svgBytes":1116,"hasViewBox":true,"hasTitle":true,"hasDesc":true,"hasScript":false,"sourceTraceable":true},{"path":"reports/svg-explainer-review/candidates/1997-lstm_gated-memory.svg","exists":true,"assetIds":["asset-1997-lstm-gated-memory"],"roles":["architecture-explainer"],"captions":{"zh":["LSTM 门控记忆单元"],"en":["LSTM gated memory cell"]},"subcaptions":{"zh":["关于门控序列记忆的本地原创解释图。"],"en":["Original local explainer of gated sequence memory."]},"rightsStatuses":["documented-in-legacy"],"sourceIds":["source-long-short-term-memory"],"sources":[{"id":"source-long-short-term-memory","type":"paper","reliability":"primary","title":{"zh":"《长短期记忆》","en":"Long Short-Term Memory"},"url":"https://doi.org/10.1162/neco.1997.9.8.1735"}],"variantSourceIds":["source-author-hosted-lstm-paper-pdf","source-long-short-term-memory","source-lstm-overview","source-sepp-hochreiter-profile"],"variantSources":[{"id":"source-long-short-term-memory","type":"paper","reliability":"primary","title":{"zh":"《长短期记忆》","en":"Long Short-Term Memory"},"url":"https://doi.org/10.1162/neco.1997.9.8.1735"},{"id":"source-author-hosted-lstm-paper-pdf","type":"paper-file","reliability":"secondary","title":{"zh":"作者托管的 LSTM 论文 PDF","en":"Author-hosted LSTM paper PDF"},"url":"https://www.bioinf.jku.at/publications/older/2604.pdf"},{"id":"source-lstm-overview","type":"encyclopedia-entry","reliability":"reference-only","title":{"zh":"LSTM 概览","en":"LSTM overview"},"url":"https://en.wikipedia.org/wiki/Long_short-term_memory"},{"id":"source-sepp-hochreiter-profile","type":"profile","reliability":"reference-only","title":{"zh":"塞普·霍赫赖特个人资料","en":"Sepp Hochreiter profile"},"url":"https://www.jku.at/en/institute-for-machine-learning/about-us/team/sepp-hochreiter/"}],"usages":[{"storylineId":"bench-council-ai100","storylineTitle":{"zh":"AI 百大成就（BenchCouncil）","en":"AI Top 100 Achievements (BenchCouncil)"},"eventId":"1997-lstm","eventTitle":{"zh":"LSTM 与门控记忆","en":"LSTM and Gated Memory"},"variant":"bench-council-ai100","variantFile":"archive/events/1997-lstm/variants/bench-council-ai100.json","visual":"lstm","demoImage":"resources/images/bench-council-ai100/explainers/1997-lstm_gated-memory.svg","description":{"zh":"霍赫赖特和施密德胡伯在 1997 年提出 LSTM，缓解循环神经网络在长序列上梯度消失或爆炸的问题。核心记忆单元通过近似恒定的自连接让误差信号沿时间传播，输入门控制何时写入，输出门控制何时读取，从而把短期计算与较长期状态分开。 原始 LSTM 并不包含后来标准架构中的遗忘门；遗忘机制由后续工作加入，使网络可以主动清除旧状态。LSTM 及其变体曾广泛用于语音识别、翻译、手写识别和时间序列，在注意力模型占据主导前，使长距离序列学习成为实用技术，并确立门控信息流的设计范式。","en":"Sepp Hochreiter and Jürgen Schmidhuber introduced LSTM in 1997 to address vanishing or exploding gradients across long recurrent sequences. Its central memory cell uses an approximately constant self-connection so error signals can travel through time. An input gate controls when information is written, and an output gate controls when it is read, separating short-term computation from longer-lived state. The original LSTM did not contain the forget gate found in later standard architectures; subsequent work added forgetting so the network could actively clear obsolete state. LSTM variants became widely used in speech recognition, translation, handwriting recognition, and time-series modeling. Before attention models became dominant, they made long-range sequence learning practical and established gated information flow as a durable design pattern."},"method":{"zh":"门控循环记忆","en":"Gated recurrent memory"},"artifact":{"zh":"LSTM 单元","en":"LSTM cell"}},{"storylineId":"deep-learning","storylineTitle":{"zh":"深度学习分支","en":"Deep Learning"},"eventId":"1997-lstm","eventTitle":{"zh":"LSTM 与门控记忆","en":"LSTM and Gated Memory"},"variant":"deep-learning","variantFile":"archive/events/1997-lstm/variants/deep-learning.json","visual":"lstm","demoImage":"resources/images/bench-council-ai100/explainers/1997-lstm_gated-memory.svg","description":{"zh":"1997 年，塞普·霍赫赖特和于尔根·施密德胡伯提出长短期记忆网络，针对普通循环网络在长序列训练中容易出现的梯度衰减问题。原始 LSTM 通过记忆单元、输入门和输出门控制信息写入与读取，并用近似恒定的误差通路让学习信号跨越更多时间步。 后续版本又加入遗忘门，使模型能够主动清除不再需要的状态。LSTM 因而成为语音识别、手写识别、机器翻译和时间序列建模的核心架构之一，也说明在注意力机制普及之前，门控状态可以有效延长神经网络的记忆范围。","en":"In 1997, Sepp Hochreiter and Juergen Schmidhuber introduced long short-term memory to address the decay of learning signals in ordinary recurrent networks. The original LSTM used memory cells with input and output gates to control writing and reading, together with a nearly constant error path that allowed useful gradients to cross many more time steps. Later variants added a forget gate so the network could actively discard obsolete state. LSTM consequently became a core architecture for speech recognition, handwriting recognition, machine translation, and time-series modeling. Before attention mechanisms became dominant, it showed that gated state could substantially extend the practical memory of a neural network."},"method":{"zh":"门控循环记忆","en":"Gated recurrent memory"},"artifact":{"zh":"LSTM 单元","en":"LSTM cell"}}],"svgText":["Original 1997 LSTM cell","Input gate + constant error carousel + output gate","input","gate","cell","state","output","gate","No forget gate in the 1997 architecture; that gate was introduced in later LSTM variants."],"svgBytes":2118,"hasViewBox":true,"hasTitle":true,"hasDesc":true,"hasScript":false,"sourceTraceable":true},{"path":"reports/svg-explainer-review/candidates/1999-nmf_parts-factorization.svg","exists":true,"assetIds":["asset-1999-nmf-parts-factorization"],"roles":["architecture-explainer"],"captions":{"zh":["基于部件的分解"],"en":["Parts-based factorization"]},"subcaptions":{"zh":["关于非负部件分解的本地原创解释图。"],"en":["Original local explainer of nonnegative parts-based factorization."]},"rightsStatuses":["documented-in-legacy"],"sourceIds":["source-learning-the-parts-of-objects-by-non-negative-matrix-factorization"],"sources":[{"id":"source-learning-the-parts-of-objects-by-non-negative-matrix-factorization","type":"paper","reliability":"primary","title":{"zh":"《通过非负矩阵分解学习物体部件》","en":"Learning the parts of objects by non-negative matrix factorization"},"url":"https://doi.org/10.1038/44565"}],"variantSourceIds":["source-learning-the-parts-of-objects-by-non-negative-matrix-factorization","source-nature-article-page","source-pubmed-record-for-the-nature-paper","source-scikit-learn-nmf-documentation"],"variantSources":[{"id":"source-learning-the-parts-of-objects-by-non-negative-matrix-factorization","type":"paper","reliability":"primary","title":{"zh":"《通过非负矩阵分解学习物体部件》","en":"Learning the parts of objects by non-negative matrix factorization"},"url":"https://doi.org/10.1038/44565"},{"id":"source-nature-article-page","type":"paper-page","reliability":"reference-only","title":{"zh":"Nature 文章页面","en":"Nature article page"},"url":"https://www.nature.com/articles/44565"},{"id":"source-pubmed-record-for-the-nature-paper","type":"paper-index","reliability":"secondary","title":{"zh":"Nature 论文 PubMed 记录","en":"PubMed record for the Nature paper"},"url":"https://pubmed.ncbi.nlm.nih.gov/10548103/"},{"id":"source-scikit-learn-nmf-documentation","type":"documentation","reliability":"reference-only","title":{"zh":"scikit-learn NMF 文档","en":"scikit-learn NMF documentation"},"url":"https://scikit-learn.org/stable/modules/decomposition.html#nmf"}],"usages":[{"storylineId":"bench-council-ai100","storylineTitle":{"zh":"AI 百大成就（BenchCouncil）","en":"AI Top 100 Achievements (BenchCouncil)"},"eventId":"ai100-1999-nmf","eventTitle":{"zh":"非负矩阵分解","en":"NMF"},"variant":"bench-council-ai100","variantFile":"archive/events/ai100-1999-nmf/variants/bench-council-ai100.json","visual":"nmf","demoImage":"resources/images/bench-council-ai100/explainers/1999-nmf_parts-factorization.svg","description":{"zh":"李和承在 1999 年展示非负矩阵分解如何把一个非负数据矩阵近似为两个较小非负矩阵的乘积。由于系数不能通过正负抵消来表达样本，重构只能把若干基础成分相加；在人脸实验中，这些成分常对应眼睛、鼻子等局部部件。 NMF 因此提供了与 PCA 整体正负基向量不同的“部件式”表示，并被用于文本主题、音频分离、生物数据和推荐系统。分解通常不唯一，优化可能停在局部解，部件也并非必然具有语义；但非负约束如何促进稀疏、可解释表示成为重要思想。","en":"Daniel Lee and H. Sebastian Seung showed in 1999 how non-negative matrix factorization approximates a non-negative data matrix as the product of two smaller non-negative matrices. Because coefficients cannot represent an example by canceling positive and negative components, reconstruction must add basis elements together. In face experiments, those elements often corresponded to local parts such as eyes or noses. NMF therefore offered a “parts-based” representation unlike the holistic positive-and-negative directions of PCA and was applied to text topics, audio separation, biological data, and recommendation. A factorization is generally not unique, optimization can stop at local solutions, and learned parts are not guaranteed to have human meaning. Even so, the way non-negativity can encourage sparse, interpretable representation became influential."},"method":{"zh":"非负矩阵分解","en":"Nonnegative matrix factorization"},"artifact":{"zh":"基于部件的表示","en":"Parts-based representation"}}],"svgText":["Nonnegative matrix factorization","V ≈ W × H, with every matrix entry constrained to be nonnegative","data V","≈","basis W","×","weights H","Columns of W act as additive parts; H says how strongly each part is used."],"svgBytes":2081,"hasViewBox":true,"hasTitle":true,"hasDesc":true,"hasScript":false,"sourceTraceable":true},{"path":"reports/svg-explainer-review/candidates/2000-neural-language-model_context-prediction.svg","exists":true,"assetIds":["asset-2000-neural-language-model-context-prediction"],"roles":["architecture-explainer"],"captions":{"zh":["上下文预测"],"en":["Context prediction"]},"subcaptions":{"zh":["关于神经语言建模的本地原创解释图。"],"en":["Original local explainer of neural language modeling."]},"rightsStatuses":["documented-in-legacy"],"sourceIds":["source-a-neural-probabilistic-language-model"],"sources":[{"id":"source-a-neural-probabilistic-language-model","type":"paper","reliability":"primary","title":{"zh":"《神经概率语言模型》","en":"A Neural Probabilistic Language Model"},"url":"https://www.jmlr.org/papers/v3/bengio03a.html"}],"variantSourceIds":["source-a-neural-probabilistic-language-model","source-dblp-record","source-jmlr-full-paper-pdf","source-yoshua-bengio-profile-at-mila"],"variantSources":[{"id":"source-a-neural-probabilistic-language-model","type":"paper","reliability":"primary","title":{"zh":"《神经概率语言模型》","en":"A Neural Probabilistic Language Model"},"url":"https://www.jmlr.org/papers/v3/bengio03a.html"},{"id":"source-jmlr-full-paper-pdf","type":"paper-file","reliability":"secondary","title":{"zh":"JMLR 完整论文 PDF","en":"JMLR full paper PDF"},"url":"https://www.jmlr.org/papers/volume3/bengio03a/bengio03a.pdf"},{"id":"source-dblp-record","type":"paper-index","reliability":"reference-only","title":{"zh":"DBLP 论文记录","en":"DBLP record"},"url":"https://dblp.org/rec/journals/jmlr/BengioDVJ03"},{"id":"source-yoshua-bengio-profile-at-mila","type":"profile","reliability":"reference-only","title":{"zh":"Mila 的约书亚·本吉奥资料","en":"Yoshua Bengio profile at Mila"},"url":"https://mila.quebec/en/directory/yoshua-bengio"}],"usages":[{"storylineId":"bench-council-ai100","storylineTitle":{"zh":"AI 百大成就（BenchCouncil）","en":"AI Top 100 Achievements (BenchCouncil)"},"eventId":"ai100-2000-neural-language-model","eventTitle":{"zh":"神经语言模型","en":"Neural Language Model"},"variant":"bench-council-ai100","variantFile":"archive/events/ai100-2000-neural-language-model/variants/bench-council-ai100.json","visual":"neuralLm","demoImage":"resources/images/bench-council-ai100/explainers/2000-neural-language-model_context-prediction.svg","description":{"zh":"本吉奥等人的神经概率语言模型把固定长度上下文中的每个词映射为可学习稠密向量，再由神经网络预测下一个词的概率。词向量与预测器共同训练，使在不同上下文中作用相似的词共享统计强度，而不必为每个 n-gram 组合单独保存计数。 这种分布式表示缓解了传统语言模型的数据稀疏问题，并把语言建模与表示学习直接连接起来。原始模型仍受固定上下文窗口和大词表 softmax 计算成本限制，但它为 Word2Vec、神经机器翻译和后来的 Transformer 语言模型建立了关键思想：词义可以在预测任务中学习为连续向量。","en":"Yoshua Bengio and colleagues' neural probabilistic language model mapped each word in a fixed-length context to a learned dense vector, then used a neural network to predict the probability of the next word. The embeddings and predictor were trained together, allowing words with similar roles across contexts to share statistical strength instead of storing a separate count for every n-gram combination. This distributed representation reduced the data-sparsity problem of traditional language models and directly connected language modeling with representation learning. The original model still had a fixed context window and an expensive softmax over a large vocabulary. It nevertheless established a key idea for Word2Vec, neural machine translation, and later Transformer language models: word meaning can be learned as continuous vectors through a prediction task."},"method":{"zh":"用于语言预测的分布式词嵌入","en":"Distributed word embeddings for language prediction"},"artifact":{"zh":"神经概率语言模型","en":"Neural probabilistic language model"}}],"svgText":["Neural probabilistic language model","the","cat","sat","shared","embeddings","predict","next word","Sparse words become dense vectors","that support next-word prediction."],"svgBytes":1849,"hasViewBox":true,"hasTitle":false,"hasDesc":false,"hasScript":false,"sourceTraceable":true},{"path":"reports/svg-explainer-review/candidates/2013-dqn_replay-buffer.svg","exists":true,"assetIds":["asset-2013-dqn-replay-buffer"],"roles":["architecture-explainer"],"captions":{"zh":["经验回放池"],"en":["Replay buffer"]},"subcaptions":{"zh":["深度 Q 网络 的本地重绘图，依据页面列出的来源材料制作。"],"en":["Local redraw for Deep Q Network, based on the listed source material."]},"rightsStatuses":["documented-in-legacy"],"sourceIds":["source-playing-atari-with-deep-reinforcement-learning"],"sources":[{"id":"source-playing-atari-with-deep-reinforcement-learning","type":"paper-page","reliability":"primary","title":{"zh":"用深度强化学习玩 Atari","en":"Playing Atari with Deep Reinforcement Learning"},"url":"https://arxiv.org/abs/1312.5602"}],"variantSourceIds":["source-google-deepmind-deep-reinforcement-learning","source-human-level-control-through-deep-reinforcement-learning","source-playing-atari-with-deep-reinforcement-learning"],"variantSources":[{"id":"source-playing-atari-with-deep-reinforcement-learning","type":"paper-page","reliability":"primary","title":{"zh":"用深度强化学习玩 Atari","en":"Playing Atari with Deep Reinforcement Learning"},"url":"https://arxiv.org/abs/1312.5602"},{"id":"source-human-level-control-through-deep-reinforcement-learning","type":"paper","reliability":"primary","title":{"zh":"《通过深度强化学习实现人类水平控制》","en":"Human-level control through deep reinforcement learning"},"url":"https://www.nature.com/articles/nature14236"},{"id":"source-google-deepmind-deep-reinforcement-learning","type":"article","reliability":"secondary","title":{"zh":"谷歌 DeepMind: Deep Reinforcement Learning","en":"Google DeepMind: Deep Reinforcement Learning"},"url":"https://deepmind.google/discover/blog/deep-reinforcement-learning/"}],"usages":[{"storylineId":"bench-council-ai100","storylineTitle":{"zh":"AI 百大成就（BenchCouncil）","en":"AI Top 100 Achievements (BenchCouncil)"},"eventId":"2013-dqn","eventTitle":{"zh":"深度 Q 网络","en":"Deep Q Network"},"variant":"bench-council-ai100","variantFile":"archive/events/2013-dqn/variants/bench-council-ai100.json","visual":"dqn","demoImage":"","description":{"zh":"DeepMind 的 DQN 把卷积神经网络与 Q-learning 结合起来，让智能体直接从 Atari 屏幕像素估计每个动作的长期价值。经验回放随机抽取过去的转移，减少连续样本之间的相关性；固定一段时间的目标网络为自举更新提供较稳定的学习目标。 同一套基本架构在多款游戏中从视觉输入学习策略，证明深度表示可以与强化学习共同工作，而不必为每个游戏手工设计状态特征。DQN 开启深度强化学习的重要浪潮，但仍存在样本效率低、训练不稳定和对奖励设计敏感等问题，后续研究围绕这些限制发展出大量改进。","en":"DeepMind's DQN combined a convolutional neural network with Q-learning so an agent could estimate the long-term value of actions directly from Atari screen pixels. Experience replay sampled past transitions in randomized order, reducing correlations between consecutive observations. A target network held parameters fixed for intervals, providing a more stable target for bootstrapped updates. The same basic architecture learned policies across many games from visual input without hand-designing a separate state representation for each one. DQN became a major bridge from classical reinforcement learning to deep reinforcement learning. It still required large amounts of experience and could be unstable or sensitive to reward design, limitations that motivated a broad family of later improvements."},"method":{"zh":"结合卷积网络、经验回放与目标网络的 Q 学习","en":"Q-learning with convolutional networks, replay, and target networks"},"artifact":{"zh":"能玩 Atari 的深度 Q 网络","en":"Atari-playing Deep Q Network"}},{"storylineId":"gaming-ai","storylineTitle":{"zh":"AI 在棋牌与博弈论的演进","en":"AI in Board & Tabletop Games"},"eventId":"2013-dqn","eventTitle":{"zh":"深度 Q 网络","en":"Deep Q Network"},"variant":"gaming-ai","variantFile":"archive/events/2013-dqn/variants/gaming-ai.json","visual":"dqn","demoImage":"","description":{"zh":"DQN 把深度神经网络与强化学习结合起来，让 Atari 成为标志性基准。智能体用经验回放和目标网络直接从像素学习价值函数，在多款游戏上取得强表现。它成为经典强化学习走向深度强化学习的关键桥梁。","en":"DQN joined deep neural networks with reinforcement learning and made Atari a landmark benchmark. The agent learned values directly from pixels using experience replay and a target network, reaching strong performance across multiple games. It became a central bridge from classic RL to deep RL."},"method":{"zh":"结合卷积网络、经验回放与目标网络的 Q 学习","en":"Q-learning with convolutional networks, replay, and target networks"},"artifact":{"zh":"能玩 Atari 的深度 Q 网络","en":"Atari-playing Deep Q Network"}}],"svgText":["DQN experience replay","s,a,r,s'","s,a,r,s'","s,a,r,s'","s,a,r,s'","s,a,r,s'","sample minibatch"],"svgBytes":1284,"hasViewBox":true,"hasTitle":false,"hasDesc":false,"hasScript":false,"sourceTraceable":true},{"path":"reports/svg-explainer-review/candidates/2014-conditional-gan_conditioned-generator.svg","exists":true,"assetIds":["asset-2014-conditional-gan-conditioned-generator"],"roles":["architecture-explainer"],"captions":{"zh":["Conditional GAN 解释图"],"en":["Conditional GAN explainer"]},"subcaptions":{"zh":["关于该成就流程的本地原创解释图。"],"en":["Original local explainer for the achievement flow."]},"rightsStatuses":["documented-in-legacy"],"sourceIds":["source-conditional-generative-adversarial-nets"],"sources":[{"id":"source-conditional-generative-adversarial-nets","type":"paper","reliability":"primary","title":{"zh":"《条件生成对抗网络》","en":"Conditional Generative Adversarial Nets"},"url":"https://arxiv.org/abs/1411.1784"}],"variantSourceIds":["source-conditional-generative-adversarial-nets","source-generative-adversarial-nets","source-generative-adversarial-network-overview"],"variantSources":[{"id":"source-conditional-generative-adversarial-nets","type":"paper","reliability":"primary","title":{"zh":"《条件生成对抗网络》","en":"Conditional Generative Adversarial Nets"},"url":"https://arxiv.org/abs/1411.1784"},{"id":"source-generative-adversarial-network-overview","type":"encyclopedia-entry","reliability":"reference-only","title":{"zh":"生成对抗网络概览","en":"Generative adversarial network overview"},"url":"https://en.wikipedia.org/wiki/Generative_adversarial_network"},{"id":"source-generative-adversarial-nets","type":"paper","reliability":"primary","title":{"zh":"《生成对抗网络》","en":"Generative Adversarial Nets"},"url":"https://proceedings.neurips.cc/paper/2014/hash/f033ed80deb0234979a61f95710dbe25-Abstract.html"}],"usages":[{"storylineId":"bench-council-ai100","storylineTitle":{"zh":"AI 百大成就（BenchCouncil）","en":"AI Top 100 Achievements (BenchCouncil)"},"eventId":"ai100-2014-conditional-gan","eventTitle":{"zh":"Conditional GAN","en":"Conditional GAN"},"variant":"bench-council-ai100","variantFile":"archive/events/ai100-2014-conditional-gan/variants/bench-council-ai100.json","visual":"configuredPaper","demoImage":"resources/images/bench-council-ai100/explainers/2014-conditional-gan_conditioned-generator.svg","description":{"zh":"米尔扎和奥辛德罗在 2014 年把辅助信息 y 同时输入 GAN 的生成器和判别器。y 可以是类别标签、属性或其他条件：生成器学习在给定条件下产生样本，判别器则判断样本是否真实且与条件匹配，从而把无方向采样变成可控制生成。 原论文用类别控制数字生成，并探索图像与文本表示的条件关系。这个简单扩展成为后来文本到图像、标签到图像和属性编辑的重要基础。条件本身不能保证生成结果完全服从指令，训练仍会继承 GAN 的不稳定和模式覆盖问题，但它确立了“用外部信息控制生成分布”的通用框架。","en":"Mehdi Mirza and Simon Osindero introduced conditional GANs in 2014 by feeding auxiliary information y to both the generator and discriminator. The condition can be a class label, attribute, or other signal. The generator learns to produce a sample under that condition, while the discriminator judges whether the sample is both real and compatible with it, turning undirected sampling into controllable generation. The original work demonstrated class-controlled digit generation and explored conditional relationships between image and text representations. This simple extension became foundational for text-to-image, label-to-image, and attribute-editing systems. A condition does not guarantee perfect instruction following, and training retains GAN instability and mode-coverage problems, but the work established a general framework for controlling a generated distribution with external information."},"method":{"zh":"条件化对抗训练","en":"Conditioned adversarial training"},"artifact":{"zh":"Conditional GAN 公式化方法","en":"Conditional GAN formulation"}}],"svgText":["Conditional GAN","condition label","input","generator","mechanism","conditioned sample","result","Original local SVG redraw; source figures are not copied."],"svgBytes":2393,"hasViewBox":true,"hasTitle":true,"hasDesc":true,"hasScript":false,"sourceTraceable":true},{"path":"reports/svg-explainer-review/candidates/2014-glove_cooccurrence.svg","exists":true,"assetIds":["asset-2014-glove-cooccurrence"],"roles":["architecture-explainer"],"captions":{"zh":["GloVe 解释图"],"en":["GloVe explainer"]},"subcaptions":{"zh":["关于该成就流程的本地原创解释图。"],"en":["Original local explainer for the achievement flow."]},"rightsStatuses":["documented-in-legacy"],"sourceIds":["source-glove-global-vectors-for-word-representation"],"sources":[{"id":"source-glove-global-vectors-for-word-representation","type":"paper","reliability":"primary","title":{"zh":"《GloVe：用于词表示的全局向量》","en":"GloVe: Global Vectors for Word Representation"},"url":"https://aclanthology.org/D14-1162/"}],"variantSourceIds":["source-acl-anthology-pdf","source-glove-global-vectors-for-word-representation","source-stanford-glove-project-page"],"variantSources":[{"id":"source-glove-global-vectors-for-word-representation","type":"paper","reliability":"primary","title":{"zh":"《GloVe：用于词表示的全局向量》","en":"GloVe: Global Vectors for Word Representation"},"url":"https://aclanthology.org/D14-1162/"},{"id":"source-stanford-glove-project-page","type":"project-page","reliability":"secondary","title":{"zh":"斯坦福 GloVe 项目页面","en":"Stanford GloVe project page"},"url":"https://nlp.stanford.edu/projects/glove/"},{"id":"source-acl-anthology-pdf","type":"paper-file","reliability":"secondary","title":{"zh":"ACL Anthology 论文 PDF","en":"ACL Anthology PDF"},"url":"https://aclanthology.org/D14-1162.pdf"}],"usages":[{"storylineId":"bench-council-ai100","storylineTitle":{"zh":"AI 百大成就（BenchCouncil）","en":"AI Top 100 Achievements (BenchCouncil)"},"eventId":"ai100-2014-glove","eventTitle":{"zh":"GloVe","en":"GloVe"},"variant":"bench-council-ai100","variantFile":"archive/events/ai100-2014-glove/variants/bench-council-ai100.json","visual":"configuredPaper","demoImage":"resources/images/bench-council-ai100/explainers/2014-glove_cooccurrence.svg","description":{"zh":"斯坦福团队在 2014 年提出 GloVe，从整个语料库的词共现矩阵学习向量。模型用加权最小二乘目标，使两个词向量的内积逼近其共现次数的对数，并强调共现概率比所携带的语义信息；高频与极低频组合通过权重函数得到平衡。 GloVe 把传统全局计数统计与稠密神经词向量连接起来，训练后可直接用于相似度、分类和其他 NLP 任务。它与 Word2Vec 一样属于静态表示，同一个词在所有上下文中只有一个向量，也会继承语料偏见；但其公开向量长期成为广泛使用的基线。","en":"The Stanford team introduced GloVe in 2014 to learn vectors from a corpus-wide word co-occurrence matrix. A weighted least-squares objective makes the dot product of two word vectors approximate the logarithm of their co-occurrence count, emphasizing semantic information carried by ratios of co-occurrence probabilities. A weighting function balances very frequent and very rare pairs. GloVe connected traditional global count statistics with dense neural-style embeddings, producing vectors that could be reused for similarity, classification, and other NLP tasks. Like Word2Vec, it is a static representation: one word has the same vector in every context, and corpus biases remain embedded. Its openly distributed vectors nevertheless became a widely used and durable baseline."},"method":{"zh":"全局词向量分解","en":"Global word-vector factorization"},"artifact":{"zh":"GloVe 词嵌入","en":"GloVe word embeddings"}}],"svgText":["GloVe","co-occurrence counts","input","weighted least-squares","log-count objective","mechanism","word vectors","result","Original local SVG redraw; source figures are not copied."],"svgBytes":2490,"hasViewBox":true,"hasTitle":true,"hasDesc":true,"hasScript":false,"sourceTraceable":true},{"path":"reports/svg-explainer-review/candidates/2014-vgg_depth-configurations.svg","exists":true,"assetIds":["asset-2014-vgg-depth-configurations"],"roles":["architecture-explainer"],"captions":{"zh":["VGG 深度配置对比"],"en":["VGG depth comparison"]},"subcaptions":{"zh":["VGG 网络 的独立本地重画，依据相关来源材料制作。"],"en":["Distinct local redraw for VGG Networks, based on the related source material."]},"rightsStatuses":["local-redraw"],"sourceIds":["source-very-deep-convolutional-networks-for-large-scale-image-recognition"],"sources":[{"id":"source-very-deep-convolutional-networks-for-large-scale-image-recognition","type":"paper","reliability":"primary","title":{"zh":"《用于大规模图像识别的超深卷积网络》","en":"Very Deep Convolutional Networks for Large-Scale Image Recognition"},"url":"https://arxiv.org/abs/1409.1556"}],"variantSourceIds":["source-oxford-vgg-very-deep-convnets","source-torchvision-vgg-model-family","source-very-deep-convolutional-networks-for-large-scale-image-recognition"],"variantSources":[{"id":"source-very-deep-convolutional-networks-for-large-scale-image-recognition","type":"paper","reliability":"primary","title":{"zh":"《用于大规模图像识别的超深卷积网络》","en":"Very Deep Convolutional Networks for Large-Scale Image Recognition"},"url":"https://arxiv.org/abs/1409.1556"},{"id":"source-oxford-vgg-very-deep-convnets","type":"project-page","reliability":"secondary","title":{"zh":"Oxford VGG Very Deep ConvNets","en":"Oxford VGG Very Deep ConvNets"},"url":"https://www.robots.ox.ac.uk/~vgg/research/very_deep/"},{"id":"source-torchvision-vgg-model-family","type":"documentation","reliability":"reference-only","title":{"zh":"TorchVision VGG 模型系列","en":"TorchVision VGG model family"},"url":"https://pytorch.org/vision/stable/models/vgg.html"}],"usages":[{"storylineId":"bench-council-ai100","storylineTitle":{"zh":"AI 百大成就（BenchCouncil）","en":"AI Top 100 Achievements (BenchCouncil)"},"eventId":"2014-vgg","eventTitle":{"zh":"VGG 网络","en":"VGG Networks"},"variant":"bench-council-ai100","variantFile":"archive/events/2014-vgg/variants/bench-council-ai100.json","visual":"vgg","demoImage":"","description":{"zh":"西莫尼扬和齐瑟曼在 2014 年研究卷积网络深度对大规模图像识别的影响。VGG 用规则化方式反复堆叠 3×3 小卷积与池化层，构成 16 层和 19 层等配置；多个小卷积在扩大有效感受野的同时，引入更多非线性，又让整体架构保持一致。 VGG 在 ImageNet 评测中证明了系统增加深度的价值，其清晰结构和公开模型也使它成为广泛使用的特征提取器与迁移学习基线。它的参数量和计算成本较高，后来被残差网络等更高效架构取代，但“小卷积、深堆叠、统一模块”的设计思想持续影响视觉网络。","en":"Karen Simonyan and Andrew Zisserman studied the effect of convolutional-network depth on large-scale image recognition in 2014. VGG repeatedly stacked small 3×3 convolutions and pooling layers in a regular pattern, producing configurations such as VGG-16 and VGG-19. Several small convolutions enlarged the effective receptive field while adding nonlinearities and keeping the architecture uniform. VGG's ImageNet results demonstrated the value of systematically increasing depth, while its clear structure and released models made it a widely used feature extractor and transfer-learning baseline. Its parameter count and computational cost are high, and more efficient residual architectures later displaced it at the frontier. The principles of small filters, deep stacks, and reusable modules nevertheless remained influential."},"method":{"zh":"由 3x3 卷积堆叠出的很深网络","en":"Very deep stacks of 3x3 convolutions"},"artifact":{"zh":"VGG-16 与 VGG-19 架构","en":"VGG-16 and VGG-19 architectures"}}],"svgText":["VGG depth configurations","按权重层数量比较 VGG-11 / 13 / 16 / 19","11 weight layers","VGG-11","13 weight layers","VGG-13","16 weight layers","VGG-16","19 weight layers","VGG-19","Counts follow the configurations reported in Simonyan and Zisserman; bar heights are proportional to weight-layer count."],"svgBytes":2586,"hasViewBox":true,"hasTitle":true,"hasDesc":true,"hasScript":false,"sourceTraceable":true},{"path":"reports/svg-explainer-review/candidates/2015-dcgan_conv-generator.svg","exists":true,"assetIds":["asset-2015-dcgan-conv-generator"],"roles":["architecture-explainer"],"captions":{"zh":["DCGAN 解释图"],"en":["DCGAN explainer"]},"subcaptions":{"zh":["关于该成就流程的本地原创解释图。"],"en":["Original local explainer for the achievement flow."]},"rightsStatuses":["documented-in-legacy"],"sourceIds":["source-unsupervised-representation-learning-with-deep-convolutional-gans"],"sources":[{"id":"source-unsupervised-representation-learning-with-deep-convolutional-gans","type":"paper","reliability":"primary","title":{"zh":"《使用深度卷积 GAN 进行无监督表示学习》","en":"Unsupervised Representation Learning with Deep Convolutional GANs"},"url":"https://arxiv.org/abs/1511.06434"}],"variantSourceIds":["source-dcgan-overview","source-pytorch-dcgan-tutorial","source-unsupervised-representation-learning-with-deep-convolutional-gans"],"variantSources":[{"id":"source-unsupervised-representation-learning-with-deep-convolutional-gans","type":"paper","reliability":"primary","title":{"zh":"《使用深度卷积 GAN 进行无监督表示学习》","en":"Unsupervised Representation Learning with Deep Convolutional GANs"},"url":"https://arxiv.org/abs/1511.06434"},{"id":"source-pytorch-dcgan-tutorial","type":"documentation","reliability":"secondary","title":{"zh":"PyTorch DCGAN 教程","en":"PyTorch DCGAN tutorial"},"url":"https://pytorch.org/tutorials/beginner/dcgan_faces_tutorial.html"},{"id":"source-dcgan-overview","type":"encyclopedia-entry","reliability":"reference-only","title":{"zh":"DCGAN 概览","en":"DCGAN overview"},"url":"https://en.wikipedia.org/wiki/Deep_convolutional_generative_adversarial_network"}],"usages":[{"storylineId":"bench-council-ai100","storylineTitle":{"zh":"AI 百大成就（BenchCouncil）","en":"AI Top 100 Achievements (BenchCouncil)"},"eventId":"ai100-2015-dcgan","eventTitle":{"zh":"DCGAN","en":"DCGAN"},"variant":"bench-council-ai100","variantFile":"archive/events/ai100-2015-dcgan/variants/bench-council-ai100.json","visual":"configuredPaper","demoImage":"resources/images/bench-council-ai100/explainers/2015-dcgan_conv-generator.svg","description":{"zh":"拉德福德、梅茨和钦塔拉在 2015 年提出 DCGAN，为图像生成总结一组实用卷积架构规则：用步幅卷积和转置卷积替代手工池化，在多数层使用批归一化，减少全连接层，并分别采用 ReLU 与 Leaky ReLU 激活。这些选择显著提高了 GAN 训练的可重复性。 生成器学会从潜变量逐步构造空间图像，判别器则形成可迁移到分类任务的无监督视觉特征；潜空间还表现出一定可解释方向。DCGAN 仍会模式崩溃且只适合当时较低分辨率，但它把 GAN 从概念证明推进为可复用的深度卷积图像生成配方。","en":"Alec Radford, Luke Metz, and Soumith Chintala introduced DCGAN in 2015 with a practical set of convolutional architecture rules for image generation. Strided convolutions and transposed convolutions replace hand-designed pooling, batch normalization is used through much of the network, fully connected layers are reduced, and ReLU and Leaky ReLU activations are assigned to the generator and discriminator. These choices made GAN training substantially more reproducible. The generator learned to construct spatial images progressively from latent variables, while the discriminator developed unsupervised visual features transferable to classification; the latent space also showed partly interpretable directions. DCGAN still suffered mode collapse and was limited to the resolutions of its time, but it moved GANs from a conceptual demonstration toward a reusable deep-convolutional recipe for image synthesis."},"method":{"zh":"卷积式对抗架构","en":"Convolutional adversarial architecture"},"artifact":{"zh":"深度卷积 GAN 设计","en":"Deep convolutional GAN design"}}],"svgText":["DCGAN","latent vector","input","fractionally-strided","convolution stack","mechanism","image sample","result","Original local SVG redraw; source figures are not copied."],"svgBytes":2459,"hasViewBox":true,"hasTitle":true,"hasDesc":true,"hasScript":false,"sourceTraceable":true},{"path":"reports/svg-explainer-review/candidates/2015-u-net_segmentation-mask.svg","exists":true,"assetIds":["asset-2015-u-net-segmentation-mask"],"roles":["architecture-explainer"],"captions":{"zh":["生物医学分割掩码"],"en":["Biomedical mask output"]},"subcaptions":{"zh":["U-Net 的独立本地重画，依据相关来源材料制作。"],"en":["Distinct local redraw for U-Net, based on the related source material."]},"rightsStatuses":["documented-in-legacy"],"sourceIds":["source-u-net-convolutional-networks-for-biomedical-image-segmentation"],"sources":[{"id":"source-u-net-convolutional-networks-for-biomedical-image-segmentation","type":"paper","reliability":"primary","title":{"zh":"《U-Net：用于生物医学图像分割的卷积网络》","en":"U-Net: Convolutional Networks for Biomedical Image Segmentation"},"url":"https://arxiv.org/abs/1505.04597"}],"variantSourceIds":["source-freiburg-u-net-release-page","source-nnu-net-implementation-project","source-u-net-convolutional-networks-for-biomedical-image-segmentation"],"variantSources":[{"id":"source-u-net-convolutional-networks-for-biomedical-image-segmentation","type":"paper","reliability":"primary","title":{"zh":"《U-Net：用于生物医学图像分割的卷积网络》","en":"U-Net: Convolutional Networks for Biomedical Image Segmentation"},"url":"https://arxiv.org/abs/1505.04597"},{"id":"source-freiburg-u-net-release-page","type":"project-page","reliability":"secondary","title":{"zh":"弗赖堡 U-Net 项目发布页","en":"Freiburg U-Net release page"},"url":"https://lmb.informatik.uni-freiburg.de/people/ronneber/u-net/"},{"id":"source-nnu-net-implementation-project","type":"project-page","reliability":"secondary","title":{"zh":"nnU-Net 实现项目","en":"nnU-Net implementation project"},"url":"https://github.com/MIC-DKFZ/nnUNet"}],"usages":[{"storylineId":"bench-council-ai100","storylineTitle":{"zh":"AI 百大成就（BenchCouncil）","en":"AI Top 100 Achievements (BenchCouncil)"},"eventId":"2015-u-net","eventTitle":{"zh":"U-Net","en":"U-Net"},"variant":"bench-council-ai100","variantFile":"archive/events/2015-u-net/variants/bench-council-ai100.json","visual":"unet","demoImage":"","description":{"zh":"U-Net 最初面向生物医学图像分割：标注样本通常有限，但输出必须精确对应每个像素和细小边界。网络的收缩路径通过卷积和下采样汇聚上下文，扩张路径逐步恢复空间分辨率；跨越 U 形结构的跳跃连接，把编码阶段的高分辨率特征直接与解码特征拼接。 原论文还利用强数据增强，使网络能从较少训练图像中学习。编码器—解码器与跳跃连接的组合同时保留“是什么”和“在哪里”，因此很快超出生物医学领域，成为语义分割、图像复原和密集预测的经典模板，并进一步影响扩散模型等生成系统的骨干设计。","en":"U-Net was created for biomedical image segmentation, where labeled examples are often scarce but outputs must align precisely with pixels and fine boundaries. Its contracting path gathers context through convolution and downsampling, while the expanding path restores spatial resolution. Skip connections across the U shape concatenate high-resolution encoder features directly with decoder features. The original work also used strong data augmentation so the network could learn from relatively few annotated images. By preserving both “what” and “where,” the encoder-decoder design became a canonical template beyond biomedicine for semantic segmentation, image restoration, and dense prediction. Its skip-connected structure also influenced the backbones later used in diffusion and other generative models."},"method":{"zh":"带跳跃连接的编码器-解码器分割","en":"Encoder-decoder segmentation with skip connections"},"artifact":{"zh":"U 形生物医学分割网络","en":"U-shaped biomedical segmentation network"}}],"svgText":["Biomedical mask output","生物医学分割掩码","Mask · local redraw from source material"],"svgBytes":1248,"hasViewBox":true,"hasTitle":true,"hasDesc":true,"hasScript":false,"sourceTraceable":true},{"path":"reports/svg-explainer-review/candidates/2016-alphago_policy-value-search.svg","exists":true,"assetIds":["asset-alphago-policy-value-search"],"roles":["architecture-explainer"],"captions":{"zh":["AlphaGo 策略、价值与搜索流程"],"en":["AlphaGo policy, value, and search workflow"]},"subcaptions":{"zh":["展示策略网络、价值网络与蒙特卡洛树搜索的协作关系。"],"en":["Shows how policy networks, value networks, and Monte Carlo tree search work together."]},"rightsStatuses":["local-redraw"],"sourceIds":["source-alphago-nature-paper"],"sources":[{"id":"source-alphago-nature-paper","type":"paper-page","reliability":"primary","title":{"zh":"《自然》 2016 AlphaGo 论文","en":"Nature 2016 AlphaGo paper"},"url":"https://www.nature.com/articles/nature16961"}],"variantSourceIds":["source-alphago-nature-paper","source-deepmind-alphago-page","source-katago-analysis-engine"],"variantSources":[{"id":"source-alphago-nature-paper","type":"paper-page","reliability":"primary","title":{"zh":"《自然》 2016 AlphaGo 论文","en":"Nature 2016 AlphaGo paper"},"url":"https://www.nature.com/articles/nature16961"},{"id":"source-deepmind-alphago-page","type":"official-page","reliability":"primary","title":{"zh":"谷歌 DeepMind AlphaGo","en":"Google DeepMind AlphaGo"},"url":"https://deepmind.google/research/alphago/"},{"id":"source-katago-analysis-engine","type":"documentation","reliability":"reference-only","title":{"zh":"KataGo 分析引擎","en":"KataGo Analysis Engine"},"url":"https://github.com/lightvector/KataGo/blob/master/docs/Analysis_Engine.md"}],"usages":[{"storylineId":"bench-council-ai100","storylineTitle":{"zh":"AI 百大成就（BenchCouncil）","en":"AI Top 100 Achievements (BenchCouncil)"},"eventId":"2016-alphago","eventTitle":{"zh":"AlphaGo","en":"AlphaGo"},"variant":"bench-council-ai100","variantFile":"archive/events/2016-alphago/variants/bench-council-ai100.json","visual":"go","demoImage":"","description":{"zh":"AlphaGo 结合策略网络、价值网络、蒙特卡洛树搜索和强化学习。系统先从职业棋手棋谱中进行监督学习，再通过自我对弈改进策略，并让树搜索把学习到的直觉与显式前瞻结合起来。2016 年《自然》论文报告了它战胜欧洲冠军樊麾，随后以 4 比 1 战胜李世石的比赛让这项成果进入全球公众视野。 围棋的分支数量和战略跨度极大，长期难以依靠蛮力搜索解决。AlphaGo 证明学习得到的表示可以缩小搜索范围，并评估难以手工编码的局面。它更深远的遗产是神经评估、规划与自我对弈的组合，这一模式影响了后续游戏系统及更广泛的决策研究。","en":"AlphaGo combined policy networks, a value network, Monte Carlo tree search, and reinforcement learning. Supervised learning from expert games first gave the policy network a strong starting point; self-play then improved move selection, while tree search joined learned intuition with explicit look-ahead. The 2016 Nature paper reported its victory over European champion Fan Hui, and its later 4–1 match win against Lee Sedol brought the achievement to a global audience. Go had long resisted brute-force approaches because its branching factor and strategic horizon are enormous. AlphaGo showed that learned representations could narrow search and evaluate positions that were difficult to encode by hand. Its deeper legacy is the combination of neural evaluation, planning, and self-play, a pattern that influenced later game systems and research on decision-making beyond board games."},"method":{"zh":"自我对弈搜索","en":"Self-play search"},"artifact":{"zh":"策略 / 价值网络 + MCTS","en":"Policy/value networks + MCTS"}},{"storylineId":"gaming-ai","storylineTitle":{"zh":"AI 在棋牌与博弈论的演进","en":"AI in Board & Tabletop Games"},"eventId":"2016-alphago","eventTitle":{"zh":"AlphaGo","en":"AlphaGo"},"variant":"gaming-ai","variantFile":"archive/events/2016-alphago/variants/gaming-ai.json","visual":"go","demoImage":"","description":{"zh":"AlphaGo 结合深度神经网络、蒙特卡洛树搜索和自我对弈强化学习。2016 年与李世石的对局让 AI 的战略能力被全球观众看见。它证明 AI 可以在一个长期被认为难以靠蛮力搜索解决的领域中学习直觉与规划。","en":"AlphaGo combined deep neural networks, Monte Carlo tree search and reinforcement learning through self-play. Its 2016 match against Lee Sedol made AI's strategic progress visible to a global audience. The system showed that AI could learn both intuition and planning in a domain long considered too complex for brute-force search."},"method":{"zh":"自我对弈搜索","en":"Self-play search"},"artifact":{"zh":"策略 / 价值网络 + MCTS","en":"Policy/value networks + MCTS"}}],"svgText":["AlphaGo: learned intuition plus search","A schematic 19×19 position; no historical move coordinate is asserted.","Board state","candidate moves","POLICY NETWORK","move priors","VALUE NETWORK","position estimate","MONTE CARLO TREE SEARCH","visit-guided comparison","Move choice combines policy priors, value estimates and search visit counts."],"svgBytes":3726,"hasViewBox":true,"hasTitle":true,"hasDesc":true,"hasScript":false,"sourceTraceable":true},{"path":"reports/svg-explainer-review/candidates/2016-gcn_spectral-convolution.svg","exists":true,"assetIds":["asset-2016-gcn-spectral-convolution"],"roles":["architecture-explainer"],"captions":{"zh":["GCN 解释图"],"en":["GCN explainer"]},"subcaptions":{"zh":["关于该成就流程的本地原创解释图。"],"en":["Original local explainer for the achievement flow."]},"rightsStatuses":["documented-in-legacy"],"sourceIds":["source-semi-supervised-classification-with-graph-convolutional-networks"],"sources":[{"id":"source-semi-supervised-classification-with-graph-convolutional-networks","type":"paper","reliability":"primary","title":{"zh":"《使用图卷积网络进行半监督分类》","en":"Semi-Supervised Classification with Graph Convolutional Networks"},"url":"https://arxiv.org/abs/1609.02907"}],"variantSourceIds":["source-iclr-openreview-record","source-kipf-gcn-repository","source-semi-supervised-classification-with-graph-convolutional-networks"],"variantSources":[{"id":"source-semi-supervised-classification-with-graph-convolutional-networks","type":"paper","reliability":"primary","title":{"zh":"《使用图卷积网络进行半监督分类》","en":"Semi-Supervised Classification with Graph Convolutional Networks"},"url":"https://arxiv.org/abs/1609.02907"},{"id":"source-iclr-openreview-record","type":"paper-page","reliability":"secondary","title":{"zh":"ICLR OpenReview 记录","en":"ICLR OpenReview record"},"url":"https://openreview.net/forum?id=SJU4ayYgl"},{"id":"source-kipf-gcn-repository","type":"code","reliability":"secondary","title":{"zh":"Kipf GCN 代码仓库","en":"Kipf GCN repository"},"url":"https://github.com/tkipf/gcn"}],"usages":[{"storylineId":"bench-council-ai100","storylineTitle":{"zh":"AI 百大成就（BenchCouncil）","en":"AI Top 100 Ach

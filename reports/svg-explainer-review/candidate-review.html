ievements (BenchCouncil)"},"eventId":"ai100-2016-gcn","eventTitle":{"zh":"GCN","en":"GCN"},"variant":"bench-council-ai100","variantFile":"archive/events/ai100-2016-gcn/variants/bench-council-ai100.json","visual":"configuredPaper","demoImage":"resources/images/bench-council-ai100/explainers/2016-gcn_spectral-convolution.svg","description":{"zh":"基普夫和威灵在 2016 年提出简化图卷积网络，从谱图卷积的一阶近似得到实用更新规则。每一层把节点自身及其邻居的特征按归一化连接权重聚合，再通过共享线性变换和非线性激活，使标签信息和结构线索沿图传播。 GCN 能在只有少量节点带标签时联合利用全部图结构进行半监督分类，因简洁高效而成为图表示学习的标准基线。层数增加会导致过度平滑，远距离信息和异质关系也难以处理；但“归一化邻居聚合 + 可学习变换”的配方奠定了大量后续图模型。","en":"Thomas Kipf and Max Welling introduced the graph convolutional network in 2016 with a practical update derived from a first-order approximation to spectral graph convolution. Each layer aggregates a node's own features and those of its neighbors using normalized connection weights, then applies a shared linear transformation and nonlinearity so labels and structural information propagate across the graph. GCN can use the full graph for semi-supervised classification even when only a small fraction of nodes are labeled, and its simplicity made it a standard graph-learning baseline. Greater depth can cause oversmoothing, while long-range information and heterogeneous relations remain difficult. Its recipe of normalized neighborhood aggregation followed by a learned transformation nevertheless founded a large family of later graph models."},"method":{"zh":"图卷积传播规则","en":"Graph convolutional propagation rule"},"artifact":{"zh":"用于半监督分类的图卷积网络","en":"Graph convolutional network for semi-supervised classification"}}],"svgText":["GCN","graph + features","input","normalized neighbors","mechanism","class logits","result","Original local SVG redraw; source figures are not copied."],"svgBytes":2369,"hasViewBox":true,"hasTitle":true,"hasDesc":true,"hasScript":false,"sourceTraceable":true},{"path":"reports/svg-explainer-review/candidates/2016-nas_controller-search.svg","exists":true,"assetIds":["asset-2016-nas-controller-search"],"roles":["architecture-explainer"],"captions":{"zh":["神经架构搜索 解释图"],"en":["Neural Architecture Search explainer"]},"subcaptions":{"zh":["关于该成就流程的本地原创解释图。"],"en":["Original local explainer for the achievement flow."]},"rightsStatuses":["documented-in-legacy"],"sourceIds":["source-neural-architecture-search-with-reinforcement-learning"],"sources":[{"id":"source-neural-architecture-search-with-reinforcement-learning","type":"paper","reliability":"primary","title":{"zh":"《基于强化学习的神经架构搜索》","en":"Neural Architecture Search with Reinforcement Learning"},"url":"https://arxiv.org/abs/1611.01578"}],"variantSourceIds":["source-google-ai-automl-overview","source-iclr-openreview-record","source-neural-architecture-search-with-reinforcement-learning"],"variantSources":[{"id":"source-neural-architecture-search-with-reinforcement-learning","type":"paper","reliability":"primary","title":{"zh":"《基于强化学习的神经架构搜索》","en":"Neural Architecture Search with Reinforcement Learning"},"url":"https://arxiv.org/abs/1611.01578"},{"id":"source-iclr-openreview-record","type":"paper-page","reliability":"secondary","title":{"zh":"ICLR OpenReview 记录","en":"ICLR OpenReview record"},"url":"https://openreview.net/forum?id=r1Ue8Hcxg"},{"id":"source-google-ai-automl-overview","type":"article","reliability":"secondary","title":{"zh":"Google AI AutoML 概览","en":"Google AI AutoML overview"},"url":"https://ai.googleblog.com/2017/05/using-machine-learning-to-explore.html"}],"usages":[{"storylineId":"bench-council-ai100","storylineTitle":{"zh":"AI 百大成就（BenchCouncil）","en":"AI Top 100 Achievements (BenchCouncil)"},"eventId":"ai100-2016-nas","eventTitle":{"zh":"神经架构搜索","en":"Neural Architecture Search"},"variant":"bench-council-ai100","variantFile":"archive/events/ai100-2016-nas/variants/bench-council-ai100.json","visual":"configuredPaper","demoImage":"resources/images/bench-council-ai100/explainers/2016-nas_controller-search.svg","description":{"zh":"佐普和勒在 2016 年把神经网络架构设计本身表述为强化学习问题。循环控制器依次生成层类型、连接和超参数，候选子网络经过训练后用验证集准确率形成奖励，再通过策略梯度更新控制器，使后续提案更可能包含有效结构。 早期 NAS 在图像和语言任务上发现有竞争力的架构，证明机器可以搜索部分原本依赖专家经验的设计空间，但每个候选都要训练，计算成本极高。后续研究发展权重共享、可微搜索和多目标优化。NAS 的长期影响在于把准确率、延迟、能耗等设计目标纳入自动优化。","en":"Barret Zoph and Quoc Le formulated neural-network architecture design itself as a reinforcement-learning problem in 2016. A recurrent controller generated layer types, connections, and hyperparameters sequentially. Candidate child networks were trained and scored by validation accuracy, which became a reward for policy-gradient updates that made promising structural choices more likely. Early NAS discovered competitive architectures for vision and language tasks, showing that machines could search parts of a design space previously guided mainly by expert intuition. Training every candidate made the approach extraordinarily expensive. Later work developed weight sharing, differentiable search, and multi-objective optimization. NAS's lasting impact is treating accuracy, latency, energy, and related design goals as variables in an automated optimization process."},"method":{"zh":"基于控制器的架构搜索","en":"Controller-based architecture search"},"artifact":{"zh":"基于强化学习的神经架构搜索","en":"Neural architecture search with reinforcement learning"}}],"svgText":["NAS","controller","input","sample architecture","mechanism","validation reward","result","Original local SVG redraw; source figures are not copied."],"svgBytes":2365,"hasViewBox":true,"hasTitle":true,"hasDesc":true,"hasScript":false,"sourceTraceable":true},{"path":"reports/svg-explainer-review/candidates/2017-transformer_self-attention.svg","exists":true,"assetIds":["asset-transformer-attention"],"roles":["algorithm-explainer"],"captions":{"zh":["Transformer 自注意力机制"],"en":["Transformer self-attention mechanism"]},"subcaptions":{"zh":["本地重绘的 token 间注意力关系解释图。"],"en":["Locally redrawn explainer of attention relationships between tokens."]},"rightsStatuses":["local-redraw"],"sourceIds":["source-transformer-arxiv"],"sources":[{"id":"source-transformer-arxiv","type":"paper","reliability":"primary","title":{"zh":"《Attention Is All You Need》","en":"Attention Is All You Need"},"url":"https://arxiv.org/abs/1706.03762"}],"variantSourceIds":["source-google-research-publication","source-google-transformer-blog","source-transformer-arxiv","source-transformer-neurips"],"variantSources":[{"id":"source-transformer-arxiv","type":"paper","reliability":"primary","title":{"zh":"《Attention Is All You Need》","en":"Attention Is All You Need"},"url":"https://arxiv.org/abs/1706.03762"},{"id":"source-transformer-neurips","type":"paper-page","reliability":"primary","title":{"zh":"NeurIPS 论文页面","en":"NeurIPS paper page"},"url":"https://papers.nips.cc/paper/7181-attention-is-all-you-need"},{"id":"source-google-research-publication","type":"paper-page","reliability":"primary","title":{"zh":"Google Research 出版页面","en":"Google Research publication page"},"url":"https://research.google/pubs/attention-is-all-you-need/"},{"id":"source-google-transformer-blog","type":"article","reliability":"secondary","title":{"zh":"Google Research Transformer 博客","en":"Google Research Transformer blog post"},"url":"https://research.google/blog/transformer-a-novel-neural-network-architecture-for-language-understanding/"}],"usages":[{"storylineId":"bench-council-ai100","storylineTitle":{"zh":"AI 百大成就（BenchCouncil）","en":"AI Top 100 Achievements (BenchCouncil)"},"eventId":"2017-transformer","eventTitle":{"zh":"Transformer","en":"Transformer"},"variant":"bench-council-ai100","variantFile":"archive/events/2017-transformer/variants/bench-council-ai100.json","visual":"transformer","demoImage":"resources/images/bench-council-ai100/explainers/2017-transformer_self-attention.svg","description":{"zh":"2017 年的 Transformer 用堆叠的多头自注意力和前馈模块替代循环序列处理。每个词元生成 query、key 和 value 表示，使模型能够并行衡量序列中不同位置的关系；位置编码则补充原本由循环结构携带的顺序信息。最初的编码器—解码器系统面向机器翻译，并通过更高的训练并行度取得强劲结果。 这一架构让注意力从附着在 RNN 上的辅助模块变成通用计算单元。可扩展的模块后来支撑 BERT、GPT 式语言模型、视觉 Transformer、多模态系统和许多智能体基础。专家通常把 Transformer 视为现代 AI 的定义性架构，同时也指出标准注意力处理超长序列时会带来较高计算开销。","en":"The 2017 Transformer replaced recurrent sequence processing with stacked multi-head self-attention and feed-forward blocks. Each token forms query, key, and value representations, allowing the model to weigh relationships across a sequence in parallel; positional encodings supply order information that recurrence previously carried. The original encoder-decoder system was designed for machine translation and achieved strong results with substantially more parallel training. This architecture made attention a general computational primitive rather than an auxiliary component attached to an RNN. Its scalable blocks later supported BERT, GPT-style language models, vision transformers, multimodal systems, and many agent foundations. Experts generally regard the Transformer as a defining modern AI architecture, while recognizing that its standard attention mechanism can become expensive on very long sequences."},"method":{"zh":"自注意力序列架构","en":"Self-attention sequence architecture"},"artifact":{"zh":"Transformer 架构","en":"Transformer architecture"}},{"storylineId":"deep-learning","storylineTitle":{"zh":"深度学习分支","en":"Deep Learning"},"eventId":"2017-transformer","eventTitle":{"zh":"Transformer","en":"Transformer"},"variant":"deep-learning","variantFile":"archive/events/2017-transformer/variants/deep-learning.json","visual":"transformer","demoImage":"resources/images/bench-council-ai100/explainers/2017-transformer_self-attention.svg","description":{"zh":"2017 年，阿希什·瓦斯瓦尼等人在《Attention Is All You Need》中提出 Transformer。它用多头自注意力比较序列中不同位置的 query、key 和 value，并配合前馈网络、残差连接和位置编码，构成不依赖循环或卷积的编码器—解码器。 自注意力允许训练时并行处理整段序列，缩短远距离信息之间的计算路径。原论文在机器翻译基准上取得更高质量，同时显著减少训练成本。Transformer 随后成为 BERT、GPT、视觉 Transformer、多模态基础模型和现代生成式 AI 的共同架构基础。","en":"In 2017, Ashish Vaswani and colleagues introduced the Transformer in Attention Is All You Need . Multi-head self-attention compared queries, keys, and values across sequence positions, while feed-forward layers, residual connections, and positional encodings formed an encoder-decoder architecture without recurrence or convolution. Self-attention allowed whole sequences to be processed in parallel during training and shortened the computational path between distant pieces of information. The original paper achieved stronger machine-translation quality with substantially lower training cost. The Transformer subsequently became the shared architectural foundation of BERT, GPT, vision transformers, multimodal foundation models, and modern generative AI."},"method":{"zh":"自注意力序列架构","en":"Self-attention sequence architecture"},"artifact":{"zh":"Transformer 架构","en":"Transformer architecture"}}],"svgText":["Scaled dot-product self-attention","queries Q","keys K","values V","Attention(Q,K,V) = softmax(QKᵀ / √dₖ) V","weighted value mixture"],"svgBytes":1764,"hasViewBox":true,"hasTitle":true,"hasDesc":true,"hasScript":false,"sourceTraceable":true},{"path":"reports/svg-explainer-review/candidates/2017-wasserstein-gan_critic-distance.svg","exists":true,"assetIds":["asset-2017-wasserstein-gan-critic-distance"],"roles":["architecture-explainer"],"captions":{"zh":["Wasserstein GAN 解释图"],"en":["Wasserstein GAN explainer"]},"subcaptions":{"zh":["关于该成就流程的本地原创解释图。"],"en":["Original local explainer for the achievement flow."]},"rightsStatuses":["documented-in-legacy"],"sourceIds":["source-wasserstein-generative-adversarial-networks"],"sources":[{"id":"source-wasserstein-generative-adversarial-networks","type":"paper","reliability":"primary","title":{"zh":"《Wasserstein 生成对抗网络》","en":"Wasserstein Generative Adversarial Networks"},"url":"https://proceedings.mlr.press/v70/arjovsky17a.html"}],"variantSourceIds":["source-improved-training-of-wasserstein-gans","source-wasserstein-gan-overview","source-wasserstein-generative-adversarial-networks"],"variantSources":[{"id":"source-wasserstein-generative-adversarial-networks","type":"paper","reliability":"primary","title":{"zh":"《Wasserstein 生成对抗网络》","en":"Wasserstein Generative Adversarial Networks"},"url":"https://proceedings.mlr.press/v70/arjovsky17a.html"},{"id":"source-improved-training-of-wasserstein-gans","type":"paper","reliability":"primary","title":{"zh":"《Wasserstein GAN 的改进训练》","en":"Improved Training of Wasserstein GANs"},"url":"https://proceedings.neurips.cc/paper/2017/hash/892c3b1c6dccd52936e27cbd0ff683d6-Abstract.html"},{"id":"source-wasserstein-gan-overview","type":"encyclopedia-entry","reliability":"reference-only","title":{"zh":"Wasserstein GAN 概览","en":"Wasserstein GAN overview"},"url":"https://en.wikipedia.org/wiki/Wasserstein_GAN"}],"usages":[{"storylineId":"bench-council-ai100","storylineTitle":{"zh":"AI 百大成就（BenchCouncil）","en":"AI Top 100 Achievements (BenchCouncil)"},"eventId":"ai100-2017-wasserstein-gan","eventTitle":{"zh":"Wasserstein GAN","en":"Wasserstein GAN"},"variant":"bench-council-ai100","variantFile":"archive/events/ai100-2017-wasserstein-gan/variants/bench-council-ai100.json","visual":"configuredPaper","demoImage":"resources/images/bench-council-ai100/explainers/2017-wasserstein-gan_critic-distance.svg","description":{"zh":"Wasserstein GAN 用最优传输中的 Earth Mover 距离重新解释生成分布与真实分布之间的差异。判别器被替换为输出实数分数的 critic，并必须满足 Lipschitz 约束；原论文通过权重裁剪近似这一约束，使生成器在分布几乎不重叠时仍能获得更有用的梯度。 critic 损失与样本质量的关系更连续，使训练过程更容易监控，并缓解部分不稳定和模式崩溃。权重裁剪本身可能限制模型能力，后续 WGAN-GP 用梯度惩罚改进约束。WGAN 的长期价值在于把生成训练问题与概率分布几何和最优传输连接起来。","en":"Wasserstein GAN reinterpreted the difference between generated and real distributions through the Earth Mover distance from optimal transport. The discriminator becomes a critic that outputs real-valued scores and must satisfy a Lipschitz constraint. The original paper approximated that constraint through weight clipping, allowing the generator to receive more useful gradients even when the two distributions barely overlap. The critic loss varies more continuously with sample quality, making training easier to monitor and reducing some instability and mode collapse. Weight clipping can itself restrict model capacity, and the later WGAN-GP replaced it with a gradient penalty. WGAN's lasting contribution was connecting generative training with the geometry of probability distributions and optimal transport."},"method":{"zh":"基于推土机距离的对抗学习","en":"Earth-mover distance adversarial learning"},"artifact":{"zh":"Wasserstein GAN 目标函数","en":"Wasserstein GAN objective"}}],"svgText":["Wasserstein GAN","real distribution","input","critic score gap","Wasserstein estimate","mechanism","generated","distribution","result","Original local SVG redraw; source figures are not copied."],"svgBytes":2600,"hasViewBox":true,"hasTitle":true,"hasDesc":true,"hasScript":false,"sourceTraceable":true},{"path":"reports/svg-explainer-review/candidates/2020-vit_patch-tokens.svg","exists":true,"assetIds":["asset-2020-vit-patch-tokens"],"roles":["architecture-explainer"],"captions":{"zh":["图像块令牌到 Transformer"],"en":["Patch tokens to transformer"]},"subcaptions":{"zh":["关于 ViT 图像块令牌化的本地原创解释图。"],"en":["Original local explainer of ViT patch tokenization."]},"rightsStatuses":["documented-in-legacy"],"sourceIds":["source-an-image-is-worth-16x16-words"],"sources":[{"id":"source-an-image-is-worth-16x16-words","type":"paper","reliability":"primary","title":{"zh":"《一张图像价值 16x16 个词》","en":"An Image is Worth 16x16 Words"},"url":"https://arxiv.org/abs/2010.11929"}],"variantSourceIds":["source-an-image-is-worth-16x16-words","source-google-research-publication-page","source-iclr-openreview-page","source-openreview-full-paper-pdf"],"variantSources":[{"id":"source-an-image-is-worth-16x16-words","type":"paper","reliability":"primary","title":{"zh":"《一张图像价值 16x16 个词》","en":"An Image is Worth 16x16 Words"},"url":"https://arxiv.org/abs/2010.11929"},{"id":"source-iclr-openreview-page","type":"paper-page","reliability":"secondary","title":{"zh":"ICLR OpenReview 页面","en":"ICLR OpenReview page"},"url":"https://openreview.net/forum?id=YicbFdNTTy"},{"id":"source-openreview-full-paper-pdf","type":"paper-file","reliability":"secondary","title":{"zh":"OpenReview 完整论文 PDF","en":"OpenReview full paper PDF"},"url":"https://openreview.net/pdf?id=YicbFdNTTy"},{"id":"source-google-research-publication-page","type":"paper-page","reliability":"reference-only","title":{"zh":"Google Research 出版页面","en":"Google Research publication page"},"url":"https://research.google/pubs/an-image-is-worth-16x16-words-transformers-for-image-recognition-at-scale/"}],"usages":[{"storylineId":"bench-council-ai100","storylineTitle":{"zh":"AI 百大成就（BenchCouncil）","en":"AI Top 100 Achievements (BenchCouncil)"},"eventId":"ai100-2020-vit","eventTitle":{"zh":"视觉 Transformer","en":"Vision Transformer"},"variant":"bench-council-ai100","variantFile":"archive/events/ai100-2020-vit/variants/bench-council-ai100.json","visual":"vit","demoImage":"resources/images/bench-council-ai100/explainers/2020-vit_patch-tokens.svg","description":{"zh":"Vision Transformer 把图像切成固定大小的 patch，将每个图像块线性投影为词元式向量，加入位置编码和分类词元后，直接送入标准 Transformer 编码器。与 CNN 不同，ViT 不在架构中强制使用局部卷积，而让自注意力从数据中学习图像块之间的全局关系。 原论文表明，在大规模预训练数据上，纯 Transformer 可以达到或超过强卷积网络，再迁移到常见视觉任务。ViT 对数据规模和训练配方较敏感，标准注意力成本也会随图像块数量平方增长；但它推动注意力架构进入主流视觉，并统一了语言、图像和多模态模型的设计语言。","en":"Vision Transformer divides an image into fixed-size patches, linearly projects each patch into a token-like vector, adds positional information and a classification token, and feeds the sequence into a standard Transformer encoder. Unlike a CNN, ViT does not enforce local convolution in its architecture; self-attention learns relationships among image patches from data, including long-range interactions. The original work showed that with large-scale pretraining, a pure Transformer could match or exceed strong convolutional networks and then transfer to common vision tasks. ViT is sensitive to data scale and training recipes, and standard attention grows quadratically with the number of patches. It nevertheless moved attention into mainstream vision and helped unify the design language of text, image, and multimodal models."},"method":{"zh":"面向图像的块令牌 Transformer","en":"Patch-token transformer for images"},"artifact":{"zh":"视觉 Transformer 分类器","en":"Vision Transformer classifier"}}],"svgText":["Vision Transformer patch tokens","Transformer","encoder","Image patches become a token sequence;","attention then mixes information across regions."],"svgBytes":1662,"hasViewBox":true,"hasTitle":false,"hasDesc":false,"hasScript":false,"sourceTraceable":true}];

d=\"M258 192 L274 203 L258 214\" fill=\"none\" stroke=\"#64748b\" stroke-width=\"5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/>\n  \u003cpath d=\"M446 203 H484\" stroke=\"#64748b\" stroke-width=\"5\" stroke-linecap=\"round\"/>\u003cpath d=\"M472 192 L488 203 L472 214\" fill=\"none\" stroke=\"#64748b\" stroke-width=\"5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/>\n  \u003cg fill=\"none\" stroke=\"#be123c\" stroke-width=\"3\" opacity=\"0.55\">\n    \u003ccircle cx=\"130\" cy=\"314\" r=\"16\"/>\u003ccircle cx=\"190\" cy=\"316\" r=\"12\"/>\u003ccircle cx=\"250\" cy=\"312\" r=\"18\"/>\u003cpath d=\"M146 314 L178 316 L232 312\"/>\n    \u003cpath d=\"M326 318 C356 286 394 286 424 318\"/>\u003cpath d=\"M326 318 C356 350 394 350 424 318\"/>\n    \u003crect x=\"510\" y=\"296\" width=\"90\" height=\"48\" rx=\"12\"/>\u003cpath d=\"M526 324 L548 306 L572 330 L590 314\"/>\n  \u003c/g>\n  \u003ctext x=\"62\" y=\"360\" font-family=\"Arial, Helvetica, sans-serif\" font-size=\"15\" fill=\"#64748b\">Original local SVG redraw; source figures are not copied.\u003c/text>\n\u003c/svg>\n","\u003csvg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 720 420\" role=\"img\" aria-label=\"Vision Transformer patch tokens\">\n  \u003crect width=\"720\" height=\"420\" fill=\"#0f172a\"/>\n  \u003ctext x=\"42\" y=\"58\" fill=\"#f59e0b\" font-family=\"Arial\" font-size=\"30\" font-weight=\"700\">Vision Transformer patch tokens\u003c/text>\n  \u003crect x=\"66\" y=\"104\" width=\"176\" height=\"176\" rx=\"14\" fill=\"#111827\" stroke=\"#94a3b8\" stroke-width=\"4\"/>\n  \u003cg stroke=\"#334155\" stroke-width=\"3\">\u003cpath d=\"M110 104 V280 M154 104 V280 M198 104 V280 M66 148 H242 M66 192 H242 M66 236 H242\"/>\u003c/g>\n  \u003crect x=\"82\" y=\"120\" width=\"32\" height=\"32\" fill=\"#34d399\"/>\u003crect x=\"170\" y=\"164\" width=\"32\" height=\"32\" fill=\"#60a5fa\"/>\u003crect x=\"126\" y=\"208\" width=\"32\" height=\"32\" fill=\"#f59e0b\"/>\n  \u003cg fill=\"#1d4ed8\" stroke=\"#93c5fd\" stroke-width=\"3\">\n    \u003crect x=\"322\" y=\"112\" width=\"64\" height=\"42\" rx=\"10\"/>\u003crect x=\"322\" y=\"170\" width=\"64\" height=\"42\" rx=\"10\"/>\u003crect x=\"322\" y=\"228\" width=\"64\" height=\"42\" rx=\"10\"/>\n  \u003c/g>\n  \u003crect x=\"482\" y=\"124\" width=\"150\" height=\"128\" rx=\"20\" fill=\"#402c1b\" stroke=\"#f59e0b\" stroke-width=\"4\"/>\n  \u003ctext x=\"557\" y=\"174\" fill=\"#fde68a\" font-family=\"Arial\" font-size=\"25\" text-anchor=\"middle\">Transformer\u003c/text>\n  \u003ctext x=\"557\" y=\"210\" fill=\"#fde68a\" font-family=\"Arial\" font-size=\"25\" text-anchor=\"middle\">encoder\u003c/text>\n  \u003cpath d=\"M242 192 H322 M386 192 H482\" stroke=\"#e5e7eb\" stroke-width=\"6\"/>\n  \u003ctext x=\"360\" y=\"344\" fill=\"#94a3b8\" text-anchor=\"middle\" font-family=\"Arial\" font-size=\"18\">Image patches become a token sequence;\u003c/text>\n  \u003ctext x=\"360\" y=\"370\" fill=\"#94a3b8\" text-anchor=\"middle\" font-family=\"Arial\" font-size=\"18\">attention then mixes information across regions.\u003c/text>\n\u003c/svg>\n"];
    const results = [];
    const grid = document.querySelector('#grid');
    document.querySelector('#summary').textContent = entries.length + ' 张已被启用事件使用的 SVG 解释图';

    function overlap(a, b) {
      const left = Math.max(a.x, b.x);
      const top = Math.max(a.y, b.y);
      const right = Math.min(a.x + a.width, b.x + b.width);
      const bottom = Math.min(a.y + a.height, b.y + b.height);
      return { width: Math.max(0, right - left), height: Math.max(0, bottom - top) };
    }

    function boxInRoot(node, svg) {
      const box = node.getBBox();
      const nodeMatrix = node.getCTM();
      const rootMatrix = svg.getCTM();
      if (!nodeMatrix || !rootMatrix) return box;
      const matrix = rootMatrix.inverse().multiply(nodeMatrix);
      const points = [
        new DOMPoint(box.x, box.y),
        new DOMPoint(box.x + box.width, box.y),
        new DOMPoint(box.x, box.y + box.height),
        new DOMPoint(box.x + box.width, box.y + box.height)
      ].map((point) => point.matrixTransform(matrix));
      const xs = points.map((point) => point.x);
      const ys = points.map((point) => point.y);
      return {
        x: Math.min(...xs),
        y: Math.min(...ys),
        width: Math.max(...xs) - Math.min(...xs),
        height: Math.max(...ys) - Math.min(...ys)
      };
    }

    function inspectSvg(svg) {
      if (!svg || svg.localName !== 'svg') return [{ type: 'load', detail: 'SVG document unavailable' }];
      const issues = [];
      const viewBox = svg.viewBox && svg.viewBox.baseVal;
      const texts = Array.from(svg.querySelectorAll('text')).map((node, index) => {
        try { return { node, index, box: boxInRoot(node, svg), text: (node.textContent || '').trim() }; }
        catch { return null; }
      }).filter(Boolean);

      for (const item of texts) {
        const box = item.box;
        if (viewBox && (box.x < viewBox.x - 0.5 || box.y < viewBox.y - 0.5 || box.x + box.width > viewBox.x + viewBox.width + 0.5 || box.y + box.height > viewBox.y + viewBox.height + 0.5)) {
          issues.push({ type: 'text-outside-viewbox', text: item.text, box });
        }
      }

      for (let first = 0; first < texts.length; first += 1) {
        for (let second = first + 1; second < texts.length; second += 1) {
          const hit = overlap(texts[first].box, texts[second].box);
          if (hit.width > 1 && hit.height > 1) {
            issues.push({ type: 'text-text-overlap', first: texts[first].text, second: texts[second].text, overlap: hit });
          }
        }
      }

      const shapes = Array.from(svg.querySelectorAll('rect, circle, ellipse, polygon, image')).map((node, index) => {
        try { return { node, index, box: boxInRoot(node, svg) }; }
        catch { return null; }
      }).filter(Boolean);
      for (const text of texts) {
        const textArea = Math.max(1, text.box.width * text.box.height);
        for (const shape of shapes) {
          const shapeArea = Math.max(1, shape.box.width * shape.box.height);
          const hit = overlap(text.box, shape.box);
          const hitArea = hit.width * hit.height;
          if (hitArea < textArea * 0.12) continue;
          const containsText = shape.box.x <= text.box.x && shape.box.y <= text.box.y && shape.box.x + shape.box.width >= text.box.x + text.box.width && shape.box.y + shape.box.height >= text.box.y + text.box.height;
          const likelyBackground = shapeArea > (viewBox ? viewBox.width * viewBox.height * 0.35 : textArea * 30);
          if (!containsText && !likelyBackground) {
            issues.push({ type: 'partial-text-shape-overlap', text: text.text, shape: shape.node.localName, textBox: text.box, shapeBox: shape.box, overlap: hit });
          }
        }
      }
      return issues;
    }

    for (const [index, entry] of entries.entries()) {
      const article = document.createElement('article');
      const eventNames = [...new Set(entry.usages.map((usage) => usage.eventId))].join(', ');
      article.innerHTML = '<div class="media"><object type="image/svg+xml" data="../../' + entry.path + '"></object></div>' +
        '<div class="meta"><h2>' + (index + 1) + '. ' + entry.path.split('/').pop() + '</h2>' +
        '<p>' + eventNames + '</p><p class="muted">' + entry.sourceIds.join(', ') + '</p><p class="issues">等待检测</p></div>';
      grid.appendChild(article);
    }

    function runAudit() {
      const measurement = document.querySelector('#measurement');
      for (const [index, entry] of entries.entries()) {
        const article = grid.children[index];
        let issues;
        try {
          const parsed = new DOMParser().parseFromString(svgSources[index], 'image/svg+xml');
          const svg = document.importNode(parsed.documentElement, true);
          measurement.appendChild(svg);
          issues = inspectSvg(svg);
          svg.remove();
        } catch (error) {
          issues = [{ type: 'load', detail: error.message }];
        }
        results[index] = { path: entry.path, issues };
        const issueNode = article.querySelector('.issues');
        issueNode.className = issues.length ? 'issues' : 'ok';
        issueNode.textContent = issues.length ? issues.map((issue) => issue.type + ': ' + (issue.text || issue.first || issue.detail || '')).join('\n') : '未发现几何异常';
      }
      const payload = document.createElement('script');
      payload.id = 'svg-audit-results';
      payload.type = 'application/json';
      payload.textContent = JSON.stringify(results);
      document.body.appendChild(payload);
      document.documentElement.dataset.auditComplete = 'true';
      document.querySelector('#summary').textContent = entries.length + ' 张 SVG；自动检测到 ' + results.filter((result) => result.issues.length).length + ' 张存在候选几何问题';
    }
    runAudit();
  </script>
</body>
</html>

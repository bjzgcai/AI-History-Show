name: Deployment Validation

on:
    push:
        branches:
            - master
            - main
    pull_request:

jobs:
    validate-deployment:
        runs-on: ubuntu-latest

        steps:
            - name: Check out repository
              uses: actions/checkout@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Validate startup commands
              run: npm run validate:deployment

            - name: Build container image
              run: docker build -t ai-history-show:ci .

            - name: Smoke test container image
              run: |
                  docker run --rm -d --name ai-history-show-ci -p 18080:8000 ai-history-show:ci
                  trap 'docker stop ai-history-show-ci' EXIT

                  for attempt in {1..20}; do
                      if curl -fsS http://127.0.0.1:18080/ >/dev/null; then
                          exit 0
                      fi
                      sleep 1
                  done

                  docker logs ai-history-show-ci
                  exit 1

            - name: Validate Compose configuration
              run: docker compose config --quiet

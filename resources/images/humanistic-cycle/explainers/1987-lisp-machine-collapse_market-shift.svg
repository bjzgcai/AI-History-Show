<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 80 960 420" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="title desc">
  <title id="title">Lisp machine market shift explainer</title>
  <desc id="desc">A specialized AI hardware tower loses market force as cheaper general-purpose workstations rise.</desc>
  <rect width="960" height="600" fill="#08111f"/>
  <rect x="82" y="86" width="796" height="400" rx="26" fill="#f8fafc"/>
  <text x="132" y="146" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="40" font-weight="900">1987</text>
  <text x="132" y="182" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="800">specialized AI hardware loses its aura</text>
  <rect x="180" y="230" width="170" height="190" rx="16" fill="#dbeafe" stroke="#111827" stroke-width="6"/>
  <text x="265" y="282" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="900" text-anchor="middle">Lisp</text>
  <text x="265" y="312" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="900" text-anchor="middle">machine</text>
  <path d="M208 348h114M208 374h80" stroke="#64748b" stroke-width="9" stroke-linecap="round"/>
  <rect x="572" y="258" width="210" height="128" rx="18" fill="#dcfce7" stroke="#111827" stroke-width="6"/>
  <text x="677" y="312" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="900" text-anchor="middle">workstations</text>
  <text x="677" y="344" fill="#166534" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="900" text-anchor="middle">cheaper + enough</text>
  <path d="M372 326h158" stroke="#68a9c6" stroke-width="12" stroke-linecap="round"/>
  <path d="M510 294l50 32-50 32" fill="none" stroke="#68a9c6" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="480" y="442" fill="#334155" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="900" text-anchor="middle">expert-system hype meets deployment cost</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 80 960 420" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="title desc">
  <title id="title">Simon AI hype curve explainer</title>
  <desc id="desc">A steep expectation curve rises from early symbolic AI demonstrations toward a broad promise about human work.</desc>
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#e0f2fe"/>
    </linearGradient>
    <linearGradient id="curve" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#14b8a6"/>
      <stop offset=".56" stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#ef4444"/>
    </linearGradient>
  </defs>
  <rect width="960" height="600" fill="#0f172a"/>
  <rect x="74" y="64" width="812" height="472" rx="28" fill="url(#paper)"/>
  <path d="M160 444h640M160 444V140" stroke="#334155" stroke-width="8" stroke-linecap="round"/>
  <path d="M178 424c86-82 156-104 226-86 82 21 102-106 182-126 66-16 116-2 196-98" fill="none" stroke="url(#curve)" stroke-width="18" stroke-linecap="round"/>
  <path d="M766 109l44-18-8 47" fill="none" stroke="#ef4444" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
  <g fill="#f8fafc" stroke="#0f172a" stroke-width="5">
    <rect x="190" y="360" width="124" height="58" rx="14" fill="#ccfbf1"/>
    <rect x="394" y="296" width="124" height="58" rx="14" fill="#fef3c7"/>
    <rect x="602" y="176" width="150" height="64" rx="14" fill="#fee2e2"/>
  </g>
  <text x="211" y="395" fill="#0f172a" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800">games</text>
  <text x="418" y="331" fill="#0f172a" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800">proofs</text>
  <text x="625" y="214" fill="#0f172a" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800">any work?</text>
  <text x="136" y="118" fill="#0f172a" font-family="Inter, Arial, sans-serif" font-size="40" font-weight="900">1965</text>
  <text x="136" y="154" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">early symbolic success expands into public promise</text>
  <text x="798" y="470" text-anchor="end" fill="#334155" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800">expectation outruns evidence</text>
</svg>

  <text x="134" y="182" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="800">trust fails when duties conflict</text>
  <circle cx="480" cy="292" r="98" fill="#111827"/>
  <circle cx="480" cy="292" r="66" fill="#7f1d1d"/>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 640" role="img" aria-labelledby="title desc">
  <title id="title">Libratus imperfect-information solving</title>
  <desc id="desc">A local original diagram showing blueprint strategy, hidden cards, subgame solving, and repair.</desc>
  <rect width="960" height="640" fill="#111827"/>
  <rect x="64" y="64" width="832" height="512" rx="24" fill="#1e1b2e" stroke="#f59e0b" stroke-width="3"/>
  <text x="96" y="122" fill="#f8fafc" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700">Libratus: hidden information poker</text>
  <text x="96" y="160" fill="#fde68a" font-family="Arial, Helvetica, sans-serif" font-size="18">blueprint strategy + real-time subgame solving + nightly repair</text>
  <g transform="translate(112 230)">
    <ellipse cx="142" cy="120" rx="142" ry="86" fill="#064e3b" stroke="#34d399" stroke-width="4"/>
    <rect x="92" y="74" width="42" height="62" rx="8" fill="#f8fafc"/>
    <rect x="142" y="74" width="42" height="62" rx="8" fill="#111827" stroke="#f8fafc" stroke-width="2"/>
    <text x="113" y="113" fill="#b91c1c" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" text-anchor="middle">A</text>
    <text x="163" y="113" fill="#f8fafc" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" text-anchor="middle">?</text>
    <circle cx="84" cy="166" r="16" fill="#f97316"/>
    <circle cx="204" cy="166" r="16" fill="#facc15"/>
    <text x="142" y="242" fill="#f8fafc" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="700" text-anchor="middle">private state</text>
  </g>
  <path d="M410 350H492" stroke="#f97316" stroke-width="8" stroke-linecap="round"/>
  <path d="M474 330L502 350L474 370" fill="none" stroke="#f97316" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <g transform="translate(526 210)" font-family="Arial, Helvetica, sans-serif" font-weight="700" text-anchor="middle">
    <rect width="160" height="72" rx="16" fill="#1d4ed8"/><text x="80" y="44" fill="#fff" font-size="22">Blueprint</text>
    <rect y="102" width="160" height="72" rx="16" fill="#7c3aed"/><text x="80" y="145" fill="#fff" font-size="22">Subgame</text>
    <rect y="204" width="160" height="72" rx="16" fill="#b91c1c"/><text x="80" y="247" fill="#fff" font-size="22">Repair</text>
  </g>
  <path d="M704 246C756 238 792 254 826 300" stroke="#94a3b8" stroke-width="5" fill="none" stroke-dasharray="12 10"/>
  <path d="M826 300C790 358 756 388 704 414" stroke="#94a3b8" stroke-width="5" fill="none" stroke-dasharray="12 10"/>
  <text x="96" y="548" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="20">Interaction: hide or reveal cards to compare direct search with equilibrium reasoning.</text>

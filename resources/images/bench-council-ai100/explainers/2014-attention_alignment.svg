<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" role="img" aria-labelledby="title desc">
  <title id="title">Attention alignment map</title>
  <desc id="desc">Decoder token attends to several source tokens with different weights.</desc>
  <rect width="640" height="360" rx="24" fill="#0f172a"/>
  <text x="40" y="54" fill="#f59e0b" font-family="Arial" font-size="28" font-weight="700">learned alignment attention</text>
  <g font-family="Arial" font-size="17" text-anchor="middle">
    <rect x="72" y="102" width="86" height="48" rx="10" fill="#1e3a8a"/><text x="115" y="132" fill="#dbeafe">source 1</text>
    <rect x="206" y="102" width="86" height="48" rx="10" fill="#1e3a8a"/><text x="249" y="132" fill="#dbeafe">source 2</text>
    <rect x="340" y="102" width="86" height="48" rx="10" fill="#1e3a8a"/><text x="383" y="132" fill="#dbeafe">source 3</text>
    <rect x="474" y="102" width="86" height="48" rx="10" fill="#1e3a8a"/><text x="517" y="132" fill="#dbeafe">source 4</text>
    <rect x="258" y="250" width="124" height="54" rx="12" fill="#14532d"/><text x="320" y="283" fill="#dcfce7">target word</text>
  </g>
  <path d="M115 150L320 250" stroke="#93c5fd" stroke-width="3" opacity=".45"/>
  <path d="M249 150L320 250" stroke="#f59e0b" stroke-width="10" opacity=".95"/>
  <path d="M383 150L320 250" stroke="#93c5fd" stroke-width="5" opacity=".65"/>
  <path d="M517 150L320 250" stroke="#93c5fd" stroke-width="2" opacity=".35"/>
  <text x="320" y="210" fill="#e5e7eb" text-anchor="middle" font-family="Arial" font-size="18">weighted context vector</text>
</svg>

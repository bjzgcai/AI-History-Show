  <g fill="#f4efe5" font-family="Arial, sans-serif" font-weight="800">
    <text x="76" y="84" font-size="30" fill="#f68900">MuZero latent rollout</text>
    <text x="76" y="120" font-size="17" fill="#cbd5e1">observation -> learned model -> search states -> policy</text>
  </g>

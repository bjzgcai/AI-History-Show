<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">MuZero learned-model rollout</title>
  <desc id="desc">A local explainer poster for planning through a learned latent model over game states.</desc>

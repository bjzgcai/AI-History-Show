<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Otter proof trace</title>
  <desc id="desc">Otter derives a contradiction by selecting clauses, applying inference rules, and simplifying consequences.</desc>
  <rect width="1200" height="720" fill="#0f172a"/>
  <rect x="68" y="62" width="1064" height="596" rx="26" fill="#111827" stroke="#475569" stroke-width="4"/>
  <text x="112" y="124" fill="#f8fafc" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="800">Otter proof trace</text>
  <text x="112" y="166" fill="#cbd5e1" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="700">从 selected clause 到 contradiction 的推理轨迹</text>

  <rect x="112" y="216" width="244" height="92" rx="18" fill="#1d4ed8"/>
  <text x="234" y="254" text-anchor="middle" fill="#dbeafe" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="800">1. selected</text>
  <text x="234" y="286" text-anchor="middle" fill="#f8fafc" font-family="Consolas, monospace" font-size="20">P(a) | Q(a)</text>

  <rect x="478" y="216" width="244" height="92" rx="18" fill="#b45309"/>
  <text x="600" y="254" text-anchor="middle" fill="#ffedd5" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="800">2. resolve</text>
  <text x="600" y="286" text-anchor="middle" fill="#f8fafc" font-family="Consolas, monospace" font-size="20">Q(a)</text>

  <rect x="844" y="216" width="244" height="92" rx="18" fill="#15803d"/>
  <text x="966" y="254" text-anchor="middle" fill="#dcfce7" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="800">3. simplify</text>
  <text x="966" y="286" text-anchor="middle" fill="#f8fafc" font-family="Consolas, monospace" font-size="20">R(a)</text>

  <path d="M356 262 H478" stroke="#e5e7eb" stroke-width="8" stroke-linecap="round"/>
  <path d="M722 262 H844" stroke="#e5e7eb" stroke-width="8" stroke-linecap="round"/>
  <path d="M966 308 V390 C966 450 908 488 836 488 H708" stroke="#e5e7eb" stroke-width="8" fill="none" stroke-linecap="round"/>

  <rect x="478" y="426" width="244" height="126" rx="18" fill="#7f1d1d"/>
  <text x="600" y="468" text-anchor="middle" fill="#fee2e2" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="800">4. contradiction</text>
  <text x="600" y="508" text-anchor="middle" fill="#f8fafc" font-family="Consolas, monospace" font-size="22">$F</text>

  <rect x="112" y="410" width="250" height="142" rx="18" fill="#0b1120" stroke="#334155" stroke-width="3"/>
  <text x="140" y="452" fill="#f8fafc" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="800">Search controls</text>
  <text x="140" y="494" fill="#93c5fd" font-family="Consolas, monospace" font-size="19">weight, demodulators</text>
  <text x="140" y="532" fill="#93c5fd" font-family="Consolas, monospace" font-size="19">term indexes</text>

  <text x="112" y="616" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">Based on OTTER 3.3 Reference Manual · proof trace view</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Simulated annealing over an energy landscape</title>
  <desc id="desc">High temperature permits uphill moves across local barriers; cooling gradually concentrates the search in a low-cost basin.</desc>
  <defs>
    <marker id="arrow-orange" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 Z" fill="#f59e0b"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 Z" fill="#22c55e"/>
    </marker>
  </defs>

  <rect width="1200" height="720" fill="#0b1220"/>
  <rect x="36" y="32" width="1128" height="656" rx="8" fill="#111827" stroke="#334155" stroke-width="2"/>

  <text x="72" y="88" fill="#f8fafc" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700">SIMULATED ANNEALING</text>
  <text x="72" y="124" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="22">模拟退火：从高温探索到低温收敛</text>

  <rect x="72" y="156" width="782" height="390" rx="8" fill="#0f172a" stroke="#334155" stroke-width="2"/>
  <text x="98" y="194" fill="#cbd5e1" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">COST / 代价</text>
  <path d="M98 492 C150 318 205 470 264 396 C326 316 364 210 424 356 C476 478 546 438 600 326 C660 204 710 450 770 296 C792 240 815 226 832 214" fill="none" stroke="#e2e8f0" stroke-width="7" stroke-linecap="round"/>

  <circle cx="196" cy="421" r="12" fill="#f59e0b" stroke="#fff7ed" stroke-width="3"/>
  <circle cx="424" cy="356" r="12" fill="#f59e0b" stroke="#fff7ed" stroke-width="3"/>
  <path d="M196 421 C254 278 350 226 424 356" fill="none" stroke="#f59e0b" stroke-width="5" stroke-dasharray="12 10" marker-end="url(#arrow-orange)"/>
  <text x="212" y="252" fill="#fbbf24" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">HIGH T: CROSS A BARRIER</text>
  <text x="212" y="278" fill="#fcd34d" font-family="Arial, Helvetica, sans-serif" font-size="16">高温：可能接受较差移动</text>

  <circle cx="534" cy="431" r="12" fill="#22c55e" stroke="#ecfdf5" stroke-width="3"/>
  <circle cx="690" cy="390" r="12" fill="#22c55e" stroke="#ecfdf5" stroke-width="3"/>
  <path d="M534 431 C584 386 632 356 690 390" fill="none" stroke="#22c55e" stroke-width="5" stroke-dasharray="10 9" marker-end="url(#arrow-green)"/>
  <text x="572" y="472" fill="#86efac" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">LOW T: FAVOR LOWER COST</text>
  <text x="572" y="500" fill="#bbf7d0" font-family="Arial, Helvetica, sans-serif" font-size="16">低温：逐渐稳定在低代价区域</text>

  <text x="112" y="526" fill="#64748b" font-family="Arial, Helvetica, sans-serif" font-size="15">LOCAL BASIN / 局部低谷</text>
  <text x="664" y="526" fill="#64748b" font-family="Arial, Helvetica, sans-serif" font-size="15">DEEP BASIN / 更深低谷</text>

  <rect x="878" y="156" width="250" height="390" rx="8" fill="#172033" stroke="#475569" stroke-width="2"/>
  <text x="904" y="198" fill="#f8fafc" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">ACCEPTANCE RULE</text>
  <text x="904" y="226" fill="#cbd5e1" font-family="Arial, Helvetica, sans-serif" font-size="17">接受准则</text>

  <rect x="904" y="254" width="198" height="74" rx="6" fill="#0f766e"/>
  <text x="922" y="282" fill="#ccfbf1" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700">ΔE ≤ 0</text>
  <text x="922" y="310" fill="#f0fdfa" font-family="Arial, Helvetica, sans-serif" font-size="18">ACCEPT / 直接接受</text>

  <rect x="904" y="344" width="198" height="112" rx="6" fill="#7c2d12"/>
  <text x="922" y="374" fill="#ffedd5" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700">ΔE &gt; 0</text>
  <text x="922" y="406" fill="#fff7ed" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">p ≈ exp(-ΔE/T)</text>
  <text x="922" y="436" fill="#fed7aa" font-family="Arial, Helvetica, sans-serif" font-size="15">概率接受较差移动</text>

  <text x="904" y="492" fill="#fbbf24" font-family="Arial, Helvetica, sans-serif" font-size="16">Higher T → more exploration</text>
  <text x="904" y="518" fill="#86efac" font-family="Arial, Helvetica, sans-serif" font-size="16">Lower T → more refinement</text>

  <rect x="72" y="574" width="1056" height="78" rx="8" fill="#172033"/>
  <path d="M118 618 H1080" stroke="#475569" stroke-width="6" stroke-linecap="round"/>
  <circle cx="170" cy="618" r="13" fill="#f59e0b"/>
  <circle cx="600" cy="618" r="13" fill="#38bdf8"/>
  <circle cx="1030" cy="618" r="13" fill="#22c55e"/>
  <text x="118" y="602" fill="#fcd34d" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700">HIGH TEMPERATURE / 高温</text>
  <text x="518" y="602" fill="#bae6fd" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700">COOLING / 降温</text>
  <text x="902" y="602" fill="#bbf7d0" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700">LOW TEMPERATURE / 低温</text>
  <text x="132" y="642" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="14">explore</text>
  <text x="575" y="642" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="14">reduce T</text>
  <text x="998" y="642" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="14">refine</text>
</svg>

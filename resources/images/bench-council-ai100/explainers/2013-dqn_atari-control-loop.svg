<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">DQN Atari control loop</title>
  <desc id="desc">A local explainer showing pixels, experience replay, a Q network, and action selection in DQN.</desc>
  <rect width="960" height="540" fill="#0f172a"/>
  <rect x="38" y="34" width="884" height="472" rx="24" fill="#151a26" stroke="#334155" stroke-width="3"/>
  <text x="72" y="82" fill="#f68900" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="800">DQN: pixels to control</text>
  <text x="72" y="116" fill="#cbd5e1" font-family="Arial, Helvetica, sans-serif" font-size="18">Atari frames become replay samples; Q-values choose the next action</text>
  <g transform="translate(76 156)">
    <rect x="0" y="0" width="246" height="208" rx="18" fill="#111827" stroke="#64748b" stroke-width="4"/>
    <rect x="26" y="24" width="194" height="144" rx="8" fill="#020617"/>
    <g fill="#1d4ed8">
      <rect x="42" y="42" width="24" height="18"/>
      <rect x="70" y="42" width="24" height="18"/>
      <rect x="98" y="42" width="24" height="18"/>
      <rect x="126" y="42" width="24" height="18"/>
      <rect x="154" y="42" width="24" height="18"/>
      <rect x="54" y="82" width="24" height="18"/>
      <rect x="82" y="82" width="24" height="18"/>
      <rect x="110" y="82" width="24" height="18"/>
      <rect x="138" y="82" width="24" height="18"/>
    </g>
    <rect x="112" y="132" width="32" height="16" rx="3" fill="#f59e0b"/>
    <circle cx="66" cy="130" r="10" fill="#22c55e"/>
    <circle cx="190" cy="92" r="8" fill="#ef4444"/>
    <text x="123" y="192" fill="#e5e7eb" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18">game pixels</text>
  </g>
  <g font-family="Arial, Helvetica, sans-serif">
    <rect x="386" y="160" width="168" height="72" rx="16" fill="#402c1b" stroke="#f59e0b" stroke-width="3"/>
    <text x="470" y="191" fill="#fde68a" text-anchor="middle" font-size="20" font-weight="700">Replay buffer</text>
    <text x="470" y="217" fill="#fef3c7" text-anchor="middle" font-size="16">sample past transitions</text>
    <rect x="386" y="296" width="168" height="72" rx="16" fill="#172554" stroke="#93c5fd" stroke-width="3"/>
    <text x="470" y="327" fill="#dbeafe" text-anchor="middle" font-size="20" font-weight="700">Q network</text>
    <text x="470" y="353" fill="#bfdbfe" text-anchor="middle" font-size="16">estimate action values</text>
    <rect x="642" y="208" width="190" height="118" rx="18" fill="#064e3b" stroke="#6ee7b7" stroke-width="3"/>
    <text x="737" y="244" fill="#d1fae5" text-anchor="middle" font-size="21" font-weight="700">argmax Q(s,a)</text>
    <path d="M682 282h110" stroke="#bbf7d0" stroke-width="9" stroke-linecap="round"/>
    <path d="M682 306h72" stroke="#60a5fa" stroke-width="9" stroke-linecap="round"/>
    <text x="737" y="354" fill="#94a3b8" text-anchor="middle" font-size="16">left / fire / right</text>
    <path d="M322 254 C348 230 360 206 386 196" fill="none" stroke="#f8fafc" stroke-width="5" marker-end="url(#arrow)"/>
    <path d="M470 232V296" fill="none" stroke="#f8fafc" stroke-width="5" marker-end="url(#arrow)"/>
    <path d="M554 332 C604 330 616 292 642 274" fill="none" stroke="#f8fafc" stroke-width="5" marker-end="url(#arrow)"/>
    <path d="M642 286 C536 440 214 430 166 364" fill="none" stroke="#60a5fa" stroke-width="4" stroke-dasharray="9 9"/>
  </g>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="#f8fafc"/>
    </marker>
  </defs>
  <text x="72" y="466" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="18">Local original SVG redraw; no Nature or DeepMind figure is copied.</text>
</svg>

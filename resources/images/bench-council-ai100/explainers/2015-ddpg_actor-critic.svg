<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" role="img" aria-labelledby="title desc">
  <title id="title">DDPG actor-critic training loop</title>
  <desc id="desc">State enters a deterministic actor, which sends a continuous action to the environment. Experience replay trains the critic, policy gradients update the actor, and target networks stabilize both updates.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0 0 L10 5 L0 10 Z" fill="#475569"/>
    </marker>
    <marker id="gradient-arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0 0 L10 5 L0 10 Z" fill="#7c3aed"/>
    </marker>
  </defs>
  <rect width="720" height="420" rx="24" fill="#f8fafc"/>
  <rect x="24" y="24" width="672" height="372" rx="20" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="48" y="66" font-family="Arial, Helvetica, sans-serif" font-size="27" font-weight="700" fill="#0f172a">DDPG continuous-control loop</text>
  <text x="48" y="91" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#64748b">off-policy learning with replay, target networks, and deterministic policy gradients</text>

  <g font-family="Arial, Helvetica, sans-serif" text-anchor="middle">
    <g>
      <rect x="48" y="132" width="118" height="72" rx="12" fill="#eff6ff" stroke="#2563eb" stroke-width="2.5"/>
      <text x="107" y="163" font-size="18" font-weight="700" fill="#0f172a">state s<tspan baseline-shift="sub" font-size="12">t</tspan></text>
      <text x="107" y="187" font-size="13" fill="#475569">observation</text>
    </g>
    <g>
      <rect x="212" y="124" width="132" height="88" rx="14" fill="#f5f3ff" stroke="#7c3aed" stroke-width="3"/>
      <text x="278" y="160" font-size="19" font-weight="700" fill="#0f172a">actor μ(s)</text>
      <text x="278" y="185" font-size="13" fill="#475569">deterministic policy</text>
    </g>
    <g>
      <rect x="390" y="132" width="124" height="72" rx="12" fill="#ecfeff" stroke="#0891b2" stroke-width="2.5"/>
      <text x="452" y="163" font-size="18" font-weight="700" fill="#0f172a">action a<tspan baseline-shift="sub" font-size="12">t</tspan></text>
      <text x="452" y="187" font-size="13" fill="#475569">continuous</text>
    </g>
    <g>
      <rect x="558" y="124" width="114" height="88" rx="14" fill="#f0fdf4" stroke="#16a34a" stroke-width="2.5"/>
      <text x="615" y="160" font-size="18" font-weight="700" fill="#0f172a">environment</text>
      <text x="615" y="185" font-size="13" fill="#475569">r<tspan baseline-shift="sub" font-size="10">t</tspan>, s<tspan baseline-shift="sub" font-size="10">t+1</tspan></text>
    </g>

    <g>
      <rect x="62" y="282" width="142" height="76" rx="13" fill="#fff7ed" stroke="#ea580c" stroke-width="2.5"/>
      <text x="133" y="314" font-size="18" font-weight="700" fill="#0f172a">replay buffer</text>
      <text x="133" y="338" font-size="13" fill="#475569">off-policy batches</text>
    </g>
    <g>
      <rect x="270" y="274" width="150" height="92" rx="14" fill="#fefce8" stroke="#ca8a04" stroke-width="3"/>
      <text x="345" y="310" font-size="19" font-weight="700" fill="#0f172a">critic Q(s,a)</text>
      <text x="345" y="336" font-size="13" fill="#475569">value + action gradient</text>
    </g>
    <g>
      <rect x="486" y="282" width="160" height="76" rx="13" fill="#f8fafc" stroke="#64748b" stroke-width="2.5" stroke-dasharray="7 5"/>
      <text x="566" y="314" font-size="18" font-weight="700" fill="#0f172a">target networks</text>
      <text x="566" y="338" font-size="13" fill="#475569">slow updates</text>
    </g>
  </g>

  <g fill="none" stroke="#475569" stroke-width="3" marker-end="url(#arrow)">
    <path d="M166 168 H202"/>
    <path d="M344 168 H380"/>
    <path d="M514 168 H548"/>
    <path d="M615 212 V244 H133 V272"/>
    <path d="M204 320 H260"/>
    <path d="M486 320 H430"/>
  </g>
  <path d="M326 274 V236 H278 V222" fill="none" stroke="#7c3aed" stroke-width="3.5" marker-end="url(#gradient-arrow)"/>
  <text x="332" y="251" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700" fill="#7c3aed">policy gradient</text>
  <text x="529" y="239" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#475569">experience tuple (s, a, r, s')</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520" viewBox="0 0 900 520" role="img" aria-labelledby="title desc">
  <title id="title">VC theory generalization diagram</title>
  <desc id="desc">A conceptual diagram showing training data, model capacity, VC dimension, and expected test performance.</desc>
  <rect width="900" height="520" fill="#151515"/>
  <rect x="52" y="54" width="796" height="412" rx="18" fill="#202020" stroke="#5a3a12" stroke-width="2"/>
  <text x="80" y="104" fill="#f68900" font-family="Arial, sans-serif" font-size="26" font-weight="700">VC THEORY</text>
  <text x="80" y="142" fill="#f4efe5" font-family="Arial, sans-serif" font-size="19">Generalization depends on data, error, and model capacity.</text>
  <rect x="92" y="190" width="220" height="220" rx="14" fill="#2b2b2b" stroke="#666"/>
  <text x="202" y="226" fill="#ffffff" font-family="Arial, sans-serif" font-size="22" font-weight="700" text-anchor="middle">Training Sample</text>
  <g fill="#f4efe5">
    <circle cx="146" cy="286" r="9"/>
    <circle cx="188" cy="330" r="9"/>
    <circle cx="246" cy="268" r="9"/>
    <circle cx="260" cy="356" r="9"/>
  </g>
  <g fill="#f68900">
    <rect x="180" y="254" width="18" height="18" rx="3"/>
    <rect x="226" y="318" width="18" height="18" rx="3"/>
    <rect x="132" y="352" width="18" height="18" rx="3"/>
  </g>
  <path d="M116 376 C170 278 228 318 286 236" stroke="#f68900" stroke-width="4" fill="none"/>
  <rect x="386" y="190" width="152" height="220" rx="14" fill="#2a1f12" stroke="#6f4308"/>
  <text x="462" y="258" fill="#ffffff" font-family="Arial, sans-serif" font-size="23" font-weight="700" text-anchor="middle">VC</text>
  <text x="462" y="292" fill="#ffffff" font-family="Arial, sans-serif" font-size="23" font-weight="700" text-anchor="middle">Dimension</text>
  <text x="462" y="336" fill="#d8d1c4" font-family="Arial, sans-serif" font-size="16" text-anchor="middle">capacity control</text>
  <rect x="620" y="190" width="196" height="220" rx="14" fill="#2b2b2b" stroke="#666"/>
  <text x="718" y="226" fill="#ffffff" font-family="Arial, sans-serif" font-size="22" font-weight="700" text-anchor="middle">Test World</text>
  <path d="M652 344 C702 252 748 324 792 244" stroke="#f68900" stroke-width="4" fill="none"/>
  <text x="718" y="382" fill="#d8d1c4" font-family="Arial, sans-serif" font-size="17" text-anchor="middle">expected risk</text>
  <g stroke="#f68900" stroke-width="4" fill="none" marker-end="url(#arrow)">
    <path d="M318 300 L376 300"/>
    <path d="M548 300 L610 300"/>
  </g>
  <text x="450" y="452" fill="#f4efe5" font-family="Arial, sans-serif" font-size="18" font-weight="700" text-anchor="middle">Too much capacity can fit the sample but fail to generalize.</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#f68900"/>
    </marker>
  </defs>
</svg>

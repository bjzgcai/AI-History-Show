<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Otter input clauses</title>
  <desc id="desc">Otter theorem-proving input as weighted clauses and strategy controls.</desc>
  <rect width="1200" height="720" fill="#f3f4f6"/>
  <rect x="70" y="64" width="1060" height="592" rx="24" fill="#111827"/>
  <text x="112" y="126" fill="#f8fafc" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="800">Otter input clauses</text>
  <text x="112" y="168" fill="#cbd5e1" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="700">把目标转成可搜索的子句集合</text>

  <rect x="112" y="214" width="448" height="338" rx="18" fill="#0b1120" stroke="#334155" stroke-width="3"/>
  <text x="142" y="260" fill="#93c5fd" font-family="Consolas, monospace" font-size="23" font-weight="700">set(hyper_res).</text>
  <text x="142" y="306" fill="#93c5fd" font-family="Consolas, monospace" font-size="23" font-weight="700">assign(max_weight, 20).</text>
  <text x="142" y="370" fill="#f8fafc" font-family="Consolas, monospace" font-size="22">list(usable).</text>
  <text x="168" y="416" fill="#fbbf24" font-family="Consolas, monospace" font-size="22">P(x) | Q(x).</text>
  <text x="168" y="462" fill="#fbbf24" font-family="Consolas, monospace" font-size="22">-Q(a) | R(a).</text>
  <text x="168" y="508" fill="#f87171" font-family="Consolas, monospace" font-size="22">-R(a).</text>

  <path d="M596 382 C660 310 712 310 760 382" stroke="#e5e7eb" stroke-width="8" fill="none" stroke-linecap="round"/>
  <path d="M752 382 C816 454 868 454 916 382" stroke="#e5e7eb" stroke-width="8" fill="none" stroke-linecap="round"/>

  <rect x="666" y="314" width="160" height="82" rx="18" fill="#60a5fa"/>
  <text x="746" y="365" text-anchor="middle" fill="#0f172a" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="800">usable</text>
  <rect x="700" y="438" width="160" height="82" rx="18" fill="#f59e0b"/>
  <text x="780" y="489" text-anchor="middle" fill="#0f172a" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="800">sos</text>
  <rect x="910" y="376" width="160" height="82" rx="18" fill="#22c55e"/>
  <text x="990" y="427" text-anchor="middle" fill="#0f172a" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="800">proof</text>

  <text x="112" y="612" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">Based on OTTER 3.3 Reference Manual · input strategy view</text>
</svg>

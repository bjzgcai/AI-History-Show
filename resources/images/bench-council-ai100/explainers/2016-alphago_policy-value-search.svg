<svg width="720" height="504" viewBox="0 0 720 504" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">AlphaGo policy value search explainer</title>
  <desc id="desc">An original explainer showing a Go board, policy and value networks, Monte Carlo tree search, and a highlighted move.</desc>
  <rect width="720" height="504" fill="#f7f5ef"/>
  <rect x="28" y="28" width="664" height="448" rx="18" fill="#fffdf8" stroke="#d4c8b4" stroke-width="2"/>
  <text x="48" y="70" fill="#1f1b16" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="800">AlphaGo: learned intuition plus search</text>
  <text x="48" y="98" fill="#6b6258" font-family="Arial, Helvetica, sans-serif" font-size="16">Policy networks suggest moves; value networks judge positions; MCTS plans ahead.</text>

  <rect x="64" y="132" width="236" height="236" rx="10" fill="#e2b66f" stroke="#7a5528" stroke-width="2"/>
  <g stroke="#7a5528" stroke-width="1.5">
    <path d="M90 158 H274 M90 184 H274 M90 210 H274 M90 236 H274 M90 262 H274 M90 288 H274 M90 314 H274 M90 340 H274"/>
    <path d="M90 158 V340 M116 158 V340 M142 158 V340 M168 158 V340 M194 158 V340 M220 158 V340 M246 158 V340 M274 158 V340"/>
  </g>
  <circle cx="194" cy="236" r="11" fill="#111"/>
  <circle cx="220" cy="236" r="11" fill="#f6f1e8" stroke="#111" stroke-width="2"/>
  <circle cx="168" cy="262" r="11" fill="#111"/>
  <circle cx="220" cy="288" r="11" fill="#111"/>
  <circle cx="246" cy="210" r="11" fill="#f6f1e8" stroke="#111" stroke-width="2"/>
  <circle cx="116" cy="184" r="14" fill="#f68900" stroke="#111" stroke-width="2"/>
  <text x="103" y="188" fill="#111" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="900">37</text>
  <text x="86" y="394" fill="#1f1b16" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="800">Board state</text>
  <text x="86" y="418" fill="#6b6258" font-family="Arial, Helvetica, sans-serif" font-size="14">A candidate move becomes evidence for search.</text>

  <path d="M316 250 H380" stroke="#f68900" stroke-width="4" stroke-linecap="round"/>
  <path d="M380 250 l-14 -9 v18 z" fill="#f68900"/>

  <g font-family="Arial, Helvetica, sans-serif">
    <rect x="396" y="132" width="212" height="70" rx="14" fill="#111"/>
    <text x="416" y="160" fill="#f68900" font-size="14" font-weight="900">POLICY NETWORK</text>
    <text x="416" y="184" fill="#fff" font-size="16" font-weight="800">Which moves deserve search?</text>

    <rect x="396" y="222" width="212" height="70" rx="14" fill="#111"/>
    <text x="416" y="250" fill="#f68900" font-size="14" font-weight="900">VALUE NETWORK</text>
    <text x="416" y="274" fill="#fff" font-size="16" font-weight="800">How promising is this board?</text>

    <rect x="396" y="312" width="212" height="70" rx="14" fill="#111"/>
    <text x="416" y="340" fill="#f68900" font-size="14" font-weight="900">MONTE CARLO TREE SEARCH</text>
    <text x="416" y="364" fill="#fff" font-size="16" font-weight="800">Compare future variations.</text>
  </g>

  <g stroke="#b7a88e" stroke-width="3" fill="none">
    <path d="M502 382 C502 410, 468 430, 438 444"/>
    <path d="M502 382 C508 414, 542 432, 584 444"/>
    <path d="M502 382 C500 420, 506 438, 506 456"/>
  </g>
  <circle cx="438" cy="444" r="8" fill="#f68900"/>
  <circle cx="584" cy="444" r="8" fill="#111"/>
  <circle cx="506" cy="456" r="8" fill="#111"/>
  <text x="396" y="460" fill="#6b6258" font-family="Arial, Helvetica, sans-serif" font-size="13">Move choice = network priors + value estimates + search visits</text>
</svg>

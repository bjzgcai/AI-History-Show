<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">LLM Leaderboard Snapshot</title>
  <desc id="desc">An English-only leaderboard style graphic showing model families competing across common large language model capabilities.</desc>
  <rect width="1600" height="900" fill="#f8fafc"/>
  <text x="100" y="105" font-family="Inter, Arial, sans-serif" font-size="56" font-weight="800" fill="#111827">LLM Leaderboard Snapshot</text>
  <text x="102" y="154" font-family="Inter, Arial, sans-serif" font-size="24" fill="#64748b">Model families compete across reasoning, coding, multimodality, tool use and efficiency.</text>
  <g font-family="Inter, Arial, sans-serif">
    <rect x="100" y="210" width="560" height="560" rx="28" fill="#ffffff" stroke="#dbe3ee" stroke-width="3"/>
    <text x="140" y="268" font-size="28" font-weight="800" fill="#0f172a">Public Arena Ranking</text>
    <g font-size="24" font-weight="700">
      <rect x="140" y="310" width="480" height="64" rx="14" fill="#eff6ff"/>
      <text x="166" y="350" fill="#2563eb">1</text><text x="220" y="350" fill="#111827">Gemini family</text><text x="520" y="350" fill="#2563eb">94.2</text>
      <rect x="140" y="390" width="480" height="64" rx="14" fill="#f8fafc"/>
      <text x="166" y="430" fill="#475569">2</text><text x="220" y="430" fill="#111827">Claude family</text><text x="520" y="430" fill="#475569">93.8</text>
      <rect x="140" y="470" width="480" height="64" rx="14" fill="#f8fafc"/>
      <text x="166" y="510" fill="#475569">3</text><text x="220" y="510" fill="#111827">GPT family</text><text x="520" y="510" fill="#475569">93.1</text>
      <rect x="140" y="550" width="480" height="64" rx="14" fill="#f8fafc"/>
      <text x="166" y="590" fill="#475569">4</text><text x="220" y="590" fill="#111827">Grok family</text><text x="520" y="590" fill="#475569">91.7</text>
      <rect x="140" y="630" width="480" height="64" rx="14" fill="#f8fafc"/>
      <text x="166" y="670" fill="#475569">5</text><text x="220" y="670" fill="#111827">Qwen family</text><text x="520" y="670" fill="#475569">90.9</text>
    </g>
  </g>
  <g font-family="Inter, Arial, sans-serif">
    <rect x="740" y="210" width="760" height="560" rx="28" fill="#ffffff" stroke="#dbe3ee" stroke-width="3"/>
    <text x="782" y="268" font-size="28" font-weight="800" fill="#0f172a">Capability Dimensions</text>
    <g font-size="24" font-weight="700" fill="#111827">
      <text x="790" y="340">Reasoning</text>
      <rect x="1000" y="315" width="390" height="28" rx="14" fill="#e2e8f0"/><rect x="1000" y="315" width="338" height="28" rx="14" fill="#fb923c"/>
      <text x="790" y="420">Coding</text>
      <rect x="1000" y="395" width="390" height="28" rx="14" fill="#e2e8f0"/><rect x="1000" y="395" width="318" height="28" rx="14" fill="#22c55e"/>
      <text x="790" y="500">Multimodal</text>
      <rect x="1000" y="475" width="390" height="28" rx="14" fill="#e2e8f0"/><rect x="1000" y="475" width="298" height="28" rx="14" fill="#3b82f6"/>
      <text x="790" y="580">Tool Use</text>
      <rect x="1000" y="555" width="390" height="28" rx="14" fill="#e2e8f0"/><rect x="1000" y="555" width="342" height="28" rx="14" fill="#a855f7"/>
      <text x="790" y="660">Latency / Cost</text>
      <rect x="1000" y="635" width="390" height="28" rx="14" fill="#e2e8f0"/><rect x="1000" y="635" width="268" height="28" rx="14" fill="#14b8a6"/>
    </g>
  </g>
  <text x="100" y="830" font-family="Inter, Arial, sans-serif" font-size="22" fill="#64748b">Illustrative English display graphic for the AI History Show.</text>
</svg>

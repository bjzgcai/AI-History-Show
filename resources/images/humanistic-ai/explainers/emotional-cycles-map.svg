<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Humanistic and emotional cycles of AI</title>
  <desc id="desc">A local original timeline map showing AI cultural emotions from dystopian prophecy through ethical rules, optimism, winters, dread, and safety action.</desc>
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7efe0"/>
      <stop offset="0.52" stop-color="#efe0ca"/>
      <stop offset="1" stop-color="#e4d1b7"/>
    </linearGradient>
    <linearGradient id="cycle" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#b6a100"/>
      <stop offset="0.2" stop-color="#7f5fb4"/>
      <stop offset="0.38" stop-color="#c65a42"/>
      <stop offset="0.55" stop-color="#5b7da4"/>
      <stop offset="0.74" stop-color="#202020"/>
      <stop offset="1" stop-color="#2f75bb"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#6f5c45" flood-opacity="0.18"/>
    </filter>
    <style>
      .label { font-family: Arial, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #241f1a; }
      .year { font-size: 30px; font-weight: 800; letter-spacing: 0; }
      .title { font-size: 22px; font-weight: 800; letter-spacing: 0; }
      .caption { font-size: 18px; font-weight: 700; fill: #5d5146; letter-spacing: 0; }
      .small { font-size: 15px; font-weight: 700; fill: #715f50; letter-spacing: 0; }
      .tag { font-size: 14px; font-weight: 800; fill: #fff7ec; letter-spacing: 0; }
    </style>
  </defs>

  <rect width="1200" height="720" rx="0" fill="url(#paper)"/>
  <path d="M0 0h1200v720H0z" fill="#f6ead7" opacity="0.38"/>
  <path d="M96 484 C210 220, 370 214, 468 394 S686 578, 794 334 S988 100, 1104 218" fill="none" stroke="url(#cycle)" stroke-width="18" stroke-linecap="round" filter="url(#softShadow)"/>
  <path d="M96 484 C210 220, 370 214, 468 394 S686 578, 794 334 S988 100, 1104 218" fill="none" stroke="#fff8ef" stroke-width="3" stroke-linecap="round" opacity="0.72"/>

  <g transform="translate(70 74)">
    <text class="label year" x="0" y="0">1920-2023</text>
    <text class="label title" x="0" y="40">Human expectations shaped AI history</text>
    <text class="label caption" x="0" y="75">Prophecy, ethics, hype, winter, dread, and governance move with technical progress.</text>
  </g>

  <g transform="translate(90 472)">
    <circle r="18" fill="#b6a100"/>
    <rect x="-14" y="32" width="170" height="34" rx="17" fill="#b6a100"/>
    <text class="label year" x="0" y="-34">1920</text>
    <text class="tag" x="14" y="54">Prophecy</text>
    <text class="label small" x="0" y="91">R.U.R. names the robot</text>
  </g>

  <g transform="translate(284 240)">
    <circle r="18" fill="#7f5fb4"/>
    <rect x="-14" y="-78" width="156" height="34" rx="17" fill="#7f5fb4"/>
    <text class="label year" x="-10" y="-112">1942-1950</text>
    <text class="tag" x="14" y="-56">Ethics</text>
    <text class="label small" x="-10" y="-18">Asimov and Wiener ask</text>
    <text class="label small" x="-10" y="4">how control can fail</text>
  </g>

  <g transform="translate(468 394)">
    <circle r="18" fill="#c65a42"/>
    <rect x="-14" y="32" width="164" height="34" rx="17" fill="#c65a42"/>
    <text class="label year" x="-10" y="-34">1965</text>
    <text class="tag" x="14" y="54">Over-optimism</text>
    <text class="label small" x="-10" y="91">Bold promises raise</text>
    <text class="label small" x="-10" y="113">impossible expectations</text>
  </g>

  <g transform="translate(640 520)">
    <circle r="18" fill="#5b7da4"/>
    <rect x="-14" y="32" width="126" height="34" rx="17" fill="#5b7da4"/>
    <text class="label year" x="-10" y="-34">1973-1987</text>
    <text class="tag" x="14" y="54">Winter</text>
    <text class="label small" x="-10" y="91">Reports and market</text>
    <text class="label small" x="-10" y="113">collapse cool the field</text>
  </g>

  <g transform="translate(824 300)">
    <circle r="18" fill="#202020"/>
    <rect x="-14" y="-78" width="120" height="34" rx="17" fill="#202020"/>
    <text class="label year" x="-10" y="-112">2014</text>
    <text class="tag" x="14" y="-56">Dread</text>
    <text class="label small" x="-10" y="-18">Superintelligence risk</text>
    <text class="label small" x="-10" y="4">enters public debate</text>
  </g>

  <g transform="translate(1104 218)">
    <circle r="18" fill="#2f75bb"/>
    <rect x="-148" y="32" width="176" height="34" rx="17" fill="#2f75bb"/>
    <text class="label year" x="-114" y="-34">2015-2023</text>
    <text class="tag" x="-126" y="54">Safety action</text>
    <text class="label small" x="-208" y="91">Institutions and statements</text>
    <text class="label small" x="-208" y="113">turn fear into governance</text>
  </g>

  <g transform="translate(70 626)">
    <rect width="1060" height="1" fill="#8b7764" opacity="0.3"/>
    <text class="label caption" x="0" y="42">AI History Map branch intro | local original SVG explainer</text>
  </g>
</svg>

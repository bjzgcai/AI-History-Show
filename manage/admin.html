<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 展览 · Legacy 内容查看</title>
  <style>
    :root { color-scheme:dark; --bg:#0d1117; --panel:#161b22; --line:#30363d; --text:#e6edf3; --muted:#8b949e; --accent:#f68900; --danger:#ffb4ad; }
    * { box-sizing:border-box; }
    body { margin:0; background:var(--bg); color:var(--text); font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; }
    a { color:inherit; }
    header { min-height:58px; padding:12px 18px; border-bottom:1px solid var(--line); background:var(--panel); display:flex; align-items:center; justify-content:space-between; gap:16px; }
    h1 { margin:0; font-size:17px; }
    .archive-link { border:1px solid var(--accent); border-radius:8px; padding:7px 10px; color:var(--accent); text-decoration:none; white-space:nowrap; }
    .banner { padding:10px 18px; background:rgba(248,81,73,.14); color:var(--danger); border-bottom:1px solid rgba(248,81,73,.45); font-weight:600; }
    .layout { display:grid; grid-template-columns:320px minmax(0,1fr); min-height:calc(100vh - 101px); }
    aside { border-right:1px solid var(--line); background:var(--panel); padding:14px; overflow:auto; }
    main { min-width:0; padding:22px; overflow:auto; }
    input { width:100%; margin-bottom:12px; border:1px solid var(--line); border-radius:8px; background:var(--bg); color:var(--text); padding:9px 10px; font:inherit; }
    button { width:100%; margin:3px 0; border:1px solid transparent; border-radius:7px; background:transparent; color:var(--text); padding:8px 10px; text-align:left; cursor:pointer; }
    button:hover, button.active { border-color:var(--accent); background:rgba(246,137,0,.08); }
    .section-title { margin:14px 8px 5px; color:var(--muted); font-size:11px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; }
    .event-key, .muted { color:var(--muted); }
    .event-key { display:block; font-size:11px; }
    .card { max-width:1100px; border:1px solid var(--line); border-radius:12px; background:var(--panel); padding:18px; }
    .card h2 { margin:0 0 4px; }
    .metadata { display:flex; flex-wrap:wrap; gap:8px 16px; margin:10px 0 18px; color:var(--muted); }
    dl { display:grid; grid-template-columns:150px minmax(0,1fr); gap:8px 14px; margin:0; }
    dt { color:var(--muted); }
    dd { min-width:0; margin:0; overflow-wrap:anywhere; }
    pre { margin:18px 0 0; padding:14px; max-height:45vh; overflow:auto; border:1px solid var(--line); border-radius:8px; background:var(--bg); font:12px/1.45 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; white-space:pre-wrap; }
    .empty { color:var(--muted); padding:24px; text-align:center; }
    @media (max-width:760px) { .layout { grid-template-columns:1fr; } aside { border-right:0; border-bottom:1px solid var(--line); max-height:42vh; } dl { grid-template-columns:1fr; } }
  </style>
</head>
<body>
<header>
  <h1>AI 展览 · Legacy 内容查看（只读）</h1>
  <a class="archive-link" href="/archive-admin">打开 Archive Entity Editor</a>
</header>
<div class="banner">
  Legacy 管理页只用于兼容数据参考，不再提供保存、恢复、上传或生成操作。生产内容请在 Archive 中编辑、校验并生成。
</div>
<div class="layout">
  <aside>
    <input id="eventSearch" type="search" placeholder="搜索 Legacy 事件…" aria-label="搜索 Legacy 事件">
    <div id="eventList"><div class="empty">加载中…</div></div>
  </aside>
  <main id="main"><div class="empty">请选择一个 Legacy 事件查看。</div></main>
</div>
<script>
'use strict';

const state = { catalog:null, events:null, selected:'' };
const eventList = document.getElementById('eventList');
const main = document.getElementById('main');
const search = document.getElementById('eventSearch');

function localized(value, locale='zh') {
  if (value == null) return '';
  if (typeof value === 'object' && !Array.isArray(value)) return String(value[locale] || value.en || value.zh || '');
  return String(value);
}

function escapeHtml(value) {
  return String(value == null ? '' : value)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}

function orderedGroups() {
  const seen = new Set();
  const groups = [];
  for (const category of state.catalog.categories || []) {
    const keys = (category.events || []).filter(key => state.events[key] && !seen.has(key));
    keys.forEach(key => seen.add(key));
    if (keys.length) groups.push({ name:localized(category.name), keys });
  }
  const remaining = Object.keys(state.events).filter(key => !seen.has(key));
  if (remaining.length) groups.push({ name:'未列入 Legacy catalog', keys:remaining });
  return groups;
}

function renderList() {
  const query = search.value.trim().toLowerCase();
  const html = orderedGroups().map(group => {
    const buttons = group.keys.map(key => {
      const event = state.events[key] || {};
      const title = localized(event.title) || key;
      const haystack = `${key} ${title} ${localized(event.title, 'en')}`.toLowerCase();
      if (query && !haystack.includes(query)) return '';
      return `<button data-key="${escapeHtml(key)}" class="${state.selected === key ? 'active' : ''}"><span>${escapeHtml(title)}</span><span class="event-key">${escapeHtml(key)}</span></button>`;
    }).join('');
    return buttons ? `<div class="section-title">${escapeHtml(group.name)}</div>${buttons}` : '';
  }).join('');
  eventList.innerHTML = html || '<div class="empty">没有匹配事件。</div>';
}

function renderEvent(key) {
  const event = state.events[key];
  if (!event) return;
  state.selected = key;
  const location = event.location || {};
  const figures = Array.isArray(event.figures)
    ? event.figures.map(item => localized(item && item.name) || localized(item)).filter(Boolean).join('、')
    : '';
  main.innerHTML = `<article class="card">
    <h2>${escapeHtml(localized(event.title) || key)}</h2>
    <div class="muted">${escapeHtml(localized(event.title, 'en'))}</div>
    <div class="metadata"><span>Key: ${escapeHtml(key)}</span><span>年份: ${escapeHtml(event.year || '')}</span></div>
    <dl>
      <dt>地点</dt><dd>${escapeHtml(localized(location.name))}</dd>
      <dt>国家/地区</dt><dd>${escapeHtml(localized(location.country))}</dd>
      <dt>坐标</dt><dd>${escapeHtml(Array.isArray(location.coordinates) ? location.coordinates.join(', ') : '')}</dd>
      <dt>人物</dt><dd>${escapeHtml(figures)}</dd>
      <dt>中文描述</dt><dd>${escapeHtml(localized(event.description))}</dd>
      <dt>English description</dt><dd>${escapeHtml(localized(event.description, 'en'))}</dd>
    </dl>
    <pre>${escapeHtml(JSON.stringify(event, null, 2))}</pre>
  </article>`;
  renderList();
}

async function load() {
  const [catalogResponse, eventsResponse] = await Promise.all([fetch('/api/catalog'), fetch('/api/events')]);
  if (!catalogResponse.ok || !eventsResponse.ok) throw new Error('Legacy reference data could not be loaded.');
  state.catalog = await catalogResponse.json();
  state.events = await eventsResponse.json();
  renderList();
}

eventList.addEventListener('click', event => {
  const button = event.target.closest('button[data-key]');
  if (button) renderEvent(button.dataset.key);
});
search.addEventListener('input', renderList);
load().catch(error => { main.innerHTML = `<div class="empty">${escapeHtml(error.message)}</div>`; });
</script>
</body>
</html>

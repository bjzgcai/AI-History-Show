<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Archive Entity Editor</title>
  <style>
    :root { color-scheme: dark; --bg:#101114; --panel:#181a20; --line:#30343d; --text:#f2efe7; --muted:#a9adba; --accent:#f68900; --ok:#3fb950; --bad:#f85149; }
    * { box-sizing:border-box; }
    body { margin:0; background:var(--bg); color:var(--text); font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; }
    header { padding:18px 22px; border-bottom:1px solid var(--line); background:#14161b; display:flex; justify-content:space-between; gap:16px; align-items:center; }
    h1 { margin:0; font-size:22px; }
    main { display:grid; grid-template-columns:320px 1fr; min-height:calc(100vh - 68px); }
    aside { border-right:1px solid var(--line); padding:16px; overflow:auto; }
    section { padding:16px; min-width:0; }
    button, select { background:#222631; color:var(--text); border:1px solid var(--line); border-radius:8px; padding:8px 10px; font:inherit; cursor:pointer; }
    button:hover { border-color:var(--accent); }
    .entity { display:block; width:100%; text-align:left; margin:4px 0; }
    .entity.active { border-color:var(--accent); color:var(--accent); }
    .toolbar { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:12px; align-items:center; }
    textarea { width:100%; min-height:68vh; resize:vertical; background:#0d0e11; color:#f2efe7; border:1px solid var(--line); border-radius:12px; padding:14px; font:13px/1.5 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; tab-size:2; }
    .status { color:var(--muted); margin-left:auto; }
    .status.ok { color:var(--ok); } .status.bad { color:var(--bad); }
    pre { background:#0d0e11; border:1px solid var(--line); border-radius:12px; padding:12px; overflow:auto; max-height:240px; }
    .muted { color:var(--muted); }
  </style>
</head>
<body>
<header>
  <div>
    <h1>Archive Entity Editor</h1>
    <div class="muted">Edit Archive event bundles and storylines. Save, validate here, then run <code>npm run generate</code>.</div>
  </div>
  <button id="validateBtn">Run validation</button>
</header>
<main>
  <aside>
    <div class="toolbar">
      <select id="entityType"><option value="events">Events</option><option value="storylines">Storylines</option></select>
      <button id="refreshBtn">Refresh</button>
    </div>
    <div id="entityList"></div>
  </aside>
  <section>
    <div class="toolbar">
      <strong id="currentEntity">No entity selected</strong>
      <select id="fileSelect"></select>
      <button id="loadBtn">Load</button>
      <button id="saveBtn">Save</button>
      <span id="status" class="status"></span>
    </div>
    <textarea id="editor" spellcheck="false" placeholder="Select an Archive event or storyline..."></textarea>
    <h3>Validation output</h3>
    <pre id="validationOutput">Not run yet.</pre>
  </section>
</main>
<script>
const state = { type: 'events', entities: [], entityId: '', file: '' };
const entityType = document.getElementById('entityType');
const entityList = document.getElementById('entityList');
const fileSelect = document.getElementById('fileSelect');
const editor = document.getElementById('editor');
const statusEl = document.getElementById('status');
const currentEntity = document.getElementById('currentEntity');
const validationOutput = document.getElementById('validationOutput');
function setStatus(text, cls='') { statusEl.textContent = text; statusEl.className = 'status ' + cls; }
async function api(url, options) {
  const res = await fetch(url, options);
  const data = await res.json();
  if (!res.ok || data.error) throw new Error(data.error || res.statusText);
  return data;
}
function escapeHtml(value) {
  return String(value).replace(/[&<>"']/g, char => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' })[char]);
}
function renderEntities() {
  entityList.innerHTML = state.entities.map(entity => {
    const id = typeof entity === 'string' ? entity : entity.id;
    const detail = typeof entity === 'string' ? 'storyline JSON' : `${entity.files.length} files · ${entity.variants.length} variants`;
    return `<button class="entity${id===state.entityId?' active':''}" data-id="${escapeHtml(id)}">${escapeHtml(id)}<br><span class="muted">${escapeHtml(detail)}</span></button>`;
  }).join('');
}
async function refresh() {
  state.entities = await api(`/api/archive/${state.type}`);
  renderEntities();
}
function selectEntity(id) {
  state.entityId = id;
  currentEntity.textContent = `${state.type === 'events' ? 'Event' : 'Storyline'}: ${id}`;
  if (state.type === 'events') {
    const entity = state.entities.find(item => item.id === id);
    const files = entity ? entity.files : [];
    fileSelect.hidden = false;
    fileSelect.innerHTML = files.map(file => `<option value="${file}">${file}</option>`).join('');
    state.file = files[0] || '';
  } else {
    fileSelect.hidden = true;
    fileSelect.innerHTML = '';
    state.file = '';
  }
  renderEntities();
}
async function loadEntity() {
  if (!state.entityId) { setStatus('Select an entity first', 'bad'); return; }
  if (state.type === 'events' && !fileSelect.value) { setStatus('Select an event file first', 'bad'); return; }
  const url = state.type === 'events'
    ? `/api/archive/file?eventId=${encodeURIComponent(state.entityId)}&file=${encodeURIComponent(fileSelect.value)}`
    : `/api/archive/storyline?storylineId=${encodeURIComponent(state.entityId)}`;
  if (state.type === 'events') state.file = fileSelect.value;
  const data = await api(url);
  editor.value = JSON.stringify(data.data, null, 2);
  setStatus(`Loaded ${state.file || state.entityId}`, 'ok');
}
async function saveEntity() {
  if (!state.entityId) { setStatus('Select an entity first', 'bad'); return; }
  if (state.type === 'events' && !state.file) { setStatus('Select an event file first', 'bad'); return; }
  let parsed;
  try { parsed = JSON.parse(editor.value); }
  catch (error) { setStatus('Invalid JSON: ' + error.message, 'bad'); return; }
  const body = state.type === 'events'
    ? { eventId: state.entityId, file: state.file, data: parsed }
    : { storylineId: state.entityId, data: parsed };
  const url = state.type === 'events' ? '/api/archive/file' : '/api/archive/storyline';
  await api(url, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });
  setStatus(`Saved ${state.file || state.entityId}; run validation, then npm run generate`, 'ok');
}
async function validate() {
  validationOutput.textContent = 'Running...';
  const data = await api('/api/archive/validate', { method:'POST' });
  validationOutput.textContent = [data.stdout, data.stderr].filter(Boolean).join('\n') || `exitCode=${data.exitCode}`;
  setStatus(data.ok ? 'Validation passed' : 'Validation failed', data.ok ? 'ok' : 'bad');
}
entityList.addEventListener('click', event => { const btn = event.target.closest('button[data-id]'); if (btn) { selectEntity(btn.dataset.id); loadEntity().catch(err => setStatus(err.message, 'bad')); } });
entityType.addEventListener('change', () => { state.type = entityType.value; state.entityId = ''; state.file = ''; currentEntity.textContent = 'No entity selected'; editor.value = ''; refresh().catch(err => setStatus(err.message, 'bad')); });
fileSelect.addEventListener('change', () => { state.file = fileSelect.value; });
document.getElementById('refreshBtn').addEventListener('click', () => refresh().catch(err => setStatus(err.message, 'bad')));
document.getElementById('loadBtn').addEventListener('click', () => loadEntity().catch(err => setStatus(err.message, 'bad')));
document.getElementById('saveBtn').addEventListener('click', () => saveEntity().catch(err => setStatus(err.message, 'bad')));
document.getElementById('validateBtn').addEventListener('click', () => validate().catch(err => setStatus(err.message, 'bad')));
refresh().catch(err => setStatus(err.message, 'bad'));
</script>
</body>
</html>

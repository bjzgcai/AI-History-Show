<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archive Preview Compare</title>
    <style>
        :root {
            --bg: #111;
            --panel: #1b1b1b;
            --line: rgba(255, 255, 255, 0.16);
            --text: #f4efe5;
            --muted: rgba(244, 239, 229, 0.68);
            --accent: #f68900;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            overflow: hidden;
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
        }

        .toolbar {
            height: 64px;
            display: grid;
            grid-template-columns: auto auto auto auto 1fr auto;
            gap: 12px;
            align-items: center;
            padding: 10px 14px;
            border-bottom: 1px solid var(--line);
            background: var(--panel);
        }

        .title {
            font-weight: 800;
            letter-spacing: 0.02em;
            white-space: nowrap;
        }

        label {
            display: inline-flex;
            gap: 6px;
            align-items: center;
            color: var(--muted);
            font-size: 13px;
            white-space: nowrap;
        }

        select,
        input,
        button {
            height: 34px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #0e0e0e;
            color: var(--text);
            font: inherit;
        }

        select,
        input {
            padding: 0 10px;
        }

        button {
            padding: 0 14px;
            cursor: pointer;
        }

        button:hover {
            border-color: rgba(246, 137, 0, 0.75);
            color: var(--accent);
        }

        .hint {
            color: var(--muted);
            font-size: 12px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .compare {
            height: calc(100vh - 64px);
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1px;
            background: var(--line);
        }

        .pane {
            min-width: 0;
            display: grid;
            grid-template-rows: 34px 1fr;
            background: #000;
        }

        .pane-title {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 12px;
            background: #181818;
            border-bottom: 1px solid var(--line);
            font-size: 13px;
        }

        .pane-title strong {
            color: var(--text);
        }

        .pane-title span {
            color: var(--muted);
        }

        iframe {
            width: 100%;
            height: 100%;
            border: 0;
            background: #000;
        }

        @media (max-width: 900px) {
            .toolbar {
                height: 128px;
                grid-template-columns: 1fr 1fr;
            }

            .compare {
                height: calc(100vh - 128px);
                grid-template-columns: 1fr;
                grid-template-rows: 1fr 1fr;
            }
        }
    </style>
</head>
<body>
    <header class="toolbar">
        <div class="title">Archive Preview Compare</div>
        <label>
            Storyline
            <select id="storyline">
                <option value="bench-council-ai100">BenchCouncil AI100</option>
                <option value="gaming-ai">Gaming AI</option>
                <option value="unified-ai-history">AI History Map</option>
                <option value="deep-learning-history">Deep Learning</option>
            </select>
        </label>
        <label>
            Layout
            <select id="layout">
                <option value="single">single</option>
                <option value="dual">dual</option>
            </select>
        </label>
        <label>
            Milestone id
            <input id="milestone" placeholder="optional, e.g. milestone-ai100-2017-transformer">
        </label>
        <button id="reload" type="button">Reload</button>
        <div class="hint">Left uses normal generated data. Right uses <code>?archivePreview=1</code>.</div>
    </header>

    <main class="compare">
        <section class="pane">
            <div class="pane-title">
                <strong>Normal</strong>
                <span id="normal-url"></span>
            </div>
            <iframe id="normal-frame" title="Normal exhibit"></iframe>
        </section>
        <section class="pane">
            <div class="pane-title">
                <strong>Archive preview</strong>
                <span id="archive-url"></span>
            </div>
            <iframe id="archive-frame" title="Archive preview exhibit"></iframe>
        </section>
    </main>

    <script>
        const storylineInput = document.getElementById('storyline');
        const layoutInput = document.getElementById('layout');
        const milestoneInput = document.getElementById('milestone');
        const normalFrame = document.getElementById('normal-frame');
        const archiveFrame = document.getElementById('archive-frame');
        const normalUrlLabel = document.getElementById('normal-url');
        const archiveUrlLabel = document.getElementById('archive-url');
        const reloadButton = document.getElementById('reload');

        function currentParams() {
            const params = new URLSearchParams(window.location.search);
            return {
                storyline: params.get('storyline') || 'bench-council-ai100',
                layout: params.get('layout') || 'single',
                milestone: params.get('milestone') || ''
            };
        }

        function syncInputsFromUrl() {
            const params = currentParams();
            storylineInput.value = params.storyline;
            layoutInput.value = params.layout;
            milestoneInput.value = params.milestone;
        }

        function buildExhibitUrl({ archivePreview }) {
            const layout = layoutInput.value;
            const target = layout === 'dual' ? 'dual-screen.html' : 'index.html';
            const url = new URL(target, window.location.href);
            url.searchParams.set('layout', layout);
            url.searchParams.set('storyline', storylineInput.value);
            if (milestoneInput.value.trim()) url.searchParams.set('milestone', milestoneInput.value.trim());
            if (archivePreview) url.searchParams.set('archivePreview', '1');
            return url;
        }

        function refreshFrames({ updateAddress = true } = {}) {
            const normalUrl = buildExhibitUrl({ archivePreview: false });
            const archiveUrl = buildExhibitUrl({ archivePreview: true });
            normalFrame.src = normalUrl.href;
            archiveFrame.src = archiveUrl.href;
            normalUrlLabel.textContent = normalUrl.pathname + normalUrl.search;
            archiveUrlLabel.textContent = archiveUrl.pathname + archiveUrl.search;

            if (updateAddress) {
                const pageUrl = new URL(window.location.href);
                pageUrl.searchParams.set('storyline', storylineInput.value);
                pageUrl.searchParams.set('layout', layoutInput.value);
                if (milestoneInput.value.trim()) pageUrl.searchParams.set('milestone', milestoneInput.value.trim());
                else pageUrl.searchParams.delete('milestone');
                window.history.replaceState(null, '', pageUrl);
            }
        }

        syncInputsFromUrl();
        refreshFrames({ updateAddress: false });

        reloadButton.addEventListener('click', () => refreshFrames());
        storylineInput.addEventListener('change', () => refreshFrames());
        layoutInput.addEventListener('change', () => refreshFrames());
        milestoneInput.addEventListener('keydown', (event) => {
            if (event.key === 'Enter') refreshFrames();
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN" data-layout-mode="single">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 历史回顾展览 - 单屏模式</title>
    <script src="shared/layout-router.js"></script>
    <style>
        :root {
            --screen-width: 1920px;
            --screen-height: 1080px;
            --stage-scale: 1;
            --stage-topbar-ratio: 0.073;
            --stage-footer-ratio: 0.08062;
            --stage-pad-top-ratio: 0.03704;
            --stage-pad-side-ratio: 0.022;
            --stage-pad-bottom-ratio: 0.03333;
            --stage-topbar-divider-ratio: 0.00556;
            --stage-grid-gap-ratio: 0.01325;
            --stage-main-top-gap-ratio: 0.0065;
            --stage-main-bottom-gap-ratio: 0.014;
            --stage-left-ratio: 0.246;
            --stage-center-ratio: 0.4785;
            --stage-right-ratio: 0.249;
            --footer-nav-width: calc(var(--screen-width) * 0.02344);
            --footer-nav-height: calc(var(--screen-height) * 0.0676);
            --footer-gap-ratio: 0.0122;
            --bg: #020202;
            --panel: rgba(255, 255, 255, 0.05);
            --line: rgba(255, 255, 255, 0.14);
            --line-strong: rgba(255, 255, 255, 0.28);
            --text: #f4efe5;
            --text-soft: rgba(244, 239, 229, 0.78);
            --text-muted: rgba(244, 239, 229, 0.42);
            --accent: #f68900;
            --accent-strong: #ff7f11;
            --deep-red: #4f0404;
            --ui-font: "PingFang SC", "Microsoft YaHei", sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            color: var(--text);
            font-family: var(--ui-font);
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.012) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.012) 1px, transparent 1px);
            background-size: 4px 4px;
            opacity: 0.3;
            mix-blend-mode: soft-light;
        }

        button {
            font: inherit;
        }

        .stage-viewport {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        .single-stage {
            position: absolute;
            left: 50%;
            top: 50%;
            width: var(--screen-width);
            height: var(--screen-height);
            transform: translate(-50%, -50%) scale(var(--stage-scale));
            transform-origin: center center;
            display: grid;
            grid-template-rows:
                calc(var(--screen-height) * var(--stage-topbar-ratio))
                1fr
                calc(var(--screen-height) * var(--stage-footer-ratio));
            gap: 0;
            padding:
                calc(var(--screen-height) * var(--stage-pad-top-ratio))
                calc(var(--screen-width) * var(--stage-pad-side-ratio))
                calc(var(--screen-height) * var(--stage-pad-bottom-ratio));
            touch-action: pan-y;
            background: #000;
            box-shadow: none;
        }

        .empty-state {
            display: grid;
            place-items: center;
            width: 100%;
            height: 100%;
            border: 1px dashed rgba(255, 255, 255, 0.18);
            color: var(--text-soft);
            font-size: 34px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .stage-topbar {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            align-items: start;
            gap: calc(var(--screen-width) * 0.0125);
            padding-bottom: 0;
            border-bottom: none;
        }

        .brand-lockup {
            width: 431px;
            min-width: 0;
            display: block;
            padding-top: 0;
        }

        .brand-image {
            display: block;
            width: 431px;
            height: auto;
            user-select: none;
            pointer-events: none;
        }

        .stage-kicker {
            display: none;
        }

        .mode-chip {
            justify-self: end;
            display: inline-flex;
            align-items: baseline;
            gap: 9px;
            color: rgba(244, 239, 229, 0.54);
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 0.03em;
            text-transform: uppercase;
            padding-top: 3px;
        }

        .topbar-actions {
            justify-self: end;
            display: inline-flex;
            align-items: baseline;
            gap: 12px;
        }

        .mode-chip-cn {
            font-family: "OPPOSans", "PingFang SC", "Microsoft YaHei", sans-serif;
            font-size: 21px;
            color: rgba(244, 239, 229, 0.56);
            font-weight: 800;
            letter-spacing: 0.03em;
        }

        .mode-chip-en {
            font-family: "Gotham", "Arial Narrow", "PingFang SC", sans-serif;
            font-size: 23px;
            color: rgba(244, 239, 229, 0.42);
            letter-spacing: 0.02em;
        }

        .language-toggle.topbar-language-toggle {
            --language-toggle-width: 52px;
            --language-toggle-height: 31px;
            justify-self: end;
            align-self: baseline;
            margin-top: 0;
            width: var(--language-toggle-width);
            height: var(--language-toggle-height);
            min-width: var(--language-toggle-width);
            min-height: var(--language-toggle-height);
            border: 1px solid rgba(244, 239, 229, 0.34);
            background: transparent;
            color: rgba(244, 239, 229, 0.42);
            border-radius: 2px;
            padding: 0;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-family: "Gotham", "Arial Narrow", "PingFang SC", sans-serif;
            font-size: 23px;
            font-weight: 700;
            line-height: 1;
            letter-spacing: 0;
            text-transform: uppercase;
            cursor: pointer;
            opacity: 1;
        }

        .language-toggle.topbar-language-toggle:hover,
        .language-toggle.topbar-language-toggle:focus-visible {
            color: rgba(244, 239, 229, 0.62);
            border-color: rgba(244, 239, 229, 0.54);
            outline: none;
        }

        .stage-grid {
            min-height: 0;
            display: grid;
            grid-template-columns:
                calc(100% * var(--stage-left-ratio))
                calc(100% * var(--stage-center-ratio))
                calc(100% * var(--stage-right-ratio));
            gap: calc(100% * var(--stage-grid-gap-ratio));
            padding-top: calc(var(--screen-height) * var(--stage-main-top-gap-ratio));
            padding-bottom: calc(var(--screen-height) * var(--stage-main-bottom-gap-ratio));
        }

        .panel-shell {
            position: relative;
            min-height: 0;
            overflow: hidden;
            border: none;
            border-radius: 8px;
            background: #141414;
            box-shadow:
                inset 0 0 0 1px rgba(255, 255, 255, 0.014),
                0 12px 24px rgba(0, 0, 0, 0.12);
        }

        .hero-panel {
            position: relative;
            padding: 26px 20px 33px;
            display: flex;
            flex-direction: column;
            background: #141414;
        }

        .hero-panel::after {
            content: "";
            position: absolute;
            inset: 0;
            pointer-events: none;
            background:
                linear-gradient(180deg, rgba(255, 255, 255, 0.02), transparent 10%, transparent 92%, rgba(255, 255, 255, 0.04)),
                linear-gradient(90deg, rgba(255, 255, 255, 0.015), transparent 16%, transparent 84%, rgba(255, 255, 255, 0.015));
        }

        .hero-kicker {
            color: rgba(244, 239, 229, 0.42);
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }

        .hero-years {
            position: absolute;
            left: 24px;
            top: 88px;
            z-index: 5;
            display: flex;
            justify-content: flex-start;
            gap: 24px;
            color: rgba(244, 239, 229, 0.26);
            font-family: "Gotham", "Arial Narrow", "PingFang SC", sans-serif;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 0.04em;
            line-height: 1;
            white-space: nowrap;
        }

        .hero-year {
            position: absolute;
            right: 56px;
            top: 28px;
            z-index: 5;
            font-family: "Gotham", "Arial Narrow", "PingFang SC", sans-serif;
            font-size: 86px;
            line-height: 1;
            font-weight: 500;
            color: var(--accent);
            letter-spacing: -0.03em;
            text-shadow: 0 0 24px rgba(246, 137, 0, 0.16);
            white-space: nowrap;
        }

        .hero-stage {
            position: relative;
            width: 86%;
            aspect-ratio: 1 / 1;
            height: auto;
            margin: 146px auto 28px;
            overflow: hidden;
            z-index: 2;
            filter: drop-shadow(0 24px 42px rgba(0, 0, 0, 0.26));
        }

        .orbit-overlay {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 4;
        }

        .orbit-overlay svg {
            width: 100%;
            height: 100%;
            overflow: visible;
        }

        .orbit-ring {
            fill: none;
            stroke: rgba(255, 87, 44, 0.92);
            stroke-width: 2.3;
            stroke-linecap: round;
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .orbit-start-dot {
            fill: #ff5a34;
            stroke: rgba(255, 255, 255, 0.76);
            stroke-width: 1.2;
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .orbit-dot {
            fill: var(--accent);
            stroke: rgba(255, 255, 255, 0.76);
            stroke-width: 1.2;
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .globe-stage {
            position: relative;
            width: 100%;
            height: 100%;
            transform: none;
            display: flex;
            align-items: center;
            justify-content: center;
            filter: drop-shadow(0 42px 84px rgba(0, 0, 0, 0.78));
        }

        .globe-shell {
            position: relative;
            z-index: 2;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            overflow: hidden;
            isolation: isolate;
            transform: translateZ(0);
            background:
                radial-gradient(circle at 31% 28%, rgba(81, 126, 191, 0.16), transparent 22%),
                radial-gradient(circle at 72% 72%, rgba(243, 132, 47, 0.1), transparent 30%),
                radial-gradient(circle at 39% 35%, rgba(23, 46, 92, 0.32), rgba(8, 11, 21, 0.12) 61%, transparent 74%);
            box-shadow:
                0 0 78px rgba(0, 0, 0, 0.84),
                0 0 72px rgba(56, 112, 180, 0.16),
                0 0 116px rgba(246, 137, 0, 0.1),
                inset 0 0 52px rgba(3, 5, 12, 0.72);
            cursor: grab;
            touch-action: none;
        }

        .globe-shell.is-dragging {
            cursor: grabbing;
        }

        .globe-stage::before {
            content: "";
            position: absolute;
            inset: -18% -22%;
            border-radius: 18px;
            background:
                radial-gradient(circle at 62% 36%, rgba(246, 137, 0, 0.16), rgba(246, 137, 0, 0.05) 13%, transparent 30%),
                radial-gradient(circle at 50% 50%, rgba(0, 0, 0, 0) 26%, rgba(0, 0, 0, 0.68) 62%, #020202 100%);
            pointer-events: none;
            z-index: 0;
        }

        .globe-stage::after {
            content: "";
            position: absolute;
            inset: -1.4%;
            border-radius: 50%;
            background:
                linear-gradient(90deg, rgba(0, 0, 0, 0.82) 0%, rgba(0, 0, 0, 0.26) 25%, rgba(0, 0, 0, 0) 43%, rgba(0, 0, 0, 0) 57%, rgba(0, 0, 0, 0.26) 75%, rgba(0, 0, 0, 0.82) 100%),
                linear-gradient(180deg, rgba(0, 0, 0, 0.42) 0%, rgba(0, 0, 0, 0) 30%, rgba(0, 0, 0, 0) 60%, rgba(0, 0, 0, 0.72) 100%),
                radial-gradient(circle at 50% 50%, rgba(0, 0, 0, 0) 44%, rgba(0, 0, 0, 0.58) 72%, rgba(0, 0, 0, 0.94) 100%);
            pointer-events: none;
            z-index: 4;
        }

        .globe-shell::before {
            display: none;
        }

        .globe-shell::after {
            display: none;
        }

        .globe-shell.is-static {
            isolation: auto;
            background: transparent;
            box-shadow: none;
        }

        .globe-shell.is-static::before,
        .globe-shell.is-static::after {
            display: none;
        }

        #singleGlobeContainer {
            position: absolute;
            inset: 0;
            z-index: 1;
            border-radius: inherit;
            overflow: hidden;
            clip-path: circle(50% at 50% 50%);
            transform: translateZ(0);
        }

        #singleGlobeCanvas {
            width: 100% !important;
            height: 100% !important;
            display: block;
            border-radius: inherit;
            transform: scale(1.005);
        }

        .globe-figma-image {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            border-radius: inherit;
            object-fit: cover;
            object-position: center;
            transform: scale(1.015);
            animation: globeFigmaDrift 24s ease-in-out infinite alternate;
        }

        @keyframes globeFigmaDrift {
            from {
                transform: scale(1.01) translate3d(-1.2%, -0.4%, 0);
            }
            to {
                transform: scale(1.04) translate3d(1%, 0.7%, 0);
            }
        }

        .globe-atmosphere {
            display: none;
        }

        .globe-shell.is-static .globe-atmosphere {
            opacity: 0;
        }

        .ghost-years {
            display: none;
        }

        .hero-bottom {
            display: none;
        }

        .hero-bottom-year {
            display: none;
        }

        .hero-bottom-copy {
            display: none;
        }

        .hero-location-block {
            margin-top: auto;
            text-align: center;
            display: grid;
            gap: 8px;
        }

        .hero-location-name {
            color: rgba(255, 255, 255, 0.96);
            font-size: 20px;
            font-weight: 800;
            line-height: 1.3;
        }

        .hero-location-country {
            color: rgba(244, 239, 229, 0.76);
            font-size: 20px;
            line-height: 1.32;
            font-weight: 600;
        }

        .hero-context-block {
            margin-top: 30px;
            display: grid;
            justify-items: center;
            gap: 8px;
            text-align: center;
        }

        .hero-context-period {
            color: rgba(244, 239, 229, 0.56);
            font-size: 16px;
            letter-spacing: 0.06em;
            text-transform: none;
        }

        .story-panel {
            padding: 18px 20px 22px;
            display: flex;
            flex-direction: column;
            background:
                radial-gradient(circle at 72% 10%, rgba(255, 255, 255, 0.035), transparent 18%),
                linear-gradient(180deg, rgba(18, 18, 18, 0.985), rgba(10, 10, 10, 0.995));
        }

        .story-header {
            display: block;
            padding-bottom: 0;
            border-bottom: none;
        }

        .story-kicker {
            color: var(--accent);
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .story-title {
            margin-top: 8px;
            color: var(--accent);
            max-width: 98%;
            font-size: 43px;
            line-height: 1.1;
            font-weight: 800;
            letter-spacing: 0;
            text-wrap: balance;
        }

        .story-location {
            display: none;
        }

        .story-year {
            display: none;
        }

        .story-summary {
            margin-top: 18px;
            min-height: 0;
            max-height: 88px;
            overflow: auto;
            padding-right: 8px;
            color: rgba(244, 239, 229, 0.92);
            font-size: 17px;
            line-height: 1.5;
            scrollbar-width: thin;
            scrollbar-color: rgba(255, 255, 255, 0.24) transparent;
        }

        .story-summary::-webkit-scrollbar,
        .commentary-list::-webkit-scrollbar {
            width: 4px;
        }

        .story-summary::-webkit-scrollbar-thumb,
        .commentary-list::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.24);
            border-radius: 999px;
        }

        .story-summary p {
            margin-bottom: 0.8em;
        }

        .story-summary p:last-child {
            margin-bottom: 0;
        }

        .section-heading {
            color: rgba(244, 239, 229, 0.74);
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.14em;
            text-transform: uppercase;
        }

        .figures-section {
            margin-top: 30px;
        }

        .figures-section .section-heading {
            display: none;
        }

        .figure-row {
            margin-top: 0;
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 42px;
        }

        .figure-row.count-1 {
            grid-template-columns: minmax(0, 240px);
        }

        .figure-row.count-2 {
            grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .figure-chip {
            display: grid;
            grid-template-columns: 52px minmax(0, 1fr);
            gap: 12px;
            align-items: center;
            min-width: 0;
        }

        .figure-avatar {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.06);
            overflow: hidden;
            display: grid;
            place-items: center;
            color: rgba(255, 255, 255, 0.78);
            font-size: 14px;
            font-weight: 700;
            filter: grayscale(0.1);
            letter-spacing: 0.08em;
        }

        .figure-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(0.1);
            object-position: center center;
            transform-origin: center center;
        }

        .figure-avatar span {
            display: inline-block;
        }

        .figure-meta {
            min-width: 0;
            padding-top: 2px;
        }

        .figure-name {
            color: rgba(244, 239, 229, 0.82);
            font-size: 12px;
            line-height: 1.2;
        }

        .figure-role {
            margin-top: 3px;
            color: rgba(244, 239, 229, 0.5);
            font-size: 10px;
            line-height: 1.22;
        }

        .archive-section {
            margin-top: 54px;
            min-height: 0;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .archive-stage {
            position: relative;
            flex: 1;
            min-height: 396px;
            margin-top: 0;
            display: grid;
            grid-template-columns:
                minmax(0, 0.215fr)
                minmax(0, 0.04fr)
                minmax(0, 0.49fr)
                minmax(0, 0.04fr)
                minmax(0, 0.215fr);
            grid-template-rows: 18px minmax(0, 1fr);
            align-items: end;
            row-gap: 16px;
            cursor: grab;
            touch-action: pan-y;
        }

        .archive-stage::before,
        .archive-stage::after {
            content: "";
            position: absolute;
            top: 18px;
            width: 23%;
            height: calc(100% - 18px);
            pointer-events: none;
            z-index: 3;
            opacity: 0.96;
        }

        .archive-stage::before {
            left: 0;
            background: linear-gradient(90deg, #111 0%, rgba(17, 17, 17, 0.88) 18%, rgba(17, 17, 17, 0) 100%);
        }

        .archive-stage::after {
            right: 0;
            background: linear-gradient(90deg, rgba(17, 17, 17, 0) 0%, rgba(17, 17, 17, 0.88) 82%, #111 100%);
        }

        .archive-stage.is-dragging {
            cursor: grabbing;
        }

        .archive-card {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            z-index: 1;
            min-width: 0;
            width: 100%;
            transform: translateY(-42px);
        }

        .archive-card.is-hidden {
            display: none;
        }

        .archive-thumb,
        .archive-focus {
            position: relative;
            display: block;
            border: none;
            background: transparent;
            padding: 0;
            cursor: pointer;
            overflow: hidden;
        }

        .archive-thumb::after,
        .archive-focus::after {
            content: "";
            position: absolute;
            inset: 0;
            pointer-events: none;
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.1);
        }

        .archive-thumb.is-empty,
        .archive-focus.is-empty {
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.04));
        }

        .archive-thumb.is-empty::before,
        .archive-focus.is-empty::before {
            content: attr(data-empty-label);
            position: absolute;
            inset: 0;
            display: grid;
            place-items: center;
            color: rgba(244, 239, 229, 0.42);
            font-size: 12px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            z-index: 1;
        }

        .archive-thumb img,
        .archive-focus img {
            display: block;
            width: 100%;
            height: 100%;
            box-sizing: border-box;
            object-fit: contain;
            background: #f4f0e8;
            filter: grayscale(0.1);
        }

        .archive-card-left {
            grid-column: 1;
            grid-row: 2;
            align-self: end;
        }

        .archive-card-left::before {
            display: none;
        }

        .archive-card-left .archive-thumb {
            width: 100%;
            aspect-ratio: 0.8 / 1;
            height: auto;
            background: #f1ebe2;
            border: 12px solid #f1ebe2;
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.22);
        }

        .archive-card-left .archive-card-caption {
            position: absolute;
            left: 0;
            top: calc(100% + 10px);
            width: 100%;
        }

        .archive-card-main {
            grid-column: 3;
            grid-row: 2;
            align-self: end;
            margin-top: 0;
        }

        .archive-card-main::before {
            content: "";
            position: absolute;
            left: -2%;
            top: -8%;
            width: 103%;
            bottom: 0;
            background: rgba(255, 255, 255, 0.96);
            z-index: -1;
        }

        .archive-card-main .archive-focus {
            width: 100%;
            aspect-ratio: 1.16 / 1;
            height: auto;
            background: #f4f0e8;
            border: 12px solid #f4f0e8;
            box-shadow: 0 18px 44px rgba(0, 0, 0, 0.3);
        }

        .archive-card-main .archive-card-caption {
            position: absolute;
            left: 0;
            top: calc(100% + 14px);
            width: 100%;
            padding-left: 14px;
        }

        .archive-card-right {
            grid-column: 5;
            grid-row: 2;
            align-self: end;
        }

        .archive-card-right::before {
            display: none;
        }

        .archive-card-right .archive-thumb {
            width: 100%;
            aspect-ratio: 1.02 / 1;
            height: auto;
            background: #ece5db;
            border: 10px solid #ece5db;
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.2);
        }

        .archive-card-right .archive-card-caption {

        function escapeHtml(value) {
            return String(value == null ? '' : value)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function debounce(func, wait) {
            let timeout;
            return function executedFunction(...args) {
                const later = () => {
                    clearTimeout(timeout);
                    func(...args);
                };
                clearTimeout(timeout);
                timeout = setTimeout(later, wait);
            };
        }

        function stripHtml(value) {
            if (window.MilestoneView && typeof window.MilestoneView.stripHtml === 'function') {
                return window.MilestoneView.stripHtml(value);
            }
            return String(value || '')
                .replace(/<br\s*\/?>/gi, '\n')
                .replace(/<[^>]*>/g, ' ')
                .replace(/\s+/g, ' ')
                .trim();
        }

        function tx(key) {
            return window.I18n && typeof window.I18n.t === 'function' ? window.I18n.t(key) : key;
        }

        function lx(value) {
            return window.I18n && typeof window.I18n.localize === 'function' ? window.I18n.localize(value) : (value == null ? '' : value);
        }

        function applyStaticTranslations() {
            document.querySelectorAll('[data-i18n]').forEach((element) => {
                element.textContent = tx(element.dataset.i18n);
            });
            document.querySelectorAll('[data-empty-label-key]').forEach((element) => {
                element.dataset.emptyLabel = tx(element.dataset.emptyLabelKey);
            });
            refs.prevBtn.setAttribute('aria-label', tx('previousPage'));
            refs.nextBtn.setAttribute('aria-label', tx('nextPage'));
        }

        function buildFallbackVm(milestone, index) {
            const safeMilestone = milestone || {};
            const photos = [];
            (safeMilestone.photos || []).forEach((url) => {
                if (url && !photos.includes(url)) photos.push(url);
            });
            if (safeMilestone.resources && Array.isArray(safeMilestone.resources.images)) {
                safeMilestone.resources.images.forEach((url) => {
                    if (url && !photos.includes(url)) photos.push(url);
                });
            }

            const quote = String(lx(safeMilestone.quote) || '').trim();
            const quoteAttribution = String(lx(safeMilestone.quoteAttribution) || '').trim();
            const descriptionText = stripHtml(lx(safeMilestone.description) || '');
            const commentarySections = [];
            if (quote && quote !== '待补充') {
                const attributionPrefix = quoteAttribution && quoteAttribution.startsWith('《') ? `${tx('source')}：` : `${tx('attribution')}：`;
                commentarySections.push({
                    label: tx('quoteExcerpt'),
                    html: quoteAttribution ? `${quote}<br>${attributionPrefix}${quoteAttribution}` : quote
                });
            }
            const customSections = Array.isArray(safeMilestone.commentarySections)
                ? safeMilestone.commentarySections.filter((section) => stripHtml(section && section.html))
                : [];
            if (customSections.length > 0) {
                customSections.forEach((section) => {
                    commentarySections.push({
                        label: lx(section.label) || tx('contentInterpretation'),
                        html: lx(section.html)
                    });
                });
            } else if (descriptionText) {
                commentarySections.push({ label: tx('background'), html: descriptionText });
            }
            if (commentarySections.length === 0) {
                commentarySections.push({ label: tx('contentPending'), html: tx('noAdditionalInfo') });
            }

            const primaryVideo = safeMilestone.resources && Array.isArray(safeMilestone.resources.videos) && safeMilestone.resources.videos.length > 0
                ? safeMilestone.resources.videos[0]
                : null;
            const category = safeMilestone.category || safeMilestone.subtitle || '';

            return {
                raw: safeMilestone,
                year: safeMilestone.year || '',
                title: safeMilestone.title || '',
                category,
                subtitle: safeMilestone.subtitle || category,
                location: safeMilestone.location || { name: '', country: '', coordinates: [] },
                descriptionHtml: safeMilestone.description || '',
                descriptionText,
                figures: Array.isArray(safeMilestone.figures) ? safeMilestone.figures : [],
                photos,
                primaryPhoto: photos[0] || '',
                archivePhotos: photos.slice(1),
                primaryVideo,
                videoEmbedUrl: primaryVideo ? primaryVideo.embed_url : '',
                quoteHtml: quote,
                quotePage: String(safeMilestone.quotePage || '').trim(),
                commentaryOverrideSections: Array.isArray(safeMilestone.commentarySections) ? safeMilestone.commentarySections : [],
                commentarySections,
                timeline: milestoneList.map((item, itemIndex) => ({
                    year: item.year,
                    title: item.title,
                    active: itemIndex === index
                }))
            };
        }

        function getVm(index) {
            if (vmCache.has(index)) {
                return vmCache.get(index);
            }

            const vm = window.MilestoneView && typeof window.MilestoneView.normalizeMilestone === 'function'
                ? window.MilestoneView.normalizeMilestone(milestoneList[index], index, milestoneList)
                : buildFallbackVm(milestoneList[index], index);
            vmCache.set(index, vm);
            return vm;
        }

        function preloadImage(url) {
            if (!url || imagePreloadCache.has(url)) return;
            const image = new Image();
            image.decoding = 'async';
            image.loading = 'eager';
            image.src = url;
            imagePreloadCache.set(url, image);
        }

        function preloadMilestoneAssets(index) {
            if (index < 0 || index >= milestoneList.length) return;
            const vm = getVm(index);
            sortPhotosForDisplay(vm.photos).slice(0, 5).forEach(preloadImage);
        }

        function preloadAdjacentAssets(index) {
            preloadMilestoneAssets(index);
            preloadMilestoneAssets(index - 1);
            preloadMilestoneAssets(index + 1);
        }

        function buildContextYears(year, beforeCount, afterCount) {
            const safeYear = Number(year);
            if (Number.isNaN(safeYear)) return [];
            const years = [];
            for (let offset = beforeCount; offset >= 1; offset -= 1) {
                years.push(safeYear - offset);
            }
            for (let offset = 1; offset <= afterCount; offset += 1) {
                years.push(safeYear + offset);
            }
            return years;
        }

        function buildLocationLine(location) {
            return [location && location.name, location && location.country]
                .filter(Boolean)
                .join('  ');
        }

        function buildLocationHtml(location) {
            const name = escapeHtml(location && location.name ? location.name : '');
            const country = escapeHtml(location && location.country ? location.country : '');
            if (name && country) {
                return `${name}<br>${country}`;
            }
            if (name) return name;
            if (country) return country;
            return tx('locationPending');
        }

        function extractStageContext(vm) {
            const raw = String((vm && (vm.category || vm.subtitle)) || '').replace(/\s+/g, ' ').trim();
            if (!raw) {
                return { label: 'AI 历史', period: '' };
            }

            const match = raw.match(/^(.*?)(?:\s*[（(]([^()（）]+)[)）])?$/);
            const label = String(match && match[1] ? match[1] : raw).trim() || raw;
            const period = String(match && match[2] ? match[2] : '').trim();
            return { label, period };
        }

        function buildSummaryHtml(vm) {
            if (vm.descriptionHtml && String(vm.descriptionHtml).trim()) {
                return vm.descriptionHtml;
            }
            if (vm.descriptionText) {
                return `<p>${escapeHtml(vm.descriptionText)}</p>`;
            }
            return '<p>暂无事件摘要</p>';
        }

        function initials(name) {
            const words = String(name || '').trim().split(/\s+/).filter(Boolean);
            if (words.length === 0) return 'AI';
            if (words.length === 1) return words[0].slice(0, 2).toUpperCase();
            return words.slice(0, 2).map((item) => item[0].toUpperCase()).join('');
        }

        function getFigureAvatarSource(figure, vm, portraitPool, index) {
            if (figure && figure.avatar) {
                return {
                    src: figure.avatar,
                    style: figure.avatarStyle || ''
                };
            }

            if (portraitPool[index]) {
                return {
                    src: portraitPool[index],
                    style: ''
                };
            }

            if (vm && vm.year === 1956) {
                return {
                    src: 'resources/images/1956-dartmouth/historical/1956-dartmouth_historical_04.jpg',
                    style: 'object-position: 36% 30%; transform: scale(1.45);'
                };
            }

            return null;
        }

        function buildFigureAvatar(figure, avatarSource) {
            if (avatarSource && avatarSource.src) {
                const styleAttr = avatarSource.style ? ` style="${avatarSource.style}"` : '';
                return `<img src="${avatarSource.src}" alt="${escapeHtml(figure.name || tx('keyFigure'))}"${styleAttr}>`;
            }
            return `<span>${escapeHtml(initials(figure.name))}</span>`;
        }

        function isPortraitLikePhoto(url) {
            return /\/people\/|portrait|headshot|avatar|人物|人像/i.test(String(url || ''));
        }

        function isDocumentLikePhoto(url) {
            return /proposal|paper|document|page|sheet|scan|manuscript|report|doc|论文|提案|文稿|手稿/i.test(String(url || ''));
        }

        function choosePreferredArchiveIndex(photos) {
            const safePhotos = Array.isArray(photos) ? photos.filter(Boolean) : [];
            if (safePhotos.length <= 1) return 0;

            const firstNonDocumentIndex = safePhotos.findIndex((url) => !isDocumentLikePhoto(url));
            if (firstNonDocumentIndex > 0) {
                return firstNonDocumentIndex;
            }

            return 0;
        }

        function buildArchiveFigureMeta(vm, index, fallbackName) {
            const figures = Array.isArray(vm.figures) ? vm.figures.filter(Boolean) : [];
            if (figures.length > 0) {
                const figure = figures[((index % figures.length) + figures.length) % figures.length] || figures[0];
                return {
                    name: figure.name || fallbackName || tx('keyFigure'),
                    role: figure.role || buildLocationLine(vm.location) || tx('keyParticipant')
                };
            }

            return {
                name: fallbackName || vm.title || tx('historicalArchive'),
                role: buildLocationLine(vm.location) || vm.category || tx('historicalEvent')
            };
        }

        function extractWorkTitleFromAttribution(attribution) {
            const match = String(attribution || '').match(/《([^》]+)》/);
            return match ? String(match[1] || '').trim() : '';
        }

        function getConfiguredImageMeta(vm, url) {
            const raw = vm && vm.raw ? vm.raw : {};
            const map = raw && raw.resources && raw.resources.imageMeta ? raw.resources.imageMeta : (raw.imageMeta || null);
            if (!map || typeof map !== 'object') return null;
            const entry = map[url];
            if (!entry || typeof entry !== 'object') return null;

            const caption = String(lx(entry.caption || entry.title || entry.name || '')).trim();
            const subcaption = String(lx(entry.subcaption || entry.subtitle || entry.description || entry.role || '')).trim();
            if (!caption && !subcaption) return null;
            return { caption, subcaption };
        }

        function buildArchivePhotoMeta(vm, url) {
            const value = String(url || '').trim();
            if (!value) return { name: '', role: '' };

            const configured = getConfiguredImageMeta(vm, value);
            const title = String(vm && vm.title ? vm.title : '').trim();
            const year = vm && vm.year ? String(vm.year) : '';
            const workTitle = extractWorkTitleFromAttribution(vm && vm.quoteAttribution ? vm.quoteAttribution : '');

            if (isPortraitLikePhoto(value)) {
                const autoMeta = {
                    name: tx('portrait'),
                    role: tx('researcherPhoto')
                };
                return {
                    name: (configured && configured.caption) || autoMeta.name,
                    role: (configured && configured.subcaption) || autoMeta.role
                };
            }

            if (/\/architecture\//i.test(value) || /_architecture_/i.test(value)) {
                const autoMeta = {
                    name: tx('architectureDiagram'),
                    role: title ? `${title} ${tx('architectureDiagram')}` : tx('modelArchitecture')
                };
                return {
                    name: (configured && configured.caption) || autoMeta.name,
                    role: (configured && configured.subcaption) || autoMeta.role
                };
            }

            if (/\/papers\//i.test(value) || /_papers_/i.test(value) || isDocumentLikePhoto(value)) {
                const autoMeta = {
                    name: tx('paperPage'),
                    role: workTitle ? `《${workTitle}》` : (title || tx('originalScreenshot'))
                };
                return {
                    name: (configured && configured.caption) || autoMeta.name,
                    role: (configured && configured.subcaption) || autoMeta.role
                };
            }

            if (/\/historical\//i.test(value) || /_historical_/i.test(value)) {
                const autoMeta = {
                    name: tx('historicalArchive'),
                    role: title || (year ? `${year} ${tx('historicalArchive')}` : tx('archiveMaterial'))
                };
                return {
                    name: (configured && configured.caption) || autoMeta.name,
                    role: (configured && configured.subcaption) || autoMeta.role
                };
            }

            const autoMeta = {
                name: tx('archiveImage'),
                role: title || (vm && vm.category) || tx('archiveMaterial')
            };
            return {
                name: (configured && configured.caption) || autoMeta.name,
                role: (configured && configured.subcaption) || autoMeta.role
            };
        }

        function extractVideoQuote(vm) {
            const candidates = [
                vm.quoteHtml,
                Array.isArray(vm.commentarySections) && vm.commentarySections[0] ? vm.commentarySections[0].html : '',
                vm.descriptionText
            ];
            const raw = candidates.map((item) => stripHtml(item || '')).find(Boolean) || tx('noMedia');
            return raw.length > 120 ? `${raw.slice(0, 120).trim()}...` : raw;
        }

        function splitTextByPunctuation(text, targetParts) {
            const normalized = stripHtml(text || '').replace(/\s+/g, ' ').trim();
            if (!normalized) return [];

            const parts = [];
            const estimatedLength = Math.max(28, Math.ceil(normalized.length / Math.max(1, targetParts)));
            let cursor = 0;
            while (cursor < normalized.length && parts.length < targetParts) {
                let end = Math.min(normalized.length, cursor + estimatedLength);
                if (end < normalized.length) {
                    const nextBreak = normalized.slice(end).search(/[，。；：,.!?！？]/);
                    if (nextBreak >= 0 && nextBreak < 20) {
                        end += nextBreak + 1;
                    }
                }
                parts.push(normalized.slice(cursor, end).trim());
                cursor = end;
            }
            return parts.filter(Boolean);
        }

        function buildRightCommentarySections(vm) {
            const defaultLabels = [tx('quoteExcerpt'), tx('background'), tx('extension')];
            const sourceSections = Array.isArray(vm.commentarySections)
                ? vm.commentarySections.filter((section) => stripHtml(section && section.html))
                : [];
            const sections = sourceSections.slice(0, 3).map((section, index) => ({
                label: section.label || defaultLabels[index] || tx('contentInterpretation'),
                text: stripHtml(section.html || '')
            }));

            const fallbackText = stripHtml(vm.descriptionHtml || vm.descriptionText || vm.quoteHtml || '');
            const fillerParts = splitTextByPunctuation(fallbackText, 3);

            let fillerIndex = 0;
            while (sections.length < 3) {
                sections.push({
                    label: defaultLabels[sections.length] || tx('contentInterpretation'),
                    text: fillerParts[fillerIndex] || sections[sections.length - 1]?.text || tx('noAdditionalInfo')
                });
                fillerIndex += 1;
            }

            return sections.slice(0, 3);

            if (value.includes('/architecture/')) return 2;
            if (value.includes('/papers/')) return 1;

        function getOrbitViewportMetrics() {
            const layoutWidth = refs.orbitOverlay ? refs.orbitOverlay.clientWidth || 476 : 476;

            const overlayRect = refs.orbitOverlay ? refs.orbitOverlay.getBoundingClientRect() : null;
            const rectWidth = overlayRect && overlayRect.width ? overlayRect.width : layoutWidth;
            const rectHeight = overlayRect && overlayRect.height ? overlayRect.height : layoutHeight;

            const elementRect = element.getBoundingClientRect();
            if (!overlayRect.width || !overlayRect.height || !elementRect.width || !elementRect.height) return null;

            return {
                width: metrics.width,
                height: metrics.height,
                rect: {
                    x: (elementRect.left - overlayRect.left) * metrics.scaleX,

                    width: elementRect.width * metrics.scaleX,

            const fallbackTarget = targetPoint || { x: centerX - rect.width * 0.42, y: centerY + rect.height * 1.4 };
            const deltaX = fallbackTarget.x - centerX;
            const deltaY = fallbackTarget.y - centerY;
            if (Math.abs(deltaX) < 0.001 && Math.abs(deltaY) < 0.001) {

                    y: rect.y + rect.height + offset

                y: edgeY + deltaY / distance * offset

        function buildOrbitCurve(startPoint, endPoint, width, height) {
            const deltaX = endPoint.x - startPoint.x;

            const verticalReach = Math.max(height * 0.07, Math.abs(deltaY) * 0.22);

            const controlAX = startPoint.x + deltaX * 0.18 - Math.sign(deltaX || -1) * horizontalReach * 0.3;
            const controlAY = startPoint.y + verticalReach;

            const safeEnd = clampOrbitPoint(endPoint, width, height, 12);

            refs.orbitDot.setAttribute('cy', String(safeEnd.y));
            refs.orbitPath.setAttribute('d', buildOrbitCurve(safeStart, safeEnd, width, height));

        function createStylizedCloudTexture(texture) {

                return texture;
            }
            const width = texture.image.width || 0;
            const height = texture.image.height || 0;
            if (!width || !height) return texture;

            const canvas = document.createElement('canvas');
            canvas.width = width;
            canvas.height = height;
            const context = canvas.getContext('2d', { willReadFrequently: true });
            if (!context) return texture;

            context.drawImage(texture.image, 0, 0, width, height);
            const imageData = context.getImageData(0, 0, width, height);
            const { data } = imageData;
            for (let index = 0; index < data.length; index += 4) {
                const average = (data[index] + data[index + 1] + data[index + 2]) / 3;
                const alpha = data[index + 3] / 255;
                const density = Math.max(alpha, 1 - average / 255);
                data[index] = 255;
                data[index + 1] = 255;
                data[index + 2] = 255;
                data[index + 3] = Math.round(Math.min(1, Math.pow(density, 0.88) * 1.08) * 255);
            }
            context.putImageData(imageData, 0, 0);

            const softenedCanvas = document.createElement('canvas');
            softenedCanvas.width = width;
            softenedCanvas.height = height;
            const softenedContext = softenedCanvas.getContext('2d');
            if (!softenedContext) {
                const directTexture = new THREE.CanvasTexture(canvas);
                directTexture.wrapS = THREE.RepeatWrapping;
                directTexture.wrapT = THREE.ClampToEdgeWrapping;
                applyTextureDefaults(directTexture, false);
                return directTexture;
            }

            softenedContext.clearRect(0, 0, width, height);
            softenedContext.filter = 'blur(1.6px)';
            softenedContext.drawImage(canvas, 0, 0, width, height);
            softenedContext.filter = 'none';
            softenedContext.globalAlpha = 0.72;
            softenedContext.drawImage(canvas, 0, 0, width, height);
            softenedContext.globalAlpha = 1;

            stylizedTexture.wrapS = THREE.RepeatWrapping;
            stylizedTexture.wrapT = THREE.ClampToEdgeWrapping;
            applyTextureDefaults(stylizedTexture, false);
            return stylizedTexture;

            return {

        function createMarkerMesh() {
            if (typeof THREE === 'undefined') return null;

            const markerGroup = new THREE.Group();
            const core = new THREE.Mesh(
                new THREE.SphereGeometry(0.022, 20, 20),
                new THREE.MeshBasicMaterial({
                    color: 0xff5e3a,
                    transparent: true,
                    opacity: 0
                })
            );
            const aura = new THREE.Mesh(
                new THREE.SphereGeometry(0.042, 20, 20),
                new THREE.MeshBasicMaterial({
                    color: 0xffb160,
                    transparent: true,
                    opacity: 0,
                    blending: THREE.AdditiveBlending,
                    depthWrite: false
                })
            );

            markerGroup.add(aura);
            markerGroup.add(core);
            markerGroup.userData.core = core;
            markerGroup.userData.aura = aura;
            return markerGroup;
        }

        function setMarkerState(marker, scale, opacity) {
            if (!marker) return;
            marker.scale.setScalar(scale);
            if (marker.userData && marker.userData.core) {
                marker.userData.core.material.opacity = opacity;
            }
            if (marker.userData && marker.userData.aura) {
                marker.userData.aura.material.opacity = opacity * 0.42;
                marker.userData.aura.scale.setScalar(1.08 + (scale - 1) * 0.55);
            }
        }

        function initGlobe() {
            if (!refs.singleGlobeContainer) {
                return false;
            }

            refs.globeShell.classList.remove('is-static');

            if (typeof THREE === 'undefined') {
                renderStaticGlobeFallback();
                setStaticGlobeFocus();
                return false;
            }

            const width = refs.singleGlobeContainer.clientWidth || 320;
            const height = refs.singleGlobeContainer.clientHeight || 320;

            globeScene = new THREE.Scene();
            globeCamera = new THREE.PerspectiveCamera(35, width / height, 0.1, 1000);
            globeCamera.position.set(0, 0, GLOBE_CAM_RADIUS);
            globeCamera.lookAt(0, 0, 0);

            try {
                globeRenderer = new THREE.WebGLRenderer({
                    antialias: true,
                    alpha: true,
                    powerPreference: 'high-performance',
                    precision: 'mediump',
                    stencil: false,
                    depth: true
                });
            } catch (error) {
                console.warn('Globe WebGL init failed, using static fallback.', error);
                renderStaticGlobeFallback();
                setStaticGlobeFocus();
                return false;
            }

            globeRenderer.setPixelRatio(getEffectivePixelRatio());
            globeRenderer.setSize(width, height);
            globeRenderer.setClearColor(0x000000, 0);
            if ('outputColorSpace' in globeRenderer && THREE.SRGBColorSpace) {
                globeRenderer.outputColorSpace = THREE.SRGBColorSpace;
            }
            globeRenderer.domElement.id = 'singleGlobeCanvas';
            refs.singleGlobeContainer.innerHTML = '';
            refs.singleGlobeContainer.appendChild(globeRenderer.domElement);

            const geometry = new THREE.SphereGeometry(1, 64, 64);
            const material = createStylizedEarthMaterial();
            if (!material) {
                renderStaticGlobeFallback();
                setStaticGlobeFocus();
                return false;
            }

            globeMesh = new THREE.Mesh(geometry, material);
            globeScene.add(globeMesh);
            createGlobeHalo();

            const textureLoader = new THREE.TextureLoader();
            textureLoader.load(
                GLOBE_TEXTURE_URLS.topo,
                (texture) => setEarthTextureUniform(material, 'topoMap', texture, false),
                undefined,
                () => console.warn('Unable to load local topology texture for globe.')
            );
            textureLoader.load(
                GLOBE_TEXTURE_URLS.water,
                (texture) => setEarthTextureUniform(material, 'waterMap', texture, false),
                undefined,
                () => useFallbackEarthMaterial()
            );
            textureLoader.load(
                GLOBE_TEXTURE_URLS.clouds,
                (texture) => {
                    applyTextureDefaults(texture, false);
                    texture.wrapS = THREE.RepeatWrapping;
                    texture.wrapT = THREE.ClampToEdgeWrapping;
                    createCloudLayer(createStylizedCloudTexture(texture));
                }
            );

            globeLastFrameTime = 0;
            resetOrbitOverlay();
            animateGlobe();
            return true;
        }

        function latLngToCamAngles(lat, lng) {
            const phi = (90 - lat) * (Math.PI / 180);
            const theta = (lng - 90) * (Math.PI / 180);
            return { phi, theta };
        }

        function clearGlobeMarkerMeshes() {
            if (globeMesh) {
                globeMarkers.forEach((marker) => globeMesh.remove(marker));
            }
            globeMarkers = [];
            globeMarker = null;
            globePrimaryCoordinate = null;
        }

        function clearGlobeMarkers() {
            clearGlobeMarkerMeshes();
            globeArrived = true;
            markerFlashDone = true;
            globeAnimationTime = 0;
            camTarget.phi = camCurrent.phi;
            camTarget.theta = camCurrent.theta;
            resetOrbitOverlay();
        }

        function setGlobeMarkers(coordsList) {
            if (!globeMesh) {
                globeMarkers = [];
                globeMarker = null;
                globePrimaryCoordinate = null;
                return;
            }

            clearGlobeMarkerMeshes();
            globePrimaryCoordinate = coordsList[0] || null;

            coordsList.forEach(([lat, lng]) => {
                const markerMesh = createMarkerMesh();
                if (!markerMesh) return;
                const position = latLngToSpherePosition(lat, lng, 1.05);
                markerMesh.position.set(position.x, position.y, position.z);
                globeMesh.add(markerMesh);
                globeMarkers.push(markerMesh);
            });

            globeMarker = globeMarkers[0] || null;
        }

        function rotateGlobeToCoordinates(coordinates) {
            const coordsList = normalizeLocationCoordinates(coordinates);
            const [lat, lng] = coordsList[0] || [];
            if (!coordsList.length || Number.isNaN(lat) || Number.isNaN(lng)) {
                clearGlobeMarkers();
                return;
            }

            if (!globeMesh) {
                globePrimaryCoordinate = coordsList[0] || null;
                globeArrived = true;
                markerFlashDone = true;
                globeAnimationTime = 0;
                setStaticGlobeFocus();
                return;
            }

            const angles = latLngToCamAngles(lat, lng);
            camTarget.phi = angles.phi;
            camTarget.theta = angles.theta;
            globeArrived = false;
            markerFlashDone = false;
            globeAnimationTime = 0;
            setGlobeMarkers(coordsList);
            resetOrbitOverlay();
        }

        function projectWorldPointToOverlay(worldPoint) {
            if (!worldPoint || !globeCamera || !refs.globeShell || !refs.orbitOverlay || typeof THREE === 'undefined') return null;
            globeCamera.updateMatrixWorld();
            if (globeMesh) globeMesh.updateWorldMatrix(true, false);
            const facing = worldPoint.clone().normalize().dot(globeCamera.position.clone().normalize());
            if (facing <= 0.02) return null;

            const projected = worldPoint.clone().project(globeCamera);
            if (!Number.isFinite(projected.x) || !Number.isFinite(projected.y) || projected.z < -1 || projected.z > 1) return null;
            const metrics = getOrbitViewportMetrics();
            const shellRect = refs.globeShell.getBoundingClientRect();
            const overlayRect = refs.orbitOverlay.getBoundingClientRect();
            if (!shellRect.width || !shellRect.height || !overlayRect.width || !overlayRect.height) return null;

            return clampOrbitPoint({
                x: ((projected.x * 0.5 + 0.5) * shellRect.width + (shellRect.left - overlayRect.left)) * metrics.scaleX,
                y: ((-projected.y * 0.5 + 0.5) * shellRect.height + (shellRect.top - overlayRect.top)) * metrics.scaleY
            }, metrics.width, metrics.height, 12);
        }

        function projectCoordinateToOverlay(coordinate, radius = 0.985) {
            if (!coordinate || !globeMesh || typeof THREE === 'undefined') return null;
            const [lat, lng] = coordinate;
            if (!Number.isFinite(lat) || !Number.isFinite(lng)) return null;

            const localPoint = latLngToSpherePosition(lat, lng, radius);
            const worldPoint = globeMesh.localToWorld(new THREE.Vector3(localPoint.x, localPoint.y, localPoint.z));
            return projectWorldPointToOverlay(worldPoint);
        }

        function projectMarkerToOverlay(marker) {
            if (!marker || typeof THREE === 'undefined') return null;
            marker.updateWorldMatrix(true, false);
            const worldPoint = new THREE.Vector3();
            marker.getWorldPosition(worldPoint);
            return projectWorldPointToOverlay(worldPoint);
        }

        function animateGlobe(now = performance.now()) {
            requestAnimationFrame(animateGlobe);
            if (document.hidden || !globeRenderer || !globeCamera || !globeMesh) return;

            const deltaSeconds = getGlobeDeltaTime(now);
            globeAnimationTime += deltaSeconds;
            const lerpFactor = 1 - Math.pow(0.0025, deltaSeconds * 3.4);
            let dTheta = camTarget.theta - camCurrent.theta;
            while (dTheta > Math.PI) dTheta -= 2 * Math.PI;
            while (dTheta < -Math.PI) dTheta += 2 * Math.PI;
            const dPhi = camTarget.phi - camCurrent.phi;

            const arrived = Math.abs(dTheta) < 0.01 && Math.abs(dPhi) < 0.01;
            if (!globeArrived && arrived) {
                globeArrived = true;
                globeAnimationTime = 0;
                camCurrent.phi = camTarget.phi;
                camCurrent.theta = camTarget.theta;
            }

            if (!globeArrived) {
                camCurrent.phi += dPhi * lerpFactor;
                camCurrent.theta += dTheta * lerpFactor;
            }

            const cx = -GLOBE_CAM_RADIUS * Math.sin(camCurrent.phi) * Math.sin(camCurrent.theta);
            const cy = GLOBE_CAM_RADIUS * Math.cos(camCurrent.phi);
            const cz = -GLOBE_CAM_RADIUS * Math.sin(camCurrent.phi) * Math.cos(camCurrent.theta);
            globeCamera.position.set(cx, cy, cz);
            globeCamera.lookAt(0, 0, 0);

            if (globeHaloMesh) {
                const haloScale = 1 + Math.sin(globeAnimationTime * 0.9) * 0.012;
                globeHaloMesh.scale.setScalar(haloScale);
                globeHaloMesh.rotation.y += deltaSeconds * 0.08;
            }

            if (globeCloudMesh) {
                globeCloudMesh.rotation.y += deltaSeconds * 0.018;
            }

            if (globeMarkers.length > 0) {
                if (globeArrived) {
                    const overlayPoint = projectMarkerToOverlay(globeMarker) || projectCoordinateToOverlay(globePrimaryCoordinate);
                    if (overlayPoint) {
                        const yearPoint = getYearAnchorPoint(overlayPoint);
                        if (yearPoint) {
                            updateOrbitOverlay(yearPoint, overlayPoint, false);
                        } else {
                            resetOrbitOverlay();
                        }
                    } else {
                        resetOrbitOverlay();
                    }
                } else {
                    resetOrbitOverlay();
                }

                if (globeArrived && !markerFlashDone) {
                    const t = globeAnimationTime * 2.8;
                    const cycle = Math.floor(t);
                    globeMarkers.forEach((marker) => {
                        if (cycle >= 2) {
                            setMarkerState(marker, 1, 1);
                        } else {
                            const phase = (t - cycle) * Math.PI;
                            const scale = 1.0 + 0.95 * Math.sin(phase);
                            const opacity = 1.0 - 0.6 * Math.sin(phase);
                            setMarkerState(marker, scale, opacity);
                        }
                    });
                    if (cycle >= 2) markerFlashDone = true;
                } else if (globeArrived) {
                    globeMarkers.forEach((marker) => setMarkerState(marker, 1, 1));
                }
            }

            globeRenderer.render(globeScene, globeCamera);
        }

        function handleGlobeResize() {
            if (!globeRenderer || !globeCamera || !refs.singleGlobeContainer) return;
            const width = refs.singleGlobeContainer.clientWidth;
            const height = refs.singleGlobeContainer.clientHeight;
            if (!width || !height) return;

            globeCamera.aspect = width / height;
            globeCamera.updateProjectionMatrix();
            globeRenderer.setPixelRatio(getEffectivePixelRatio());
            globeRenderer.setSize(width, height);
        }

        function syncStageScale() {
            const scale = Math.min(window.innerWidth / SCREEN_WIDTH, window.innerHeight / SCREEN_HEIGHT);
            document.documentElement.style.setProperty('--stage-scale', Math.max(0.1, scale).toFixed(6));
            handleGlobeResize();
            if (!globePrimaryCoordinate) {
                resetOrbitOverlay();
                return;
            }

            if (!globeMesh) {
                setStaticGlobeFocus();
            }
        }

            refs.statusText.textContent = vm.title || tx('aiHistoryReview');

        function setImage(imgEl, src, alt) {
            const nextSrc = src || '';
            if (imgEl.getAttribute('src') !== nextSrc) {
                imgEl.decoding = 'async';
                imgEl.src = nextSrc;
            }
            imgEl.alt = alt || '';
            imgEl.style.visibility = src ? 'visible' : 'hidden';
        }

        function renderArchive(vm) {
            const photos = sortPhotosForDisplay(vm.photos);
            const hasPhotos = photos.length > 0;
            const safePhotos = hasPhotos ? photos : [''];
            currentArchiveIndex = Math.max(0, Math.min(currentArchiveIndex, safePhotos.length - 1));

            const focusUrl = hasPhotos ? safePhotos[currentArchiveIndex] : '';
            const prevIndex = (currentArchiveIndex - 1 + safePhotos.length) % safePhotos.length;
            const nextIndex = (currentArchiveIndex + 1) % safePhotos.length;

            let prevUrl = hasPhotos ? safePhotos[prevIndex] : '';
            let nextUrl = hasPhotos ? safePhotos[nextIndex] : '';

            // 照片不足 3 张时，不要用同一张图重复填充左右缩略图位。
            if (prevUrl === focusUrl) prevUrl = '';
            if (nextUrl === focusUrl) nextUrl = '';
            if (prevUrl && nextUrl && prevUrl === nextUrl) prevUrl = '';

            const prevCard = refs.archiveThumbPrev ? refs.archiveThumbPrev.closest('.archive-card') : null;
            const nextCard = refs.archiveThumbNext ? refs.archiveThumbNext.closest('.archive-card') : null;
            if (prevCard) prevCard.classList.toggle('is-hidden', !prevUrl);
            if (nextCard) nextCard.classList.toggle('is-hidden', !nextUrl);

            const prevMeta = buildArchivePhotoMeta(vm, prevUrl);
            const activeMeta = buildArchivePhotoMeta(vm, focusUrl);
            const nextMeta = buildArchivePhotoMeta(vm, nextUrl);

            refs.archiveThumbPrev.innerHTML = prevUrl ? `<img src="${prevUrl}" alt="${tx('previousArchive')}">` : '';
            refs.archiveThumbNext.innerHTML = nextUrl ? `<img src="${nextUrl}" alt="${tx('nextArchive')}">` : '';
            refs.archiveThumbPrev.classList.toggle('is-empty', !prevUrl);
            refs.archiveThumbNext.classList.toggle('is-empty', !nextUrl);
            refs.archiveThumbPrev.disabled = !hasPhotos || safePhotos.length <= 1 || !prevUrl;
            refs.archiveThumbNext.disabled = !hasPhotos || safePhotos.length <= 1 || !nextUrl;

            setImage(refs.archiveFocus, focusUrl, tx('mainArchivePhoto'));
            refs.archiveFocusButton.dataset.photoIndex = String(currentArchiveIndex);
            refs.archiveFocusButton.classList.toggle('is-empty', !hasPhotos);
            refs.archiveFocusButton.disabled = !hasPhotos;
            refs.archivePrevCaption.textContent = prevMeta.name;
            refs.archivePrevSubcaption.textContent = prevMeta.role;
            refs.archiveCaption.textContent = activeMeta.name;
            refs.archiveSubcaption.textContent = activeMeta.role;
            refs.archiveNextCaption.textContent = nextMeta.name;
            refs.archiveNextSubcaption.textContent = nextMeta.role;

            refs.archiveDots.innerHTML = hasPhotos
                ? safePhotos.map((_, index) => `<button class="archive-dot ${index === currentArchiveIndex ? 'active' : ''}" type="button" data-index="${index}"></button>`).join('')
                : '';

            refs.archiveDots.querySelectorAll('.archive-dot').forEach((button) => {
                button.addEventListener('click', () => {
                    currentArchiveIndex = Number(button.dataset.index);
                    renderArchive(vm);
                    bindPhotoClicks();
                });
            });

            refs.archiveThumbPrev.onclick = () => {
                currentArchiveIndex = prevIndex;
                renderArchive(vm);
                bindPhotoClicks();
            };

            refs.archiveThumbNext.onclick = () => {
                currentArchiveIndex = nextIndex;
                renderArchive(vm);
                bindPhotoClicks();
            };
        }

        function ensureMediaIframe() {
            let iframe = refs.videoFrame.querySelector('iframe');
            if (!iframe) {
                iframe = document.createElement('iframe');
                iframe.id = 'mediaVideo';
                iframe.allow = 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture';
                iframe.allowFullscreen = true;
                refs.videoFrame.appendChild(iframe);
                refs.mediaVideo = iframe;
            }
            return iframe;
        }

        function ensureMediaPlayer() {
            let player = refs.videoFrame.querySelector('video');
            if (!player) {
                player = document.createElement('video');
                player.id = 'mediaVideoPlayer';
                player.controls = true;
                player.playsInline = true;
                player.preload = 'metadata';
                refs.videoFrame.appendChild(player);
            }
            return player;
        }

        function isDirectVideoMedia(url) {
            return /\.(mp4|webm|ogg)(?:[?#].*)?$/i.test(String(url || ''));
        }

        function resetInlineMedia() {
            const iframe = ensureMediaIframe();
            const player = ensureMediaPlayer();

            iframe.style.display = 'none';
            iframe.src = 'about:blank';

            player.pause();
            player.removeAttribute('src');
            player.style.display = 'none';
            player.load();
        }

        function playInlineVideo(url) {
            if (!url) return;
            refs.videoFrame.classList.add('is-playing');
            refs.videoFrame.onclick = null;
            if (isDirectVideoMedia(url)) {
                const iframe = ensureMediaIframe();
                const player = ensureMediaPlayer();
                iframe.style.display = 'none';
                iframe.src = 'about:blank';
                player.src = url;
                player.style.display = 'block';
                const playback = player.play();
                if (playback && typeof playback.catch === 'function') {
                    playback.catch(() => {});
                }
                return;
            }

            const iframe = ensureMediaIframe();
            const player = ensureMediaPlayer();
            player.pause();
            player.removeAttribute('src');
            player.style.display = 'none';
            player.load();
            iframe.src = url;
            iframe.style.display = 'block';
        }

        function renderCommentary(vm) {
            ensureMediaIframe();
            ensureMediaPlayer();
            refs.mediaTimecode.textContent = `00:00:${String((currentIndex % 57) + 3).padStart(2, '0')}`;
            refs.videoQuote.textContent = extractVideoQuote(vm);
            refs.videoFrame.classList.remove('is-playing');
            refs.videoFrame.classList.toggle('has-video-data', Boolean(vm.videoEmbedUrl));
            refs.videoFrame.classList.toggle('empty', !vm.videoEmbedUrl);
            refs.videoFrame.dataset.videoUrl = vm.videoEmbedUrl || '';
            refs.videoFrame.onclick = vm.videoEmbedUrl ? () => playInlineVideo(vm.videoEmbedUrl) : null;
            refs.videoFrame.title = vm.videoEmbedUrl ? tx('playVideo') : tx('noMedia');
            resetInlineMedia();

            const sections = buildRightCommentarySections(vm);
            refs.commentaryList.innerHTML = sections.map((section) => `
                <article class="commentary-item">
                    <div class="commentary-label">${escapeHtml(section.label || tx('contentInterpretation'))}</div>
                    <div class="commentary-body">${escapeHtml(section.text || tx('noAdditionalInfo'))}</div>
                </article>
            `).join('');
        }

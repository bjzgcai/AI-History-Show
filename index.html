<!DOCTYPE html>
<html lang="zh-CN" data-layout-mode="single">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 历史回顾展览 - 单屏模式</title>
    <script src="shared/layout-router.js"></script>
    <style>
        :root {
            --screen-width: 1920px;
            --screen-height: 1080px;
            --stage-scale: 1;
            --stage-topbar-ratio: 0.073;
            --stage-footer-ratio: 0.08062;
            --stage-pad-top-ratio: 0.03704;
            --stage-pad-side-ratio: 0.022;
            --stage-pad-bottom-ratio: 0.03333;
            --stage-topbar-divider-ratio: 0.00556;
            --stage-grid-gap-ratio: 0.01325;
            --stage-main-top-gap-ratio: 0.0065;
            --stage-main-bottom-gap-ratio: 0.014;
            --stage-left-ratio: 0.246;
            --stage-center-ratio: 0.4785;
            --stage-right-ratio: 0.249;
            --footer-nav-width: calc(var(--screen-width) * 0.02344);
            --footer-nav-height: calc(var(--screen-height) * 0.0676);
            --footer-gap-ratio: 0.0122;
            --bg: #020202;
            --panel: rgba(255, 255, 255, 0.05);
            --line: rgba(255, 255, 255, 0.14);
            --line-strong: rgba(255, 255, 255, 0.28);
            --text: #f4efe5;
            --text-soft: rgba(244, 239, 229, 0.78);
            --text-muted: rgba(244, 239, 229, 0.42);
            --accent: #f68900;
            --accent-strong: #ff7f11;
            --deep-red: #4f0404;
            --scrollbar-track: rgba(255, 255, 255, 0.045);
            --scrollbar-thumb: rgba(246, 137, 0, 0.42);
            --scrollbar-thumb-hover: rgba(246, 137, 0, 0.68);
            --ui-font: "PingFang SC", "Microsoft YaHei", sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            color: var(--text);
            font-family: var(--ui-font);
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.012) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.012) 1px, transparent 1px);
            background-size: 4px 4px;
            opacity: 0.3;
            mix-blend-mode: soft-light;
        }

        button {
            font: inherit;
        }

        .stage-viewport {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        .single-stage {
            position: absolute;
            left: 50%;
            top: 50%;
            width: var(--screen-width);
            height: var(--screen-height);
            transform: translate(-50%, -50%) scale(var(--stage-scale));
            transform-origin: center center;
            display: grid;
            grid-template-rows:
                calc(var(--screen-height) * var(--stage-topbar-ratio))
                1fr
                calc(var(--screen-height) * var(--stage-footer-ratio));
            gap: 0;
            padding:
                calc(var(--screen-height) * var(--stage-pad-top-ratio))
                calc(var(--screen-width) * var(--stage-pad-side-ratio))
                calc(var(--screen-height) * var(--stage-pad-bottom-ratio));
            touch-action: pan-y;
            background: #000;
            box-shadow: none;
        }

        .single-stage.is-bench-dossier {
            grid-template-rows:
                calc(var(--screen-height) * var(--stage-topbar-ratio))
                1fr;
        }

        .empty-state {
            display: grid;
            place-items: center;
            width: 100%;
            height: 100%;
            border: 1px dashed rgba(255, 255, 255, 0.18);
            color: var(--text-soft);
            font-size: 34px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .stage-topbar {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            align-items: start;
            gap: calc(var(--screen-width) * 0.0125);
            padding-bottom: 0;
            border-bottom: none;
        }

        .brand-lockup {
            width: 431px;
            min-width: 0;
            display: block;
            padding-top: 0;
        }

        .brand-image {
            display: block;
            width: 431px;
            height: auto;
            user-select: none;
            pointer-events: none;
        }

        .stage-kicker {
            display: none;
        }

        .mode-chip {
            justify-self: end;
            display: inline-flex;
            align-items: center;
            color: rgba(244, 239, 229, 0.54);
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 0;
            padding-top: 3px;
        }

        .topbar-actions {
            justify-self: end;
            display: inline-flex;
            align-items: center;
            gap: 12px;
        }

        .storyline-select {
            width: 334px;
            height: 32px;
            min-width: 0;
            border: 1px solid rgba(244, 239, 229, 0.24);
            border-radius: 4px;
            background: rgba(0, 0, 0, 0.34);
            color: rgba(244, 239, 229, 0.78);
            padding: 0 32px 0 10px;
            font-family: "Gotham", "Arial Narrow", "PingFang SC", sans-serif;
            font-size: 15px;
            font-weight: 700;
            line-height: 1;
            letter-spacing: 0;
            text-transform: uppercase;
            cursor: pointer;
        }

        .storyline-select:focus-visible {
            border-color: rgba(246, 137, 0, 0.78);
            outline: none;
        }

        .storyline-select option {
            background: #0b0b0b;
            color: #f4efe5;
        }

        .mode-chip-label {
            font-family: "OPPOSans", "PingFang SC", "Microsoft YaHei", sans-serif;
            font-size: 23px;
            color: rgba(244, 239, 229, 0.56);
            font-weight: 800;
            letter-spacing: 0;
            white-space: nowrap;
        }

        .language-toggle.topbar-language-toggle {
            --language-toggle-width: 52px;
            --language-toggle-height: 31px;
            justify-self: end;
            align-self: baseline;
            margin-top: 0;
            width: var(--language-toggle-width);
            height: var(--language-toggle-height);
            min-width: var(--language-toggle-width);
            min-height: var(--language-toggle-height);
            border: 1px solid rgba(244, 239, 229, 0.34);
            background: transparent;
            color: rgba(244, 239, 229, 0.42);
            border-radius: 2px;
            padding: 0;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-family: "Gotham", "Arial Narrow", "PingFang SC", sans-serif;
            font-size: 23px;
            font-weight: 700;
            line-height: 1;
            letter-spacing: 0;
            text-transform: uppercase;
            cursor: pointer;
            opacity: 1;
        }

        .language-toggle.topbar-language-toggle:hover,
        .language-toggle.topbar-language-toggle:focus-visible {
            color: rgba(244, 239, 229, 0.62);
            border-color: rgba(244, 239, 229, 0.54);
            outline: none;
        }

        .stage-grid {
            min-height: 0;
            display: grid;
            grid-template-columns:
                calc(100% * var(--stage-left-ratio))
                calc(100% * var(--stage-center-ratio))
                calc(100% * var(--stage-right-ratio));
            gap: calc(100% * var(--stage-grid-gap-ratio));
            padding-top: calc(var(--screen-height) * var(--stage-main-top-gap-ratio));
            padding-bottom: calc(var(--screen-height) * var(--stage-main-bottom-gap-ratio));
        }

        .panel-shell {
            position: relative;
            min-height: 0;
            overflow: hidden;
            border: none;
            border-radius: 8px;
            background: #141414;
            box-shadow:
                inset 0 0 0 1px rgba(255, 255, 255, 0.014),
                0 12px 24px rgba(0, 0, 0, 0.12);
        }

        .hero-panel {
            position: relative;
            padding: 26px 20px 33px;
            display: flex;
            flex-direction: column;
            background: #141414;
        }

        .hero-panel::after {
            content: "";
            position: absolute;
            inset: 0;
            pointer-events: none;
            background:
                linear-gradient(180deg, rgba(255, 255, 255, 0.02), transparent 10%, transparent 92%, rgba(255, 255, 255, 0.04)),
                linear-gradient(90deg, rgba(255, 255, 255, 0.015), transparent 16%, transparent 84%, rgba(255, 255, 255, 0.015));
        }

        .hero-kicker {
            color: rgba(244, 239, 229, 0.42);
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }

        .hero-years {
            position: absolute;
            left: 24px;
            top: 88px;
            z-index: 5;
            display: flex;
            justify-content: flex-start;
            gap: 24px;
            color: rgba(244, 239, 229, 0.26);
            font-family: "Gotham", "Arial Narrow", "PingFang SC", sans-serif;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 0.04em;
            line-height: 1;
            white-space: nowrap;
        }

        .hero-year {
            position: absolute;
            right: 56px;
            top: 28px;
            z-index: 5;
            font-family: "Gotham", "Arial Narrow", "PingFang SC", sans-serif;
            font-size: 86px;
            line-height: 1;
            font-weight: 800;
            color: var(--accent);
            letter-spacing: 0;
            text-shadow:
                0 0 24px rgba(246, 137, 0, 0.2),
                0 2px 0 rgba(246, 137, 0, 0.08);
            white-space: nowrap;
        }

        .hero-stage {
            position: relative;
            width: 86%;
            aspect-ratio: 1 / 1;
            height: auto;
            margin: 146px auto 28px;
            overflow: visible;
            z-index: 2;
            filter: drop-shadow(0 24px 42px rgba(0, 0, 0, 0.26));
        }

        .orbit-overlay {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 4;
        }

        .orbit-overlay svg {
            width: 100%;
            height: 100%;
            overflow: visible;
        }

        .orbit-ring {
            fill: none;
            stroke: rgba(255, 87, 44, 0.92);
            stroke-width: 2.3;
            stroke-linecap: round;
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .orbit-start-dot {
            fill: #ff5a34;
            stroke: rgba(255, 255, 255, 0.76);
            stroke-width: 1.2;
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .orbit-dot {
            fill: var(--accent);
            stroke: rgba(255, 255, 255, 0.76);
            stroke-width: 1.2;
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .globe-stage {
            position: relative;
            width: 100%;
            height: 100%;
            transform: none;
            display: flex;
            align-items: center;
            justify-content: center;
            filter: drop-shadow(0 42px 84px rgba(0, 0, 0, 0.78));
        }

        .globe-shell {
            position: relative;
            z-index: 2;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            overflow: hidden;
            isolation: isolate;
            transform: translateZ(0);
            background:
                radial-gradient(circle at 31% 28%, rgba(81, 126, 191, 0.16), transparent 22%),
                radial-gradient(circle at 72% 72%, rgba(243, 132, 47, 0.1), transparent 30%),
                radial-gradient(circle at 39% 35%, rgba(23, 46, 92, 0.32), rgba(8, 11, 21, 0.12) 61%, transparent 74%);
            box-shadow:
                0 0 78px rgba(0, 0, 0, 0.84),
                0 0 72px rgba(56, 112, 180, 0.16),
                0 0 116px rgba(246, 137, 0, 0.1),
                inset 0 0 52px rgba(3, 5, 12, 0.72);
            cursor: grab;
            touch-action: none;
        }

        .globe-shell.is-dragging {
            cursor: grabbing;
        }

        .globe-stage::before {
            content: "";
            position: absolute;
            inset: -18%;
            border-radius: 50%;
            background:
                radial-gradient(circle at 58% 42%, rgba(246, 137, 0, 0.13), rgba(246, 137, 0, 0.045) 17%, transparent 38%),
                radial-gradient(circle at 50% 52%, rgba(22, 26, 29, 0) 44%, rgba(0, 0, 0, 0.34) 71%, rgba(0, 0, 0, 0) 100%);
            filter: blur(16px);
            pointer-events: none;
            z-index: 0;
        }

        .globe-stage::after {
            content: "";
            position: absolute;
            inset: -1.4%;
            border-radius: 50%;
            background:
                linear-gradient(90deg, rgba(0, 0, 0, 0.82) 0%, rgba(0, 0, 0, 0.26) 25%, rgba(0, 0, 0, 0) 43%, rgba(0, 0, 0, 0) 57%, rgba(0, 0, 0, 0.26) 75%, rgba(0, 0, 0, 0.82) 100%),
                linear-gradient(180deg, rgba(0, 0, 0, 0.42) 0%, rgba(0, 0, 0, 0) 30%, rgba(0, 0, 0, 0) 60%, rgba(0, 0, 0, 0.72) 100%),
                radial-gradient(circle at 50% 50%, rgba(0, 0, 0, 0) 44%, rgba(0, 0, 0, 0.58) 72%, rgba(0, 0, 0, 0.94) 100%);
            pointer-events: none;
            z-index: 4;
        }

        .globe-shell::before {
            display: none;
        }

        .globe-shell::after {
            display: none;
        }

        .globe-shell.is-static {
            isolation: auto;
            background: transparent;
            box-shadow: none;
        }

        .globe-shell.is-static::before,
        .globe-shell.is-static::after {
            display: none;
        }

        #singleGlobeContainer {
            position: absolute;
            inset: 0;
            z-index: 1;
            border-radius: inherit;
            overflow: hidden;
            clip-path: circle(50% at 50% 50%);
            transform: translateZ(0);
        }

        #singleGlobeCanvas {
            width: 100% !important;
            height: 100% !important;
            display: block;
            border-radius: inherit;
            transform: scale(1.005);
        }

        .globe-figma-image {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            border-radius: inherit;
            object-fit: cover;
            object-position: center;
            transform: scale(1.015);
            animation: globeFigmaDrift 24s ease-in-out infinite alternate;
        }

        @keyframes globeFigmaDrift {
            from {
                transform: scale(1.01) translate3d(-1.2%, -0.4%, 0);
            }
            to {
                transform: scale(1.04) translate3d(1%, 0.7%, 0);
            }
        }

        .globe-atmosphere {
            display: none;
        }

        .globe-shell.is-static .globe-atmosphere {
            opacity: 0;
        }

        .ghost-years {
            display: none;
        }

        .hero-bottom {
            display: none;
        }

        .hero-bottom-year {
            display: none;
        }

        .hero-bottom-copy {
            display: none;
        }

        .hero-location-block {
            margin-top: auto;
            text-align: center;
            display: grid;
            gap: 8px;
        }

        .hero-location-name {
            color: rgba(255, 255, 255, 0.96);
            font-size: 20px;
            font-weight: 800;
            line-height: 1.3;
        }

        .hero-location-country {
            color: rgba(244, 239, 229, 0.76);
            font-size: 20px;
            line-height: 1.32;
            font-weight: 600;
        }

        .hero-context-block {
            margin-top: 30px;
            display: grid;
            justify-items: center;
            gap: 8px;
            text-align: center;
        }

        .hero-context-period {
            color: rgba(244, 239, 229, 0.56);
            font-size: 16px;
            letter-spacing: 0.06em;
            text-transform: none;
        }

        .story-panel {
            padding: 18px 20px 22px;
            display: flex;
            flex-direction: column;
            background:
                radial-gradient(circle at 72% 10%, rgba(255, 255, 255, 0.035), transparent 18%),
                linear-gradient(180deg, rgba(18, 18, 18, 0.985), rgba(10, 10, 10, 0.995));
        }

        .story-header {
            display: block;
            padding-bottom: 0;
            border-bottom: none;
        }

        .story-kicker {
            color: var(--accent);
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .story-title {
            margin-top: 8px;
            color: var(--accent);
            max-width: 98%;
            font-size: 43px;
            line-height: 1.1;
            font-weight: 800;
            letter-spacing: 0;
            text-wrap: balance;
        }

        .story-location {
            display: none;
        }

        .story-year {
            display: none;
        }

        .story-summary {
            margin-top: 18px;
            min-height: 0;
            max-height: 88px;
            overflow: auto;
            padding-right: 8px;
            color: rgba(244, 239, 229, 0.92);
            font-size: 17px;
            line-height: 1.5;
        }

        .story-summary p {
            margin-bottom: 0.8em;
        }

        .story-summary p:last-child {
            margin-bottom: 0;
        }

        .section-heading {
            color: rgba(244, 239, 229, 0.74);
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.14em;
            text-transform: uppercase;
        }

        .figures-section {
            margin-top: 30px;
        }

        .figures-section .section-heading {
            display: none;
        }

        .figure-row {
            margin-top: 0;
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 42px;
        }

        .figure-row.count-1 {
            grid-template-columns: minmax(0, 240px);
        }

        .figure-row.count-2 {
            grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .figure-row.count-4 {
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 28px;
        }

        .figure-chip {
            display: grid;
            grid-template-columns: 52px minmax(0, 1fr);
            gap: 12px;
            align-items: center;
            min-width: 0;
        }

        .figure-avatar {
            position: relative;
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.06);
            overflow: hidden;
            display: grid;
            place-items: center;
            color: rgba(255, 255, 255, 0.78);
            font-size: 14px;
            font-weight: 700;
            filter: grayscale(0.1);
            letter-spacing: 0.08em;
        }

        .figure-avatar img {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(0.1);
            object-position: center center;
            transform-origin: center center;
        }

        .figure-avatar span {
            display: inline-block;
        }

        .figure-meta {
            min-width: 0;
            padding-top: 2px;
        }

        .figure-name {
            color: rgba(244, 239, 229, 0.82);
            font-size: 12px;
            line-height: 1.2;
        }

        .figure-role {
            margin-top: 3px;
            color: rgba(244, 239, 229, 0.5);
            font-size: 10px;
            line-height: 1.22;
        }

        .archive-section {
            margin-top: 54px;
            min-height: 0;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .archive-stage {
            position: relative;
            flex: 1;
            min-height: 396px;
            margin-top: 0;
            display: grid;
            grid-template-columns:
                minmax(0, 0.215fr)
                minmax(0, 0.04fr)
                minmax(0, 0.49fr)
                minmax(0, 0.04fr)
                minmax(0, 0.215fr);
            grid-template-rows: 18px minmax(0, 1fr);
            align-items: end;
            row-gap: 16px;
            cursor: grab;
            touch-action: pan-y;
        }

        .archive-stage::before,
        .archive-stage::after {
            content: "";
            position: absolute;
            top: 18px;
            width: 23%;
            height: calc(100% - 18px);
            pointer-events: none;
            z-index: 3;
            opacity: 0.96;
        }

        .archive-stage::before {
            left: 0;
            background: linear-gradient(90deg, #111 0%, rgba(17, 17, 17, 0.88) 18%, rgba(17, 17, 17, 0) 100%);
        }

        .archive-stage::after {
            right: 0;
            background: linear-gradient(90deg, rgba(17, 17, 17, 0) 0%, rgba(17, 17, 17, 0.88) 82%, #111 100%);
        }

        .archive-stage.is-dragging {
            cursor: grabbing;
        }

        .archive-card {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            z-index: 1;
            min-width: 0;
            width: 100%;
            transform: translateY(-42px);
        }

        .archive-card.is-hidden {
            display: none;
        }

        .archive-thumb,
        .archive-focus {
            position: relative;
            display: block;
            border: none;
            background: transparent;
            padding: 0;
            cursor: pointer;
            overflow: hidden;
        }

        .archive-thumb::after,
        .archive-focus::after {
            content: "";
            position: absolute;
            inset: 0;
            pointer-events: none;
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.1);
        }

        .archive-thumb.is-empty,
        .archive-focus.is-empty {
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.04));
        }

        .archive-thumb.is-empty::before,
        .archive-focus.is-empty::before {
            content: attr(data-empty-label);
            position: absolute;
            inset: 0;
            display: grid;
            place-items: center;
            color: rgba(244, 239, 229, 0.42);
            font-size: 12px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            z-index: 1;
        }

        .archive-thumb img,
        .archive-focus img {
            display: block;
            width: 100%;
            height: 100%;
            box-sizing: border-box;
            object-fit: contain;
            background: #f4f0e8;
            filter: grayscale(0.1);
        }

        .archive-card-left {
            grid-column: 1;
            grid-row: 2;
            align-self: end;
        }

        .archive-card-left::before {
            display: none;
        }

        .archive-card-left .archive-thumb {
            width: 100%;
            aspect-ratio: 0.8 / 1;
            height: auto;
            background: #f1ebe2;
            border: 12px solid #f1ebe2;
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.22);
        }

        .archive-card-left .archive-card-caption {
            position: absolute;
            left: 0;
            top: calc(100% + 10px);
            width: 100%;
        }

        .archive-card-main {
            grid-column: 3;
            grid-row: 2;
            align-self: end;
            margin-top: 0;
        }

        .archive-card-main::before {
            content: "";
            position: absolute;
            left: -2%;
            top: -8%;
            width: 103%;
            bottom: 0;
            background: rgba(255, 255, 255, 0.96);
            z-index: -1;
        }

        .archive-card-main .archive-focus {
            width: 100%;
            aspect-ratio: 1.16 / 1;
            height: auto;
            background: #f4f0e8;
            border: 12px solid #f4f0e8;

            display: grid;
            grid-template-columns: minmax(0, 1fr) 230px;
            gap: 16px;
            align-items: stretch;
            padding-bottom: 1px;
        }

        .bench-demo-visual,
        .bench-demo-steps {
            min-height: 0;
            border: 1px solid rgba(244, 239, 229, 0.1);
            border-radius: 7px;
            background: rgba(0, 0, 0, 0.24);
        }

        .bench-demo-visual {
            padding: 16px;
            overflow: visible;
            display: grid;
        }

        .bench-demo-steps {
            padding: 16px;
            display: grid;
            align-content: stretch;
            gap: 12px;
        }

        .bench-demo-step {
            min-height: 0;
            border: 1px solid rgba(244, 239, 229, 0.08);
            border-radius: 7px;
            background: rgba(255, 255, 255, 0.028);
            padding: 11px 10px;
            display: grid;
            grid-template-columns: 24px minmax(0, 1fr);
            align-items: center;
            gap: 10px;
            color: rgba(244, 239, 229, 0.86);
            font-size: 13px;
            font-weight: 800;
            line-height: 1.2;
        }

        .bench-demo-step span:first-child {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: grid;
            place-items: center;
            color: var(--accent);
            border: 1px solid rgba(246, 137, 0, 0.4);
            font-family: "Gotham", "Arial Narrow", "PingFang SC", sans-serif;
            font-size: 11px;
        }

        .bench-demo-source-link {
            align-items: start;
            text-decoration: none;
        }

        .bench-demo-source-link:hover,
        .bench-demo-source-link:focus-visible {
            border-color: rgba(246, 137, 0, 0.64);
            outline: none;
        }

        .bench-demo-source-body {
            min-width: 0;
            display: grid;
            gap: 5px;
        }

        .bench-demo-source-type {
            color: var(--accent);
            font-size: 10px;
            font-weight: 900;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .bench-transcript-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            align-content: stretch;
            gap: 14px;
            min-height: 100%;
        }

        .bench-transcript-column {
            border: 1px solid rgba(244, 239, 229, 0.1);
            border-radius: 7px;
            padding: 13px 16px;
            display: grid;
            grid-template-rows: auto auto auto;
            align-content: start;
            gap: 14px;
            background: rgba(255, 255, 255, 0.03);
        }

        .bench-transcript-ruling {
            grid-column: 1 / -1;
            border: 1px solid rgba(246, 137, 0, 0.24);
            border-radius: 7px;
            background: rgba(246, 137, 0, 0.055);
            padding: 13px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 18px;
        }

        .bench-transcript-ruling span {
            color: var(--accent);
            font-size: 11px;
            font-weight: 850;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .bench-transcript-ruling strong {
            color: rgba(255, 255, 255, 0.92);
            font-size: 16px;
            line-height: 1.25;
            text-align: right;
        }

        .bench-transcript-label,
        .bench-code-label,
        .bench-go-label {
            color: rgba(244, 239, 229, 0.52);
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .bench-transcript-text {
            color: rgba(255, 255, 255, 0.9);
            font-size: 17px;
            font-weight: 750;
            line-height: 1.35;
        }

        .bench-transcript-chip,
        .bench-source-type {
            justify-self: start;
            color: var(--accent);
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }

        .bench-code-flow {
            display: grid;
            align-content: center;
            gap: 14px;
        }

        .bench-code-flow.has-media {
            align-content: stretch;
            grid-template-rows: minmax(0, 1fr) auto auto;
        }

        .bench-code-media {
            min-height: 170px;
            overflow: hidden;
            border: 1px solid rgba(244, 239, 229, 0.12);
            border-radius: 7px;
            background: rgba(255, 255, 255, 0.92);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .bench-code-media img {
            display: block;
            width: 100%;
            height: 100%;
            max-height: 260px;
            object-fit: contain;
        }

        .bench-code-media-caption {
            margin-top: -2px;
            color: rgba(244, 239, 229, 0.62);
            font-size: 12px;
            font-weight: 800;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        .bench-code-line {
            border: 1px solid rgba(244, 239, 229, 0.1);
            border-radius: 7px;
            padding: 14px 16px;
            background: rgba(255, 255, 255, 0.034);
            color: rgba(255, 255, 255, 0.94);
            font-family: "Courier New", "SFMono-Regular", monospace;
            font-size: 18px;
            line-height: 1.28;
            white-space: pre-wrap;
        }

        .bench-primitive-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .bench-primitive {
            border: 1px solid rgba(246, 137, 0, 0.32);
            border-radius: 999px;
            padding: 6px 10px;
            color: rgba(244, 239, 229, 0.84);
            font-family: "Courier New", "SFMono-Regular", monospace;
            font-size: 12px;
            font-weight: 800;
        }

        .bench-go-layout {
            display: grid;
            grid-template-columns: 250px minmax(0, 1fr);
            gap: 18px;
            align-items: center;
        }

        .bench-go-board {
            width: 250px;
            aspect-ratio: 1 / 1;
            border: 1px solid rgba(246, 137, 0, 0.3);
            border-radius: 7px;
            background:
                linear-gradient(rgba(244, 239, 229, 0.18) 1px, transparent 1px),
                linear-gradient(90deg, rgba(244, 239, 229, 0.18) 1px, transparent 1px),
                #191511;
            background-size: calc(100% / 8) calc(100% / 8);
            position: relative;
            overflow: hidden;
        }

        .bench-go-stone {
            position: absolute;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            background: #0a0a0a;
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.16), 0 6px 10px rgba(0, 0, 0, 0.3);
        }

        .bench-go-stone.white {
            background: #eee7d8;
        }

        .bench-go-stone.move37 {
            background: var(--accent);
            box-shadow: 0 0 0 6px rgba(246, 137, 0, 0.12), 0 0 28px rgba(246, 137, 0, 0.46);
        }

        .bench-go-notes {
            display: grid;
            gap: 12px;
        }

        .bench-go-note {
            border-left: 2px solid rgba(246, 137, 0, 0.58);
            padding-left: 12px;
            color: rgba(244, 239, 229, 0.88);
            font-size: 15px;
            line-height: 1.35;
            font-weight: 700;
        }

        .bench-paper-demo {
            min-height: 100%;
            display: grid;
            grid-template-columns: minmax(0, 1fr) 180px;
            gap: 14px;
            align-items: stretch;
        }

        .bench-paper-svg {
            width: 100%;
            height: 100%;
            min-height: 190px;
            border: 1px solid rgba(244, 239, 229, 0.1);
            border-radius: 7px;
            background:
                radial-gradient(circle at 16% 12%, rgba(246, 137, 0, 0.12), transparent 30%),
                rgba(255, 255, 255, 0.028);
        }

        .bench-paper-notes {
            min-width: 0;
            display: grid;
            align-content: center;
            gap: 10px;
        }

        .bench-paper-note {
            border: 1px solid rgba(244, 239, 229, 0.1);
            border-radius: 7px;
            background: rgba(255, 255, 255, 0.034);
            padding: 10px;
            color: rgba(244, 239, 229, 0.86);
            font-size: 12px;
            font-weight: 800;
            line-height: 1.28;
        }

        .bench-paper-note strong {
            display: block;
            margin-bottom: 4px;
            color: var(--accent);
            font-size: 10px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .bench-source-list {
            display: grid;
            align-content: start;
            gap: 10px;
            padding-right: 3px;
        }

        .bench-source-item {
            display: grid;
            gap: 6px;
            border: 1px solid rgba(244, 239, 229, 0.1);
            border-radius: 7px;
            background: rgba(255, 255, 255, 0.032);
            padding: 12px;
            text-decoration: none;
        }

        .bench-source-item:hover,
        .bench-source-item:focus-visible {
            border-color: rgba(246, 137, 0, 0.64);
            outline: none;
        }

        .bench-source-label {
            color: rgba(255, 255, 255, 0.92);
            font-size: 14px;
            font-weight: 800;
            line-height: 1.25;
        }

        .bench-evidence-list {
            display: grid;
            align-content: start;
            gap: 16px;
            padding-top: 16px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .bench-evidence-item {
            display: grid;
            gap: 8px;
        }

        .bench-evidence-label {
            color: var(--accent);
            font-size: 12px;
            font-weight: 800;
        }

        .bench-evidence-body {
            color: rgba(244, 239, 229, 0.88);
            font-size: 13.5px;
            line-height: 1.48;
        }

        .stage-footer {
            display: grid;
            grid-template-columns:
                var(--footer-nav-width)
                minmax(0, 1fr)
                var(--footer-nav-width);
            gap: calc(var(--screen-width) * var(--footer-gap-ratio));
            align-items: start;
            padding-top: 6px;
            border-top: none;
        }

        .nav-button {
            width: var(--footer-nav-width);
            height: var(--footer-nav-height);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 7px;
            background: rgba(255, 255, 255, 0.04);
            color: rgba(244, 239, 229, 0.7);
            cursor: pointer;
            transition: color 0.2s ease, border-color 0.2s ease, transform 0.2s ease;
        }

        .nav-button:hover:not(:disabled) {
            color: var(--accent);
            border-color: rgba(246, 137, 0, 0.6);
            transform: translateY(-1px);
        }

        .nav-button:disabled {
            color: rgba(244, 239, 229, 0.24);
            cursor: default;
        }

        .nav-button svg {
            width: 18px;
            height: 18px;
            display: block;
            margin: 0 auto;
        }

        .nav-button path {
            stroke: currentColor;
            stroke-width: 1.8;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        #prevBtn {
            grid-column: 1;
        }

        #nextBtn {
            grid-column: 3;
        }

        .timeline-block {
            min-width: 0;
            grid-column: 2;
            display: flex;
            flex-direction: column;
        }

        .timeline-meta {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 24px;
            margin-bottom: 2px;
            min-height: 24px;
        }

        .timeline-current-year {
            color: var(--accent);
            font-family: "Gotham", "Arial Narrow", "PingFang SC", sans-serif;
            font-size: 22px;
            font-weight: 700;
            line-height: 1;
            letter-spacing: 0.01em;
        }

        .timeline-caption {
            display: none;
        }

        .timeline-track {
            position: relative;
            width: 100%;
            height: 54px;
            display: grid;
            grid-auto-flow: column;
            grid-auto-columns: minmax(0, 1fr);
            align-items: end;
            gap: 0;
            overflow: hidden;
            cursor: grab;
            touch-action: none;
        }

        .timeline-track.is-dragging {
            cursor: grabbing;
        }

        .timeline-track::before {
            content: "";
            position: absolute;
            left: 0;
            right: 0;
            top: 24px;
            height: 3.5px;
            display: block;
            background: repeating-linear-gradient(
                90deg,
                rgba(255, 255, 255, 0.42) 0 1px,
                transparent 1px 12px
            );
            opacity: 0.56;
            pointer-events: none;
        }

        .timeline-tick {
            position: relative;
            z-index: 1;
            border: none;
            background: transparent;
            color: inherit;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            gap: 4.5px;
            min-width: 0;
            padding: 0;
        }

        .timeline-tick::before {
            content: "";
            width: 1px;
            height: 14.15px;
            background: rgba(255, 255, 255, 0.62);
            transition: height 0.25s ease, background 0.25s ease, opacity 0.25s ease;
        }

        .timeline-tick::after {
            display: none;
        }

        .timeline-tick:last-child::after {
            display: none;
        }

        .timeline-tick span {
            color: #797a7a;
            font-family: "Gotham", "Arial Narrow", "PingFang SC", sans-serif;
            font-size: 11.5px;
            line-height: 1;
            letter-spacing: 0.02em;
            transform-origin: center bottom;
            transition: color 0.25s ease, font-size 0.25s ease;
            white-space: nowrap;
        }

        .timeline-tick.active::before,
        .timeline-tick:hover::before {
            height: 14.15px;
            background: var(--accent);
        }

        .timeline-tick.active span,
        .timeline-tick:hover span {
            color: rgba(255, 255, 255, 0.92);
        }

        .timeline-tick.active span {
            color: var(--accent);
            font-size: 18px;
        }

        .timeline-track.achievement-map-track {
            height: 64px;
            grid-auto-columns: minmax(0, 1fr);
            align-items: stretch;
            gap: 12px;
            overflow: visible;
            cursor: default;
        }

        .timeline-track.achievement-map-track::before {
            left: 40px;
            right: 40px;
            top: 31px;
            height: 1px;
            background: linear-gradient(90deg, rgba(246, 137, 0, 0), rgba(246, 137, 0, 0.44), rgba(246, 137, 0, 0));
            opacity: 1;
        }

        .achievement-map-node {
            position: relative;
            z-index: 1;
            min-width: 0;
            border: 1px solid rgba(244, 239, 229, 0.12);
            border-radius: 7px;
            background:
                linear-gradient(180deg, rgba(255, 255, 255, 0.06), rgba(255, 255, 255, 0.018)),
                rgba(10, 10, 10, 0.88);
            color: rgba(244, 239, 229, 0.76);
            padding: 8px 10px 8px 48px;
            display: grid;
            grid-template-rows: auto 1fr auto;
            gap: 3px;
            text-align: left;
            cursor: pointer;
            overflow: hidden;
            transition: border-color 0.2s ease, background 0.2s ease, transform 0.2s ease;
        }

        .achievement-map-node:hover,
        .achievement-map-node.active {
            border-color: rgba(246, 137, 0, 0.7);
            background:
                linear-gradient(180deg, rgba(246, 137, 0, 0.16), rgba(246, 137, 0, 0.04)),
                rgba(14, 10, 6, 0.94);
        }

        .achievement-map-node:hover {
            transform: translateY(-1px);
        }

        .achievement-map-index {
            position: absolute;
            left: 11px;
            top: 50%;
            width: 25px;
            height: 25px;
            border-radius: 50%;
            transform: translateY(-50%);
            display: grid;
            place-items: center;
            border: 1px solid rgba(246, 137, 0, 0.42);
            color: var(--accent);
            font-family: "Gotham", "Arial Narrow", "PingFang SC", sans-serif;
            font-size: 12px;
            font-weight: 800;
            line-height: 1;
            background: rgba(0, 0, 0, 0.44);
        }

        .achievement-map-area {
            color: rgba(244, 239, 229, 0.5);
            font-size: 10px;
            font-weight: 800;
            line-height: 1;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .achievement-map-title {
            color: rgba(255, 255, 255, 0.94);
            font-size: 15px;
            font-weight: 800;
            line-height: 1.12;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .achievement-map-method {
            color: rgba(244, 239, 229, 0.54);
            font-size: 11px;
            font-weight: 700;
            line-height: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .achievement-map-node.region-picker-node,
        .bench-map-item.region-picker-node {
            position: sticky;
            border-color: rgba(246, 137, 0, 0.48);
            background:
                linear-gradient(180deg, rgba(246, 137, 0, 0.16), rgba(246, 137, 0, 0.035)),
                rgba(16, 12, 8, 0.94);
            z-index: 5;
        }

        .achievement-map-node.region-picker-node {
            left: 0;
        }

        .bench-map-item.region-picker-node {
            top: 0;
        }

        .achievement-map-node.region-picker-node .achievement-map-index,
        .bench-map-item.region-picker-node .bench-map-index {
            border-color: rgba(244, 239, 229, 0.32);
            color: rgba(255, 255, 255, 0.92);
        }

        .achievement-map-node.region-picker-node .achievement-map-title,
        .bench-map-item.region-picker-node .bench-map-title {
            color: var(--accent);
        }

        .footer-status {
            min-width: 0;
            margin-left: auto;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            justify-content: flex-start;
            text-align: right;
            gap: 0;
        }

        .footer-status-text {
            color: var(--accent);
            font-family: "OPPOSans", "PingFang SC", "Microsoft YaHei", sans-serif;
            font-size: 18.89px;
            font-weight: 700;
            line-height: 1.15;
            width: auto;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-width: 100%;
        }

        .footer-counter {
            display: none;
        }

        .photo-viewer {
            position: fixed;
            inset: 0;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .viewer-photo {
            max-width: 82vw;
            max-height: 80vh;
            object-fit: contain;
            box-shadow: 0 18px 40px rgba(0, 0, 0, 0.45);
        }

        .photo-prev,
        .photo-next,
        .close-viewer {
            position: absolute;
            border: none;
            background: rgba(255, 255, 255, 0.12);
            color: #fff;
            cursor: pointer;
        }

        .close-viewer {
            top: 24px;
            right: 24px;
            width: 42px;
            height: 42px;
            font-size: 24px;
        }

        .photo-prev,
        .photo-next {
            top: 50%;
            width: 52px;
            height: 52px;
            transform: translateY(-50%);
            font-size: 20px;
        }

        .photo-prev {
            left: 24px;
        }

        .photo-next {
            right: 24px;
        }

        .photo-counter {
            position: absolute;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            color: #fff;
            font-size: 14px;
            letter-spacing: 0.08em;
        }

        @media (max-width: 1100px) and (orientation: portrait) {
            html,
            body {
                height: auto;
                min-height: 100%;
                overflow-x: hidden;
                overflow-y: auto;
                overscroll-behavior-y: contain;
            }

            .stage-viewport {
                height: auto;
                min-height: 100vh;
                overflow: visible;
            }

            .single-stage {
                position: relative;
                left: auto;
                top: auto;
                width: 100%;
                height: auto;
                transform: none;
                padding: 18px 16px 20px;
                grid-template-rows: auto auto auto;
                gap: 18px;
                background: transparent;
                box-shadow: none;
            }

            .stage-topbar {
                grid-template-columns: 1fr auto;
                gap: 10px;
                padding-bottom: 14px;
            }

            .brand-lockup {
                width: auto;
                grid-template-columns: 1fr;
                row-gap: 8px;
            }

            .brand-unit {
                gap: 3px;
            }

            .brand-mark {
                display: none;
            }

            .brand-title,
            .brand-subtitle {
                white-space: normal;
            }

            .brand-title {
                font-size: 12px;
            }

            .brand-subtitle {
                font-size: 7px;
            }

            .stage-kicker {
                display: block;
                grid-column: 1 / -1;
                color: rgba(244, 239, 229, 0.72);
                font-size: 12px;
                letter-spacing: 0.08em;
            }

            .mode-chip {
                font-size: 14px;
            }

            .topbar-actions {
                gap: 8px;
                flex-wrap: wrap;
                justify-content: flex-end;
            }

            .storyline-select {
                width: 184px;
                height: 27px;
                padding-left: 8px;
                padding-right: 24px;
                font-size: 11px;
            }

            .mode-chip-label {
                font-size: 12px;
            }

            .language-toggle.topbar-language-toggle {
                --language-toggle-width: 42px;
                --language-toggle-height: 25px;
                font-size: 18px;
            }

            .stage-grid {
                grid-template-columns: 1fr;
                gap: 16px;
                padding-top: 0;
                padding-bottom: 0;
            }

            .bench-dossier {
                grid-template-columns: 1fr;
                gap: 16px;
            }

            .bench-map-panel,
            .bench-core-panel,
            .bench-material-panel {
                padding: 18px;
            }

            .bench-core-panel {
                grid-template-rows: auto auto auto auto auto;
            }

            .bench-core-title {
                max-width: none;
                font-size: 30px;
            }

            .bench-core-summary {
                max-height: none;
                overflow: visible;
            }

            .bench-hero-visual {
                min-height: 180px;
                grid-template-columns: 1fr;
            }

            .bench-photo-frame {
                min-height: 150px;
            }

            .bench-demo-surface {
                grid-template-columns: 1fr;
            }

            .bench-transcript-grid,
            .bench-go-layout,
            .bench-paper-demo {
                grid-template-columns: 1fr;
            }

            .bench-transcript-ruling {
                grid-column: auto;
                align-items: flex-start;
                flex-direction: column;
            }

            .bench-transcript-ruling strong {
                text-align: left;
            }

            .bench-go-board {
                width: min(100%, 300px);
            }

        function escapeHtml(value) {
            return String(value == null ? '' : value)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function debounce(func, wait) {
            let timeout;
            return function executedFunction(...args) {
                const later = () => {
                    clearTimeout(timeout);
                    func(...args);
                };
                clearTimeout(timeout);
                timeout = setTimeout(later, wait);
            };
        }

        function stripHtml(value) {
            if (window.MilestoneView && typeof window.MilestoneView.stripHtml === 'function') {
                return window.MilestoneView.stripHtml(value);
            }
            return String(value || '')
                .replace(/<br\s*\/?>/gi, '\n')
                .replace(/<[^>]*>/g, ' ')
                .replace(/\s+/g, ' ')
                .trim();
        }

        function tx(key) {
            return window.I18n && typeof window.I18n.t === 'function' ? window.I18n.t(key) : key;
        }

        function lx(value) {
            return window.I18n && typeof window.I18n.localize === 'function' ? window.I18n.localize(value) : (value == null ? '' : value);

            'Germany',

        const ACHIEVEMENT_REGION_LABELS = {

            Netherlands: '荷兰',
            Germany: '德国',
            China: '中国',
            France: '法国'
        };

        function uiText(en, zh) {
            const locale = window.I18n && typeof window.I18n.getLocale === 'function' ? window.I18n.getLocale() : window.currentLocale;
            return locale === 'zh' ? zh : en;
        }

        function getMilestoneRegions(milestone) {
            const country = milestone && milestone.location && milestone.location.country;
            const rawCountry = String(country && typeof country === 'object' ? country.en : country || '').trim();
            if (!rawCountry) return [];
            const matched = ACHIEVEMENT_REGION_NAMES.filter((region) => rawCountry.includes(region));
            return matched.length > 0 ? matched : [rawCountry];
        }

        function getRegionLabel(region) {
            return uiText(region, ACHIEVEMENT_REGION_LABELS[region] || region);

            const source = getStorylineMilestones(storylineId);
            if (!activeRegionFilter || storylineId !== 'bench-council-ai100') return source;
            return source.filter((milestone) => getMilestoneRegions(milestone).includes(activeRegionFilter));
        }

        function getRegionOptions() {
            const source = getStorylineMilestones(activeStorylineId);
            const regionCounts = new Map();
            source.forEach((milestone) => {
                getMilestoneRegions(milestone).forEach((region) => {
                    regionCounts.set(region, (regionCounts.get(region) || 0) + 1);
                });
            });

            return Array.from(regionCounts, ([region, count]) => ({ region, count }))
                .sort((a, b) => b.count - a.count || a.region.localeCompare(b.region));
        }

            if (!window.history || !window.location) return;
            try {
                const url = new URL(window.location.href);
                if (storylineId && storylineId !== DEFAULT_STORYLINE_ID) {
                    url.searchParams.set('storyline', storylineId);
                } else {
                    url.searchParams.delete('storyline');
                }
                window.history.replaceState(null, '', url);
            } catch (_) {}
        }

        function renderStorylineSelect() {

                const count = getStorylineMilestones(option.id).length;
                const disabled = count <= 0 ? ' disabled' : '';
                const selected = option.id === activeStorylineId ? ' selected' : '';
                const label = getStorylineLabel(option);
                const suffix = ` (${getStorylineStatus(option, count)})`;
                return `<option value="${escapeHtml(option.id)}"${selected}${disabled}>${escapeHtml(label + suffix)}</option>`;

                renderStorylineSelect();
                return;

            activeStorylineId = storylineId;

        function buildFallbackVm(milestone, index) {
            const safeMilestone = milestone || {};
            const photos = [];
            (safeMilestone.photos || []).forEach((url) => {
                if (url && !photos.includes(url)) photos.push(url);
            });
            if (safeMilestone.resources && Array.isArray(safeMilestone.resources.images)) {
                safeMilestone.resources.images.forEach((url) => {
                    if (url && !photos.includes(url)) photos.push(url);
                });
            }

            const quote = String(lx(safeMilestone.quote) || '').trim();
            const quoteAttribution = String(lx(safeMilestone.quoteAttribution) || '').trim();
            const descriptionText = stripHtml(lx(safeMilestone.description) || '');
            const commentarySections = [];
            if (quote && quote !== '待补充') {
                const attributionPrefix = quoteAttribution && quoteAttribution.startsWith('《') ? `${tx('source')}：` : `${tx('attribution')}：`;
                commentarySections.push({
                    label: tx('quoteExcerpt'),
                    html: quoteAttribution ? `${quote}<br>${attributionPrefix}${quoteAttribution}` : quote
                });
            }
            const customSections = Array.isArray(safeMilestone.commentarySections)
                ? safeMilestone.commentarySections.filter((section) => stripHtml(section && section.html))
                : [];
            if (customSections.length > 0) {
                customSections.forEach((section) => {
                    commentarySections.push({
                        label: lx(section.label) || tx('contentInterpretation'),
                        html: lx(section.html),
                        link: section.link || null
                    });
                });
            } else if (descriptionText) {
                commentarySections.push({ label: tx('background'), html: descriptionText });
            }
            if (commentarySections.length === 0) {
                commentarySections.push({ label: tx('contentPending'), html: tx('noAdditionalInfo') });
            }

            const primaryVideo = safeMilestone.resources && Array.isArray(safeMilestone.resources.videos) && safeMilestone.resources.videos.length > 0
                ? safeMilestone.resources.videos[0]
                : null;
            const category = safeMilestone.category || safeMilestone.subtitle || '';

            return {
                raw: safeMilestone,
                year: safeMilestone.year || '',
                title: safeMilestone.title || '',
                category,
                subtitle: safeMilestone.subtitle || category,
                location: safeMilestone.location || { name: '', country: '', coordinates: [] },
                descriptionHtml: safeMilestone.description || '',
                descriptionText,
                figures: Array.isArray(safeMilestone.figures) ? safeMilestone.figures : [],
                photos,
                primaryPhoto: photos[0] || '',
                archivePhotos: photos.slice(1),
                primaryVideo,
                videoEmbedUrl: primaryVideo ? primaryVideo.embed_url : '',
                quoteHtml: quote,
                quotePage: String(safeMilestone.quotePage || '').trim(),
                commentaryOverrideSections: Array.isArray(safeMilestone.commentarySections) ? safeMilestone.commentarySections : [],
                commentarySections,
                timeline: milestoneList.map((item, itemIndex) => ({
                    year: item.year,
                    title: item.title,
                    active: itemIndex === index

        function getVm(index) {

        function preloadImage(url) {
            if (!url || imagePreloadCache.has(url)) return;

        function preloadMilestoneAssets(index) {

            const vm = getVm(index);

        function preloadAdjacentAssets(index) {
            preloadMilestoneAssets(index);
            preloadMilestoneAssets(index - 1);

        }

        function buildContextYears(year, beforeCount, afterCount) {
            const safeYear = Number(year);
            if (Number.isNaN(safeYear)) return [];
            const years = [];
            for (let offset = beforeCount; offset >= 1; offset -= 1) {
                years.push(safeYear - offset);
            }
            for (let offset = 1; offset <= afterCount; offset += 1) {
                years.push(safeYear + offset);
            }
            return years;
        }

        function buildLocationLine(location) {
            return [location && location.name, location && location.country]
                .filter(Boolean)
                .join('  ');
        }

        function buildLocationHtml(location) {
            const name = escapeHtml(location && location.name ? location.name : '');
            const country = escapeHtml(location && location.country ? location.country : '');
            if (name && country) {
                return `${name}<br>${country}`;
            }
            if (name) return name;
            if (country) return country;
            return tx('locationPending');
        }

        function extractStageContext(vm) {
            const raw = String((vm && (vm.category || vm.subtitle)) || '').replace(/\s+/g, ' ').trim();
            if (!raw) {
                return { label: 'AI 历史', period: '' };
            }

            const match = raw.match(/^(.*?)(?:\s*[（(]([^()（）]+)[)）])?$/);
            const label = String(match && match[1] ? match[1] : raw).trim() || raw;
            const period = String(match && match[2] ? match[2] : '').trim();
            return { label, period };
        }

        function buildSummaryHtml(vm) {
            if (vm.descriptionHtml && String(vm.descriptionHtml).trim()) {

            const words = String(name || '').trim().split(/\s+/).filter(Boolean);
            if (words.length === 0) return 'AI';
            if (words.length === 1) return words[0].slice(0, 2).toUpperCase();
            return words.slice(0, 2).map((item) => item[0].toUpperCase()).join('');

        function getFigureAvatarSource(figure, vm, portraitPool, index) {
            if (figure && figure.avatar) {
                return {

            if (portraitPool[index]) {

            if (avatarSource && avatarSource.src) {

                return `<img src="${avatarSource.src}" alt="${escapeHtml(figure.name || tx('keyFigure'))}"${styleAttr}>`;
            }
            return `<span>${escapeHtml(initials(figure.name))}</span>`;

        function isPortraitLikePhoto(url) {
            return /\/people\/|portrait|headshot|avatar|人物|人像/i.test(String(url || ''));

        function isDocumentLikePhoto(url) {
            return /proposal|paper|document|page|sheet|scan|manuscript|report|doc|论文|提案|文稿|手稿/i.test(String(url || ''));

        function choosePreferredArchiveIndex(photos) {

            if (safePhotos.length <= 1) return 0;

            const firstNonDocumentIndex = safePhotos.findIndex((url) => !isDocumentLikePhoto(url));
            if (firstNonDocumentIndex > 0) {
                return firstNonDocumentIndex;
            }

            return 0;

        function buildArchiveFigureMeta(vm, index, fallbackName) {
            const figures = Array.isArray(vm.figures) ? vm.figures.filter(Boolean) : [];
            if (figures.length > 0) {
                const figure = figures[((index % figures.length) + figures.length) % figures.length] || figures[0];
                return {
                    name: figure.name || fallbackName || tx('keyFigure'),
                    role: figure.role || buildLocationLine(vm.location) || tx('keyParticipant')
                };
            }

            return {
                name: fallbackName || vm.title || tx('historicalArchive'),
                role: buildLocationLine(vm.location) || vm.category || tx('historicalEvent')
            };

        function extractWorkTitleFromAttribution(attribution) {
            const match = String(attribution || '').match(/《([^》]+)》/);
            return match ? String(match[1] || '').trim() : '';
        }

        function getConfiguredImageMeta(vm, url) {
            const raw = vm && vm.raw ? vm.raw : {};
            const map = raw && raw.resources && raw.resources.imageMeta ? raw.resources.imageMeta : (raw.imageMeta || null);
            if (!map || typeof map !== 'object') return null;
            const entry = map[url];
            if (!entry || typeof entry !== 'object') return null;

            const caption = String(lx(entry.caption || entry.title || entry.name || '')).trim();
            const subcaption = String(lx(entry.subcaption || entry.subtitle || entry.description || entry.role || '')).trim();
            const source = String(entry.sourceUrl || entry.source || entry.url || '').trim();
            const license = String(lx(entry.license || '')).trim();
            const usage = String(lx(entry.usage || entry.recommendedUse || '')).trim();
            if (!caption && !subcaption && !source && !license && !usage) return null;
            return { caption, subcaption, source, license, usage };
        }

        function buildArchivePhotoMeta(vm, url) {
            const value = String(url || '').trim();
            if (!value) return { name: '', role: '' };

            const configured = getConfiguredImageMeta(vm, value);
            const title = String(vm && vm.title ? vm.title : '').trim();
            const year = vm && vm.year ? String(vm.year) : '';
            const workTitle = extractWorkTitleFromAttribution(vm && vm.quoteAttribution ? vm.quoteAttribution : '');

            if (isPortraitLikePhoto(value)) {
                const autoMeta = {
                    name: tx('portrait'),

                };
                return {
                    name: (configured && configured.caption) || autoMeta.name,
                    role: (configured && configured.subcaption) || autoMeta.role
                };

            if (/\/architecture\//i.test(value) || /_architecture_/i.test(value)) {

                    name: tx('architectureDiagram'),

                return {

            if (/\/papers\//i.test(value) || /_papers_/i.test(value) || isDocumentLikePhoto(value)) {
                const autoMeta = {
                    name: tx('paperPage'),
                    role: workTitle ? `《${workTitle}》` : (title || tx('originalScreenshot'))

                return {
                    name: (configured && configured.caption) || autoMeta.name,
                    role: (configured && configured.subcaption) || autoMeta.role

                return {
                    name: (configured && configured.caption) || autoMeta.name,
                    role: (configured && configured.subcaption) || autoMeta.role

                role: title || (vm && vm.category) || tx('archiveMaterial')

                role: (configured && configured.subcaption) || autoMeta.role

        function extractVideoQuote(vm) {
            const candidates = [

                vm.descriptionText
            ];
            const raw = candidates.map((item) => stripHtml(item || '')).find(Boolean) || tx('noMedia');

        function splitTextByPunctuation(text, targetParts) {
            const normalized = stripHtml(text || '').replace(/\s+/g, ' ').trim();
            if (!normalized) return [];

            const parts = [];
            const estimatedLength = Math.max(28, Math.ceil(normalized.length / Math.max(1, targetParts)));
            let cursor = 0;
            while (cursor < normalized.length && parts.length < targetParts) {
                let end = Math.min(normalized.length, cursor + estimatedLength);
                if (end < normalized.length) {
                    const nextBreak = normalized.slice(end).search(/[，。；：,.!?！？]/);
                    if (nextBreak >= 0 && nextBreak < 20) {
                        end += nextBreak + 1;
                    }
                }
                parts.push(normalized.slice(cursor, end).trim());
                cursor = end;
            }
            return parts.filter(Boolean);
        }

        function createStylizedCloudTexture(texture) {

            const height = texture.image.height || 0;
            if (!width || !height) return texture;

            const canvas = document.createElement('canvas');
            canvas.width = width;
            canvas.height = height;
            const context = canvas.getContext('2d', { willReadFrequently: true });
            if (!context) return texture;

            context.drawImage(texture.image, 0, 0, width, height);
            const imageData = context.getImageData(0, 0, width, height);
            const { data } = imageData;
            for (let index = 0; index < data.length; index += 4) {
                const average = (data[index] + data[index + 1] + data[index + 2]) / 3;
                const alpha = data[index + 3] / 255;
                const density = Math.max(alpha, 1 - average / 255);
                data[index] = 255;
                data[index + 1] = 255;
                data[index + 2] = 255;
                data[index + 3] = Math.round(Math.min(1, Math.pow(density, 0.88) * 1.08) * 255);
            }
            context.putImageData(imageData, 0, 0);

            const softenedCanvas = document.createElement('canvas');
            softenedCanvas.width = width;
            softenedCanvas.height = height;
            const softenedContext = softenedCanvas.getContext('2d');
            if (!softenedContext) {
                const directTexture = new THREE.CanvasTexture(canvas);
                directTexture.wrapS = THREE.RepeatWrapping;
                directTexture.wrapT = THREE.ClampToEdgeWrapping;

            softenedContext.filter = 'blur(1.6px)';
            softenedContext.drawImage(canvas, 0, 0, width, height);
            softenedContext.filter = 'none';

            softenedContext.drawImage(canvas, 0, 0, width, height);

            stylizedTexture.wrapS = THREE.RepeatWrapping;
            stylizedTexture.wrapT = THREE.ClampToEdgeWrapping;

        function ensureMediaPlayer() {
            let player = refs.videoFrame.querySelector('video');
            if (!player) {
                player = document.createElement('video');
                player.id = 'mediaVideoPlayer';
                player.controls = true;
                player.playsInline = true;
                player.preload = 'metadata';
                refs.videoFrame.appendChild(player);
            }
            return player;
        }

        function isDirectVideoMedia(url) {
            return /\.(mp4|webm|ogg)(?:[?#].*)?$/i.test(String(url || ''));
        }

        function resetInlineMedia() {
            const iframe = ensureMediaIframe();
            const player = ensureMediaPlayer();

            iframe.style.display = 'none';
            iframe.src = 'about:blank';

            player.pause();
            player.removeAttribute('src');
            player.style.display = 'none';
            player.load();
        }

        function playInlineVideo(url) {
            if (!url) return;
            refs.videoFrame.classList.add('is-playing');
            refs.videoFrame.onclick = null;
            if (isDirectVideoMedia(url)) {
                const iframe = ensureMediaIframe();
                const player = ensureMediaPlayer();
                iframe.style.display = 'none';
                iframe.src = 'about:blank';
                player.src = url;
                player.style.display = 'block';
                const playback = player.play();
                if (playback && typeof playback.catch === 'function') {
                    playback.catch(() => {});
                }
                return;
            }

            const iframe = ensureMediaIframe();
            const player = ensureMediaPlayer();
            player.pause();
            player.removeAttribute('src');
            player.style.display = 'none';
            player.load();
            iframe.src = url;
            iframe.style.display = 'block';
        }

        function getQuizItems(vm) {
            const raw = vm && vm.raw ? vm.raw : {};
            const rawQuizzes = Array.isArray(vm && vm.quizzes)
                ? vm.quizzes
                : Array.isArray(raw.quizzes)
                  ? raw.quizzes
                  : raw.quiz
                    ? [raw.quiz]
                    : [];

            return rawQuizzes.map((quiz, quizIndex) => {
                if (!quiz || typeof quiz !== 'object') return null;
                const question = String(lx(quiz.question) || '').trim();
                const options = Array.isArray(quiz.options)
                    ? quiz.options.map((option) => String(lx(option) || '').trim())
                    : [];
                const answerIndex = Number(quiz.answerIndex);
                const explanation = String(lx(quiz.explanation) || '').trim();

                if (!question || options.length < 2 || !Number.isInteger(answerIndex) || answerIndex < 0 || answerIndex >= options.length) {
                    return null;
                }

                return {
                    id: String(quiz.id || `quiz-${quizIndex + 1}`),
                    question,
                    options,
                    answerIndex,
                    explanation
                };
            }).filter(Boolean);
        }

        function applyQuizAnswer(container, quiz, selectedIndex) {
            if (!container || !quiz || container.classList.contains('is-answered')) return;
            const isCorrect = selectedIndex === quiz.answerIndex;
            container.classList.add('is-answered');

            container.querySelectorAll('.quick-quiz-option').forEach((button) => {
                const optionIndex = Number(button.dataset.answerIndex);
                button.disabled = true;
                button.classList.toggle('is-selected', optionIndex === selectedIndex);
                button.classList.toggle('is-correct-answer', optionIndex === quiz.answerIndex);
                button.classList.toggle('is-wrong-answer', optionIndex === selectedIndex && !isCorrect);
            });

            const answerLabel = quiz.options[quiz.answerIndex] || '';
            const feedback = container.querySelector('.quick-quiz-feedback');
            if (feedback) {
                const lead = isCorrect ? uiText('Correct', '答对了') : uiText('Not quite', '差一点');
                const answerText = uiText('Answer', '正确答案');
                feedback.innerHTML = `
                    <span class="quick-quiz-feedback-result">
                        <strong>${escapeHtml(lead)}</strong>
                        <span>${escapeHtml(answerText)}：${escapeHtml(answerLabel)}</span>
                    </span>
                    ${quiz.explanation ? `<span class="quick-quiz-feedback-explanation">${escapeHtml(quiz.explanation)}</span>` : ''}
                `;
            }

            if (refs.quizModalContinue && container === refs.quizModalBody) {
                refs.quizModalContinue.disabled = false;

        function scoreQuizMaterial(item) {
            const haystack = `${item && item.type ? item.type : ''} ${item && item.url ? item.url : ''} ${item && item.title ? item.title : ''} ${item && item.description ? item.description : ''} ${item && item.usage ? item.usage : ''}`.toLowerCase();
            let score = 0;
            if (item && item.type === 'image' && /diagram|explainer|eval|policy|value|search|architecture|flow/.test(haystack)) score += 9;
            if (/diagram|explainer|eval|policy|value|search|architecture|flow|source|archive|paper|manual/.test(haystack)) score += 4;
            if (/archive|paper|manual|source/.test(haystack)) score += 2;
            if (/portrait|photo|alan-turing|john-mccarthy|lee-sedol/.test(haystack)) score -= 5;
            if (item && item.type === 'image') score += 1;
            return score;
        }

            return items

                .map((entry) => entry.item)[0] || null;

        function closeTransientOverlaysForIdleAdvance() {
            document.querySelectorAll('.photo-viewer').forEach((viewer) => viewer.remove());
            if (hasOpenQuizModal()) {
                closeQuizModal();
            }
        }

        function openPhotoViewer(startIndex) {
            const vm = getVm(currentIndex);
            const photos = sortPhotosForDisplay(vm.photos);
            if (!photos.length) return;

            let currentPhotoIndex = Math.max(0, Math.min(startIndex, photos.length - 1));
            const viewer = document.createElement('div');
            viewer.className = 'photo-viewer';
            viewer.innerHTML = `
                <button class="close-viewer" type="button">×</button>
                <button class="photo-prev" type="button">◀</button>
                <img src="${photos[currentPhotoIndex]}" class="viewer-photo" alt="${tx('historicalArchive')}">
                <button class="photo-next" type="button">▶</button>
                <div class="photo-counter">${currentPhotoIndex + 1} / ${photos.length}</div>
            `;
            document.body.appendChild(viewer);

            const closeViewer = () => {
                viewer.remove();
            };

            viewer.querySelector('.close-viewer').onclick = closeViewer;
            viewer.querySelector('.photo-prev').onclick = () => {
                currentPhotoIndex = (currentPhotoIndex - 1 + photos.length) % photos.length;
                viewer.querySelector('.viewer-photo').src = photos[currentPhotoIndex];
                viewer.querySelector('.photo-counter').textContent = `${currentPhotoIndex + 1} / ${photos.length}`;
            };
            viewer.querySelector('.photo-next').onclick = () => {
                currentPhotoIndex = (currentPhotoIndex + 1) % photos.length;
                viewer.querySelector('.viewer-photo').src = photos[currentPhotoIndex];
                viewer.querySelector('.photo-counter').textContent = `${currentPhotoIndex + 1} / ${photos.length}`;
            };

            const handleKey = (event) => {
                if (event.key === 'Escape') closeViewer();
                if (event.key === 'ArrowLeft') viewer.querySelector('.photo-prev').click();
                if (event.key === 'ArrowRight') viewer.querySelector('.photo-next').click();
            };

            document.addEventListener('keydown', handleKey);
            const observer = new MutationObserver(() => {
                if (!document.body.contains(viewer)) {
                    document.removeEventListener('keydown', handleKey);
                    observer.disconnect();
                }
            });
            observer.observe(document.body, { childList: true });
        }

        function isPortraitStackLayout() {
            if (typeof window.matchMedia === 'function') {
                return window.matchMedia('(max-width: 1100px) and (orientation: portrait)').matches;
            }
            return window.innerWidth <= 1100 && window.innerHeight > window.innerWidth;
        }

        function getPortraitIgnoreElement(target) {
            if (!target) return null;
            const element = target.nodeType === 1 ? target : target.parentElement;
            if (!element || !PORTRAIT_EDGE_IGNORE_SELECTOR) return null;
            return element.closest(PORTRAIT_EDGE_IGNORE_SELECTOR);
        }

        function shouldIgnorePortraitEdgeTarget(target) {
            return Boolean(getPortraitIgnoreElement(target));
        }

        function resetPortraitScrollPosition() {
            if (!isPortraitStackLayout()) return;

            const activeElement = document.activeElement;
            if (activeElement && activeElement !== document.body && typeof activeElement.blur === 'function') {
                activeElement.blur();
            }

            const resetScroll = () => {
                window.scrollTo(0, 0);
                document.documentElement.scrollTop = 0;
                document.body.scrollTop = 0;
                if (refs.viewport) {
                    refs.viewport.scrollTop = 0;
                }
            };

            resetScroll();
            window.requestAnimationFrame(resetScroll);
            window.setTimeout(resetScroll, 0);
        }

        function getDocumentScrollTop() {
            return window.scrollY
                || window.pageYOffset
                || document.documentElement.scrollTop
                || document.body.scrollTop
                || 0;
        }

        function getDocumentScrollMax() {
            const scrollHeight = Math.max(
                document.documentElement.scrollHeight,
                document.body.scrollHeight
            );
            return Math.max(0, scrollHeight - window.innerHeight);
        }

        function isNearPortraitBoundary(boundary) {
            const scrollTop = getDocumentScrollTop();
            const maxScroll = getDocumentScrollMax();

            if (boundary === 'top') {
                return scrollTop <= PORTRAIT_EDGE_NAV_TOLERANCE;
            }

            return scrollTop >= maxScroll - PORTRAIT_EDGE_NAV_TOLERANCE;
        }

        function scrollPortraitToBoundary(boundary) {
            if (!isPortraitStackLayout()) return;

            const targetTop = boundary === 'bottom' ? getDocumentScrollMax() : 0;
            const applyScroll = () => {
                window.scrollTo(0, targetTop);
                document.documentElement.scrollTop = targetTop;
                document.body.scrollTop = targetTop;
                if (refs.viewport) {
                    refs.viewport.scrollTop = targetTop;
                }
            };

            applyScroll();
            window.requestAnimationFrame(applyScroll);
            window.setTimeout(applyScroll, 0);
        }

        function releasePortraitEdgeGesture() {
            portraitEdgeGesture = null;
        }

        function notePortraitTouchActivity() {
            lastPortraitTouchAt = Date.now();
        }

        function isPortraitTouchEmulationContext() {
            const hasTouchPoints = typeof navigator !== 'undefined' && Number(navigator.maxTouchPoints) > 0;
            const supportsMatchMedia = typeof window.matchMedia === 'function';
            const hasCoarsePointer = supportsMatchMedia
                && (window.matchMedia('(pointer: coarse)').matches || window.matchMedia('(any-pointer: coarse)').matches);
            const hasNoHover = supportsMatchMedia
                && (window.matchMedia('(hover: none)').matches || window.matchMedia('(any-hover: none)').matches);
            return hasTouchPoints || hasCoarsePointer || hasNoHover;
        }

        function shouldIgnorePortraitPointerEvent(event) {
            if (!event || !window.SwipeNavigation || typeof window.SwipeNavigation.isTouchLikePointer !== 'function') {
                return true;
            }

            const isTouchLike = window.SwipeNavigation.isTouchLikePointer(event.pointerType);
            const isEmulatedMouse = event.pointerType === 'mouse' && isPortraitTouchEmulationContext();

            if (!event.isTrusted || (!isTouchLike && !isEmulatedMouse)) {
                return true;
            }

            return Date.now() - lastPortraitTouchAt < PORTRAIT_EDGE_POINTER_SUPPRESSION_MS;
        }

        function resetPortraitEdgeBoundary() {
            if (!portraitEdgeGesture) return;
            portraitEdgeGesture.boundary = '';
            portraitEdgeGesture.boundaryDrag = 0;
        }

        function getPortraitBoundaryForStep(deltaY) {
            if (deltaY < 0 && isNearPortraitBoundary('bottom')) {
                return 'bottom';
            }

            if (deltaY > 0 && isNearPortraitBoundary('top')) {
                return 'top';
            }

            return '';
        }

        function maybeNavigateAcrossPortraitBoundary(currentY, originalEvent) {
            if (!portraitEdgeGesture || !Number.isFinite(currentY)) return false;

            const deltaStep = currentY - portraitEdgeGesture.lastY;
            portraitEdgeGesture.lastY = currentY;

            if (!deltaStep) return false;

            const boundary = getPortraitBoundaryForStep(deltaStep);
            if (!boundary) {
                resetPortraitEdgeBoundary();
                return false;
            }

            if (portraitEdgeGesture.boundary !== boundary) {
                portraitEdgeGesture.boundary = boundary;
                portraitEdgeGesture.boundaryDrag = 0;
            }

            const outwardDelta = boundary === 'bottom' ? -deltaStep : deltaStep;
            if (outwardDelta <= 0) {
                resetPortraitEdgeBoundary();
                return false;
            }

            portraitEdgeGesture.boundaryDrag += outwardDelta;
            if (portraitEdgeGesture.boundaryDrag < PORTRAIT_EDGE_NAV_MIN_Y) {
                return false;
            }

            if (originalEvent && originalEvent.cancelable) {
                originalEvent.preventDefault();
            }

            const direction = boundary === 'bottom' ? 'next' : 'prev';
            const portraitScrollAnchor = boundary === 'bottom' ? 'top' : 'bottom';

            releasePortraitEdgeGesture();
            navigate(direction, { portraitScrollAnchor });
            return true;
        }

        function findTouchByIdentifier(touchList, identifier) {
            if (!touchList || identifier == null) return null;
            for (let index = 0; index < touchList.length; index += 1) {
                if (touchList[index].identifier === identifier) {
                    return touchList[index];
                }
            }
            return null;
        }

        function handlePortraitEdgeTouchStart(event) {
            if (!isPortraitStackLayout()) return;
            if (!event.isTrusted) return;
            if (shouldIgnorePortraitEdgeTarget(event.target)) return;
            if (portraitEdgeGesture) return;

            const primaryTouch = event.changedTouches && event.changedTouches[0];
            if (!primaryTouch) return;
            notePortraitTouchActivity();

            portraitEdgeGesture = {
                identifier: primaryTouch.identifier,
                source: 'touch',
                startY: primaryTouch.clientY,
                lastY: primaryTouch.clientY,
                boundary: '',
                boundaryDrag: 0
            };
        }

        function handlePortraitEdgeTouchMove(event) {
            if (!portraitEdgeGesture || portraitEdgeGesture.source !== 'touch') return;
            notePortraitTouchActivity();

            const activeTouch = findTouchByIdentifier(event.touches, portraitEdgeGesture.identifier)
                || findTouchByIdentifier(event.changedTouches, portraitEdgeGesture.identifier);
            if (!activeTouch) return;

            maybeNavigateAcrossPortraitBoundary(activeTouch.clientY, event);
        }

        function handlePortraitEdgeTouchEnd(event) {
            if (!portraitEdgeGesture || portraitEdgeGesture.source !== 'touch') return;
            notePortraitTouchActivity();

            const endedTouch = findTouchByIdentifier(event.changedTouches, portraitEdgeGesture.identifier);
            if (endedTouch && maybeNavigateAcrossPortraitBoundary(endedTouch.clientY, event)) {
                return;
            }

            releasePortraitEdgeGesture();
        }

        function handlePortraitEdgePointerDown(event) {
            if (!isPortraitStackLayout()) return;
            if (shouldIgnorePortraitPointerEvent(event)) return;
            if (shouldIgnorePortraitEdgeTarget(event.target)) return;
            if (portraitEdgeGesture) return;

            portraitEdgeGesture = {
                pointerId: event.pointerId,
                source: 'pointer',
                startY: event.clientY,
                lastY: event.clientY,
                boundary: '',
                boundaryDrag: 0
            };
        }

        function handlePortraitEdgePointerMove(event) {
            if (!portraitEdgeGesture || portraitEdgeGesture.source !== 'pointer') return;
            if (event.pointerId !== portraitEdgeGesture.pointerId) return;
            if (shouldIgnorePortraitPointerEvent(event)) return;

            maybeNavigateAcrossPortraitBoundary(event.clientY, event);
        }

        function handlePortraitEdgePointerEnd(event) {
            if (!portraitEdgeGesture || portraitEdgeGesture.source !== 'pointer') return;
            if (event.pointerId !== portraitEdgeGesture.pointerId) return;
            if (shouldIgnorePortraitPointerEvent(event)) return;

            if (maybeNavigateAcrossPortraitBoundary(event.clientY, event)) {
                return;
            }

            releasePortraitEdgeGesture();
        }

        function jumpTo(index, options = {}) {
            const { portraitScrollAnchor = 'top', skipCompletionQuiz = false } = options;
            if (index < 0 || index >= milestoneList.length || index === currentIndex) return;
            if (!skipCompletionQuiz && maybeOpenCompletionQuiz(() => {
                jumpTo(index, { ...options, skipCompletionQuiz: true });
            })) {
                return;
            }

            preloadMilestoneAssets(index);
            currentIndex = index;
            renderPage(currentIndex);
            if (portraitScrollAnchor === 'bottom') {
                scrollPortraitToBoundary('bottom');
            } else {
                resetPortraitScrollPosition();
            }
        }

        function navigate(direction, options = {}) {
            if (milestoneList.length <= 1) return;
            const nextIndex = direction === 'next'
                ? Math.min(currentIndex + 1, milestoneList.length - 1)
                : Math.max(currentIndex - 1, 0);
            jumpTo(nextIndex, options);
        }

        function initAutoHideScrollbars() {
            const selector = [
                '.story-summary',
                '.commentary-list',
                '.bench-core-summary',
                '.bench-map-list',
                '.bench-source-list',
                '.bench-evidence-list'
            ].join(',');
            const timers = new WeakMap();

            document.querySelectorAll(selector).forEach((element) => {
                element.addEventListener('scroll', () => {
                    element.classList.add('is-scrolling');
                    const existingTimer = timers.get(element);
                    if (existingTimer) window.clearTimeout(existingTimer);
                    timers.set(element, window.setTimeout(() => {
                        element.classList.remove('is-scrolling');
                        timers.delete(element);
                    }, 900));
                }, { passive: true });
            });
        }

        function initSwipeNavigation() {
            if (!window.SwipeNavigation || typeof window.SwipeNavigation.setupSwipeNavigation !== 'function') {
                return;
            }

            window.SwipeNavigation.setupSwipeNavigation({
                surface: refs.stage,
                onNavigate(direction) {
                    if (hasOpenQuizModal()) return;
                    if (isPortraitStackLayout()) return;
                    navigate(direction);
                }
            });
        }

        function clearIdleAdvanceTimer() {
            if (idleAdvanceTimer) {
                window.clearTimeout(idleAdvanceTimer);
                idleAdvanceTimer = null;
            }
        }

        function handleIdleAutoAdvance() {
            if (milestoneList.length <= 1) {
                clearIdleAdvanceTimer();
                return;
            }

            closeTransientOverlaysForIdleAdvance();
            const nextIndex = currentIndex >= milestoneList.length - 1 ? 0 : currentIndex + 1;
            jumpTo(nextIndex, { skipCompletionQuiz: true });
            restartIdleAdvanceTimer();
        }

        function restartIdleAdvanceTimer() {
            clearIdleAdvanceTimer();
            if (milestoneList.length <= 1) return;
            idleAdvanceTimer = window.setTimeout(handleIdleAutoAdvance, IDLE_AUTO_ADVANCE_MS);
        }

        function registerUserActivity(event) {
            if (event && event.isTrusted === false) return;
            restartIdleAdvanceTimer();
        }

        if (!milestoneList.length) {
            refs.stage.innerHTML = '<div class="empty-state">暂无里程碑数据</div>';
        } else {
            renderStorylineSelect();
            if (refs.storylineSelect) {
                refs.storylineSelect.addEventListener('change', () => {
                    setActiveStoryline(refs.storylineSelect.value, { updateUrl: true });
                });
            }
            refs.prevBtn.addEventListener('click', () => navigate('prev'));
            refs.nextBtn.addEventListener('click', () => navigate('next'));
            if (refs.quizModalClose) refs.quizModalClose.addEventListener('click', completeQuizModal);
            if (refs.quizModalSkip) refs.quizModalSkip.addEventListener('click', completeQuizModal);
            if (refs.quizModalContinue) refs.quizModalContinue.addEventListener('click', () => {
                if (!refs.quizModalContinue.disabled) completeQuizModal();
            });

            window.addEventListener('resize', debounce(syncStageScale, 120));
            window.addEventListener('beforeunload', clearIdleAdvanceTimer);
            document.addEventListener('pointerdown', registerUserActivity, { passive: true });
            document.addEventListener('pointermove', registerUserActivity, { passive: true });
            document.addEventListener('click', registerUserActivity, { passive: true });
            document.addEventListener('wheel', registerUserActivity, { passive: true });
            document.addEventListener('touchstart', registerUserActivity, { passive: true });
            document.addEventListener('touchmove', registerUserActivity, { passive: true });
            document.addEventListener('touchstart', handlePortraitEdgeTouchStart, { passive: true });
            document.addEventListener('touchmove', handlePortraitEdgeTouchMove, { passive: false });
            document.addEventListener('touchend', handlePortraitEdgeTouchEnd, { passive: true });
            document.addEventListener('touchcancel', releasePortraitEdgeGesture, { passive: true });
            document.addEventListener('pointerdown', handlePortraitEdgePointerDown, { passive: true });
            document.addEventListener('pointermove', handlePortraitEdgePointerMove, { passive: true });
            document.addEventListener('pointerup', handlePortraitEdgePointerEnd, { passive: true });
            document.addEventListener('pointercancel', releasePortraitEdgeGesture, { passive: true });

            document.addEventListener('keydown', (event) => {
                registerUserActivity(event);
                if (hasOpenPhotoViewer()) return;
                if (hasOpenQuizModal()) {
                    if (event.key === 'Escape') completeQuizModal();
                    if (event.key === 'Enter' && refs.quizModalContinue && !refs.quizModalContinue.disabled) {
                        completeQuizModal();
                    }
                    return;
                }
                if (event.key === 'ArrowRight') navigate('next');
                if (event.key === 'ArrowLeft') navigate('prev');
            });

            window.addEventListener('languageChanged', () => {
                vmCache.clear();
                renderStorylineSelect();
                renderPage(currentIndex);
            });

            syncStageScale();
            initGlobe();
            initSwipeNavigation();
            initAutoHideScrollbars();
            renderPage(currentIndex);
            restartIdleAdvanceTimer();
        }
    </script>
</body>
</html>

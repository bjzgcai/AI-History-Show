<!DOCTYPE html>
<html lang="zh-CN" data-layout-mode="single">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script async defer src="https://museum.bza.edu.cn/umami/script.js" data-website-id="6080b0e0-ea6d-459f-838d-8b4d446d0746"></script>
    <title>AI 历史回顾展览 - 单屏模式</title>
    <script src="shared/layout-router.js"></script>
    <style>
        @font-face {
            font-family: "OPPOSans";
            src: url("./public/fonts/oppo-sans/OPPO Sans 4.0.ttf") format("truetype");
            font-weight: 100 900;
            font-style: normal;
            font-display: swap;
        }

        :root {
            --screen-width: 1920px;
            --screen-height: 1080px;
            --stage-scale: 1;
            --stage-topbar-ratio: 0.073;
            --stage-footer-ratio: 0.08062;
            --stage-pad-top-ratio: 0.03704;
            --stage-pad-side-ratio: 0.022;
            --stage-pad-bottom-ratio: 0.03333;
            --stage-topbar-divider-ratio: 0.00556;
            --stage-grid-gap-ratio: 0.01325;
            --stage-main-top-gap-ratio: 0.0065;
            --stage-main-bottom-gap-ratio: 0.014;
            --stage-left-ratio: 0.246;
            --stage-center-ratio: 0.4785;
            --stage-right-ratio: 0.249;
            --footer-nav-width: calc(var(--screen-width) * 0.02344);
            --footer-nav-height: calc(var(--screen-height) * 0.0676);
            --footer-gap-ratio: 0.0122;
            --bg: #020202;
            --panel: rgba(255, 255, 255, 0.05);
            --line: rgba(255, 255, 255, 0.14);
            --line-strong: rgba(255, 255, 255, 0.28);
            --text: #f4efe5;
            --text-soft: rgba(244, 239, 229, 0.78);
            --text-muted: rgba(244, 239, 229, 0.42);
            --accent: #f68900;
            --accent-strong: #ff7f11;
            --deep-red: #4f0404;
            --touch-target: 44px;
            --mobile-page-pad: 16px;
            --mobile-card-radius: 8px;
            --scrollbar-track: rgba(255, 255, 255, 0.045);
            --scrollbar-thumb: rgba(246, 137, 0, 0.42);
            --scrollbar-thumb-hover: rgba(246, 137, 0, 0.68);
            --ui-font: "OPPOSans", "PingFang SC", "Microsoft YaHei", sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            color: var(--text);
            font-family: var(--ui-font);
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.012) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.012) 1px, transparent 1px);
            background-size: 4px 4px;
            opacity: 0.3;
            mix-blend-mode: soft-light;
        }

        button {
            font: inherit;
        }

        button,
        a {
            -webkit-tap-highlight-color: rgba(246, 137, 0, 0.22);
        }

        .stage-viewport {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        .single-stage {
            position: absolute;
            left: 50%;
            top: 50%;
            width: var(--screen-width);
            height: var(--screen-height);
            transform: translate(-50%, -50%) scale(var(--stage-scale));
            transform-origin: center center;
            display: grid;
            grid-template-rows:
                calc(var(--screen-height) * var(--stage-topbar-ratio))
                1fr
                calc(var(--screen-height) * var(--stage-footer-ratio));
            gap: 0;
            padding:
                calc(var(--screen-height) * var(--stage-pad-top-ratio))
                calc(var(--screen-width) * var(--stage-pad-side-ratio))
                calc(var(--screen-height) * var(--stage-pad-bottom-ratio));
            touch-action: pan-y;
            background: #000;
            box-shadow: none;
        }

        .single-stage.is-bench-dossier {
            grid-template-rows:
                calc(var(--screen-height) * var(--stage-topbar-ratio))
                1fr;
        }

        html.branch-timeline-active,
        html.branch-timeline-active body {
            height: 100%;
            min-height: 100%;
            overflow: hidden;
            background: #f4f0e8;
            color: #181716;
        }

        html.branch-timeline-active body::before {
            display: none;
        }

        .stage-viewport.is-branch-timeline {
            height: 100vh;
            min-height: 100vh;
            overflow: hidden;
            background: #f4f0e8;
        }

        .single-stage.is-branch-timeline {
            position: relative;
            left: auto;
            top: auto;
            width: 100%;
            height: 100vh;
            min-height: 100vh;
            transform: none;
            display: block;
            padding: 0;
            overflow: hidden;
            background:
                radial-gradient(circle at 82% 14%, rgba(216, 112, 76, 0.12), transparent 22%),
                #f4f0e8;
            color: #181716;
            font-family: Georgia, "Times New Roman", "Songti SC", "SimSun", serif;
        }

        .single-stage.is-branch-timeline .stage-grid,
        .single-stage.is-branch-timeline .stage-footer {
            display: none;
        }

        .single-stage.is-branch-timeline .stage-topbar {
            max-width: 1260px;
            margin: 0 auto;
            padding: 28px 32px 0;
            display: grid;
            grid-template-columns: auto minmax(0, 1fr);
            align-items: center;
            gap: 28px;
        }

        .single-stage.is-branch-timeline .brand-lockup {
            width: auto;
            min-width: 0;
            padding: 0;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            color: #201d1a;
        }

        .single-stage.is-branch-timeline .brand-lockup::before {
            content: "";
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background:
                linear-gradient(90deg, transparent 42%, #d86f4b 42% 58%, transparent 58%),
                linear-gradient(0deg, transparent 42%, #d86f4b 42% 58%, transparent 58%),
                linear-gradient(45deg, transparent 42%, #d86f4b 42% 58%, transparent 58%),
                linear-gradient(-45deg, transparent 42%, #d86f4b 42% 58%, transparent 58%);
        }

        .single-stage.is-branch-timeline .brand-lockup::after {
            content: "AI History Show";
            font-family: Georgia, "Times New Roman", serif;
            font-size: 25px;
            font-weight: 800;
            letter-spacing: -0.02em;
        }

        .single-stage.is-branch-timeline .brand-image {
            display: none;
        }

        .single-stage.is-branch-timeline .topbar-actions {
            justify-self: end;
            gap: 10px;
        }

        .single-stage.is-branch-timeline .storyline-trigger {
            width: 330px;
            border-color: rgba(32, 29, 26, 0.22);
            background: rgba(255, 255, 255, 0.42);
            color: #3d3934;
            font-family: "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
            text-transform: none;
        }

        .single-stage.is-branch-timeline .mode-chip-label {
            color: #3c3834;
            font-size: 12px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }

        .single-stage.is-branch-timeline .language-toggle.topbar-language-toggle {
            border-color: rgba(32, 29, 26, 0.28);
            color: #3c3834;
            background: rgba(255, 255, 255, 0.34);
        }

        .branch-timeline-page {
            max-width: 1260px;
            margin: 0 auto;
            padding: 142px 32px 104px;
            color: #181716;
            overflow: hidden;
        }

        .branch-hero {
            display: grid;
            grid-template-columns: minmax(0, 1fr) 330px;
            gap: 64px;
            align-items: center;
            min-height: 360px;
        }

        .branch-hero-title {
            max-width: 760px;
            font-family: Georgia, "Times New Roman", "Songti SC", "SimSun", serif;
            color: #171514;
            font-size: clamp(58px, 7vw, 104px);
            font-weight: 600;
            line-height: 0.98;
            letter-spacing: -0.035em;
        }

        .branch-hero-title .accent {
            color: #d87350;
        }

        .branch-hero-subtitle {
            max-width: 620px;
            margin-top: 28px;
            color: #5d5650;
            font-family: "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
            font-size: 18px;
            font-weight: 600;
            line-height: 1.75;
        }

        .branch-pixel-scene {
            justify-self: center;
            width: 340px;
            height: 214px;
            position: relative;
            image-rendering: pixelated;
            transform: scale(0.86);
            transform-origin: center;
        }

        .branch-pixel-scene::before,
        .branch-pixel-scene::after {
            content: "";
            position: absolute;
            display: block;
        }

        .branch-pixel-scene::before {
            left: 28px;
            top: 42px;
            width: 264px;
            height: 118px;
            background:
                linear-gradient(90deg, #d87350 0 24px, transparent 24px 48px, #d87350 48px 72px, transparent 72px 96px, #d87350 96px 120px, transparent 120px 144px, #d87350 144px 168px, transparent 168px 192px, #d87350 192px 216px, transparent 216px 240px, #d87350 240px 264px),
                linear-gradient(#d87350, #d87350);
            box-shadow:
                -42px 72px 0 #d87350,
                46px -22px 0 #d87350,
                84px -22px 0 #bb6548,
                168px -22px 0 #d87350,
                206px -22px 0 #bb6548;
        }

        .branch-pixel-scene::after {
            left: 86px;
            top: 86px;
            width: 120px;
            height: 42px;
            background:
                linear-gradient(90deg, #171514 0 12px, transparent 12px 24px, #171514 24px 36px, transparent 36px 72px, #171514 72px 84px, transparent 84px 96px, #171514 96px 108px, transparent 108px),
                linear-gradient(#171514, #171514);
            clip-path: polygon(0 0, 34% 0, 34% 100%, 0 100%, 0 70%, 12% 70%, 12% 30%, 0 30%, 0 0, 66% 0, 100% 0, 100% 30%, 88% 30%, 88% 70%, 100% 70%, 100% 100%, 66% 100%, 66% 0);
        }

        .branch-order-link {
            display: block;
            width: max-content;
            margin: 72px auto 26px;
            color: #b96f57;
            border: none;
            background: transparent;
            border-bottom: 1px solid currentColor;
            font-family: "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
            font-size: 14px;
            cursor: default;
        }

        .branch-timeline {
            position: relative;
            display: grid;
            grid-template-columns: repeat(var(--branch-count, 3), minmax(460px, 1fr));
            gap: 28px;
            padding: 44px 4px 42px;
            overflow-x: auto;
            overflow-y: visible;
            scroll-snap-type: x proximity;
            scrollbar-color: rgba(216, 115, 80, 0.56) rgba(112, 100, 88, 0.12);
        }

        .branch-timeline.is-wheel-scrolling,
        .branch-timeline.is-drag-scrolling {
            scroll-behavior: auto;
            scroll-snap-type: none;
        }

        .branch-timeline.is-drag-scrolling {
            cursor: grabbing;
            user-select: none;
            -webkit-user-select: none;
        }

        .branch-timeline.is-drag-scrolling * {
            user-select: none;
            -webkit-user-select: none;
        }

        .branch-timeline::before {
            content: "";
            position: absolute;
            top: 52px;
            left: 8px;
            right: 8px;
            bottom: auto;
            width: auto;
            height: 1px;
            background: rgba(112, 100, 88, 0.28);
        }

        .branch-event {
            position: relative;
            display: grid;
            grid-template-columns: minmax(0, 1fr);
            grid-template-rows: auto auto auto;
            align-items: start;
            gap: 20px;
            min-width: 0;
            scroll-snap-align: start;
        }

        .branch-event-dot {
            position: relative;
            z-index: 2;
            grid-column: 1;
            justify-self: start;
            margin-left: 20px;
            width: 16px;
            height: 16px;
            border: 1px solid #d87350;
            border-radius: 50%;
            background: #f4f0e8;
        }

        .branch-event-content {
            display: grid;
            gap: 16px;
            max-width: 520px;
        }

        .branch-event.is-left .branch-event-content {
            grid-column: 1;
            justify-self: stretch;
            text-align: left;
        }

        .branch-event.is-right .branch-event-content {
            grid-column: 1;
            justify-self: stretch;
            text-align: left;
        }

        .branch-event-visual {
            position: relative;
            grid-column: 1;
            grid-row: auto;
            width: 100%;
            height: 150px;
            min-height: 140px;
            display: grid;
            place-items: center;
            overflow: hidden;
        }

        .branch-event.is-left .branch-event-visual {
            grid-column: 1;
            justify-self: stretch;
        }

        .branch-event.is-right .branch-event-visual {
            grid-column: 1;
            justify-self: stretch;
        }

        .branch-event-visual img {
            display: block;
            width: 100%;
            max-height: 150px;
            object-fit: contain;
            mix-blend-mode: normal;
            filter: saturate(1.08) contrast(1.08);
        }

        .branch-video-trigger {
            appearance: none;
            border: none;
            padding: 0;
            background: transparent;
            color: inherit;
            cursor: pointer;
        }

        .branch-video-trigger:hover,
        .branch-video-trigger:focus-visible {
            outline: none;
        }

        .branch-video-trigger .branch-svg-illustration,
        .branch-video-trigger img {
            transition: transform 0.18s ease, filter 0.18s ease;
        }

        .branch-video-trigger:hover .branch-svg-illustration,
        .branch-video-trigger:focus-visible .branch-svg-illustration,
        .branch-video-trigger:hover img,
        .branch-video-trigger:focus-visible img {
            transform: translateY(-2px);
            filter: brightness(1.08);
        }

        .branch-game-record-trigger {
            --record-offset: 0px;
            position: absolute;
            z-index: 5;
            left: calc(50% + 104px);
            top: calc(50% + var(--record-offset));
            width: 82px;
            height: 82px;
            border: 1px solid rgba(216, 115, 80, 0.72);
            border-radius: 50%;
            background: rgba(244, 240, 232, 0.92);
            box-shadow: 0 18px 34px rgba(23, 21, 20, 0.24), 0 0 0 8px rgba(216, 115, 80, 0.12);
            display: grid;
            place-items: center;
            opacity: 0;
            pointer-events: none;
            transform: translateY(-50%) scale(0.84);
            transition: opacity 0.16s ease, transform 0.16s ease, border-color 0.16s ease, box-shadow 0.16s ease;
        }

        .branch-event.is-center .branch-game-record-trigger,
        .branch-event.is-extra-record-visible .branch-game-record-trigger {
            opacity: 1;
            pointer-events: auto;
            transform: translateY(-50%) scale(1);
        }

        .branch-game-record-trigger:hover,
        .branch-game-record-trigger:focus-visible {
            border-color: rgba(216, 115, 80, 0.96);
            box-shadow: 0 22px 42px rgba(23, 21, 20, 0.3), 0 0 0 9px rgba(216, 115, 80, 0.18);
            outline: none;
        }

        .branch-record-board {
            position: relative;
            width: 56px;
            height: 56px;
            border: 2px solid #171514;
            border-radius: 5px;
            background:
                conic-gradient(from 90deg, rgba(23, 21, 20, 0.18) 90deg, transparent 0 180deg, rgba(23, 21, 20, 0.18) 0 270deg, transparent 0)
                0 0 / 25% 25%,
                #f0dcc2;
            display: block;
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.38);
        }

        .branch-record-piece {
            position: absolute;
            width: 11px;
            height: 11px;
            border-radius: 50%;
            background: #171514;
            box-shadow: 0 1px 3px rgba(23, 21, 20, 0.24);
        }

        .branch-record-piece.one {
            left: 15px;
            top: 14px;
        }

        .branch-record-piece.two {
            right: 13px;
            top: 23px;
            background: #f7f0e4;
            box-shadow: inset 0 0 0 2px #171514;
        }

        .branch-record-piece.three {
            left: 28px;
            bottom: 12px;
            background: #d87350;
        }

        .branch-record-play {
            position: absolute;
            left: 50%;
            top: 50%;
            width: 0;
            height: 0;
            border-top: 8px solid transparent;
            border-bottom: 8px solid transparent;
            border-left: 13px solid #171514;
            filter: drop-shadow(0 1px 3px rgba(244, 240, 232, 0.62));
            transform: translate(-35%, -50%);
        }

        .branch-game-record-trigger.is-go .branch-record-board {
            background:
                linear-gradient(rgba(23, 21, 20, 0.22) 1px, transparent 1px),
                linear-gradient(90deg, rgba(23, 21, 20, 0.22) 1px, transparent 1px),
                #f0dcc2;
            background-size: calc(100% / 6) calc(100% / 6);
        }

        .branch-game-record-trigger.is-cards .branch-record-board,
        .branch-game-record-trigger.is-tiles .branch-record-board {
            border-radius: 999px;
            background:
                radial-gradient(circle at 32% 48%, #f7f0e4 0 6px, transparent 7px),
                radial-gradient(circle at 62% 48%, #d87350 0 6px, transparent 7px),
                rgba(23, 21, 20, 0.9);
        }

        .branch-event.is-visual-first .branch-event-visual {
            grid-row: 2;
        }

        .branch-event.is-visual-first .branch-event-content {
            grid-row: 3;
        }

        .branch-event.is-content-first .branch-event-visual {
            grid-row: 2;
        }

        .branch-event.is-content-first .branch-event-content {
            grid-row: 3;
        }

        .branch-event-visual.is-photo img {
            width: 220px;
            height: 220px;
            border-radius: 50%;
            object-fit: cover;
            mix-blend-mode: normal;
            filter: sepia(0.2) saturate(0.85);
        }

        .branch-illustration {
            position: relative;
            width: 360px;
            height: 260px;
            color: #171514;
            font-family: "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
        }

        .branch-illustration::before {
            content: "";
            position: absolute;
            inset: 24px 12px;
            border-radius: 999px;
            background: radial-gradient(circle, rgba(216, 115, 80, 0.22), transparent 62%);
            filter: blur(10px);
        }

        .branch-svg-illustration {
            display: block;
        }

        .branch-visual-svg {
            position: relative;
            z-index: 1;
            display: block;
            width: 100%;
            height: 100%;
            overflow: visible;
        }

        .branch-visual-svg .svg-shell {
            fill: rgba(244, 239, 229, 0.08);
            stroke: rgba(216, 115, 80, 0.46);
            stroke-width: 2;
        }

        .branch-visual-svg .svg-panel {
            fill: rgba(244, 239, 229, 0.1);
            stroke: rgba(216, 115, 80, 0.36);
            stroke-width: 2;
        }

        .branch-visual-svg .svg-panel-strong {
            fill: rgba(216, 115, 80, 0.18);
            stroke: rgba(216, 115, 80, 0.7);
            stroke-width: 2.5;
        }

        .branch-visual-svg .svg-line {
            fill: none;
            stroke: rgba(216, 115, 80, 0.74);
            stroke-width: 3;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .branch-visual-svg .svg-line-soft {
            fill: none;
            stroke: rgba(244, 240, 232, 0.38);
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .branch-visual-svg .svg-dot {
            fill: #d87350;
        }

        .branch-visual-svg .svg-dot-dark {
            fill: #171514;
        }

        .branch-visual-svg .svg-dot-light {
            fill: #f4f0e8;
            stroke: #171514;
            stroke-width: 3;
        }

        .branch-visual-svg .svg-cell-light {
            fill: rgba(244, 240, 232, 0.32);
        }

        .branch-visual-svg .svg-cell-dark {
            fill: rgba(216, 115, 80, 0.72);
        }

        .branch-visual-svg .svg-label {
            fill: #171514;
            font-family: "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
            font-size: 11px;
            font-weight: 900;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .branch-visual-svg .svg-label-soft {
            fill: rgba(23, 21, 20, 0.66);
            font-family: "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
            font-size: 10px;
            font-weight: 800;
            letter-spacing: 0.04em;
        }

        .branch-visual-svg .svg-number {
            fill: #171514;
            font-family: Georgia, "Times New Roman", serif;
            font-size: 24px;
            font-weight: 700;
        }

        .branch-checker-board {
            position: absolute;
            left: 76px;
            top: 30px;
            width: 204px;
            height: 204px;
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            border: 6px solid #d87350;
            background: #eadcca;
            transform: rotate(-7deg);
            box-shadow: 18px 20px 0 rgba(216, 115, 80, 0.18);
        }

        .branch-checker-cell {
            background: rgba(255, 255, 255, 0.2);
        }

        .branch-checker-cell.dark {
            background: #d87350;
        }

        .branch-disc {
            position: absolute;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: #171514;
            box-shadow: inset 0 0 0 5px rgba(255, 255, 255, 0.12);
        }

        .branch-disc.one {
            left: 116px;
            top: 75px;
        }

        .branch-disc.two {
            left: 194px;
            top: 125px;
            background: #f4f0e8;
            border: 4px solid #171514;
        }

        .branch-disc.three {
            left: 154px;
            top: 176px;
            background: #d87350;
        }

        .branch-tree-rail {
            position: absolute;
            left: 58px;
            top: 38px;
            width: 250px;
            height: 170px;
        }

        .branch-tree-rail::before,
        .branch-tree-rail::after {
            content: "";
            position: absolute;
            left: 70px;
            width: 150px;
            height: 2px;
            background: #d87350;
            transform-origin: left center;
        }

        .branch-tree-rail::before {
            top: 70px;
            transform: rotate(-24deg);
        }

        .branch-tree-rail::after {
            top: 72px;
            transform: rotate(24deg);
        }

        .branch-node {
            position: absolute;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: grid;
            place-items: center;
            background: #d87350;
            color: #171514;
            font-size: 22px;
            font-weight: 900;
            box-shadow: 0 12px 0 rgba(216, 115, 80, 0.18);
        }

        .branch-node.root {
            left: 40px;
            top: 52px;
        }

        .branch-node.a {
            left: 184px;
            top: 0;
            background: #171514;
            color: #f4f0e8;
        }

        .branch-node.b {

            align-items: end;

        .archive-stage::before,
        .archive-stage::after {
            content: "";

            top: 18px;
            width: 23%;
            height: calc(100% - 18px);
            pointer-events: none;
            z-index: 3;
            opacity: 0.96;

        .archive-stage::before {
            left: 0;
            background: linear-gradient(90deg, #111 0%, rgba(17, 17, 17, 0.88) 18%, rgba(17, 17, 17, 0) 100%);

        .archive-stage::after {
            right: 0;
            background: linear-gradient(90deg, rgba(17, 17, 17, 0) 0%, rgba(17, 17, 17, 0.88) 82%, #111 100%);
        }

        .archive-stage.is-dragging {
            cursor: grabbing;
        }

        .archive-card {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            z-index: 1;
            min-width: 0;
            width: 100%;
            transform: translateY(-42px);
        }

        .archive-card.is-hidden {
            display: none;
        }

        .archive-thumb,
        .archive-focus {
            position: relative;
            display: block;
            border: none;
            background: transparent;
            padding: 0;
            cursor: pointer;
            overflow: hidden;
        }

        .archive-thumb::after,
        .archive-focus::after {
            content: "";
            position: absolute;
            inset: 0;
            pointer-events: none;
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.1);
        }

        .archive-thumb.is-empty,
        .archive-focus.is-empty {
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.04));
        }

        .archive-thumb.is-empty::before,
        .archive-focus.is-empty::before {
            content: attr(data-empty-label);
            position: absolute;
            inset: 0;
            display: grid;
            place-items: center;
            color: rgba(244, 239, 229, 0.42);
            font-size: 12px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            z-index: 1;
        }

        .archive-thumb img,
        .archive-focus img {
            display: block;
            width: 100%;
            height: 100%;
            box-sizing: border-box;
            object-fit: contain;
            background: #f4f0e8;
            filter: grayscale(0.1);
        }

        .archive-card-left {
            grid-column: 1;
            grid-row: 2;
            align-self: end;
        }

        .archive-card-left::before {
            display: none;
        }

        .archive-card-left .archive-thumb {
            width: 100%;
            aspect-ratio: 0.8 / 1;
            height: auto;
            background: #f1ebe2;
            border: 12px solid #f1ebe2;
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.22);
        }

        .archive-card-left .archive-card-caption {
            position: absolute;
            left: 0;
            top: calc(100% + 10px);
            width: 100%;
        }

        .archive-card-main {
            grid-column: 3;
            grid-row: 2;
            align-self: end;
            margin-top: 0;
        }

        .archive-card-main::before {
            content: "";
            position: absolute;
            left: -2%;
            top: -8%;
            width: 103%;
            bottom: 0;
            background: rgba(255, 255, 255, 0.96);
            z-index: -1;
        }

        .archive-card-main .archive-focus {
            width: 100%;
            aspect-ratio: 1.16 / 1;
            height: auto;
            background: #f4f0e8;
            border: 12px solid #f4f0e8;
            box-shadow: 0 18px 44px rgba(0, 0, 0, 0.3);
        }

        .archive-card-main .archive-card-caption {
            position: absolute;
            left: 0;
            top: calc(100% + 14px);
            width: 100%;
            padding-left: 14px;
        }

        .archive-card-right {
            grid-column: 5;
            grid-row: 2;
            align-self: end;
        }

        .archive-card-right::before {
            display: none;
        }

        .archive-card-right .archive-thumb {
            width: 100%;
            aspect-ratio: 1.02 / 1;
            height: auto;
            background: #ece5db;
            border: 10px solid #ece5db;
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.2);
        }

        .archive-card-right .archive-card-caption {
            position: absolute;
            left: 0;
            top: calc(100% + 10px);
            width: 100%;

        .archive-card-right .archive-thumb img {

        const SCREEN_WIDTH = 1920;

        const POP_QUIZ_MOBILE_STORYLINE_ID = 'bench-council-ai100';

        const POP_QUIZ_MOBILE_QUESTION_COUNT = 10;
        const POP_QUIZ_MOBILE_PUBLIC_URL = 'https://bjzgcai.github.io/AI-History-Show/?storyline=bench-council-ai100&quiz=mobile';
        const POP_QUIZ_MOBILE_QR_URL = 'resources/images/ui/ai100-pop-quiz-qr-v2.svg?v=20260608';
        const COMPLETION_QUIZ_MIN_DWELL_MS = 15 * 1000;
        const GLOBE_TEXTURE_URLS = {
            water: `resources/textures/earth-water.png?v=${GLOBE_TEXTURE_VERSION}`,
            topo: `resources/textures/earth-topology.png?v=${GLOBE_TEXTURE_VERSION}`,
            clouds: `resources/textures/clouds.png?v=${GLOBE_TEXTURE_VERSION}`
        };
        const GLOBE_CAM_RADIUS = 2.06;
        const GLOBE_HALO_RADIUS = 1.02;
        const PORTRAIT_EDGE_NAV_MIN_Y = 90;
        const PORTRAIT_EDGE_NAV_TOLERANCE = 24;
        const PORTRAIT_EDGE_POINTER_SUPPRESSION_MS = 800;
        const PORTRAIT_EDGE_IGNORE_SELECTOR = '.photo-viewer, .quiz-modal, .storyline-modal, .storyline-trigger, .about-modal, .about-trigger, .region-modal, .mobile-quiz-app, iframe, .storyline-select, .ui-detail-image-stage';
        const IDLE_AUTO_ADVANCE_MS = 5 * 60 * 1000;
        const MOBILE_GLOBE_PIXEL_RATIO_CAP = 1.5;
        const TABLET_GLOBE_PIXEL_RATIO_CAP = 1.75;
        const UNIFIED_STORYLINE_ID = 'unified-ai-history';
        const DEEP_STORYLINE_ID = StorylineRouting.DEEP_STORYLINE_ID;
        const DEFAULT_STORYLINE_ID = UNIFIED_STORYLINE_ID;
        const STORYLINE_OPTIONS = [
            {
                id: UNIFIED_STORYLINE_ID,
                layout: 'ui-browser',
                label: {
                    en: 'AI History Map',
                    zh: 'AI 历史地图'
                },
                note: {
                    en: 'Unified view from deep learning milestones and AI100 achievements',
                    zh: '融合深度学习里程碑与 AI100 大事件'
                }
            },
            {
                id: DEEP_STORYLINE_ID,
                layout: 'ui-browser',
                label: {
                    en: 'AI History (Deep Learning)',
                    zh: 'AI 历史（深度学习）'
                },
                note: {
                    en: '1956-now, centered on deep learning milestones',
                    zh: '1956 至今，聚焦深度学习里程碑'
                }
            },
            {
                id: 'gaming-ai',
                layout: 'branch-timeline',
                label: {
                    en: 'AI in Board & Tabletop Games',
                    zh: 'AI 在棋牌与博弈论的演进'
                }
            },
            {
                id: 'humanistic-cycle',
                layout: 'branch-timeline',
                label: {
                    en: 'Humanistic & Emotional Cycles of AI',
                    zh: 'AI 的人文与情绪周期'
                },
                note: {
                    en: 'Sci-fi prophecy, hype and AI winters as a cultural counterpoint to technical milestones',
                    zh: '以科幻预言、技术狂热与 AI 寒冬，对照技术里程碑背后的人类想象'
                }
            },
            {
                id: 'bench-council-ai100',
                layout: 'ui-browser',
                label: {
                    en: 'AI Top 100 Achievements (BenchCouncil)',
                    zh: 'AI 百大成就（BenchCouncil）'
                },
                note: {
                    en: 'Pilot storyline from the BenchCouncil AI100 list',
                    zh: '来自 BenchCouncil AI100 榜单的试点故事线'
                }
            }
        ];
        const allMilestones = typeof milestones !== 'undefined' && Array.isArray(milestones) ? milestones : [];
        const getMilestoneStorylineId = (milestone) => StorylineRouting.getMilestoneStorylineId(milestone, DEEP_STORYLINE_ID);
        const getStorylineMilestones = (storylineId) => (storylineId === UNIFIED_STORYLINE_ID
            ? buildUnifiedMilestones()
            : allMilestones.filter((item) => getMilestoneStorylineId(item) === storylineId).sort(compareMilestonesByTime));
        const getStorylineOption = (storylineId) => STORYLINE_OPTIONS.find((option) => option.id === storylineId) || null;
        const hasStorylineMilestones = (storylineId) => getStorylineMilestones(storylineId).length > 0;
        let unifiedMilestoneCache = null;

        function cloneData(value) {
            return value == null ? value : JSON.parse(JSON.stringify(value));
        }

        function normalizeKeyText(value) {
            const raw = typeof value === 'object'
                ? [value.en, value.zh].filter(Boolean).join(' ')
                : String(value || '');
            return raw
                .toLowerCase()
                .replace(/&/g, 'and')
                .replace(/[^a-z0-9\u4e00-\u9fa5]+/g, '')
                .replace(/networks?/g, 'net')
                .replace(/模型|网络|算法|时代|突破|爆发/g, '')
                .trim();
        }

        function getMilestoneSortYear(milestone) {
            const value = milestone && milestone.year != null ? milestone.year : milestone;
            const match = String(value || '').match(/\d{3,4}/);
            return match ? Number(match[0]) : Number(value);
        }

        function compareMilestonesByTime(a, b) {
            const yearA = getMilestoneSortYear(a);
            const yearB = getMilestoneSortYear(b);
            const safeYearA = Number.isFinite(yearA) ? yearA : Number.MAX_SAFE_INTEGER;
            const safeYearB = Number.isFinite(yearB) ? yearB : Number.MAX_SAFE_INTEGER;
            return safeYearA - safeYearB || normalizeKeyText(a && a.title).localeCompare(normalizeKeyText(b && b.title));
        }

        function getCanonicalMilestoneSlug(milestone) {
            const id = String(milestone && milestone.id || '')
                .replace(/^milestone-/, '')
                .replace(/^ai100-/, '');
            const aliases = {
                '2020-alphafold2': '2020-alphafold',
                '2014-neural-machine-translation-attention': '2014-attention',
                '1958-rosenblatt-perceptron': '1957-perceptron',
                '1989-lenet': '1989-cnn',
                '2017-densenet': '2016-densenet'
            };
            if (aliases[id]) return aliases[id];
            if (id) return id;
            return `${milestone && milestone.year || ''}-${normalizeKeyText(milestone && milestone.title)}`;
        }

        function mergeUniqueArray(primary, secondary, getKey = (item) => JSON.stringify(item)) {
            const result = Array.isArray(primary) ? cloneData(primary) : [];
            const seen = new Set(result.map(getKey));
            (Array.isArray(secondary) ? secondary : []).forEach((item) => {
                const key = getKey(item);
                if (seen.has(key)) return;
                seen.add(key);
                result.push(cloneData(item));
            });
            return result;
        }

        function mergeResources(primary, secondary) {
            const left = primary && typeof primary === 'object' ? cloneData(primary) : {};
            const right = secondary && typeof secondary === 'object' ? secondary : {};
            left.images = mergeUniqueArray(left.images, right.images, (item) => String(item || ''));
            left.videos = mergeUniqueArray(left.videos, right.videos, (item) => String((item && (item.url || item.id || item.embed_url)) || item || ''));
            left.imageMeta = { ...(right.imageMeta || {}), ...(left.imageMeta || {}) };
            return left;
        }

        function mergeAchievement(primary, secondary) {
            const left = primary && typeof primary === 'object' ? cloneData(primary) : {};
            const right = secondary && typeof secondary === 'object' ? secondary : {};
            Object.keys(right).forEach((key) => {
                if (Array.isArray(right[key])) {
                    left[key] = mergeUniqueArray(left[key], right[key], (item) => normalizeKeyText(item && (item.label || item.title || item.name || item.url || item)));
                } else if (left[key] == null || left[key] === '') {
                    left[key] = cloneData(right[key]);
                }
            });
            return left;
        }

        function mergeMilestone(primary, secondary) {
            const merged = cloneData(primary);
            merged.mergedFrom = mergeUniqueArray(primary.mergedFrom, [secondary.id || secondary.key || ''], String).filter(Boolean);
            merged.photos = mergeUniqueArray(primary.photos, secondary.photos, String);
            merged.resources = mergeResources(primary.resources, secondary.resources);
            merged.figures = mergeUniqueArray(primary.figures, secondary.figures, (figure) => normalizeKeyText(figure && figure.name));
            merged.quizzes = mergeUniqueArray(primary.quizzes, secondary.quizzes, (quiz) => normalizeKeyText(quiz && quiz.question));
            merged.achievement = mergeAchievement(primary.achievement, secondary.achievement);
            if (!merged.quote && secondary.quote) merged.quote = cloneData(secondary.quote);
            if (!merged.quoteAttribution && secondary.quoteAttribution) merged.quoteAttribution = cloneData(secondary.quoteAttribution);
            if (!merged.quoteMeta && secondary.quoteMeta) merged.quoteMeta = cloneData(secondary.quoteMeta);
            return merged;
        }

        function buildUnifiedMilestones() {
            if (unifiedMilestoneCache) return unifiedMilestoneCache;
            const source = allMilestones.filter((item) => {
                const storylineId = getMilestoneStorylineId(item);
                return storylineId === DEEP_STORYLINE_ID || storylineId === 'bench-council-ai100';
            });
            const bySlug = new Map();
            source.forEach((item) => {
                const slug = getCanonicalMilestoneSlug(item);
                const current = bySlug.get(slug);
                if (!current) {
                    const cloned = cloneData(item);
                    cloned.storyline = {
                        id: UNIFIED_STORYLINE_ID,
                        name: {
                            en: 'AI History Map',
                            zh: 'AI 历史地图'
                        }
                    };
                    cloned.unifiedSourceIds = [item.id || slug];
                    bySlug.set(slug, cloned);
                    return;
                }
                const merged = mergeMilestone(current, item);
                merged.storyline = current.storyline;
                merged.unifiedSourceIds = mergeUniqueArray(current.unifiedSourceIds, [item.id || slug], String);
                bySlug.set(slug, merged);
            });
            unifiedMilestoneCache = Array.from(bySlug.values())
                .sort(compareMilestonesByTime);
            return unifiedMilestoneCache;
        }
        const getSearchParam = (name) => {
            try {
                return new URLSearchParams(window.location.search).get(name) || '';
            } catch (_) {
                return '';
            }
        };
        const getRequestedStorylineId = () => StorylineRouting.normalizeStorylineId(getSearchParam('storyline'));
        const getRequestedQuizMode = () => getSearchParam('quiz');
        const getRequestedUiMode = () => getSearchParam('uiMode');
        const getRequestedEventId = () => getSearchParam('event');
        const getFallbackStorylineId = () => hasStorylineMilestones(DEFAULT_STORYLINE_ID)
            ? DEFAULT_STORYLINE_ID
            : (STORYLINE_OPTIONS.find((option) => hasStorylineMilestones(option.id)) || {}).id || DEFAULT_STORYLINE_ID;
        const requestedStorylineId = getRequestedStorylineId();
        let activeStorylineId = requestedStorylineId && hasStorylineMilestones(requestedStorylineId)
            ? requestedStorylineId
            : getFallbackStorylineId();
        let milestoneList = getStorylineMilestones(activeStorylineId);
        let activeRegionFilter = '';
        let uiBrowserMode = 'year';
        let uiSelectedYear = null;
        let uiSelectedContinent = '';
        let uiSelectedLocationKey = '';
        let uiSelectedLocationEventIds = [];
        let uiSelectedEventId = '';
        let uiDetailImageIndex = 0;
        let uiDetailImageEventId = '';
        let uiHistoryPopInProgress = false;

        let currentIndex = 0;
        const requestedUiMode = getRequestedUiMode();
        const requestedEventId = getRequestedEventId();
        const requestedIndex = requestedEventId
            ? milestoneList.findIndex((item) => item && item.id === requestedEventId)

        function escapeHtml(value) {
            return String(value == null ? '' : value)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function debounce(func, wait) {
            let timeout;
            return function executedFunction(...args) {
                const later = () => {
                    clearTimeout(timeout);
                    func(...args);
                };
                clearTimeout(timeout);
                timeout = setTimeout(later, wait);
            };
        }

        function stripHtml(value) {
            if (window.MilestoneView && typeof window.MilestoneView.stripHtml === 'function') {
                return window.MilestoneView.stripHtml(value);
            }
            return String(value || '')
                .replace(/<br\s*\/?>/gi, '\n')
                .replace(/<[^>]*>/g, ' ')
                .replace(/\s+/g, ' ')
                .trim();
        }

        function isWorkAttribution(value) {
            if (window.MilestoneView && typeof window.MilestoneView.isWorkAttribution === 'function') {
                return window.MilestoneView.isWorkAttribution(value);
            }
            const text = String(value || '').trim();
            return text.startsWith('《') || /^<em\b[^>]*>/i.test(text);
        }

        function decodeHtmlEntities(value) {
            let text = String(value || '');
            for (let index = 0; index < 3; index += 1) {
                const next = text
                    .replace(/&quot;/g, '"')
                    .replace(/&#34;/g, '"')
                    .replace(/&#x22;/gi, '"')
                    .replace(/&#39;/g, "'")
                    .replace(/&#x27;/gi, "'")
                    .replace(/&apos;/g, "'")
                    .replace(/&lt;/g, '<')
                    .replace(/&gt;/g, '>')
                    .replace(/&amp;/g, '&');
                if (next === text) break;
                text = next;
            }
            return text;
        }

        function formatInlineTextHtml(value) {
            const emTokens = [];
            const tokenized = String(value || '').replace(/<em\b[^>]*>([\s\S]*?)<\/em>/gi, (_, content) => {
                const token = `\u0000EM${emTokens.length}\u0000`;
                emTokens.push(decodeHtmlEntities(stripHtml(content)));
                return token;
            });
            return escapeHtml(decodeHtmlEntities(stripHtml(tokenized)))
                .replace(/\u0000EM(\d+)\u0000/g, (_, index) => `<em>${escapeHtml(emTokens[Number(index)] || '')}</em>`);
        }

        function getMilestoneRegions(milestone) {
            const country = milestone && milestone.location && milestone.location.country;

            const relatedRegions = milestone && milestone.achievement && Array.isArray(milestone.achievement.relatedRegions)
                ? milestone.achievement.relatedRegions.map((region) => String(region && typeof region === 'object' ? region.en : region || '').trim())

            const haystack = [rawCountry, ...relatedRegions].filter(Boolean).join(' ');
            if (!haystack) return [];
            return ACHIEVEMENT_REGION_NAMES.filter((region) => haystack.includes(region));

            linkUrls.forEach((url, index) => {
                const token = `\u0000ABOUT_LINK_${index}\u0000`;
                tokens[index] = { token, url };
                output = output.split(url).join(token);
            });
            output = escapeHtml(output);
            tokens.forEach(({ token, url }) => {
                output = output.split(token).join(`<a href="${escapeHtml(url)}" target="_blank" rel="noopener noreferrer">${escapeHtml(url)}</a>`);
            });
            return output;

        function buildFallbackVm(milestone, index) {
            const safeMilestone = milestone || {};
            const photos = [];
            (safeMilestone.photos || []).forEach((url) => {
                if (url && !photos.includes(url)) photos.push(url);
            });
            if (safeMilestone.resources && Array.isArray(safeMilestone.resources.images)) {
                safeMilestone.resources.images.forEach((url) => {
                    if (url && !photos.includes(url)) photos.push(url);
                });
            }

            const quote = String(lx(safeMilestone.quote) || '').trim();
            const quoteAttribution = String(lx(safeMilestone.quoteAttribution) || '').trim();
            const quoteLabel = String(lx(safeMilestone.quoteLabel) || '').trim();
            const descriptionText = stripHtml(lx(safeMilestone.description) || '');
            const commentarySections = [];
            if (quote && quote !== '待补充') {
                const attributionPrefix = quoteAttribution && isWorkAttribution(quoteAttribution) ? `${tx('source')}：` : `${tx('attribution')}：`;
                commentarySections.push({
                    label: quoteLabel || tx('quoteExcerpt'),
                    html: quoteAttribution ? `${quote}<br>${attributionPrefix}${quoteAttribution}` : quote
                });
            }
            const customSections = Array.isArray(safeMilestone.commentarySections)
                ? safeMilestone.commentarySections.filter((section) => stripHtml(section && section.html))
                : [];
            if (customSections.length > 0) {
                customSections.forEach((section) => {
                    commentarySections.push({
                        label: lx(section.label) || tx('contentInterpretation'),
                        html: lx(section.html),
                        link: section.link || null
                    });
                });
            } else if (descriptionText) {
                commentarySections.push({ label: tx('background'), html: descriptionText });
            }
            if (commentarySections.length === 0) {
                commentarySections.push({ label: tx('contentPending'), html: tx('noAdditionalInfo') });
            }

            const primaryVideo = safeMilestone.resources && Array.isArray(safeMilestone.resources.videos) && safeMilestone.resources.videos.length > 0
                ? safeMilestone.resources.videos[0]
                : null;
            const category = safeMilestone.category || safeMilestone.subtitle || '';

            return {
                raw: safeMilestone,
                year: safeMilestone.year || '',
                title: safeMilestone.title || '',
                category,
                subtitle: safeMilestone.subtitle || category,
                location: safeMilestone.location || { name: '', country: '', coordinates: [] },
                descriptionHtml: safeMilestone.description || '',
                descriptionText,
                figures: Array.isArray(safeMilestone.figures) ? safeMilestone.figures : [],
                photos,
                primaryPhoto: photos[0] || '',
                archivePhotos: photos.slice(1),
                primaryVideo,
                videoEmbedUrl: primaryVideo ? primaryVideo.embed_url : '',
                quoteHtml: quote,
                quoteAttribution,
                quoteLabel,
                quotePage: String(safeMilestone.quotePage || '').trim(),
                commentaryOverrideSections: Array.isArray(safeMilestone.commentarySections) ? safeMilestone.commentarySections : [],
                commentarySections,
                timeline: milestoneList.map((item, itemIndex) => ({
                    year: item.year,
                    title: item.title,
                    active: itemIndex === index
                }))
            };
        }

        function getVm(index) {
            if (vmCache.has(index)) {
                return vmCache.get(index);
            }

            const vm = window.MilestoneView && typeof window.MilestoneView.normalizeMilestone === 'function'
                ? window.MilestoneView.normalizeMilestone(milestoneList[index], index, milestoneList)
                : buildFallbackVm(milestoneList[index], index);
            vmCache.set(index, vm);
            return vm;

        function preloadImage(url) {
            if (!url || imagePreloadCache.has(url)) return;
            const image = new Image();
            image.decoding = 'async';
            image.loading = 'eager';
            image.src = url;
            imagePreloadCache.set(url, image);
        }

        function preloadMilestoneAssets(index) {
            if (index < 0 || index >= milestoneList.length) return;
            const vm = getVm(index);
            sortPhotosForDisplay(vm.photos).slice(0, 20).forEach(preloadImage);
        }

        function preloadAdjacentAssets(index) {
            preloadMilestoneAssets(index);
            preloadMilestoneAssets(index - 1);
            preloadMilestoneAssets(index + 1);
        }

        function buildContextYears(year, beforeCount, afterCount) {
            const safeYear = Number(year);
            if (Number.isNaN(safeYear)) return [];
            const years = [];
            for (let offset = beforeCount; offset >= 1; offset -= 1) {
                years.push(safeYear - offset);
            }
            for (let offset = 1; offset <= afterCount; offset += 1) {
                years.push(safeYear + offset);
            }
            return years;
        }

        function buildLocationLine(location) {
            return [location && location.name, location && location.country]
                .filter(Boolean)
                .join('  ');
        }

        function buildLocationHtml(location) {
            const name = escapeHtml(location && location.name ? location.name : '');
            const country = escapeHtml(location && location.country ? location.country : '');
            if (name && country) {
                return `${name}<br>${country}`;
            }
            if (name) return name;
            if (country) return country;
            return tx('locationPending');
        }

        function shouldOffsetUiDetailHeading(yearText, location) {
            const locationText = buildLocationLine(location).replace(/\s+/g, '');
            const normalizedYear = String(yearText || '').replace(/\s+/g, '');
            return locationText.length >= 18 || (normalizedYear.length >= 8 && locationText.length >= 12);
        }

        function getUiDetailLongYearClass(yearText) {
            const normalized = String(yearText || '').replace(/\s+/g, '');
            if (normalized.length >= 9) return ' has-extra-long-year';
            if (normalized.length >= 8 || /[-/]/.test(String(yearText || ''))) return ' has-long-year';
            return '';
        }

        function extractStageContext(vm) {
            const raw = String((vm && (vm.category || vm.subtitle)) || '').replace(/\s+/g, ' ').trim();
            if (!raw) {
                return { label: 'AI 历史', period: '' };
            }

            const match = raw.match(/^(.*?)(?:\s*[（(]([^()（）]+)[)）])?$/);
            const label = String(match && match[1] ? match[1] : raw).trim() || raw;
            const period = String(match && match[2] ? match[2] : '').trim();
            return { label, period };
        }

        function buildSummaryHtml(vm) {
            if (vm.descriptionHtml && String(vm.descriptionHtml).trim()) {
                return vm.descriptionHtml;
            }
            if (vm.descriptionText) {
                return `<p>${escapeHtml(vm.descriptionText)}</p>`;
            }
            return '<p>暂无事件摘要</p>';
        }

        function initials(name) {
            const raw = String(name || '').trim();
            if (!raw) return 'AI';
            const localizedName = raw.replace(/\s+/g, ' ');
            const dividerMatch = localizedName.match(/^([^·・.．。]+)/);
            const firstPart = String(dividerMatch && dividerMatch[1] ? dividerMatch[1] : localizedName).trim();
            if (/[\u3400-\u9fff]/.test(localizedName)) {
                return firstPart || localizedName;
            }
            const words = firstPart.split(/\s+/).filter(Boolean);
            return String(words[0] || firstPart || localizedName).toUpperCase();
        }

        function getFigureAvatarSource(figure, vm, portraitPool, index) {
            if (figure && figure.avatar) {
                return {
                    src: figure.avatar,
                    style: figure.avatarStyle || ''
                };
            }

            if (portraitPool[index]) {
                return {
                    src: portraitPool[index],
                    style: ''
                };
            }

            if (vm && vm.year === 1956) {
                return {
                    src: 'resources/images/1956-dartmouth/historical/1956-dartmouth_historical_04.jpg',
                    style: 'object-position: 36% 30%; transform: scale(1.45);'
                };
            }

            return null;
        }

        function buildFigureAvatar(figure, avatarSource) {
            if (avatarSource && avatarSource.src) {
                const styleAttr = avatarSource.style ? ` style="${avatarSource.style}"` : '';
                return `<img src="${avatarSource.src}" alt="${escapeHtml(figure.name || tx('keyFigure'))}"${styleAttr}>`;
            }
            return `<span>${escapeHtml(initials(figure.name))}</span>`;
        }

        function isPortraitLikePhoto(url) {
            return /\/people\/|portrait|headshot|avatar|人物|人像/i.test(String(url || ''));
        }

        function isPortraitLikeMedia(vm, url) {
            const value = String(url || '');
            if (!value) return false;
            if (isPortraitLikePhoto(value)) return true;
            const meta = getConfiguredImageMeta(vm, value);
            const metaText = [
                meta && meta.caption,
                meta && meta.subcaption,
                meta && meta.usage
            ].filter(Boolean).join(' ');
            return /portrait|person|figure photo|researcher photo|historical figure|人物|人像|肖像/i.test(metaText);
        }

        function isDocumentLikePhoto(url) {
            return /proposal|paper|document|page|sheet|scan|manuscript|report|doc|论文|提案|文稿|手稿/i.test(String(url || ''));
        }

        function choosePreferredArchiveIndex(photos) {
            const safePhotos = Array.isArray(photos) ? photos.filter(Boolean) : [];
            if (safePhotos.length <= 1) return 0;

            const firstNonDocumentIndex = safePhotos.findIndex((url) => !isDocumentLikePhoto(url));
            if (firstNonDocumentIndex > 0) {
                return firstNonDocumentIndex;
            }

            return 0;
        }

        function buildArchiveFigureMeta(vm, index, fallbackName) {
            const figures = Array.isArray(vm.figures) ? vm.figures.filter(Boolean) : [];
            if (figures.length > 0) {
                const figure = figures[((index % figures.length) + figures.length) % figures.length] || figures[0];
                return {
                    name: figure.name || fallbackName || tx('keyFigure'),
                    role: figure.role || buildLocationLine(vm.location) || tx('keyParticipant')
                };
            }

            return {
                name: fallbackName || vm.title || tx('historicalArchive'),
                role: buildLocationLine(vm.location) || vm.category || tx('historicalEvent')
            };
        }

        function extractWorkTitleFromAttribution(attribution) {
            const match = String(attribution || '').match(/《([^》]+)》|<em\b[^>]*>([\s\S]*?)<\/em>/i);
            if (!match) return '';
            return match[1] ? String(match[1] || '').trim() : stripHtml(match[2]);
        }

        function getConfiguredImageMeta(vm, url) {
            const raw = vm && vm.raw ? vm.raw : {};
            const map = raw && raw.resources && raw.resources.imageMeta ? raw.resources.imageMeta : (raw.imageMeta || null);
            if (!map || typeof map !== 'object') return null;
            const entry = map[url];
            if (!entry || typeof entry !== 'object') return null;

            const caption = String(lx(entry.caption || entry.title || entry.name || '')).trim();
            const subcaption = String(lx(entry.subcaption || entry.subtitle || entry.description || entry.role || '')).trim();
            const source = String(entry.sourceUrl || entry.source || entry.url || '').trim();
            const license = localizeRightsNote(entry.license || '');
            const usage = String(lx(entry.usage || entry.recommendedUse || '')).trim();
            if (!caption && !subcaption && !source && !license && !usage) return null;
            return { caption, subcaption, source, license, usage };
        }

        function buildArchivePhotoMeta(vm, url) {
            const value = String(url || '').trim();
            if (!value) return { name: '', role: '' };

            const configured = getConfiguredImageMeta(vm, value);
            const title = String(vm && vm.title ? vm.title : '').trim();
            const year = vm && vm.year ? String(vm.year) : '';
            const workTitle = extractWorkTitleFromAttribution(vm && vm.quoteAttribution ? vm.quoteAttribution : '');

            if (isPortraitLikePhoto(value)) {
                const autoMeta = {
                    name: tx('portrait'),
                    role: tx('researcherPhoto')
                };
                return {
                    name: (configured && configured.caption) || autoMeta.name,
                    role: (configured && configured.subcaption) || autoMeta.role
                };
            }

            if (/\/architecture\//i.test(value) || /_architecture_/i.test(value)) {
                const autoMeta = {
                    name: tx('architectureDiagram'),
                    role: title ? `${title} ${tx('architectureDiagram')}` : tx('modelArchitecture')
                };
                return {
                    name: (configured && configured.caption) || autoMeta.name,
                    role: (configured && configured.subcaption) || autoMeta.role
                };
            }

            if (/\/papers\//i.test(value) || /_papers_/i.test(value) || isDocumentLikePhoto(value)) {
                const autoMeta = {
                    name: tx('paperPage'),
                    role: workTitle ? `《${workTitle}》` : (title || tx('originalScreenshot'))
                };
                return {
                    name: (configured && configured.caption) || autoMeta.name,
                    role: (configured && configured.subcaption) || autoMeta.role
                };
            }

            if (/\/historical\//i.test(value) || /_historical_/i.test(value)) {
                const autoMeta = {
                    name: tx('historicalArchive'),
                    role: title || (year ? `${year} ${tx('historicalArchive')}` : tx('archiveMaterial'))
                };
                return {
                    name: (configured && configured.caption) || autoMeta.name,
                    role: (configured && configured.subcaption) || autoMeta.role
                };
            }

            const autoMeta = {
                name: tx('archiveImage'),
                role: title || (vm && vm.category) || tx('archiveMaterial')
            };
            return {
                name: (configured && configured.caption) || autoMeta.name,
                role: (configured && configured.subcaption) || autoMeta.role
            };
        }

        function getAchievementVisualModules(rawMilestone) {
            const raw = rawMilestone || {};
            const modules = raw && raw.achievement && Array.isArray(raw.achievement.visualModules)
                ? raw.achievement.visualModules
                : [];

            return modules
                .map((module) => {
                    if (!module || typeof module !== 'object') return null;
                    const type = String(module.type || '').trim();
                    const url = String(module.url || module.source || '').trim();
                    if (!type || !url) return null;

                    return {
                        type,

        function splitTextByPunctuation(text, targetParts) {
            const normalized = stripHtml(text || '').replace(/\s+/g, ' ').trim();
            if (!normalized) return [];

            const parts = [];
            const estimatedLength = Math.max(28, Math.ceil(normalized.length / Math.max(1, targetParts)));
            let cursor = 0;
            while (cursor < normalized.length && parts.length < targetParts) {
                let end = Math.min(normalized.length, cursor + estimatedLength);
                if (end < normalized.length) {
                    const nextBreak = normalized.slice(end).search(/[，。；：,.!?！？]/);
                    if (nextBreak >= 0 && nextBreak < 20) {
                        end += nextBreak + 1;
                    }
                }
                parts.push(normalized.slice(cursor, end).trim());
                cursor = end;
            }
            return parts.filter(Boolean);
        }

        function buildRightCommentarySections(vm) {
            const defaultLabels = [tx('quoteExcerpt'), tx('background'), tx('extension')];
            const analysisSections = buildAnalysisSections(vm.raw);
            const sourceSections = analysisSections.length > 0 ? analysisSections : (Array.isArray(vm.commentarySections)
                ? vm.commentarySections.filter((section) => stripHtml(section && section.html))
                : []);
            const maxSections = sourceSections.length > 3 ? 4 : 3;
            const sections = sourceSections.slice(0, maxSections).map((section, index) => ({
                label: section.label || defaultLabels[index] || tx('contentInterpretation'),
                text: section.text || stripHtml(section.html || ''),
                html: section.html || '',
                link: section.link || null
            }));

            const fallbackText = stripHtml(vm.descriptionHtml || vm.descriptionText || vm.quoteHtml || '');
            const fillerParts = splitTextByPunctuation(fallbackText, 3);

            let fillerIndex = 0;
            while (sections.length < 3) {
                sections.push({
                    label: defaultLabels[sections.length] || tx('contentInterpretation'),
                    text: fillerParts[fillerIndex] || sections[sections.length - 1]?.text || tx('noAdditionalInfo')
                });
                fillerIndex += 1;
            }

            return sections.slice(0, maxSections);
        }

        function dedupeBranchItems(items) {
            const seen = new Set();
            return (items || []).filter((item) => {
                const label = String(lx(item && item.label) || item && item.label || '').trim();
                const url = String(item && item.url || '').trim();
                const key = `${label.toLowerCase()}|${url}`;
                if (!label || seen.has(key)) return false;
                seen.add(key);
                return true;

            const papers = rawMilestone && Array.isArray(rawMilestone.papers) ? rawMilestone.papers : [];

        const BRANCH_TIMELINE_DRAG_START_X = 18;
        const BRANCH_TIMELINE_TEXT_DRAG_START_X = 34;
        const BRANCH_TIMELINE_VERTICAL_CANCEL_Y = 10;
        const BRANCH_TIMELINE_HORIZONTAL_INTENT_RATIO = 1.35;
        const BRANCH_TIMELINE_TEXT_HORIZONTAL_INTENT_RATIO = 1.8;
        const BRANCH_TIMELINE_SCROLLABLE_TEXT_SELECTOR = '.branch-event-content';
        const BRANCH_TIMELINE_STACK_MEDIA_QUERY =
            '(max-width: 600px), (max-width: 932px) and (max-height: 600px) and (orientation: landscape)';
        let branchTimelineWheelSnapTimer = 0;
        let branchTimelineDragReleaseTimer = 0;

        function getBranchTimelineCenteredEvent(timeline) {
            if (!timeline) return null;

            const events = Array.from(timeline.querySelectorAll('.branch-event'));
            if (!events.length) return null;

            const timelineRect = timeline.getBoundingClientRect();
            const centerX = timelineRect.left + timelineRect.width / 2;
            let centeredEvent = events[0];
            let centeredDistance = Infinity;

            events.forEach((eventCard) => {
                const rect = eventCard.getBoundingClientRect();
                const eventCenterX = rect.left + rect.width / 2;
                const distance = Math.abs(eventCenterX - centerX);
                if (distance < centeredDistance) {
                    centeredDistance = distance;
                    centeredEvent = eventCard;
                }
            });

            return centeredEvent;
        }

        function updateBranchTimelineCenterState(timeline) {
            if (!timeline || !timeline.isConnected) return;

            const centeredEvent = getBranchTimelineCenteredEvent(timeline);
            const centeredKey = centeredEvent ? String(centeredEvent.dataset.branchEventKey || '') : '';
            const extraRecordKeys = new Set(BRANCH_EXTRA_GAME_RECORD_KEYS[centeredKey] || []);
            const showAllRecords = window.matchMedia(BRANCH_TIMELINE_STACK_MEDIA_QUERY).matches;
            timeline.querySelectorAll('.branch-event').forEach((eventCard) => {
                const isCentered = eventCard === centeredEvent;
                const isExtraRecordVisible = extraRecordKeys.has(String(eventCard.dataset.branchEventKey || ''));
                const isRecordVisible = showAllRecords || isCentered || isExtraRecordVisible;
                eventCard.classList.toggle('is-center', isCentered);
                eventCard.classList.toggle('is-extra-record-visible', isExtraRecordVisible);
                eventCard.querySelectorAll('.branch-game-record-trigger').forEach((button) => {
                    button.tabIndex = isRecordVisible ? 0 : -1;
                    button.setAttribute('aria-hidden', isRecordVisible ? 'false' : 'true');
                });
            });
        }

        function scheduleBranchTimelineCenterUpdate(timeline) {
            if (!timeline) return;
            if (branchTimelineCenterRaf) window.cancelAnimationFrame(branchTimelineCenterRaf);
            branchTimelineCenterRaf = window.requestAnimationFrame(() => {
                branchTimelineCenterRaf = 0;
                updateBranchTimelineCenterState(timeline);
            });
        }

        function getBranchTimelineWheelDelta(event, timeline) {
            const deltaX = Number.isFinite(event.deltaX) ? event.deltaX : 0;
            const deltaY = Number.isFinite(event.deltaY) ? event.deltaY : 0;
            const rawDelta = Math.abs(deltaX) > Math.abs(deltaY) ? deltaX : deltaY;
            if (!rawDelta) return 0;

            if (event.deltaMode === 1) {
                return rawDelta * 48;
            }

            if (event.deltaMode === 2) {
                return rawDelta * Math.max(320, timeline.clientWidth * 0.82);
            }

            return rawDelta;
        }

        function suspendBranchTimelineSnap(timeline) {
            timeline.classList.add('is-wheel-scrolling');

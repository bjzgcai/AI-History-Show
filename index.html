<!DOCTYPE html>
<html lang="zh-CN" data-layout-mode="single">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 历史回顾展览 - 单屏模式</title>
    <script src="shared/layout-router.js"></script>
    <style>
        :root {
            --screen-width: 1920px;
            --screen-height: 1080px;
            --stage-scale: 1;
            --stage-topbar-ratio: 0.073;
            --stage-footer-ratio: 0.08062;
            --stage-pad-top-ratio: 0.03704;
            --stage-pad-side-ratio: 0.022;
            --stage-pad-bottom-ratio: 0.03333;
            --stage-topbar-divider-ratio: 0.00556;
            --stage-grid-gap-ratio: 0.01325;
            --stage-main-top-gap-ratio: 0.0065;
            --stage-main-bottom-gap-ratio: 0.014;
            --stage-left-ratio: 0.246;
            --stage-center-ratio: 0.4785;
            --stage-right-ratio: 0.249;
            --footer-nav-width: calc(var(--screen-width) * 0.02344);
            --footer-nav-height: calc(var(--screen-height) * 0.0676);
            --footer-gap-ratio: 0.0122;
            --bg: #020202;
            --panel: rgba(255, 255, 255, 0.05);
            --line: rgba(255, 255, 255, 0.14);
            --line-strong: rgba(255, 255, 255, 0.28);
            --text: #f4efe5;
            --text-soft: rgba(244, 239, 229, 0.78);
            --text-muted: rgba(244, 239, 229, 0.42);
            --accent: #f68900;
            --accent-strong: #ff7f11;
            --deep-red: #4f0404;
            --scrollbar-track: rgba(255, 255, 255, 0.045);
            --scrollbar-thumb: rgba(246, 137, 0, 0.42);
            --scrollbar-thumb-hover: rgba(246, 137, 0, 0.68);
            --ui-font: "PingFang SC", "Microsoft YaHei", sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            color: var(--text);
            font-family: var(--ui-font);
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.012) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.012) 1px, transparent 1px);
            background-size: 4px 4px;
            opacity: 0.3;
            mix-blend-mode: soft-light;
        }

        button {
            font: inherit;
        }

        .stage-viewport {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        .single-stage {
            position: absolute;
            left: 50%;
            top: 50%;
            width: var(--screen-width);
            height: var(--screen-height);
            transform: translate(-50%, -50%) scale(var(--stage-scale));
            transform-origin: center center;
            display: grid;
            grid-template-rows:
                calc(var(--screen-height) * var(--stage-topbar-ratio))
                1fr
                calc(var(--screen-height) * var(--stage-footer-ratio));
            gap: 0;
            padding:
                calc(var(--screen-height) * var(--stage-pad-top-ratio))
                calc(var(--screen-width) * var(--stage-pad-side-ratio))
                calc(var(--screen-height) * var(--stage-pad-bottom-ratio));
            touch-action: pan-y;
            background: #000;
            box-shadow: none;
        }

        .single-stage.is-bench-dossier {
            grid-template-rows:
                calc(var(--screen-height) * var(--stage-topbar-ratio))
                1fr;
        }

        .empty-state {
            display: grid;
            place-items: center;
            width: 100%;
            height: 100%;
            border: 1px dashed rgba(255, 255, 255, 0.18);
            color: var(--text-soft);
            font-size: 34px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .stage-topbar {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            align-items: start;
            gap: calc(var(--screen-width) * 0.0125);
            padding-bottom: 0;
            border-bottom: none;
        }

        .brand-lockup {
            width: 431px;
            min-width: 0;
            display: block;
            padding-top: 0;
        }

        .brand-image {
            display: block;
            width: 431px;
            height: auto;
            user-select: none;
            pointer-events: none;
        }

        .stage-kicker {
            display: none;
        }

        .mode-chip {
            justify-self: end;
            display: inline-flex;
            align-items: center;
            color: rgba(244, 239, 229, 0.54);
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 0;
            padding-top: 3px;
        }

        .topbar-actions {
            justify-self: end;
            display: inline-flex;
            align-items: center;
            gap: 12px;
        }

        .storyline-select {
            width: 334px;
            height: 32px;
            min-width: 0;
            border: 1px solid rgba(244, 239, 229, 0.24);
            border-radius: 4px;
            background: rgba(0, 0, 0, 0.34);
            color: rgba(244, 239, 229, 0.78);
            padding: 0 32px 0 10px;
            font-family: "Gotham", "Arial Narrow", "PingFang SC", sans-serif;
            font-size: 15px;
            font-weight: 700;
            line-height: 1;
            letter-spacing: 0;
            text-transform: uppercase;
            cursor: pointer;
        }

        .storyline-select:focus-visible {
            border-color: rgba(246, 137, 0, 0.78);
            outline: none;
        }

        .storyline-select option {
            background: #0b0b0b;
            color: #f4efe5;
        }

        .mode-chip-label {
            font-family: "OPPOSans", "PingFang SC", "Microsoft YaHei", sans-serif;
            font-size: 23px;
            color: rgba(244, 239, 229, 0.56);
            font-weight: 800;
            letter-spacing: 0;
            white-space: nowrap;
        }

        .language-toggle.topbar-language-toggle {
            --language-toggle-width: 52px;
            --language-toggle-height: 31px;
            justify-self: end;
            align-self: baseline;
            margin-top: 0;
            width: var(--language-toggle-width);
            height: var(--language-toggle-height);
            min-width: var(--language-toggle-width);
            min-height: var(--language-toggle-height);
            border: 1px solid rgba(244, 239, 229, 0.34);
            background: transparent;
            color: rgba(244, 239, 229, 0.42);
            border-radius: 2px;
            padding: 0;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-family: "Gotham", "Arial Narrow", "PingFang SC", sans-serif;
            font-size: 23px;
            font-weight: 700;
            line-height: 1;
            letter-spacing: 0;
            text-transform: uppercase;
            cursor: pointer;
            opacity: 1;
        }

        .language-toggle.topbar-language-toggle:hover,
        .language-toggle.topbar-language-toggle:focus-visible {
            color: rgba(244, 239, 229, 0.62);
            border-color: rgba(244, 239, 229, 0.54);
            outline: none;
        }

        .stage-grid {
            min-height: 0;
            display: grid;
            grid-template-columns:
                calc(100% * var(--stage-left-ratio))
                calc(100% * var(--stage-center-ratio))
                calc(100% * var(--stage-right-ratio));
            gap: calc(100% * var(--stage-grid-gap-ratio));
            padding-top: calc(var(--screen-height) * var(--stage-main-top-gap-ratio));
            padding-bottom: calc(var(--screen-height) * var(--stage-main-bottom-gap-ratio));
        }

        .panel-shell {
            position: relative;
            min-height: 0;
            overflow: hidden;
            border: none;
            border-radius: 8px;
            background: #141414;
            box-shadow:
                inset 0 0 0 1px rgba(255, 255, 255, 0.014),
                0 12px 24px rgba(0, 0, 0, 0.12);
        }

        .hero-panel {
            position: relative;
            padding: 26px 20px 33px;
            display: flex;
            flex-direction: column;
            background: #141414;
        }

        .hero-panel::after {
            content: "";
            position: absolute;
            inset: 0;
            pointer-events: none;
            background:
                linear-gradient(180deg, rgba(255, 255, 255, 0.02), transparent 10%, transparent 92%, rgba(255, 255, 255, 0.04)),
                linear-gradient(90deg, rgba(255, 255, 255, 0.015), transparent 16%, transparent 84%, rgba(255, 255, 255, 0.015));
        }

        .hero-kicker {
            color: rgba(244, 239, 229, 0.42);
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }

        .hero-years {
            position: absolute;
            left: 24px;
            top: 88px;
            z-index: 5;
            display: flex;
            justify-content: flex-start;
            gap: 24px;
            color: rgba(244, 239, 229, 0.26);
            font-family: "Gotham", "Arial Narrow", "PingFang SC", sans-serif;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 0.04em;
            line-height: 1;
            white-space: nowrap;
        }

        .hero-year {
            position: absolute;
            right: 56px;
            top: 28px;
            z-index: 5;
            font-family: "Gotham", "Arial Narrow", "PingFang SC", sans-serif;
            font-size: 86px;
            line-height: 1;
            font-weight: 800;
            color: var(--accent);
            letter-spacing: 0;
            text-shadow:
                0 0 24px rgba(246, 137, 0, 0.2),
                0 2px 0 rgba(246, 137, 0, 0.08);
            white-space: nowrap;
        }

        .hero-stage {
            position: relative;
            width: 86%;
            aspect-ratio: 1 / 1;
            height: auto;
            margin: 146px auto 28px;
            overflow: visible;
            z-index: 2;
            filter: drop-shadow(0 24px 42px rgba(0, 0, 0, 0.26));
        }

        .orbit-overlay {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 4;
        }

        .orbit-overlay svg {
            width: 100%;
            height: 100%;
            overflow: visible;
        }

        .orbit-ring {
            fill: none;
            stroke: rgba(255, 87, 44, 0.92);
            stroke-width: 2.3;
            stroke-linecap: round;
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .orbit-start-dot {
            fill: #ff5a34;
            stroke: rgba(255, 255, 255, 0.76);
            stroke-width: 1.2;
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .orbit-dot {
            fill: var(--accent);
            stroke: rgba(255, 255, 255, 0.76);
            stroke-width: 1.2;
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .globe-stage {
            position: relative;
            width: 100%;
            height: 100%;
            transform: none;
            display: flex;
            align-items: center;
            justify-content: center;
            filter: drop-shadow(0 42px 84px rgba(0, 0, 0, 0.78));
        }

        .globe-shell {
            position: relative;
            z-index: 2;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            overflow: hidden;
            isolation: isolate;
            transform: translateZ(0);
            background:
                radial-gradient(circle at 31% 28%, rgba(81, 126, 191, 0.16), transparent 22%),
                radial-gradient(circle at 72% 72%, rgba(243, 132, 47, 0.1), transparent 30%),
                radial-gradient(circle at 39% 35%, rgba(23, 46, 92, 0.32), rgba(8, 11, 21, 0.12) 61%, transparent 74%);
            box-shadow:
                0 0 78px rgba(0, 0, 0, 0.84),
                0 0 72px rgba(56, 112, 180, 0.16),
                0 0 116px rgba(246, 137, 0, 0.1),
                inset 0 0 52px rgba(3, 5, 12, 0.72);
            cursor: grab;
            touch-action: none;
        }

        .globe-shell.is-dragging {
            cursor: grabbing;
        }

        .globe-stage::before {
            content: "";
            position: absolute;
            inset: -18%;
            border-radius: 50%;
            background:
                radial-gradient(circle at 58% 42%, rgba(246, 137, 0, 0.13), rgba(246, 137, 0, 0.045) 17%, transparent 38%),
                radial-gradient(circle at 50% 52%, rgba(22, 26, 29, 0) 44%, rgba(0, 0, 0, 0.34) 71%, rgba(0, 0, 0, 0) 100%);
            filter: blur(16px);
            pointer-events: none;
            z-index: 0;
        }

        .globe-stage::after {
            content: "";
            position: absolute;
            inset: -1.4%;
            border-radius: 50%;
            background:
                linear-gradient(90deg, rgba(0, 0, 0, 0.82) 0%, rgba(0, 0, 0, 0.26) 25%, rgba(0, 0, 0, 0) 43%, rgba(0, 0, 0, 0) 57%, rgba(0, 0, 0, 0.26) 75%, rgba(0, 0, 0, 0.82) 100%),
                linear-gradient(180deg, rgba(0, 0, 0, 0.42) 0%, rgba(0, 0, 0, 0) 30%, rgba(0, 0, 0, 0) 60%, rgba(0, 0, 0, 0.72) 100%),
                radial-gradient(circle at 50% 50%, rgba(0, 0, 0, 0) 44%, rgba(0, 0, 0, 0.58) 72%, rgba(0, 0, 0, 0.94) 100%);
            pointer-events: none;
            z-index: 4;
        }

        .globe-shell::before {
            display: none;
        }

        .globe-shell::after {
            display: none;
        }

        .globe-shell.is-static {
            isolation: auto;
            background: transparent;
            box-shadow: none;
        }

        .globe-shell.is-static::before,
        .globe-shell.is-static::after {
            display: none;
        }

        #singleGlobeContainer {
            position: absolute;
            inset: 0;
            z-index: 1;
            border-radius: inherit;
            overflow: hidden;
            clip-path: circle(50% at 50% 50%);
            transform: translateZ(0);
        }

        #singleGlobeCanvas {
            width: 100% !important;
            height: 100% !important;
            display: block;
            border-radius: inherit;
            transform: scale(1.005);
        }

        .globe-figma-image {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            border-radius: inherit;
            object-fit: cover;
            object-position: center;
            transform: scale(1.015);
            animation: globeFigmaDrift 24s ease-in-out infinite alternate;
        }

        @keyframes globeFigmaDrift {
            from {
                transform: scale(1.01) translate3d(-1.2%, -0.4%, 0);
            }
            to {
                transform: scale(1.04) translate3d(1%, 0.7%, 0);
            }
        }

        .globe-atmosphere {
            display: none;
        }

        .globe-shell.is-static .globe-atmosphere {
            opacity: 0;
        }

        .ghost-years {
            display: none;
        }

        .hero-bottom {
            display: none;
        }

        .hero-bottom-year {
            display: none;
        }

        .hero-bottom-copy {
            display: none;
        }

        .hero-location-block {
            margin-top: auto;
            text-align: center;
            display: grid;
            gap: 8px;
        }

        .hero-location-name {
            color: rgba(255, 255, 255, 0.96);
            font-size: 20px;
            font-weight: 800;
            line-height: 1.3;
        }

        .hero-location-country {
            color: rgba(244, 239, 229, 0.76);
            font-size: 20px;
            line-height: 1.32;
            font-weight: 600;
        }

        .hero-context-block {
            margin-top: 30px;
            display: grid;
            justify-items: center;
            gap: 8px;
            text-align: center;
        }

        .hero-context-period {
            color: rgba(244, 239, 229, 0.56);
            font-size: 16px;
            letter-spacing: 0.06em;
            text-transform: none;
        }

        .story-panel {
            padding: 18px 20px 22px;
            display: flex;
            flex-direction: column;
            background:
                radial-gradient(circle at 72% 10%, rgba(255, 255, 255, 0.035), transparent 18%),
                linear-gradient(180deg, rgba(18, 18, 18, 0.985), rgba(10, 10, 10, 0.995));
        }

        .story-header {
            display: block;
            padding-bottom: 0;
            border-bottom: none;
        }

        .story-kicker {
            color: var(--accent);
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .story-title {
            margin-top: 8px;
            color: var(--accent);
            max-width: 98%;
            font-size: 43px;
            line-height: 1.1;
            font-weight: 800;
            letter-spacing: 0;
            text-wrap: balance;
        }

        .story-location {
            display: none;
        }

        .story-year {
            display: none;
        }

        .story-summary {
            margin-top: 18px;
            min-height: 0;
            max-height: 88px;
            overflow: auto;
            padding-right: 8px;
            color: rgba(244, 239, 229, 0.92);
            font-size: 17px;
            line-height: 1.5;
        }

        .story-summary p {
            margin-bottom: 0.8em;
        }

        .story-summary p:last-child {
            margin-bottom: 0;
        }

        .section-heading {
            color: rgba(244, 239, 229, 0.74);
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.14em;
            text-transform: uppercase;
        }

        .figures-section {
            margin-top: 30px;
        }

        .figures-section .section-heading {
            display: none;
        }

        .figure-row {
            margin-top: 0;
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 42px;
        }

        .figure-row.count-1 {
            grid-template-columns: minmax(0, 240px);
        }

        .figure-row.count-2 {
            grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .figure-row.count-4 {
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 28px;
        }

        .figure-chip {
            display: grid;
            grid-template-columns: 52px minmax(0, 1fr);
            gap: 12px;
            align-items: center;
            min-width: 0;
        }

        .figure-avatar {
            position: relative;
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.06);
            overflow: hidden;
            display: grid;
            place-items: center;
            color: rgba(255, 255, 255, 0.78);
            font-size: 14px;
            font-weight: 700;
            filter: grayscale(0.1);
            letter-spacing: 0.08em;
        }

        .figure-avatar img {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(0.1);
            object-position: center center;
        }

        .figure-avatar span {
            display: inline-block;
        }

        .figure-meta {
            min-width: 0;
            padding-top: 2px;
        }

        .figure-name {
            color: rgba(244, 239, 229, 0.82);
            font-size: 12px;
            line-height: 1.2;
        }

        .figure-role {
            margin-top: 3px;
            color: rgba(244, 239, 229, 0.5);
            font-size: 10px;
            line-height: 1.22;
        }

        .archive-section {
            margin-top: 54px;
            min-height: 0;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .archive-stage {
            position: relative;
            flex: 1;
            min-height: 396px;
            margin-top: 0;
            display: grid;
            grid-template-columns:
                minmax(0, 0.215fr)
                minmax(0, 0.04fr)
                minmax(0, 0.49fr)
                minmax(0, 0.04fr)
                minmax(0, 0.215fr);
            grid-template-rows: 18px minmax(0, 1fr);
            align-items: end;
            row-gap: 16px;
            cursor: grab;
            touch-action: pan-y;
        }

        .archive-stage::before,
        .archive-stage::after {
            content: "";
            position: absolute;
            top: 18px;
            width: 23%;
            height: calc(100% - 18px);
            pointer-events: none;
            z-index: 3;
            opacity: 0.96;
        }

        .archive-stage::before {
            left: 0;
            background: linear-gradient(90deg, #111 0%, rgba(17, 17, 17, 0.88) 18%, rgba(17, 17, 17, 0) 100%);
        }

        .archive-stage::after {
            right: 0;
            background: linear-gradient(90deg, rgba(17, 17, 17, 0) 0%, rgba(17, 17, 17, 0.88) 82%, #111 100%);
        }

        .archive-stage.is-dragging {
            cursor: grabbing;
        }

        .archive-card {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            z-index: 1;
            min-width: 0;
            width: 100%;
            transform: translateY(-42px);
        }

        .archive-card.is-hidden {
            display: none;
        }

        .archive-thumb,
        .archive-focus {
            position: relative;
            display: block;
            border: none;
            background: transparent;
            padding: 0;
            cursor: pointer;
            overflow: hidden;
        }

        .archive-thumb::after,
        .archive-focus::after {
            content: "";
            position: absolute;
            inset: 0;
            pointer-events: none;
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.1);
        }

        .archive-thumb.is-empty,
        .archive-focus.is-empty {
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.04));
        }

        .archive-thumb.is-empty::before,
        .archive-focus.is-empty::before {
            content: attr(data-empty-label);
            position: absolute;
            inset: 0;
            display: grid;
            place-items: center;
            color: rgba(244, 239, 229, 0.42);
            font-size: 12px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            z-index: 1;
        }

        .archive-thumb img,
        .archive-focus img {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: cover;
            background: #111;
            filter: grayscale(0.1);
        }

        .archive-card-left {
            grid-column: 1;
            grid-row: 2;
            align-self: end;
        }

        .archive-card-left::before {
            display: none;
        }

        .archive-card-left .archive-thumb {
            width: 100%;
            aspect-ratio: 0.8 / 1;
            height: auto;
            background: #f1ebe2;
            border: 12px solid #f1ebe2;
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.22);
        }

        .archive-card-left .archive-card-caption {
            position: absolute;
            left: 0;
            top: calc(100% + 10px);
            width: 100%;
        }

        .archive-card-main {
            grid-column: 3;
            grid-row: 2;
            align-self: end;
            margin-top: 0;
        }

        .archive-card-main::before {
            content: "";
            position: absolute;
            left: -2%;
            top: -8%;
            width: 103%;
            bottom: 0;
            background: rgba(255, 255, 255, 0.96);
            z-index: -1;
        }

        .archive-card-main .archive-focus {
            width: 100%;
            aspect-ratio: 1.16 / 1;
            height: auto;
            background: #f4f0e8;
            border: 12px solid #f4f0e8;
            box-shadow: 0 18px 44px rgba(0, 0, 0, 0.3);
        }

        .archive-card-right .archive-thumb {
            width: 100%;
            aspect-ratio: 1.02 / 1;
            height: auto;
            background: #ece5db;
            border: 10px solid #ece5db;
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.2);
        }

        .archive-card-right .archive-card-caption {
            position: absolute;
            left: 0;
            top: calc(100% + 10px);

        .archive-card-left .archive-thumb img,
        .archive-card-right .archive-thumb img {
            object-fit: contain;
            padding: 8px;
            background: transparent;

        .archive-thumb:disabled {

            opacity: 0.7;

        .archive-card-caption {
            display: block;
        }

        .archive-card-name {
            color: rgba(244, 239, 229, 0.76);
            font-size: 11.5px;
            line-height: 1.24;
        }

        .archive-card-role {
            margin-top: 3px;
            color: rgba(244, 239, 229, 0.42);
            font-size: 10.5px;
            line-height: 1.24;
        }

        .archive-caption {
            color: var(--accent);
            font-size: 18px;
            font-weight: 800;
            line-height: 1.18;
        }

        .archive-subcaption {
            margin-top: 4px;
            color: var(--accent);
            font-size: 13.5px;
            line-height: 1.3;
            font-weight: 700;

        .archive-bottomline {

            justify-content: center;
            align-self: center;

            gap: 10px;

        .archive-dot {

        .media-panel {
            padding: 20px 20px 20px;
            display: grid;
            grid-template-rows: auto auto minmax(0, 1fr);
            gap: 20px;
            background: #141414;

        .media-header {
            padding-bottom: 0;

        }

        .media-header .section-heading {
            color: var(--accent);
            font-size: 20px;
            font-weight: 800;
            letter-spacing: 0;
        }

        .video-frame {
            position: relative;
            width: 100%;
            min-width: 0;
            min-height: 0;
            height: auto;
            aspect-ratio: 1.86 / 1;
            justify-self: stretch;
            background: #0b0b0b;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .video-frame::before {
            content: "";
            position: absolute;
            left: 8px;
            top: 8px;
            width: calc(100% - 16px);
            height: calc(100% - 16px);
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.62);
            pointer-events: none;
            z-index: 3;
        }

        .video-frame::after {
            content: "";
            position: absolute;
            inset: 0;
            pointer-events: none;
            background:
                linear-gradient(180deg, rgba(255, 255, 255, 0.02), transparent 12%, transparent 88%, rgba(255, 255, 255, 0.02)),
                repeating-linear-gradient(180deg, rgba(255, 255, 255, 0.03) 0 1px, transparent 1px 4px);
            mix-blend-mode: screen;
            opacity: 0.42;
        }

        .video-frame.has-video-data:not(.is-playing) {
            cursor: pointer;
        }

        .video-frame iframe,
        .video-frame video {
            position: absolute;
            left: 8px;
            top: 8px;
            width: calc(100% - 16px);
            height: calc(100% - 16px);
            background: #000;
        }

        .video-frame iframe {
            border: none;
        }

        .video-frame video {
            object-fit: contain;
        }

        .video-frame:not(.is-playing) iframe,
        .video-frame.empty iframe,
        .video-frame:not(.is-playing) video,
        .video-frame.empty video {
            display: none;
        }

        .video-frame.is-playing .video-quote,
        .video-frame.is-playing .video-play-tag,
        .video-frame.is-playing .video-timebar,
        .video-frame.is-playing .video-quote-mark {
            opacity: 0;
        }

        .video-play-tag {
            position: absolute;
            left: 48px;
            top: 12px;
            display: flex;
            align-items: center;
            z-index: 3;
            pointer-events: none;
            color: rgba(244, 239, 229, 0.34);
            font-family: "Courier New", "SFMono-Regular", monospace;
            font-size: 9px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            transition: opacity 0.2s ease;
        }

        .video-play-tag::after {
            content: "▸";
            margin-left: 8px;
            font-size: 11px;
        }

        .video-timebar {
            position: absolute;
            left: 48px;
            right: 48px;
            bottom: 12px;
            z-index: 3;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: opacity 0.2s ease;
        }

        .video-chip {
            display: inline-flex;
            align-items: center;
            padding: 0;
            border: none;
            color: rgba(244, 239, 229, 0.42);
            font-family: "Courier New", "SFMono-Regular", monospace;
            font-size: 10px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }

        .video-quote {
            position: absolute;
            left: 30px;
            right: 30px;
            bottom: 48px;
            z-index: 3;
            color: #d99a00;
            font-family: "Courier New", "SFMono-Regular", monospace;
            font-size: 13px;
            line-height: 1.18;
            font-weight: 800;
            transition: opacity 0.2s ease;
            display: -webkit-box;
            -webkit-box-orient: vertical;
            -webkit-line-clamp: 4;
            overflow: hidden;
        }

        .video-quote-mark {
            position: absolute;
            right: 18px;
            top: 16px;
            z-index: 3;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: opacity 0.2s ease;
        }

        .video-quote-square {
            display: inline-flex;
            width: 16px;
            height: 16px;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(244, 239, 229, 0.18);
            color: rgba(244, 239, 229, 0.4);

            font-size: 10px;
            letter-spacing: 0.08em;
            text-transform: uppercase;

        .video-quote-lines {

        .video-quote-lines span {

            height: 1px;
            background: rgba(244, 239, 229, 0.22);
        }

        .media-category {
            color: rgba(244, 239, 229, 0.58);

            letter-spacing: 0.12em;
            text-transform: uppercase;
            text-align: right;

            background: transparent;

        .commentary-item + .commentary-item {
            padding-top: 18px;
            border-top: 1px solid rgba(255, 255, 255, 0.12);
        }

        .commentary-label {
            color: var(--accent);
            font-size: 12px;
            font-weight: 800;
            letter-spacing: 0;
            text-transform: none;
        }

        .commentary-body {
            margin-top: 12px;

            line-height: 1.52;

        .commentary-body a:focus-visible,
        .bench-evidence-body a:hover,

            text-decoration: underline;

            min-width: 0;
            border: 1px solid rgba(246, 137, 0, 0.28);

            text-transform: uppercase;

            color: rgba(255, 255, 255, 0.94);

            display: grid;

        .quick-quiz-option {
            min-width: 0;
            width: 100%;
            border: 1px solid rgba(244, 239, 229, 0.12);

            background: rgba(0, 0, 0, 0.28);
            color: rgba(244, 239, 229, 0.86);

            grid-template-columns: 22px minmax(0, 1fr);

        .quick-quiz-option:focus-visible {

        .quick-quiz-index {

        .quick-quiz-feedback {

            margin-bottom: 7px;

            align-items: end;

        .timeline-track::before {
            content: "";
            position: absolute;
            left: 0;
            right: 0;
            top: 24px;
            height: 3.5px;
            display: block;
            background: repeating-linear-gradient(
                90deg,
                rgba(255, 255, 255, 0.42) 0 1px,
                transparent 1px 12px

            opacity: 0.56;
            pointer-events: none;

            border: none;

            justify-content: flex-end;
            gap: 4.5px;
            min-width: 0;
            padding: 0;

            content: "";

            height: 14.15px;
            background: rgba(255, 255, 255, 0.62);
            transition: height 0.25s ease, background 0.25s ease, opacity 0.25s ease;

            display: none;

            color: #797a7a;
            font-family: "Gotham", "Arial Narrow", "PingFang SC", sans-serif;
            font-size: 11.5px;
            line-height: 1;
            letter-spacing: 0.02em;
            transform-origin: center bottom;
            transition: color 0.25s ease, font-size 0.25s ease;

        function escapeHtml(value) {
            return String(value == null ? '' : value)
                .replace(/&/g, '&amp;')

                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function debounce(func, wait) {
            let timeout;
            return function executedFunction(...args) {
                const later = () => {
                    clearTimeout(timeout);
                    func(...args);
                };
                clearTimeout(timeout);
                timeout = setTimeout(later, wait);
            };
        }

        function buildContextYears(year, beforeCount, afterCount) {
            const safeYear = Number(year);
            if (Number.isNaN(safeYear)) return [];
            const years = [];
            for (let offset = beforeCount; offset >= 1; offset -= 1) {
                years.push(safeYear - offset);
            }
            for (let offset = 1; offset <= afterCount; offset += 1) {
                years.push(safeYear + offset);

            return years;

            if (firstNonDocumentIndex > 0) {

            if (!map || typeof map !== 'object') return null;

            const caption = String(lx(entry.caption || entry.title || entry.name || '')).trim();
            const subcaption = String(lx(entry.subcaption || entry.subtitle || entry.description || entry.role || '')).trim();

            const normalized = stripHtml(text || '').replace(/\s+/g, ' ').trim();
            if (!normalized) return [];

            const parts = [];
            const estimatedLength = Math.max(28, Math.ceil(normalized.length / Math.max(1, targetParts)));
            let cursor = 0;
            while (cursor < normalized.length && parts.length < targetParts) {
                let end = Math.min(normalized.length, cursor + estimatedLength);
                if (end < normalized.length) {
                    const nextBreak = normalized.slice(end).search(/[，。；：,.!?！？]/);
                    if (nextBreak >= 0 && nextBreak < 20) {
                        end += nextBreak + 1;
                    }
                }
                parts.push(normalized.slice(cursor, end).trim());
                cursor = end;
            }
            return parts.filter(Boolean);

        function getOrbitViewportMetrics() {
            const layoutWidth = refs.orbitOverlay ? refs.orbitOverlay.clientWidth || 476 : 476;
            const layoutHeight = refs.orbitOverlay ? refs.orbitOverlay.clientHeight || 520 : 520;
            const overlayRect = refs.orbitOverlay ? refs.orbitOverlay.getBoundingClientRect() : null;
            const rectWidth = overlayRect && overlayRect.width ? overlayRect.width : layoutWidth;
            const rectHeight = overlayRect && overlayRect.height ? overlayRect.height : layoutHeight;
            return {
                width: layoutWidth,
                height: layoutHeight,
                rectWidth,
                rectHeight,
                scaleX: rectWidth ? layoutWidth / rectWidth : 1,
                scaleY: rectHeight ? layoutHeight / rectHeight : 1

        function setOrbitViewBox(width, height) {
            refs.orbitSvg.setAttribute('viewBox', `0 0 ${Math.max(1, width)} ${Math.max(1, height)}`);

        function clampOrbitPoint(point, width, height, padding = 12) {
            if (!point || !Number.isFinite(point.x) || !Number.isFinite(point.y)) return null;
            return {
                x: Math.min(width - padding, Math.max(padding, point.x)),
                y: Math.min(height - padding, Math.max(padding, point.y))

        function getElementRectInOrbitSpace(element) {
            if (!element || !refs.orbitOverlay) return null;
            const metrics = getOrbitViewportMetrics();
            const overlayRect = refs.orbitOverlay.getBoundingClientRect();
            const elementRect = element.getBoundingClientRect();
            if (!overlayRect.width || !overlayRect.height || !elementRect.width || !elementRect.height) return null;

            return {
                width: metrics.width,
                height: metrics.height,
                rect: {
                    x: (elementRect.left - overlayRect.left) * metrics.scaleX,
                    y: (elementRect.top - overlayRect.top) * metrics.scaleY,
                    width: elementRect.width * metrics.scaleX,
                    height: elementRect.height * metrics.scaleY
                }
            };
        }

        function getAnchorPointOnRect(rect, targetPoint, offset = 8) {
            if (!rect) return null;
            const centerX = rect.x + rect.width / 2;
            const centerY = rect.y + rect.height / 2;
            const fallbackTarget = targetPoint || { x: centerX - rect.width * 0.42, y: centerY + rect.height * 1.4 };
            const deltaX = fallbackTarget.x - centerX;
            const deltaY = fallbackTarget.y - centerY;
            if (Math.abs(deltaX) < 0.001 && Math.abs(deltaY) < 0.001) {
                return {
                    x: centerX,
                    y: rect.y + rect.height + offset
                };
            }

            const scaleX = deltaX === 0 ? Number.POSITIVE_INFINITY : (rect.width / 2) / Math.abs(deltaX);
            const scaleY = deltaY === 0 ? Number.POSITIVE_INFINITY : (rect.height / 2) / Math.abs(deltaY);
            const scale = Math.min(scaleX, scaleY);
            const edgeX = centerX + deltaX * scale;
            const edgeY = centerY + deltaY * scale;
            const distance = Math.hypot(deltaX, deltaY) || 1;

            return {
                x: edgeX + deltaX / distance * offset,
                y: edgeY + deltaY / distance * offset
            };

            const metrics = getElementRectInOrbitSpace(refs.heroYear);

        function buildOrbitCurve(startPoint, endPoint, width, height) {
            const deltaX = endPoint.x - startPoint.x;
            const deltaY = endPoint.y - startPoint.y;
            const horizontalReach = Math.max(width * 0.05, Math.abs(deltaX) * 0.2);
            const verticalReach = Math.max(height * 0.07, Math.abs(deltaY) * 0.22);

            const controlAX = startPoint.x + deltaX * 0.18 - Math.sign(deltaX || -1) * horizontalReach * 0.3;
            const controlAY = startPoint.y + verticalReach;
            const controlBX = endPoint.x - deltaX * 0.12 + (deltaX < 0 ? horizontalReach * 0.14 : -horizontalReach * 0.14);
            const controlBY = endPoint.y - Math.max(height * 0.05, Math.abs(deltaY) * 0.24);

            return `M${startPoint.x} ${startPoint.y} C${controlAX} ${controlAY}, ${controlBX} ${controlBY}, ${endPoint.x} ${endPoint.y}`;

        function updateOrbitOverlay(startPoint, endPoint, showEndDot = true) {
            const { width, height } = getOrbitViewportMetrics();
            if (!startPoint || !endPoint || width <= 0 || height <= 0) {
                resetOrbitOverlay();
                return;
            }

            const safeStart = clampOrbitPoint(startPoint, width, height, 6);
            const safeEnd = clampOrbitPoint(endPoint, width, height, 12);
            if (!safeStart || !safeEnd) {
                resetOrbitOverlay();
                return;
            }

            setOrbitViewBox(width, height);
            refs.orbitStartDot.setAttribute('cx', String(safeStart.x));
            refs.orbitStartDot.setAttribute('cy', String(safeStart.y));
            refs.orbitDot.setAttribute('cx', String(safeEnd.x));
            refs.orbitDot.setAttribute('cy', String(safeEnd.y));
            refs.orbitPath.setAttribute('d', buildOrbitCurve(safeStart, safeEnd, width, height));
            setOrbitOverlayVisible(true, showEndDot);
        }

        function resetOrbitOverlay() {
            const { width, height } = getOrbitViewportMetrics();
            setOrbitViewBox(width, height);
            refs.orbitPath.setAttribute('d', '');
            refs.orbitStartDot.setAttribute('cx', '0');
            refs.orbitStartDot.setAttribute('cy', '0');
            refs.orbitDot.setAttribute('cx', '0');
            refs.orbitDot.setAttribute('cy', '0');
            setOrbitOverlayVisible(false, false);

        function createStylizedEarthMaterial() {

                uniforms: {
                    waterMap: { value: createSolidTexture(255, 255, 255) },

                    varying vec2 vUv;
                    varying vec3 vViewNormal;
                    varying vec3 vWorldNormal;
                    void main() {

                        vViewNormal = normalize(normalMatrix * normal);

                    varying vec2 vUv;
                    varying vec3 vViewNormal;
                    varying vec3 vWorldNormal;

                    }

                    float oceanSample(vec2 uv) {

                    }

                    float coastline(vec2 uv) {
                        vec2 dx = vec2(max(waterTexel.x * 1.9, 0.0003), 0.0);
                        vec2 dy = vec2(0.0, max(waterTexel.y * 1.9, 0.0003));
                        float center = oceanSample(uv);
                        float east = oceanSample(uv + dx);
                        float west = oceanSample(uv - dx);
                        float north = oceanSample(uv + dy);
                        float south = oceanSample(uv - dy);
                        return smoothstep(0.05, 0.4, abs(center - east) + abs(center - west) + abs(center - north) + abs(center - south));

                    void main() {
                        vec3 viewNormal = normalize(vViewNormal);
                        vec3 worldNormal = normalize(vWorldNormal);
                        float oceanMask = oceanSample(vUv);
                        float landMask = 1.0 - oceanMask;
                        float topo = texture2D(topoMap, vUv).r;
                        float elevation = smoothstep(0.06, 0.88, topo);
                        float ridge = smoothstep(0.42, 0.92, topo);
                        float coast = coastline(vUv);
                        vec2 topoStep = vec2(max(waterTexel.x * 1.25, 0.0003), max(waterTexel.y * 1.25, 0.0003));
                        float topoEast = texture2D(topoMap, vUv + vec2(topoStep.x, 0.0)).r;
                        float topoWest = texture2D(topoMap, vUv - vec2(topoStep.x, 0.0)).r;
                        float topoNorth = texture2D(topoMap, vUv + vec2(0.0, topoStep.y)).r;
                        float topoSouth = texture2D(topoMap, vUv - vec2(0.0, topoStep.y)).r;
                        vec2 topoGradient = vec2(topoEast - topoWest, topoNorth - topoSouth);
                        float relief = smoothstep(0.01, 0.18, length(topoGradient));
                        float reliefLight = saturate(0.5 + topoGradient.x * 3.8 - topoGradient.y * 2.4);
                        float latitude = abs(vUv.y * 2.0 - 1.0);
                        vec3 sunDir = normalize(vec3(0.86, 0.18, 0.48));
                        vec3 bounceDir = normalize(vec3(-0.54, -0.24, 0.8));
                        vec3 keyDir = normalize(vec3(-0.44, 0.56, 0.95));
                        vec3 fillDir = normalize(vec3(0.72, -0.1, 0.62));
                        float sunLight = saturate(dot(worldNormal, sunDir) * 0.5 + 0.5);
                        float bounceLight = saturate(dot(worldNormal, bounceDir) * 0.5 + 0.5);
                        float keyLight = saturate(dot(viewNormal, keyDir) * 0.5 + 0.5);
                        float fillLight = saturate(dot(viewNormal, fillDir) * 0.5 + 0.5);
                        float faceLight = saturate(viewNormal.z * 0.5 + 0.5);
                        float horizon = pow(1.0 - faceLight, 1.85);

                        vec3 oceanMid = vec3(0.16, 0.34, 0.56);
                        vec3 oceanHighlight = vec3(0.69, 0.82, 0.91);
                        vec3 landShadow = vec3(0.28, 0.08, 0.01);
                        vec3 landBase = vec3(0.62, 0.2, 0.01);
                        vec3 landMid = vec3(0.965, 0.537, 0.0);

                        float oceanLight = saturate(0.08 + sunLight * 0.34 + keyLight * 0.34 + fillLight * 0.12 + (1.0 - latitude) * 0.1);
                        vec3 ocean = mix(oceanDeep, oceanMid, oceanLight);
                        float oceanSpec = pow(saturate(keyLight * 0.72 + faceLight * 0.28), 11.0) * (0.2 + (1.0 - latitude) * 0.12);

                        land = mix(land, landMid, warmMask * 0.98);
                        land = mix(land, landHighlight, smoothstep(0.4, 1.0, keyLight * 0.58 + reliefLight * relief * 0.56 + ridge * 0.18));
                        land = mix(land, vec3(0.22, 0.06, 0.0), shadowBand * (0.18 + (1.0 - sunLight) * 0.12));
                        land = mix(land, vec3(1.0, 0.8, 0.28), coast * 0.1);

        function createStylizedCloudTexture(texture) {
            if (!texture || typeof THREE === 'undefined' || typeof document === 'undefined' || !texture.image) {
                return texture;
            }
            const width = texture.image.width || 0;
            const height = texture.image.height || 0;
            if (!width || !height) return texture;

            const canvas = document.createElement('canvas');
            canvas.width = width;
            canvas.height = height;
            const context = canvas.getContext('2d', { willReadFrequently: true });
            if (!context) return texture;

            context.drawImage(texture.image, 0, 0, width, height);
            const imageData = context.getImageData(0, 0, width, height);
            const { data } = imageData;
            for (let index = 0; index < data.length; index += 4) {
                const average = (data[index] + data[index + 1] + data[index + 2]) / 3;
                const alpha = data[index + 3] / 255;
                const density = Math.max(alpha, 1 - average / 255);
                data[index] = 255;
                data[index + 1] = 255;
                data[index + 2] = 255;
                data[index + 3] = Math.round(Math.min(1, Math.pow(density, 0.88) * 1.08) * 255);
            }
            context.putImageData(imageData, 0, 0);

            const softenedCanvas = document.createElement('canvas');
            softenedCanvas.width = width;
            softenedCanvas.height = height;
            const softenedContext = softenedCanvas.getContext('2d');
            if (!softenedContext) {
                const directTexture = new THREE.CanvasTexture(canvas);
                directTexture.wrapS = THREE.RepeatWrapping;
                directTexture.wrapT = THREE.ClampToEdgeWrapping;
                applyTextureDefaults(directTexture, false);
                return directTexture;
            }

            softenedContext.clearRect(0, 0, width, height);
            softenedContext.filter = 'blur(1.6px)';
            softenedContext.drawImage(canvas, 0, 0, width, height);
            softenedContext.filter = 'none';
            softenedContext.globalAlpha = 0.72;
            softenedContext.drawImage(canvas, 0, 0, width, height);
            softenedContext.globalAlpha = 1;

            const stylizedTexture = new THREE.CanvasTexture(softenedCanvas);
            stylizedTexture.wrapS = THREE.RepeatWrapping;
            stylizedTexture.wrapT = THREE.ClampToEdgeWrapping;
            applyTextureDefaults(stylizedTexture, false);
            return stylizedTexture;
        }

        function latLngToSpherePosition(lat, lng, radius) {
            const latRad = lat * (Math.PI / 180);

            return {
                x: radius * cosLat * Math.cos(lngRad),
                y: radius * Math.sin(latRad),
                z: -radius * cosLat * Math.sin(lngRad)

        function normalizeLocationCoordinates(rawCoordinates) {
            if (!Array.isArray(rawCoordinates)) return [];
            const coordsList = Array.isArray(rawCoordinates[0]) ? rawCoordinates : [rawCoordinates];
            return coordsList
                .map((pair) => Array.isArray(pair) ? [Number(pair[0]), Number(pair[1])] : [Number.NaN, Number.NaN])
                .filter(([lat, lng]) =>
                    Number.isFinite(lat) &&
                    Number.isFinite(lng) &&
                    lat >= -90 &&
                    lat <= 90 &&
                    lng >= -180 &&
                    lng <= 180 &&
                    !(lat === 0 && lng === 0)
                );
        }

        function useFallbackEarthMaterial() {
            if (!globeMesh || typeof THREE === 'undefined') return;
            globeMesh.material = new THREE.ShaderMaterial({
                vertexShader: `
                    varying vec2 vUv;
                    varying vec3 vNormal;
                    void main() {
                        vUv = uv;
                        vNormal = normalize(normalMatrix * normal);
                        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                    }
                `,
                fragmentShader: `
                    varying vec2 vUv;
                    varying vec3 vNormal;
                    float isLand(vec2 uv) {
                        float lon = uv.x * 360.0 - 180.0;
                        float lat = uv.y * 180.0 - 90.0;
                        if (lon > -140.0 && lon < -55.0 && lat > 15.0 && lat < 70.0) return 0.9;
                        if (lon > -82.0 && lon < -35.0 && lat > -55.0 && lat < 12.0) return 0.9;
                        if (lon > -10.0 && lon < 40.0 && lat > 35.0 && lat < 70.0) return 0.9;
                        if (lon > -18.0 && lon < 52.0 && lat > -35.0 && lat < 37.0) return 0.9;
                        if (lon > 26.0 && lon < 145.0 && lat > 5.0 && lat < 73.0) return 0.9;
                        if (lon > 95.0 && lon < 141.0 && lat > -10.0 && lat < 20.0) return 0.7;
                        if (lon > 114.0 && lon < 154.0 && lat > -39.0 && lat < -11.0) return 0.9;
                        return 0.0;
                    }
                    void main() {
                        float land = isLand(vUv);
                        float lat = vUv.y * 180.0 - 90.0;
                        vec3 oceanDeep = vec3(0.03, 0.12, 0.25);
                        vec3 oceanShallow = vec3(0.19, 0.38, 0.57);
                        vec3 landBase = vec3(0.63, 0.3, 0.08);
                        vec3 landHighlight = vec3(0.98, 0.77, 0.26);
                        vec3 ocean = mix(oceanDeep, oceanShallow, smoothstep(-90.0, 90.0, lat) * 0.48 + 0.26);
                        vec3 landCol = mix(landBase, landHighlight, 0.35 + (1.0 - abs(lat) / 90.0) * 0.45);
                        vec3 color = mix(ocean, landCol, land);
                        float polar = smoothstep(70.0, 85.0, abs(lat));
                        color = mix(color, vec3(0.95, 0.97, 1.0), polar);
                        float rim = pow(1.0 - abs(dot(vNormal, vec3(0.0, 0.0, 1.0))), 3.0);
                        color += vec3(0.32, 0.49, 0.68) * rim * 0.35;
                        gl_FragColor = vec4(color, 1.0);
                    }
                `
            });
        }

        function createGlobeHalo() {
            if (!globeScene || typeof THREE === 'undefined') return;
            if (globeHaloMesh) {
                globeScene.remove(globeHaloMesh);
            }

            const haloGeometry = new THREE.SphereGeometry(GLOBE_HALO_RADIUS, 64, 64);
            const haloMaterial = new THREE.ShaderMaterial({
                transparent: true,
                depthWrite: false,
                blending: THREE.AdditiveBlending,
                side: THREE.BackSide,
                vertexShader: `
                    varying vec3 vWorldPosition;
                    varying vec3 vWorldNormal;
                    void main() {
                        vec4 worldPosition = modelMatrix * vec4(position, 1.0);
                        vWorldPosition = worldPosition.xyz;
                        vWorldNormal = normalize(mat3(modelMatrix) * normal);
                        gl_Position = projectionMatrix * viewMatrix * worldPosition;
                    }
                `,
                fragmentShader: `
                    varying vec3 vWorldPosition;
                    varying vec3 vWorldNormal;
                    void main() {
                        vec3 viewDir = normalize(cameraPosition - vWorldPosition);
                        float fresnel = pow(1.0 - max(dot(viewDir, normalize(vWorldNormal)), 0.0), 3.4);
                        float latitude = clamp(vWorldNormal.y * 0.5 + 0.5, 0.0, 1.0);
                        vec3 coolGlow = vec3(0.28, 0.56, 0.98);
                        vec3 warmGlow = vec3(1.0, 0.66, 0.22);
                        vec3 color = mix(coolGlow, warmGlow, smoothstep(0.0, 0.7, latitude) * 0.35);
                        gl_FragColor = vec4(color, fresnel * 0.11);
                    }
                `
            });

            globeHaloMesh = new THREE.Mesh(haloGeometry, haloMaterial);
            globeScene.add(globeHaloMesh);
        }

        function createCloudLayer(texture) {
            if (!globeScene || !texture || typeof THREE === 'undefined') return;
            if (globeCloudMesh) {
                globeScene.remove(globeCloudMesh);
            }

            const cloudInnerMaterial = new THREE.MeshBasicMaterial({
                map: texture,
                transparent: true,
                opacity: 0.3,
                color: new THREE.Color(0xf4f8ff),
                depthWrite: false,
                side: THREE.DoubleSide
            });
            const cloudOuterMaterial = new THREE.MeshBasicMaterial({
                map: texture,
                transparent: true,
                opacity: 0.18,
                color: new THREE.Color(0xffffff),
                depthWrite: false,
                blending: THREE.AdditiveBlending,
                side: THREE.DoubleSide
            });

            const cloudInnerMesh = new THREE.Mesh(new THREE.SphereGeometry(1.014, 64, 64), cloudInnerMaterial);
            const cloudOuterMesh = new THREE.Mesh(new THREE.SphereGeometry(1.028, 64, 64), cloudOuterMaterial);
            cloudOuterMesh.rotation.y = 0.12;

            globeCloudMesh = new THREE.Group();
            globeCloudMesh.add(cloudInnerMesh);
            globeCloudMesh.add(cloudOuterMesh);
            globeCloudMesh.rotation.z = 0.06;
            globeScene.add(globeCloudMesh);
        }

        function createMarkerMesh() {
            if (typeof THREE === 'undefined') return null;

            const markerGroup = new THREE.Group();
            const core = new THREE.Mesh(
                new THREE.SphereGeometry(0.022, 20, 20),
                new THREE.MeshBasicMaterial({
                    color: 0xff5e3a,
                    transparent: true,
                    opacity: 0
                })
            );
            const aura = new THREE.Mesh(
                new THREE.SphereGeometry(0.042, 20, 20),
                new THREE.MeshBasicMaterial({
                    color: 0xffb160,
                    transparent: true,
                    opacity: 0,
                    blending: THREE.AdditiveBlending,
                    depthWrite: false
                })
            );

            markerGroup.add(aura);
            markerGroup.add(core);
            markerGroup.userData.core = core;
            markerGroup.userData.aura = aura;
            return markerGroup;
        }

        function setMarkerState(marker, scale, opacity) {
            if (!marker) return;
            marker.scale.setScalar(scale);
            if (marker.userData && marker.userData.core) {
                marker.userData.core.material.opacity = opacity;
            }
            if (marker.userData && marker.userData.aura) {
                marker.userData.aura.material.opacity = opacity * 0.42;
                marker.userData.aura.scale.setScalar(1.08 + (scale - 1) * 0.55);
            }
        }

        function initGlobe() {
            if (!refs.singleGlobeContainer) {
                return false;
            }

            refs.globeShell.classList.remove('is-static');

            if (typeof THREE === 'undefined') {
                renderStaticGlobeFallback();
                setStaticGlobeFocus();
                return false;
            }

            const width = refs.singleGlobeContainer.clientWidth || 320;
            const height = refs.singleGlobeContainer.clientHeight || 320;

            globeScene = new THREE.Scene();
            globeCamera = new THREE.PerspectiveCamera(35, width / height, 0.1, 1000);
            globeCamera.position.set(0, 0, GLOBE_CAM_RADIUS);
            globeCamera.lookAt(0, 0, 0);

            try {
                globeRenderer = new THREE.WebGLRenderer({
                    antialias: true,
                    alpha: true,
                    powerPreference: 'high-performance',
                    precision: 'mediump',
                    stencil: false,
                    depth: true
                });
            } catch (error) {
                console.warn('Globe WebGL init failed, using static fallback.', error);
                renderStaticGlobeFallback();
                setStaticGlobeFocus();
                return false;
            }

            globeRenderer.setPixelRatio(getEffectivePixelRatio());
            globeRenderer.setSize(width, height);
            globeRenderer.setClearColor(0x000000, 0);
            if ('outputColorSpace' in globeRenderer && THREE.SRGBColorSpace) {
                globeRenderer.outputColorSpace = THREE.SRGBColorSpace;
            }
            globeRenderer.domElement.id = 'singleGlobeCanvas';
            refs.singleGlobeContainer.innerHTML = '';
            refs.singleGlobeContainer.appendChild(globeRenderer.domElement);

            const geometry = new THREE.SphereGeometry(1, 64, 64);
            const material = createStylizedEarthMaterial();
            if (!material) {
                renderStaticGlobeFallback();
                setStaticGlobeFocus();
                return false;
            }

            globeMesh = new THREE.Mesh(geometry, material);
            globeScene.add(globeMesh);
            createGlobeHalo();

            const textureLoader = new THREE.TextureLoader();
            textureLoader.load(
                GLOBE_TEXTURE_URLS.topo,
                (texture) => setEarthTextureUniform(material, 'topoMap', texture, false),
                undefined,
                () => console.warn('Unable to load local topology texture for globe.')
            );
            textureLoader.load(
                GLOBE_TEXTURE_URLS.water,
                (texture) => setEarthTextureUniform(material, 'waterMap', texture, false),
                undefined,
                () => useFallbackEarthMaterial()
            );
            textureLoader.load(
                GLOBE_TEXTURE_URLS.clouds,
                (texture) => {
                    applyTextureDefaults(texture, false);
                    texture.wrapS = THREE.RepeatWrapping;
                    texture.wrapT = THREE.ClampToEdgeWrapping;
                    createCloudLayer(createStylizedCloudTexture(texture));
                }
            );

            globeLastFrameTime = 0;
            resetOrbitOverlay();
            animateGlobe();
            return true;
        }

        function latLngToCamAngles(lat, lng) {
            const phi = (90 - lat) * (Math.PI / 180);
            const theta = (lng - 90) * (Math.PI / 180);
            return { phi, theta };
        }

        function clearGlobeMarkerMeshes() {
            if (globeMesh) {
                globeMarkers.forEach((marker) => globeMesh.remove(marker));
            }
            globeMarkers = [];
            globeMarker = null;
            globePrimaryCoordinate = null;
        }

        function clearGlobeMarkers() {
            clearGlobeMarkerMeshes();
            globeArrived = true;
            markerFlashDone = true;
            globeAnimationTime = 0;
            camTarget.phi = camCurrent.phi;
            camTarget.theta = camCurrent.theta;
            resetOrbitOverlay();
        }

        function setGlobeMarkers(coordsList) {
            if (!globeMesh) {
                globeMarkers = [];
                globeMarker = null;
                globePrimaryCoordinate = null;
                return;
            }

            clearGlobeMarkerMeshes();
            globePrimaryCoordinate = coordsList[0] || null;

            coordsList.forEach(([lat, lng]) => {
                const markerMesh = createMarkerMesh();
                if (!markerMesh) return;
                const position = latLngToSpherePosition(lat, lng, 1.05);
                markerMesh.position.set(position.x, position.y, position.z);
                globeMesh.add(markerMesh);
                globeMarkers.push(markerMesh);
            });

            globeMarker = globeMarkers[0] || null;
        }

        function rotateGlobeToCoordinates(coordinates) {
            const coordsList = normalizeLocationCoordinates(coordinates);
            const [lat, lng] = coordsList[0] || [];
            if (!coordsList.length || Number.isNaN(lat) || Number.isNaN(lng)) {
                clearGlobeMarkers();
                return;
            }

            if (!globeMesh) {
                globePrimaryCoordinate = coordsList[0] || null;
                globeArrived = true;
                markerFlashDone = true;
                globeAnimationTime = 0;
                setStaticGlobeFocus();
                return;
            }

            const angles = latLngToCamAngles(lat, lng);
            camTarget.phi = angles.phi;
            camTarget.theta = angles.theta;
            globeArrived = false;
            markerFlashDone = false;
            globeAnimationTime = 0;
            setGlobeMarkers(coordsList);
            resetOrbitOverlay();
        }

        function projectWorldPointToOverlay(worldPoint) {
            if (!worldPoint || !globeCamera || !refs.globeShell || !refs.orbitOverlay || typeof THREE === 'undefined') return null;
            globeCamera.updateMatrixWorld();
            if (globeMesh) globeMesh.updateWorldMatrix(true, false);
            const facing = worldPoint.clone().normalize().dot(globeCamera.position.clone().normalize());
            if (facing <= 0.02) return null;

            const projected = worldPoint.clone().project(globeCamera);
            if (!Number.isFinite(projected.x) || !Number.isFinite(projected.y) || projected.z < -1 || projected.z > 1) return null;
            const metrics = getOrbitViewportMetrics();
            const shellRect = refs.globeShell.getBoundingClientRect();
            const overlayRect = refs.orbitOverlay.getBoundingClientRect();
            if (!shellRect.width || !shellRect.height || !overlayRect.width || !overlayRect.height) return null;

            return clampOrbitPoint({
                x: ((projected.x * 0.5 + 0.5) * shellRect.width + (shellRect.left - overlayRect.left)) * metrics.scaleX,
                y: ((-projected.y * 0.5 + 0.5) * shellRect.height + (shellRect.top - overlayRect.top)) * metrics.scaleY
            }, metrics.width, metrics.height, 12);
        }

        function projectCoordinateToOverlay(coordinate, radius = 0.985) {
            if (!coordinate || !globeMesh || typeof THREE === 'undefined') return null;
            const [lat, lng] = coordinate;
            if (!Number.isFinite(lat) || !Number.isFinite(lng)) return null;

            const localPoint = latLngToSpherePosition(lat, lng, radius);
            const worldPoint = globeMesh.localToWorld(new THREE.Vector3(localPoint.x, localPoint.y, localPoint.z));
            return projectWorldPointToOverlay(worldPoint);
        }

        function projectMarkerToOverlay(marker) {
            if (!marker || typeof THREE === 'undefined') return null;
            marker.updateWorldMatrix(true, false);
            const worldPoint = new THREE.Vector3();
            marker.getWorldPosition(worldPoint);
            return projectWorldPointToOverlay(worldPoint);
        }

        function animateGlobe(now = performance.now()) {
            requestAnimationFrame(animateGlobe);
            if (document.hidden || !globeRenderer || !globeCamera || !globeMesh) return;

            const deltaSeconds = getGlobeDeltaTime(now);
            globeAnimationTime += deltaSeconds;
            const lerpFactor = 1 - Math.pow(0.0025, deltaSeconds * 3.4);
            let dTheta = camTarget.theta - camCurrent.theta;
            while (dTheta > Math.PI) dTheta -= 2 * Math.PI;
            while (dTheta < -Math.PI) dTheta += 2 * Math.PI;
            const dPhi = camTarget.phi - camCurrent.phi;

            const arrived = Math.abs(dTheta) < 0.01 && Math.abs(dPhi) < 0.01;
            if (!globeArrived && arrived) {
                globeArrived = true;
                globeAnimationTime = 0;
                camCurrent.phi = camTarget.phi;
                camCurrent.theta = camTarget.theta;
            }

            if (!globeArrived) {
                camCurrent.phi += dPhi * lerpFactor;
                camCurrent.theta += dTheta * lerpFactor;
            }

            const cx = -GLOBE_CAM_RADIUS * Math.sin(camCurrent.phi) * Math.sin(camCurrent.theta);
            const cy = GLOBE_CAM_RADIUS * Math.cos(camCurrent.phi);
            const cz = -GLOBE_CAM_RADIUS * Math.sin(camCurrent.phi) * Math.cos(camCurrent.theta);
            globeCamera.position.set(cx, cy, cz);
            globeCamera.lookAt(0, 0, 0);

            if (globeHaloMesh) {
                const haloScale = 1 + Math.sin(globeAnimationTime * 0.9) * 0.012;
                globeHaloMesh.scale.setScalar(haloScale);
                globeHaloMesh.rotation.y += deltaSeconds * 0.08;
            }

            if (globeCloudMesh) {
                globeCloudMesh.rotation.y += deltaSeconds * 0.018;
            }

            if (globeMarkers.length > 0) {
                if (globeArrived) {
                    const overlayPoint = projectMarkerToOverlay(globeMarker) || projectCoordinateToOverlay(globePrimaryCoordinate);
                    if (overlayPoint) {
                        const yearPoint = getYearAnchorPoint(overlayPoint);
                        if (yearPoint) {
                            updateOrbitOverlay(yearPoint, overlayPoint, false);
                        } else {
                            resetOrbitOverlay();
                        }
                    } else {
                        resetOrbitOverlay();
                    }
                } else {
                    resetOrbitOverlay();
                }

                if (globeArrived && !markerFlashDone) {
                    const t = globeAnimationTime * 2.8;
                    const cycle = Math.floor(t);
                    globeMarkers.forEach((marker) => {
                        if (cycle >= 2) {
                            setMarkerState(marker, 1, 1);
                        } else {
                            const phase = (t - cycle) * Math.PI;
                            const scale = 1.0 + 0.95 * Math.sin(phase);
                            const opacity = 1.0 - 0.6 * Math.sin(phase);
                            setMarkerState(marker, scale, opacity);
                        }
                    });
                    if (cycle >= 2) markerFlashDone = true;
                } else if (globeArrived) {
                    globeMarkers.forEach((marker) => setMarkerState(marker, 1, 1));
                }
            }

            globeRenderer.render(globeScene, globeCamera);
        }

        function handleGlobeResize() {
            if (!globeRenderer || !globeCamera || !refs.singleGlobeContainer) return;
            const width = refs.singleGlobeContainer.clientWidth;
            const height = refs.singleGlobeContainer.clientHeight;
            if (!width || !height) return;

            globeCamera.aspect = width / height;
            globeCamera.updateProjectionMatrix();
            globeRenderer.setPixelRatio(getEffectivePixelRatio());
            globeRenderer.setSize(width, height);
        }

        function syncStageScale() {
            const scale = Math.min(window.innerWidth / SCREEN_WIDTH, window.innerHeight / SCREEN_HEIGHT);
            document.documentElement.style.setProperty('--stage-scale', Math.max(0.1, scale).toFixed(6));
            handleGlobeResize();
            if (!globePrimaryCoordinate) {
                resetOrbitOverlay();
                return;
            }

            if (!globeMesh) {
                setStaticGlobeFocus();
            }
        }

        function renderHeader(vm) {
            const stageContext = extractStageContext(vm);
            refs.categoryTrack.textContent = vm.category || vm.subtitle || stageContext.label || tx('aiHistory');
            refs.statusText.textContent = vm.title || tx('aiHistoryReview');
            refs.counterText.textContent = `${currentIndex + 1} / ${milestoneList.length}`;
            refs.prevBtn.disabled = currentIndex === 0 || milestoneList.length <= 1;
            refs.nextBtn.disabled = currentIndex === milestoneList.length - 1 || milestoneList.length <= 1;
        }

        function renderHero(vm) {
            const stageContext = extractStageContext(vm);
            refs.leftKicker.textContent = stageContext.label;
            refs.heroYear.textContent = vm.year || '';
            refs.heroLocationName.textContent = vm.location && vm.location.name ? vm.location.name : (vm.title || tx('locationPending'));
            refs.heroLocationCountry.textContent = vm.location && vm.location.country ? vm.location.country : tx('locationInfoPending');
            refs.heroContextPeriod.textContent = stageContext.period ? `(${stageContext.period})` : '';
            refs.heroContextPeriod.style.display = stageContext.period ? 'block' : 'none';
            refs.heroYears.innerHTML = buildContextYears(vm.year, 3, 0)
                .map((year) => `<span>${escapeHtml(year)}</span>`)
                .join('');
            refs.ghostYears.innerHTML = buildContextYears(vm.year, 0, 4)
                .map((year) => `<span>${escapeHtml(year)}</span>`)
                .join('');
            refs.heroBottomYear.textContent = vm.year || '';
            refs.heroBottomCopy.textContent = vm.category || vm.subtitle || stageContext.label || tx('aiHistory');

            if (vm.location && Array.isArray(vm.location.coordinates)) {
                const validList = normalizeLocationCoordinates(vm.location.coordinates);
                if (validList.length > 0) {
                    rotateGlobeToCoordinates(validList);
                    return;
                }
            }

            clearGlobeMarkers();
        }

        function renderStory(vm) {
            const stageContext = extractStageContext(vm);
            refs.summaryKicker.textContent = stageContext.label;
            refs.summaryTitle.textContent = vm.title || '';
            refs.summaryLocation.innerHTML = buildLocationHtml(vm.location);
            refs.summaryBody.innerHTML = buildSummaryHtml(vm);
            refs.storyYear.textContent = vm.year || '';
        }

        function renderFigures(vm) {
            const figures = Array.isArray(vm.figures) && vm.figures.length > 0
                ? vm.figures.slice(0, 4)
                : [{
                    name: vm.title || tx('aiHistoryEvent'),
                    role: buildLocationLine(vm.location) || tx('keyHistoricalFigure')
                }];
            const hasFigureAvatars = figures.some((figure) => figure && figure.avatar);
            const portraitPool = hasFigureAvatars ? [] : sortPhotosForDisplay(vm.photos).filter(isPortraitLikePhoto);

            refs.figureRow.className = `figure-row count-${Math.min(4, figures.length)}`;
            refs.figureRow.innerHTML = figures.map((figure, index) => `
                <article class="figure-chip">
                    <div class="figure-avatar">${buildFigureAvatar(figure, getFigureAvatarSource(figure, vm, portraitPool, index))}</div>
                    <div class="figure-meta">
                        <div class="figure-name">${escapeHtml(figure.name || tx('keyFigure'))}</div>
                        <div class="figure-role">${escapeHtml(figure.role || tx('keyParticipant'))}</div>
                    </div>
                </article>
            `).join('');
        }

        function setImage(imgEl, src, alt) {
            const nextSrc = src || '';
            if (imgEl.getAttribute('src') !== nextSrc) {
                imgEl.decoding = 'async';
                imgEl.src = nextSrc;
            }
            imgEl.alt = alt || '';
            imgEl.style.visibility = src ? 'visible' : 'hidden';
        }

        function renderArchive(vm) {
            const photos = sortPhotosForDisplay(vm.photos);
            const hasPhotos = photos.length > 0;
            const safePhotos = hasPhotos ? photos : [''];
            currentArchiveIndex = Math.max(0, Math.min(currentArchiveIndex, safePhotos.length - 1));

            const focusUrl = hasPhotos ? safePhotos[currentArchiveIndex] : '';
            const prevIndex = (currentArchiveIndex - 1 + safePhotos.length) % safePhotos.length;
            const nextIndex = (currentArchiveIndex + 1) % safePhotos.length;

            let prevUrl = hasPhotos ? safePhotos[prevIndex] : '';
            let nextUrl = hasPhotos ? safePhotos[nextIndex] : '';

            // 照片不足 3 张时，不要用同一张图重复填充左右缩略图位。
            if (prevUrl === focusUrl) prevUrl = '';
            if (nextUrl === focusUrl) nextUrl = '';
            if (prevUrl && nextUrl && prevUrl === nextUrl) prevUrl = '';

            const prevCard = refs.archiveThumbPrev ? refs.archiveThumbPrev.closest('.archive-card') : null;
            const nextCard = refs.archiveThumbNext ? refs.archiveThumbNext.closest('.archive-card') : null;
            if (prevCard) prevCard.classList.toggle('is-hidden', !prevUrl);
            if (nextCard) nextCard.classList.toggle('is-hidden', !nextUrl);

            const prevMeta = buildArchivePhotoMeta(vm, prevUrl);
            const activeMeta = buildArchivePhotoMeta(vm, focusUrl);
            const nextMeta = buildArchivePhotoMeta(vm, nextUrl);

            refs.archiveThumbPrev.innerHTML = prevUrl ? `<img src="${prevUrl}" alt="${tx('previousArchive')}">` : '';
            refs.archiveThumbNext.innerHTML = nextUrl ? `<img src="${nextUrl}" alt="${tx('nextArchive')}">` : '';
            refs.archiveThumbPrev.classList.toggle('is-empty', !prevUrl);
            refs.archiveThumbNext.classList.toggle('is-empty', !nextUrl);
            refs.archiveThumbPrev.disabled = !hasPhotos || safePhotos.length <= 1 || !prevUrl;
            refs.archiveThumbNext.disabled = !hasPhotos || safePhotos.length <= 1 || !nextUrl;

            setImage(refs.archiveFocus, focusUrl, tx('mainArchivePhoto'));
            refs.archiveFocusButton.dataset.photoIndex = String(currentArchiveIndex);
            refs.archiveFocusButton.classList.toggle('is-empty', !hasPhotos);
            refs.archiveFocusButton.disabled = !hasPhotos;
            refs.archivePrevCaption.textContent = prevMeta.name;
            refs.archivePrevSubcaption.textContent = prevMeta.role;
            refs.archiveCaption.textContent = activeMeta.name;
            refs.archiveSubcaption.textContent = activeMeta.role;
            refs.archiveNextCaption.textContent = nextMeta.name;
            refs.archiveNextSubcaption.textContent = nextMeta.role;

            refs.archiveDots.innerHTML = hasPhotos
                ? safePhotos.map((_, index) => `<button class="archive-dot ${index === currentArchiveIndex ? 'active' : ''}" type="button" data-index="${index}"></button>`).join('')
                : '';

            refs.archiveDots.querySelectorAll('.archive-dot').forEach((button) => {
                button.addEventListener('click', () => {
                    currentArchiveIndex = Number(button.dataset.index);
                    renderArchive(vm);
                    bindPhotoClicks();
                });
            });

            refs.archiveThumbPrev.onclick = () => {
                currentArchiveIndex = prevIndex;
                renderArchive(vm);
                bindPhotoClicks();
            };

            refs.archiveThumbNext.onclick = () => {
                currentArchiveIndex = nextIndex;
                renderArchive(vm);
                bindPhotoClicks();
            };
        }

        function ensureMediaIframe() {
            let iframe = refs.videoFrame.querySelector('iframe');
            if (!iframe) {
                iframe = document.createElement('iframe');
                iframe.id = 'mediaVideo';
                iframe.allow = 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture';
                iframe.allowFullscreen = true;
                refs.videoFrame.appendChild(iframe);
                refs.mediaVideo = iframe;
            }
            return iframe;

        function updateUiEventProgress(eventList) {
            const panel = eventList ? eventList.closest('.ui-event-panel') : null;
            if (!panel || !eventList) return;
            const trackWidth = Math.max(0, panel.clientWidth - 32);
            const totalWidth = eventList.scrollWidth;
            const visibleWidth = eventList.clientWidth;
            if (!trackWidth || !totalWidth || totalWidth <= visibleWidth + 1) {
                panel.style.setProperty('--ui-event-progress-left', '0px');
                panel.style.setProperty('--ui-event-progress-width', `${trackWidth}px`);
                return;
            }
            const maxScroll = Math.max(1, totalWidth - visibleWidth);
            const progressWidth = Math.max(trackWidth * (visibleWidth / totalWidth), 56);
            const progressLeft = (trackWidth - progressWidth) * (eventList.scrollLeft / maxScroll);
            panel.style.setProperty('--ui-event-progress-left', `${progressLeft.toFixed(2)}px`);
            panel.style.setProperty('--ui-event-progress-width', `${progressWidth.toFixed(2)}px`);
        }

        function getScrollCenterLeft(scroller, item) {
            if (!scroller || !item) return 0;
            return item.offsetLeft - (scroller.clientWidth - item.offsetWidth) / 2;
        }

        function scrollElementIntoHorizontalCenter(scroller, item, behavior = 'smooth') {
            if (!scroller || !item) return;
            const maxScroll = Math.max(0, scroller.scrollWidth - scroller.clientWidth);
            const left = Math.max(0, Math.min(maxScroll, getScrollCenterLeft(scroller, item)));
            if (Math.abs(scroller.scrollLeft - left) < 1) return;
            scroller.scrollTo({ left, behavior });
        }

        function bindHorizontalDragScroll(scroller, options = {}) {
            if (!scroller || scroller.dataset.dragScrollBound === 'true') return;
            scroller.dataset.dragScrollBound = 'true';
            const dragThreshold = Number(options.threshold || 5);
            let dragState = null;

            const finishDrag = () => {
                if (!dragState) return;
                const wasDragging = dragState.dragging;
                dragState = null;
                scroller.classList.remove('is-dragging');
                scroller.dataset.dragMoved = wasDragging ? 'true' : '';
                if (wasDragging) {
                    window.setTimeout(() => {
                        scroller.dataset.dragMoved = '';
                    }, 120);
                }
            };

            scroller.addEventListener('pointerdown', (event) => {
                if (event.button !== undefined && event.button !== 0) return;
                if (scroller.scrollWidth <= scroller.clientWidth + 1) return;
                dragState = {
                    pointerId: event.pointerId,
                    startX: event.clientX,
                    startLeft: scroller.scrollLeft,
                    dragging: false
                };
                scroller.dataset.dragMoved = '';
            });

            scroller.addEventListener('pointermove', (event) => {
                if (!dragState || event.pointerId !== dragState.pointerId) return;
                const dx = event.clientX - dragState.startX;
                if (!dragState.dragging && Math.abs(dx) >= dragThreshold) {
                    dragState.dragging = true;
                    scroller.classList.add('is-dragging');
                    if (typeof scroller.setPointerCapture === 'function') {
                        try {
                            scroller.setPointerCapture(event.pointerId);
                        } catch (_) {}
                    }
                }
                if (!dragState.dragging) return;
                scroller.scrollLeft = dragState.startLeft - dx;
                if (event.cancelable) event.preventDefault();
                if (typeof options.onDrag === 'function') options.onDrag(scroller);
            });

            scroller.addEventListener('pointerup', finishDrag);
            scroller.addEventListener('pointercancel', finishDrag);
            scroller.addEventListener('lostpointercapture', finishDrag);
            scroller.addEventListener('click', (event) => {
                if (scroller.dataset.dragMoved !== 'true') return;
                event.preventDefault();
                event.stopPropagation();
                scroller.dataset.dragMoved = '';
            }, true);
        }

        function syncUiTimelineToSelectedYear(behavior = 'smooth') {
            const track = refs.uiBrowserTimeline.querySelector('.ui-year-track');
            if (!track) return;
            const activeTick = track.querySelector('.ui-year-tick.active')
                || track.querySelector('.ui-year-tick.highlight')
                || track.querySelector('.ui-year-tick');
            scrollElementIntoHorizontalCenter(track, activeTick, behavior);
            requestAnimationFrame(updateUiTimelineNavState);
        }

        function updateUiTimelineNavState() {
            const track = refs.uiBrowserTimeline.querySelector('.ui-year-track');
            const prevButton = refs.uiBrowserTimeline.querySelector('[data-ui-timeline-nav="prev"]');
            const nextButton = refs.uiBrowserTimeline.querySelector('[data-ui-timeline-nav="next"]');
            if (!track || !prevButton || !nextButton) return;
            const maxScroll = Math.max(0, track.scrollWidth - track.clientWidth);
            prevButton.disabled = track.scrollLeft <= 1;
            nextButton.disabled = track.scrollLeft >= maxScroll - 1;

        function scrollUiTimeline(direction) {
            const track = refs.uiBrowserTimeline.querySelector('.ui-year-track');

            track.scrollBy({
                left: direction === 'prev' ? -delta : delta,

            });

        function getUiEventCardAtScrollAnchor(eventList) {
            if (!eventList) return null;
            const cards = Array.from(eventList.querySelectorAll('.ui-event-card'));
            if (!cards.length) return null;
            const anchor = eventList.scrollLeft + Math.min(eventList.clientWidth * 0.5, eventList.clientWidth - 1);
            return cards.reduce((closest, card) => {
                const cardCenter = card.offsetLeft + card.offsetWidth / 2;
                const distance = Math.abs(cardCenter - anchor);
                return !closest || distance < closest.distance ? { card, distance } : closest;
            }, null).card;

        function bindUiEventProgress() {

            update();

            eventList.addEventListener('scroll', () => {
                update();
                if (syncTimer) window.clearTimeout(syncTimer);
                syncTimer = window.setTimeout(() => {

                    syncUiSelectionFromEventScroll(eventList);
                }, 80);

        function fitUiEventImage(image) {
            const frame = image && image.closest ? image.closest('.ui-event-image') : null;
            if (!frame || !image.naturalWidth || !image.naturalHeight) return;
            const maxWidth = frame.clientWidth;
            const maxHeight = frame.clientHeight;
            if (!maxWidth || !maxHeight) return;

            const imageRatio = image.naturalWidth / image.naturalHeight;
            const frameRatio = maxWidth / maxHeight;
            let width;
            let height;
            if (imageRatio >= frameRatio) {
                width = maxWidth;
                height = maxWidth / imageRatio;
            } else {
                height = maxHeight;
                width = maxHeight * imageRatio;
            }

            image.style.width = `${Math.min(maxWidth, width).toFixed(2)}px`;
            image.style.height = `${Math.min(maxHeight, height).toFixed(2)}px`;
        }

        function bindUiSidePanelScrollProgress(panel) {
            if (!panel) return;
            let frame = 0;
            const update = () => {
                frame = 0;
                const maxScroll = Math.max(0, panel.scrollHeight - panel.clientHeight);
                const progress = maxScroll <= 1
                    ? 1
                    : Math.min(1, Math.max(0, (panel.scrollTop + panel.clientHeight) / panel.scrollHeight));
                panel.style.setProperty('--ui-side-progress', progress.toFixed(4));
            };
            const requestUpdate = () => {
                if (frame) return;
                frame = window.requestAnimationFrame(update);
            };
            panel.addEventListener('scroll', requestUpdate, { passive: true });
            window.addEventListener('resize', requestUpdate);
            update();

        function bindUiDetailImageSwipe(imageRoot, imageCount) {
            if (!imageRoot || imageCount <= 1) return;
            let gesture = null;

            const startGesture = (pointerId, clientX, clientY) => {
                gesture = {
                    pointerId,
                    startX: clientX,
                    startY: clientY,
                    active: false
                };
            };

            const updateGesture = (clientX, clientY) => {
                if (!gesture) return false;
                const dx = clientX - gesture.startX;
                const dy = clientY - gesture.startY;
                if (!gesture.active && Math.abs(dx) > 10 && Math.abs(dx) > Math.abs(dy) * UI_DETAIL_IMAGE_SWIPE_AXIS_RATIO) {
                    gesture.active = true;
                }
                return gesture.active;
            };

            const finishGesture = (clientX, clientY) => {
                if (!gesture) return false;
                const dx = clientX - gesture.startX;
                const dy = clientY - gesture.startY;
                const shouldFlip = Math.abs(dx) >= UI_DETAIL_IMAGE_SWIPE_THRESHOLD
                    && Math.abs(dx) > Math.abs(dy) * UI_DETAIL_IMAGE_SWIPE_AXIS_RATIO;
                const nextIndex = dx < 0 ? uiDetailImageIndex + 1 : uiDetailImageIndex - 1;
                gesture = null;
                if (!shouldFlip) return false;
                setUiDetailImageIndex(nextIndex, imageCount);
                return true;
            };

            imageRoot.addEventListener('dragstart', (event) => {
                event.preventDefault();
            });

            imageRoot.addEventListener('pointerdown', (event) => {
                if (event.button !== undefined && event.button !== 0) return;
                startGesture(event.pointerId, event.clientX, event.clientY);
            });

            imageRoot.addEventListener('pointermove', (event) => {
                if (!gesture || event.pointerId !== gesture.pointerId) return;
                const isActive = updateGesture(event.clientX, event.clientY);
                if (isActive && typeof imageRoot.setPointerCapture === 'function') {
                    try {
                        imageRoot.setPointerCapture(event.pointerId);
                    } catch (_) {}
                }
                if (!isActive) return;
                event.stopPropagation();
                if (event.cancelable) event.preventDefault();
            });

            const finishPointerSwipe = (event) => {
                if (!gesture || event.pointerId !== gesture.pointerId) return;
                const wasActive = gesture.active;
                const didFlip = finishGesture(event.clientX, event.clientY);
                if (didFlip || wasActive) {
                    event.stopPropagation();
                    if (event.cancelable) event.preventDefault();
                }
                if (wasActive && typeof imageRoot.releasePointerCapture === 'function') {
                    try {
                        imageRoot.releasePointerCapture(event.pointerId);
                    } catch (_) {}
                }
            };

            imageRoot.addEventListener('pointerup', finishPointerSwipe);
            imageRoot.addEventListener('pointercancel', () => {
                gesture = null;
            });

            imageRoot.addEventListener('touchstart', (event) => {
                const touch = event.touches && event.touches[0];
                if (!touch) return;
                startGesture(touch.identifier, touch.clientX, touch.clientY);
            }, { passive: true });

            imageRoot.addEventListener('touchmove', (event) => {
                const touch = event.touches && event.touches[0];
                if (!touch || !gesture || touch.identifier !== gesture.pointerId) return;
                if (!updateGesture(touch.clientX, touch.clientY)) return;
                event.stopPropagation();
                if (event.cancelable) event.preventDefault();
            }, { passive: false });

            imageRoot.addEventListener('touchend', (event) => {
                const touch = Array.from(event.changedTouches || []).find((item) => gesture && item.identifier === gesture.pointerId);
                if (!touch) return;
                if (finishGesture(touch.clientX, touch.clientY)) {
                    event.stopPropagation();
                    if (event.cancelable) event.preventDefault();
                }
            }, { passive: false });

            imageRoot.addEventListener('touchcancel', () => {
                gesture = null;
            }, { passive: true });
        }

                viewer.querySelector('.photo-counter').textContent = `${currentPhotoIndex + 1} / ${photos.length}`;
            };
            viewer.querySelector('.photo-next').onclick = () => {
                currentPhotoIndex = (currentPhotoIndex + 1) % photos.length;
                viewer.querySelector('.viewer-photo').src = photos[currentPhotoIndex];
                viewer.querySelector('.photo-counter').textContent = `${currentPhotoIndex + 1} / ${photos.length}`;
            };

            const handleKey = (event) => {
                if (event.key === 'Escape') closeViewer();
                if (event.key === 'ArrowLeft') viewer.querySelector('.photo-prev').click();
                if (event.key === 'ArrowRight') viewer.querySelector('.photo-next').click();
            };

            document.addEventListener('keydown', handleKey);
            const observer = new MutationObserver(() => {
                if (!document.body.contains(viewer)) {
                    document.removeEventListener('keydown', handleKey);
                    observer.disconnect();
                }
            });
            observer.observe(document.body, { childList: true });
        }

        function renderPage(index) {
            currentIndex = Math.max(0, Math.min(Number(index) || 0, milestoneList.length - 1));
            syncUiBrowserCurrentIndex();
            const vm = getVm(currentIndex);
            currentMilestoneViewedAt = Date.now();
            if (window.umami) {
                umami.track('event_view', {
                    eventKey: vm.milestone ? vm.milestone.id : undefined,
                    storylineId: activeStorylineId,
                    year: vm.milestone ? getMilestoneSortYear(vm.milestone) : undefined
                });
            }
            markCompletionQuizView(vm);
            currentArchiveIndex = choosePreferredArchiveIndex(sortPhotosForDisplay(vm.photos));
            applyStaticTranslations();
            const branchTimelineActive = isBranchTimelineActive();
            const humanisticCycleActive = branchTimelineActive && activeStorylineId === 'humanistic-cycle';
            document.documentElement.classList.toggle('branch-timeline-active', branchTimelineActive);
            document.documentElement.classList.toggle('humanistic-cycle-active', humanisticCycleActive);
            document.body.classList.toggle('branch-timeline-active', branchTimelineActive);
            document.body.classList.toggle('humanistic-cycle-active', humanisticCycleActive);
            if (refs.viewport) {
                refs.viewport.classList.toggle('is-branch-timeline', branchTimelineActive);
                refs.viewport.classList.toggle('is-humanistic-cycle', humanisticCycleActive);
            }
            refs.stage.classList.toggle('is-branch-timeline', branchTimelineActive);
            refs.stage.classList.toggle('is-humanistic-cycle', humanisticCycleActive);
            refs.stage.classList.toggle('is-bench-dossier', isResearchDossierActive());
            refs.stage.classList.toggle('is-ui-browser', isUiBrowserActive());
            refs.stage.classList.toggle('is-ui-detail', isUiBrowserActive() && uiBrowserMode === 'detail');
            if (refs.branchTimelinePage) {
                refs.branchTimelinePage.classList.toggle('is-humanistic-cycle', humanisticCycleActive);
                refs.branchTimelinePage.hidden = !branchTimelineActive;
                if (!branchTimelineActive) {
                    refs.branchTimelinePage.innerHTML = '';
                }
            }
            if (branchTimelineActive) {
                clearGlobeMarkers();
                resetOrbitOverlay();
                resetInlineMedia();
                renderBranchTimelinePage();
                document.title = `${tx('appTitleSingle')} - ${getStorylineLabel(getActiveStorylineOption()) || vm.title}`;
                preloadAdjacentAssets(currentIndex);
                return;
            }
            renderHeader(vm);
            if (isUiBrowserActive()) {
                clearGlobeMarkers();
                resetOrbitOverlay();
                resetInlineMedia();
                renderUiBrowser();
            } else if (isResearchDossierActive()) {
                clearGlobeMarkers();
                resetOrbitOverlay();
                resetInlineMedia();
                renderBenchDossier(vm);
            } else {
                renderHero(vm);
                renderStory(vm);
                renderFigures(vm);
                renderArchive(vm);
                renderCommentary(vm);
                bindPhotoClicks();
            }
            renderTimeline(vm);
            document.title = `${tx('appTitleSingle')} - ${vm.year} ${vm.title}`;
            preloadAdjacentAssets(currentIndex);
        }

        function isPortraitStackLayout() {
            if (typeof window.matchMedia === 'function') {
                return window.matchMedia('(max-width: 1100px) and (orientation: portrait)').matches;
            }
            return window.innerWidth <= 1100 && window.innerHeight > window.innerWidth;
        }

        function getPortraitIgnoreElement(target) {
            if (!target) return null;
            const element = target.nodeType === 1 ? target : target.parentElement;
            if (!element || !PORTRAIT_EDGE_IGNORE_SELECTOR) return null;
            return element.closest(PORTRAIT_EDGE_IGNORE_SELECTOR);
        }

        function shouldIgnorePortraitEdgeTarget(target) {
            return Boolean(getPortraitIgnoreElement(target));
        }

        function shouldSuspendPortraitEdgeNavigation() {
            return isUiBrowserActive() && uiBrowserMode === 'detail' && isPortraitStackLayout();
        }

        function resetPortraitScrollPosition() {
            if (!isPortraitStackLayout()) return;

            const activeElement = document.activeElement;
            if (activeElement && activeElement !== document.body && typeof activeElement.blur === 'function') {
                activeElement.blur();
            }

            const resetScroll = () => {
                window.scrollTo(0, 0);
                document.documentElement.scrollTop = 0;
                document.body.scrollTop = 0;
                if (refs.viewport) {
                    refs.viewport.scrollTop = 0;
                }
            };

            resetScroll();
            window.requestAnimationFrame(resetScroll);
            window.setTimeout(resetScroll, 0);
        }

        function getDocumentScrollTop() {
            return window.scrollY
                || window.pageYOffset
                || document.documentElement.scrollTop
                || document.body.scrollTop
                || 0;
        }

        function getDocumentScrollMax() {
            const scrollHeight = Math.max(
                document.documentElement.scrollHeight,
                document.body.scrollHeight
            );
            return Math.max(0, scrollHeight - window.innerHeight);
        }

        function isNearPortraitBoundary(boundary) {
            const scrollTop = getDocumentScrollTop();
            const maxScroll = getDocumentScrollMax();

            if (boundary === 'top') {
                return scrollTop <= PORTRAIT_EDGE_NAV_TOLERANCE;
            }

            return scrollTop >= maxScroll - PORTRAIT_EDGE_NAV_TOLERANCE;
        }

        function scrollPortraitToBoundary(boundary) {
            if (!isPortraitStackLayout()) return;

            const targetTop = boundary === 'bottom' ? getDocumentScrollMax() : 0;
            const applyScroll = () => {
                window.scrollTo(0, targetTop);
                document.documentElement.scrollTop = targetTop;
                document.body.scrollTop = targetTop;
                if (refs.viewport) {
                    refs.viewport.scrollTop = targetTop;
                }
            };

            applyScroll();
            window.requestAnimationFrame(applyScroll);
            window.setTimeout(applyScroll, 0);
        }

        function releasePortraitEdgeGesture() {
            portraitEdgeGesture = null;
        }

        function notePortraitTouchActivity() {
            lastPortraitTouchAt = Date.now();
        }

        function isPortraitTouchEmulationContext() {
            const hasTouchPoints = typeof navigator !== 'undefined' && Number(navigator.maxTouchPoints) > 0;
            const supportsMatchMedia = typeof window.matchMedia === 'function';
            const hasCoarsePointer = supportsMatchMedia
                && (window.matchMedia('(pointer: coarse)').matches || window.matchMedia('(any-pointer: coarse)').matches);
            const hasNoHover = supportsMatchMedia
                && (window.matchMedia('(hover: none)').matches || window.matchMedia('(any-hover: none)').matches);
            return hasTouchPoints || hasCoarsePointer || hasNoHover;
        }

        function shouldIgnorePortraitPointerEvent(event) {
            if (!event || !window.SwipeNavigation || typeof window.SwipeNavigation.isTouchLikePointer !== 'function') {
                return true;
            }

            const isTouchLike = window.SwipeNavigation.isTouchLikePointer(event.pointerType);
            const isEmulatedMouse = event.pointerType === 'mouse' && isPortraitTouchEmulationContext();

            if (!event.isTrusted || (!isTouchLike && !isEmulatedMouse)) {
                return true;
            }

            return Date.now() - lastPortraitTouchAt < PORTRAIT_EDGE_POINTER_SUPPRESSION_MS;
        }

        function resetPortraitEdgeBoundary() {
            if (!portraitEdgeGesture) return;
            portraitEdgeGesture.boundary = '';
            portraitEdgeGesture.boundaryDrag = 0;
        }

        function getPortraitBoundaryForStep(deltaY) {
            if (deltaY < 0 && isNearPortraitBoundary('bottom')) {
                return 'bottom';
            }

            if (deltaY > 0 && isNearPortraitBoundary('top')) {
                return 'top';
            }

            return '';
        }

        function maybeNavigateAcrossPortraitBoundary(currentY, originalEvent) {
            if (shouldSuspendPortraitEdgeNavigation()) {
                releasePortraitEdgeGesture();
                return false;
            }
            if (!portraitEdgeGesture || !Number.isFinite(currentY)) return false;

            const deltaStep = currentY - portraitEdgeGesture.lastY;
            portraitEdgeGesture.lastY = currentY;

            if (!deltaStep) return false;

            const boundary = getPortraitBoundaryForStep(deltaStep);
            if (!boundary) {
                resetPortraitEdgeBoundary();
                return false;
            }

            if (portraitEdgeGesture.boundary !== boundary) {
                portraitEdgeGesture.boundary = boundary;
                portraitEdgeGesture.boundaryDrag = 0;
            }

            const outwardDelta = boundary === 'bottom' ? -deltaStep : deltaStep;
            if (outwardDelta <= 0) {
                resetPortraitEdgeBoundary();
                return false;
            }

            portraitEdgeGesture.boundaryDrag += outwardDelta;
            if (portraitEdgeGesture.boundaryDrag < PORTRAIT_EDGE_NAV_MIN_Y) {
                return false;
            }

            if (originalEvent && originalEvent.cancelable) {
                originalEvent.preventDefault();
            }

            const direction = boundary === 'bottom' ? 'next' : 'prev';
            const portraitScrollAnchor = boundary === 'bottom' ? 'top' : 'bottom';

            releasePortraitEdgeGesture();
            navigate(direction, { portraitScrollAnchor });
            return true;
        }

        function findTouchByIdentifier(touchList, identifier) {
            if (!touchList || identifier == null) return null;
            for (let index = 0; index < touchList.length; index += 1) {
                if (touchList[index].identifier === identifier) {
                    return touchList[index];
                }
            }
            return null;
        }

        function handlePortraitEdgeTouchStart(event) {
            if (!isPortraitStackLayout()) return;
            if (shouldSuspendPortraitEdgeNavigation()) return;
            if (!event.isTrusted) return;
            if (shouldIgnorePortraitEdgeTarget(event.target)) return;
            if (portraitEdgeGesture) return;

            const primaryTouch = event.changedTouches && event.changedTouches[0];
            if (!primaryTouch) return;
            notePortraitTouchActivity();

            portraitEdgeGesture = {
                identifier: primaryTouch.identifier,
                source: 'touch',
                startY: primaryTouch.clientY,
                lastY: primaryTouch.clientY,
                boundary: '',
                boundaryDrag: 0
            };
        }

        function handlePortraitEdgeTouchMove(event) {
            if (!portraitEdgeGesture || portraitEdgeGesture.source !== 'touch') return;
            notePortraitTouchActivity();

            const activeTouch = findTouchByIdentifier(event.touches, portraitEdgeGesture.identifier)
                || findTouchByIdentifier(event.changedTouches, portraitEdgeGesture.identifier);
            if (!activeTouch) return;

            maybeNavigateAcrossPortraitBoundary(activeTouch.clientY, event);
        }

        function handlePortraitEdgeTouchEnd(event) {
            if (!portraitEdgeGesture || portraitEdgeGesture.source !== 'touch') return;
            notePortraitTouchActivity();

            const endedTouch = findTouchByIdentifier(event.changedTouches, portraitEdgeGesture.identifier);
            if (endedTouch && maybeNavigateAcrossPortraitBoundary(endedTouch.clientY, event)) {
                return;
            }

            releasePortraitEdgeGesture();
        }

        function handlePortraitEdgePointerDown(event) {
            if (!isPortraitStackLayout()) return;
            if (shouldSuspendPortraitEdgeNavigation()) return;
            if (shouldIgnorePortraitPointerEvent(event)) return;
            if (shouldIgnorePortraitEdgeTarget(event.target)) return;
            if (portraitEdgeGesture) return;

            portraitEdgeGesture = {
                pointerId: event.pointerId,
                source: 'pointer',
                startY: event.clientY,
                lastY: event.clientY,
                boundary: '',
                boundaryDrag: 0
            };
        }

        function handlePortraitEdgePointerMove(event) {
            if (!portraitEdgeGesture || portraitEdgeGesture.source !== 'pointer') return;
            if (event.pointerId !== portraitEdgeGesture.pointerId) return;
            if (shouldIgnorePortraitPointerEvent(event)) return;

            maybeNavigateAcrossPortraitBoundary(event.clientY, event);
        }

        function handlePortraitEdgePointerEnd(event) {
            if (!portraitEdgeGesture || portraitEdgeGesture.source !== 'pointer') return;
            if (event.pointerId !== portraitEdgeGesture.pointerId) return;
            if (shouldIgnorePortraitPointerEvent(event)) return;

            if (maybeNavigateAcrossPortraitBoundary(event.clientY, event)) {
                return;
            }

            releasePortraitEdgeGesture();
        }

        function jumpTo(index, options = {}) {
            const { portraitScrollAnchor = 'top', skipCompletionQuiz = false } = options;
            if (index < 0 || index >= milestoneList.length || index === currentIndex) return;
            if (!skipCompletionQuiz && maybeOpenCompletionQuiz(() => {
                jumpTo(index, { ...options, skipCompletionQuiz: true });
            })) {
                return;
            }

            preloadMilestoneAssets(index);
            currentIndex = index;
            if (isUiBrowserActive() && milestoneList[index]) {
                uiBrowserMode = 'detail';
                uiSelectedEventId = milestoneList[index].id;
                uiSelectedYear = getMilestoneSortYear(milestoneList[index]) || uiSelectedYear;
                uiSelectedContinent = '';
                uiSelectedLocationKey = '';
                uiSelectedLocationEventIds = [];
            }
            renderPage(currentIndex);
            if (portraitScrollAnchor === 'bottom') {
                scrollPortraitToBoundary('bottom');
            } else {
                resetPortraitScrollPosition();
            }
        }

        function navigate(direction, options = {}) {
            if (milestoneList.length <= 1) return;
            if (isUiBrowserActive() && uiBrowserMode !== 'detail') {
                const years = getUiYears();
                const currentYearIndex = Math.max(0, years.indexOf(Number(uiSelectedYear)));
                const nextYearIndex = direction === 'next'
                    ? Math.min(currentYearIndex + 1, years.length - 1)
                    : Math.max(currentYearIndex - 1, 0);
                uiBrowserMode = 'year';
                uiSelectedYear = years[nextYearIndex] || uiSelectedYear;
                uiSelectedContinent = '';
                uiSelectedLocationKey = '';
                uiSelectedLocationEventIds = [];
                uiSelectedEventId = '';
                currentIndex = Math.max(0, milestoneList.findIndex((item) => getMilestoneSortYear(item) === Number(uiSelectedYear)));
                renderPage(currentIndex);
                resetPortraitScrollPosition();
                return;
            }
            const nextIndex = direction === 'next'
                ? Math.min(currentIndex + 1, milestoneList.length - 1)
                : Math.max(currentIndex - 1, 0);
            if (isUiBrowserActive()) {
                uiBrowserMode = 'detail';
                uiSelectedEventId = milestoneList[nextIndex] ? milestoneList[nextIndex].id : uiSelectedEventId;
                uiSelectedYear = milestoneList[nextIndex] ? getMilestoneSortYear(milestoneList[nextIndex]) : uiSelectedYear;
                uiSelectedContinent = '';
                uiSelectedLocationKey = '';
                uiSelectedLocationEventIds = [];
            }
            jumpTo(nextIndex, options);
        }

        function initAutoHideScrollbars() {
            const selector = [
                '.story-summary',
                '.commentary-list',
                '.bench-core-summary',
                '.bench-map-list',
                '.bench-source-list',
                '.bench-evidence-list'
            ].join(',');
            const timers = new WeakMap();

            document.querySelectorAll(selector).forEach((element) => {
                element.addEventListener('scroll', () => {
                    element.classList.add('is-scrolling');
                    const existingTimer = timers.get(element);
                    if (existingTimer) window.clearTimeout(existingTimer);
                    timers.set(element, window.setTimeout(() => {
                        element.classList.remove('is-scrolling');
                        timers.delete(element);
                    }, 900));
                }, { passive: true });
            });
        }

        function initSwipeNavigation() {
            if (!window.SwipeNavigation || typeof window.SwipeNavigation.setupSwipeNavigation !== 'function') {
                return;
            }

            window.SwipeNavigation.setupSwipeNavigation({
                surface: refs.stage,
                onNavigate(direction) {
                    if (hasOpenQuizModal()) return;
                    if (isPortraitStackLayout()) return;
                    navigate(direction);
                }
            });
        }

        function clearIdleAdvanceTimer() {
            if (idleAdvanceTimer) {
                window.clearTimeout(idleAdvanceTimer);
                idleAdvanceTimer = null;
            }
        }

        function handleIdleAutoAdvance() {
            if (hasOpenMobileQuiz()) {
                clearIdleAdvanceTimer();
                return;
            }
            if (milestoneList.length <= 1) {
                clearIdleAdvanceTimer();
                return;
            }

            closeTransientOverlaysForIdleAdvance();
            const nextIndex = currentIndex >= milestoneList.length - 1 ? 0 : currentIndex + 1;
            jumpTo(nextIndex, { skipCompletionQuiz: true });
            restartIdleAdvanceTimer();
        }

        function restartIdleAdvanceTimer() {
            clearIdleAdvanceTimer();
            if (milestoneList.length <= 1) return;
            idleAdvanceTimer = window.setTimeout(handleIdleAutoAdvance, IDLE_AUTO_ADVANCE_MS);
        }

        function registerUserActivity(event) {
            if (event && event.isTrusted === false) return;
            if (hasOpenMobileQuiz()) return;
            restartIdleAdvanceTimer();
        }

        if (!milestoneList.length) {
            refs.stage.innerHTML = '<div class="empty-state">暂无里程碑数据</div>';
        } else {
            renderStorylineSelect();
            if (refs.storylineSelect) {
                refs.storylineSelect.addEventListener('change', () => {
                    setActiveStoryline(refs.storylineSelect.value, { updateUrl: true });
                });
            }
            if (refs.storylineTrigger) refs.storylineTrigger.addEventListener('click', openStorylinePicker);
            if (refs.storylineModalClose) refs.storylineModalClose.addEventListener('click', closeStorylinePicker);
            if (refs.storylineModal) {
                refs.storylineModal.addEventListener('click', (event) => {
                    if (event.target === refs.storylineModal) closeStorylinePicker();
                });
            }
            if (refs.aboutTrigger) refs.aboutTrigger.addEventListener('click', openAboutModal);
            if (refs.aboutModalClose) refs.aboutModalClose.addEventListener('click', closeAboutModal);
            if (refs.aboutModal) {
                refs.aboutModal.addEventListener('click', (event) => {
                    if (event.target === refs.aboutModal) closeAboutModal();
                });
            }
            refs.prevBtn.addEventListener('click', () => navigate('prev'));
            refs.nextBtn.addEventListener('click', () => navigate('next'));
            if (refs.uiBackButton) {
                refs.uiBackButton.addEventListener('click', () => returnFromUiDetail({ preferHistory: true }));
            }
            if (refs.quizModalClose) refs.quizModalClose.addEventListener('click', completeQuizModal);
            if (refs.quizModalSkip) refs.quizModalSkip.addEventListener('click', completeQuizModal);
            if (refs.quizModalContinue) refs.quizModalContinue.addEventListener('click', () => {
                if (!refs.quizModalContinue.disabled) completeQuizModal();
            });
            if (refs.mobileQuizReset) refs.mobileQuizReset.addEventListener('click', resetMobileQuiz);
            if (refs.mobileQuizExit) refs.mobileQuizExit.addEventListener('click', closeMobileQuiz);
            if (refs.regionModalClose) refs.regionModalClose.addEventListener('click', closeRegionPicker);
            if (refs.regionModal) {
                refs.regionModal.addEventListener('click', (event) => {
                    if (event.target === refs.regionModal) closeRegionPicker();
                });
            }

            window.addEventListener('resize', debounce(() => {
                syncStageScale();
                const eventList = refs.uiBrowserMain ? refs.uiBrowserMain.querySelector('.ui-event-list') : null;
                if (eventList) updateUiEventProgress(eventList);
                if (refs.uiBrowserMain) fitUiEventImages();
            }, 120));
            window.addEventListener('orientationchange', () => {
                window.setTimeout(() => {
                    syncStageScale();
                    handleGlobeResize();
                    resetOrbitOverlay();
                    if (refs.uiBrowserMain) fitUiEventImages();
                }, 180);
            }, { passive: true });
            window.addEventListener('beforeunload', clearIdleAdvanceTimer);
            window.addEventListener('popstate', handleUiBrowserHistoryPop);
            document.addEventListener('pointerdown', registerUserActivity, { passive: true });
            document.addEventListener('pointermove', registerUserActivity, { passive: true });
            document.addEventListener('click', registerUserActivity, { passive: true });
            document.addEventListener('wheel', registerUserActivity, { passive: true });
            document.addEventListener('touchstart', registerUserActivity, { passive: true });
            document.addEventListener('touchmove', registerUserActivity, { passive: true });
            document.addEventListener('touchstart', handlePortraitEdgeTouchStart, { passive: true });
            document.addEventListener('touchmove', handlePortraitEdgeTouchMove, { passive: false });
            document.addEventListener('touchend', handlePortraitEdgeTouchEnd, { passive: true });
            document.addEventListener('touchcancel', releasePortraitEdgeGesture, { passive: true });
            document.addEventListener('pointerdown', handlePortraitEdgePointerDown, { passive: true });
            document.addEventListener('pointermove', handlePortraitEdgePointerMove, { passive: true });
            document.addEventListener('pointerup', handlePortraitEdgePointerEnd, { passive: true });
            document.addEventListener('pointercancel', releasePortraitEdgeGesture, { passive: true });

            document.addEventListener('keydown', (event) => {
                registerUserActivity(event);
                if (hasOpenMobileQuiz()) {
                    if (event.key === 'Escape') closeMobileQuiz();
                    return;
                }
                if (hasOpenPhotoViewer()) return;
                if (hasOpenStorylinePicker()) {
                    if (event.key === 'Escape') closeStorylinePicker();
                    return;
                }
                if (hasOpenAboutModal()) {
                    if (event.key === 'Escape') closeAboutModal();
                    return;
                }
                if (hasOpenRegionModal()) {
                    if (event.key === 'Escape') closeRegionPicker();
                    return;
                }
                if (hasOpenQuizModal()) {
                    if (event.key === 'Escape') completeQuizModal();
                    if (event.key === 'Enter' && refs.quizModalContinue && !refs.quizModalContinue.disabled) {
                        completeQuizModal();
                    }
                    return;
                }
                if (event.key === 'ArrowRight') navigate('next');
                if (event.key === 'ArrowLeft') navigate('prev');
            });

            window.addEventListener('languageChanged', () => {
                vmCache.clear();
                renderStorylineSelect();
                renderAboutModal();
                renderPage(currentIndex);
                if (mobileQuizState) renderMobileQuizState();
            });

            syncStageScale();
            initGlobe();
            initSwipeNavigation();
            initAutoHideScrollbars();
            renderPage(currentIndex);
            if (isMobileQuizRequest()) {
                openMobileQuiz();
            }
            if (!mobileQuizState) {
                restartIdleAdvanceTimer();
            }
        }
    </script>
</body>
</html>

                timeline.classList.remove('is-wheel-scrolling');
            }, 180);
        }

        function handleBranchTimelineWheel(event) {
            if (event.defaultPrevented || !isBranchTimelineActive()) return;
            if (shouldLetBranchTimelineTextHandleWheel(event)) return;

            const page = refs.branchTimelinePage;
            const timeline = page ? page.querySelector('.branch-timeline') : null;
            if (!timeline) return;

            const maxScroll = timeline.scrollWidth - timeline.clientWidth;
            if (maxScroll <= 1) return;

            const delta = getBranchTimelineWheelDelta(event, timeline);
            if (!delta) return;

            const atStart = timeline.scrollLeft <= 0;
            const atEnd = timeline.scrollLeft >= maxScroll - 1;
            if ((delta < 0 && atStart) || (delta > 0 && atEnd)) return;

            event.preventDefault();
            suspendBranchTimelineSnap(timeline);
            timeline.scrollLeft = Math.min(maxScroll, Math.max(0, timeline.scrollLeft + delta));
        }

        function shouldLetBranchTimelineTextHandleWheel(event) {
            const scroller = getBranchTimelineScrollableTextTarget(event.target);
            if (!scroller) return false;

            const deltaX = Number.isFinite(event.deltaX) ? event.deltaX : 0;
            const deltaY = Number.isFinite(event.deltaY) ? event.deltaY : 0;
            const absX = Math.abs(deltaX);
            const absY = Math.abs(deltaY);
            if (!absX && !absY) return false;

            if (absY >= absX) return true;
            if (absY >= BRANCH_TIMELINE_VERTICAL_CANCEL_Y && absX < absY * BRANCH_TIMELINE_TEXT_HORIZONTAL_INTENT_RATIO) return true;
            if (deltaY < 0) return scroller.scrollTop > 1;
            if (deltaY > 0) return scroller.scrollTop < scroller.scrollHeight - scroller.clientHeight - 1;

            return false;
        }

        function getBranchTimelineScrollableTextTarget(target) {
            const element = target && target.nodeType === 1 ? target : target && target.parentElement;
            if (!element || typeof element.closest !== 'function') return null;

            const scroller = element.closest(BRANCH_TIMELINE_SCROLLABLE_TEXT_SELECTOR);
            if (!scroller) return null;

            return scroller.scrollHeight > scroller.clientHeight + 2 ? scroller : null;
        }

        function getBranchTimelineHorizontalIntentRatio(gesture) {
            return gesture && gesture.fromScrollableText
                ? BRANCH_TIMELINE_TEXT_HORIZONTAL_INTENT_RATIO
                : BRANCH_TIMELINE_HORIZONTAL_INTENT_RATIO;
        }

        function getBranchTimelineDragStartX(gesture) {
            return gesture && gesture.fromScrollableText
                ? BRANCH_TIMELINE_TEXT_DRAG_START_X
                : BRANCH_TIMELINE_DRAG_START_X;
        }

        function hasBranchTimelineHorizontalIntent(gesture, absX, absY) {
            const startX = getBranchTimelineDragStartX(gesture);
            const intentRatio = getBranchTimelineHorizontalIntentRatio(gesture);
            return absX >= startX && (absY < BRANCH_TIMELINE_VERTICAL_CANCEL_Y || absX >= absY * intentRatio);
        }

        function shouldCancelBranchTimelineDragIntent(gesture, absX, absY) {
            if (absY < BRANCH_TIMELINE_VERTICAL_CANCEL_Y) return false;
            return absX < absY * getBranchTimelineHorizontalIntentRatio(gesture);
        }

        function captureBranchTimelinePointer(gesture) {
            if (!gesture || gesture.captured || typeof gesture.timeline.setPointerCapture !== 'function') return;

            try {
                gesture.timeline.setPointerCapture(gesture.pointerId);
                gesture.captured = true;
            } catch (_) {}
        }

        function handleBranchTimelinePointerDown(event) {
            if (!isBranchTimelineActive()) return;
            if (event.pointerType === 'mouse' && event.button !== 0) return;
            if (event.target && event.target.closest && event.target.closest('a, button, input, select, textarea')) return;

            const timeline = event.currentTarget;
            if (!timeline) return;

            const maxScroll = timeline.scrollWidth - timeline.clientWidth;
            if (maxScroll <= 1) return;

            branchTimelineDragGesture = {
                timeline,
                pointerId: event.pointerId,
                startX: event.clientX,
                startY: event.clientY,
                startScrollLeft: timeline.scrollLeft,
                fromScrollableText: Boolean(getBranchTimelineScrollableTextTarget(event.target)),
                dragging: false,
                captured: false
            };

            window.clearTimeout(branchTimelineDragReleaseTimer);
        }

        function releaseBranchTimelineDrag(shouldSuppressClick = false) {
            const gesture = branchTimelineDragGesture;
            if (!gesture) return;

            const { timeline, pointerId, dragging } = gesture;
            branchTimelineDragGesture = null;

            if (gesture.captured && typeof timeline.releasePointerCapture === 'function') {
                try {
                    timeline.releasePointerCapture(pointerId);
                } catch (_) {}
            }

            if (dragging || shouldSuppressClick) {
                branchTimelineSuppressClickUntil = Date.now() + 280;
            }

            window.clearTimeout(branchTimelineDragReleaseTimer);
            branchTimelineDragReleaseTimer = window.setTimeout(() => {
                timeline.classList.remove('is-drag-scrolling');
            }, dragging ? 140 : 0);
        }

        function handleBranchTimelinePointerMove(event) {
            const gesture = branchTimelineDragGesture;
            if (!gesture || event.pointerId !== gesture.pointerId) return;

            const dx = event.clientX - gesture.startX;
            const dy = event.clientY - gesture.startY;
            const absX = Math.abs(dx);
            const absY = Math.abs(dy);

            if (!gesture.dragging) {
                const startX = getBranchTimelineDragStartX(gesture);
                if (absX < startX && absY < BRANCH_TIMELINE_VERTICAL_CANCEL_Y) return;
                if (shouldCancelBranchTimelineDragIntent(gesture, absX, absY)) {
                    releaseBranchTimelineDrag(false);
                    return;
                }
                if (!hasBranchTimelineHorizontalIntent(gesture, absX, absY)) return;

                gesture.dragging = true;
                captureBranchTimelinePointer(gesture);
                gesture.timeline.classList.add('is-drag-scrolling');
            }

            if (event.cancelable) {
                event.preventDefault();
            }

            const maxScroll = gesture.timeline.scrollWidth - gesture.timeline.clientWidth;
            gesture.timeline.scrollLeft = Math.min(maxScroll, Math.max(0, gesture.startScrollLeft - dx));
        }

        function handleBranchTimelinePointerUp(event) {
            const gesture = branchTimelineDragGesture;
            if (!gesture || event.pointerId !== gesture.pointerId) return;

            if (gesture.dragging && event.cancelable) {
                event.preventDefault();
            }

            releaseBranchTimelineDrag(gesture.dragging);
        }

        function handleBranchTimelinePointerCancel(event) {
            const gesture = branchTimelineDragGesture;
            if (!gesture || event.pointerId !== gesture.pointerId) return;
            releaseBranchTimelineDrag(false);
        }

        function handleBranchTimelineClick(event) {
            if (Date.now() > branchTimelineSuppressClickUntil) return;
            event.preventDefault();
            event.stopPropagation();
        }

        function appendPlaybackRestartToken(url) {
            const value = String(url || '').trim();
            if (!value) return '';
            const separator = value.includes('?') ? '&' : '?';
            return `${value}${separator}_restart=${Date.now()}`;
        }

        async function canLoadBranchVideo(url, hasFallback) {
            const value = String(url || '').trim();
            if (!value) return false;
            if (!hasFallback) return true;

            try {
                const response = await fetch(value, { method: 'HEAD', cache: 'no-store' });
                if (response.ok) return true;
                if (response.status !== 405) return false;
            } catch (_) {
                return false;
            }

            try {
                const response = await fetch(value, {
                    method: 'GET',
                    headers: { Range: 'bytes=0-0' },
                    cache: 'no-store'
                });
                return response.ok || response.status === 206;
            } catch (_) {
                return false;
            }
        }

        async function openBranchGameEvolutionVideo(vm) {
            const raw = vm && vm.raw ? vm.raw : {};
            const module = getAchievementGameEvolutionModule(raw);
            if (!module) return;

            const title = module.title || vm.title || uiText('Game evolution video', '棋局演化视频');
            const videoUrl = String(module.url || '').trim();
            const fallbackUrl = String(module.fallbackUrl || '').trim();
            const poster = String(module.poster || '').trim();
            const playableImage = fallbackUrl || poster;
            const fallbackImageUrl = appendPlaybackRestartToken(playableImage);
            const shouldUseVideo = isDirectVideoMedia(videoUrl)
                && await canLoadBranchVideo(videoUrl, Boolean(playableImage));
            const sourceSgf = String(module.sourceSgf || '').trim();
            const generator = String(module.generator || '').trim();
            const sourceLine = sourceSgf
                ? uiText(`Generated from SGF: ${sourceSgf}`, `由 SGF 棋谱生成：${sourceSgf}`)
                : uiText('Generated from curated game-state data.', '由策展棋局状态数据生成。');
            const generatorLine = generator
                ? uiText(`Renderer: ${generator}`, `生成脚本：${generator}`)
                : '';

            const viewer = document.createElement('div');
            viewer.className = 'photo-viewer branch-video-viewer';
            viewer.innerHTML = `
                <button class="close-viewer" type="button">×</button>
                <div class="branch-video-panel">
                    ${shouldUseVideo ? `<video class="branch-video-player" src="${escapeHtml(videoUrl)}" controls autoplay muted loop playsinline preload="metadata"></video>` : ''}
                    ${fallbackImageUrl ? `<img class="branch-video-fallback" src="${escapeHtml(fallbackImageUrl)}" alt="${escapeHtml(title)}"${shouldUseVideo ? ' hidden' : ''}>` : ''}
                    <div class="branch-video-meta">
                        <strong>${escapeHtml(title)}</strong>
                        <span>${escapeHtml(sourceLine)}</span>
                        ${generatorLine ? `<span>${escapeHtml(generatorLine)}</span>` : ''}
                    </div>
                </div>
            `;
            document.body.appendChild(viewer);

            const video = viewer.querySelector('.branch-video-player');
            const fallback = viewer.querySelector('.branch-video-fallback');
            if (video && fallback) {
                video.addEventListener('error', () => {
                    video.hidden = true;
                    fallback.src = appendPlaybackRestartToken(playableImage);
                    fallback.hidden = false;
                });
            }
            if (video) {
                const restartVideo = () => {
                    try {
                        video.currentTime = 0;
                    } catch (_) {}
                    if (typeof video.play === 'function') {
                        video.play().catch(() => {});
                    }
                };
                video.addEventListener('loadedmetadata', restartVideo, { once: true });
                restartVideo();
            }

            const closeViewer = () => {
                if (video && typeof video.pause === 'function') video.pause();
                viewer.remove();
            };

            viewer.querySelector('.close-viewer').onclick = closeViewer;
            viewer.addEventListener('click', (event) => {
                if (event.target === viewer) closeViewer();
            });

            const handleKey = (event) => {
                if (event.key === 'Escape') closeViewer();
            };
            document.addEventListener('keydown', handleKey);
            const observer = new MutationObserver(() => {
                if (!document.body.contains(viewer)) {
                    document.removeEventListener('keydown', handleKey);
                    observer.disconnect();
                }
            });
            observer.observe(document.body, { childList: true });
        }

        function bindBranchTimelineInteractions() {
            const page = refs.branchTimelinePage;
            if (!page) return;

            if (page.dataset.wheelBound !== 'true') {
                page.dataset.wheelBound = 'true';

                timeline.dataset.wheelBound = 'true';
                timeline.addEventListener('wheel', handleBranchTimelineWheel, { passive: false });
            }

            if (timeline && timeline.dataset.dragBound !== 'true') {
                timeline.dataset.dragBound = 'true';
                timeline.addEventListener('pointerdown', handleBranchTimelinePointerDown);
                timeline.addEventListener('pointermove', handleBranchTimelinePointerMove, { passive: false });
                timeline.addEventListener('pointerup', handleBranchTimelinePointerUp);
                timeline.addEventListener('pointercancel', handleBranchTimelinePointerCancel);
                timeline.addEventListener('lostpointercapture', handleBranchTimelinePointerCancel);
                timeline.addEventListener('click', handleBranchTimelineClick, true);

            if (timeline && timeline.dataset.centerBound !== 'true') {

        function scorePhoto(url) {

        function getOrbitViewportMetrics() {
            const layoutWidth = refs.orbitOverlay ? refs.orbitOverlay.clientWidth || 476 : 476;
            const layoutHeight = refs.orbitOverlay ? refs.orbitOverlay.clientHeight || 520 : 520;
            const overlayRect = refs.orbitOverlay ? refs.orbitOverlay.getBoundingClientRect() : null;
            const rectWidth = overlayRect && overlayRect.width ? overlayRect.width : layoutWidth;
            const rectHeight = overlayRect && overlayRect.height ? overlayRect.height : layoutHeight;
            return {
                width: layoutWidth,
                height: layoutHeight,
                rectWidth,
                rectHeight,
                scaleX: rectWidth ? layoutWidth / rectWidth : 1,
                scaleY: rectHeight ? layoutHeight / rectHeight : 1
            };
        }

        function setOrbitViewBox(width, height) {
            refs.orbitSvg.setAttribute('viewBox', `0 0 ${Math.max(1, width)} ${Math.max(1, height)}`);
        }

        function clampOrbitPoint(point, width, height, padding = 12) {
            if (!point || !Number.isFinite(point.x) || !Number.isFinite(point.y)) return null;
            return {
                x: Math.min(width - padding, Math.max(padding, point.x)),
                y: Math.min(height - padding, Math.max(padding, point.y))
            };
        }

        function getElementRectInOrbitSpace(element) {
            if (!element || !refs.orbitOverlay) return null;
            const metrics = getOrbitViewportMetrics();
            const overlayRect = refs.orbitOverlay.getBoundingClientRect();
            const elementRect = element.getBoundingClientRect();
            if (!overlayRect.width || !overlayRect.height || !elementRect.width || !elementRect.height) return null;

            return {
                width: metrics.width,
                height: metrics.height,
                rect: {
                    x: (elementRect.left - overlayRect.left) * metrics.scaleX,
                    y: (elementRect.top - overlayRect.top) * metrics.scaleY,
                    width: elementRect.width * metrics.scaleX,
                    height: elementRect.height * metrics.scaleY
                }
            };
        }

        function getAnchorPointOnRect(rect, targetPoint, offset = 8) {
            if (!rect) return null;
            const centerX = rect.x + rect.width / 2;
            const centerY = rect.y + rect.height / 2;
            const fallbackTarget = targetPoint || { x: centerX - rect.width * 0.42, y: centerY + rect.height * 1.4 };
            const deltaX = fallbackTarget.x - centerX;
            const deltaY = fallbackTarget.y - centerY;
            if (Math.abs(deltaX) < 0.001 && Math.abs(deltaY) < 0.001) {
                return {
                    x: centerX,
                    y: rect.y + rect.height + offset
                };
            }

            const scaleX = deltaX === 0 ? Number.POSITIVE_INFINITY : (rect.width / 2) / Math.abs(deltaX);
            const scaleY = deltaY === 0 ? Number.POSITIVE_INFINITY : (rect.height / 2) / Math.abs(deltaY);
            const scale = Math.min(scaleX, scaleY);
            const edgeX = centerX + deltaX * scale;
            const edgeY = centerY + deltaY * scale;
            const distance = Math.hypot(deltaX, deltaY) || 1;

            return {
                x: edgeX + deltaX / distance * offset,
                y: edgeY + deltaY / distance * offset
            };
        }

        function getYearAnchorPoint(targetPoint) {
            const metrics = getElementRectInOrbitSpace(refs.heroYear);
            if (!metrics) return null;
            return clampOrbitPoint(getAnchorPointOnRect(metrics.rect, targetPoint, 8), metrics.width, metrics.height, 6);
        }

        function getStaticGlobePoint() {
            const metrics = getElementRectInOrbitSpace(refs.globeShell);
            if (!metrics) return null;
            return clampOrbitPoint({
                x: metrics.rect.x + metrics.rect.width * 0.67,
                y: metrics.rect.y + metrics.rect.height * 0.42
            }, metrics.width, metrics.height, 12);
        }

        function setOrbitOverlayVisible(visible, showEndDot = true) {
            const opacity = visible ? '1' : '0';
            refs.orbitPath.style.opacity = opacity;
            refs.orbitStartDot.style.opacity = opacity;
            refs.orbitDot.style.opacity = visible && showEndDot ? '1' : '0';
        }

        function buildOrbitCurve(startPoint, endPoint, width, height) {
            const deltaX = endPoint.x - startPoint.x;
            const deltaY = endPoint.y - startPoint.y;
            const horizontalReach = Math.max(width * 0.05, Math.abs(deltaX) * 0.2);
            const verticalReach = Math.max(height * 0.07, Math.abs(deltaY) * 0.22);

            const controlAX = startPoint.x + deltaX * 0.18 - Math.sign(deltaX || -1) * horizontalReach * 0.3;
            const controlAY = startPoint.y + verticalReach;
            const controlBX = endPoint.x - deltaX * 0.12 + (deltaX < 0 ? horizontalReach * 0.14 : -horizontalReach * 0.14);
            const controlBY = endPoint.y - Math.max(height * 0.05, Math.abs(deltaY) * 0.24);

            return `M${startPoint.x} ${startPoint.y} C${controlAX} ${controlAY}, ${controlBX} ${controlBY}, ${endPoint.x} ${endPoint.y}`;
        }

        function updateOrbitOverlay(startPoint, endPoint, showEndDot = true) {
            const { width, height } = getOrbitViewportMetrics();
            if (!startPoint || !endPoint || width <= 0 || height <= 0) {
                resetOrbitOverlay();
                return;
            }

            const safeStart = clampOrbitPoint(startPoint, width, height, 6);
            const safeEnd = clampOrbitPoint(endPoint, width, height, 12);
            if (!safeStart || !safeEnd) {
                resetOrbitOverlay();
                return;
            }

            setOrbitViewBox(width, height);
            refs.orbitStartDot.setAttribute('cx', String(safeStart.x));
            refs.orbitStartDot.setAttribute('cy', String(safeStart.y));
            refs.orbitDot.setAttribute('cx', String(safeEnd.x));
            refs.orbitDot.setAttribute('cy', String(safeEnd.y));
            refs.orbitPath.setAttribute('d', buildOrbitCurve(safeStart, safeEnd, width, height));
            setOrbitOverlayVisible(true, showEndDot);
        }

        function resetOrbitOverlay() {
            const { width, height } = getOrbitViewportMetrics();
            setOrbitViewBox(width, height);
            refs.orbitPath.setAttribute('d', '');
            refs.orbitStartDot.setAttribute('cx', '0');
            refs.orbitStartDot.setAttribute('cy', '0');
            refs.orbitDot.setAttribute('cx', '0');
            refs.orbitDot.setAttribute('cy', '0');
            setOrbitOverlayVisible(false, false);
        }

        function setStaticGlobeFocus() {
            if (!globePrimaryCoordinate) {
                resetOrbitOverlay();
                return;
            }

            const endPoint = getStaticGlobePoint();
            const startPoint = getYearAnchorPoint(endPoint);
            if (!startPoint || !endPoint) {
                resetOrbitOverlay();
                return;
            }

            updateOrbitOverlay(startPoint, endPoint);
        }

        function renderStaticGlobeFallback() {
            refs.globeShell.classList.add('is-static');
            refs.singleGlobeContainer.innerHTML = `<img class="globe-figma-image" src="${FIGMA_GLOBE_ASSET_URL}" alt="" draggable="false">`;
        }

        function getResponsiveViewportTier() {
            const width = Math.min(window.innerWidth || SCREEN_WIDTH, window.innerHeight || SCREEN_HEIGHT);
            if (width <= 600) return 'mobile';
            if (width <= 1199) return 'tablet';
            return 'desktop';
        }

        function getEffectivePixelRatio() {
            const stageScale = Number.parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--stage-scale')) || 1;
            const viewportTier = getResponsiveViewportTier();
            const cap = viewportTier === 'mobile'
                ? MOBILE_GLOBE_PIXEL_RATIO_CAP
                : viewportTier === 'tablet'
                    ? TABLET_GLOBE_PIXEL_RATIO_CAP
                    : 2;
            return Math.min(cap, Math.max(1, (window.devicePixelRatio || 1) * stageScale));
        }

        function getGlobeDeltaTime(now) {
            if (!globeLastFrameTime) {
                globeLastFrameTime = now;
                return 1 / 60;
            }
            const delta = (now - globeLastFrameTime) / 1000;
            globeLastFrameTime = now;
            return Math.min(0.05, Math.max(1 / 240, delta));
        }

        function applyTextureDefaults(texture, isColorTexture = false) {
            if (!texture || !globeRenderer || typeof THREE === 'undefined') return;
            if (isColorTexture && 'colorSpace' in texture && THREE.SRGBColorSpace) {
                texture.colorSpace = THREE.SRGBColorSpace;
            }
            if ('anisotropy' in texture && globeRenderer.capabilities && typeof globeRenderer.capabilities.getMaxAnisotropy === 'function') {
                texture.anisotropy = Math.min(8, globeRenderer.capabilities.getMaxAnisotropy());
            }
        }

        function createSolidTexture(r, g, b, isColorTexture = false) {
            if (typeof THREE === 'undefined') return null;
            const data = new Uint8Array([r, g, b, 255]);
            const texture = new THREE.DataTexture(data, 1, 1, THREE.RGBAFormat);
            texture.needsUpdate = true;
            if ('minFilter' in texture && THREE.LinearFilter) {
                texture.minFilter = THREE.LinearFilter;
                texture.magFilter = THREE.LinearFilter;
            }
            if (isColorTexture && 'colorSpace' in texture && THREE.SRGBColorSpace) {
                texture.colorSpace = THREE.SRGBColorSpace;
            }
            return texture;
        }

        function setEarthTextureUniform(material, uniformName, texture, isColorTexture = false) {
            if (!material || !texture || typeof THREE === 'undefined') return;
            applyTextureDefaults(texture, isColorTexture);
            texture.wrapS = THREE.RepeatWrapping;
            texture.wrapT = THREE.ClampToEdgeWrapping;
            material.uniforms[uniformName].value = texture;
            if (uniformName === 'waterMap' && texture.image && texture.image.width && texture.image.height) {
                material.uniforms.waterTexel.value.set(1 / texture.image.width, 1 / texture.image.height);
            }
        }

        function createStylizedEarthMaterial() {
            if (typeof THREE === 'undefined') return null;

            return new THREE.ShaderMaterial({
                uniforms: {
                    waterMap: { value: createSolidTexture(255, 255, 255) },
                    topoMap: { value: createSolidTexture(0, 0, 0) },
                    waterTexel: { value: new THREE.Vector2(1, 1) }
                },
                vertexShader: `
                    varying vec2 vUv;
                    varying vec3 vViewNormal;
                    varying vec3 vWorldNormal;
                    void main() {
                        vUv = uv;
                        vViewNormal = normalize(normalMatrix * normal);
                        vWorldNormal = normalize(mat3(modelMatrix) * normal);
                        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                    }
                `,
                fragmentShader: `
                    uniform sampler2D waterMap;
                    uniform sampler2D topoMap;
                    uniform vec2 waterTexel;
                    varying vec2 vUv;
                    varying vec3 vViewNormal;
                    varying vec3 vWorldNormal;

                    float saturate(float value) {
                        return clamp(value, 0.0, 1.0);
                    }

                    float oceanSample(vec2 uv) {
                        return smoothstep(0.38, 0.58, texture2D(waterMap, fract(uv)).r);
                    }

                    float coastline(vec2 uv) {
                        vec2 dx = vec2(max(waterTexel.x * 1.9, 0.0003), 0.0);
                        vec2 dy = vec2(0.0, max(waterTexel.y * 1.9, 0.0003));
                        float center = oceanSample(uv);
                        float east = oceanSample(uv + dx);
                        float west = oceanSample(uv - dx);
                        float north = oceanSample(uv + dy);
                        float south = oceanSample(uv - dy);
                        return smoothstep(0.05, 0.4, abs(center - east) + abs(center - west) + abs(center - north) + abs(center - south));
                    }

                    void main() {
                        vec3 viewNormal = normalize(vViewNormal);
                        vec3 worldNormal = normalize(vWorldNormal);
                        float oceanMask = oceanSample(vUv);
                        float landMask = 1.0 - oceanMask;
                        float topo = texture2D(topoMap, vUv).r;
                        float elevation = smoothstep(0.06, 0.88, topo);
                        float ridge = smoothstep(0.42, 0.92, topo);
                        float coast = coastline(vUv);
                        vec2 topoStep = vec2(max(waterTexel.x * 1.25, 0.0003), max(waterTexel.y * 1.25, 0.0003));
                        float topoEast = texture2D(topoMap, vUv + vec2(topoStep.x, 0.0)).r;
                        float topoWest = texture2D(topoMap, vUv - vec2(topoStep.x, 0.0)).r;
                        float topoNorth = texture2D(topoMap, vUv + vec2(0.0, topoStep.y)).r;
                        float topoSouth = texture2D(topoMap, vUv - vec2(0.0, topoStep.y)).r;
                        vec2 topoGradient = vec2(topoEast - topoWest, topoNorth - topoSouth);
                        float relief = smoothstep(0.01, 0.18, length(topoGradient));
                        float reliefLight = saturate(0.5 + topoGradient.x * 3.8 - topoGradient.y * 2.4);
                        float latitude = abs(vUv.y * 2.0 - 1.0);
                        vec3 sunDir = normalize(vec3(0.86, 0.18, 0.48));
                        vec3 bounceDir = normalize(vec3(-0.54, -0.24, 0.8));
                        vec3 keyDir = normalize(vec3(-0.44, 0.56, 0.95));
                        vec3 fillDir = normalize(vec3(0.72, -0.1, 0.62));
                        float sunLight = saturate(dot(worldNormal, sunDir) * 0.5 + 0.5);
                        float bounceLight = saturate(dot(worldNormal, bounceDir) * 0.5 + 0.5);
                        float keyLight = saturate(dot(viewNormal, keyDir) * 0.5 + 0.5);
                        float fillLight = saturate(dot(viewNormal, fillDir) * 0.5 + 0.5);
                        float faceLight = saturate(viewNormal.z * 0.5 + 0.5);
                        float horizon = pow(1.0 - faceLight, 1.85);
                        float shadowBand = pow(1.0 - faceLight, 1.65);

                        vec3 oceanDeep = vec3(0.03, 0.11, 0.24);
                        vec3 oceanMid = vec3(0.16, 0.34, 0.56);
                        vec3 oceanHighlight = vec3(0.69, 0.82, 0.91);
                        vec3 landShadow = vec3(0.28, 0.08, 0.01);
                        vec3 landBase = vec3(0.62, 0.2, 0.01);
                        vec3 landMid = vec3(0.965, 0.537, 0.0);
                        vec3 landHighlight = vec3(1.0, 0.76, 0.22);

                        float oceanLight = saturate(0.08 + sunLight * 0.34 + keyLight * 0.34 + fillLight * 0.12 + (1.0 - latitude) * 0.1);
                        vec3 ocean = mix(oceanDeep, oceanMid, oceanLight);
                        float oceanSpec = pow(saturate(keyLight * 0.72 + faceLight * 0.28), 11.0) * (0.2 + (1.0 - latitude) * 0.12);
                        ocean = mix(ocean, oceanHighlight, coast * 0.08 + oceanSpec * 0.22 + relief * 0.05);
                        ocean = mix(ocean, vec3(0.84, 0.95, 1.0), oceanMask * oceanSpec * 0.1);
                        ocean = mix(ocean, vec3(0.86, 0.92, 0.97), smoothstep(0.8, 1.0, latitude) * 0.12 + horizon * 0.04);

                        float baseLandLight = smoothstep(0.08, 0.52, elevation + sunLight * 0.18 + bounceLight * 0.08);
                        float warmMask = saturate(elevation * 0.56 + sunLight * 0.34 + relief * 0.22 + coast * 0.06 - latitude * 0.08);
                        warmMask = smoothstep(0.18, 0.92, warmMask);
                        vec3 land = mix(landShadow, landBase, baseLandLight);
                        land = mix(land, landMid, warmMask * 0.98);
                        land = mix(land, landHighlight, smoothstep(0.4, 1.0, keyLight * 0.58 + reliefLight * relief * 0.56 + ridge * 0.18));
                        land = mix(land, vec3(0.22, 0.06, 0.0), shadowBand * (0.18 + (1.0 - sunLight) * 0.12));
                        land = mix(land, vec3(1.0, 0.8, 0.28), coast * 0.1);
                        land = mix(land, vec3(0.99, 0.7, 0.14), smoothstep(0.8, 1.0, latitude) * 0.03);
                        land = mix(land, vec3(0.5, 0.16, 0.02), smoothstep(0.02, 0.24, topo) * 0.12);
                        land *= mix(0.86, 1.14, reliefLight * relief + keyLight * 0.06);
                        land = mix(land, vec3(1.0, 0.76, 0.22), relief * reliefLight * 0.1);
                        land = mix(land, vec3(1.0, 0.5, 0.07), smoothstep(0.2, 0.9, warmMask) * 0.09);

                        vec3 color = mix(land, ocean, oceanMask);
                        color *= mix(0.68, 1.05, faceLight);
                        color = mix(color, vec3(0.48, 0.64, 0.82), horizon * (oceanMask * 0.18 + landMask * 0.04));
                        color = mix(color, vec3(1.0, 0.5, 0.07), landMask * pow(keyLight, 2.0) * 0.08);
                        color = mix(color, vec3(0.76, 0.88, 0.98), oceanMask * oceanSpec * 0.05);

                        gl_FragColor = vec4(color, 1.0);
                    }
                `
            });
        }

        function createStylizedCloudTexture(texture) {
            if (!texture || typeof THREE === 'undefined' || typeof document === 'undefined' || !texture.image) {
                return texture;
            }
            const width = texture.image.width || 0;
            const height = texture.image.height || 0;
            if (!width || !height) return texture;

            const canvas = document.createElement('canvas');
            canvas.width = width;
            canvas.height = height;
            const context = canvas.getContext('2d', { willReadFrequently: true });
            if (!context) return texture;

            context.drawImage(texture.image, 0, 0, width, height);
            const imageData = context.getImageData(0, 0, width, height);
            const { data } = imageData;
            for (let index = 0; index < data.length; index += 4) {
                const average = (data[index] + data[index + 1] + data[index + 2]) / 3;
                const alpha = data[index + 3] / 255;
                const density = Math.max(alpha, 1 - average / 255);
                data[index] = 255;
                data[index + 1] = 255;
                data[index + 2] = 255;
                data[index + 3] = Math.round(Math.min(1, Math.pow(density, 0.88) * 1.08) * 255);
            }
            context.putImageData(imageData, 0, 0);

            const softenedCanvas = document.createElement('canvas');
            softenedCanvas.width = width;
            softenedCanvas.height = height;
            const softenedContext = softenedCanvas.getContext('2d');
            if (!softenedContext) {
                const directTexture = new THREE.CanvasTexture(canvas);
                directTexture.wrapS = THREE.RepeatWrapping;
                directTexture.wrapT = THREE.ClampToEdgeWrapping;
                applyTextureDefaults(directTexture, false);
                return directTexture;
            }

            softenedContext.clearRect(0, 0, width, height);
            softenedContext.filter = 'blur(1.6px)';
            softenedContext.drawImage(canvas, 0, 0, width, height);
            softenedContext.filter = 'none';
            softenedContext.globalAlpha = 0.72;
            softenedContext.drawImage(canvas, 0, 0, width, height);
            softenedContext.globalAlpha = 1;

            const stylizedTexture = new THREE.CanvasTexture(softenedCanvas);
            stylizedTexture.wrapS = THREE.RepeatWrapping;
            stylizedTexture.wrapT = THREE.ClampToEdgeWrapping;
            applyTextureDefaults(stylizedTexture, false);
            return stylizedTexture;
        }

        function latLngToSpherePosition(lat, lng, radius) {
            const latRad = lat * (Math.PI / 180);
            const lngRad = lng * (Math.PI / 180);
            const cosLat = Math.cos(latRad);
            return {
                x: radius * cosLat * Math.cos(lngRad),
                y: radius * Math.sin(latRad),
                z: -radius * cosLat * Math.sin(lngRad)
            };
        }

        function normalizeLocationCoordinates(rawCoordinates) {
            if (!Array.isArray(rawCoordinates)) return [];
            const coordsList = Array.isArray(rawCoordinates[0]) ? rawCoordinates : [rawCoordinates];
            return coordsList
                .map((pair) => Array.isArray(pair) ? [Number(pair[0]), Number(pair[1])] : [Number.NaN, Number.NaN])
                .filter(([lat, lng]) =>
                    Number.isFinite(lat) &&
                    Number.isFinite(lng) &&
                    lat >= -90 &&
                    lat <= 90 &&
                    lng >= -180 &&
                    lng <= 180 &&
                    !(lat === 0 && lng === 0)
                );
        }

        function useFallbackEarthMaterial() {
            if (!globeMesh || typeof THREE === 'undefined') return;
            globeMesh.material = new THREE.ShaderMaterial({
                vertexShader: `
                    varying vec2 vUv;
                    varying vec3 vNormal;
                    void main() {
                        vUv = uv;
                        vNormal = normalize(normalMatrix * normal);
                        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                    }
                `,
                fragmentShader: `
                    varying vec2 vUv;
                    varying vec3 vNormal;
                    float isLand(vec2 uv) {
                        float lon = uv.x * 360.0 - 180.0;
                        float lat = uv.y * 180.0 - 90.0;
                        if (lon > -140.0 && lon < -55.0 && lat > 15.0 && lat < 70.0) return 0.9;
                        if (lon > -82.0 && lon < -35.0 && lat > -55.0 && lat < 12.0) return 0.9;
                        if (lon > -10.0 && lon < 40.0 && lat > 35.0 && lat < 70.0) return 0.9;
                        if (lon > -18.0 && lon < 52.0 && lat > -35.0 && lat < 37.0) return 0.9;
                        if (lon > 26.0 && lon < 145.0 && lat > 5.0 && lat < 73.0) return 0.9;
                        if (lon > 95.0 && lon < 141.0 && lat > -10.0 && lat < 20.0) return 0.7;
                        if (lon > 114.0 && lon < 154.0 && lat > -39.0 && lat < -11.0) return 0.9;
                        return 0.0;
                    }
                    void main() {
                        float land = isLand(vUv);
                        float lat = vUv.y * 180.0 - 90.0;
                        vec3 oceanDeep = vec3(0.03, 0.12, 0.25);
                        vec3 oceanShallow = vec3(0.19, 0.38, 0.57);
                        vec3 landBase = vec3(0.63, 0.3, 0.08);
                        vec3 landHighlight = vec3(0.98, 0.77, 0.26);
                        vec3 ocean = mix(oceanDeep, oceanShallow, smoothstep(-90.0, 90.0, lat) * 0.48 + 0.26);
                        vec3 landCol = mix(landBase, landHighlight, 0.35 + (1.0 - abs(lat) / 90.0) * 0.45);
                        vec3 color = mix(ocean, landCol, land);
                        float polar = smoothstep(70.0, 85.0, abs(lat));
                        color = mix(color, vec3(0.95, 0.97, 1.0), polar);
                        float rim = pow(1.0 - abs(dot(vNormal, vec3(0.0, 0.0, 1.0))), 3.0);
                        color += vec3(0.32, 0.49, 0.68) * rim * 0.35;
                        gl_FragColor = vec4(color, 1.0);
                    }
                `
            });
        }

        function createGlobeHalo() {
            if (!globeScene || typeof THREE === 'undefined') return;
            if (globeHaloMesh) {
                globeScene.remove(globeHaloMesh);
            }

            const haloGeometry = new THREE.SphereGeometry(GLOBE_HALO_RADIUS, 64, 64);
            const haloMaterial = new THREE.ShaderMaterial({
                transparent: true,
                depthWrite: false,
                blending: THREE.AdditiveBlending,
                side: THREE.BackSide,
                vertexShader: `
                    varying vec3 vWorldPosition;
                    varying vec3 vWorldNormal;
                    void main() {
                        vec4 worldPosition = modelMatrix * vec4(position, 1.0);
                        vWorldPosition = worldPosition.xyz;
                        vWorldNormal = normalize(mat3(modelMatrix) * normal);
                        gl_Position = projectionMatrix * viewMatrix * worldPosition;
                    }
                `,
                fragmentShader: `
                    varying vec3 vWorldPosition;
                    varying vec3 vWorldNormal;
                    void main() {
                        vec3 viewDir = normalize(cameraPosition - vWorldPosition);
                        float fresnel = pow(1.0 - max(dot(viewDir, normalize(vWorldNormal)), 0.0), 3.4);
                        float latitude = clamp(vWorldNormal.y * 0.5 + 0.5, 0.0, 1.0);
                        vec3 coolGlow = vec3(0.28, 0.56, 0.98);
                        vec3 warmGlow = vec3(1.0, 0.66, 0.22);
                        vec3 color = mix(coolGlow, warmGlow, smoothstep(0.0, 0.7, latitude) * 0.35);
                        gl_FragColor = vec4(color, fresnel * 0.11);
                    }
                `
            });

            globeHaloMesh = new THREE.Mesh(haloGeometry, haloMaterial);
            globeScene.add(globeHaloMesh);
        }

        function createCloudLayer(texture) {
            if (!globeScene || !texture || typeof THREE === 'undefined') return;
            if (globeCloudMesh) {
                globeScene.remove(globeCloudMesh);
            }

            const cloudInnerMaterial = new THREE.MeshBasicMaterial({
                map: texture,
                transparent: true,
                opacity: 0.3,
                color: new THREE.Color(0xf4f8ff),
                depthWrite: false,
                side: THREE.DoubleSide
            });
            const cloudOuterMaterial = new THREE.MeshBasicMaterial({
                map: texture,
                transparent: true,
                opacity: 0.18,
                color: new THREE.Color(0xffffff),
                depthWrite: false,
                blending: THREE.AdditiveBlending,
                side: THREE.DoubleSide
            });

            const cloudInnerMesh = new THREE.Mesh(new THREE.SphereGeometry(1.014, 64, 64), cloudInnerMaterial);
            const cloudOuterMesh = new THREE.Mesh(new THREE.SphereGeometry(1.028, 64, 64), cloudOuterMaterial);
            cloudOuterMesh.rotation.y = 0.12;

            globeCloudMesh = new THREE.Group();
            globeCloudMesh.add(cloudInnerMesh);
            globeCloudMesh.add(cloudOuterMesh);
            globeCloudMesh.rotation.z = 0.06;
            globeScene.add(globeCloudMesh);
        }

        function createMarkerMesh() {
            if (typeof THREE === 'undefined') return null;

            const markerGroup = new THREE.Group();
            const core = new THREE.Mesh(
                new THREE.SphereGeometry(0.022, 20, 20),
                new THREE.MeshBasicMaterial({
                    color: 0xff5e3a,
                    transparent: true,
                    opacity: 0
                })
            );
            const aura = new THREE.Mesh(
                new THREE.SphereGeometry(0.042, 20, 20),
                new THREE.MeshBasicMaterial({
                    color: 0xffb160,
                    transparent: true,
                    opacity: 0,
                    blending: THREE.AdditiveBlending,
                    depthWrite: false
                })
            );

            markerGroup.add(aura);
            markerGroup.add(core);
            markerGroup.userData.core = core;
            markerGroup.userData.aura = aura;
            return markerGroup;
        }

        function setMarkerState(marker, scale, opacity) {
            if (!marker) return;
            marker.scale.setScalar(scale);
            if (marker.userData && marker.userData.core) {
                marker.userData.core.material.opacity = opacity;
            }
            if (marker.userData && marker.userData.aura) {
                marker.userData.aura.material.opacity = opacity * 0.42;
                marker.userData.aura.scale.setScalar(1.08 + (scale - 1) * 0.55);
            }
        }

        function initGlobe() {
            if (!refs.singleGlobeContainer) {
                return false;
            }

            refs.globeShell.classList.remove('is-static');

            if (typeof THREE === 'undefined') {
                renderStaticGlobeFallback();
                setStaticGlobeFocus();
                return false;
            }

            const width = refs.singleGlobeContainer.clientWidth || 320;
            const height = refs.singleGlobeContainer.clientHeight || 320;

            globeScene = new THREE.Scene();
            globeCamera = new THREE.PerspectiveCamera(35, width / height, 0.1, 1000);
            globeCamera.position.set(0, 0, GLOBE_CAM_RADIUS);
            globeCamera.lookAt(0, 0, 0);

            try {
                globeRenderer = new THREE.WebGLRenderer({
                    antialias: true,
                    alpha: true,
                    powerPreference: 'high-performance',
                    precision: 'mediump',
                    stencil: false,
                    depth: true
                });
            } catch (error) {
                console.warn('Globe WebGL init failed, using static fallback.', error);
                renderStaticGlobeFallback();
                setStaticGlobeFocus();
                return false;
            }

            globeRenderer.setPixelRatio(getEffectivePixelRatio());
            globeRenderer.setSize(width, height);
            globeRenderer.setClearColor(0x000000, 0);
            if ('outputColorSpace' in globeRenderer && THREE.SRGBColorSpace) {
                globeRenderer.outputColorSpace = THREE.SRGBColorSpace;
            }
            globeRenderer.domElement.id = 'singleGlobeCanvas';
            refs.singleGlobeContainer.innerHTML = '';
            refs.singleGlobeContainer.appendChild(globeRenderer.domElement);

            const geometry = new THREE.SphereGeometry(1, 64, 64);
            const material = createStylizedEarthMaterial();
            if (!material) {
                renderStaticGlobeFallback();
                setStaticGlobeFocus();
                return false;
            }

            globeMesh = new THREE.Mesh(geometry, material);
            globeScene.add(globeMesh);
            createGlobeHalo();

            const textureLoader = new THREE.TextureLoader();
            textureLoader.load(
                GLOBE_TEXTURE_URLS.topo,
                (texture) => setEarthTextureUniform(material, 'topoMap', texture, false),
                undefined,
                () => console.warn('Unable to load local topology texture for globe.')
            );
            textureLoader.load(
                GLOBE_TEXTURE_URLS.water,
                (texture) => setEarthTextureUniform(material, 'waterMap', texture, false),
                undefined,
                () => useFallbackEarthMaterial()
            );
            textureLoader.load(
                GLOBE_TEXTURE_URLS.clouds,
                (texture) => {
                    applyTextureDefaults(texture, false);
                    texture.wrapS = THREE.RepeatWrapping;
                    texture.wrapT = THREE.ClampToEdgeWrapping;
                    createCloudLayer(createStylizedCloudTexture(texture));
                }
            );

            globeLastFrameTime = 0;
            resetOrbitOverlay();
            animateGlobe();
            return true;
        }

        function latLngToCamAngles(lat, lng) {
            const phi = (90 - lat) * (Math.PI / 180);
            const theta = (lng - 90) * (Math.PI / 180);
            return { phi, theta };
        }

        function clearGlobeMarkerMeshes() {
            if (globeMesh) {
                globeMarkers.forEach((marker) => globeMesh.remove(marker));
            }
            globeMarkers = [];
            globeMarker = null;
            globePrimaryCoordinate = null;
        }

        function clearGlobeMarkers() {
            clearGlobeMarkerMeshes();
            globeArrived = true;
            markerFlashDone = true;
            globeAnimationTime = 0;
            camTarget.phi = camCurrent.phi;
            camTarget.theta = camCurrent.theta;
            resetOrbitOverlay();
        }

        function setGlobeMarkers(coordsList) {
            if (!globeMesh) {
                globeMarkers = [];
                globeMarker = null;
                globePrimaryCoordinate = null;
                return;
            }

            clearGlobeMarkerMeshes();
            globePrimaryCoordinate = coordsList[0] || null;

            coordsList.forEach(([lat, lng]) => {
                const markerMesh = createMarkerMesh();
                if (!markerMesh) return;
                const position = latLngToSpherePosition(lat, lng, 1.05);
                markerMesh.position.set(position.x, position.y, position.z);
                globeMesh.add(markerMesh);
                globeMarkers.push(markerMesh);
            });

            globeMarker = globeMarkers[0] || null;
        }

        function rotateGlobeToCoordinates(coordinates) {
            const coordsList = normalizeLocationCoordinates(coordinates);
            const [lat, lng] = coordsList[0] || [];
            if (!coordsList.length || Number.isNaN(lat) || Number.isNaN(lng)) {
                clearGlobeMarkers();
                return;
            }

            if (!globeMesh) {
                globePrimaryCoordinate = coordsList[0] || null;
                globeArrived = true;
                markerFlashDone = true;
                globeAnimationTime = 0;
                setStaticGlobeFocus();
                return;
            }

            const angles = latLngToCamAngles(lat, lng);
            camTarget.phi = angles.phi;
            camTarget.theta = angles.theta;
            globeArrived = false;
            markerFlashDone = false;
            globeAnimationTime = 0;
            setGlobeMarkers(coordsList);
            resetOrbitOverlay();
        }

        function projectWorldPointToOverlay(worldPoint) {
            if (!worldPoint || !globeCamera || !refs.globeShell || !refs.orbitOverlay || typeof THREE === 'undefined') return null;
            globeCamera.updateMatrixWorld();
            if (globeMesh) globeMesh.updateWorldMatrix(true, false);
            const facing = worldPoint.clone().normalize().dot(globeCamera.position.clone().normalize());
            if (facing <= 0.02) return null;

            const projected = worldPoint.clone().project(globeCamera);
            if (!Number.isFinite(projected.x) || !Number.isFinite(projected.y) || projected.z < -1 || projected.z > 1) return null;
            const metrics = getOrbitViewportMetrics();
            const shellRect = refs.globeShell.getBoundingClientRect();
            const overlayRect = refs.orbitOverlay.getBoundingClientRect();
            if (!shellRect.width || !shellRect.height || !overlayRect.width || !overlayRect.height) return null;

            return clampOrbitPoint({
                x: ((projected.x * 0.5 + 0.5) * shellRect.width + (shellRect.left - overlayRect.left)) * metrics.scaleX,
                y: ((-projected.y * 0.5 + 0.5) * shellRect.height + (shellRect.top - overlayRect.top)) * metrics.scaleY
            }, metrics.width, metrics.height, 12);
        }

        function projectCoordinateToOverlay(coordinate, radius = 0.985) {
            if (!coordinate || !globeMesh || typeof THREE === 'undefined') return null;
            const [lat, lng] = coordinate;
            if (!Number.isFinite(lat) || !Number.isFinite(lng)) return null;

            const localPoint = latLngToSpherePosition(lat, lng, radius);
            const worldPoint = globeMesh.localToWorld(new THREE.Vector3(localPoint.x, localPoint.y, localPoint.z));
            return projectWorldPointToOverlay(worldPoint);
        }

        function projectMarkerToOverlay(marker) {
            if (!marker || typeof THREE === 'undefined') return null;
            marker.updateWorldMatrix(true, false);
            const worldPoint = new THREE.Vector3();
            marker.getWorldPosition(worldPoint);
            return projectWorldPointToOverlay(worldPoint);
        }

        function animateGlobe(now = performance.now()) {
            requestAnimationFrame(animateGlobe);
            if (document.hidden || !globeRenderer || !globeCamera || !globeMesh) return;

            const deltaSeconds = getGlobeDeltaTime(now);
            globeAnimationTime += deltaSeconds;
            const lerpFactor = 1 - Math.pow(0.0025, deltaSeconds * 3.4);
            let dTheta = camTarget.theta - camCurrent.theta;
            while (dTheta > Math.PI) dTheta -= 2 * Math.PI;
            while (dTheta < -Math.PI) dTheta += 2 * Math.PI;
            const dPhi = camTarget.phi - camCurrent.phi;

            const arrived = Math.abs(dTheta) < 0.01 && Math.abs(dPhi) < 0.01;
            if (!globeArrived && arrived) {
                globeArrived = true;
                globeAnimationTime = 0;
                camCurrent.phi = camTarget.phi;
                camCurrent.theta = camTarget.theta;
            }

            if (!globeArrived) {
                camCurrent.phi += dPhi * lerpFactor;
                camCurrent.theta += dTheta * lerpFactor;
            }

            const cx = -GLOBE_CAM_RADIUS * Math.sin(camCurrent.phi) * Math.sin(camCurrent.theta);
            const cy = GLOBE_CAM_RADIUS * Math.cos(camCurrent.phi);
            const cz = -GLOBE_CAM_RADIUS * Math.sin(camCurrent.phi) * Math.cos(camCurrent.theta);
            globeCamera.position.set(cx, cy, cz);
            globeCamera.lookAt(0, 0, 0);

            if (globeHaloMesh) {
                const haloScale = 1 + Math.sin(globeAnimationTime * 0.9) * 0.012;
                globeHaloMesh.scale.setScalar(haloScale);
                globeHaloMesh.rotation.y += deltaSeconds * 0.08;
            }

            if (globeCloudMesh) {
                globeCloudMesh.rotation.y += deltaSeconds * 0.018;
            }

            if (globeMarkers.length > 0) {
                if (globeArrived) {
                    const overlayPoint = projectMarkerToOverlay(globeMarker) || projectCoordinateToOverlay(globePrimaryCoordinate);
                    if (overlayPoint) {
                        const yearPoint = getYearAnchorPoint(overlayPoint);
                        if (yearPoint) {
                            updateOrbitOverlay(yearPoint, overlayPoint, false);
                        } else {
                            resetOrbitOverlay();
                        }
                    } else {
                        resetOrbitOverlay();
                    }
                } else {
                    resetOrbitOverlay();
                }

                if (globeArrived && !markerFlashDone) {
                    const t = globeAnimationTime * 2.8;
                    const cycle = Math.floor(t);
                    globeMarkers.forEach((marker) => {
                        if (cycle >= 2) {
                            setMarkerState(marker, 1, 1);
                        } else {
                            const phase = (t - cycle) * Math.PI;
                            const scale = 1.0 + 0.95 * Math.sin(phase);
                            const opacity = 1.0 - 0.6 * Math.sin(phase);
                            setMarkerState(marker, scale, opacity);
                        }
                    });
                    if (cycle >= 2) markerFlashDone = true;
                } else if (globeArrived) {
                    globeMarkers.forEach((marker) => setMarkerState(marker, 1, 1));
                }
            }

            globeRenderer.render(globeScene, globeCamera);
        }

        function ensureMediaIframe() {
            let iframe = refs.videoFrame.querySelector('iframe');
            if (!iframe) {
                iframe = document.createElement('iframe');
                iframe.id = 'mediaVideo';
                iframe.allow = 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture';
                iframe.allowFullscreen = true;
                refs.videoFrame.appendChild(iframe);
                refs.mediaVideo = iframe;
            }
            return iframe;
        }

        function ensureMediaPlayer() {
            let player = refs.videoFrame.querySelector('video');
            if (!player) {
                player = document.createElement('video');
                player.id = 'mediaVideoPlayer';
                player.controls = true;
                player.playsInline = true;
                player.preload = 'metadata';
                refs.videoFrame.appendChild(player);
            }
            return player;
        }

        function isDirectVideoMedia(url) {
            return /\.(mp4|webm|ogg)(?:[?#].*)?$/i.test(String(url || ''));
        }

        function resetInlineMedia() {
            const iframe = ensureMediaIframe();
            const player = ensureMediaPlayer();

            iframe.style.display = 'none';
            iframe.src = 'about:blank';

            player.pause();
            player.removeAttribute('src');
            player.style.display = 'none';
            player.load();
        }

        function playInlineVideo(url) {
            if (!url) return;
            refs.videoFrame.classList.add('is-playing');
            refs.videoFrame.onclick = null;
            if (isDirectVideoMedia(url)) {
                const iframe = ensureMediaIframe();
                const player = ensureMediaPlayer();
                iframe.style.display = 'none';
                iframe.src = 'about:blank';
                player.src = url;
                player.style.display = 'block';
                const playback = player.play();
                if (playback && typeof playback.catch === 'function') {
                    playback.catch(() => {});
                }
                return;
            }

            const iframe = ensureMediaIframe();
            const player = ensureMediaPlayer();
            player.pause();
            player.removeAttribute('src');
            player.style.display = 'none';
            player.load();
            iframe.src = url;
            iframe.style.display = 'block';
        }

        function getQuizItems(vm) {
            const raw = vm && vm.raw ? vm.raw : {};
            const rawQuizzes = Array.isArray(vm && vm.quizzes)
                ? vm.quizzes
                : Array.isArray(raw.quizzes)
                  ? raw.quizzes
                  : raw.quiz
                    ? [raw.quiz]
                    : [];

            return rawQuizzes.map((quiz, quizIndex) => {
                if (!quiz || typeof quiz !== 'object') return null;
                const question = String(lx(quiz.question) || '').trim();
                const options = Array.isArray(quiz.options)
                    ? quiz.options.map((option) => String(lx(option) || '').trim())
                    : [];
                const answerIndex = Number(quiz.answerIndex);
                const explanation = String(lx(quiz.explanation) || '').trim();

                if (!question || options.length < 2 || !Number.isInteger(answerIndex) || answerIndex < 0 || answerIndex >= options.length) {
                    return null;
                }

                return {
                    id: String(quiz.id || `quiz-${quizIndex + 1}`),
                    question,
                    options,
                    answerIndex,
                    explanation
                };
            }).filter(Boolean);
        }

        function applyQuizAnswer(container, quiz, selectedIndex) {
            if (!container || !quiz || container.classList.contains('is-answered')) return;
            const isCorrect = selectedIndex === quiz.answerIndex;
            if (window.umami) {
                umami.track('quiz_answer', {
                    quizId: quiz.id || 'unknown',
                    selectedIndex: selectedIndex,
                    isCorrect: isCorrect
                });
            }
            container.classList.add('is-answered');

            container.querySelectorAll('.quick-quiz-option').forEach((button) => {
                const optionIndex = Number(button.dataset.answerIndex);
                button.disabled = true;
                button.classList.toggle('is-selected', optionIndex === selectedIndex);
                button.classList.toggle('is-correct-answer', optionIndex === quiz.answerIndex);
                button.classList.toggle('is-wrong-answer', optionIndex === selectedIndex && !isCorrect);
            });

            const answerLabel = quiz.options[quiz.answerIndex] || '';
            const feedback = container.querySelector('.quick-quiz-feedback');
            if (feedback) {
                const lead = isCorrect ? uiText('Correct', '答对了') : uiText('Not quite', '差一点');
                const answerText = uiText('Answer', '正确答案');
                feedback.innerHTML = `
                    <span class="quick-quiz-feedback-result">
                        <strong>${escapeHtml(lead)}</strong>
                        <span>${escapeHtml(answerText)}：${escapeHtml(answerLabel)}</span>
                    </span>
                    ${quiz.explanation ? `<span class="quick-quiz-feedback-explanation">${escapeHtml(quiz.explanation)}</span>` : ''}
                `;
            }

            if (refs.quizModalContinue && container === refs.quizModalBody) {
                refs.quizModalContinue.disabled = false;
            }
        }

        function shuffleQuizOptions(quiz) {
            const entries = quiz.options.map((option, index) => ({
                option,
                originalIndex: index
            }));

            for (let index = entries.length - 1; index > 0; index -= 1) {
                const swapIndex = Math.floor(Math.random() * (index + 1));
                [entries[index], entries[swapIndex]] = [entries[swapIndex], entries[index]];
            }

            let answerIndex = entries.findIndex((entry) => entry.originalIndex === quiz.answerIndex);
            if (answerIndex === quiz.answerIndex && entries.length > 1) {
                const swapIndex = (answerIndex + 1 + Math.floor(Math.random() * (entries.length - 1))) % entries.length;
                [entries[answerIndex], entries[swapIndex]] = [entries[swapIndex], entries[answerIndex]];
                answerIndex = swapIndex;
            }

            return {
                ...quiz,
                options: entries.map((entry) => entry.option),
                answerIndex
            };
        }

                }
                if (/dual-screen\.html$/i.test(url.pathname)) {
                    url.pathname = url.pathname.replace(/dual-screen\.html$/i, 'index.html');
                }
                url.hash = '';
                url.searchParams.delete('layout');
                url.searchParams.set('storyline', POP_QUIZ_MOBILE_STORYLINE_ID);
                url.searchParams.set('quiz', POP_QUIZ_MOBILE_QUERY_VALUE);
                return url.href;
            } catch (_) {
                return POP_QUIZ_MOBILE_PUBLIC_URL;
            }
        }

        function scoreQuizMaterial(item) {
            const haystack = `${item && item.type ? item.type : ''} ${item && item.url ? item.url : ''} ${item && item.title ? item.title : ''} ${item && item.description ? item.description : ''} ${item && item.usage ? item.usage : ''}`.toLowerCase();
            let score = 0;
            if (item && item.type === 'image') score += 8;
            if (/portrait|person|people|scientist|researcher|team|institution|group|photo|肖像|人物|团队|机构/.test(haystack)) score += 12;
            if (item && item.type === 'image' && /diagram|explainer|eval|policy|value|search|architecture|flow/.test(haystack)) score += 3;
            if (/diagram|explainer|eval|policy|value|search|architecture|flow|source|archive|paper|manual/.test(haystack)) score += 2;
            if (/archive|paper|manual|source/.test(haystack)) score += 2;
            return score;
        }

        function getAchievementSources(rawMilestone) {
            const papers = rawMilestone && Array.isArray(rawMilestone.papers)
                ? rawMilestone.papers.map((paper) => {
                    const rawJournal = paper && paper.journal;
                    const journalFallback = rawJournal && typeof rawJournal === 'object'
                        ? rawJournal.en || rawJournal.zh || ''
                        : rawJournal;
                    const journal = String(lx(rawJournal) || journalFallback || '').trim();
                    return {
                        type: journal ? uiText(`Paper · ${journal}`, `论文 · ${journal}`) : uiText('Paper', '论文'),
                        label: paper.title,
                        url: paper.url
                    };
                })
                : [];
            const sources = rawMilestone && rawMilestone.achievement && Array.isArray(rawMilestone.achievement.sources)
                ? rawMilestone.achievement.sources
                : [];
            const seenUrls = new Set();
            return [...papers, ...sources].filter((source) => {
                if (!source || !source.url || !lx(source.label)) return false;
                if (seenUrls.has(source.url)) return false;
                seenUrls.add(source.url);
                return true;
            });
        }

        function getFirstValidUiCoordinatePair(coordinates) {
            if (!Array.isArray(coordinates)) return null;

                return Number.isFinite(lat) && Number.isFinite(lng) && !(lat === 0 && lng === 0) ? [lat, lng] : null;

        function projectCoordinatesToUiMap(coordinates) {
            const pair = getFirstValidUiCoordinatePair(coordinates);
            if (!pair) return null;
            const [lat, lng] = pair;
            const left = ((lng + 180) / 360) * 100;
            const mercatorLat = Math.max(-70, Math.min(80, lat));
            const latRad = mercatorLat * Math.PI / 180;
            const mercator = Math.log(Math.tan(Math.PI / 4 + latRad / 2));
            const top = (1 - (mercator + Math.PI) / (2 * Math.PI)) * 100;
            return {
                left: Math.max(0, Math.min(100, left)),
                top: Math.max(0, Math.min(100, top))
            };
        }

        function getNearestUiMapDot(point, usedKeys) {
            if (!point || !UI_MAP_DOTS.length) return null;
            let best = null;
            let bestDistance = Infinity;
            UI_MAP_DOTS.forEach((dot) => {
                const key = `${dot.col}:${dot.row}`;
                if (usedKeys && usedKeys.has(key)) return;
                const distance = Math.hypot(point.left - dot.x, (point.top - dot.y) * 0.78);
                if (distance < bestDistance) {
                    bestDistance = distance;
                    best = dot;
                }
            });
            return best;
        }

                    dotLocationKeys.set(`${existingDot.col}:${existingDot.row}`, locationKey);
                    eventDots.push(existingDot);
                    return;
                }
                const dot = getNearestUiMapDot(target, usedKeys) || getNearestUiMapDot(target, null);
                if (!dot) return;
                const key = `${dot.col}:${dot.row}`;
                usedKeys.add(key);
                locationDots.set(locationKey, dot);
                dotLocationKeys.set(key, locationKey);
                eventDots.push(dot);
            });
            return {
                eventDots,
                activeDots: Array.from(new Map(eventDots.map((dot) => [`${dot.col}:${dot.row}`, dot])).values()),
                dotLocationKeys
            };
        }

        function getUiMapActiveDots(events) {
            return getUiMapDotAssignments(events).activeDots;
        }

        function getUiMapEventPoints(events) {
            const { eventDots } = getUiMapDotAssignments(events);
            return events.map((event, index) => {
                const dot = eventDots[index] || getNearestUiMapDot(getUiMapPinPosition(event), null) || getUiMapPinPosition(event);
                return { left: dot.x, top: dot.y };
            });
        }

        function buildUiMapDots(events) {
            const { activeDots, dotLocationKeys } = getUiMapDotAssignments(events);
            const activeKeys = new Set(activeDots.map((point) => `${point.col}:${point.row}`));
            return UI_MAP_DOTS.map((point) => {
                const key = `${point.col}:${point.row}`;
                const active = activeKeys.has(key);
                const locationKey = active ? dotLocationKeys.get(key) || '' : '';
                const dataAttr = locationKey ? ` data-location-key="${escapeHtml(locationKey)}"` : '';
                return `<span class="ui-map-dot${active ? ' active' : ''}"${dataAttr} style="left:${point.x.toFixed(1)}%;top:${point.y.toFixed(1)}%"></span>`;
            }).join('');
        }

        function buildUiMapRoutes(events) {
            if (uiBrowserMode === 'region') return '';
            const points = getUiMapEventPoints(events);
            if (points.length < 2) return '';
            return points.slice(1).map((point, index) => {
                const previous = points[index];
                const cx = (previous.left + point.left) / 2;
                const cy = Math.min(previous.top, point.top) - 10 - (index % 2) * 6;
                const path = `M ${previous.left.toFixed(1)} ${previous.top.toFixed(1)} Q ${cx.toFixed(1)} ${cy.toFixed(1)} ${point.left.toFixed(1)} ${point.top.toFixed(1)}`;
                return `<path class="ui-map-route" d="${path}"></path>`;
            }).join('');
        }

        const UI_MAP_CALLOUT_TOP_LIMIT = 12;
        const UI_MAP_CALLOUT_BOTTOM_LIMIT = 21;
        const UI_MAP_CALLOUT_TOTAL_LIMIT = UI_MAP_CALLOUT_TOP_LIMIT + UI_MAP_CALLOUT_BOTTOM_LIMIT;
        const UI_DETAIL_IMAGE_SWIPE_THRESHOLD = 45;
        const UI_DETAIL_IMAGE_SWIPE_AXIS_RATIO = 1.35;

        function getUiMapFeaturedCallouts(events) {
            const points = getUiMapEventPoints(events);
            const grouped = new Map();
            events.forEach((event, index) => {
                const point = points[index] || getUiMapPinPosition(event);
                const key = getUiMapLocationKey(event, getUiMapPinPosition(event));
                if (!grouped.has(key)) {
                    grouped.set(key, {
                        event,
                        events: [],
                        point,
                        locationKey: key,
                        originalIndex: index
                    });
                }
                const group = grouped.get(key);
                group.events.push(event);
                if (index < group.originalIndex) {
                    group.event = event;
                    group.point = point;
                    group.originalIndex = index;
                }
            });
            return Array.from(grouped.values()).map((group) => ({
                ...group,
                count: group.events.length
            })).sort((a, b) => {
                const leftDiff = Number(a.point && a.point.left || 0) - Number(b.point && b.point.left || 0);
                return leftDiff || a.originalIndex - b.originalIndex;
            }).slice(0, UI_MAP_CALLOUT_TOTAL_LIMIT);
        }

        function getUiMapCalloutGridStyle(index, placement) {
            const columnCount = 3;
            if (placement !== 'bottom') {
                return `grid-column:${index % columnCount + 1};grid-row:${Math.floor(index / columnCount) + 1};`;
            }
            const bottomIndex = index - UI_MAP_CALLOUT_TOP_LIMIT;
            return `grid-column:${bottomIndex % columnCount + 1};grid-row:${Math.floor(bottomIndex / columnCount) + 1};`;
        }

        function buildUiMapCallouts(events, placement) {
            const callouts = getUiMapFeaturedCallouts(events);
            const isBottom = placement === 'bottom';
            const offset = isBottom ? UI_MAP_CALLOUT_TOP_LIMIT : 0;
            const visible = isBottom
                ? callouts.slice(UI_MAP_CALLOUT_TOP_LIMIT)
                : callouts.slice(0, UI_MAP_CALLOUT_TOP_LIMIT);
            return visible.map(({ event, events: groupedEvents, count, locationKey }, index) => {
                const absoluteIndex = offset + index;
                const vm = getVm(milestoneList.findIndex((item) => item.id === event.id));
                const locationName = vm.location && vm.location.name ? vm.location.name : (vm.title || tx('aiHistoryEvent'));
                const locationCountry = vm.location && vm.location.country ? vm.location.country : getUiContinentLabel(getMilestoneContinentId(event));
                const countHtml = count > 1 ? ` <span class="ui-map-callout-count">×${escapeHtml(count)}</span>` : '';
                const eventIds = (groupedEvents || [event]).map((item) => item && item.id).filter(Boolean).join(',');
                return `
                    <button class="ui-map-callout" type="button" data-event-id="${escapeHtml(event.id)}" data-event-ids="${escapeHtml(eventIds)}" data-location-key="${escapeHtml(locationKey || '')}" style="${getUiMapCalloutGridStyle(absoluteIndex, placement)}">

                        <span class="ui-map-callout-text">
                            <strong>${escapeHtml(locationName)}</strong>
                            <span>${escapeHtml(locationCountry)}${countHtml}</span>
                        </span>
                    </button>

            }).join('');

        function getUiLocationGroupEvents(locationKey, eventIds = []) {
            const selectedIds = Array.isArray(eventIds) ? eventIds.filter(Boolean) : [];
            if (selectedIds.length) {
                const selectedSet = new Set(selectedIds);
                return milestoneList.filter((item) => selectedSet.has(item.id));
            }
            if (!locationKey) return [];
            return milestoneList.filter((item) => getUiMapLocationKey(item, getUiMapPinPosition(item)) === locationKey);

        function getUiLocationGroupLabel(locationKey) {
            const event = getUiLocationGroupEvents(locationKey)[0];
            if (!event) return uiText('Location', '地址');
            const vm = getVm(milestoneList.findIndex((item) => item.id === event.id));
            return vm.location && vm.location.name ? vm.location.name : (vm.title || uiText('Location', '地址'));

        function getElementCenterRelativeTo(element, containerRect) {
            if (!element || !containerRect) return null;
            const rect = element.getBoundingClientRect();
            return {
                x: rect.left + rect.width / 2 - containerRect.left,
                y: rect.top + rect.height / 2 - containerRect.top
            };
        }

        function syncUiMapCalloutLines() {
            const panel = refs.uiBrowserMain.querySelector('.ui-map-panel');
            const svg = panel ? panel.querySelector('.ui-map-callout-lines') : null;
            if (!panel || !svg) return;

            const panelRect = panel.getBoundingClientRect();
            const callouts = Array.from(panel.querySelectorAll('.ui-map-callout'));
            const pinsByEventId = new Map(Array.from(panel.querySelectorAll('.ui-map-pin')).map((pin) => [pin.dataset.eventId || '', pin]));
            const dotsByLocationKey = new Map(Array.from(panel.querySelectorAll('.ui-map-dot.active')).map((dot) => [dot.dataset.locationKey || '', dot]));
            const paths = callouts.map((callout) => {
                const eventId = callout.dataset.eventId || '';
                const locationKey = callout.dataset.locationKey || '';
                const start = getElementCenterRelativeTo(dotsByLocationKey.get(locationKey) || pinsByEventId.get(eventId), panelRect);
                const end = getElementCenterRelativeTo(callout.querySelector('.ui-map-callout-dot'), panelRect);
                if (!start || !end) return '';
                const dx = end.x - start.x;
                const dy = end.y - start.y;
                const length = Math.hypot(dx, dy);
                const bend = Math.min(126, Math.max(46, length * 0.22));
                const normalX = length ? -dy / length : 0;
                const normalY = length ? dx / length : -1;
                const side = end.x < start.x ? -1 : 1;
                const controlX = start.x + dx * 0.52 + normalX * bend * side;
                const controlY = start.y + dy * 0.52 + normalY * bend * side;
                return `<path class="ui-map-callout-line" d="M ${start.x.toFixed(1)} ${start.y.toFixed(1)} Q ${controlX.toFixed(1)} ${controlY.toFixed(1)} ${end.x.toFixed(1)} ${end.y.toFixed(1)}"></path>`;
            }).join('');

            svg.setAttribute('viewBox', `0 0 ${Math.max(1, panelRect.width).toFixed(1)} ${Math.max(1, panelRect.height).toFixed(1)}`);
            svg.innerHTML = paths;
        }

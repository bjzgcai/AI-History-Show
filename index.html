                        vec3 coolGlow = vec3(0.28, 0.56, 0.98);
                        vec3 warmGlow = vec3(1.0, 0.66, 0.22);
                        vec3 color = mix(coolGlow, warmGlow, smoothstep(0.0, 0.7, latitude) * 0.35);
                        gl_FragColor = vec4(color, fresnel * 0.11);
                    }
                `
            });

            globeHaloMesh = new THREE.Mesh(haloGeometry, haloMaterial);
            globeScene.add(globeHaloMesh);
        }

        function createCloudLayer(texture) {
            if (!globeScene || !texture || typeof THREE === 'undefined') return;
            if (globeCloudMesh) {
                globeScene.remove(globeCloudMesh);
            }

            const cloudInnerMaterial = new THREE.MeshBasicMaterial({
                map: texture,
                transparent: true,
                opacity: 0.3,
                color: new THREE.Color(0xf4f8ff),
                depthWrite: false,
                side: THREE.DoubleSide
            });
            const cloudOuterMaterial = new THREE.MeshBasicMaterial({
                map: texture,
                transparent: true,
                opacity: 0.18,
                color: new THREE.Color(0xffffff),
                depthWrite: false,
                blending: THREE.AdditiveBlending,
                side: THREE.DoubleSide
            });

            const cloudInnerMesh = new THREE.Mesh(new THREE.SphereGeometry(1.014, 64, 64), cloudInnerMaterial);
            const cloudOuterMesh = new THREE.Mesh(new THREE.SphereGeometry(1.028, 64, 64), cloudOuterMaterial);
            cloudOuterMesh.rotation.y = 0.12;

            globeCloudMesh = new THREE.Group();
            globeCloudMesh.add(cloudInnerMesh);
            globeCloudMesh.add(cloudOuterMesh);
            globeCloudMesh.rotation.z = 0.06;
            globeScene.add(globeCloudMesh);
        }

        function createMarkerMesh() {
            if (typeof THREE === 'undefined') return null;

            const markerGroup = new THREE.Group();
            const core = new THREE.Mesh(
                new THREE.SphereGeometry(0.022, 20, 20),
                new THREE.MeshBasicMaterial({
                    color: 0xff5e3a,
                    transparent: true,
                    opacity: 0
                })
            );
            const aura = new THREE.Mesh(
                new THREE.SphereGeometry(0.042, 20, 20),
                new THREE.MeshBasicMaterial({
                    color: 0xffb160,
                    transparent: true,
                    opacity: 0,
                    blending: THREE.AdditiveBlending,
                    depthWrite: false
                })
            );

            markerGroup.add(aura);
            markerGroup.add(core);
            markerGroup.userData.core = core;
            markerGroup.userData.aura = aura;
            return markerGroup;
        }

        function setMarkerState(marker, scale, opacity) {
            if (!marker) return;
            marker.scale.setScalar(scale);
            if (marker.userData && marker.userData.core) {
                marker.userData.core.material.opacity = opacity;
            }
            if (marker.userData && marker.userData.aura) {
                marker.userData.aura.material.opacity = opacity * 0.42;
                marker.userData.aura.scale.setScalar(1.08 + (scale - 1) * 0.55);
            }
        }

        function initGlobe() {
            if (!refs.singleGlobeContainer) {
                return false;
            }

            refs.globeShell.classList.remove('is-static');

            if (typeof THREE === 'undefined') {
                renderStaticGlobeFallback();
                setStaticGlobeFocus();
                return false;
            }

            const width = refs.singleGlobeContainer.clientWidth || 320;
            const height = refs.singleGlobeContainer.clientHeight || 320;

            globeScene = new THREE.Scene();
            globeCamera = new THREE.PerspectiveCamera(35, width / height, 0.1, 1000);
            globeCamera.position.set(0, 0, GLOBE_CAM_RADIUS);
            globeCamera.lookAt(0, 0, 0);

            try {
                globeRenderer = new THREE.WebGLRenderer({
                    antialias: true,
                    alpha: true,
                    powerPreference: 'high-performance',
                    precision: 'mediump',
                    stencil: false,
                    depth: true
                });
            } catch (error) {
                console.warn('Globe WebGL init failed, using static fallback.', error);
                renderStaticGlobeFallback();
                setStaticGlobeFocus();
                return false;
            }

            globeRenderer.setPixelRatio(getEffectivePixelRatio());
            globeRenderer.setSize(width, height);
            globeRenderer.setClearColor(0x000000, 0);
            if ('outputColorSpace' in globeRenderer && THREE.SRGBColorSpace) {
                globeRenderer.outputColorSpace = THREE.SRGBColorSpace;
            }
            globeRenderer.domElement.id = 'singleGlobeCanvas';
            refs.singleGlobeContainer.innerHTML = '';
            refs.singleGlobeContainer.appendChild(globeRenderer.domElement);

            const geometry = new THREE.SphereGeometry(1, 64, 64);
            const material = createStylizedEarthMaterial();
            if (!material) {
                renderStaticGlobeFallback();
                setStaticGlobeFocus();
                return false;
            }

            globeMesh = new THREE.Mesh(geometry, material);
            globeScene.add(globeMesh);
            createGlobeHalo();

            const textureLoader = new THREE.TextureLoader();
            textureLoader.load(
                GLOBE_TEXTURE_URLS.topo,
                (texture) => setEarthTextureUniform(material, 'topoMap', texture, false),
                undefined,
                () => console.warn('Unable to load local topology texture for globe.')
            );
            textureLoader.load(
                GLOBE_TEXTURE_URLS.water,
                (texture) => setEarthTextureUniform(material, 'waterMap', texture, false),
                undefined,
                () => useFallbackEarthMaterial()
            );
            textureLoader.load(
                GLOBE_TEXTURE_URLS.clouds,
                (texture) => {
                    applyTextureDefaults(texture, false);
                    texture.wrapS = THREE.RepeatWrapping;
                    texture.wrapT = THREE.ClampToEdgeWrapping;
                    createCloudLayer(createStylizedCloudTexture(texture));
                }
            );

            globeLastFrameTime = 0;
            resetOrbitOverlay();
            animateGlobe();
            return true;
        }

        function latLngToCamAngles(lat, lng) {
            const phi = (90 - lat) * (Math.PI / 180);
            const theta = (lng - 90) * (Math.PI / 180);
            return { phi, theta };
        }

        function clearGlobeMarkerMeshes() {
            if (globeMesh) {
                globeMarkers.forEach((marker) => globeMesh.remove(marker));
            }
            globeMarkers = [];
            globeMarker = null;
            globePrimaryCoordinate = null;
        }

        function clearGlobeMarkers() {
            clearGlobeMarkerMeshes();
            globeArrived = true;
            markerFlashDone = true;
            globeAnimationTime = 0;
            camTarget.phi = camCurrent.phi;
            camTarget.theta = camCurrent.theta;
            resetOrbitOverlay();
        }

        function setGlobeMarkers(coordsList) {
            if (!globeMesh) {
                globeMarkers = [];
                globeMarker = null;
                globePrimaryCoordinate = null;
                return;
            }

            clearGlobeMarkerMeshes();
            globePrimaryCoordinate = coordsList[0] || null;

            coordsList.forEach(([lat, lng]) => {
                const markerMesh = createMarkerMesh();
                if (!markerMesh) return;
                const position = latLngToSpherePosition(lat, lng, 1.05);
                markerMesh.position.set(position.x, position.y, position.z);
                globeMesh.add(markerMesh);
                globeMarkers.push(markerMesh);
            });

            globeMarker = globeMarkers[0] || null;
        }

        function rotateGlobeToCoordinates(coordinates) {
            const coordsList = normalizeLocationCoordinates(coordinates);
            const [lat, lng] = coordsList[0] || [];
            if (!coordsList.length || Number.isNaN(lat) || Number.isNaN(lng)) {
                clearGlobeMarkers();
                return;
            }

            if (!globeMesh) {
                globePrimaryCoordinate = coordsList[0] || null;
                globeArrived = true;
                markerFlashDone = true;
                globeAnimationTime = 0;
                setStaticGlobeFocus();
                return;
            }

            const angles = latLngToCamAngles(lat, lng);
            camTarget.phi = angles.phi;
            camTarget.theta = angles.theta;
            globeArrived = false;
            markerFlashDone = false;
            globeAnimationTime = 0;
            setGlobeMarkers(coordsList);
            resetOrbitOverlay();
        }

        function projectWorldPointToOverlay(worldPoint) {
            if (!worldPoint || !globeCamera || !refs.globeShell || !refs.orbitOverlay || typeof THREE === 'undefined') return null;
            globeCamera.updateMatrixWorld();
            if (globeMesh) globeMesh.updateWorldMatrix(true, false);
            const facing = worldPoint.clone().normalize().dot(globeCamera.position.clone().normalize());
            if (facing <= 0.02) return null;

            const projected = worldPoint.clone().project(globeCamera);
            if (!Number.isFinite(projected.x) || !Number.isFinite(projected.y) || projected.z < -1 || projected.z > 1) return null;
            const metrics = getOrbitViewportMetrics();
            const shellRect = refs.globeShell.getBoundingClientRect();
            const overlayRect = refs.orbitOverlay.getBoundingClientRect();
            if (!shellRect.width || !shellRect.height || !overlayRect.width || !overlayRect.height) return null;

            return clampOrbitPoint({
                x: ((projected.x * 0.5 + 0.5) * shellRect.width + (shellRect.left - overlayRect.left)) * metrics.scaleX,
                y: ((-projected.y * 0.5 + 0.5) * shellRect.height + (shellRect.top - overlayRect.top)) * metrics.scaleY
            }, metrics.width, metrics.height, 12);
        }

        function projectCoordinateToOverlay(coordinate, radius = 0.985) {
            if (!coordinate || !globeMesh || typeof THREE === 'undefined') return null;
            const [lat, lng] = coordinate;
            if (!Number.isFinite(lat) || !Number.isFinite(lng)) return null;

            const localPoint = latLngToSpherePosition(lat, lng, radius);
            const worldPoint = globeMesh.localToWorld(new THREE.Vector3(localPoint.x, localPoint.y, localPoint.z));
            return projectWorldPointToOverlay(worldPoint);
        }

        function projectMarkerToOverlay(marker) {
            if (!marker || typeof THREE === 'undefined') return null;
            marker.updateWorldMatrix(true, false);
            const worldPoint = new THREE.Vector3();
            marker.getWorldPosition(worldPoint);
            return projectWorldPointToOverlay(worldPoint);
        }

        function animateGlobe(now = performance.now()) {
            requestAnimationFrame(animateGlobe);
            if (document.hidden || !globeRenderer || !globeCamera || !globeMesh) return;

            const deltaSeconds = getGlobeDeltaTime(now);
            globeAnimationTime += deltaSeconds;
            const lerpFactor = 1 - Math.pow(0.0025, deltaSeconds * 3.4);
            let dTheta = camTarget.theta - camCurrent.theta;
            while (dTheta > Math.PI) dTheta -= 2 * Math.PI;
            while (dTheta < -Math.PI) dTheta += 2 * Math.PI;
            const dPhi = camTarget.phi - camCurrent.phi;

            const arrived = Math.abs(dTheta) < 0.01 && Math.abs(dPhi) < 0.01;
            if (!globeArrived && arrived) {
                globeArrived = true;
                globeAnimationTime = 0;
                camCurrent.phi = camTarget.phi;
                camCurrent.theta = camTarget.theta;
            }

            if (!globeArrived) {
                camCurrent.phi += dPhi * lerpFactor;
                camCurrent.theta += dTheta * lerpFactor;
            }

            const cx = -GLOBE_CAM_RADIUS * Math.sin(camCurrent.phi) * Math.sin(camCurrent.theta);
            const cy = GLOBE_CAM_RADIUS * Math.cos(camCurrent.phi);
            const cz = -GLOBE_CAM_RADIUS * Math.sin(camCurrent.phi) * Math.cos(camCurrent.theta);
            globeCamera.position.set(cx, cy, cz);
            globeCamera.lookAt(0, 0, 0);

            if (globeHaloMesh) {
                const haloScale = 1 + Math.sin(globeAnimationTime * 0.9) * 0.012;
                globeHaloMesh.scale.setScalar(haloScale);
                globeHaloMesh.rotation.y += deltaSeconds * 0.08;
            }

            if (globeCloudMesh) {
                globeCloudMesh.rotation.y += deltaSeconds * 0.018;
            }

            if (globeMarkers.length > 0) {
                if (globeArrived) {
                    const overlayPoint = projectMarkerToOverlay(globeMarker) || projectCoordinateToOverlay(globePrimaryCoordinate);
                    if (overlayPoint) {
                        const yearPoint = getYearAnchorPoint(overlayPoint);
                        if (yearPoint) {
                            updateOrbitOverlay(yearPoint, overlayPoint, false);
                        } else {
                            resetOrbitOverlay();
                        }
                    } else {
                        resetOrbitOverlay();
                    }
                } else {
                    resetOrbitOverlay();
                }

                if (globeArrived && !markerFlashDone) {
                    const t = globeAnimationTime * 2.8;
                    const cycle = Math.floor(t);
                    globeMarkers.forEach((marker) => {
                        if (cycle >= 2) {
                            setMarkerState(marker, 1, 1);
                        } else {
                            const phase = (t - cycle) * Math.PI;
                            const scale = 1.0 + 0.95 * Math.sin(phase);
                            const opacity = 1.0 - 0.6 * Math.sin(phase);
                            setMarkerState(marker, scale, opacity);
                        }
                    });
                    if (cycle >= 2) markerFlashDone = true;
                } else if (globeArrived) {
                    globeMarkers.forEach((marker) => setMarkerState(marker, 1, 1));
                }
            }

            globeRenderer.render(globeScene, globeCamera);
        }

        function handleGlobeResize() {
            if (!globeRenderer || !globeCamera || !refs.singleGlobeContainer) return;
            const width = refs.singleGlobeContainer.clientWidth;
            const height = refs.singleGlobeContainer.clientHeight;
            if (!width || !height) return;

            globeCamera.aspect = width / height;
            globeCamera.updateProjectionMatrix();
            globeRenderer.setPixelRatio(getEffectivePixelRatio());
            globeRenderer.setSize(width, height);
        }

        function syncStageScale() {
            const scale = Math.min(window.innerWidth / SCREEN_WIDTH, window.innerHeight / SCREEN_HEIGHT);
            document.documentElement.style.setProperty('--stage-scale', Math.max(0.1, scale).toFixed(6));
            handleGlobeResize();
            if (!globePrimaryCoordinate) {
                resetOrbitOverlay();
                return;
            }

            if (!globeMesh) {
                setStaticGlobeFocus();
            }
        }

        function renderArchive(vm) {
            const photos = sortPhotosForDisplay(vm.photos);

            const safePhotos = hasPhotos ? photos : [''];
            currentArchiveIndex = Math.max(0, Math.min(currentArchiveIndex, safePhotos.length - 1));

            const focusUrl = hasPhotos ? safePhotos[currentArchiveIndex] : '';
            const prevIndex = (currentArchiveIndex - 1 + safePhotos.length) % safePhotos.length;
            const nextIndex = (currentArchiveIndex + 1) % safePhotos.length;

            let prevUrl = hasPhotos ? safePhotos[prevIndex] : '';
            let nextUrl = hasPhotos ? safePhotos[nextIndex] : '';

            // 照片不足 3 张时，不要用同一张图重复填充左右缩略图位。
            if (prevUrl === focusUrl) prevUrl = '';
            if (nextUrl === focusUrl) nextUrl = '';
            if (prevUrl && nextUrl && prevUrl === nextUrl) prevUrl = '';

            const prevCard = refs.archiveThumbPrev ? refs.archiveThumbPrev.closest('.archive-card') : null;
            const nextCard = refs.archiveThumbNext ? refs.archiveThumbNext.closest('.archive-card') : null;

            if (nextCard) nextCard.classList.toggle('is-hidden', !nextUrl);

            const activeMeta = buildArchivePhotoMeta(vm, focusUrl);
            const nextMeta = buildArchivePhotoMeta(vm, nextUrl);

            refs.archiveThumbNext.innerHTML = nextUrl ? `<img src="${nextUrl}" alt="${tx('nextArchive')}">` : '';
            refs.archiveThumbPrev.classList.toggle('is-empty', !prevUrl);
            refs.archiveThumbNext.classList.toggle('is-empty', !nextUrl);
            refs.archiveThumbPrev.disabled = !hasPhotos || safePhotos.length <= 1 || !prevUrl;
            refs.archiveThumbNext.disabled = !hasPhotos || safePhotos.length <= 1 || !nextUrl;

            setImage(refs.archiveFocus, focusUrl, tx('mainArchivePhoto'));

        function ensureMediaIframe() {
            let iframe = refs.videoFrame.querySelector('iframe');
            if (!iframe) {
                iframe = document.createElement('iframe');
                iframe.id = 'mediaVideo';
                iframe.allow = 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture';
                iframe.allowFullscreen = true;
                refs.videoFrame.appendChild(iframe);
                refs.mediaVideo = iframe;
            }
            return iframe;
        }

        function ensureMediaPlayer() {
            let player = refs.videoFrame.querySelector('video');
            if (!player) {
                player = document.createElement('video');
                player.id = 'mediaVideoPlayer';
                player.controls = true;
                player.playsInline = true;
                player.preload = 'metadata';
                refs.videoFrame.appendChild(player);
            }
            return player;
        }

        function isDirectVideoMedia(url) {
            return /\.(mp4|webm|ogg)(?:[?#].*)?$/i.test(String(url || ''));
        }

        function resetInlineMedia() {
            const iframe = ensureMediaIframe();
            const player = ensureMediaPlayer();

            iframe.style.display = 'none';
            iframe.src = 'about:blank';

            player.pause();
            player.removeAttribute('src');
            player.style.display = 'none';
            player.load();
        }

        function playInlineVideo(url) {
            if (!url) return;
            refs.videoFrame.classList.add('is-playing');
            refs.videoFrame.onclick = null;
            if (isDirectVideoMedia(url)) {
                const iframe = ensureMediaIframe();
                const player = ensureMediaPlayer();
                iframe.style.display = 'none';
                iframe.src = 'about:blank';
                player.src = url;
                player.style.display = 'block';
                const playback = player.play();
                if (playback && typeof playback.catch === 'function') {
                    playback.catch(() => {});
                }
                return;
            }

            const iframe = ensureMediaIframe();
            const player = ensureMediaPlayer();
            player.pause();
            player.removeAttribute('src');
            player.style.display = 'none';
            player.load();
            iframe.src = url;
            iframe.style.display = 'block';
        }

        function getQuizItems(vm) {
            const raw = vm && vm.raw ? vm.raw : {};
            const rawQuizzes = Array.isArray(vm && vm.quizzes)
                ? vm.quizzes
                : Array.isArray(raw.quizzes)
                  ? raw.quizzes
                  : raw.quiz
                    ? [raw.quiz]
                    : [];

            return rawQuizzes.map((quiz, quizIndex) => {
                if (!quiz || typeof quiz !== 'object') return null;
                const question = String(lx(quiz.question) || '').trim();
                const options = Array.isArray(quiz.options)
                    ? quiz.options.map((option) => String(lx(option) || '').trim())
                    : [];
                const answerIndex = Number(quiz.answerIndex);
                const explanation = String(lx(quiz.explanation) || '').trim();

                if (!question || options.length < 2 || !Number.isInteger(answerIndex) || answerIndex < 0 || answerIndex >= options.length) {
                    return null;
                }

                return {
                    id: String(quiz.id || `quiz-${quizIndex + 1}`),
                    question,
                    options,
                    answerIndex,
                    explanation
                };
            }).filter(Boolean);
        }

        function applyQuizAnswer(container, quiz, selectedIndex) {
            if (!container || !quiz || container.classList.contains('is-answered')) return;
            const isCorrect = selectedIndex === quiz.answerIndex;
            container.classList.add('is-answered');

            container.querySelectorAll('.quick-quiz-option').forEach((button) => {
                const optionIndex = Number(button.dataset.answerIndex);
                button.disabled = true;
                button.classList.toggle('is-selected', optionIndex === selectedIndex);
                button.classList.toggle('is-correct-answer', optionIndex === quiz.answerIndex);
                button.classList.toggle('is-wrong-answer', optionIndex === selectedIndex && !isCorrect);
            });

            const answerLabel = quiz.options[quiz.answerIndex] || '';
            const feedback = container.querySelector('.quick-quiz-feedback');
            if (feedback) {
                const lead = isCorrect ? uiText('Correct', '答对了') : uiText('Not quite', '差一点');
                const answerText = uiText('Answer', '正确答案');
                feedback.innerHTML = `
                    <span class="quick-quiz-feedback-result">
                        <strong>${escapeHtml(lead)}</strong>
                        <span>${escapeHtml(answerText)}：${escapeHtml(answerLabel)}</span>
                    </span>
                    ${quiz.explanation ? `<span class="quick-quiz-feedback-explanation">${escapeHtml(quiz.explanation)}</span>` : ''}
                `;
            }

            if (refs.quizModalContinue && container === refs.quizModalBody) {
                refs.quizModalContinue.disabled = false;
            }
        }

        function shuffleQuizOptions(quiz) {
            const entries = quiz.options.map((option, index) => ({
                option,
                originalIndex: index
            }));

            for (let index = entries.length - 1; index > 0; index -= 1) {
                const swapIndex = Math.floor(Math.random() * (index + 1));
                [entries[index], entries[swapIndex]] = [entries[swapIndex], entries[index]];
            }

            let answerIndex = entries.findIndex((entry) => entry.originalIndex === quiz.answerIndex);
            if (answerIndex === quiz.answerIndex && entries.length > 1) {
                const swapIndex = (answerIndex + 1 + Math.floor(Math.random() * (entries.length - 1))) % entries.length;
                [entries[answerIndex], entries[swapIndex]] = [entries[swapIndex], entries[answerIndex]];
                answerIndex = swapIndex;
            }

            return {
                ...quiz,
                options: entries.map((entry) => entry.option),
                answerIndex
            };
        }

                if (/dual-screen\.html$/i.test(url.pathname)) {
                    url.pathname = url.pathname.replace(/dual-screen\.html$/i, 'index.html');
                }
                url.hash = '';
                url.searchParams.delete('layout');
                url.searchParams.set('storyline', POP_QUIZ_MOBILE_STORYLINE_ID);
                url.searchParams.set('quiz', POP_QUIZ_MOBILE_QUERY_VALUE);
                return url.href;

            if (item && item.type === 'image' && /diagram|explainer|eval|policy|value|search|architecture|flow/.test(haystack)) score += 9;
            if (/diagram|explainer|eval|policy|value|search|architecture|flow|source|archive|paper|manual/.test(haystack)) score += 4;
            if (/archive|paper|manual|source/.test(haystack)) score += 2;
            if (/portrait|photo|alan-turing|john-mccarthy|lee-sedol/.test(haystack)) score -= 5;
            if (item && item.type === 'image') score += 1;
            return score;

                    text: String(lx(concept.text || concept.description || concept.summary) || '').trim(),
                    chip: String(lx(concept.chip || concept.type) || uiText('Key concept', '关键概念')).trim()

            const artifact = getAchievementField(rawMilestone, 'artifact', '');

            const mediaMeta = mediaUrl ? getConfiguredImageMeta({ raw: rawMilestone }, mediaUrl) : null;
            const mediaTitle = mediaMeta && mediaMeta.caption ? mediaMeta.caption : artifact;
            const mediaHtml = mediaUrl ? `
                <div class="bench-code-media">

                </div>
                ${mediaTitle ? `<div class="bench-code-media-caption">${escapeHtml(mediaTitle)}</div>` : ''}
            ` : '';
            return `

        function getGenericDemoImage(rawMilestone) {
            const images = rawMilestone && rawMilestone.resources && Array.isArray(rawMilestone.resources.images)
                ? rawMilestone.resources.images.filter(Boolean)
                : [];
            const heroImages = new Set(sortPhotosForDisplay(images).slice(0, 3));
            const configuredDemoImage = rawMilestone && rawMilestone.achievement
                ? String(rawMilestone.achievement.demoImage || '').trim()
                : '';
            if (configuredDemoImage && !heroImages.has(configuredDemoImage)) {
                return configuredDemoImage;
            }
            const demoCandidates = images.filter((url) => !heroImages.has(url));
            if (!demoCandidates.length) return '';

            const scored = demoCandidates.map((url, index) => {
                const meta = getConfiguredImageMeta({ raw: rawMilestone }, url) || {};
                const haystack = `${url} ${meta.caption || ''} ${meta.subcaption || ''} ${meta.usage || ''}`.toLowerCase();
                let score = 0;
                if (/\/explainers\/|diagram|explainer|architecture|flow|graph|cluster|clause|rule|pipeline|ranking|search|density|eigen|centroid|board|database/.test(haystack)) score += 20;
                if (/profile|portrait|photo|headshot|people/.test(haystack)) score -= 10;
                if (/paper|source|archive|manual|reference/.test(haystack)) score -= 3;
                return { url, index, score };
            });

            return scored
                .sort((a, b) => b.score - a.score || a.index - b.index)
                .map((entry) => entry.url)[0] || '';
        }

                </article>
            `).join('');
        }

        function renderBenchDossier(vm) {
            if (!refs.benchDossier) return;
            const raw = vm.raw || {};
            refs.benchMapHeading.textContent = tx('achievementMap');
            refs.benchMaterialHeading.textContent = tx('sourceMaterials');
            refs.benchCoreArea.textContent = getAchievementField(raw, 'area', vm.category || vm.subtitle || tx('aiHistory'));
            refs.benchCoreYear.textContent = String(vm.year || '');
            refs.benchCoreTitle.textContent = vm.title || '';
            refs.benchCoreSummary.innerHTML = buildSummaryHtml(vm);
            renderBenchMapList();
            renderBenchHeroVisual(vm);
            renderBenchDemo(vm);
            renderBenchSources(raw);
            renderBenchEvidence(vm);
        }

        function bindPhotoClicks() {
            document.querySelectorAll('.media-photo').forEach((card) => {
                card.onclick = () => {
                    const startIndex = Number(card.dataset.photoIndex || 0);
                    openPhotoViewer(startIndex);
                };
            });
        }

        function hasOpenPhotoViewer() {
            return Boolean(document.querySelector('.photo-viewer'));
        }

        function closeTransientOverlaysForIdleAdvance() {
            document.querySelectorAll('.photo-viewer').forEach((viewer) => viewer.remove());
            if (hasOpenQuizModal()) {
                closeQuizModal();
            }
        }

        function openPhotoViewer(startIndex) {
            const vm = getVm(currentIndex);
            const photos = sortPhotosForDisplay(vm.photos);
            if (!photos.length) return;

            let currentPhotoIndex = Math.max(0, Math.min(startIndex, photos.length - 1));
            const viewer = document.createElement('div');
            viewer.className = 'photo-viewer';
            viewer.innerHTML = `
                <button class="close-viewer" type="button">×</button>
                <button class="photo-prev" type="button">◀</button>
                <img src="${photos[currentPhotoIndex]}" class="viewer-photo" alt="${tx('historicalArchive')}">
                <button class="photo-next" type="button">▶</button>
                <div class="photo-counter">${currentPhotoIndex + 1} / ${photos.length}</div>
            `;
            document.body.appendChild(viewer);

            const closeViewer = () => {
                viewer.remove();
            };

            viewer.querySelector('.close-viewer').onclick = closeViewer;
            viewer.querySelector('.photo-prev').onclick = () => {
                currentPhotoIndex = (currentPhotoIndex - 1 + photos.length) % photos.length;
                viewer.querySelector('.viewer-photo').src = photos[currentPhotoIndex];
                viewer.querySelector('.photo-counter').textContent = `${currentPhotoIndex + 1} / ${photos.length}`;
            };
            viewer.querySelector('.photo-next').onclick = () => {
                currentPhotoIndex = (currentPhotoIndex + 1) % photos.length;
                viewer.querySelector('.viewer-photo').src = photos[currentPhotoIndex];
                viewer.querySelector('.photo-counter').textContent = `${currentPhotoIndex + 1} / ${photos.length}`;
            };

            const handleKey = (event) => {
                if (event.key === 'Escape') closeViewer();
                if (event.key === 'ArrowLeft') viewer.querySelector('.photo-prev').click();
                if (event.key === 'ArrowRight') viewer.querySelector('.photo-next').click();
            };

            document.addEventListener('keydown', handleKey);
            const observer = new MutationObserver(() => {
                if (!document.body.contains(viewer)) {
                    document.removeEventListener('keydown', handleKey);
                    observer.disconnect();
                }
            });
            observer.observe(document.body, { childList: true });
        }

        function renderPage(index) {
            const vm = getVm(index);
            currentArchiveIndex = choosePreferredArchiveIndex(sortPhotosForDisplay(vm.photos));
            applyStaticTranslations();
            refs.stage.classList.toggle('is-bench-dossier', isResearchDossierActive());
            renderHeader(vm);
            if (isResearchDossierActive()) {
                clearGlobeMarkers();
                resetOrbitOverlay();
                resetInlineMedia();
                renderBenchDossier(vm);
            } else {
                renderHero(vm);
                renderStory(vm);
                renderFigures(vm);
                renderArchive(vm);
                renderCommentary(vm);
                bindPhotoClicks();
            }
            renderTimeline(vm);
            document.title = `${tx('appTitleSingle')} - ${vm.year} ${vm.title}`;
            preloadAdjacentAssets(index);
        }

        function isPortraitStackLayout() {
            if (typeof window.matchMedia === 'function') {
                return window.matchMedia('(max-width: 1100px) and (orientation: portrait)').matches;
            }
            return window.innerWidth <= 1100 && window.innerHeight > window.innerWidth;
        }

        function getPortraitIgnoreElement(target) {
            if (!target) return null;
            const element = target.nodeType === 1 ? target : target.parentElement;
            if (!element || !PORTRAIT_EDGE_IGNORE_SELECTOR) return null;
            return element.closest(PORTRAIT_EDGE_IGNORE_SELECTOR);
        }

        function shouldIgnorePortraitEdgeTarget(target) {
            return Boolean(getPortraitIgnoreElement(target));
        }

        function resetPortraitScrollPosition() {
            if (!isPortraitStackLayout()) return;

            const activeElement = document.activeElement;
            if (activeElement && activeElement !== document.body && typeof activeElement.blur === 'function') {
                activeElement.blur();
            }

            const resetScroll = () => {
                window.scrollTo(0, 0);
                document.documentElement.scrollTop = 0;
                document.body.scrollTop = 0;
                if (refs.viewport) {
                    refs.viewport.scrollTop = 0;
                }
            };

            resetScroll();
            window.requestAnimationFrame(resetScroll);
            window.setTimeout(resetScroll, 0);
        }

        function getDocumentScrollTop() {
            return window.scrollY
                || window.pageYOffset
                || document.documentElement.scrollTop
                || document.body.scrollTop
                || 0;
        }

        function getDocumentScrollMax() {
            const scrollHeight = Math.max(
                document.documentElement.scrollHeight,
                document.body.scrollHeight
            );
            return Math.max(0, scrollHeight - window.innerHeight);
        }

        function isNearPortraitBoundary(boundary) {
            const scrollTop = getDocumentScrollTop();
            const maxScroll = getDocumentScrollMax();

            if (boundary === 'top') {
                return scrollTop <= PORTRAIT_EDGE_NAV_TOLERANCE;
            }

            return scrollTop >= maxScroll - PORTRAIT_EDGE_NAV_TOLERANCE;
        }

        function scrollPortraitToBoundary(boundary) {
            if (!isPortraitStackLayout()) return;

            const targetTop = boundary === 'bottom' ? getDocumentScrollMax() : 0;
            const applyScroll = () => {
                window.scrollTo(0, targetTop);
                document.documentElement.scrollTop = targetTop;
                document.body.scrollTop = targetTop;
                if (refs.viewport) {
                    refs.viewport.scrollTop = targetTop;
                }
            };

            applyScroll();
            window.requestAnimationFrame(applyScroll);
            window.setTimeout(applyScroll, 0);
        }

        function releasePortraitEdgeGesture() {
            portraitEdgeGesture = null;
        }

        function notePortraitTouchActivity() {
            lastPortraitTouchAt = Date.now();
        }

        function isPortraitTouchEmulationContext() {
            const hasTouchPoints = typeof navigator !== 'undefined' && Number(navigator.maxTouchPoints) > 0;
            const supportsMatchMedia = typeof window.matchMedia === 'function';
            const hasCoarsePointer = supportsMatchMedia
                && (window.matchMedia('(pointer: coarse)').matches || window.matchMedia('(any-pointer: coarse)').matches);
            const hasNoHover = supportsMatchMedia
                && (window.matchMedia('(hover: none)').matches || window.matchMedia('(any-hover: none)').matches);
            return hasTouchPoints || hasCoarsePointer || hasNoHover;
        }

        function shouldIgnorePortraitPointerEvent(event) {
            if (!event || !window.SwipeNavigation || typeof window.SwipeNavigation.isTouchLikePointer !== 'function') {
                return true;
            }

            const isTouchLike = window.SwipeNavigation.isTouchLikePointer(event.pointerType);
            const isEmulatedMouse = event.pointerType === 'mouse' && isPortraitTouchEmulationContext();

            if (!event.isTrusted || (!isTouchLike && !isEmulatedMouse)) {
                return true;
            }

            return Date.now() - lastPortraitTouchAt < PORTRAIT_EDGE_POINTER_SUPPRESSION_MS;
        }

        function resetPortraitEdgeBoundary() {
            if (!portraitEdgeGesture) return;
            portraitEdgeGesture.boundary = '';
            portraitEdgeGesture.boundaryDrag = 0;
        }

        function getPortraitBoundaryForStep(deltaY) {
            if (deltaY < 0 && isNearPortraitBoundary('bottom')) {
                return 'bottom';
            }

            if (deltaY > 0 && isNearPortraitBoundary('top')) {
                return 'top';
            }

            return '';
        }

        function maybeNavigateAcrossPortraitBoundary(currentY, originalEvent) {
            if (!portraitEdgeGesture || !Number.isFinite(currentY)) return false;

            const deltaStep = currentY - portraitEdgeGesture.lastY;
            portraitEdgeGesture.lastY = currentY;

            if (!deltaStep) return false;

            const boundary = getPortraitBoundaryForStep(deltaStep);
            if (!boundary) {
                resetPortraitEdgeBoundary();
                return false;
            }

            if (portraitEdgeGesture.boundary !== boundary) {
                portraitEdgeGesture.boundary = boundary;
                portraitEdgeGesture.boundaryDrag = 0;
            }

            const outwardDelta = boundary === 'bottom' ? -deltaStep : deltaStep;
            if (outwardDelta <= 0) {
                resetPortraitEdgeBoundary();
                return false;
            }

            portraitEdgeGesture.boundaryDrag += outwardDelta;
            if (portraitEdgeGesture.boundaryDrag < PORTRAIT_EDGE_NAV_MIN_Y) {
                return false;
            }

            if (originalEvent && originalEvent.cancelable) {
                originalEvent.preventDefault();
            }

            const direction = boundary === 'bottom' ? 'next' : 'prev';
            const portraitScrollAnchor = boundary === 'bottom' ? 'top' : 'bottom';

            releasePortraitEdgeGesture();
            navigate(direction, { portraitScrollAnchor });
            return true;
        }

        function findTouchByIdentifier(touchList, identifier) {
            if (!touchList || identifier == null) return null;
            for (let index = 0; index < touchList.length; index += 1) {
                if (touchList[index].identifier === identifier) {
                    return touchList[index];
                }
            }
            return null;
        }

        function handlePortraitEdgeTouchStart(event) {
            if (!isPortraitStackLayout()) return;
            if (!event.isTrusted) return;
            if (shouldIgnorePortraitEdgeTarget(event.target)) return;
            if (portraitEdgeGesture) return;

            const primaryTouch = event.changedTouches && event.changedTouches[0];
            if (!primaryTouch) return;
            notePortraitTouchActivity();

            portraitEdgeGesture = {
                identifier: primaryTouch.identifier,
                source: 'touch',
                startY: primaryTouch.clientY,
                lastY: primaryTouch.clientY,
                boundary: '',
                boundaryDrag: 0
            };
        }

        function handlePortraitEdgeTouchMove(event) {
            if (!portraitEdgeGesture || portraitEdgeGesture.source !== 'touch') return;
            notePortraitTouchActivity();

            const activeTouch = findTouchByIdentifier(event.touches, portraitEdgeGesture.identifier)
                || findTouchByIdentifier(event.changedTouches, portraitEdgeGesture.identifier);
            if (!activeTouch) return;

            maybeNavigateAcrossPortraitBoundary(activeTouch.clientY, event);
        }

        function handlePortraitEdgeTouchEnd(event) {
            if (!portraitEdgeGesture || portraitEdgeGesture.source !== 'touch') return;
            notePortraitTouchActivity();

            const endedTouch = findTouchByIdentifier(event.changedTouches, portraitEdgeGesture.identifier);
            if (endedTouch && maybeNavigateAcrossPortraitBoundary(endedTouch.clientY, event)) {
                return;
            }

            releasePortraitEdgeGesture();
        }

        function handlePortraitEdgePointerDown(event) {
            if (!isPortraitStackLayout()) return;
            if (shouldIgnorePortraitPointerEvent(event)) return;
            if (shouldIgnorePortraitEdgeTarget(event.target)) return;
            if (portraitEdgeGesture) return;

            portraitEdgeGesture = {
                pointerId: event.pointerId,
                source: 'pointer',
                startY: event.clientY,
                lastY: event.clientY,
                boundary: '',
                boundaryDrag: 0
            };
        }

        function handlePortraitEdgePointerMove(event) {
            if (!portraitEdgeGesture || portraitEdgeGesture.source !== 'pointer') return;
            if (event.pointerId !== portraitEdgeGesture.pointerId) return;
            if (shouldIgnorePortraitPointerEvent(event)) return;

            maybeNavigateAcrossPortraitBoundary(event.clientY, event);
        }

        function handlePortraitEdgePointerEnd(event) {
            if (!portraitEdgeGesture || portraitEdgeGesture.source !== 'pointer') return;
            if (event.pointerId !== portraitEdgeGesture.pointerId) return;
            if (shouldIgnorePortraitPointerEvent(event)) return;

            if (maybeNavigateAcrossPortraitBoundary(event.clientY, event)) {
                return;
            }

            releasePortraitEdgeGesture();
        }

        function jumpTo(index, options = {}) {
            const { portraitScrollAnchor = 'top', skipCompletionQuiz = false } = options;
            if (index < 0 || index >= milestoneList.length || index === currentIndex) return;
            if (!skipCompletionQuiz && maybeOpenCompletionQuiz(() => {
                jumpTo(index, { ...options, skipCompletionQuiz: true });
            })) {
                return;
            }

            preloadMilestoneAssets(index);
            currentIndex = index;
            renderPage(currentIndex);
            if (portraitScrollAnchor === 'bottom') {
                scrollPortraitToBoundary('bottom');
            } else {
                resetPortraitScrollPosition();
            }
        }

        function navigate(direction, options = {}) {
            if (milestoneList.length <= 1) return;
            const nextIndex = direction === 'next'
                ? Math.min(currentIndex + 1, milestoneList.length - 1)
                : Math.max(currentIndex - 1, 0);
            jumpTo(nextIndex, options);
        }

        function initAutoHideScrollbars() {
            const selector = [
                '.story-summary',
                '.commentary-list',
                '.bench-core-summary',
                '.bench-map-list',
                '.bench-source-list',
                '.bench-evidence-list'
            ].join(',');
            const timers = new WeakMap();

            document.querySelectorAll(selector).forEach((element) => {
                element.addEventListener('scroll', () => {
                    element.classList.add('is-scrolling');
                    const existingTimer = timers.get(element);
                    if (existingTimer) window.clearTimeout(existingTimer);
                    timers.set(element, window.setTimeout(() => {
                        element.classList.remove('is-scrolling');
                        timers.delete(element);
                    }, 900));
                }, { passive: true });
            });
        }

        function initSwipeNavigation() {
            if (!window.SwipeNavigation || typeof window.SwipeNavigation.setupSwipeNavigation !== 'function') {
                return;
            }

            window.SwipeNavigation.setupSwipeNavigation({
                surface: refs.stage,
                onNavigate(direction) {
                    if (hasOpenQuizModal()) return;
                    if (isPortraitStackLayout()) return;
                    navigate(direction);
                }
            });
        }

        function clearIdleAdvanceTimer() {
            if (idleAdvanceTimer) {
                window.clearTimeout(idleAdvanceTimer);
                idleAdvanceTimer = null;
            }
        }

        function handleIdleAutoAdvance() {
            if (hasOpenMobileQuiz()) {
                clearIdleAdvanceTimer();
                return;
            }
            if (milestoneList.length <= 1) {
                clearIdleAdvanceTimer();
                return;
            }

            closeTransientOverlaysForIdleAdvance();
            const nextIndex = currentIndex >= milestoneList.length - 1 ? 0 : currentIndex + 1;
            jumpTo(nextIndex, { skipCompletionQuiz: true });
            restartIdleAdvanceTimer();
        }

        function restartIdleAdvanceTimer() {
            clearIdleAdvanceTimer();
            if (milestoneList.length <= 1) return;
            idleAdvanceTimer = window.setTimeout(handleIdleAutoAdvance, IDLE_AUTO_ADVANCE_MS);
        }

        function registerUserActivity(event) {
            if (event && event.isTrusted === false) return;
            if (hasOpenMobileQuiz()) return;
            restartIdleAdvanceTimer();
        }

        if (!milestoneList.length) {
            refs.stage.innerHTML = '<div class="empty-state">暂无里程碑数据</div>';
        } else {
            renderStorylineSelect();
            if (refs.storylineSelect) {
                refs.storylineSelect.addEventListener('change', () => {
                    setActiveStoryline(refs.storylineSelect.value, { updateUrl: true });
                });
            }
            refs.prevBtn.addEventListener('click', () => navigate('prev'));
            refs.nextBtn.addEventListener('click', () => navigate('next'));
            if (refs.quizModalClose) refs.quizModalClose.addEventListener('click', completeQuizModal);
            if (refs.quizModalSkip) refs.quizModalSkip.addEventListener('click', completeQuizModal);
            if (refs.quizModalContinue) refs.quizModalContinue.addEventListener('click', () => {
                if (!refs.quizModalContinue.disabled) completeQuizModal();
            });
            if (refs.mobileQuizReset) refs.mobileQuizReset.addEventListener('click', resetMobileQuiz);
            if (refs.mobileQuizExit) refs.mobileQuizExit.addEventListener('click', closeMobileQuiz);
            if (refs.regionModalClose) refs.regionModalClose.addEventListener('click', closeRegionPicker);
            if (refs.regionModal) {
                refs.regionModal.addEventListener('click', (event) => {
                    if (event.target === refs.regionModal) closeRegionPicker();
                });
            }

            window.addEventListener('resize', debounce(syncStageScale, 120));
            window.addEventListener('beforeunload', clearIdleAdvanceTimer);
            document.addEventListener('pointerdown', registerUserActivity, { passive: true });
            document.addEventListener('pointermove', registerUserActivity, { passive: true });
            document.addEventListener('click', registerUserActivity, { passive: true });
            document.addEventListener('wheel', registerUserActivity, { passive: true });
            document.addEventListener('touchstart', registerUserActivity, { passive: true });
            document.addEventListener('touchmove', registerUserActivity, { passive: true });
            document.addEventListener('touchstart', handlePortraitEdgeTouchStart, { passive: true });
            document.addEventListener('touchmove', handlePortraitEdgeTouchMove, { passive: false });
            document.addEventListener('touchend', handlePortraitEdgeTouchEnd, { passive: true });
            document.addEventListener('touchcancel', releasePortraitEdgeGesture, { passive: true });
            document.addEventListener('pointerdown', handlePortraitEdgePointerDown, { passive: true });
            document.addEventListener('pointermove', handlePortraitEdgePointerMove, { passive: true });
            document.addEventListener('pointerup', handlePortraitEdgePointerEnd, { passive: true });
            document.addEventListener('pointercancel', releasePortraitEdgeGesture, { passive: true });

            document.addEventListener('keydown', (event) => {
                registerUserActivity(event);
                if (hasOpenMobileQuiz()) {
                    if (event.key === 'Escape') closeMobileQuiz();
                    return;
                }
                if (hasOpenPhotoViewer()) return;
                if (hasOpenRegionModal()) {
                    if (event.key === 'Escape') closeRegionPicker();
                    return;
                }
                if (hasOpenQuizModal()) {
                    if (event.key === 'Escape') completeQuizModal();
                    if (event.key === 'Enter' && refs.quizModalContinue && !refs.quizModalContinue.disabled) {
                        completeQuizModal();
                    }
                    return;
                }
                if (event.key === 'ArrowRight') navigate('next');
                if (event.key === 'ArrowLeft') navigate('prev');
            });

            window.addEventListener('languageChanged', () => {
                vmCache.clear();
                renderStorylineSelect();
                renderPage(currentIndex);
                if (mobileQuizState) renderMobileQuizState();
            });

            syncStageScale();
            initGlobe();
            initSwipeNavigation();
            initAutoHideScrollbars();
            renderPage(currentIndex);
            if (isMobileQuizRequest()) {
                openMobileQuiz();
            }
            if (!mobileQuizState) {
                restartIdleAdvanceTimer();
            }
        }
    </script>
</body>
</html>

<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520" viewBox="0 0 900 520" role="img" aria-labelledby="title desc">
  <title id="title">NP-completeness reduction map</title>
  <desc id="desc">A conceptual diagram showing problems in NP reducing to SAT and an NP-complete problem connecting verification and hardness.</desc>
  <rect width="900" height="520" fill="#151515"/>
  <rect x="52" y="54" width="796" height="412" rx="18" fill="#202020" stroke="#5a3a12" stroke-width="2"/>
  <text x="80" y="104" fill="#f68900" font-family="Arial, sans-serif" font-size="26" font-weight="700">NP-COMPLETENESS</text>
  <text x="80" y="142" fill="#f4efe5" font-family="Arial, sans-serif" font-size="19">Fast verification does not guarantee fast solving.</text>
  <circle cx="238" cy="304" r="92" fill="#2b2b2b" stroke="#f68900" stroke-width="3"/>
  <text x="238" y="292" fill="#ffffff" font-family="Arial, sans-serif" font-size="28" font-weight="700" text-anchor="middle">SAT</text>
  <text x="238" y="324" fill="#d8d1c4" font-family="Arial, sans-serif" font-size="16" text-anchor="middle">canonical hard problem</text>
  <g fill="#f4efe5" font-family="Arial, sans-serif" font-size="17" font-weight="700">
    <rect x="536" y="174" width="190" height="54" rx="10" fill="#303030" stroke="#666"/>
    <text x="631" y="208" text-anchor="middle">Scheduling</text>
    <rect x="552" y="276" width="190" height="54" rx="10" fill="#303030" stroke="#666"/>
    <text x="647" y="310" text-anchor="middle">Routing</text>
    <rect x="510" y="378" width="190" height="54" rx="10" fill="#303030" stroke="#666"/>
    <text x="605" y="412" text-anchor="middle">Theorem proving</text>
  </g>
  <g stroke="#f68900" stroke-width="4" fill="none" marker-end="url(#arrow)">
    <path d="M530 202 C430 210 366 238 315 276"/>
    <path d="M548 304 C430 304 374 306 331 306"/>
    <path d="M506 402 C416 386 356 358 314 333"/>
  </g>
  <text x="452" y="260" fill="#f4efe5" font-family="Arial, sans-serif" font-size="18" font-weight="700">polynomial-time reductions</text>
  <rect x="80" y="396" width="262" height="44" rx="8" fill="#2a1f12" stroke="#6f4308"/>
  <text x="211" y="424" fill="#f4efe5" font-family="Arial, sans-serif" font-size="17" text-anchor="middle">Solve one efficiently → solve all NP</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#f68900"/>
    </marker>
  </defs>
</svg>

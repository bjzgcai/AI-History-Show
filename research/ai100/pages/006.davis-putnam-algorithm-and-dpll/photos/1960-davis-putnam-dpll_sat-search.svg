<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520" viewBox="0 0 900 520" role="img" aria-labelledby="title desc">
  <title id="title">Davis-Putnam and DPLL SAT search diagram</title>
  <desc id="desc">A conceptual diagram showing a CNF formula, propagation, branching, conflict pruning, and a satisfying assignment.</desc>
  <rect width="900" height="520" fill="#151515"/>
  <rect x="52" y="54" width="796" height="412" rx="18" fill="#202020" stroke="#5a3a12" stroke-width="2"/>
  <text x="80" y="104" fill="#f68900" font-family="Arial, sans-serif" font-size="26" font-weight="700">DAVIS-PUTNAM + DPLL</text>
  <text x="80" y="142" fill="#f4efe5" font-family="Arial, sans-serif" font-size="19">SAT solving as disciplined search through logical assignments.</text>

  <rect x="78" y="190" width="204" height="118" rx="14" fill="#2b2b2b" stroke="#666"/>
  <text x="180" y="228" fill="#ffffff" font-family="Arial, sans-serif" font-size="21" font-weight="700" text-anchor="middle">CNF formula</text>
  <text x="180" y="260" fill="#d8d1c4" font-family="Consolas, monospace" font-size="15" text-anchor="middle">(A or B) and</text>
  <text x="180" y="284" fill="#d8d1c4" font-family="Consolas, monospace" font-size="15" text-anchor="middle">(not A or C)</text>

  <rect x="346" y="170" width="208" height="158" rx="14" fill="#2a1f12" stroke="#6f4308"/>
  <text x="450" y="212" fill="#ffffff" font-family="Arial, sans-serif" font-size="23" font-weight="700" text-anchor="middle">DPLL loop</text>
  <text x="450" y="246" fill="#d8d1c4" font-family="Arial, sans-serif" font-size="16" text-anchor="middle">unit propagation</text>
  <text x="450" y="274" fill="#d8d1c4" font-family="Arial, sans-serif" font-size="16" text-anchor="middle">pure literal rule</text>
  <text x="450" y="302" fill="#d8d1c4" font-family="Arial, sans-serif" font-size="16" text-anchor="middle">backtracking branch</text>

  <rect x="626" y="184" width="210" height="64" rx="14" fill="#303030" stroke="#666"/>
  <text x="731" y="223" fill="#ffffff" font-family="Arial, sans-serif" font-size="20" font-weight="700" text-anchor="middle">Conflict: prune</text>
  <rect x="626" y="284" width="210" height="64" rx="14" fill="#303030" stroke="#666"/>
  <text x="731" y="323" fill="#ffffff" font-family="Arial, sans-serif" font-size="20" font-weight="700" text-anchor="middle">Model: accept</text>

  <g stroke="#f68900" stroke-width="4" fill="none" marker-end="url(#arrow)">
    <path d="M292 249 L336 249"/>
    <path d="M564 216 L616 216"/>
    <path d="M564 316 L616 316"/>
    <path d="M724 256 C724 390 510 420 456 340"/>
  </g>

  <g fill="#303030" stroke="#666">
    <rect x="116" y="372" width="144" height="42" rx="8"/>
    <rect x="304" y="372" width="144" height="42" rx="8"/>
    <rect x="492" y="372" width="144" height="42" rx="8"/>
    <rect x="680" y="372" width="144" height="42" rx="8"/>
  </g>
  <g fill="#f4efe5" font-family="Arial, sans-serif" font-size="15" font-weight="700">
    <text x="188" y="398" text-anchor="middle">Eliminate</text>
    <text x="376" y="398" text-anchor="middle">Propagate</text>
    <text x="564" y="398" text-anchor="middle">Branch</text>
    <text x="752" y="398" text-anchor="middle">Backtrack</text>
  </g>

  <rect x="80" y="426" width="650" height="40" rx="8" fill="#201915" stroke="#4b3320"/>
  <text x="405" y="452" fill="#f4efe5" font-family="Arial, sans-serif" font-size="17" text-anchor="middle">Modern SAT solvers still inherit this idea: search, simplify, and cut away impossible branches.</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#f68900"/>
    </marker>
  </defs>
</svg>
